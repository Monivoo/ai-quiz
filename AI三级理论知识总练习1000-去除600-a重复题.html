较窄时(窗越宽，其通带越窄)，加窗后得到的频谱能够很好逼近短时语音信号的频谱。"}],"answer":"A,B,C,D","explanation":"① 长窗具有较高的频率分辨率，较低的时间分辨率。从一个基音周期到另一个基音周期，共振峰是要发生变化的，这一点即使从语音波形上也能够看出来。然而如果采用较长的窗，这种变化便被模糊了，因为长窗起到了时间上的平均作用。② 短窗具有较低的频率分辨率，较高的时间分辨率。采用矩形窗时，能够从短时频谱中提取出共振峰从一个基音周期到另一个基音周期所发生的变化。当然，激励源的谐波的细致结构也从短时频谱图上消失了。③ 窗宽的选择需折中考虑。短窗具有较好的时间分辨率，能够提取出语音信号中的短时变化(这常常是分析的目的)，损失了频率分辨率。但应注意到，语音信号的基音周期提取范围很大。因此，窗宽的选择应当考虑到这个因素。④ 矩形窗和汉明窗的频谱特性都具有低通的性质，在截止频率处都比较尖锐，当其通带都比较窄时(窗越宽，其通带越窄)，加窗后得到的频谱能够很好逼近短时语音信号的频谱。窗越宽，逼近效果越好。","mnemonic":"短时谱和移动窗：长窗时间平均+短窗高时间低频率分辨率+窗越宽通带越窄，ABCD全对"},{"id":413,"type":"multi","text":"在算法测试的参数优化中，能够采用（）算法来优化超参数。","options":[{"label":"A","text":"遗传算法"},{"label":"B","text":"贝叶斯优化"},{"label":"C","text":"随机搜索"},{"label":"D","text":"网格搜索"}],"answer":"A,B,C,D","explanation":"遗传算法：一种基于进化策略的优化方法，能够有效地搜索超参数空间，适用于复杂的优化问题。贝叶斯优化：通过构建代理模型（通常是高斯过程回归），智能地选择超参数组合，通常比传统方法（如网格搜索和随机搜索）更高效。随机搜索：通过随机选择超参数组合来进行优化，适用于高维超参数空间，尤其是在没有明确的搜索空间边界时，能带来更好的效果。网格搜索：最传统的超参数优化方法，通过穷举所有可能的超参数组合来找到最佳配置，虽然方法简单，但计算开销较大。","mnemonic":"超参数优化四算法：遗传+贝叶斯+随机搜索+网格搜索，ABCD全选"},{"id":414,"type":"multi","text":"关于 RFM 模型的定义，下列说法错误的是（）。","options":[{"label":"A","text":"RFM模型是一种针对客户价值的分析方法"},{"label":"B","text":"RFM模型是一种用于评估产品质量的方法"},{"label":"C","text":"RFM模型是一种用于计算投资回报率的方法"},{"label":"D","text":"RFM模型是一种用于评估市场份额的方法"}],"answer":"B,C,D","explanation":"RFM模型是一种基于客户价值的分析方法，通过对客户的消费行为、购买习惯和交易历史进行分析，确定客户的价值并制定精细化的市场营销策略。","mnemonic":"RFM模型定义错误：非评估产品质量+非计算投资回报+非评估市场份额，是客户价值分析"},{"id":415,"type":"multi","text":"下列哪项属于较为常见的资源服务器（）。","options":[{"label":"A","text":"DNS服务器"},{"label":"B","text":"E-mail服务器"},{"label":"C","text":"Web服务器"},{"label":"D","text":"相控阵雷达"}],"answer":"A,B,C","explanation":"常见的资源服务器有DNS（域名解析）服务器、E-mail（电子邮件）服务器、Web（网页）服务器等。","mnemonic":"资源服务器三种：DNS+E-mail+Web服务器，雷达不是服务器"},{"id":416,"type":"multi","text":"在神经网络算法中，下列哪项通常不被用于防止过拟合问题（）。","options":[{"label":"A","text":"梯度下降算法"},{"label":"B","text":"L1正则化"},{"label":"C","text":"随机梯度下降算法"},{"label":"D","text":"Dropout算法"}],"answer":"A,C","explanation":"梯度下降算法：用于优化损失函数，不针对过拟合。L1正则化：通过惩罚项限制权重大小，有效防止过拟合。随机梯度下降算法：是梯度下降算法的一种变体，核心功能是优化损失函数，并非用于防止过拟合的技术。Dropout算法：通过随机丢弃神经元，有效防止过拟合。","mnemonic":"不防过拟合：梯度下降+随机梯度下降是优化算法，L1正则化和Dropout才防过拟合"},{"id":417,"type":"multi","text":"下列选项中，关于计算机运算器的说法正确的是（）。","options":[{"label":"A","text":"运算器通常跟控制器和寄存器统称为中央处理器，即CPU"},{"label":"B","text":"运算器是整个计算机系统的控制中心"},{"label":"C","text":"运算器的基本功能是从内存取指令和执行指令"},{"label":"D","text":"运算器的主要功能是对数据进行各种算术运算和逻辑运算。"}],"answer":"A,D","explanation":"运算器又称算术逻辑单元（ALU），它的主要功能是对数据进行各种算术运算和逻辑运算。在计算机中，任何复杂运算都会转化为基本的算术与逻辑运算，然后在运算器中完成。控制器是整个计算机系统的控制中心，它的基本功能是从内存取指令和执行指令。通常将运算器、控制器和寄存器统称为中央处理器，即CPU。","mnemonic":"运算器说法：运算器+控制器+寄存器=CPU，运算器做算术逻辑运算，控制中心是控制器"},{"id":418,"type":"multi","text":"关联分析的方法能够应用在以下哪些（）领域。","options":[{"label":"A","text":"市场营销"},{"label":"B","text":"医疗保健"},{"label":"C","text":"社交网络"},{"label":"D","text":"手写文字识别"}],"answer":"A,B,C","explanation":"关联分析的方法可以用于分析大量数据中的关联关系，关联分析在市场营销中广泛应用，例如通过购物篮分析发现顾客经常一起购买的商品组合，从而优化商品陈列、设计促销策略等。在医疗保健领域，关联分析可以用于发现疾病与症状之间的关联、药物与副作用之间的关系等，辅助医生进行诊断和治疗决策。关联分析可用于分析社交网络中的用户关系和互动模式。手写文字识别主要涉及图像处理和模式识别技术，与关联分析的方法和目标不同。","mnemonic":"关联分析应用领域：市场营销+医疗保健+社交网络，手写识别是模式识别不是关联分析"},{"id":419,"type":"multi","text":"下列哪项属于中级培训的实践训练内容？（）","options":[{"label":"A","text":"数据采集"},{"label":"B","text":"深度学习理论"},{"label":"C","text":"数据标注"},{"label":"D","text":"模型优化"}],"answer":"A,C","explanation":"数据采集、数据标注属于中级培训的实践训练。","mnemonic":"中级培训实践：数据采集+数据标注，深度学习理论和模型优化不属于"},{"id":420,"type":"multi","text":"下列属于语音信号线性预测分析的模型的是（）。","options":[{"label":"A","text":"AR模型"},{"label":"B","text":"MA模型"},{"label":"C","text":"ARMA模型"},{"label":"D","text":"MR模型"}],"answer":"A,B,C","explanation":"参数模型法是现代谱估计的主要内容，经常采用的模型有三种:自回归(autoregressive)模型，简称AR模型，它是一个全极点的模型;②移动平均(movingaverage)模型，简称MA模型，它是一个全零点模型;③自回归-移动平均模型，简称ARMA模型，它是一个既有零点又有极点的模型，","mnemonic":"语音线性预测三模型：AR自回归+MA移动平均+ARMA混合，没有MR模型"},{"id":421,"type":"multi","text":"下列选项中，属于文件系统的是（）。","options":[{"label":"A","text":"本地文件系统"},{"label":"B","text":"数据仓库"},{"label":"C","text":"网络文件系统"},{"label":"D","text":"分布式文件系统"}],"answer":"A,C,D","explanation":"常见文件系统包括本地文件系统、伪文件系统、网络文件系统、集群文件系统、分布式文件系统等。","mnemonic":"文件系统三类：本地+网络+分布式文件系统，数据仓库不是文件系统"},{"id":422,"type":"multi","text":"关于可用性设计，以下哪些描述是正确的？（）","options":[{"label":"A","text":"可用性设计的主要目标是让用户能够快速且有效地完成任务"},{"label":"B","text":"可用性设计只关注产品的外观和吸引力，不涉及操作流程"},{"label":"C","text":"可用性设计应该帮助用户在使用过程中避免犯错并提供修正措施"},{"label":"D","text":"可用性设计包括提高用户学习成本，使用户能在复杂环境下灵活操作"}],"answer":"A,C","explanation":"可用性设计的核心是提高产品的效力（有效性）和效率，确保用户能够顺利、快速地完成任务，这是可用性设计的核心目标之一。可用性设计的目标是降低用户的学习成本，使产品易于学习，而不是提高学习成本。提高学习成本会增加用户的使用难度和不满。可用性设计时要考虑用户操作错误的情况，并尽可能提供修正或恢复机制，提升用户体验。虽然吸引力是可用性的一部分，但可用性设计不仅仅关注外观，更加注重用户在使用过程中是否能够高效完成任务，操作流程的设计也至关重要。","mnemonic":"可用性设计正确描述：快速有效完成任务+避免犯错提供修正，非只关注外观非提高学习成本"},{"id":423,"type":"multi","text":"业务流程优化具体指的是什么（）。","options":[{"label":"A","text":"以提升企业绩效为目标"},{"label":"B","text":"对现有的业务流程进行分析、梳理，对其中存在的问题进行完善、改进"},{"label":"C","text":"增强部门间的横向协作，提升企业运作效率"},{"label":"D","text":"降低企业运营成本，增强企业的竞争力"}],"answer":"A,B,C,D","explanation":"业务流程优化指的是以提升企业绩效为目标，对现有的业务流程进行分析、梳理，对其中存在的问题进行完善、改进，实现部门间的无障碍沟通，增强部门间的横向协作，提升企业运作效率，降低企业运营成本，增强企业的竞争力。","mnemonic":"业务流程优化：提升绩效+分析改进+横向协作+降本增效，ABCD全选"},{"id":424,"type":"multi","text":"职业道德的各项特征里，对工作的责任感具体表现在哪些方面（）。","options":[{"label":"A","text":"不推卸责任"},{"label":"B","text":"能够承担自己的职责"},{"label":"C","text":"维护公共利益"},{"label":"D","text":"严格履行岗位职责，保护公司机密"}],"answer":"A,B,C,D","explanation":"职业道德的特征中，对工作的责任感具体表现为：不推卸责任、能够承担自己的职责、维护企业利益和公共利益等。严格履行岗位职责，保护公司机密可以算是保护公司利益的一部分。","mnemonic":"工作责任感四表现：不推卸+承担职责+维护公益+履职保密，ABCD全选"},{"id":425,"type":"multi","text":"下列哪项是可以实现触控交互的设备？","options":[{"label":"A","text":"鼠标"},{"label":"B","text":"键盘"},{"label":"C","text":"触摸屏"},{"label":"D","text":"手写板"}],"answer":"C,D","explanation":"触控交互需要使用触控设备，触控设备包括触摸屏和手写板，可以通过手指或者笔触来实现交互操作；而鼠标和键盘不具备触控的功能。","mnemonic":"触控设备：触摸屏+手写板，鼠标键盘非触控(CD)"},{"id":426,"type":"multi","text":"下列属于职业道德所具备特征的是（）。","options":[{"label":"A","text":"间歇性"},{"label":"B","text":"职业性"},{"label":"C","text":"渐进性"},{"label":"D","text":"继承性"}],"answer":"B,D","explanation":"职业道德特征包括职业性、继承性、实践性、多样性。","mnemonic":"职业道德特征：职继实多——\"职业继承\"排除间歇渐进(BD)"},{"id":427,"type":"multi","text":"操作系统所追求的目标包括（）。","options":[{"label":"A","text":"管理资源"},{"label":"B","text":"提高效率"},{"label":"C","text":"方便使用"},{"label":"D","text":"开放环境"}],"answer":"A,B,C,D","explanation":"人们使用操作系统，最直截了当的目标是让用户更加有效和方便地使用计算机，同时也希望能充分发挥计算机硬件系统的最大效用，提高工作效率。操作系统的主要目标可归结为方便使用、扩充功能、管理资源、提高效率、开放环境。","mnemonic":"操作系统五目标：方便使用、扩充功能、管资源、提效率、开放环境，全选(ABCD)"},{"id":428,"type":"multi","text":"下列选项中，不属于数据标注流程注意要点的是（ ）。","options":[{"label":"A","text":"C、D 均与正确的注意事项相悖，因此不属于数据标注流程注意事项。"},{"label":"B","text":"制定详尽的标注指南，确保标注的一致性"},{"label":"C","text":"不考虑数据安全与隐私，只关注标注任务本身"},{"label":"D","text":"仅由初级标注员进行标注，无需复审环节"}],"answer":"A,C,D","explanation":"暂无解析","mnemonic":"数据标注要点：B制定指南是对的，ACD都不属于正确要点(ACD)"},{"id":429,"type":"multi","text":"在人机交互设计流程的原型设计阶段，需要考虑的问题是下列哪项？","options":[{"label":"A","text":"界面布局"},{"label":"B","text":"交互方式"},{"label":"C","text":"功能模块"},{"label":"D","text":"概念设计"}],"answer":"A,B,C","explanation":"在人机交互设计流程中，原型设计阶段需要考虑界面布局、交互方式、功能模块等问题。概念设计是设计流程的一部分，但它通常发生在原型设计阶段之前，用于确定设计的基本方向和理念。","mnemonic":"原型设计三考虑：界面布局+交互方式+功能模块，概念设计在前一阶段(ABC)"},{"id":430,"type":"multi","text":"关于数据增强的使用，下列说法不正确的是（）。","options":[{"label":"A","text":"数据增强可以提高模型的鲁棒性和泛化能力"},{"label":"B","text":"数据增强通常只在训练集上进行，测试集一般保持原样，以确保评估的准确性。"},{"label":"C","text":"图像数据的数据增强只能对图像进行旋转、缩放、翻转等基本操作"},{"label":"D","text":"数据增强技术对于所有类型的数据都适用"}],"answer":"C,D","explanation":"图像数据增强的操作不仅仅限于旋转、缩放、翻转，还包括扭曲、剪裁、色彩变换等多种操作，选项C错误；数据增强不是所有类型的数据都适用，不同类型的数据需要使用对应的增强方法进行处理，选项D错误","mnemonic":"数据增强不正确：C\"只能基本操作\"D\"所有数据都适用\"都错(CD)"},{"id":431,"type":"multi","text":"诚实公正的基本要求包含哪些内容（）。","options":[{"label":"A","text":"公正地对待所有相关方"},{"label":"B","text":"隐瞒重要信息"},{"label":"C","text":"利用职务之便谋取个人私利"},{"label":"D","text":"及时、清晰地向相关方提供信息"}],"answer":"A,D","explanation":"根据诚实公正的基本要求，从业人员要做到以下几点，一、诚实，从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。二、公正，从业人员应该公正地对待所有相关方，不偏袒任何一方。基于客观事实和公正标准做出决策和评估。三、透明，从业人员应该及时、清晰地向相关方提供信息，并确保相关方理解信息的真实性和重要性。遵守披露要求，不得隐瞒重要信息。四、忠诚和权益保护，从业人员应该忠诚于雇主或客户的利益，并保护他们的权益。不得利用职务之便谋取个人私利，也不得损害他人的权益。因此AD选项符合题目要求。","mnemonic":"诚实公正要求：公正对待+及时提供信息，隐瞒和私利是反面(AD)"},{"id":432,"type":"multi","text":"下列哪项属于阈值分割的步骤（）。","options":[{"label":"A","text":"分割像素"},{"label":"B","text":"确定分割阈值"},{"label":"C","text":"将分割阈值与像素灰度值进行比较，以分割图像的像素"},{"label":"D","text":"检测边缘像素"}],"answer":"B,C","explanation":"阈值分割是一种应用广泛的图像分割方法，主要有两个步骤:(1)确定需要分割的阈值;(2)将分割阈值与像素灰度值进行比较，以分割图像的像素。其中，确定阈值是图像分割的关键，一个合适的阈值可以完全分割图像。在确定值后，将阈值与像素灰度值加以比较，可以并行开展像素分割并将分割结果直接用于图像区域。","mnemonic":"阈值分割两步走：定阈值+比灰度值分割像素(BC)"},{"id":433,"type":"multi","text":"可用于基于边缘的图像分割方法的算法是（）。","options":[{"label":"A","text":"K-Means聚类算法"},{"label":"B","text":"Canny算子"},{"label":"C","text":"LoG算子"},{"label":"D","text":"均值漂移算法"}],"answer":"B,C","explanation":"K-Means聚类算法是通过无监督学习基于像素特征对图像进行分割，但它并不依赖于图像的边缘信息。Canny算子是一种常用的边缘检测算法，用于检测图像中的边缘信息。LoG算子是由Marr提出的边缘检测算子，因此有时又被称为Marr算子。均值漂移算法是一种基于区域的分割方法，主要通过像素特征的密度估计来进行分割，而不是依赖于边缘信息。","mnemonic":"边缘分割算子：Canny+LoG，K-Means聚类和均值漂移非边缘法(BC)"},{"id":434,"type":"multi","text":"下列属于 jieba 分词的分词模式的是（）。","options":[{"label":"A","text":"全模式"},{"label":"B","text":"精确模式"},{"label":"C","text":"搜索模式"},{"label":"D","text":"识别模式"}],"answer":"A,B,C","explanation":"jieba分词提供了四种分词模式：精确模式、全模式、搜索模式和paddle模式。","mnemonic":"jieba分词三模式：全模式+精确模式+搜索模式，无\"识别模式\"(ABC)"},{"id":435,"type":"multi","text":"jieba 分词的使用规范包含哪些步骤（）。","options":[{"label":"A","text":"导入jieba分词库"},{"label":"B","text":"手动词性标注"},{"label":"C","text":"加载自定义词典"},{"label":"D","text":"选择分词模式"}],"answer":"A,C,D","explanation":"jieba分词的使用规则包括安装jieba分词库、导入jieba分词库、选择分词模式、加载自定义词典、获取分词结果等步骤。","mnemonic":"jieba使用步骤：导入库+加载词典+选模式，手动标注不属于(ACD)"},{"id":436,"type":"multi","text":"计算机在标准办公处理方面的主要应用有哪些（）。","options":[{"label":"A","text":"电子邮件"},{"label":"B","text":"电子表格"},{"label":"C","text":"文字处理"},{"label":"D","text":"音频处理"}],"answer":"A,B,C","explanation":"计算机在办公处理中的主要应用包括电子邮件、电子表格、文字处理、演示文稿、图像处理等。D项是多媒体处理中的应用，需借助专业软件（如Audacity），通常不纳入标准办公处理范畴。","mnemonic":"标准办公三应用：邮件+表格+文字处理，音频是多媒体处理(ABC)"},{"id":437,"type":"multi","text":"下列关于特征选择方法的描述，正确的是（）。","options":[{"label":"A","text":"过滤式方法通过评估每个特征与目标变量之间的统计关系来选择特征，独立于任何学习算法"},{"label":"B","text":"包裹式方法通过训练模型来评估特征子集的好坏，可以考虑特征之间的相互作用"},{"label":"C","text":"嵌入式方法是在模型训练过程中进行特征选择，能够同时考虑模型的学习能力和特征选择"},{"label":"D","text":"主成分分析（PCA）是一种常见的基于模型的特征选择方法，通过最大化类间差异来选择特征"}],"answer":"A,B,C","explanation":"A选项正确。过滤式方法（Filter Method）根据统计指标如卡方检验、信息增益等来评估特征与目标变量的相关性，并选择重要的特征。这类方法与学习算法无关，通常用于特征的初步筛选。B选项正确。包裹式方法（Wrapper Method）通过训练模型来评估不同特征子集的性能，并选择最优的特征子集。由于它考虑了特征之间的相互作用，因此能够更好地模拟模型的实际性能。C选项正确。嵌入式方法（Embedded Method）通过在训练过程中进行特征选择，能够有效结合学习算法和特征选择过程，通常具有较好的性能和较低的计算复杂度。D选项错误。主成分分析（PCA）是一种降维方法，它通过计算数据中的方差最大化的方向来转换特征，而不是直接选择与输出变量关系最强的特征。PCA与类间差异无关，主要用于降低数据维度。","mnemonic":"特征选择三法都对：过滤式独立统计+包裹式训练评估+嵌入式训练中选，PCA是降维非选择(ABC)"},{"id":438,"type":"multi","text":"下面哪一个步骤属于 jieba 分词的基本步骤（）。","options":[{"label":"A","text":"选择分词模式"},{"label":"B","text":"获取分词结果"},{"label":"C","text":"载入自定义词典"},{"label":"D","text":"导入jieba库"}],"answer":"A,B,C,D","explanation":"jieba分词基本步骤包括：安装和导入jieba、选择分词模式、载入自定义词典、获取分词结果。","mnemonic":"jieba基本步骤：导入+选模式+载词典+获结果，全选(ABCD)"},{"id":439,"type":"multi","text":"运用中文分词模型时，哪种调参方式能够有效增强模型的性能（）。","options":[{"label":"A","text":"调整词典的大小，删除低频词或添加高频词"},{"label":"B","text":"调整正则化系数，平衡模型的拟合程度和过拟合风险"},{"label":"C","text":"调整分词模型的超参数，如窗口大小、上下文长度等"},{"label":"D","text":"使用分布式训练方法，增大训练数据量"}],"answer":"A,B,C,D","explanation":"中文分词模型的优化不仅仅在于精细的模型设计和有效的算法实现，更需要对模型的各种调参参数进行细致的调试和策略优化。例如，通过调整词典的大小或添加高频词可以选择仅使用有效的计数特征，避免过多的数据噪声和干扰。而调整正则化系数和超参数则可以动态平衡模型的拟合程度和泛化性能。在实际使用中，还可以通过并行训练等分布式方法来增加数据量和加速训练过程。","mnemonic":"中文分词调参：调词典+调正则化+调超参+分布式训练，全选(ABCD)"},{"id":440,"type":"multi","text":"计算机的硬件是由哪些部分组成的（）。","options":[{"label":"A","text":"存储器"},{"label":"B","text":"输入设备和输出设备"},{"label":"C","text":"控制器"},{"label":"D","text":"运算器"}],"answer":"A,B,C,D","explanation":"根据 ​冯·诺依曼体系结构，计算机硬件由运算器、控制器、存储器、输入设备和输出设备五个基本部分组成。","mnemonic":"冯诺依曼五部件：存储器+输入输出+控制器+运算器，全选(ABCD)"},{"id":441,"type":"multi","text":"下列选项中，属于 K - 近邻算法关键特性或参数的是（）。","options":[{"label":"A","text":"需要选择合适的距离度量方法"},{"label":"B","text":"需要预先设定K的值"},{"label":"C","text":"需要使用线性模型进行训练"},{"label":"D","text":"算法的计算复杂度与训练数据集的大小无关"}],"answer":"A,B","explanation":"A：KNN算法依赖于距离度量方法（如欧式距离、曼哈顿距离等），选择合适的距离度量方法对于算法的性能至关重要。B：K的取值是KNN算法的关键参数，表示算法中“邻居”的数量。选择合适的K值对于模型的精度和泛化能力非常重要。C：KNN不是基于线性模型的算法，而是基于邻近样本的标签进行分类或回归。因此，选项C是错误的。D：KNN算法的计算复杂度与训练数据集的大小相关，因为它需要计算待分类样本与所有训练样本的距离。因此，选项D是错误的。","mnemonic":"KNN关键：选距离度量+设K值，非线性模型且复杂度与数据量相关(AB)"},{"id":442,"type":"multi","text":"在文本向量化模型里，典型的预训练语言模型是（）。","options":[{"label":"A","text":"ELMO"},{"label":"B","text":"Word2Vec"},{"label":"C","text":"BOW"},{"label":"D","text":"BERT"}],"answer":"A,D","explanation":"典型的预训练语言模型有:ELMO方法，设计了双向的语言模型的预训练任务，对前向和后向语言模型进行了拼接;BERT方法，设计了掩码语言模型任务，可以利用双向的上下文信息。","mnemonic":"预训练语言模型：ELMO+BERT，Word2Vec和BOW是传统方法(AD)"},{"id":443,"type":"multi","text":"以下哪项不属于 SWOT 模型的核心内容（）。","options":[{"label":"A","text":"公司能力分析"},{"label":"B","text":"公司目标分析"},{"label":"C","text":"公司外部环境分析"},{"label":"D","text":"公司财务状况分析"}],"answer":"A,B,D","explanation":"SWOT模型的主要内容包括对企业内部的优劣势和外部环境的机会和威胁进行分析和评估，从而制定相应的战略。选项C是外部环境分析，属于SWOT模型的主要内容。","mnemonic":"SWOT不含：能力分析、目标分析、财务分析都不是，只有外部环境分析属于(ABD)"},{"id":444,"type":"multi","text":"属于图像去噪的传统算法有哪些（）。","options":[{"label":"A","text":"基于滤波器的方法"},{"label":"B","text":"小波变换方法"},{"label":"C","text":"基于稀疏表示的方法"},{"label":"D","text":"基于统计学习的方法"}],"answer":"A,B,C,D","explanation":"图像去噪的传统算法主要包括基于滤波器的方法、小波变换方法、基于稀疏表示的方法和基于统计学习的方法。","mnemonic":"图像去噪传统算法：滤波器+小波+稀疏表示+统计学习，全选(ABCD)"},{"id":445,"type":"multi","text":"在进行可用性评估时，下列哪些方法属于测试类方法？（）","options":[{"label":"A","text":"用户测试"},{"label":"B","text":"启发式评估"},{"label":"C","text":"问卷调查"},{"label":"D","text":"放声思考法"}],"answer":"A,C,D","explanation":"可用性评估方法分为诊查式方法和测试式方法。测试式方法包括实际用户参与的评估方式，这类方法帮助设计人员从用户的角度了解产品的可用性。常见的测试式方法包括用户测试、问卷调查、放声思考法等。诊查式方法则通常由专家进行评估，不涉及实际用户。常见的诊查式方法有启发式评估。","mnemonic":"可用性测试类方法：用户测试+问卷+放声思考，启发式是诊查式(ACD)"},{"id":446,"type":"multi","text":"数据标注的类型包括（）。","options":[{"label":"A","text":"图像类数据标注"},{"label":"B","text":"文本类数据标注"},{"label":"C","text":"语音类数据标注"},{"label":"D","text":"视频类数据标注"}],"answer":"A,B,C,D","explanation":"数据标注分为4种基本类型，包括图像类数据标注、文本类数据标注、语音类数据标注、视频类数据标注及其他类数据标注。","mnemonic":"数据标注四类型：图像+文本+语音+视频，全选(ABCD)"},{"id":447,"type":"multi","text":"关于文本向量化模型的应用，下列说法正确的是（）。","options":[{"label":"A","text":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式"},{"label":"B","text":"常见的文本向量化模型有TF-IDF、Word2Vec、BOW等"},{"label":"C","text":"文本向量化只适用于英文文本"},{"label":"D","text":"文本向量化可用于文本分类、情感分析等任务"}],"answer":"A,B,D","explanation":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式，是自然语言处理中必不可少的一环，可用于文本分类、情感分析等任务。常见的文本向量化模型有TF-IDF、Word2Vec、BOW等，而且这些模型并不仅限于英文文本。","mnemonic":"文本向量化：转数字形式+TF-IDF/W2V/BOW+用于分类情感分析，不限英文(ABD)"},{"id":448,"type":"multi","text":"下列哪项技术不能用于图像处理中的图像增强（）。","options":[{"label":"A","text":"傅里叶变换"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"边缘检测"},{"label":"D","text":"图像压缩"}],"answer":"A,C,D","explanation":"均值滤波/中值滤波和直方图均衡化，它们是图像增强最强大工具，图像增强的目的是提高图像的质量或使特定的特征显得更加突出。","mnemonic":"不能图像增强：傅里叶变换+边缘检测+图像压缩都不是，直方图均衡化才是(ACD)"},{"id":449,"type":"multi","text":"UAN 模型具有哪些特点？（）","options":[{"label":"A","text":"UAN模型通过符号语言表达用户的行为序列及界面状态变化。"},{"label":"B","text":"UAN模型强调通过图形化方式来展示用户行为，减少文字描述。"},{"label":"C","text":"UAN模型可以清晰表示任务中的条件控制、动作序列以及界面状态反馈。"},{"label":"D","text":"UAN模型适用于界面设计中用户行为的建模"}],"answer":"A,C,D","explanation":"选项A是正确的，UAN模型通过符号语言来表达用户行为、界面状态变化和交互逻辑，这是它的核心特点。选项B是错误的，UAN模型并非通过图形化方式，而是通过符号语言来表达用户行为，注重简洁的符号描述。选项C是正确的，UAN模型通过符号化的方式可以清晰表达条件控制、动作序列以及界面的状态反馈，适合任务建模。选项D是正确的，UAN适合建模用户行为。","mnemonic":"UAN模型特点：符号语言+条件控制动作序列+用户行为建模，非图形化方式(ACD)"},{"id":450,"type":"multi","text":"（）是对图像边缘的描述。","options":[{"label":"A","text":"边缘法线方向"},{"label":"B","text":"边缘方向"},{"label":"C","text":"边缘强度"},{"label":"D","text":"边缘颜色"}],"answer":"A,B,C","explanation":"边缘的描述包含以下几个方面:(1)边缘法线方向--在某点灰度变化最剧烈的方向，与边缘方向垂直(2)边缘方向--与边缘法线方向垂直，是目标边界的切线方向。(3)边缘强度--沿边缘法线方向图像局部的变化强度的量度,","mnemonic":"图像边缘描述三要素：法线方向+边缘方向+边缘强度，无边缘颜色(ABC)"},{"id":451,"type":"multi","text":"人机交互界面设计的基本流程包含哪些、方案改进阶段、构架原型阶段、用户验证阶段？","options":[{"label":"A","text":"编程实现阶段"},{"label":"B","text":"需求阶段"},{"label":"C","text":"分析设计阶段"},{"label":"D","text":"调研验证阶段"}],"answer":"B,C,D","explanation":"人机交互界面设计基本流程共分为6个阶段，分别为需求阶段、分析设计阶段、调研验证阶段、方案改进阶段、构架原型阶段、用户验证阶段。","mnemonic":"人机交互界面设计六阶段：需求+分析设计+调研验证+方案改进+构架原型+用户验证(BCD)"},{"id":452,"type":"multi","text":"下列关于 UAN 模型的描述及应用，正确的有哪些？（）","options":[{"label":"A","text":"UAN模型是一种简单的符号语言"},{"label":"B","text":"UAN模型允许设计者选择合理的抽象层次来描述复杂的界面设计和交互任务"},{"label":"C","text":"UAN模型 采用半层次结构化的描述方法，提供两种不同的符号来分别描述抽象任务和用户执行的具体动作"},{"label":"D","text":"UAN模型允许设计者选择合理的抽象层次来描述复杂的界面设计和交互任务。"}],"answer":"A,B,C,D","explanation":"UAN(User Action Notation)[8]是一种简单的任务建模语言，主要使用符号语言来描述用户的操作序列以及在进行操作时所用的界面。UAN 采用半层次结构化的描述方法，提供两种不同的符号来分别描述抽象任务和用户执行的具体动作，允许设计者选择合理的抽象层次来描述复杂的界面设计和交互任务。UAN 规范由两部分组成，一部分描述任务之间的时序关系，一部分用表格的形式描述基本任务。","mnemonic":"UAN模型：简单符号语言+半层次结构+合理抽象层次+BD重复，全选(ABCD)"},{"id":453,"type":"multi","text":"在各类任务分析方法中，（）属于面向对象的分析手段。","options":[{"label":"A","text":"工序约束陈述"},{"label":"B","text":"用例图"},{"label":"C","text":"顺序图"},{"label":"D","text":"情节分析"}],"answer":"B,C","explanation":"工序约束陈述（选项A）：工序约束陈述更偏向​​结构化分析方法​​，通常用于描述系统流程中的操作顺序和限制条件（如工业制造中的装配流程），与面向对象强调的封装、继承等特性无关。用例图（选项B）：用例图主要用于展示不同用户角色和系统功能之间的交互关系，用来概括有关参与者和用例信息的图形化模型。顺序图（选项C）：顺序图展示了任务执行过程中的时间顺序，描述了任务步骤之间的依赖和交互，帮助理解任务的顺序关系。情节分析（选项D）：情节分析主要用于​​文学或叙事结构研究​​（如小说中的角色发展、冲突设计），或商业流程中的故事板设计，属于需求描述手段而非面向对象建模工具。","mnemonic":"面向对象分析：用例图+顺序图，工序约束是结构化、情节分析是叙事(BC)"},{"id":454,"type":"multi","text":"PEST 模型着重分析企业所处的外部环境，它的核心构成要素包含（）。","options":[{"label":"A","text":"政治环境"},{"label":"B","text":"经济环境"},{"label":"C","text":"社会环境"},{"label":"D","text":"技术环境"}],"answer":"A,B,C,D","explanation":"PEST模型主要考察的是企业外部环境，因此其主要内容包括政治、经济、社会和技术四个方面。","mnemonic":"PEST四要素：政治+经济+社会+技术，首字母对应PEST，全选(ABCD)"},{"id":455,"type":"multi","text":"在应用逻辑回归模型时，能够解决样本不平衡问题的策略包括（）。","options":[{"label":"A","text":"过采样（over-sampling）"},{"label":"B","text":"欠采样（under-sampling）"},{"label":"C","text":"调整分类阈值（阈值移动）"},{"label":"D","text":"ROC曲线分析"}],"answer":"A,B,C","explanation":"样本不平衡问题常常会导致分类器的准确率下降，而逻辑回归算法可以通过过采样、欠采样和调整阈值等方法解决这个问题。ROC曲线分析是评估分类器性能的方法，不能直接用于解决样本不平衡问题。因此选项A、B、C是正确答案。","mnemonic":"逻辑回归解决样本不平衡：过采样+欠采样+调阈值，ROC是评估不是解决(ABC)"},{"id":456,"type":"multi","text":"对于漏斗分析，下列说法正确的是（）。","options":[{"label":"A","text":"漏斗分析只适用于线上购物网站"},{"label":"B","text":"漏斗分析可以用来分析用户的流失率"},{"label":"C","text":"漏斗分析能够精确计算转化率"},{"label":"D","text":"漏斗分析只能分析登录状态下的用户行为"}],"answer":"B,C","explanation":"漏斗分析可以适用于各种类型的网站，而不仅仅是线上购物网站。漏斗分析最主要的作用之一就是分析用户的流失率，精确计算转化率也是漏斗分析的一个重要功能。由于用户的行为不止局限于登录状态，所以漏斗分析也能够分析未登录状态下的用户行为。","mnemonic":"漏斗分析：可分析流失率+精确算转化率，不限购物网站也不限登录状态(BC)"},{"id":457,"type":"multi","text":"以下关于数据增强的描述，正确的有（）。","options":[{"label":"A","text":"数据增强能够扩展训练集的规模"},{"label":"B","text":"数据增强仅通过增加图像的分辨率来扩展训练集的规模"},{"label":"C","text":"数据增强可以提高模型的泛化能力，减少过拟合的风险"},{"label":"D","text":"数据增强包括旋转、平移、缩放、裁剪等几何变换操作，但不涉及颜色空间的变换"}],"answer":"A,C","explanation":"数据增强是一种在训练模型通过对原始图像进行变换或者合成来产生新的训练数据的技术。其主要目的是扩充数据集，使模型能够学习到更多的不变性，增加模型的泛化能力，同时减少过拟合的风险。","mnemonic":"数据增强正确说法：扩展训练集+提高泛化减少过拟合，不仅增分辨率也含颜色变换(AC)"},{"id":458,"type":"multi","text":"下列哪项属于知识产权侵权行为（）。","options":[{"label":"A","text":"未经授权擅自使用他人商标"},{"label":"B","text":"未经授权擅自销售他人专利品"},{"label":"C","text":"未经授权擅自复制他人版权作品"},{"label":"D","text":"未经授权擅自使用他人知识产权的商业秘密"}],"answer":"A,B,C,D","explanation":"知识产权侵权行为可以包括侵犯商标权、专利权、著作权、商业秘密等多种形式。未经授权擅自使用他人商标、销售他人专利品、复制他人版权作品、使用他人知识产权的商业秘密等都属于知识产权侵权行为。《中华人民共和国知识产权法》规定，任何组织或者个人不得侵犯他人的知识产权。","mnemonic":"知识产权侵权：商标+专利+版权+商业秘密，未经授权全都侵权(ABCD)"},{"id":459,"type":"multi","text":"在 Word 里，对已有的页眉和页脚进行编辑时，支持的操作有哪些（）。","options":[{"label":"A","text":"添加或更改页眉或页脚的文本"},{"label":"B","text":"删除第一个页眉或页脚"},{"label":"C","text":"更改字体、颜色或大小"},{"label":"D","text":"将图像添加到页眉或页脚"}],"answer":"A,B,C,D","explanation":"在word中编辑现有页眉和页脚可以添加或更改页眉或页脚的文本，或者执行以下任一操作：①删除第一个页眉或页脚。②添加页码。③更改字体、颜色或大小④将图像添加到页眉或页脚。","mnemonic":"Word页眉页脚编辑：改文本+删首个+改字体颜色大小+加图像，全选(ABCD)"},{"id":460,"type":"multi","text":"下列属于事务 ACID 特性的属性是（）。","options":[{"label":"A","text":"原子性"},{"label":"B","text":"可用性"},{"label":"C","text":"持久性"},{"label":"D","text":"扩展性"}],"answer":"A,C","explanation":"事物的ACID特性包括原子性、一致性、独立性和持久性。可用性通常指的是系统在任何时候都能被访问和使用，与事务的特性无关。扩展性指的是系统能够通过增加资源来处理更多的负载，与事务的特性无关。","mnemonic":"ACID特性：原子性+一致性+独立性+持久性，可用性和扩展性不属于(AC)"},{"id":461,"type":"multi","text":"关于 ETL 任务能够重复执行这一特点，下列描述正确的是（）。","options":[{"label":"A","text":"任务设计需保证多次执行结果一致"},{"label":"B","text":"调度系统应支持配置任务重试次数"},{"label":"C","text":"可重复执行仅适用于自动化场景"},{"label":"D","text":"通过重试检查数据就绪是典型应用"}],"answer":"A,B,D","explanation":"在ETL任务中，可重复执行性是一个重要的特性。任务应该设计成在多次执行时产生相同的结果，以确保数据的一致性和可靠性。调度系统通常需要支持任务重试功能，以便在任务失败时能够自动重试。通过配置任务重试次数，可以确保任务在遇到临时错误时能够自动恢复，提高任务的可靠性和成功率。可重复执行不仅适用于自动化场景，也适用于手动场景。通过重试来检查数据是否就绪是一种常见的应用。","mnemonic":"ETL可重复执行：多次结果一致+支持重试次数+重试检查数据就绪，不限自动化(ABD)"},{"id":462,"type":"multi","text":"下列符合定义精确原则的是（）。","options":[{"label":"A","text":"管理分析法"},{"label":"B","text":"要使用维度分析法"},{"label":"C","text":"要清晰、明确地定义流程产出、流程投入、流程活动等要素的特征"},{"label":"D","text":"尽最大的努力使其实现量化。"}],"answer":"C,D","explanation":"定义精确原则是指要清晰、明确地定义流程产出、流程投入、流程活动等要素的特征，尽最大的努力使其实现量化。","mnemonic":"定义精确原则：清晰定义流程要素+尽力量化，管理分析法和维度分析法不是(CD)"},{"id":463,"type":"multi","text":"当算法因模型复杂度不够而出现欠拟合时，可采取（）措施。","options":[{"label":"A","text":"继续训练模型，增加训练轮数"},{"label":"B","text":"增加模型复杂度"},{"label":"C","text":"增加更多特征"},{"label":"D","text":"减小学习率"}],"answer":"B,C","explanation":"如果模型复杂度不足，增加训练轮数并不会有效解决欠拟合问题。增加模型复杂度是解决欠拟合最有效的方法。增加更多特征，能够提供更多的信息，帮助模型更好地学习，从而缓解欠拟合。减小学习率可能缓解优化问题，但对欠拟合无直接作用。","mnemonic":"欠拟合因模型复杂度不够：增加复杂度+增加特征，增训练轮数和减学习率无效(BC)"},{"id":464,"type":"multi","text":"下列选项中，哪项属于在 Word 中设置文字格式的操作（）。","options":[{"label":"A","text":"更改字体和字体颜色"},{"label":"B","text":"更改字号"},{"label":"C","text":"将文本加粗、变成斜体"},{"label":"D","text":"添加下划线"}],"answer":"A,B,C,D","explanation":"在Word中，设置文本格式需要先选择要设置格式的文本。若要选择单个字词，双击它。 若要选择文本的某行，单击该行左侧。选择相应选项可更改字体、字号、字体颜色，或将文本加粗、变成斜体或为其添加下划线。","mnemonic":"Word文字格式：改字体颜色+改字号+加粗斜体+下划线，全选(ABCD)"},{"id":465,"type":"multi","text":"下列各项中，可能造成决策树模型出现过拟合现象的因素是（）。","options":[{"label":"A","text":"样本数量过少"},{"label":"B","text":"特征数量过多"},{"label":"C","text":"树的深度过大"},{"label":"D","text":"使用了较大的训练集"}],"answer":"A,B,C","explanation":"选项A：样本数量过少可能导致决策树模型无法有效地泛化，容易过拟合。较少的样本使得树在拟合过程中很容易把噪声和特殊情况当作规律，导致对训练数据的记忆而非学习一般规律。选项B：特征选择过多可能导致决策树模型变得非常复杂，增加了树的分裂次数和深度，从而导致过拟合。特别是在某些特征与目标变量没有强相关性的情况下，过多的特征可能使得决策树模型难以找到最优的划分规则。选项C：树的深度过大是导致过拟合的常见原因。过深的树会把训练数据的每一个小变化都考虑进去，导致模型对训练集的过度拟合，从而丧失泛化能力。选项D：使用较大的训练集通常有助于减少过拟合，因为更多的数据可以提供更多的信息，有助于模型学习到数据的总体规律。","mnemonic":"决策树过拟合因素：样本少+特征多+树太深，大训练集反而减少过拟合(ABC)"},{"id":466,"type":"multi","text":"中级知识体系所涵盖的模块有哪几项（）。","options":[{"label":"A","text":"excel操作"},{"label":"B","text":"数据标注"},{"label":"C","text":"数据采集和处理"},{"label":"D","text":"智能系统运维"}],"answer":"B,C,D","explanation":"中级知识体系包含数据标注、数据采集和处理、智能系统运维等模块。","mnemonic":"中级知识体系模块：数据标注+数据采集处理+智能系统运维，excel非核心模块(BCD)"},{"id":467,"type":"multi","text":"在 Excel 表格中，可实现文本字符串中文本替换操作的函数有（）。","options":[{"label":"A","text":"SUM"},{"label":"B","text":"SUBSTITUTE"},{"label":"C","text":"REPLACE"},{"label":"D","text":"Trim"}],"answer":"B,C","explanation":"如果需要在某一文本字符串中替换指定的文本，使用函数SUBSTITUTE；如果需要在某一文本字符串中替换特定位置处的任意文本，使用函数REPLACE。Trim函数清除掉字符串两边的空格。","mnemonic":"Excel文本替换函数：SUBSTITUTE替换指定文本+REPLACE替换指定位置(BC)"},{"id":468,"type":"multi","text":"下列（）方法可用于解决算法的欠拟合问题。","options":[{"label":"A","text":"增加正则化项"},{"label":"B","text":"增加模型的深度"},{"label":"C","text":"减少模型的复杂度"},{"label":"D","text":"增加特征的数量"}],"answer":"B,D","explanation":"算法欠拟合是指模型过于简单，无法充分拟合训练数据，导致预测结果与实际值之间存在较大的误差。解决欠拟合问题的方法包括增加特征的数量、增加模型复杂度（例如，增加模型深度）等。","mnemonic":"解决欠拟合：增加模型深度+增加特征数量，增正则化和减复杂度会加重欠拟合(BD)"},{"id":469,"type":"multi","text":"下列哪项属于常见的对比分析方法（）。","options":[{"label":"A","text":"行业对比"},{"label":"B","text":"竞品对比"},{"label":"C","text":"与自身同比"},{"label":"D","text":"环比"}],"answer":"A,B,C,D","explanation":"对比分析法是指确定对比对象和对比维度，对目标事物和对比事物进行比较，常见的有行业对比、竞品对比、与自身同比、环比等。","mnemonic":"对比分析方法：行业对比+竞品对比+同比+环比，全选(ABCD)"},{"id":470,"type":"multi","text":"智慧城市的主要作用包括哪些（）。","options":[{"label":"A","text":"提升城市运行效率"},{"label":"B","text":"改善城市生活品质"},{"label":"C","text":"促进城市可持续发展"},{"label":"D","text":"增强城市竞争力"}],"answer":"A,B,C,D","explanation":"智慧城市的主要作用包括提升城市运行效率、改善城市生活品质、促进城市可持续发展和增强城市竞争力。","mnemonic":"智慧城市四大作用：提效率+改品质+促可持续+增竞争力，全选(ABCD)"},{"id":471,"type":"multi","text":"支持向量机算法的主要优势有（）。","options":[{"label":"A","text":"在高维空间中有效处理数据"},{"label":"B","text":"可处理非线性分类问题"},{"label":"C","text":"对小样本数据表现良好"},{"label":"D","text":"计算速度快"}],"answer":"A,B,C","explanation":"支持向量机的优点之一是能够通过核函数有效地处理高维数据，并能够应对非线性分类问题。对于小样本数据，SVM通常能够表现良好，因为它通过最大化类别之间的间隔来训练模型，通常具有较强的泛化能力，尤其在训练样本较少的情况下。然而，SVM的计算速度相对较慢，尤其在数据量大或维度高时，训练时间通常较长。使用非线性核时，计算复杂度会显著增加。","mnemonic":"SVM优势：高维有效+非线性分类+小样本好，但计算速度不快(ABC)"},{"id":472,"type":"multi","text":"智慧交通能够解决的问题有哪些（）。","options":[{"label":"A","text":"降低道路安全事故"},{"label":"B","text":"减少道路拥堵"},{"label":"C","text":"增加汽车销售渠道"},{"label":"D","text":"减少碳排放"}],"answer":"A,B,D","explanation":"智慧交通可以解决的问题包括降低道路安全事故、减少道路拥堵、减少碳排放，但无法增加汽车销售的渠道。","mnemonic":"智慧交通解决：降事故+减拥堵+减碳排放，与汽车销售渠道无关(ABD)"},{"id":473,"type":"multi","text":"AARRR 模型的主要内容包含（）。","options":[{"label":"A","text":"获取Acquisition"},{"label":"B","text":"激活Activation"},{"label":"C","text":"留存Retention"},{"label":"D","text":"收入Revenue"}],"answer":"A,B,C,D","explanation":"AARRR模型是一个用户分析的经典模型，其中AARRR分别代表获取Acquisition、激活Activation、留存Retention、收入Revenue、传播Refer。因此，选项A、B、C、D都属于AARRR模型的主要内容。","mnemonic":"AARRR五环节：获取+激活+留存+收入+传播，全选(ABCD)"},{"id":474,"type":"multi","text":"智慧农业解决方案的主要目标是什么？","options":[{"label":"A","text":"提高农业生产效率"},{"label":"B","text":"实现农业资源的高效利用和可持续发展"},{"label":"C","text":"提供优质、安全的农产品"},{"label":"D","text":"促进农村经济的发展和农民的福利提升"}],"answer":"A,B,C,D","explanation":"智慧农业解决方案的主要目的是提高农业生产效率、实现农业资源的高效利用和可持续发展、提供优质、安全的农产品、促进农村经济的发展和农民的福利提升。","mnemonic":"智慧农业四目标：提效率+高效利用+优质安全+促发展，全选(ABCD)"},{"id":475,"type":"multi","text":"下列哪项属于业务分析方法论（）。","options":[{"label":"A","text":"帕累托分析方法"},{"label":"B","text":"A/B测试分析方法"},{"label":"C","text":"同期群分析方法"},{"label":"D","text":"因果分析方法"}],"answer":"A,B,C,D","explanation":"四类有代表性的业务分析方法论--帕累托分析方法、A/B测试分析方法、同期群分析方法及因果分析方法。","mnemonic":"四大业务分析方法论：帕累托+A/B测试+同期群+因果分析，全选(ABCD)"},{"id":476,"type":"multi","text":"下列哪项属于贝叶斯算法的原理（）。","options":[{"label":"A","text":"获得先验概率"},{"label":"B","text":"更新后验概率"},{"label":"C","text":"计算条件概率"},{"label":"D","text":"最大化似然概率"}],"answer":"A,B,C","explanation":"贝叶斯算法基于贝叶斯定理，通过获得先验概率、更新后验概率和计算条件概率来进行分类或预测。最大化似然概率不属于贝叶斯算法的原理，而是一种常见的参数估计方法。因此，选项A、B和C是贝叶斯算法原理的正确选择。","mnemonic":"贝叶斯原理三步：先验概率+后验概率+条件概率，最大似然是参数估计法(ABC)"},{"id":477,"type":"multi","text":"在人机交互研究中，用户体验具有哪些特点？","options":[{"label":"A","text":"动态性"},{"label":"B","text":"情境依赖性"},{"label":"C","text":"静态性"},{"label":"D","text":"主观性"}],"answer":"A,B,D","explanation":"用户体验是指用户对产品的总体主观感受,包含用户在使用产品的过程中所感受到的全部内容总和，具有动态性、情境依赖性和主观性的特点","mnemonic":"用户体验三特点：动态性+情境依赖性+主观性，静态性相反(ABD)"},{"id":478,"type":"multi","text":"根据《中华人民共和国劳动法》，劳动合同的期限被划分为哪些类型（）。","options":[{"label":"A","text":"3年"},{"label":"B","text":"有固定期限"},{"label":"C","text":"无固定期限"},{"label":"D","text":"以完成一定的工作为期限"}],"answer":"B,C,D","explanation":"根据《中华人民共和国劳动法》第二十条规定，劳动合同的期限分为有固定期限、无固定期限和以完成一定的工作为期限。劳动者在同一用人单位连续工作满十年以上，当事人双方同意续延劳动合同的，如果劳动者提出订立无固定期限的劳动合同，应当订立无固定期限的劳动合同。","mnemonic":"劳动合同期限三类：有固定+无固定+完成一定工作，\"3年\"不是类型(BCD)"},{"id":479,"type":"multi","text":"下列属于制定数据标注流程的关键步骤的是（）。","options":[{"label":"A","text":"数据标注培训"},{"label":"B","text":"标注任务定义：明确标注的目标和任务，确定需要标注的数据类型和标注要求。"},{"label":"C","text":"标注工具选择：选择适合任务需求的标注工具，例如标注平台、标注软件等。"},{"label":"D","text":"标注策略确定：制定标注的具体策略，包括标注过程中的标准、规则、流程等。 选项A中的数据标注培训不属于数据标注流程制定的关键步骤，它是为了更好地执行标注任务而进行的准备工作。"}],"answer":"B,C,D","explanation":"数据标注流程制定的关键步骤包括以下内容。","mnemonic":"标注流程关键步骤：任务定义+工具选择+策略确定，培训是准备工作(BCD)"},{"id":480,"type":"multi","text":"下列关于图像分割方法的描述，正确的是（）。","options":[{"label":"A","text":"图像分割是将一幅图像分成不同区域或物体的过程"},{"label":"B","text":"基于阈值的方法是一种常用的图像分割方法"},{"label":"C","text":"区域生长算法属于基于边缘的图像分割方法"},{"label":"D","text":"基于区域的方法通常考虑像素之间的相似性"}],"answer":"A,B,D","explanation":"选项A描述正确，图像分割的定义是将一幅图像划分为若干个区域或物体，每个区域具有不同的特征。选项B描述正确，基于阈值的方法是通过将图像中的像素值与设定的阈值进行比较，进而分割图像。选项C描述错误，区域生长算法是一种基于区域的分割方法，而不是基于边缘的。区域生长法通过逐步合并相似的像素来形成区域，而不是依赖于图像的边缘信息。选项D描述正确，基于区域的图像分割方法（如区域生长法）通常考虑像素之间的相似性，如灰度、颜色等特征，以确定像素是否应当归为同一类。","mnemonic":"图像分割描述：分区域物体+阈值法常用+区域法看相似性，区域生长非边缘法(ABD)"},{"id":481,"type":"multi","text":"OpenCV 提供了用于双边滤波的函数 cv.bilateralBlur0，（）属于其主要参数。","options":[{"label":"A","text":"src"},{"label":"B","text":"sigmaColor"},{"label":"C","text":"borderType"},{"label":"D","text":"sigmaSpace"}],"answer":"A,B,C,D","explanation":"OpenCV提供了用于双边滤波的函数cv.bilateralBlur0):dst = cv.bilateralBlur(src, d,sigmaColor, sigmaSpacel,borderType])其中的主要参数介绍如下。src:输入图像，可以是8位整型或浮点数的单通道或3通道图像。d:滤波时图像点的邻域直径，如果d为非正值，则由sigmaSpace计算得出。d的大小将明显影响函数的速度。sigmaColor:颜色空间滤波器的sigma值。该参数值越大，像素邻域内颜色差距更大的像素会相互影响，将产生更大的半相等颜色区域。sigmaSpace:坐标空间中滤波器的sigma值。该参数值越大，颜色接近但距离更远的像素会相互影响。当d>0时，d指定了邻域大小且与sigmaSpace无关，否则d与sigmaSpace成正比。borderType:边界类型。不支持cv.BORDER WRAP.dst:输出图像，其大小和数据类型与输入图像相同","mnemonic":"双边滤波函数参数：src+sigmaColor+borderType+sigmaSpace，全选(ABCD)"},{"id":482,"type":"multi","text":"智慧商场中常见的关键技术有哪些（）。","options":[{"label":"A","text":"物联网技术"},{"label":"B","text":"大数据与云计算"},{"label":"C","text":"人工智能技术"},{"label":"D","text":"5G技术"}],"answer":"A,B,C,D","explanation":"物联网技术、大数据与云计算、人工智能技术和5G技术是智慧商场中常见的关键技术。","mnemonic":"智慧商场关键技术：物联网+大数据云计算+AI+5G，全选(ABCD)"},{"id":483,"type":"multi","text":"计算机硬件系统中的外部设备包含哪些（）。","options":[{"label":"A","text":"外存储器"},{"label":"B","text":"中央处理器"},{"label":"C","text":"输入设备"},{"label":"D","text":"输出设备"}],"answer":"A,C,D","explanation":"计算机硬件系统的外部设备简称“外设”，是计算机系统中输入、输出设备、外存储器的统称。内存储器和中央处理器属于硬件系统的主机。","mnemonic":"外部设备三类：外存储器+输入设备+输出设备，CPU属于主机(ACD)"},{"id":484,"type":"multi","text":"判断模型是否欠拟合时，通常需要综合考量的因素包括（）。","options":[{"label":"A","text":"训练误差"},{"label":"B","text":"验证误差"},{"label":"C","text":"测试误差"},{"label":"D","text":"模型复杂度"}],"answer":"A,B,C,D","explanation":"训练误差：反映模型在训练集上的表现，训练误差较高是欠拟合的标志。验证误差：反映模型在验证集（中间评估集）上的表现，较高的验证误差和较高的训练误差可能表明欠拟合。测试误差：反映模型在测试集（最终未见过的数据）上的表现，较高的测试误差通常与欠拟合或过拟合相关，具体需要综合训练误差来判断。模型复杂度：如果模型复杂度过低，可能无法捕捉数据的复杂关系，导致欠拟合。","mnemonic":"判断欠拟合综合考量：训练误差+验证误差+测试误差+模型复杂度，全选(ABCD)"},{"id":485,"type":"multi","text":"下列哪项属于智慧农场的应用案例？","options":[{"label":"A","text":"农业互联网"},{"label":"B","text":"精准农业技术"},{"label":"C","text":"智能温室管理系统"},{"label":"D","text":"农业无人机应用"}],"answer":"A,B,C,D","explanation":"农业互联网、精准农业技术、智能温室管理系统、农业无人机应用属于智慧农场的应用案例。","mnemonic":"智慧农场应用：农业互联网+精准农业+智能温室+无人机，全选(ABCD)"},{"id":486,"type":"multi","text":"在进行留出法划分时，需要注意（）问题。","options":[{"label":"A","text":"训练集和测试集的比例应该合理"},{"label":"B","text":"划分时应考虑数据集的特性"},{"label":"C","text":"在大多数情况下，划分时应随机选择样本"},{"label":"D","text":"划分时应确保训练集和测试集之间没有重叠"}],"answer":"A,B,C,D","explanation":"进行留出法划分时，需要考虑训练集和测试集的比例是否合理、数据集的特性、是否随机选择样本以及是否确保训练集和测试集之间没有重叠。在大多数情况下，留出法划分会随机选择样本，但对于时间序列数据等特殊情况，可能需要按顺序划分。","mnemonic":"留出法划分注意：比例合理+考虑特性+随机选样+无重叠，全选(ABCD)"},{"id":487,"type":"multi","text":"下列关于图像增强的说法，错误的是（）。","options":[{"label":"A","text":"在滤除噪声的同时还能保留边缘信息，那么均值滤波便可以以满足要求"},{"label":"B","text":"中值滤波也是对中心像素的邻域进行处理，但并非通过加权平均的方式，因此其处理方式能用线性表达式表示。"},{"label":"C","text":"直方图均衡化是图像增强中最常用的技术"},{"label":"D","text":"用于降低噪声影响的图像增强技术包括中值滤波、高斯滤波等"}],"answer":"A,B","explanation":"选项A说法错误，如果希望在滤除噪声的同时还能保留边缘信息，那么均值滤波便难以满足要求而中值滤波则能够较好地解决该问题。选项B说法错误，尽管中值滤波也是对中心像素的邻域进行处理，但并非通过加权平均的方式因此其处理方式不能用线性表达式表示。","mnemonic":"图像增强错误说法：A均值滤波难保边缘B中值滤波不能线性表达，AB说反了(AB)"},{"id":488,"type":"multi","text":"在人机交互中，一个完整的人体动作分析过程主要包含哪些步骤？","options":[{"label":"A","text":"动作捕捉"},{"label":"B","text":"动作预测"},{"label":"C","text":"动作特征描述"},{"label":"D","text":"动作分类识别"}],"answer":"A,C,D","explanation":"一个完整的人体动作分析过程主要包括动作捕捉、动作特征描述和动作分类识别三大部分。","mnemonic":"人体动作分析三步：动作捕捉+特征描述+分类识别，预测不在其中(ACD)"},{"id":489,"type":"multi","text":"下列哪一选项属于初次接触系统的新手用户所具备的特征？（）","options":[{"label":"A","text":"对系统不熟悉"},{"label":"B","text":"需要系统提供详细的操作指南"},{"label":"C","text":"容易犯错"},{"label":"D","text":"能够独立使用系统"}],"answer":"A,B,C","explanation":"新手用户是指初次接触该系统的用户。他们对系统不熟悉，需要系统提供详细的操作指南，以便能够快速了解系统的功能和使用方法。由于对系统不熟悉，他们容易犯错，需要系统提供尽可能多、尽可能详尽的信息和指导，以便能够一步一步地操作。由于刚刚接触该系统，他们往往需要帮助和指导，所以不能独立使用系统。","mnemonic":"新手用户特征：不熟悉+需指南+易犯错，不能独立使用(ABC)"},{"id":490,"type":"multi","text":"在人机交互行为模型里，下列关于状态同步交互的说法正确的是？","options":[{"label":"A","text":"允许用户与系统共享实时状态信息"},{"label":"B","text":"系统通过传感器和通信技术动态更新用户状态"},{"label":"C","text":"状态变化会触发界面反馈"},{"label":"D","text":"必须依赖加锁机制保证状态一致性"}],"answer":"A,B,C","explanation":"共享状态交互中，两个或多个并发执行的行为可以共享状态变量，而状态变量可以被所有并发的行为访问。由于并发行为的执行顺序是不确定的，因此需要使用同步机制来保证访问共享状态变量的一致性，而加锁机制只是同步机制的一种。","mnemonic":"状态同步交互：共享实时状态+传感器动态更新+状态变化触发反馈，加锁只是同步机制之一(ABC)"},{"id":491,"type":"multi","text":"下列哪种方法主要被用于评估随机森林模型中的特征重要程度？（）","options":[{"label":"A","text":"基于熵的重要性"},{"label":"B","text":"基于信息增益的重要性"},{"label":"C","text":"基于平均减少不纯度的重要性"},{"label":"D","text":"基于特征的平均减少准确度"}],"answer":"C,D","explanation":"在随机森林模型中，特征重要性评估是通过每棵决策树的分裂情况来确定的。基于平均减少不纯度的重要性： 随机森林使用这种方法来评估特征的重要性，通过计算每个特征的分裂所带来的不纯度减少，最终得出每个特征的重要性评分。基于特征的平均减少准确度： 这是评估特征在模型中贡献的重要性的一种方法，通过计算特征在训练过程中对准确度的影响，通常用于交叉验证中。“基于熵的重要性” 和 “基于信息增益的重要性” 主要用于单个决策树的节点分裂依据，并非随机森林的特征重要性评估方法。","mnemonic":"随机森林特征重要性：平均减少不纯度+平均减少准确度，熵和信息增益用于单棵树(CD)"},{"id":492,"type":"multi","text":"在人机交互中，哪类设备用于三维信息的输入？","options":[{"label":"A","text":"三维扫描仪"},{"label":"B","text":"数码摄像头"},{"label":"C","text":"动作捕捉设备"},{"label":"D","text":"触摸屏"}],"answer":"A,C","explanation":"三维扫描仪和动作捕捉设备是专门用于捕捉和输入三维信息的设备。数码摄像头和触摸屏虽然可以用于输入信息，但它们主要用于二维信息的输入。","mnemonic":"三维信息输入设备：三维扫描仪+动作捕捉，摄像头触摸屏主要是二维(AC)"},{"id":493,"type":"multi","text":"属于聚类效果内部评估指标的有（）。","options":[{"label":"A","text":"FMI指数"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"DB指数"},{"label":"D","text":"CH指数"}],"answer":"B,C,D","explanation":"轮廓系数通过类内紧密度与类间分离度的综合值评估聚类质量，值越大效果越好。CH指数计算类间方差与类内方差的比值，比值越大表示类间差异显著、类内紧密。DB指数通过类内距离与类间距离的比值衡量，值越小表示聚类效果越优。FMI指数属于外部指标，基于真实标签计算聚类结果与真实类别的相似性。","mnemonic":"聚类内部评估指标：轮廓系数+DB指数+CH指数，FMI是外部指标需真实标签(BCD)"},{"id":494,"type":"multi","text":"属于职业道德主要功能的是（）。","options":[{"label":"A","text":"约束职业人员行为，规范职业行为标准"},{"label":"B","text":"提高职业人员的综合素质和道德水平"},{"label":"C","text":"维护公共利益和利益相关者权益"},{"label":"D","text":"维护行业信誉"}],"answer":"A,B,C,D","explanation":"职业道德是规范职业人员行为的一种法规约束，其主要功能包括：约束职业人员的行为，规范职业行为标准；提高职业人员的道德水平和综合素质，增强职业身份认同；维护公共利益和利益相关者权益，保持职业稳定和公信力。","mnemonic":"职业道德主要功能：约束行为+提高素质+维护公益+维护信誉，全选(ABCD)"},{"id":495,"type":"multi","text":"下列关于算法复杂度类型的说法，正确的是（）。","options":[{"label":"A","text":"时间复杂度描述的是算法的执行时间"},{"label":"B","text":"空间复杂度描述的是算法所需的辅助存储空间"},{"label":"C","text":"渐进复杂度描述算法运行时间随着问题规模增加的变化情况"},{"label":"D","text":"常数复杂度描述的是算法的基础运算次数"}],"answer":"B,C","explanation":"A错误，时间复杂度描述的是算法运行时间与问题规模的增长趋势；D错误，常数复杂度指的是算法的某个基本操作执行次数是一个固定的常数，所以不会随着问题规模增加而变化；B正确，空间复杂度描述算法在执行时所需要的辅助存储空间；C正确，渐进复杂度通常使用大O符号作为描述，可描述算法运行时间随着问题规模增加而增加的趋势。","mnemonic":"算法复杂度正确说法：空间复杂度=辅助存储空间+渐进复杂度=随规模变化趋势(BC)"},{"id":496,"type":"multi","text":"下列选项中，哪一项是计算机所具备的特点（）。","options":[{"label":"A","text":"运算速度快"},{"label":"B","text":"运算精度高"},{"label":"C","text":"自动化程度高"},{"label":"D","text":"只有存储功能，没有记忆功能"}],"answer":"A,B,C","explanation":"计算机的特点包括运算速度快；运算精度高；记忆功能强，存储容量大；具有数据分析和逻辑判断能力；自动化程度高。","mnemonic":"计算机特点：速度快+精度高+自动化高，有记忆功能D说法错(ABC)"},{"id":497,"type":"judge","text":"企业对技术人员的培训涉及多个维度，而企业所需的技术人员应具备综合的能力与素养。","options":[],"answer":"正确","explanation":"根据技术人员的特点，对技术人员培训的主要项目有：计算机编程，程序和网络维护、操作，新设备的维护、维修与操作，安全常识，产品知识，全面质量管理，目标管理，管理信息系统，市场营销，财务管理，新产品研制，材料替代，生产管理，工业工程，品质工程等。对技术人员的培训是多方面的，也就是说，企业所需要的技术人员应该具有较全面的能力和素质。","mnemonic":"正确√ 技术人员需综合能力，不只技术，培训涉及多维度"},{"id":498,"type":"judge","text":"在关联分析中，支持度是用于评估变量间关联程度的指标。","options":[],"answer":"错误","explanation":"支持度用于衡量关联规则在数据集中出现的频率。支持度越高，表示该关联规则在数据集中越普遍。","mnemonic":"错误✗ 支持度衡量\"频率\"非\"关联程度\"，频率≠关联"},{"id":499,"type":"judge","text":"遵章守法的基本要求涵盖：遵守法律法规、遵循道德规范、不参与非法活动、滥用职权、保护客户权益、合规经营。","options":[],"answer":"错误","explanation":"职业守则中的\"遵章守法\"基本要求指的是从业人员应该遵守法律法规和相关规定。包括遵守法律法规、遵循道德规范、不参与非法活动、保护客户权益、合规经营等方面。滥用职权对个人和公司均会造成负面影响，不属于遵章守法的基本要求。","mnemonic":"错误✗ \"滥用职权\"混入守法要求，明显违法项不属于"},{"id":500,"type":"judge","text":"支持向量机的工作方式是在高维空间中找出超平面，让该超平面能最大程度区分不同类别的样本。","options":[],"answer":"正确","explanation":"支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。SVM通过最大化不同类别之间的间隔来实现最佳分类","mnemonic":"正确√ SVM找超平面、最大间隔分类，这是标准定义"},{"id":501,"type":"judge","text":"收集那些规模庞大、生成迅速的大数据，并且能让这些来自多个源头、结构各异的大数据相互配合发挥作用，进而为大数据分析等应用提供有效支持，这是大数据采集阶段的任务，也是大数据的核心技术之一。","options":[],"answer":"正确","explanation":"大数据的来源多种多样，如何获取这些规模大、产生速度快的大数据，并且能够使这些多源异构的大数据得以协同工作，从而有效地支撑大数据分析等应用，是大数据采集阶段的工作，也是大数据的核心技术之一。","mnemonic":"正确√ 大数据采集=多源异构协同，是核心技术之一"},{"id":502,"type":"judge","text":"进行 K 折交叉验证时，需将数据集分成 k 个子集，每次用其中一个子集作为测试集，剩下的子集则作为训练集。","options":[],"answer":"正确","explanation":"交叉验证法是一种比较常用的方法，交叉验证的步骤如下：（1）首先将数据集划分为k个不相交的子集；（2）每次取出一个子集作为测试集，剩余的k-1个子集作为训练集，重复进行k次；（3）最后对所有测试集的性能取平均值。","mnemonic":"正确√ K折交叉验证：k份轮流当测试集，标准流程"},{"id":503,"type":"judge","text":"数据库管理系统只负责数据的存储，而数据的增删改查操作则完全依靠外部应用程序来实现。","options":[],"answer":"错误","explanation":"DBMS的核心功能之一是直接提供数据操作能力，包括数据的插入、删除、修改和查询，无需依赖外部应用程序直接处理底层数据。","mnemonic":"错误✗ DBMS自带增删改查功能，不依赖外部程序"},{"id":504,"type":"judge","text":"劳动者若拒绝用人单位管理人员的违章指挥、强令冒险作业，会被视作违反劳动合同。","options":[],"answer":"错误","explanation":"《中华人民共和国劳动合同法》第三十二条规定，劳动者拒绝用人单位管理人员违章指挥、强令冒险作业的，不视为违反劳动合同。","mnemonic":"错误✗ 拒绝违章指挥是合法权利，劳动法明确保护"},{"id":505,"type":"judge","text":"支持向量机算法通过探寻一个超平面，以最大程度分隔两类样本，从而解决二分类问题。","options":[],"answer":"正确","explanation":"支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。解决二分类问题时，支持向量机算法通过寻找一个超平面，将两类样本最大化地分隔开。","mnemonic":"正确√ SVM超平面最大间隔解决二分类，与904同理"},{"id":506,"type":"judge","text":"在请求模式里，当应用程序等待输入数据时，并不会暂停自身的执行流程，它会持续运行，直到接收到输入数据才会停下。","options":[],"answer":"错误","explanation":"请求模式要求应用程序暂停，直到输入设备提供所需的数据后才继续执行。","mnemonic":"错误✗ 请求模式会暂停等待输入，不是继续运行"},{"id":507,"type":"judge","text":"依据文件的保护时长，可将文件分为临时文件和永久文件两类。","options":[],"answer":"错误","explanation":"根据文件的保护期限，可以把文件分成临时文件、档案文件和永久文件。","mnemonic":"错误✗ 少了\"档案文件\"，应分三类：临时、档案、永久"},{"id":508,"type":"judge","text":"目前，数据标注工作大多仍由人工完成，面对百万级别的标注数据量或是复杂的标注任务，很容易出现标注质量不达标的情况。","options":[],"answer":"正确","explanation":"现阶段的数据标注工作主要还是依靠人来完成的，但是当标注人员面对百万级别的标注数据量，或是复杂的标注任务时，容易产生极大的心理压力，而造成标注质量不合格。","mnemonic":"正确√ 百万级标注靠人工易疲劳，质量难保证"},{"id":509,"type":"judge","text":"相较于初级阶段，管理阶段对培训管理工作的考核标准有了提升，除了留意每场培训活动的各项指标外，通常还会把培训计划的完成比例纳入考核范围。","options":[],"answer":"正确","explanation":"管理阶段对培训管理工作的考核指标相比初级阶段得到了升级，除了关注每场培训活动的指标之外，一般还包括培训计划达成率、计划课程的参训率、讲师的授课次数、培训课程完整度的百分比以及所有培训管理工作的平均满意度等。","mnemonic":"正确√ 管理阶段考核升级，增加培训计划达成率等指标"},{"id":510,"type":"judge","text":"数据增强的原理是通过对原始图像进行变换或合成，生成新的训练数据，以此来扩充数据集。","options":[],"answer":"正确","explanation":"数据增强技术通过对原始图像进行变换或合成，生成新的训练数据。其主要目的是扩充数据集，使模型能够学习到更多的不变性，增强模型的泛化能力，同时减少过拟合的风险。","mnemonic":"正确√ 数据增强=变换/合成原始图像，扩充数据集"},{"id":511,"type":"judge","text":"在 Word 中调整段落间距的步骤是：选中需要设置格式的段落，然后在 “段落” 工具栏或者 “开始” 选项卡的 “段落” 组中，点击段前段后间距的下拉箭头，从中挑选合适的选项或者自定义数值。","options":[],"answer":"正确","explanation":"在word中调整段落间距，选中要设置格式的段落，在\"段落\"工具栏或\"开始\"选项卡的\"段落\"组中，点击段前段后间距的下拉箭头，选择合适的选项或自定义数值。","mnemonic":"正确√ Word段落间距在\"段落\"组调整，标准操作步骤"},{"id":512,"type":"judge","text":"采用计算机视觉、人脸识别、物联网等新技术打造的新型无人零售店，具备 “拿了就走” 等自助支付功能。","options":[],"answer":"正确","explanation":"在计算机视觉、人脸识别、物联网等新技术的推动下，诞生了以AmazonGo为代表的新型无人零售店，通过“拿了就走”等自助支付手段，为消费者提供新的用户体验，也为商家节约人力成本。","mnemonic":"正确√ 计算机视觉+人脸识别+物联网=无人零售\"拿了就走\""},{"id":513,"type":"judge","text":"利用数据增强技术，从已有的训练集中衍生出更多数据样本，以此增加训练集样本数量，可以防止深度学习模型出现过拟合。","options":[],"answer":"正确","explanation":"通过数据增强技术，可以从现有的训练集衍生出更多的数据样本，增强训练数据集的多样性，从而帮助模型更好地泛化，减少过拟合的风险。数据增强包括图像的旋转、裁剪、平移、缩放、翻转等方法，能够在不增加过多计算成本的情况下生成更多样化的数据样本。单纯通过复制已有样本并不能有效防止过拟合，因为这并没有增加数据的多样性。因此，通过数据增强扩展训练集是防止过拟合的常用方法之一。","mnemonic":"正确√ 数据增强增加多样性防过拟合，非简单复制"},{"id":514,"type":"judge","text":"GOMS 作为一种人机交互界面表示的理论模型，将所有任务都视为面向操作目标的，但它能够解决的问题本质以及用户间的个体差异存在局限。","options":[],"answer":"错误","explanation":"GOMS是一种人机交互界面表示的理论模型，它把所有的任务都看作是面向操作目标的，但忽略了一些任务所要解决的问题本质以及用户间的个体差异。","mnemonic":"错误✗ GOMS\"忽略\"问题本质和个体差异，非\"存在局限\"能解决"},{"id":515,"type":"judge","text":"凭借 5G 网络高速率、大连接的优势，能够实现多车路之间的互联互通，从而构建起可随时通信、实时监控、即时决策的智慧交通网络。","options":[],"answer":"错误","explanation":"5G作为新一代通信技术，对智慧交通的发展起到强大的推动作用。5G网络依托高速率、大连接的特性，连接车、路、人、云等对象，形成一张可随时通信、实时监控、即时决策的智慧交通网络。","mnemonic":"错误✗ 5G连接的是\"车路人云\"四要素，非仅\"多车路\""},{"id":516,"type":"judge","text":"业务流程重组（BPR）属于渐进式改进方法，其主要做法是对现有流程进行小范围调整，以此提升企业性能。","options":[],"answer":"错误","explanation":"业务流程重组（BPR）是对企业进行根本的再思考和彻底的再设计，强调革命性的变革，而不是渐进式的改进。","mnemonic":"错误✗ BPR是根本再思考、彻底再设计，革命性非渐进式"},{"id":517,"type":"judge","text":"对比模型在训练集和测试集上的预测准确率，能够判断是否出现过拟合现象。","options":[],"answer":"正确","explanation":"训练集用于训练模型，测试集用于评估模型的泛化能力。如果模型在训练集上的准确率明显高于测试集的准确率，通常表明模型发生了过拟合。通过对比训练集和测试集的准确率，可以有效判断模型是否过拟合。","mnemonic":"正确√ 训练集准确率远高于测试集=过拟合，对比可判断"},{"id":518,"type":"judge","text":"按照职业道德的规范，从业者需持续提高自身的业务能力与专业修养，为所在机构提供优质服务，这不仅有利于塑造个人及机构的良好形象，还能为个人的职业成长与事业成功打下坚实根基。","options":[],"answer":"正确","explanation":"根据职业道德要求，从业人员可以不断提升自己的工作水平和专业素养，为组织提供高质量的服务。这有助于树立良好的个人和组织形象，同时也为个人的职业发展和成功奠定基础。","mnemonic":"正确√ 职业道德要求提升素养，树立形象奠定发展基础"},{"id":519,"type":"judge","text":"构建神经网络模型时，其算法可以灵活地将各种基础数学运算与非线性激活函数组合起来。","options":[],"answer":"正确","explanation":"神经网络算法通过多层结构将输入数据矩阵传递并逐层处理。每一层通常包括一些基本的数学操作（如加法、乘法等）和非线性激活函数（如ReLU、Sigmoid、Tanh等）。这些操作的灵活组合使得神经网络能够学习到复杂的非线性关系。","mnemonic":"正确√ 神经网络灵活组合数学运算+非线性激活函数"},{"id":520,"type":"judge","text":"在人机交互的多通道交互研究里，用户能够运用语音、手势、眼神、表情等自然的交互方式与计算机系统进行信息沟通。","options":[],"answer":"正确","explanation":"在多通道交互中，用户可以使用语音、手势、眼神、表情等自然的交互方式与计算机系统进行交互。目前，最常使用的多通道交互技术包括手写识别、笔式交互、语音识别、语音合成、数字墨水、视线跟踪技术、触觉通道的力反馈装置、生物特征识别技术和人脸表情识别技术等方面。","mnemonic":"正确√ 多通道交互：语音、手势、眼神、表情等自然方式"},{"id":521,"type":"judge","text":"操作系统中的 “文件系统”，指的是操作系统里与文件管理相关的那部分软件、被管理的文件，以及管理文件时所需的数据结构（如目录、索引表等）的总和。","options":[],"answer":"正确","explanation":"操作系统的“文件系统”，是指操作系统中与文件管理有关的那部分软件、被管理的文件，以及管理文件所需要的数据结构(如目录、索引表等)的总体。","mnemonic":"正确√ 文件系统=管理软件+文件+数据结构的总体"},{"id":522,"type":"judge","text":"中文分词模型的主要功能是将连贯的汉字序列拆分成单个的汉字。","options":[],"answer":"错误","explanation":"中文分话模型包括基于规则匹配的分词模型和基于统计学的分词模型，将原来的中文文字序列中切分出词语。","mnemonic":"错误✗ 中文分词是切出\"词语\"，不是拆成\"单个汉字\""},{"id":523,"type":"judge","text":"在运用交叉验证时，通常而言，测试集中的数据与训练集中的数据是完全相互独立的。","options":[],"answer":"正确","explanation":"交叉验证的一个重要特点是将数据集划分为多个子集，其中每个子集在不同的轮次中充当测试集，而其他子集作为训练集。虽然每次划分时，测试集和训练集中的数据会有所重叠，但每个数据点在不同的轮次中都会作为测试集和训练集出现。这种方式确保了模型能够充分利用所有数据，并进行多次验证。然而，在每次验证过程中，测试集和训练集的数据来源不同，即测试集的数据在该轮次的训练中没有参与过，因此它们可以被认为是独立的。","mnemonic":"正确√ 交叉验证中每轮测试集数据未参与该轮训练，独立"},{"id":524,"type":"judge","text":"均值滤波能用于去除脉冲噪声。","options":[],"answer":"错误","explanation":"脉冲噪声是一种常见的噪声类型，其特点是像素值突然跳变到极值。对于脉冲噪声，中值滤波具有明显的优势。","mnemonic":"错误✗ 脉冲噪声用中值滤波，均值滤波对此效果差"},{"id":525,"type":"judge","text":"在智慧农业的发展进程中，随着应用场景不断增加，会产生大量数据需要存储和处理，这就需要引入云计算技术架构来搭建智慧农业系统。","options":[],"answer":"正确","explanation":"随着农业信息化的深入，智慧农业应用逐渐增多，会产生海量的数据需要保存和处理，而且初期的传统系统架构可能不能满足日益增加的用户和功能的需求。因此，在智慧农业的发展阶段，需要引入云计算技术架构来构建智慧农业系统。","mnemonic":"正确√ 智慧农业海量数据需云计算架构支撑"},{"id":526,"type":"judge","text":"趋势分析法的核心目标是通过识别历史数据的规律，预测企业未来的财务状况或市场走向。","options":[],"answer":"正确","explanation":"趋势分析法的作用是利用历史数据发现指标波动的规律，从而找出对应原因；同时也可以通过历史数据的趋势去预测未来。","mnemonic":"正确√ 趋势分析法：识别历史规律，预测未来走向"},{"id":527,"type":"judge","text":"算法分析指标能够帮助我们理解算法，并为其优化提供指导。","options":[],"answer":"正确","explanation":"复杂度分析揭示了算法的理论效率趋势，实际优化需综合考虑常数因子、硬件缓存等因素，但其仍是优化方向的核心依据。","mnemonic":"正确√ 算法分析指标助理解算法，指导优化方向"},{"id":528,"type":"judge","text":"对比分析作为一种数据分析方法，其用意是找出不同数据集或数据点之间的相同之处。","options":[],"answer":"错误","explanation":"对比分析是数据分析中常用的分析方法之一，是将两个或两个以上具有可比性的数据进行比较，分析其中差异，以揭示事物发展规律。","mnemonic":"错误✗ 对比分析找\"差异\"非\"相同之处\"，揭示规律"},{"id":529,"type":"judge","text":"在 Word 中插入目录时，先把光标移到想要插入目录的位置，再在菜单栏的 “工具栏” 选项卡中选择合适的样式，Word 就会生成包含章节标题和页码的目录。","options":[],"answer":"错误","explanation":"在word中插入目录，先将光标放在希望插入目录的位置，在菜单栏中选择“引用”选项卡，点击“目录”按钮，在下拉菜单中选择适当的样式，Word将生成一个包含章节标题和页码的目录。","mnemonic":"错误✗ Word插目录在\"引用\"选项卡，非\"工具栏\""},{"id":530,"type":"judge","text":"图像处理是运用计算机算法对图像进行分析和操作的处理技术。","options":[],"answer":"正确","explanation":"图像处理可以简单地定义为利用计算机算法（通过代码）对图像进行分析、操作的处理技术。","mnemonic":"正确√ 图像处理=计算机算法对图像分析和操作"},{"id":531,"type":"judge","text":"从业人员若要遵守 “追求卓越” 的基本要求，就应当致力于不断提升自身的专业素养。","options":[],"answer":"正确","explanation":"遵守\"追求卓越\"的基本要求，从业人员应该追求专业素养的不断提升。积极参与相关领域的学习和培训，关注行业动态和最新发展，以保持自己的竞争优势和专业能力。","mnemonic":"正确√ 追求卓越=不断提升专业素养，保持竞争力"},{"id":532,"type":"judge","text":"仅依据测试误差，就能判断算法是否存在欠拟合。","options":[],"answer":"错误","explanation":"测试误差只能反映模型在新数据上的表现，并不能单独判断算法是否欠拟合。欠拟合通常表现为训练误差和测试误差都较高，这意味着模型无法有效学习训练数据中的规律。单独依赖测试误差无法判断欠拟合，因为它没有考虑模型在训练集上的表现。因此，判断是否欠拟合时需要同时监控训练误差和测试误差。","mnemonic":"错误✗ 仅测试误差不够，需同时看训练误差才能判断欠拟合"},{"id":533,"type":"judge","text":"本・施耐德曼的界面设计八大黄金法则，是人机交互设计领域极具价值的指导规范。","options":[],"answer":"正确","explanation":"施耐德曼的八项黄金法则是人机交互设计领域的重要指导原则，包括保持一致性、提供快捷方式、提供有效的信息反馈、会话和流程设计都有一个明确的结束点、提供恰当的错误处理机制、允许撤销、满足用户的控制需求、减少短期记忆负担。","mnemonic":"正确√ 施耐德曼八大黄金法则，人机交互设计经典指南"},{"id":534,"type":"judge","text":"自动语言识别领域中，最常用的两种语音处理方法是梅尔滤波器组和布尔频率系数。","options":[],"answer":"错误","explanation":"自动语言识别领域中最常用的两种语音处理方法：梅尔滤波器组和梅尔频率倒谱系数。","mnemonic":"错误✗ \"布尔频率系数\"是错的，应为\"梅尔频率倒谱系数\""},{"id":535,"type":"judge","text":"当多名数据标注员共同对同一份文本进行标注时，指导中级工作人员解决这类数据标注问题，可采用交叉标注的方式。","options":[],"answer":"正确","explanation":"标注数据不一致是文本标注最主要的问题，严重影响文本质量,当有多个数据标注员对同一个文本进行标注时，可以采取交叉标注的方式。","mnemonic":"正确√ 多人标注同一文本不一致时，用交叉标注解决"},{"id":536,"type":"judge","text":"可用性是指产品是否能够引起用户的关注，并且让用户产生使用它的念头。","options":[],"answer":"错误","explanation":"吸引用户的注意力和让用户愿意使用产品是“吸引力”这个方面的描述，而可用性更广泛地包括了用户在使用产品时的效力、效率、满意度等。吸引力只是其中的一部分，并不等于可用性本身。","mnemonic":"错误✗ 吸引注意力是\"吸引力\"，可用性包含效力效率满意度"},{"id":537,"type":"judge","text":"jieba 分词的文本分词与清洗环节，需要对原始文本实施分词和去除停用词的操作。","options":[],"answer":"正确","explanation":"jieba分词的文本分词与清洗步骤需对原始文本进行分词，并去除停用词。","mnemonic":"正确√ jieba分词清洗=分词+去停用词，标准步骤"},{"id":538,"type":"judge","text":"无监督图像去噪方法只利用噪声图像来开展训练。","options":[],"answer":"错误","explanation":"无监督去噪方法对训练数据的限制较少，仅使用噪声图像进行训练，代表性方法有Noise2Noise列。Noise2Noise(N2N)方法使用成对的噪声图像进行训练，要求噪声残差的期望为零，在L2损失的约束下生成趋于干净的图像信号。","mnemonic":"错误✗ 无监督去噪说法不全对，N2N用成对噪声图像训练"},{"id":539,"type":"judge","text":"人机交互的原型设计是依据需求文档，设计出产品各阶段所需的原型。","options":[],"answer":"正确","explanation":"原型设计是根据需求文档设计各阶段所需的产品原型，探索满足需求的各种解决方案(包括任务流和页面交互)，并组织评审和讨论会对原型进行评估(包括技术可行性咨询)，最后输出一个确认版的高保真原型及交互说明文档。","mnemonic":"正确√ 原型设计依据需求文档，设计各阶段产品原型"},{"id":540,"type":"judge","text":"对于接受他人委托开发的软件，其著作权的归属由委托人和受托人签订书面合同来约定；若没有书面合同或者合同中未作出明确约定，该软件的著作权由受托人享有。","options":[],"answer":"正确","explanation":"《计算机软件保护条例》第十一条规定，接受他人委托开发的软件，其著作权的归属由委托人与受托人签订书面合同约定；无书面合同或者合同未作明确约定的，其著作权由受托人享有。","mnemonic":"正确√ 委托开发软件著作权看合同，无合同归受托人"},{"id":541,"type":"judge","text":"ETL 数据整合工具是一种硬件，用于把数据从源系统中提取出来，经过转换后加载到目标系统。","options":[],"answer":"错误","explanation":"ETL数据整合工具是用于将数据从源系统提取、转换和加载到目标系统中的软件。","mnemonic":"错误✗ ETL是软件工具不是硬件，提取转换加载三步"},{"id":542,"type":"judge","text":"语音识别（Speech Recognition）指的是机器通过识别和理解，把人类的语音信号转换成对应的文本或指令的技术。","options":[],"answer":"正确","explanation":"语音识别(Speech Recognition)是机器通过识别和理解过程，将人类的语音信号转变为相应的文本或命令的技术。","mnemonic":"正确√ 语音识别=语音信号转文本或指令，标准定义"},{"id":543,"type":"judge","text":"生疏型用户在使用产品时，往往由于不熟悉操作而容易产生挫败感。","options":[],"answer":"正确","explanation":"生疏型用户由于他们对功能和界面的不熟悉，容易感到沮丧和迷茫，因此容易受到挫折。他们对产品并不熟悉，常常需要反复试探，操作上可能会遇到困难或挫折。","mnemonic":"正确√ 生疏型用户不熟操作易受挫，需要更多引导"},{"id":544,"type":"judge","text":"交叉验证法最后要计算模型在测试集上性能的平均值。","options":[],"answer":"正确","explanation":"交叉验证法是一种模型评估方法，通常将数据集划分为K个子集。在每次迭代中，选择一个子集作为测试集，其他子集作为训练集进行模型训练和评估。最终，交叉验证法通过对所有K次测试集结果的平均来评估模型的总体性能，从而减少模型评估的方差。","mnemonic":"正确√ 交叉验证最后取所有测试集性能的平均值"},{"id":545,"type":"judge","text":"漏斗分析的核心目的是跟踪用户在不同行为阶段的转化率情况。","options":[],"answer":"正确","explanation":"从业务流程起点开始到最后目标完成的每个环节都会有用户流失，因此需要一种分析方法来衡量业务流程每一步的转化效率，漏斗分析方法就是这样的分析方法。","mnemonic":"正确√ 漏斗分析核心=跟踪各阶段转化率，层层筛选"},{"id":546,"type":"judge","text":"象限分析法指的是借助两个或多个维度作为坐标，进而划分出不同的象限。","options":[],"answer":"正确","explanation":"象限分析法是指以两个或多个维度为坐标并划分出不同象限，不同象限表示不同的价值导向。象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等。","mnemonic":"正确√ 象限分析法：两个或多个维度为坐标划分象限"},{"id":547,"type":"judge","text":"职业道德是社会道德体系的重要组成部分，它既具备社会道德的一般作用，又有着自身的特殊作用。","options":[],"answer":"正确","explanation":"职业道德是社会道德体系的重要组成部分，它一方面具有社会道德的一般作用，另一方面它又具有自身的特殊作用。","mnemonic":"正确√ 职业道德兼具社会道德一般作用和自身特殊作用"},{"id":548,"type":"judge","text":"人机交互指的是人们借助输入输出设备与计算机沟通以达成某一任务的方式，其核心在于探索如何将计算机技术与人相联结，让计算机技术尽可能贴合人性。","options":[],"answer":"正确","explanation":"人机交互是指人们通过输入输出设备与计算机进行通信，以完成特定任务的过程。人机交互研究的核心是如何将计算机技术与人类用户的需求和能力相结合，以实现计算机技术的最优化人性化设计。","mnemonic":"正确√ 人机交互=输入输出设备沟通，核心是技术贴合人性"},{"id":549,"type":"judge","text":"LOTOS 包含两个部分，第一部分基于进程代数 CCS，对进程的行为及相互作用进行描述；第二部分基于抽象数据类型语言 ACT-ONE，对数据结构和值表达式进行描述。","options":[],"answer":"正确","explanation":"LOTOS包括两个部分，第一部分基于进程代数CCS，描述进程的行为和相互作用，第二部分基于抽象数据类型语言ACT-ONE，描述数据结构和值表达式。","mnemonic":"正确√ LOTOS两部分：CCS描述行为+ACT-ONE描述数据"},{"id":550,"type":"judge","text":"当前，新型人机交互设备主要以实现自然人机交互为宗旨，其中体感交互设备是重要的代表之一。","options":[],"answer":"正确","explanation":"目前，新型人机交互设备主要以自然人机交互为目标，包括体感交互设备、增强现实（AR）和虚拟现实（VR）设备、智能机器人等。","mnemonic":"正确√ 新型人机交互设备以自然交互为目标，体感是代表"},{"id":551,"type":"judge","text":"阈值分割的基本原理是依据比较结果把像素划分到不同类别中。","options":[],"answer":"正确","explanation":"阈值分割的基本原理是通过设定一个或多个阈值，将图像中的像素分为两个或多个类别，将像素的灰度值与阈值进行比较，根据比较结果将像素分配到不同的类别。","mnemonic":"正确√ 阈值分割：像素灰度值与阈值比较，分配类别"},{"id":552,"type":"judge","text":"业务流程重组（BPR）能够不依赖信息技术（IT）存在，但 IT 在 BPR 的实施中起到了重要的支持作用。","options":[],"answer":"正确","explanation":"业务流程重组（BPR）确实可以独立于信息技术（IT）存在，但IT在BPR的实施中起到了重要的支持作用。BPR是一种管理思想，而IT是一种技术，两者相辅相成。因此，这一说法是正确的。","mnemonic":"正确√ BPR可独立于IT存在，但IT起重要支持作用"},{"id":553,"type":"judge","text":"数据标注流程包括数据采集、数据清洗、数据标注、数据质检这几个步骤。","options":[],"answer":"正确","explanation":"数据标注流程包括数据采集、数据清洗、数据标注、数据质检。","mnemonic":"正确√ 数据标注流程：采集→清洗→标注→质检，四步"},{"id":554,"type":"judge","text":"图像数据处理是利用图像去噪、图形美化、图像数据减弱等手段，根据需求对图像数据进行处理的技术。","options":[],"answer":"错误","explanation":"图像数据处理是利用图像数据去噪、图形分割、图像数据增强等手段根据需求对图像数据进行处理的技术","mnemonic":"错误✗ \"数据减弱\"应为\"数据增强\"，\"图形美化\"应为\"图形分割\""},{"id":555,"type":"judge","text":"某旅游公司打算分析游客的消费状况，仅依据旅游消费金额这一维度进行分类，为消费金额高的游客提供豪华游服务，这种做法被认为是对象限分析法的合理运用。","options":[],"answer":"错误","explanation":"象限分析法需要两个或多个维度来划分象限，而此处仅使用一个维度，不符合象限分析法的运用方式。","mnemonic":"错误✗ 象限分析需至少两个维度，仅一个维度不符合"},{"id":556,"type":"judge","text":"依托 5G 技术的智慧医疗，是以医院现有的人力资源和医疗设备为根基，凭借高速率、低时延、广连接的 5G 网络，为患者提供实时化、远程化、高移动性及数字化的医疗服务，有效提升医疗效率与病情诊断的精准度，推动医疗资源向基层延伸，解决我国医疗资源分布不均衡、居民看病难、看病贵、医疗效率偏低、服务质量不高等问题。","options":[],"answer":"正确","explanation":"以5G为依托的智慧医疗，指的是以医院现有的人力资源和医疗设备为基础，借助高速率、低时延、广连接的5G网络为患者提供实时、远程、高移动性、数字化的医疗服务，切实提高医疗效率与病情诊断的准确率，推动医疗资源下沉，解决我国医疗资源分布不均，居民看病难、看病贵、医疗效率低、质量差等问题。","mnemonic":"正确√ 5G智慧医疗：高速低延广连接，解决资源不均"},{"id":557,"type":"judge","text":"NoSQL 数据库完全不支持 ACID（原子性、一致性、隔离性、持久性）事务。","options":[],"answer":"错误","explanation":"NoSQL数据库不一定支持ACID（原子性、一致性、隔离性、持久性）事务，而不是完全不支持。","mnemonic":"错误✗ NoSQL非\"完全不支持\"ACID，部分NoSQL可支持"},{"id":558,"type":"judge","text":"UAN 模型会运用预先定义的符号标识符来对用户的行为加以描述。","options":[],"answer":"正确","explanation":"UAN使用了预定义的符号（标识符）来表示用户的行为，比如常见的 move_mouse(x, y)、highlight(icon) 等动作符号","mnemonic":"正确√ UAN用预定义符号标识符描述用户行为"},{"id":559,"type":"judge","text":"运用支持向量机算法时，距离超平面越近的点，越容易被正确分类。","options":[],"answer":"错误","explanation":"使用支持向量机算法时，从几何直观上来说，越接近超平面的点越难分隔。支持向量机的目标是找到一个最佳的超平面，将不同类别的数据分开。距离超平面较近的点，通常是分类的边界点，即支持向量，正是这些点最难分类，因为它们处于类别的边缘，稍微变化就可能导致分类错误。相反，距离超平面较远的点，分类结果比较确定，容易分辨其类别。","mnemonic":"错误✗ 离超平面越近越难分类，近处是边界支持向量"},{"id":560,"type":"judge","text":"操作系统是对软件的抽象，用户借助操作系统来操控计算机。","options":[],"answer":"错误","explanation":"操作系统是硬件的抽象，用户通过操作系统来控制计算机硬件和计算机资源的分配。","mnemonic":"错误✗ 操作系统是\"硬件\"的抽象，非\"软件\"的抽象"},{"id":561,"type":"judge","text":"以用户为中心的设计，只需看重用户的感受和体验，不必在意效率问题。","options":[],"answer":"错误","explanation":"用户为中心的设计要求在设计过程中综合考虑多个方面，包括用户的感受、体验、效率以及产品的有效性等。设计并不是仅仅关注用户的主观感受，而是要确保用户能够在特定的使用场景中高效、顺畅地完成任务。因此，效率是用户体验的一个重要维度，不能被忽视","mnemonic":"错误✗ 以用户为中心不能忽视效率，效率也是体验维度"},{"id":562,"type":"judge","text":"数据标注任务的高重复性可能会让标注人员感到疲劳和厌烦，进而对标注质量与效率产生影响。","options":[],"answer":"正确","explanation":"现阶段的数据标注工作主要还是依靠人来完成的，但是当标注人员面对百万级别的标注数据量，或是复杂的标注任务时，容易产生极大的心理压力，而造成标注质量不合格。另外数据标注任务本身重复性高、标注时间紧张以及缺少严格的质量审核流程，会导致标注不完备、不及时造成合格率低的问题。","mnemonic":"正确√ 标注高重复性致疲劳厌烦，影响质量与效率"},{"id":563,"type":"judge","text":"基于词频统计的分词方式无需依赖切分词典。","options":[],"answer":"正确","explanation":"基于词频统计的分词方法只需要对语料中的字组频度进行统计，不需要切分词典，因而又叫作无词典分词法或统计分词方法。","mnemonic":"正确√ 词频统计分词无需词典，又叫无词典分词法"},{"id":564,"type":"judge","text":"像 SSIS、ODI、Kettle、Informatica 等，都是比较常见的数据整合工具。","options":[],"answer":"正确","explanation":"常见的数据整合工具有：SSIS、ODI、Kettle、Informatica等。","mnemonic":"正确√ SSIS、ODI、Kettle、Informatica均为常见数据整合工具"},{"id":565,"type":"judge","text":"随机森林算法是一种以决策树为基础的集成学习算法。","options":[],"answer":"正确","explanation":"随机森林算法是一种集成学习方法，它基于多棵决策树的集成来进行分类或回归。在每棵决策树的训练过程中，采用行方向的随机采样和列方向的特征子集随机选择。最后，随机森林通过集成多个决策树的输出结果，来提高模型的准确性和泛化能力，常见的集成方法有投票法（分类）和平均法（回归）。","mnemonic":"正确√ 随机森林=多棵决策树集成的集成学习算法"},{"id":566,"type":"judge","text":"企业进行业务流程优化时，无需参考国内外成功企业的管理经验，只需根据自身情况就能完成优化。","options":[],"answer":"错误","explanation":"根据业务流程优化的思路，企业需要借鉴国内外成功的企业管理经验，结合自身的业务特点及发展战略，才能更好地进行优化。","mnemonic":"错误✗ 流程优化需借鉴国内外成功经验，不能闭门造车"},{"id":567,"type":"judge","text":"过滤式特征选择算法是一类凭借数据自身的数值特征来完成特征选择的算法。","options":[],"answer":"正确","explanation":"过滤式特征选择方法通过评估每个特征与目标变量之间的关系（如相关性、卡方检验等）来进行特征选择。它不依赖于任何机器学习模型，因此它是“数据驱动”的方法，通常用于初步筛选特征。","mnemonic":"正确√ 过滤式特征选择靠数据自身数值特征，不依赖模型"},{"id":568,"type":"judge","text":"在 PowerPoint 里，若想查看幻灯片切换的效果，可点击预览按钮；同时，借助 “计时” 组中的相应按钮，还能对切换的速度进行调整。","options":[],"answer":"正确","explanation":"PowerPoint中可以通过单击预览按钮来预览切换效果，还可以通过“计时”组对应按钮调整切换速度。","mnemonic":"正确√ PPT预览切换效果点预览按钮，计时组调速度"},{"id":569,"type":"judge","text":"有必要指导初级工挑选合适的标注工具，并按照指定的规范要求开展标注工作。","options":[],"answer":"正确","explanation":"在进行数据标注时，需要选择适合的标注工具，根据指定的规范要求进行标注。","mnemonic":"正确√ 指导初级工选工具、按规范标注，基本要求"},{"id":570,"type":"judge","text":"语音编码是通过降低语音信号中的信息冗余度来实现数据压缩的。","options":[],"answer":"正确","explanation":"语音编码就是通过减少语音信号中的信息冗余度来实现数据压缩，这种冗余度的最直接的证据，就是语音采样信号之间具有很强的相关性。","mnemonic":"正确√ 语音编码通过减少信息冗余度实现数据压缩"},{"id":571,"type":"judge","text":"运用计算机视觉、人脸识别、区块链、web3.0、物联网等新技术打造的新型无人零售店，实现了 “拿了就走” 等自助支付模式。","options":[],"answer":"错误","explanation":"在计算机视觉、人脸识别、物联网等新技术的推动下，诞生了以AmazonGo为代表的新型无人零售店，通过“拿了就走”等自助支付手段，为消费者提供新的用户体验，也为商家节约人力成本。","mnemonic":"错误✗ 无人零售店不涉及区块链和web3.0，多加了技术"},{"id":572,"type":"judge","text":"依据职业道德的规范，从业人员有义务尊重他人的权利与尊严，做到不歧视、不欺压他人。","options":[],"answer":"正确","explanation":"根据职业道德的要求，从业人员要尊重他人的权利和尊严，不歧视、不欺压他人。","mnemonic":"正确√ 职业道德要求尊重他人权利尊严，不歧视不欺压"},{"id":573,"type":"judge","text":"GOMS 是交互系统中用于分析用户操作复杂性的建模技术，主要在软件设计领域被用于构建用户行为模型。","options":[],"answer":"正确","explanation":"GOMS模型是人机交互领域最著名的预测模型，是用于分析交互系统中用户复杂性的建模技术，主要被软件设计者用于建立用户行为模型。","mnemonic":"正确√ GOMS分析用户操作复杂性，软件设计建模技术"},{"id":574,"type":"judge","text":"从业人员遵守 “勤勉好学” 的基本要求，能够保持积极主动的工作态度，不断提高自身的专业素养和能力。","options":[],"answer":"正确","explanation":"通过遵守\"勤勉好学\"的基本要求，从业人员可以保持积极主动的工作态度，不断提升自己的专业素养和能力。","mnemonic":"正确√ 勤勉好学保持积极态度，不断提升专业素养能力"},{"id":575,"type":"judge","text":"数据标注流程包含数据采集、数据清洗、数据标注、数据提示这几个环节。","options":[],"answer":"错误","explanation":"数据标注流程包括数据采集、数据清洗、数据标注、数据质检。","mnemonic":"错误✗ \"数据提示\"是错的，应为\"数据质检\"，与965对照"},{"id":576,"type":"judge","text":"从训练误差和测试误差中，能够判断算法是否出现欠拟合。","options":[],"answer":"正确","explanation":"欠拟合通常发生在模型过于简单，无法捕获数据中的复杂模式或结构时。在这种情况下，模型在训练集上的性能可能就不好（训练误差高），同时在测试集或未见过的数据上的性能也会很差（测试误差高）。如果模型在训练集和测试集上的表现都不好，通常意味着模型未能有效学习数据的规律，属于欠拟合的表现。","mnemonic":"正确√ 训练误差+测试误差都高=欠拟合，需两者共同判断"},{"id":577,"type":"judge","text":"逻辑树也被称作问题树、演绎树和分解树等，它不仅是界定问题与议题之间联系的桥梁，还能在解决问题的过程中帮助建立共识。","options":[],"answer":"正确","explanation":"逻辑树又被称为问题树、演绎树和分解树等，不但是我们界定问题与议题之间联系的纽带，而且还能在解决问题的过程中建立一种共识。","mnemonic":"正确√ 逻辑树=问题树=演绎树=分解树，建立共识纽带"},{"id":578,"type":"judge","text":"决策树算法的基本原理是依据某一指标来选定最合适的特征，将其作为当前节点的分割特征。","options":[],"answer":"正确","explanation":"决策树算法的原理是根据某个指标（例如信息增益、基尼系数等），选择最佳的特征作为当前节点的分割特征。","mnemonic":"正确√ 决策树按指标选最佳特征分割，如信息增益基尼系数"},{"id":579,"type":"judge","text":"随机森林算法的分类结果由各决策树投票决定。","options":[],"answer":"正确","explanation":"随机森林算法的分类结果是通过所有决策树的投票结果进行集成的。每棵决策树根据其训练集给出一个预测结果，最终通过投票决定最终的类别。","mnemonic":"正确√ 随机森林分类靠各决策树投票，少数服从多数"},{"id":580,"type":"judge","text":"若模型的训练时间过长，可能会在训练集上过度优化，进而导致过拟合。","options":[],"answer":"正确","explanation":"训练时间过长确实可能导致过拟合，因为模型在训练过程中会开始过度拟合训练数据中的噪声和不重要的细节，而不仅仅是学习数据的基本模式。","mnemonic":"正确√ 训练时间过长→过度优化训练集→过拟合"},{"id":581,"type":"judge","text":"在数据清洗工作里，处理缺失值是唯一需要攻克的难题。","options":[],"answer":"错误","explanation":"在众多数据中总是存在着许多脏数据，即不完整、不规范、不准确的数据，而数据清洗就是指彻底清除脏数据，包括检查数据一致性，处理无效值、异常值和缺失值等，从而提高数据质量，而不单是处理缺失值。","mnemonic":"错误✗ 数据清洗不只处理缺失值，还有异常值、无效值等"}];

      {
        label: '问题一',
        question: '“给词语上户口、办身份证”这一比喻，形象描述了将文本转换为计算机可处理形式的核心技术。请指出该技术名称，说明其为何是AI文本处理的基础，并阐述其核心思想。基于这一思想，系统介绍三种具有代表性的实现方法，分别说明其原理、优缺点和典型应用场景。',
        answer: `文本向量化

技术名称：文本向量化（词表示学习）。

为何是基础：计算机只能处理数字，无法直接理解文字。文本向量化将语言符号映射为数值向量，为分类、搜索、生成等机器学习任务提供可计算的输入。

核心思想：将词、句等语言单元转化为低维稠密向量，使语义相似性可通过向量间的距离来体现。如“汽车”和“车辆”在向量空间中位置接近。

三种代表性方法：

1. 词袋模型（Bag-of-Words）
- 核心原理：忽略词序和语法，仅统计文档中每个词的出现频次，形成基于词汇表的固定维度向量。
- 优点：简单直观，计算速度快。
- 缺点：丢失词序与语义信息，向量高维稀疏，无法区分近义词。
- 典型应用：垃圾邮件识别、简单的情感分类。

2. Word2Vec
- 原理：基于“上下文相似则语义相近”的分布式假设，通过神经网络从大量文本中学习每个词的稠密向量。
- 优点：词向量低维且语义丰富，支持类比计算。
- 缺点：词向量是静态的，无法处理一词多义。
- 应用：词义相似度计算、推荐系统。

3. BERT
- 原理：基于Transformer，通过掩码语言模型和句子预测任务预训练，生成随上下文变化的动态词向量。
- 优点：能区分多义词，捕捉深层语义和语法，下游任务表现优异。
- 缺点：模型庞大、计算成本高，需大量数据微调，可解释性弱。
- 应用：智能问答、机器阅读理解、深层情感分析。`

// ===== STATE =====
let currentMode = 'quiz';
let currentBatch = -1;
let currentIndex = 0;
let answered = {}; // { questionId: { selected: [...], correct: bool } }
let multiSelected = []; // for multi-select during answering
let wrongQuizIds = []; // wrong question ids for wrong quiz mode
let isWrongQuizMode = false;
let wrongQuizPending = new Set(); // IDs pending re-answer in current wrong quiz round
let favorites = new Set(); // favorite question IDs
let isFavQuizMode = false;
let favQuizIds = [];
let favQuizPending = new Set(); // IDs pending re-answer in fav quiz round

const STORAGE_KEY = 'ai3_581_minus600a_records';
const PROGRESS_KEY = 'ai3_581_minus600a_progress';
const FAVORITES_KEY = 'ai3_581_minus600a_favorites';

// ===== INIT =====
function init() {
  loadRecords();
  loadFavorites();
  renderBatchGrid();
  updateStats();
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('fade-out');
    setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 300);
  }, 400);
}

function loadRecords() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) answered = JSON.parse(data);
  } catch(e) { answered = {}; }
}

function saveRecords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answered));
}

function loadProgress() {
  try {
    const data = localStorage.getItem(PROGRESS_KEY);
    if (data) return JSON.parse(data);
  } catch(e) {}
  return {};
}

function saveProgress(batch, index) {
  const p = loadProgress();
  p[batch] = index;
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function loadFavorites() {
  try {
    const data = localStorage.getItem(FAVORITES_KEY);
    if (data) favorites = new Set(JSON.parse(data));
  } catch(e) { favorites = new Set(); }
}

function saveFavorites() {
  localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites]));
}

function toggleFavorite(qid) {
  if (favorites.has(qid)) {
    favorites.delete(qid);
  } else {
    favorites.add(qid);
  }
  saveFavorites();
  updateStats();
  renderQuizQuestion();
}

// ===== STATS =====
function updateStats() {
  const keys = Object.keys(answered);
  const total = keys.length;
  const correct = keys.filter(k => answered[k].correct).length;
  const wrong = total - correct;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statWrongBook').textContent = wrong;
  document.getElementById('statFavorites').textContent = favorites.size;
  document.getElementById('statRate').textContent = rate + '%';
}

// ===== MODE =====
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeQuiz').classList.toggle('selected', mode === 'quiz');
  document.getElementById('modeStudy').classList.toggle('selected', mode === 'study');
  renderBatchGrid();
}

// ===== BATCH GRID =====
const BATCH_SIZE = 100;
const TOTAL_BATCHES = Math.ceil(ALL_QUESTIONS.length / BATCH_SIZE);

function getBatchQuestions(batch) {
  const start = batch * BATCH_SIZE;
  return ALL_QUESTIONS.slice(start, start + BATCH_SIZE);
}

function getBatchTypeLabel(qs) {
  const types = [...new Set(qs.map(q => q.type))];
  const labels = { single: '单选', multi: '多选', judge: '判断' };
  return types.map(t => labels[t]).join('+');
}

function renderBatchGrid() {
  const grid = document.getElementById('batchGrid');
  let html = '';
  for (let b = 0; b < TOTAL_BATCHES; b++) {
    const qs = getBatchQuestions(b);
    if (!qs.length) continue;
    const startId = qs[0].id;
    const endId = qs[qs.length - 1].id;
    const done = qs.filter(q => answered[q.id]).length;
    const pct = qs.length ? Math.round(done / qs.length * 100) : 0;
    const typeLabel = getBatchTypeLabel(qs);

    html += `<div class="batch-card" onclick="openBatch(${b})">
      <div class="batch-num">第${b + 1}批</div>
      <div class="batch-range">${startId}-${endId}题 · ${typeLabel}</div>
      <div class="batch-progress"><div class="batch-progress-bar" style="width:${pct}%"></div></div>
      <div class="batch-stats">${currentMode === 'quiz' ? `已做 ${done}/${qs.length}` : '点击查看全部'}</div>
    </div>`;
  }
  if (currentMode === 'study') {
    STUDY_SUPPLEMENTS.forEach(item => {
      html += `<div class="batch-card extra-study" onclick="openStudySupplement('${item.key}')">
        <div class="batch-num">${escapeHtml(item.title)}</div>
        <div class="batch-range">${escapeHtml(item.subtitle)} · ${item.items.length}组题答</div>
        <div class="batch-progress"><div class="batch-progress-bar" style="width:100%"></div></div>
        <div class="batch-stats">背题模式专用补充</div>
      </div>`;
    });
  }
  grid.innerHTML = html;
}

// ===== OPEN BATCH =====
function openBatch(batch) {
  currentBatch = batch;
  if (currentMode === 'quiz') {
    openQuizMode(batch);
  } else {
    openStudyMode(batch);
  }
}

// ===== QUIZ MODE =====
function openQuizMode(batch) {
  isWrongQuizMode = false;
  isFavQuizMode = false;
  wrongQuizIds = [];
  wrongQuizPending = new Set();
  favQuizIds = [];
  favQuizPending = new Set();
  const qs = getBatchQuestions(batch);
  const progress = loadProgress();
  currentIndex = progress[batch] || 0;
  if (currentIndex >= qs.length) currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function getCurrentQuestions() {
  if (isWrongQuizMode) return getWrongQuizQuestions();
  if (isFavQuizMode) return getFavQuizQuestions();
  return getBatchQuestions(currentBatch);
}

function renderQuizQuestion() {
  const qs = getCurrentQuestions();
  if (qs.length === 0) { goHome(); return; }
  const q = qs[currentIndex];
  const record = answered[q.id];
  // In wrong quiz mode, treat pending questions as unanswered so user can re-answer
  const isAnswered = isWrongQuizMode ? !wrongQuizPending.has(q.id) : (isFavQuizMode ? !favQuizPending.has(q.id) : !!record);

  // Header
  if (isWrongQuizMode) {
    document.getElementById('quizProgressText').textContent = `错题集 · ${currentIndex + 1}/${qs.length}`;
  } else if (isFavQuizMode) {
    document.getElementById('quizProgressText').textContent = `收藏夹 · ${currentIndex + 1}/${qs.length}`;
  } else {
    document.getElementById('quizProgressText').textContent = `第${currentBatch + 1}批 · ${currentIndex + 1}/${qs.length}`;
  }
  document.getElementById('quizProgressBar').style.width = ((currentIndex + 1) / qs.length * 100) + '%';
  document.getElementById('quizCounter').textContent = `${q.id}/${ALL_QUESTIONS.length}`;

  // Buttons
  document.getElementById('btnPrev').disabled = currentIndex === 0;
  let nextBtnText = '下一题 \u25B6';
  if (currentIndex === qs.length - 1) {
    nextBtnText = isWrongQuizMode ? '完成错题 \u25B6' : (isFavQuizMode ? '继续刷题 \u25B6' : '返回首页 \u25B6');
  }
  document.getElementById('btnNext').textContent = nextBtnText;

  let html = '';
  // Type badge
  const typeLabels = { single: '单选题', multi: '多选题', judge: '判断题' };
  html += `<div class="q-type-badge ${q.type}">${typeLabels[q.type]}${q.type === 'multi' ? '（可多选）' : ''}</div>`;
  // Favorite button
  const isFaved = favorites.has(q.id);
  html += `<button class="fav-btn${isFaved ? ' faved' : ''}" onclick="toggleFavorite(${q.id})">${isFaved ? '\u2605 已收藏' : '\u2606 收藏'}</button>`;
  // Question text
  html += `<div class="q-text">${q.id}. ${escapeHtml(q.text)}</div>`;

  if (q.type === 'judge') {
    html += '<div class="judge-options">';
    ['正确', '错误'].forEach(opt => {
      let cls = '';
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt)) cls += record.correct ? ' correct' : ' wrong';
        if (opt === q.answer && !record.correct) cls += ' correct';
      }
      html += `<div class="judge-option${cls}" onclick="answerJudge('${opt}', ${q.id})">${opt}</div>`;
    });
    html += '</div>';
  } else if (q.type === 'multi') {
    html += '<div class="q-options">';
    q.options.forEach(opt => {
      let cls = '';
      const correctArr = q.answer.split(',').map(s => s.trim());
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt.label)) {
          cls += correctArr.includes(opt.label) ? ' correct' : ' wrong';
        } else if (correctArr.includes(opt.label)) {
          cls += ' correct';
        }
      } else if (multiSelected.includes(opt.label)) {
        cls += ' selected';
      }
      html += `<div class="q-option${cls}" onclick="toggleMultiOption('${opt.label}', ${q.id})">
        <span class="opt-label">${opt.label}</span>
        <span>${escapeHtml(opt.text)}</span>
      </div>`;
    });
    html += '</div>';
    if (!isAnswered) {
      html += `<div class="multi-confirm-wrap" id="multiConfirmWrap" style="display:${multiSelected.length > 0 ? 'block' : 'none'}">
        <button class="multi-confirm-btn" onclick="confirmMulti(${q.id})">确认提交（已选${multiSelected.length}项）</button>
      </div>`;
    }
  } else {
    html += '<div class="q-options">';
    q.options.forEach(opt => {
      let cls = '';
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt.label)) cls += record.correct ? ' correct' : ' wrong';
        if (opt.label === q.answer && !record.selected.includes(opt.label)) cls += ' correct';
      }
      html += `<div class="q-option${cls}" onclick="answerSingle('${opt.label}', ${q.id})">
        <span class="opt-label">${opt.label}</span>
        <span>${escapeHtml(opt.text)}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Show result if answered
  if (isAnswered) {
    const isCorrect = record.correct;
    html += `<div class="result-card">
      <div class="result-header ${isCorrect ? 'correct-header' : 'wrong-header'}">
        ${isCorrect ? '\u2705 回答正确' : '\u274C 回答错误'}
      </div>
      <div class="result-answer">\u2714 正确答案：${q.answer}</div>
      ${q.explanation ? `<div class="result-explanation"><strong>\ud83d\udcdd 解析：</strong>${escapeHtml(q.explanation)}</div>` : ''}
      ${q.mnemonic ? `<div class="result-mnemonic"><strong>\ud83d\udca1 巧记：</strong>${escapeHtml(q.mnemonic)}</div>` : ''}
    </div>`;
  }

  document.getElementById('quizBody').innerHTML = html;
  document.getElementById('quizBody').scrollTop = 0;
  window.scrollTo(0, 0);

  if (!isWrongQuizMode && !isFavQuizMode) saveProgress(currentBatch, currentIndex);
}

function answerSingle(label, qid) {
  if (isWrongQuizMode) {
    if (!wrongQuizPending.has(qid)) return;
  } else if (isFavQuizMode) {
    if (!favQuizPending.has(qid)) return;
  } else {
    if (answered[qid]) return;
  }
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correct = label === q.answer.trim();
  answered[qid] = { selected: [label], correct };
  wrongQuizPending.delete(qid);
  favQuizPending.delete(qid);
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function answerJudge(val, qid) {
  if (isWrongQuizMode) {
    if (!wrongQuizPending.has(qid)) return;
  } else if (isFavQuizMode) {
    if (!favQuizPending.has(qid)) return;
  } else {
    if (answered[qid]) return;
  }
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correct = val === q.answer.trim();
  answered[qid] = { selected: [val], correct };
  wrongQuizPending.delete(qid);
  favQuizPending.delete(qid);
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function toggleMultiOption(label, qid) {
  if (isWrongQuizMode) {
    if (!wrongQuizPending.has(qid)) return;
  } else if (isFavQuizMode) {
    if (!favQuizPending.has(qid)) return;
  } else {
    if (answered[qid]) return;
  }
  const idx = multiSelected.indexOf(label);
  if (idx >= 0) multiSelected.splice(idx, 1);
  else multiSelected.push(label);
  renderQuizQuestion();
}

function confirmMulti(qid) {
  const canAnswer = isWrongQuizMode ? wrongQuizPending.has(qid) : (isFavQuizMode ? favQuizPending.has(qid) : !answered[qid]);
  if (!canAnswer || multiSelected.length === 0) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correctArr = q.answer.split(',').map(s => s.trim()).sort();
  const selectedArr = [...multiSelected].sort();
  const correct = JSON.stringify(selectedArr) === JSON.stringify(correctArr);
  answered[qid] = { selected: [...multiSelected], correct };
  multiSelected = [];
  wrongQuizPending.delete(qid);
  favQuizPending.delete(qid);
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    multiSelected = [];
    renderQuizQuestion();
  }
}

function nextQuestion() {
  const qs = getCurrentQuestions();
  if (currentIndex < qs.length - 1) {
    currentIndex++;
    multiSelected = [];
    renderQuizQuestion();
  } else {
    if (isWrongQuizMode) {
      // Check if there are still wrong answers from this round
      const stillWrong = wrongQuizIds.filter(id => answered[id] && !answered[id].correct);
      if (stillWrong.length > 0) {
        wrongQuizIds = stillWrong;
        wrongQuizPending = new Set(stillWrong);
        currentIndex = 0;
        multiSelected = [];
        showToast(`还有 ${stillWrong.length} 题未答对，继续刷！`);
        renderQuizQuestion();
      } else {
        isWrongQuizMode = false;
        wrongQuizIds = [];
        wrongQuizPending = new Set();
        showToast('恭喜！错题全部答对！');
        goHome();
      }
    } else if (isFavQuizMode) {
      // Refresh favorites list - keep only still-favorited questions
      const remaining = [...favorites].sort((a, b) => a - b);
      if (remaining.length > 0) {
        favQuizIds = remaining;
        favQuizPending = new Set(remaining);
        currentIndex = 0;
        multiSelected = [];
        showToast(`收藏夹还有 ${remaining.length} 题，继续刷！`);
        renderQuizQuestion();
      } else {
        isFavQuizMode = false;
        favQuizIds = [];
        favQuizPending = new Set();
        showToast('收藏夹已清空！');
        goHome();
      }
    } else {
      goHome();
    }
  }
}

function jumpToQuestion() {
  const qs = getCurrentQuestions();
  const input = prompt(`输入题号 (1-${qs.length})：`, currentIndex + 1);
  if (input === null) return;
  const n = parseInt(input);
  if (n >= 1 && n <= qs.length) {
    currentIndex = n - 1;
    multiSelected = [];
    renderQuizQuestion();
  } else {
    showToast('请输入有效题号');
  }
}

// ===== STUDY MODE =====
function openStudySupplement(key) {
  const topic = STUDY_SUPPLEMENTS.find(item => item.key === key);
  if (!topic) return;

  document.getElementById('studyTitle').textContent = topic.title;
  showPage('studyPage');

  let html = '';
  topic.items.forEach(item => {
    html += '<div class="study-card">';
    html += `<div class="sc-header"><span class="sc-num">${escapeHtml(item.label)}</span></div>`;
    html += `<div style="padding:10px 14px;border-bottom:1px solid var(--gray-100)">
      <div class="sc-text">${escapeHtml(item.question)}</div>
    </div>`;
    if (item.answer) {
      html += `<div class="sc-answer">${escapeHtml(item.answerTitle || '优化答案')}</div>`;
      html += `<div class="sc-answer-text">${escapeHtml(item.answer)}</div>`;
    }
    if (item.note) {
      html += `<div class="sc-note">${escapeHtml(item.note)}</div>`;
    }
    html += '</div>';
  });

  document.getElementById('studyBody').innerHTML = html;
  window.scrollTo(0, 0);
}

function openStudyMode(batch) {
  const qs = getBatchQuestions(batch);
  const startId = qs[0].id;
  const endId = qs[qs.length - 1].id;

  document.getElementById('studyTitle').textContent = `第${batch + 1}批 (${startId}-${endId}题)`;
  showPage('studyPage');

  let html = '';
  qs.forEach(q => {
    const typeLabels = { single: '单选', multi: '多选', judge: '判断' };
    html += '<div class="study-card">';
    html += `<div class="sc-header">
      <span class="sc-num">${q.id}</span>
      <span class="q-type-badge ${q.type}" style="margin:0">${typeLabels[q.type]}</span>
    </div>`;
    html += `<div style="padding:10px 14px;border-bottom:1px solid var(--gray-100)">
      <div class="sc-text">${escapeHtml(q.text)}</div>
    </div>`;

    if (q.options.length > 0) {
      html += '<div class="sc-options">';
      const correctArr = q.answer.split(',').map(s => s.trim());
      q.options.forEach(opt => {
        const isAns = correctArr.includes(opt.label);
        html += `<div class="sc-opt${isAns ? ' is-answer' : ''}">${isAns ? '\u2714 ' : ''}${opt.label}. ${escapeHtml(opt.text)}</div>`;
      });
      html += '</div>';
    }

    html += `<div class="sc-answer">\u2714 正确答案：${q.answer}</div>`;
    if (q.explanation) html += `<div class="sc-explain">\ud83d\udcdd ${escapeHtml(q.explanation)}</div>`;
    if (q.mnemonic) html += `<div class="sc-mnemonic">\ud83d\udca1 ${escapeHtml(q.mnemonic)}</div>`;
    html += '</div>';
  });

  document.getElementById('studyBody').innerHTML = html;
  window.scrollTo(0, 0);
}

// ===== WRONG BOOK (Quiz Mode) =====
function openWrongBook() {
  wrongQuizIds = Object.keys(answered).filter(k => !answered[k].correct).map(Number).sort((a, b) => a - b);
  if (wrongQuizIds.length === 0) {
    showToast('暂无错题');
    return;
  }

  isWrongQuizMode = true;
  wrongQuizPending = new Set(wrongQuizIds);
  currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function getWrongQuizQuestions() {
  return wrongQuizIds.map(id => ALL_QUESTIONS.find(q => q.id === id)).filter(Boolean);
}

// ===== FAVORITES (Quiz Mode) =====
function openFavorites() {
  favQuizIds = [...favorites].sort((a, b) => a - b);
  if (favQuizIds.length === 0) {
    showToast('暂无收藏');
    return;
  }

  isFavQuizMode = true;
  isWrongQuizMode = false;
  favQuizPending = new Set(favQuizIds);
  currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function getFavQuizQuestions() {
  return favQuizIds.map(id => ALL_QUESTIONS.find(q => q.id === id)).filter(Boolean);
}

// ===== NAVIGATION =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function goHome() {
  isWrongQuizMode = false;
  isFavQuizMode = false;
  wrongQuizIds = [];
  wrongQuizPending = new Set();
  favQuizIds = [];
  favQuizPending = new Set();
  showPage('homePage');
  renderBatchGrid();
  updateStats();
  window.scrollTo(0, 0);
}

// ===== CLEAR RECORDS =====
function showClearModal() {
  document.getElementById('modal').classList.add('show');
  document.getElementById('modalConfirmBtn').onclick = clearAllRecords;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function clearAllRecords() {
  answered = {};
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(PROGRESS_KEY);
  closeModal();
  renderBatchGrid();
  updateStats();
  showToast('已清空所有记录');
}

// ===== UTILS =====
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== START =====
init();
</script>
</body>
</html>
