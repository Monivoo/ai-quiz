选A"},{"id":187,"type":"single","text":"全新设计法是根据什么，彻底打破原有流程，从无到有地设计新流程（）。","options":[{"label":"A","text":"流程优化目标"},{"label":"B","text":"非参数"},{"label":"C","text":"系统耗散理论"},{"label":"D","text":"主观赋权"}],"answer":"A","explanation":"全新设计法依据流程优化目标彻底重构流程。","mnemonic":"全新设计法根据\"流程优化目标\"从零设计，选A目标导向"},{"id":188,"type":"single","text":"下列哪项不属于业务分析方法论（）。","options":[{"label":"A","text":"因果分析方法"},{"label":"B","text":"同期群分析方法"},{"label":"C","text":"帕拉梅拉分析方法"},{"label":"D","text":"A/B测试分析方法"}],"answer":"C","explanation":"帕拉梅拉分析不是业务分析方法，其他选项是常用方法。","mnemonic":"帕拉梅拉是保时捷不是分析方法，选C排除假名词"},{"id":189,"type":"single","text":"在模型训练过程中，若训练数据的数量过少，通常会使模型出现什么问题（）。","options":[{"label":"A","text":"模型收敛性差"},{"label":"B","text":"正常拟合"},{"label":"C","text":"过拟合"},{"label":"D","text":"欠拟合"}],"answer":"C","explanation":"当训练数据量过少时，模型容易过度依赖有限的数据，从而学习到噪声和特定的样本特征，无法有效泛化到新数据上，这就是过拟合","mnemonic":"训练数据太少导致过拟合，\"少量数据过度学习\"选C"},{"id":190,"type":"single","text":"关联规则的评估指标中，置信度描述的是（）。","options":[{"label":"A","text":"在A项集出现的情况下，B项集也出现的概率"},{"label":"B","text":"在B项集出现的情况下，A项集也出现的概率"},{"label":"C","text":"项集在规则中出现的频率"},{"label":"D","text":"规则被应用的次数"}],"answer":"A","explanation":"置信度表示规则A→B的可靠性，即给定A出现时B出现的概率。","mnemonic":"置信度=A出现时B也出现的概率，A→B的可靠性选A"},{"id":191,"type":"single","text":"在业务流程重组（BPR）中，流程重组的关键步骤包含哪一项（）。","options":[{"label":"A","text":"建立流程管理机构，明确其权责范围"},{"label":"B","text":"对企业的现有流程进行调研分析、诊断、再设计，然后重新构建新的流程"},{"label":"C","text":"制定各流程内部的运转规则与各流程之间的关系规则"},{"label":"D","text":"变革基本信念、转变经营机制、重建组织文化"}],"answer":"B","explanation":"流程重组包括分析、诊断、再设计和重建流程，以提升企业业务流程的效率和效果。","mnemonic":"BPR关键步骤：调研分析→诊断→再设计→重建，选B全流程"},{"id":192,"type":"single","text":"下列属于基于规则实现中文分词的是（）。","options":[{"label":"A","text":"卷积神经网络"},{"label":"B","text":"双向最大匹配法"},{"label":"C","text":"支持向量机"},{"label":"D","text":"递归神经网络"}],"answer":"B","explanation":"规则分词方法涵盖正向、逆向和双向最大匹配法。","mnemonic":"双向最大匹配法是基于规则的中文分词，\"匹配\"就是规则选B"},{"id":193,"type":"single","text":"关于 jieba 分词的词性标注，下列描述正确的是（）。","options":[{"label":"A","text":"jieba分词不支持词性标注功能"},{"label":"B","text":"jieba分词只提供了基本的词性标注功能，不能支持多种不同的词性标注方案"},{"label":"C","text":"jieba分词默认提供了基本的词性标注功能"},{"label":"D","text":"jieba分词的词性标注需要人工标注"}],"answer":"C","explanation":"jieba默认提供基础词性标注功能，支持扩展方案。","mnemonic":"jieba默认提供基础词性标注功能，选C默认即有"},{"id":194,"type":"single","text":"聚类分析属于一种（）。","options":[{"label":"A","text":"强化学习"},{"label":"B","text":"半监督学习"},{"label":"C","text":"有监督学习"},{"label":"D","text":"无监督学习"}],"answer":"D","explanation":"聚类分析是无监督学习方法，不依赖预定义类别。","mnemonic":"聚类分析=无监督学习，无标签自动分群选D"},{"id":195,"type":"single","text":"优化业务流程、提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，也是企业实现快速、稳定、可持续发展的什么（）。","options":[{"label":"A","text":"客户关系管理"},{"label":"B","text":"重要条件"},{"label":"C","text":"品牌管理"},{"label":"D","text":"新产品发布"}],"answer":"B","explanation":"优化业务流程，提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，是企业实现快速、稳定、可持续发展的重要条件","mnemonic":"优化业务流程是企业可持续发展的\"重要条件\"，选B"},{"id":196,"type":"single","text":"贝叶斯算法是依据什么来进行推断和学习的（）。","options":[{"label":"A","text":"贝叶斯定理"},{"label":"B","text":"梯度下降"},{"label":"C","text":"极大似然估计"},{"label":"D","text":"最小化平方误差"}],"answer":"A","explanation":"贝叶斯算法基于贝叶斯定理进行推断和学习","mnemonic":"贝叶斯算法依据贝叶斯定理，同名同源选A"},{"id":197,"type":"single","text":"在计算机领域，图灵测试的用途是检测计算机的（）。","options":[{"label":"A","text":"硬件性能"},{"label":"B","text":"软件功能"},{"label":"C","text":"算力计算能力"},{"label":"D","text":"是否具有智能能力"}],"answer":"D","explanation":"图灵测试用于判断机器是否具有智能的测试方法。简单来说，它是一种评估机器能否表现出与人类同等智能行为的测试。在测试中，有一个询问者（人类），一个被测试者 A（机器）和一个被测试者 B（人类）。询问者通过某种通信方式（如文本聊天）向 A 和 B 提出各种问题，这些问题可以是关于常识、逻辑、情感、文化等诸多方面。如果在一系列的问答之后，询问者无法区分 A 和 B 哪个是机器，哪个是人类，那么就可以认为机器通过了图灵测试，即这台机器具有了人工智能。","mnemonic":"图灵测试检测计算机是否具有智能，图灵=智能测试选D"},{"id":198,"type":"single","text":"在 Word 中进行邮件合并时，可通过什么方式发送合并后的邮件（）。","options":[{"label":"A","text":"“邮件”选项"},{"label":"B","text":"“完成并合并”选项"},{"label":"C","text":"“编辑收件人列表”选项"},{"label":"D","text":"“文件”选项"}],"answer":"B","explanation":"使用“完成并合并”选项可以发送合并后的邮件，支持编辑单个文档、打印文档和发送电子邮件","mnemonic":"Word邮件合并用\"完成并合并\"发送邮件，最后一步选B"},{"id":199,"type":"single","text":"下列能够综合多种特征进行中文分词的是（）。","options":[{"label":"A","text":"条件随机场"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"A","explanation":"条件随机场（CRF）可结合上下文特征提高分词准确性。","mnemonic":"条件随机场CRF综合多种特征做中文分词，选A"},{"id":200,"type":"single","text":"下列哪一项不属于计算机在教育领域的应用（）。","options":[{"label":"A","text":"在线课程"},{"label":"B","text":"计算机辅助教学"},{"label":"C","text":"学生管理系统"},{"label":"D","text":"航空航天设计"}],"answer":"D","explanation":"计算机在教育领域中的应用包括在线课程、计算机辅助教学、学生管理系统等，但不包括航空航天设计。","mnemonic":"航空航天设计不属于教育领域应用，选D跨行了"},{"id":201,"type":"single","text":"追求卓越的基本要求中，“高标准要求” 具体体现在哪些方面（）。","options":[{"label":"A","text":"追逐权力和地位"},{"label":"B","text":"避免参加培训活动"},{"label":"C","text":"对工作质量要求更高"},{"label":"D","text":"忽略工作细节"}],"answer":"C","explanation":"追求卓越的基本要求中，“高标准要求”体现在树立高标准的要求，并努力追求卓越，对工作质量、专业知识和技能要求更高，在每一个工作环节都追求卓越表现","mnemonic":"追求卓越高标准=对工作质量要求更高，选C质量"},{"id":202,"type":"single","text":"业务分析方法的核心内容是（）。","options":[{"label":"A","text":"业务指标分析方法"},{"label":"B","text":"业务信息分析"},{"label":"C","text":"系统化业务流程"},{"label":"D","text":"业务量化分析"}],"answer":"A","explanation":"业务指标分析方法是业务分析方法的核心内容","mnemonic":"业务分析方法核心=业务指标分析方法，指标是核心选A"},{"id":203,"type":"single","text":"下列哪项指标可以直接用于判断算法是否存在欠拟合（）。","options":[{"label":"A","text":"模型复杂度降低"},{"label":"B","text":"准确率提高"},{"label":"C","text":"在训练集和测试集上的表现都差"},{"label":"D","text":"在训练集上表现差"}],"answer":"C","explanation":"欠拟合的典型表现是模型在训练集和测试集上都表现较差，无法很好地学习数据的规律","mnemonic":"欠拟合=训练集测试集都差，\"双差\"判欠拟合选C"},{"id":204,"type":"single","text":"（）是导致算法欠拟合的原因。","options":[{"label":"A","text":"样本数量过多"},{"label":"B","text":"学习率过高"},{"label":"C","text":"数据中的噪声"},{"label":"D","text":"模型过于简单"}],"answer":"D","explanation":"欠拟合是指模型未能充分学习数据中的规律，导致预测误差较大。其核心原因之一是模型过于简单。","mnemonic":"欠拟合原因=模型过于简单，简单学不会选D"},{"id":205,"type":"single","text":"神经网络中，（）机制是专门用来解决梯度消失问题的。","options":[{"label":"A","text":"残差连接"},{"label":"B","text":"批归一化"},{"label":"C","text":"初始化权重"},{"label":"D","text":"激活函数选择"}],"answer":"A","explanation":"残差连接通过跨层加法缓解梯度消失问题。","mnemonic":"残差连接专解梯度消失，\"残差跨层传梯度\"选A"},{"id":206,"type":"single","text":"在业务流程优化过程中，找到阻碍流程优化目标实现的因素后，接下来应该做什么（）。","options":[{"label":"A","text":"重新成立项目小组"},{"label":"B","text":"将情况反馈给领导并得到确认"},{"label":"C","text":"直接对现有流程进行改造"},{"label":"D","text":"立即开始实施新的流程方案"}],"answer":"B","explanation":"根据业务流程优化的顺序，找到阻碍流程优化目标实现的因素之后，下一步是将情况反馈给领导并得到确认（C）","mnemonic":"找到阻碍因素后先反馈领导确认，不能擅自行动选B"},{"id":207,"type":"single","text":"在人机交互设计流程中，下列哪个阶段主要对交互效果进行评估？","options":[{"label":"A","text":"信息架构"},{"label":"B","text":"用户需求分析"},{"label":"C","text":"原型设计"},{"label":"D","text":"评估测试"}],"answer":"D","explanation":"智慧商场依托现代信息技术实现全渠道感知、数据分析和智能决策功能。","mnemonic":"评估测试阶段评估交互效果，\"评估\"对\"评估\"选D"},{"id":208,"type":"single","text":"人机交互是通过什么方式，让计算机领会人类用户的交互意图，并将运算结果以特定界面形式呈现给人类用户？","options":[{"label":"A","text":"2D打印技术"},{"label":"B","text":"3D打印技术"},{"label":"C","text":"人机接口技术"},{"label":"D","text":"虚拟现实技术"}],"answer":"C","explanation":"人机交互的本质就是人类用户与计算机间的信息交流和互动，即通过人机接口技术，使计算机理解人类用户的交互意图，并将计算结果以某种形式的界面呈现给人类用户","mnemonic":"人机交互通过\"人机接口技术\"实现，接口连接人和机选C"},{"id":209,"type":"single","text":"微型计算机的分类中不包含的是（）。","options":[{"label":"A","text":"个人计算机"},{"label":"B","text":"单板机"},{"label":"C","text":"显示器"},{"label":"D","text":"单片机"}],"answer":"C","explanation":"微型计算机按照组装分类分为单片机、单板机和个人计算机","mnemonic":"显示器是外设不是微型计算机分类，单片机单板机PC才是选C"},{"id":210,"type":"single","text":"在购物平台对客户群体进行分析时，象限分析法是通过（）两个维度来描绘客户形象的。","options":[{"label":"A","text":"促销活动和商品推荐效果"},{"label":"B","text":"商品种类和库存量"},{"label":"C","text":"用户年龄和消费金额"},{"label":"D","text":"页面点击率和购买转化率"}],"answer":"D","explanation":"在购物平台分析客户群体中，通过页面点击率和购买转化率两个维度来刻画客户群像。通过划分象限，可以了解购物平台的主要客户群体，也可以针对客户特点施行不同的促销活动和商品推荐。","mnemonic":"购物平台象限分析用\"点击率+转化率\"两个维度，选D"},{"id":211,"type":"single","text":"SWOT 分析作为一种兼顾企业内外部因素的分析方法，其中 “T” 的含义是（）。","options":[{"label":"A","text":"威胁"},{"label":"B","text":"机会"},{"label":"C","text":"劣势"},{"label":"D","text":"优势"}],"answer":"A","explanation":"SWOT模型中的“T”代表Threats（威胁）","mnemonic":"SWOT的T=Threats威胁，T=Threat记住选A"},{"id":212,"type":"single","text":"以下哪项做法符合诚实公正的基本要求（）。","options":[{"label":"A","text":"提供准确、真实和完整的信息"},{"label":"B","text":"对某个观点偏向某一方"},{"label":"C","text":"在签订合同前隐瞒重要信息"},{"label":"D","text":"在面试中夸大自己的能力"}],"answer":"A","explanation":"在面试中夸大自己的能力和在签订合同前隐瞒重要信息都是欺骗行为，不符合诚实公正的基本要求；对某个观点偏向某一方也不符合诚实公正的基本要求。只提供准确、真实和完整的信息才符合诚实公正的基本要求。","mnemonic":"诚实公正=提供准确真实完整的信息，不夸大不隐瞒选A"},{"id":213,"type":"single","text":"下列哪一项不属于《中华人民共和国个人信息保护法》所要求的个人信息处理者应履行的基本责任？","options":[{"label":"A","text":"为个人信息主体提供个人信息处理的告知。"},{"label":"B","text":"采用安全保障措施保护个人信息安全。"},{"label":"C","text":"重要信息的保存期限不得低于10年。"},{"label":"D","text":"接收个人信息主体的申请并依法回应。"}],"answer":"C","explanation":"个人信息保护法要求处理者明确告知处理事项，建立权利响应机制，并采取安全措施保护信息，但不要求所有信息保存期限均不低于10年。","mnemonic":"个保法不要求\"保存期限不低于10年\"，C选项凭空捏造年限"},{"id":214,"type":"single","text":"特征选择的过程通常包括以下哪一个步骤（）。","options":[{"label":"A","text":"通过算法创建新的特征"},{"label":"B","text":"对特征进行标准化处理"},{"label":"C","text":"根据特征的相关性选择最有用的特征"},{"label":"D","text":"从数据中提取最具代表性的特征"}],"answer":"C","explanation":"特征选择的过程旨在从已有的特征集合中选择出对模型有最大贡献的特征","mnemonic":"特征\"选择\"=从已有特征中\"选\"最相关的，不是创建也不是提取"},{"id":215,"type":"single","text":"在 Word 里，题注指的是什么（）。","options":[{"label":"A","text":"对于插入的图、表、公式等的附加说明。"},{"label":"B","text":"对于插入的链接的附加说明。"},{"label":"C","text":"对于插入的文字的附加说明。"},{"label":"D","text":"对于插入的标题的附加说明。"}],"answer":"A","explanation":"题注是为图表、公式等添加的名称和编号，提供来源等信息。","mnemonic":"Word题注=给图、表、公式加说明，\"题\"目之\"注\"释"},{"id":216,"type":"single","text":"下列哪一项不属于 jieba 分词的基本操作步骤（）。","options":[{"label":"A","text":"合并分词结果并输出"},{"label":"B","text":"安装和导入jieba"},{"label":"C","text":"载入自定义词典"},{"label":"D","text":"选择分词模式"}],"answer":"A","explanation":"jieba分词基本步骤包括：安装和导入jieba、选择分词模式、载入自定义词典、获取分词结果。","mnemonic":"jieba步骤：安装→选模式→载词典→获结果，没有\"合并输出\"这步"},{"id":217,"type":"single","text":"决策树算法里，剪枝技术的主要目的是（）。","options":[{"label":"A","text":"提高模型的准确度"},{"label":"B","text":"防止模型过拟合"},{"label":"C","text":"减少训练数据的噪声"},{"label":"D","text":"增加模型的复杂度"}],"answer":"B","explanation":"决策树的剪枝技术主要用于防止模型在训练集上过拟合","mnemonic":"剪枝防过拟合：树长太大要\"剪\"掉，防止记住噪声"},{"id":218,"type":"single","text":"按照用途来划分，计算机存储器可分为哪几类（）","options":[{"label":"A","text":"主存储器、外存储器、高速缓冲存储器"},{"label":"B","text":"硬盘和光盘"},{"label":"C","text":"闪存和SD卡"},{"label":"D","text":"U盘和移动硬盘"}],"answer":"A","explanation":"计算机的存储器按用途划分①主存储器：主存储器内存存放计算机运行期间的大量程序和数据存取速度较快，存储容量不大。②外存储器：外存存放系统程序和大型数据文件及数据库存储容量大，单位成本低。③高速缓冲存储器：高速缓冲存储器Cache 高速存取指令和数据存取速度快，但存储容量小。","mnemonic":"存储器按用途分三类：主存+外存+Cache，口诀\"主外缓\""},{"id":219,"type":"single","text":"LOTOS 算子能够用来解决哪（）类问题。","options":[{"label":"A","text":"数据库查询优化"},{"label":"B","text":"并发系统设计"},{"label":"C","text":"模拟电路设计"},{"label":"D","text":"图像处理"}],"answer":"B","explanation":"LOTOS算子主要用于并发系统的设计，尤其是用于描述通信协议的行为模型。","mnemonic":"LOTOS=并发系统设计，L联想Lock（锁）→并发需要锁机制"},{"id":220,"type":"single","text":"随机森林算法之所以能通过增加树的数量来提升模型性能，原因在于（）。","options":[{"label":"A","text":"增加树的数量通常会提高模型的准确性和鲁棒性，降低方差"},{"label":"B","text":"增加树的数量可以增加计算开销，但不会影响模型的泛化能力"},{"label":"C","text":"增加树的数量可以让模型更加复杂，导致过拟合"},{"label":"D","text":"增加树的数量可以提高模型的多样性，减少欠拟合的风险"}],"answer":"A","explanation":"选项D：增加树的数量通常会提高模型的准确性和鲁棒性，并降低方差","mnemonic":"随机森林加树=提高准确性+鲁棒性+降低方差，\"人多力量大\""},{"id":221,"type":"single","text":"2. 在Python里，哪一个类能够用来把文本转化为词袋模型（）。","options":[{"label":"A","text":"DictVectorizer"},{"label":"B","text":"HashingVectorizer"},{"label":"C","text":"TfidfVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"D","explanation":"CountVectorizer的其思想是，将文本中每个单词视为一个特征，构成一个词汇表，不考虑单词出现的先后次序，该方法又称为词袋法(Bag ofWords)","mnemonic":"Count=计数=词袋，CountVectorizer把文本变成词频计数向量"},{"id":222,"type":"single","text":"原始数据中存在的常见问题有（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"数据缺失"},{"label":"C","text":"数据重复"},{"label":"D","text":"数据不一致"}],"answer":"A","explanation":"原始数据中常见的问题有数据不一致、数据重复、数据不完整、数据含噪声、数据维度高等等","mnemonic":"原始数据问题：缺失+重复+不一致，全选A\"以上均正确\""},{"id":223,"type":"single","text":"业务流程重组（BPR）中采用的标杆瞄准（Benchmarking），其主要目的是什么（）。","options":[{"label":"A","text":"提高员工满意度"},{"label":"B","text":"确定最佳实践并加快再造进程"},{"label":"C","text":"优化企业内部管理流程"},{"label":"D","text":"提升企业信息技术水平"}],"answer":"B","explanation":"标杆瞄准旨在通过借鉴最佳实践设定业绩目标，加速流程再造，提升企业绩效，而非直接优化管理或IT水平。","mnemonic":"标杆瞄准=瞄准最佳实践+加速再造，\"瞄准\"标杆来学习"},{"id":224,"type":"single","text":"下列哪一种方法属于 “可用性评估” 中的诊查式方法？（）","options":[{"label":"A","text":"放声思考法"},{"label":"B","text":"启发式评估"},{"label":"C","text":"问卷调查"},{"label":"D","text":"用户测试"}],"answer":"B","explanation":"可用性评估方法分为两大类：诊查式方法和测试式方法","mnemonic":"诊查式方法=启发式评估，专家\"诊查\"而非用户测试"},{"id":225,"type":"single","text":"下列哪种情况与严谨求是的基本要求不相符（）。","options":[{"label":"A","text":"准确地表达自己的观点"},{"label":"B","text":"避免盲目行动或决策"},{"label":"C","text":"收集和利用合适的数据和信息"},{"label":"D","text":"草率地分析问题"}],"answer":"D","explanation":"严谨求是要求从业者深入全面地分析问题，避免轻率决策，因此草率分析不符合该原则。","mnemonic":"严谨求是≠草率分析，\"严谨\"与\"草率\"天然对立"},{"id":226,"type":"single","text":"对数据进行预处理，其中一个原因是（）。","options":[{"label":"A","text":"增加数据复杂度"},{"label":"B","text":"提高决策的质量"},{"label":"C","text":"加快数据处理速度"},{"label":"D","text":"增加数据存储量"}],"answer":"B","explanation":"数据预处理可提升数据质量，辅助决策。","mnemonic":"数据预处理→提高决策质量，\"垃圾进垃圾出\"所以要先处理"},{"id":227,"type":"single","text":"在 ETL 流程中，“增量抽取”（Incremental Loading）的核心作用是（）。","options":[{"label":"A","text":"只抽取数据库中新增或修改的数据"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"A","explanation":"增量抽取只抽取自上一次抽取以来，数据库中要抽取的表中新增或修改的数据","mnemonic":"ETL增量抽取=只取新增或修改的数据，\"增量\"二字点明只取增量"},{"id":228,"type":"single","text":"在 K 折交叉验证中，需要做的是（）。","options":[{"label":"A","text":"将数据集划分为K个不相交的子集"},{"label":"B","text":"使用K个不同的模型进行训练"},{"label":"C","text":"在每次迭代中使用K个特征子集"},{"label":"D","text":"每次迭代中使用不同的机器学习算法进行训练​"}],"answer":"A","explanation":"K折交叉验证划分数据为K个互斥子集，轮流作为测试集，其余为训练集，进行K次评估。","mnemonic":"K折交叉验证=数据分K份，轮流当测试集，关键词\"K个不相交子集\""},{"id":229,"type":"single","text":"有哪个步骤能将人工智能技术的要求和业务自身的特点相融合，进而制定出数据清洗与标注的相关规范？（）","options":[{"label":"A","text":"课堂演练"},{"label":"B","text":"经验分享"},{"label":"C","text":"智能训练"},{"label":"D","text":"理论培训"}],"answer":"C","explanation":"智能训练环节是够结合人工智能技术要求和业务特征，制定数据清洗和标注规范。","mnemonic":"智能训练=结合AI技术+业务特征制定规范，\"智能\"是关键词"},{"id":230,"type":"single","text":"在 Word 中进行邮件合并操作时，可借助什么来插入邮件模板里的个性化地址块、问候语（）。","options":[{"label":"A","text":"“插入图形”选项"},{"label":"B","text":"“插入超链接”选项"},{"label":"C","text":"“编写和插入域”选项"},{"label":"D","text":"“插入日期和时间”选项"}],"answer":"C","explanation":"使用“邮件”选项卡的“编写和插入域”选项可以选择插入邮件模板中的个性化地址块、问候语等。","mnemonic":"邮件合并插域：用\"编写和插入域\"选项，域=个性化字段"},{"id":231,"type":"single","text":"在数据标注流程的制定中，标注规则的制定是为了达到什么目的（）。","options":[{"label":"A","text":"保护标注人员的权益"},{"label":"B","text":"尽量减少标注成本"},{"label":"C","text":"确保标注结果的准确性和一致性"},{"label":"D","text":"提高标注团队工作效率"}],"answer":"C","explanation":"标注规则的制定是为了确保标注结果的准确性和一致性，使得标注结果具有可比性，有效提高机器学习算法的训练效果","mnemonic":"标注规则=确保准确性+一致性，规则就是为了统一标准"},{"id":232,"type":"single","text":"（）是人机交互发展的第三阶段，该阶段包含了语音识别和虚拟现实技术。","options":[{"label":"A","text":"自然和谐的人机交互（语音、手势、虚拟现实等）"},{"label":"B","text":"触摸屏操作"},{"label":"C","text":"图形用户界面（GUI）"},{"label":"D","text":"命令行界面（CLI）"}],"answer":"A","explanation":"命令行界面是计算机早期的交互方式，用户通过键盘输入命令，计算机进行响应","mnemonic":"人机交互第三阶段=自然和谐（语音+手势+VR），\"三自然\""},{"id":233,"type":"single","text":"在指导初级工处理数据标注问题时，应要求他们遵循下列哪项原则？（）","options":[{"label":"A","text":"标注时可以随意添加或删除标注类别，以方便工作"},{"label":"B","text":"按照标注规范进行标注，确保标注结果准确有用"},{"label":"C","text":"标注结果可以随意更改，只要最终达到要求即可"},{"label":"D","text":"忽略标注质量，以完成标注任务为主"}],"answer":"B","explanation":"初级工在数据标注过程中，应该具备严谨的标注态度和精细的标注能力","mnemonic":"初级工标注要按规范，确保准确有用，不能随意改动"},{"id":234,"type":"single","text":"对聚类分析描述最为精准的是（）。","options":[{"label":"A","text":"聚类分析的核心是建立变量间的回归关系"},{"label":"B","text":"聚类分析的目标是预测未来数据的分类结果"},{"label":"C","text":"聚类分析通过无监督学习将数据划分为相似性高的组别"},{"label":"D","text":"聚类分析需要依赖已知标签的数据进行模型训练"}],"answer":"C","explanation":"聚类分析是一种无监督学习方法，其核心是根据数据间的相似性将数据划分为组别，无需依赖标签或预测未来结果","mnemonic":"聚类=无监督+按相似性分组，没有标签、不做预测"},{"id":235,"type":"single","text":"在 scikit-learn 库中搭建高斯混合模型时，（）类是可供使用的。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"GaussianMixture"},{"label":"C","text":"MultinomialMixture"},{"label":"D","text":"BernoulliMixture"}],"answer":"B","explanation":"在使用scikit-learn库构建高斯混合模型时，应使用GaussianMixture类","mnemonic":"高斯混合模型=GaussianMixture类，名字完全对应\"高斯+混合\""},{"id":236,"type":"single","text":"在 OpenCV 里，用于进行直方图均值计算的函数是（）。","options":[{"label":"A","text":"skimage.transform.flip()"},{"label":"B","text":"cv2.equalizeHist()"},{"label":"C","text":"cv2.flip()"},{"label":"D","text":"cv2.rotate()"}],"answer":"B","explanation":"cv2.equalizeHist()实现直方图均衡化。","mnemonic":"OpenCV直方图均衡化=cv2.equalizeHist()，equalize=均衡"},{"id":237,"type":"single","text":"在 K - 近邻算法中，需要挑选合适的距离度量方式来计算样本间的距离，下列哪种方法并非用于距离度量？（）","options":[{"label":"A","text":"卡方距离"},{"label":"B","text":"马氏距离"},{"label":"C","text":"切比雪夫距离"},{"label":"D","text":"曼哈顿距离"}],"answer":"A","explanation":"在K-近邻算法中，常用的距离度量方法包括欧式距离、曼哈顿距离、切比雪夫距离和马氏距离","mnemonic":"卡方距离不是KNN常用距离度量，KNN用欧曼切马四种距离"},{"id":238,"type":"single","text":"数据仓库和操作性数据库（Operational Database）之间的主要区别在于（）。","options":[{"label":"A","text":"数据类型的支持"},{"label":"B","text":"数据的处理方式"},{"label":"C","text":"数据的存储结构"},{"label":"D","text":"数据的安全性要求"}],"answer":"B","explanation":"数据仓库专注于历史数据分析，而操作性数据库支持日常业务操作，处理方式不同。","mnemonic":"数据仓库vs操作数据库=处理方式不同，一个分析一个操作"},{"id":239,"type":"single","text":"下列哪项不是解决算法过拟合的常用方法（）。","options":[{"label":"A","text":"增加模型层数"},{"label":"B","text":"剪枝"},{"label":"C","text":"正则化"},{"label":"D","text":"交叉验证"}],"answer":"A","explanation":"增加模型层数提高复杂度，加剧过拟合，非解决措施。","mnemonic":"增加模型层数会加剧过拟合，不是解决而是恶化"},{"id":240,"type":"single","text":"关联分析中的 Apriori 算法，属于一种（）。","options":[{"label":"A","text":"聚类算法"},{"label":"B","text":"回归算法"},{"label":"C","text":"分类算法"},{"label":"D","text":"频繁模式挖掘算法"}],"answer":"D","explanation":"Apriori是频繁模式挖掘算法，用于关联规则发现。","mnemonic":"Apriori=频繁模式挖掘算法，\"A先验\"挖掘频繁项集"},{"id":241,"type":"single","text":"在人机交互设计的流程中，对用户的行为、需求、期望等信息进行研究的是（）阶段？","options":[{"label":"A","text":"原型设计"},{"label":"B","text":"信息架构"},{"label":"C","text":"用户需求分析"},{"label":"D","text":"评估测试"}],"answer":"C","explanation":"用户需求分析是人机交互设计流程的第一个阶段，旨在了解用户的需求、期望、目标等信息，以便将这些信息纳入设计中","mnemonic":"用户需求分析=研究用户行为/需求/期望，设计第一步先了解用户"},{"id":242,"type":"single","text":"哪一类交互设备属于语音输入设备？","options":[{"label":"A","text":"手写板"},{"label":"B","text":"麦克风"},{"label":"C","text":"打印机"},{"label":"D","text":"鼠标"}],"answer":"B","explanation":"麦克风将语音转为数字信号，是语音输入设备。","mnemonic":"语音输入设备=麦克风，\"麦\"收声音，鼠标键盘不收音"},{"id":243,"type":"single","text":"以下用于评估 Calinski-Harabasz 指数聚类质量的是（）。","options":[{"label":"A","text":"类内样本间的平均距离与类间样本间的平均距离"},{"label":"B","text":"类间方差与类内方差"},{"label":"C","text":"簇的数量与样本数量"},{"label":"D","text":"轮廓系数的平均值与标准差"}],"answer":"B","explanation":"Calinski-Harabasz指数通过类内协方差最小化和类间协方差最大化评估聚类质量。","mnemonic":"CH指数=类间方差/类内方差，\"间大内小\"聚类好"},{"id":244,"type":"single","text":"下列哪项不属于短时平均能量的主要用途（）。","options":[{"label":"A","text":"作为区分信号帧数的参考"},{"label":"B","text":"作为辅助的特征参数用于语音识别"},{"label":"C","text":"作为区分有声和无声的依据"},{"label":"D","text":"作为区分清音和浊音的特征参数"}],"answer":"A","explanation":"短时平均能量的主要用途如下① 可以作为区分清音和浊音的特征参数","mnemonic":"短时平均能量不用于区分信号帧数，用于区分清浊音和辅助识别"},{"id":245,"type":"single","text":"用于去除椒盐噪声的算法是（）。","options":[{"label":"A","text":"双边滤波"},{"label":"B","text":"高斯滤波"},{"label":"C","text":"均值滤波"},{"label":"D","text":"中值滤波"}],"answer":"D","explanation":"中值滤波能有效去除椒盐噪声。","mnemonic":"中值滤波去椒盐噪声，\"中值\"取中间值排除极端噪点"},{"id":246,"type":"single","text":"在体现 “交替” 关系的状态转换网络中，状态 S2 可通过（）转变为状态 S3。","options":[{"label":"A","text":"产生 G 正常结束事件"},{"label":"B","text":"G0 正常结束事件"},{"label":"C","text":"G1 正常结束事件"},{"label":"D","text":"外部事件0"}],"answer":"B","explanation":"根据“交替”关系的状态转换网络，状态 S2 可以通过 G0 正常结束事件直接转换到状态 S3","mnemonic":"交替关系中S2→S3通过G0正常结束事件，记\"零到三\""},{"id":247,"type":"single","text":"下列属于职业道德所具备特征的是（）。","options":[{"label":"A","text":"实践性、适应性"},{"label":"B","text":"开放性、多样性"},{"label":"C","text":"实践性、继承性"},{"label":"D","text":"职业性、安全性"}],"answer":"C","explanation":"职业道德具有职业性、实践性、继承性和多样性。实践性指道德通过职业行为体现，继承性指核心规范在不同时期被传承。","mnemonic":"职业道德特征=实践性+继承性，口诀\"实继\"（实际继承）"},{"id":248,"type":"single","text":"下列关于留出法的适用条件描述正确的是（ ）。","options":[{"label":"A","text":"适合处理数据量极大且无法完整加载到内存的场景"},{"label":"B","text":"可以通过分层采样保持训练/测试集的数据分布一致性"},{"label":"C","text":"对包含不同类别样本数量的数据集具有天然适应性"},{"label":"D","text":"能有效处理存在大量缺失值的原始数据"}],"answer":"B","explanation":"留出法适用于中小规模数据集，对于极大、缺失或不均衡数据可能效果不佳。","mnemonic":"留出法可通过分层采样保持分布一致性，\"分层\"保\"一致\""},{"id":249,"type":"single","text":"借助 jieba 分词库进行中文分词时，允许自定义词典，其目的是（）。","options":[{"label":"A","text":"提高分词速度"},{"label":"B","text":"增强分词库的分词能力"},{"label":"C","text":"对分词库进行更新和维护"},{"label":"D","text":"指定分词库使用的停用词"}],"answer":"B","explanation":"自定义词典可以增加分词库的词汇量，提高分词的准确性","mnemonic":"jieba自定义词典=增强分词能力，加词典让分词更准"},{"id":250,"type":"single","text":"智慧医疗解决方案中，不包含的技术是哪一项（）。","options":[{"label":"A","text":"物联网"},{"label":"B","text":"大数据"},{"label":"C","text":"人工智能"},{"label":"D","text":"区块链"}],"answer":"D","explanation":"智慧医疗解决方案所包含的技术领域包括人工智能、大数据和物联网","mnemonic":"智慧医疗技术=AI+大数据+物联网，不含区块链"},{"id":251,"type":"single","text":"空间复杂度的指标是（）。","options":[{"label":"A","text":"程序代码行数"},{"label":"B","text":"算法运行所占辅助存储空间"},{"label":"C","text":"数据规模"},{"label":"D","text":"计算机执行时间"}],"answer":"B","explanation":"空间复杂度是指算法执行所需的辅助存储空间与输入规模之间的关系，它包括算法在执行过程中所需的临时存储空间，如局部变量、数据结构、递归栈等的内存占用。","mnemonic":"空间复杂度=算法所占辅助存储空间，\"空间\"对\"存储空间\""},{"id":252,"type":"single","text":"中文分词对哪项任务没有显著影响（）。","options":[{"label":"A","text":"图像处理"},{"label":"B","text":"情感分析"},{"label":"C","text":"命名实体识别"},{"label":"D","text":"文本分类"}],"answer":"A","explanation":"中文分词主要影响文本处理任务，对图像处理无显著影响。","mnemonic":"中文分词对图像处理无影响，分词管文字不管图片"},{"id":253,"type":"single","text":"在可用性设计中，（）原则是指产品要能容纳用户的操作失误，并为用户提供明确的错误信息或恢复方式。","options":[{"label":"A","text":"容错性"},{"label":"B","text":"吸引力"},{"label":"C","text":"灵活性"},{"label":"D","text":"可学习性"}],"answer":"A","explanation":"可学习性指产品应易于新用户学习，使其能够快速掌握使用方法","mnemonic":"容错＝容纳错误＋提供恢复，题目说\"容纳失误\"直指容错性A"},{"id":254,"type":"single","text":"数据整合指的是什么（）。","options":[{"label":"A","text":"从数据中提取有用的信息"},{"label":"B","text":"将数据备份到云存储中"},{"label":"C","text":"将数据从不同数据源整合到一个统一的数据集中"},{"label":"D","text":"将数据转换为图形或图表形式"}],"answer":"C","explanation":"数据整合指将多源数据汇集到统一数据集中。","mnemonic":"数据整合＝多源合一，\"不同数据源→统一数据集\"选C"},{"id":255,"type":"single","text":"图像数据处理流程中的特征提取步骤，能够帮助解决什么问题（）。","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"数据分类"},{"label":"C","text":"数据预处理"},{"label":"D","text":"数据清洗"}],"answer":"B","explanation":"特征提取将原始数据转化为分类可用的特征形式。","mnemonic":"特征提取为分类服务，提取特征→数据分类选B"},{"id":256,"type":"single","text":"使用 jieba 分词时，可用哪种方法添加自定义的分词词典（）。","options":[{"label":"A","text":"jieba.use_dict()"},{"label":"B","text":"jieba.set_dict()"},{"label":"C","text":"jieba.load_dict()"},{"label":"D","text":"jieba.add_word()"}],"answer":"D","explanation":"可以使用`jieba.add_word()`方法来添加自定义分词词典","mnemonic":"jieba添加自定义词用add_word()，\"添加\"对应\"add\"选D"},{"id":257,"type":"single","text":"利用深度学习框架对神经网络展开训练时，以下哪项操作是评估模型性能的标准方式（）。","options":[{"label":"A","text":"model.predict()"},{"label":"B","text":"model.evaluate()"},{"label":"C","text":"model.train()"},{"label":"D","text":"model.compile()"}],"answer":"B","explanation":"model.evaluate()是用来评估模型性能的标准方法。它通常接受测试数据并返回损失值和任何定义的评估指标（如准确率）。","mnemonic":"评估模型性能用evaluate()，evaluate就是\"评估\"选B"},{"id":258,"type":"single","text":"灰度级修正方法能够使（）。","options":[{"label":"A","text":"压缩图像的动态范围"},{"label":"B","text":"增加图像的分辨率"},{"label":"C","text":"图像动态范围加大、对比度扩展、清度增加"},{"label":"D","text":"提高图像质量"}],"answer":"C","explanation":"通过灰度级修正方法可使图像动态范围加大、对比度扩展、清度增加，从而大大改善图像的视觉效果","mnemonic":"灰度级修正三效果：动态范围大、对比度扩、清度增，选C"},{"id":259,"type":"single","text":"关于采样模式的描述，哪一项是不正确的？（）","options":[{"label":"A","text":"采样模式允许输入设备与应用程序独立工作，输入设备持续不断地输入数据。"},{"label":"B","text":"在采样模式下，应用程序需要周期性地读取输入设备的状态"},{"label":"C","text":"采样模式适用于实时性要求高的应用场景，例如视频流输入"},{"label":"D","text":"在采样模式下，应用程序无法处理输入设备的数据，直到输入操作完成"}],"answer":"D","explanation":"选项A正确，采样模式的特点之一就是输入设备与应用程序独立工作，输入设备持续不断地采样数据，应用程序在需要时读取这些数据。选项B正确，采样模式下应用程序定期读取输入设备的状态或数据，应用程序和输入设备是独立运行的。选项C是正确的，采样模式对于实时流式数据处理非常适合，例如视频流和实时传感器数据。选项D不正确，采样模式允许输入设备持续工作，应用程序可以随时读取采样数据，而不需要等待输入操作完成。","mnemonic":"采样模式允许随时读取数据，不必等操作完成，D说\"无法处理直到完成\"错"},{"id":260,"type":"single","text":"下面哪一项不属于 LOTOS 算子的基本操作符（）。","options":[{"label":"A","text":"T1 >> T2（允许 Enabling）"},{"label":"B","text":"T1 * T2（并发 Concurrency）"},{"label":"C","text":"T1 [] T2（选择 Choice）"},{"label":"D","text":"T1 ||| T2（交替 Interleavin）"}],"answer":"B","explanation":"根据LOTOS算符的定义，LOTOS的基本操作符包括以下几种：T1 ||| T2（交替 Interleaving）T1 [] T2（选择 Choice）T1 [> T2（禁止 Deactivation）T1 >> T2（允许 Enabling）","mnemonic":"LOTOS基本算子有允许>>、选择[]、交替|||，没有并发*选B"},{"id":261,"type":"single","text":"在贝叶斯算法里，先验概率与后验概率之间存在着怎样的关系（）。","options":[{"label":"A","text":"先验概率是在已知结果前对未知事件的主观判断，而后验概率是在已知结果后对事件概率的重新评估"},{"label":"B","text":"先验概率是在已知结果后对事件概率的重新评估，而后验概率是在未知结果前对未知事件的主观判断"},{"label":"C","text":"先验概率和后验概率是相互独立的，没有任何关系"},{"label":"D","text":"先验概率和后验概率是近似相等的"}],"answer":"A","explanation":"先验概率是初始主观判断，后验概率是结合数据后的更新评估，两者通过贝叶斯定理关联。","mnemonic":"先验＝事前主观判断，后验＝事后数据更新，\"先前后更\"选A"},{"id":262,"type":"single","text":"下列哪项属于遵章守法的基本要求（）。","options":[{"label":"A","text":"谋取个人利益"},{"label":"B","text":"参与洗钱行为"},{"label":"C","text":"无条件听从上级指挥"},{"label":"D","text":"遵守宪法法律"}],"answer":"D","explanation":"职业守则中的\"遵章守法\"基本要求指的是从业人员应该遵守法律法规和相关规定","mnemonic":"遵章守法＝遵守宪法法律，其他选项都是违法行为选D"},{"id":263,"type":"single","text":"针对时间管理四象限法则中不同活动的效果分析，（）象限所代表的是事情紧急但并不重要。","options":[{"label":"A","text":"第四象限"},{"label":"B","text":"第三象限"},{"label":"C","text":"第二象限"},{"label":"D","text":"第一象限"}],"answer":"B","explanation":"时间管理四象限法则中，第一象限是指重要并且紧急的事情","mnemonic":"四象限：一重急、二重不急、三急不重、四不急不重，\"紧急不重要\"＝第三选B"},{"id":264,"type":"single","text":"下列哪项技术并非智慧医疗的关键技术？","options":[{"label":"A","text":"物联网"},{"label":"B","text":"大数据"},{"label":"C","text":"量子计算"},{"label":"D","text":"人工智能"}],"answer":"C","explanation":"量子计算不是智慧医疗的关键技术。","mnemonic":"智慧医疗关键技术：物联网+大数据+AI，量子计算不在其中选C"},{"id":265,"type":"single","text":"下列哪项是多维度拆解分析方法需要理解的关键词（）。","options":[{"label":"A","text":"纬度"},{"label":"B","text":"解析"},{"label":"C","text":"拆解"},{"label":"D","text":"维系"}],"answer":"C","explanation":"多维度拆解分析的核心是“维度”和“拆解”两个概念。","mnemonic":"多维度拆解分析＝\"拆解\"是关键动作词，选C"},{"id":266,"type":"single","text":"在指导中级工作人员开展文本转写工作的过程中，有哪些关键事项必须加以关注？（）","options":[{"label":"A","text":"转写内容需要与实际发音内容完全一致"},{"label":"B","text":"可以出现修改删除的问题"},{"label":"C","text":"对重复语音内容无需转写"},{"label":"D","text":"对不通顺的语音内容无需转写"}],"answer":"A","explanation":"文本转写需与实际发音一致，保留重复内容。","mnemonic":"文本转写必须与实际发音完全一致，不能删改选A"},{"id":267,"type":"single","text":"在数据标注流程里，标注任务可以划分为哪些阶段（）。","options":[{"label":"A","text":"以上选项均错误"},{"label":"B","text":"数据采集、数据清洗、标注实施"},{"label":"C","text":"标注实施、数据质量审核、提交和汇总"},{"label":"D","text":"需求确认、标注实施、质量审核和评估"}],"answer":"D","explanation":"在数据标注流程中，标注任务应该分为任务需求确认、标注实施、质量审核和评估等阶段，以确保标注结果的准确性和一致性。","mnemonic":"数据标注三阶段：需求确认→标注实施→质量审核评估选D"},{"id":268,"type":"single","text":"支持向量机属于一种（）。","options":[{"label":"A","text":"半监督学习算法"},{"label":"B","text":"强化学习算法"},{"label":"C","text":"非监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"D","explanation":"支持向量机算法是一种监督学习算法，适用于二分类和多分类问题","mnemonic":"SVM支持向量机＝监督学习，需要标签训练选D"},{"id":269,"type":"single","text":"和传统的关系型数据库相比，下列哪项不是 NoSQL 数据库的典型特点（）。","options":[{"label":"A","text":"高可扩展性"},{"label":"B","text":"数据模型灵活多变，不受固定模式限制"},{"label":"C","text":"支持复杂的事务处理和多表连接操作"},{"label":"D","text":"适合处理海量数据和高并发访问"}],"answer":"C","explanation":"NoSQL数据库的主要特点有灵活的数据模型、可扩展性强、高可用性和高并发性。","mnemonic":"NoSQL不擅长复杂事务和多表连接，这是关系型数据库的强项选C"},{"id":270,"type":"single","text":"能够根据数据分析得出的结论，对智能产品的单一功能提出优化方面的需求，这属于哪个步骤？（）","options":[{"label":"A","text":"业务数据质量检测"},{"label":"B","text":"智能系统优化"},{"label":"C","text":"智能系统维护"},{"label":"D","text":"数据归类和定义"}],"answer":"B","explanation":"能够根据数据分析结论对智能产品的单一功能提出优化需求属于智能系统优化环节。","mnemonic":"根据数据分析对功能提优化需求＝智能系统优化选B"},{"id":271,"type":"single","text":"下列哪项方法常被用于中文分词任务（）。","options":[{"label":"A","text":"深度神经网络算法"},{"label":"B","text":"支持向量机算法"},{"label":"C","text":"随机森林算法"},{"label":"D","text":"最大匹配法"}],"answer":"D","explanation":"最大匹配法常用于中文分词任务","mnemonic":"中文分词经典方法＝最大匹配法，\"匹配\"分词选D"},{"id":272,"type":"single","text":"人机交互中的自适应系统能够增强用户体验，下列哪项不属于自适应系统的优势？","options":[{"label":"A","text":"提高任务执行的效率"},{"label":"B","text":"增加系统的复杂性"},{"label":"C","text":"减少用户的操作错误"},{"label":"D","text":"提供个性化的用户体验"}],"answer":"B","explanation":"自适应系统提供个性化体验并提高效率，不提供个性化体验并提高效率，不增加复杂性。","mnemonic":"自适应系统优势是简化而非增加复杂性，\"增加复杂性\"是缺点不是优势选B"},{"id":273,"type":"single","text":"在高维数据中，模型之所以容易出现过拟合，原因是（）。","options":[{"label":"A","text":"数据量不足，无法覆盖所有特征"},{"label":"B","text":"高维数据具有更多的信息量"},{"label":"C","text":"高维数据导致模型变得过于简单"},{"label":"D","text":"高维数据增加了模型复杂度，容易记住噪声而不是数据的真实模式"}],"answer":"D","explanation":"高维数据易导致过拟合，模型过度记忆训练细节，泛化能力下降。","mnemonic":"高维数据过拟合＝维度高→模型复杂→记住噪声，选D"},{"id":274,"type":"single","text":"在 Word 中，若想选中 “邮件” 选项卡，对应的快捷键是（）。","options":[{"label":"A","text":"Ctrl+B"},{"label":"B","text":"Ctrl+M"},{"label":"C","text":"Alt+M"},{"label":"D","text":"Alt+V"}],"answer":"C","explanation":"在进行邮件合并时，若要选择“邮件”选项卡，快捷键是Alt+M","mnemonic":"Word邮件选项卡＝Alt+M，M＝Mail邮件首字母选C"},{"id":275,"type":"single","text":"在关联分析过程中，若支持度低于最小支持度阈值，会出现（）情况。","options":[{"label":"A","text":"该阈值是一个固定值"},{"label":"B","text":"该阈值与关联规则无关"},{"label":"C","text":"该属性组合被认为相关"},{"label":"D","text":"该属性组合被认为不相关"}],"answer":"D","explanation":"最小支持度阈值是用来筛选有意义的属性组合的一个重要参数","mnemonic":"支持度低于阈值＝不够频繁＝不相关，被过滤掉选D"},{"id":276,"type":"single","text":"深度神经网络中，常用于优化训练过程、加快模型收敛速度的算法是哪一种（）。","options":[{"label":"A","text":"随机梯度下降（SGD）"},{"label":"B","text":"支持向量机（SVM）"},{"label":"C","text":"决策树（Decision Tree）"},{"label":"D","text":"K-近邻算法（KNN）"}],"answer":"A","explanation":"随机梯度下降（SGD）是深度学习中常用的优化算法，用于快速收敛神经网络训练。","mnemonic":"深度网络优化训练用SGD随机梯度下降，SVM/KNN/决策树不是优化算法选A"},{"id":277,"type":"single","text":"计算机属于哪一类设备（）。","options":[{"label":"A","text":"固体"},{"label":"B","text":"设备"},{"label":"C","text":"工具"},{"label":"D","text":"机器"}],"answer":"D","explanation":"计算机是一种能按程序自动进行数值和逻辑运算的机器设备。","mnemonic":"计算机＝按程序自动运算的机器，不是工具不是设备选D"},{"id":278,"type":"single","text":"贝叶斯分类器的核心运作原理是以（）为基础的。","options":[{"label":"A","text":"SVM的分类模型"},{"label":"B","text":"逻辑回归的分类模型"},{"label":"C","text":"贝叶斯算法的回归模型"},{"label":"D","text":"贝叶斯定理的分类模型"}],"answer":"D","explanation":"贝叶斯分类器是一种基于贝叶斯定理的分类算法","mnemonic":"贝叶斯分类器＝基于贝叶斯定理的分类模型，名字对应选D"},{"id":279,"type":"single","text":"在 Excel 中，要是想统计工作表中非空单元格的数量，可使用的函数是（）。","options":[{"label":"A","text":"SUMIF"},{"label":"B","text":"SUM"},{"label":"C","text":"COUNT"},{"label":"D","text":"COUNTA"}],"answer":"D","explanation":"COUNTA函数用于统计非空单元格数量，语法支持多参数。","mnemonic":"统计非空单元格＝COUNTA，COUNT只计数字，COUNTA计所有非空选D"},{"id":280,"type":"single","text":"在 ETL 任务调度中，属于调度逻辑中新增的典型策略的是（）。","options":[{"label":"A","text":"数据库索引重建"},{"label":"B","text":"数据加密传输"},{"label":"C","text":"按任务优先级调度"},{"label":"D","text":"数据清洗规则优化"}],"answer":"C","explanation":"调度逻辑中新增的策略包括任务分类、优先级调度、运行时间要求和资源限制","mnemonic":"ETL调度新增策略＝按优先级调度，任务分级执行选C"},{"id":281,"type":"single","text":"下列哪项不属于图像处理的流程（）。","options":[{"label":"A","text":"图像传输"},{"label":"B","text":"图像分割"},{"label":"C","text":"图像增强"},{"label":"D","text":"图像获取"}],"answer":"A","explanation":"图像处理的流程包括图像获取/存储、图像增强/复原、图像分割、图像描述、图像解释","mnemonic":"图像处理流程不含\"图像传输\"，传输是通信不是处理选A"},{"id":282,"type":"single","text":"使用 OpenCV 库的 imread () 函数读取图像时，能够返回原始图像所包含的 alpha 通道的是（）。","options":[{"label":"A","text":"cv.IMREAD_GRAYSCALE"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"Noneoftheabove"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"B","explanation":"使用cv.IMREAD_UNCHANGED可以返回原始图像，包含的alpha通道","mnemonic":"IMREAD_UNCHANGED保留alpha通道，\"不变\"＝原样保留选B"},{"id":283,"type":"single","text":"当中级工作人员需要标注图像中物体的关键点时，有哪些方法能用来确定这些关键点的具体位置？（）","options":[{"label":"A","text":"分割标注"},{"label":"B","text":"区域标注"},{"label":"C","text":"边界框标注"},{"label":"D","text":"关键点标注"}],"answer":"D","explanation":"关键点标注可以标记出图像中关键点的位置，如人脸关键点。","mnemonic":"标注关键点位置＝关键点标注法，名称直接对应选D"},{"id":284,"type":"single","text":"下列哪个概念不在初级知识体系的范畴内？（）","options":[{"label":"A","text":"智能系统基础"},{"label":"B","text":"数据标注"},{"label":"C","text":"自然语言处理"},{"label":"D","text":"数据采集"}],"answer":"C","explanation":"数据审核不属于初级知识体系涉及到的概念","mnemonic":"自然语言处理NLP不在初级知识体系中，属于高级内容选C"},{"id":285,"type":"single","text":"逻辑回归中 sigmoid 函数的功能是（）。","options":[{"label":"A","text":"将线性组合输出值映射到0到1之间"},{"label":"B","text":"将线性组合输入值映射到0到1之间"},{"label":"C","text":"将线性组合输入值映射到负无穷到正无穷之间"},{"label":"D","text":"将线性组合输出值映射到负无穷到正无穷之间"}],"answer":"A","explanation":"sigmoid函数将线性输出映射到(0,1)区间，输出可解释为概率。","mnemonic":"sigmoid将输出映射到0-1之间，输出→概率区间选A"},{"id":286,"type":"single","text":"根据《计算机软件保护条例》，软件著作权的保护范围不延伸至（）。","options":[{"label":"A","text":"软件的功能描述文档"},{"label":"B","text":"开发软件所用的思想"},{"label":"C","text":"软件的程序代码"},{"label":"D","text":"软件开发者的署名权"}],"answer":"B","explanation":"软件著作权不保护开发所用的思想、处理过程等。","mnemonic":"软件著作权不保护思想，只保护表达形式＝代码和文档选B"},{"id":287,"type":"single","text":"智慧医疗的目标有哪些（）。","options":[{"label":"A","text":"限制病人看病的渠道"},{"label":"B","text":"增加医疗资源消耗"},{"label":"C","text":"增加医疗成本"},{"label":"D","text":"提高医疗效率"}],"answer":"D","explanation":"智慧医疗解决方案的主要目的是提高医疗效率，利用智能化的技术和系统来处理医疗信息和数据，提高医疗机构和医生的工作效率，同时改善病人的就医体验和治疗效果","mnemonic":"智慧医疗目标＝提高医疗效率，不是增加成本或限制渠道选D"},{"id":288,"type":"single","text":"随机森林算法中 “随机” 一词的含义是（）。","options":[{"label":"A","text":"随机选择训练样本子集和特征子集"},{"label":"B","text":"随机忽略部分特征的重要性"},{"label":"C","text":"随机选择决策树节点划分特征"},{"label":"D","text":"随机选择决策树节点划分阈值"}],"answer":"A","explanation":"随机森林的“随机”体现在Bootstrap抽样和随机特征选择，增强多样性，减少过拟合。","mnemonic":"随机森林的\"随机\"＝随机选样本子集+随机选特征子集，双随机选A"},{"id":289,"type":"single","text":"在 Python 环境中借助 scikit-learn 库搭建随机森林分类器时，能用哪个（）函数来创建随机森林模型？","options":[{"label":"A","text":"DecisionTreeRegressor()"},{"label":"B","text":"DecisionTreeClassifier()"},{"label":"C","text":"RandomForestClassifier()"},{"label":"D","text":"RandomForestRegressor()"}],"answer":"C","explanation":"在 scikit-learn 库中，用于构建随机森林分类器的函数是 RandomForestClassifier()","mnemonic":"随机森林分类器＝RandomForestClassifier()，名字直译选C"},{"id":290,"type":"single","text":"下列哪一种方法能够有效地增进人机交互的用户体验？（）","options":[{"label":"A","text":"增加系统的复杂度"},{"label":"B","text":"增加交互的难度"},{"label":"C","text":"增加反馈的及时性和准确性"},{"label":"D","text":"增加交互的模糊性"}],"answer":"C","explanation":"及时准确的反馈能有效提升人机交互的用户体验。","mnemonic":"提升用户体验＝及时准确反馈，反馈是交互的灵魂选C"},{"id":291,"type":"single","text":"在防止模型过拟合时，正则化所起到的主要作用是（）。","options":[{"label":"A","text":"减少数据中的噪声"},{"label":"B","text":"提高模型的训练速度"},{"label":"C","text":"限制模型复杂度"},{"label":"D","text":"增加训练数据量"}],"answer":"C","explanation":"正则化通过对模型参数施加约束，减少模型复杂度，从而有效防止过拟合。","mnemonic":"正则化防过拟合＝限制模型复杂度，给参数加约束选C"},{"id":292,"type":"single","text":"下列哪项不属于逻辑树的种类（）。","options":[{"label":"A","text":"“What？”树"},{"label":"B","text":"“Why？”树"},{"label":"C","text":"“Where？”树"},{"label":"D","text":"“How？”树"}],"answer":"C","explanation":"逻辑树分为“What?”树（要素分解）、“Why?”树（原因分析）和“How?”树（解决方案）。","mnemonic":"逻辑树三种：What树、Why树、How树，没有Where树选C"},{"id":293,"type":"single","text":"除了支持度和置信度，下列哪项（）也是关联规则的评估指标。","options":[{"label":"A","text":"互信息"},{"label":"B","text":"准确性"},{"label":"C","text":"提升度"},{"label":"D","text":"吸引度"}],"answer":"C","explanation":"除了支持度和置信度外，还包括提升度（Lift）评估指标。准确性是分类模型的评估指标，互信息是衡量聚类结果与真实标签之间的信息共享程度。而吸引度不属于评估指标。","mnemonic":"关联规则三指标：支持度+置信度+提升度Lift选C"},{"id":294,"type":"single","text":"若要修改幻灯片母版的背景样式，可通过什么方式实现（）。","options":[{"label":"A","text":"在“幻灯片母版”选项卡的“背景”选项中选择“背景样式”，然后选择需要的颜色或图片"},{"label":"B","text":"在“插入”选项卡中选择“背景”，然后选择需要的样式"},{"label":"C","text":"在“格式”选项卡中选择“背景”，然后选择需要的样式"},{"label":"D","text":"在“视图”选项卡中选择“母版视图”，然后选择“背景”"}],"answer":"A","explanation":"修改幻灯片母版背景需在“幻灯片母版”选项卡的“背景”选项中设置颜色或图片。","mnemonic":"修改母版背景＝在\"幻灯片母版\"选项卡的\"背景\"中设置选A"},{"id":295,"type":"single","text":"智能系统在教育领域的功能中，不包含下列哪项？","options":[{"label":"A","text":"提供个性化学习"},{"label":"B","text":"智能辅助教学"},{"label":"C","text":"智能病例诊断"},{"label":"D","text":"智能辅助校园管理"}],"answer":"C","explanation":"智能系统在教育领域的作用不包括智能病例诊断。","mnemonic":"教育领域不含\"智能病例诊断\"，病例诊断属于医疗领域选C"},{"id":296,"type":"single","text":"在 Python 中，（）库常被用于进行图像分割。","options":[{"label":"A","text":"TensorFlow"},{"label":"B","text":"Matplotlib"},{"label":"C","text":"OpenCV"},{"label":"D","text":"NumPy"}],"answer":"C","explanation":"OpenCV是一个广泛使用的计算机视觉库，提供了许多图像处理和分析的功能，其中包括图像分割。","mnemonic":"Python图像分割常用OpenCV库，CV＝Computer Vision选C"},{"id":297,"type":"single","text":"在趋势分析法中，常用于展示数据趋势的是（）。","options":[{"label":"A","text":"柱状图"},{"label":"B","text":"散点图"},{"label":"C","text":"折线图"},{"label":"D","text":"饼图"}],"answer":"C","explanation":"折线图常用于展示数据的趋势，通过将数据点用折线连接起来，可以清晰地观察数据的变化趋势。","mnemonic":"展示数据趋势＝折线图，折线连点看走势选C"},{"id":298,"type":"single","text":"人工与智能之间的交互方式，不包含下列哪一项？","options":[{"label":"A","text":"只能收到指令，无法回应"},{"label":"B","text":"手势识别"},{"label":"C","text":"视觉图像识别"},{"label":"D","text":"自然语言对话"}],"answer":"A","explanation":"人工和智能的交互方式可以是多种形式，如自然语言对话、手势识别、视觉图像识别、音频识别等","mnemonic":"人机交互方式含对话、手势、视觉，不含\"只收不回\"单向模式选A"},{"id":299,"type":"single","text":"决策树算法属于一种（）。","options":[{"label":"A","text":"强化学习算法"},{"label":"B","text":"半监督学习算法"},{"label":"C","text":"无监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"D","explanation":"决策树是一种监督学习算法，利用训练数据集构建决策树，对新的数据进行分类","mnemonic":"决策树＝监督学习算法，需要标签数据训练分类选D"},{"id":300,"type":"single","text":"在人机交互的多种任务分析手段中，（）主要用于刻画系统里不同用户角色和系统功能之间的交互关联。","options":[{"label":"A","text":"工序约束陈述"},{"label":"B","text":"用例图"},{"label":"C","text":"协作图"},{"label":"D","text":"顺序图"}],"answer":"B","explanation":"用例图描述用户角色与系统功能的交互关系。","mnemonic":"用例图刻画角色与功能的交互关联，\"用例\"对\"用户\""},{"id":301,"type":"single","text":"对于 “用户” 在产品设计中的定义，下面哪一项的描述最为精准？（）","options":[{"label":"A","text":"用户是指任何参与产品设计的人员，不一定是产品的最终使用者。"},{"label":"B","text":"用户是使用产品的人，但不一定需要与产品产生交互，只要购买并拥有产品即可。"},{"label":"C","text":"用户是产品的最终使用者，设计应以他们的需求和体验为中心，确保产品满足他们的使用场景。"},{"label":"D","text":"用户是产品的技术支持人员，他们的工作主要是保障产品的正常运作，设计过程不需要考虑他们的需求。"}],"answer":"C","explanation":"用户是产品的最终使用者，设计应以他们的需求和体验为中心。","mnemonic":"用户=最终使用者，设计以用户体验为中心，排除设计者和技术人员"},{"id":302,"type":"single","text":"（）可以让输入设备和应用程序各自独立运行，输入设备在后台持续采集数据，应用程序在有需要时再读取这些数据。","options":[{"label":"A","text":"同步模式"},{"label":"B","text":"事件模式"},{"label":"C","text":"采样模式"},{"label":"D","text":"请求模式"}],"answer":"C","explanation":"采样模式下输入设备持续采集，应用定期读取。","mnemonic":"采样模式=后台采集+按需读取，\"采样\"谐音\"菜样\"随时点菜"},{"id":303,"type":"single","text":"下列选项中，哪项是留一法的具体步骤（）。","options":[{"label":"A","text":"将数据集中的每个样本随机选取一部分作为测试集，其余样本作为训练集"},{"label":"B","text":"将数据集中的每个样本依次作为测试集，其余样本作为训练集"},{"label":"C","text":"将数据集分为k个重叠的子集"},{"label":"D","text":"将数据集分为k个互不重叠的子集"}],"answer":"B","explanation":"留一法每次取一个样本作测试集，其余为训练集。","mnemonic":"留一法=每次留一个当测试，其余训练，逐个轮流"},{"id":304,"type":"single","text":"在 ETL 任务流程里，数据抽取（Extraction）的核心目标是（）。","options":[{"label":"A","text":"将数据加载到目标系统中"},{"label":"B","text":"清洗和校验数据的完整性"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中提取数据"}],"answer":"D","explanation":"数据抽取是ETL任务流程的第一步，其主要目的是从源系统中提取数据，以便后续处理和加载到目标系统中","mnemonic":"ETL中E是Extraction抽取，核心就是从源系统提取数据"},{"id":305,"type":"single","text":"哪一项内容体现了业务数据主要流程中对数据质量管理的描述？","options":[{"label":"A","text":"数据的传输和共享"},{"label":"B","text":"数据的清洗和预处理"},{"label":"C","text":"数据的分析和解释"},{"label":"D","text":"数据的收集和存储"}],"answer":"B","explanation":"数据的清洗和预处理是业务数据主要流程中涉及数据质量管理的步骤，它包括识别和纠正数据中的错误、缺失或不一致之处","mnemonic":"数据质量管理=清洗+预处理，\"质量\"靠\"洗\"出来"},{"id":306,"type":"single","text":"存储器具有怎样的功能（）。","options":[{"label":"A","text":"存储，并能在计算机运行过程中高速、自动地完成程序或数据的存取"},{"label":"B","text":"控制计算机的运行"},{"label":"C","text":"执行算术和逻辑运算"},{"label":"D","text":"控制输出操作"}],"answer":"A","explanation":"存储器的主要功能是存储程序和各种数据信息，并能在计算机运行过程中高速、自动地完成程序或数据的存取。","mnemonic":"存储器=存储+高速自动存取，记住\"存\"字当头"},{"id":307,"type":"single","text":"列族数据库的核心特点是（）。","options":[{"label":"A","text":"基于内存的键值对高速读写"},{"label":"B","text":"以节点和边表示复杂关系"},{"label":"C","text":"按列簇组织数据，支持动态列扩展"},{"label":"D","text":"通过表结构（行和列）存储数据"}],"answer":"C","explanation":"列族数据库通过列簇动态扩展列，适合海量数据存储和高吞吐场景；通过表结构（行和列）存储数据是关系型数据库的特点；以节点和边表示复杂关系是图数据库的特点；基于内存的键值对高速读写是键值存储（如Redis）的特点","mnemonic":"列族数据库按列簇组织+动态列扩展，\"列族\"关键词对应\"列簇\""},{"id":308,"type":"single","text":"下列哪项方法可以消除加性噪声和通道畸变（）。","options":[{"label":"A","text":"语音增强"},{"label":"B","text":"窄带滤波"},{"label":"C","text":"预加重滤波"},{"label":"D","text":"时频分析"}],"answer":"A","explanation":"语音增强技术可消除环境噪声和通道畸变，提高语音清晰度。","mnemonic":"语音增强消除加性噪声和通道畸变，\"增强\"语音质量"},{"id":309,"type":"single","text":"下列哪一项不属于计算机主机的硬件组成部分（）。","options":[{"label":"A","text":"硬盘"},{"label":"B","text":"操作系统"},{"label":"C","text":"内存"},{"label":"D","text":"网卡"}],"answer":"B","explanation":"计算机主机指计算机硬件系统中用于放置主板及其他主要部件的容器","mnemonic":"操作系统是软件不是硬件，排除法选B"},{"id":310,"type":"single","text":"文件系统是操作系统用来对磁盘或分区上的文件进行组织的方式。","options":[{"label":"A","text":"存储设备，常见为硬盘"},{"label":"B","text":"CPU"},{"label":"C","text":"内存"},{"label":"D","text":"显卡"}],"answer":"A","explanation":"文件系统是操作系统中用于管理存储设备上文件组织的方法和数据结构，负责文件的存储、检索和管理。","mnemonic":"文件系统管理的是存储设备（硬盘），不是CPU/内存/显卡"},{"id":311,"type":"single","text":"在 UAN 模型对任务的描述中，（）不在其常用内容之列。","options":[{"label":"A","text":"算法性能"},{"label":"B","text":"界面状态"},{"label":"C","text":"界面反馈"},{"label":"D","text":"用户行为"}],"answer":"A","explanation":"UAN模型描述用户行为、界面反馈和状态，不涉及算法界面反馈和状态，不涉及算法性能。","mnemonic":"UAN模型描述用户行为和界面状态反馈，不涉及算法性能"},{"id":312,"type":"single","text":"在以下聚类方法中，通过计算数据点的局部密度来识别簇结构的是（）。","options":[{"label":"A","text":"层次聚类"},{"label":"B","text":"DBSCAN"},{"label":"C","text":"K-means聚类"},{"label":"D","text":"BIRCH"}],"answer":"B","explanation":"DBSCAN基于局部密度连接区域形成簇，适用于密度不均的数据。","mnemonic":"DBSCAN基于密度聚类，\"D=Density密度\"是关键"},{"id":313,"type":"single","text":"下列哪项不属于中级知识体系里的基础概念？（）","options":[{"label":"A","text":"数据拆解基础方法"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"业务数据质量检测"},{"label":"D","text":"智能系统优化"}],"answer":"B","explanation":"自然语言处理不属中级知识体系基础概念。","mnemonic":"自然语言处理NLP属于高级内容，不在中级基础概念中"},{"id":314,"type":"single","text":"在 LOTOS 模型中，（）用于表示 “两个进程同时发生特定事件”。","options":[{"label":"A","text":"T1 >> T2"},{"label":"B","text":"T1 |[a1,...,an]| T2"},{"label":"C","text":"T1 [] T2"},{"label":"D","text":"T1 ||| T2"}],"answer":"B","explanation":"T1 |[a1,…,an]| T2表示两进程同步发生特定事件。","mnemonic":"T1|[a1,...,an]|T2表示两进程同步特定事件，方括号=同步约定"},{"id":315,"type":"single","text":"下列选项中，不适用于数据存储与管理的是（）。","options":[{"label":"A","text":"nosql数据库"},{"label":"B","text":"Flume"},{"label":"C","text":"关系数据库"},{"label":"D","text":"分布式文件系统"}],"answer":"B","explanation":"Flume是日志采集工具，不用于数据存储管理。","mnemonic":"Flume是日志采集工具不存储数据，\"水槽\"只管传输不管存"},{"id":316,"type":"single","text":"下列哪一种交互方式属于第二代人机交互（GUI）技术中常见的，且在如今仍被广泛使用？（）","options":[{"label":"A","text":"语音命令"},{"label":"B","text":"虚拟助手"},{"label":"C","text":"鼠标控制"},{"label":"D","text":"面部识别"}],"answer":"C","explanation":"语音命令属于第三代人机交互技术，通常与自然语言处理和语音识别相关，而不是基于图形用户界面的交互方式。鼠标控制是第二代人机交互的标志性技术之一，早期的计算机操作主要依赖鼠标与图形用户界面（GUI）进行交互。面部识别是第三代人机交互的技术，属于生物识别范畴，不属于第二代交互方式。","mnemonic":"鼠标控制是第二代GUI的标志性技术，至今仍广泛使用"},{"id":317,"type":"single","text":"下列哪项方法可以直接降低欠拟合的风险（）。","options":[{"label":"A","text":"迁移学习"},{"label":"B","text":"减少正则化系数"},{"label":"C","text":"Dropout"},{"label":"D","text":"增加正则化系数"}],"answer":"B","explanation":"减少正则化系数允许模型变得更加复杂，从而能够更好地拟合训练数据，可以直接解决欠拟合问题","mnemonic":"减少正则化系数降低欠拟合，正则化少=模型更复杂=拟合更好"},{"id":318,"type":"single","text":"文本向量化指的是什么（）。","options":[{"label":"A","text":"将文本数据转换为视频形式"},{"label":"B","text":"将文本数据转换为音频形式"},{"label":"C","text":"将文本数据转换为图片形式"},{"label":"D","text":"将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程。"}],"answer":"D","explanation":"文本向量化是指将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程","mnemonic":"文本向量化=自然语言编码为语义向量，\"向量\"=数学表示"},{"id":319,"type":"single","text":"下列哪项不属于引发算法欠拟合的原因（）。","options":[{"label":"A","text":"过度训练"},{"label":"B","text":"模型过于简单"},{"label":"C","text":"特征选择不当"},{"label":"D","text":"数据样本量过少"}],"answer":"A","explanation":"算法欠拟合主要是由于数据样本量过少、特征选择不当以及模型过于简单等因素引起的","mnemonic":"过度训练导致过拟合而非欠拟合，欠拟合是模型简单/数据少/特征差"},{"id":320,"type":"single","text":"下列哪项不是职业道德的特征（）。","options":[{"label":"A","text":"特殊性"},{"label":"B","text":"多样性"},{"label":"C","text":"继承性"},{"label":"D","text":"职业性"}],"answer":"A","explanation":"职业道德的基本特性包含职业性、实践性、继承性和多样性","mnemonic":"职业道德特征：职业性、实践性、继承性、多样性，无\"特殊性\""},{"id":321,"type":"single","text":"智慧交通解决方案所用到的技术手段里，不包含（）。","options":[{"label":"A","text":"人工智能"},{"label":"B","text":"大数据"},{"label":"C","text":"云计算"},{"label":"D","text":"区块链"}],"answer":"D","explanation":"智慧交通主要利用人工智能、大数据和云计算技术，区块链技术非其核心手段。","mnemonic":"智慧交通用AI+大数据+云计算，区块链不在其中"},{"id":322,"type":"single","text":"对比分析的核心目的在于（）。","options":[{"label":"A","text":"寻找因果关系"},{"label":"B","text":"描述数据分布"},{"label":"C","text":"探索相关性"},{"label":"D","text":"比较差异"}],"answer":"D","explanation":"对比分析核心在于比较差异，揭示数据变化规律，常用于实验组对照组或时间序列数据。","mnemonic":"对比分析核心目的是比较差异，\"对比\"即\"比差异\""},{"id":323,"type":"single","text":"数据标注工作中，不同标注者之间的一致性意味着什么？（）","options":[{"label":"A","text":"标注者的职业背景是否一致"},{"label":"B","text":"标注者标注过程中的注意力是否一致"},{"label":"C","text":"不同标注者在同一数据集上的标注结果是否一致"},{"label":"D","text":"标注者对于标注任务的理解是否一致"}],"answer":"C","explanation":"数据标注中标注者间的一致性是指不同标注者在同一数据集上的标注结果是否一致","mnemonic":"标注者一致性=不同人标同一数据结果是否一致"},{"id":324,"type":"single","text":"AIDA 模型中的字母 D 代表的是（）。","options":[{"label":"A","text":"Disappointment（失望）"},{"label":"B","text":"Disgust（厌恶）"},{"label":"C","text":"Delight（高兴）"},{"label":"D","text":"Desire（欲望）"}],"answer":"D","explanation":"AIDA模型中D代表Desire（激发欲望）。","mnemonic":"AIDA中D=Desire欲望，注意引起兴趣激发欲望促成行动"},{"id":325,"type":"single","text":"按照 ETL 任务的生命周期，其正确的阶段顺序为（）。","options":[{"label":"A","text":"任务生成→接受调度→运行→完成"},{"label":"B","text":"任务生成→运行→接受调度→完成"},{"label":"C","text":"接受调度→任务生成→运行→完成"},{"label":"D","text":"任务生成→运行→完成→接受调度"}],"answer":"A","explanation":"ETL任务生命周期包括任务生成、调度、运行和完成四个阶段。","mnemonic":"ETL生命周期：生成→调度→运行→完成，先生后调再运行"},{"id":326,"type":"single","text":"在 ETL 流程中，“抽取”（Extraction）这一步的主要目的是（）。","options":[{"label":"A","text":"对数据进行清洗和校验"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"D","explanation":"ETL中“抽取”步骤从源系统选取目标所需数据。","mnemonic":"ETL抽取=从源系统选所需数据，\"抽取\"就是\"选数据\""},{"id":327,"type":"single","text":"聚类分析具备（）的功能。","options":[{"label":"A","text":"将数据分为有序的组别"},{"label":"B","text":"通过建立回归模型进行预测"},{"label":"C","text":"寻找数据对象之间的内在结构和关系"},{"label":"D","text":"直接对数据进行特征选择和降维"}],"answer":"C","explanation":"聚类分析是无监督学习，用于将数据分组为相似簇，发现数据内在结构。","mnemonic":"聚类分析发现数据内在结构和关系，无监督找相似"},{"id":328,"type":"single","text":"关于算法复杂度的类型，下列描述正确的是（）。","options":[{"label":"A","text":"O(n²) 表示算法的时间复杂度随着数据规模的平方增加，通常用于描述冒泡排序、插入排序等算法的最坏情况"},{"label":"B","text":"O(log n) 描述算法的时间复杂度与数据规模呈线性关系，常见于遍历操作"},{"label":"C","text":"O(1) 描述算法的时间复杂度与数据规模有关，常见于访问数组元素的操作"},{"label":"D","text":"O(n) 描述算法的时间复杂度与数据规模的对数成正比，常见于排序算法"}],"answer":"A","explanation":"O(n²) 是描述算法的平方时间复杂度，常见于冒泡排序、选择排序等算法，表示算法的时间复杂度随着数据规模的平方增长，适用于有嵌套循环的情况。O(log n) 表示算法的时间复杂度与数据规模的对数成正比，通常用于分治算法，如二分查找。线性关系应该是 O(n)。O(1) 表示常数时间复杂度，表示算法的运行时间是固定的，不受数据量大小影响。O(n) 描述的是线性时间复杂度，表示算法的时间复杂度与数据规模成正比，不是对数关系。","mnemonic":"O(n²)对应冒泡/插入排序最坏情况，平方=双重循环"},{"id":329,"type":"single","text":"问卷调查法是收集用户看法和反馈时常用的手段，其中（）类型的调查问卷更容易获取真实且深入的信息。","options":[{"label":"A","text":"开放式问卷"},{"label":"B","text":"单选题问卷"},{"label":"C","text":"多选题问卷"},{"label":"D","text":"排序题问卷"}],"answer":"A","explanation":"开放式问卷允许用户自由表达自己的意见，不受选项限制，因此更容易获得更全面、真实的反馈，能够深入了解用户的真实感受和需求。单选题问卷通过限制用户选择固定选项，虽然能便于数据的量化，但可能无法准确反映用户的真实想法和多样化需求，容易产生偏差。与单选题类似，多选题问卷虽然允许选择多个选项，但仍然是在预设的框架内，无法深入捕捉用户的真实反馈，尤其是当问题设计不够全面时。排序题问卷通过让用户对选项进行排序来获取优先级信息，但这种方法也存在一定局限性，因为它可能会简化用户的复杂思维过程，无法反映他们的全面意见。参考资料：《人机交互与界面设计》（李靖、韩金华编）P146。","mnemonic":"开放式问卷获取真实深入信息，自由表达不受选项限制"},{"id":330,"type":"single","text":"中文分词是将一段中文文本分割成词语的过程，下列算法中不适合用于中文分词的是（）。","options":[{"label":"A","text":"决策树"},{"label":"B","text":"隐马尔可夫模型"},{"label":"C","text":"最大熵模型"},{"label":"D","text":"N元语法模型"}],"answer":"A","explanation":"决策树是一种监督学习算法，主要用于分类和回归任务，而不是专门用于中文分词","mnemonic":"决策树不适合中文分词，分词用HMM/最大熵/N元语法"},{"id":331,"type":"single","text":"NoSQL 数据库的主要特点包括（）。","options":[{"label":"A","text":"严格的事务支持"},{"label":"B","text":"结构化数据存储"},{"label":"C","text":"高可扩展性"},{"label":"D","text":"强一致性"}],"answer":"C","explanation":"NoSQL数据库的主要特点有灵活的数据模型、可扩展性强、高可用性和高并发性。","mnemonic":"NoSQL主要特点是高可扩展性，灵活+可扩展+高可用"},{"id":332,"type":"single","text":"留出法、交叉验证法和自助法均为常用的模型评估方法，其中自助法的优势在于（）。","options":[{"label":"A","text":"可以用于小样本数据集"},{"label":"B","text":"可以提高模型的稳定性"},{"label":"C","text":"可以处理缺失值"},{"label":"D","text":"可以有效避免过拟合"}],"answer":"A","explanation":"自助法通过重复抽样充分利用小样本数据，提升模型评估可靠性。","mnemonic":"自助法优势在于可用于小样本数据集，重复抽样充分利用小数据"},{"id":333,"type":"single","text":"在逻辑回归算法里，用来把连续的输出转化为二元分类结果的函数是（）。","options":[{"label":"A","text":"指数函数"},{"label":"B","text":"对数几率函数"},{"label":"C","text":"平方函数"},{"label":"D","text":"线性函数"}],"answer":"B","explanation":"在逻辑回归算法中，通常使用sigmoid函数（也叫对数几率函数）将连续的输出转化为二元分类的结果","mnemonic":"对数几率函数(sigmoid)将连续输出变为二分类，逻辑回归核心函数"},{"id":334,"type":"single","text":"AARRR 模型最后两个 \"RR\" 代表的是（）。","options":[{"label":"A","text":"代表重复和口碑"},{"label":"B","text":"代表收入和传播"},{"label":"C","text":"代表口碑和留存"},{"label":"D","text":"代表收入和留存"}],"answer":"B","explanation":"AARRR模型中的最后两个\"RR\"代表的是\"Revenue\"（收入）和\"Refer\"（传播）","mnemonic":"AARRR最后两个RR=Revenue收入+Refer传播，\"赚钱传播\""},{"id":335,"type":"single","text":"在 Word 文档中，能为选中文本应用粗体格式的快捷键是（）。","options":[{"label":"A","text":"Ctrl+V"},{"label":"B","text":"Ctrl+C"},{"label":"C","text":"Ctrl+F2"},{"label":"D","text":"Ctrl+B"}],"answer":"D","explanation":"对选中文本应用粗体格式使用快捷键Ctrl+B","mnemonic":"Ctrl+B设置粗体，B=Bold粗体首字母"},{"id":336,"type":"single","text":"有关职业道德的如下说法，正确的是（）。","options":[{"label":"A","text":"职业道德只需要遵守当地法律法规即可"},{"label":"B","text":"职业道德是一定职业群体内共同遵守的规范"},{"label":"C","text":"职业道德仅仅是个人的品行修养问题"},{"label":"D","text":"只有医生和律师等特殊职业需要遵守职业道德"}],"answer":"B","explanation":"职业道德是职业群体的共同准则，它对从事该职业的人员的行为、态度、品质等方面提出了具体的要求","mnemonic":"职业道德是职业群体共同遵守的规范，非个人品行而是群体准则"},{"id":337,"type":"single","text":"下列哪项属于 ETL 数据整合工具的主要特性之一（）。","options":[{"label":"A","text":"数据安全和权限管理功能"},{"label":"B","text":"数据清洗和转换功能"},{"label":"C","text":"数据可视化和报表生成功能"},{"label":"D","text":"数据备份和恢复功能"}],"answer":"B","explanation":"ETL（抽取、转换、加载）数据整合工具的主要任务是从不同的数据源中抽取数据，进行清洗和转换，最后加载到目标数据仓库或目标系统中","mnemonic":"ETL工具主要特性是数据清洗和转换功能，ETL的T就是Transform转换"},{"id":338,"type":"single","text":"哪项的时间波形具有一定的周期性（）。","options":[{"label":"A","text":"悦音"},{"label":"B","text":"噪音"},{"label":"C","text":"清音"},{"label":"D","text":"浊音"}],"answer":"D","explanation":"浊音的时间波形呈现出一定的周期性，波形之间相似性较好","mnemonic":"浊音时间波形有周期性，\"浊\"音波形规律重复"},{"id":339,"type":"single","text":"下列哪项是能够实现手写输入的交互设备？","options":[{"label":"A","text":"摄像头"},{"label":"B","text":"触摸屏"},{"label":"C","text":"鼠标"},{"label":"D","text":"扫描仪"}],"answer":"B","explanation":"触摸屏支持手写输入，其他设备如摄像头、鼠标和扫描仪不具备此功能。","mnemonic":"触摸屏支持手写输入，用手指或触控笔直接写"},{"id":340,"type":"single","text":"从网络上采集数据时，通常需要经历哪些步骤？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"采集环境测试"},{"label":"C","text":"网站的源代码分析"},{"label":"D","text":"确定数据采集的目标网站"}],"answer":"A","explanation":"网络数据采集的一般步骤包括确定数据采集的目标网站、网站的源代码分析、编写代码、采集环境测试、数据采集、数据存储","mnemonic":"网络数据采集步骤全包括：确定网站+源码分析+环境测试，全选A"},{"id":341,"type":"single","text":"图像分割可通过什么方式来实现（）。","options":[{"label":"A","text":"图像融合"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"边缘锯齿"},{"label":"D","text":"直方图的二值化方法"}],"answer":"D","explanation":"直方图二值化（如Otsu法）可用于图像分割。","mnemonic":"直方图二值化方法可实现图像分割，如Otsu阈值法"},{"id":342,"type":"single","text":"数据库管理系统能够实现多用户并发访问功能，这表示（）。","options":[{"label":"A","text":"多个用户可以同时访问同一个数据库"},{"label":"B","text":"多个数据库可以同时访问同一个用户"},{"label":"C","text":"多个用户可以同时访问不同的数据库"},{"label":"D","text":"多个数据库可以同时访问不同的用户"}],"answer":"A","explanation":"数据库管理系统支持多用户同时访问同一数据库，确保数据操作无冲突。","mnemonic":"多用户并发访问=多人同时访问同一数据库，\"并发\"=同时同库"},{"id":343,"type":"single","text":"根据国际标准，云计算的部署模型中不包含的是（）。","options":[{"label":"A","text":"混合云"},{"label":"B","text":"公共云"},{"label":"C","text":"计算服务"},{"label":"D","text":"私有云"}],"answer":"C","explanation":"国际标准（如NIST SP 800-145）定义的云计算部署模型包括：公有云（Public Cloud）、私有云（Private Cloud）、社区云（Community Cloud）和混合云（Hybrid Cloud）","mnemonic":"计算服务不是云部署模型，部署模型有公有/私有/混合/社区云"},{"id":344,"type":"single","text":"国家规定，劳动者每日的工作时长不超过（）小时，平均每周的工作时长不超过四十四小时。","options":[{"label":"A","text":"14"},{"label":"B","text":"12"},{"label":"C","text":"10"},{"label":"D","text":"8"}],"answer":"D","explanation":"根据《中华人民共和国劳动法》第三十六条规定，国家实行劳动者每日工作时间不超过八小时、平均每周工作时间不超过四十四小时的工时制度","mnemonic":"每日工作不超过8小时，\"朝九晚五\"八小时制"},{"id":345,"type":"single","text":"librosa.display 与 librosa 之间的关系是（）。","options":[{"label":"A","text":"不同的两个模型"},{"label":"B","text":"相同的两个模型"},{"label":"C","text":"相同用法"},{"label":"D","text":"用法不同"}],"answer":"A","explanation":"librosa.display和librosa是两个独立模块，需分别导入使用。","mnemonic":"librosa.display和librosa是两个不同模块，需分别导入"},{"id":346,"type":"single","text":"属于职业道德主要功能的是（）。","options":[{"label":"A","text":"约束职业实践者行为"},{"label":"B","text":"提高职业从业者的社会地位"},{"label":"C","text":"减少职业从业者所面临的法律责任"},{"label":"D","text":"建立行业专业标准"}],"answer":"A","explanation":"职业道德的核心作用是指导和约束职业人员的职业行为，确保其遵循职业准则与伦理标准，从而保障公众利益并增强社会信任度。","mnemonic":"职业道德主要功能是约束从业者行为，\"道德\"=\"约束\""},{"id":347,"type":"single","text":"1. 在Python环境中，面对“字典”这一数据结构时，Sklearn提供了何种工具来进行特征提取（）。","options":[{"label":"A","text":"HashingVectorizer"},{"label":"B","text":"TfidfVectorizer"},{"label":"C","text":"DictVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"C","explanation":"对于字典格式的数据，Sklearn的DictVectorizer可用于特征提取，支持稀疏矩阵输出。","mnemonic":"字典数据用DictVectorizer提取特征，Dict=字典名字对应"},{"id":348,"type":"single","text":"对智能系统基础操作、智能系统维护等知识的掌握，属于初级知识体系中的哪一部分？（）","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"数据采集"},{"label":"C","text":"数学基础"},{"label":"D","text":"智能系统基础"}],"answer":"D","explanation":"掌握智能系统基础操作、智能系统维护等知识属于初级知识体系中的智能系统基础","mnemonic":"智能系统基础操作和维护属于初级知识体系的智能系统基础"},{"id":349,"type":"single","text":"“类别不平衡” 是数据标注时需关注的难点之一，它具体指的是什么？（）","options":[{"label":"A","text":"标注数据中存在标注错误的情况"},{"label":"B","text":"标注数据中同一类别中的样本标注结果不一致"},{"label":"C","text":"标注数据中同一类别中的样本数量差异较大"},{"label":"D","text":"标注数据中不同类别的数量分布不均匀"}],"answer":"D","explanation":"类别不平衡指数据中各类样本数量不均。","mnemonic":"类别不平衡=不同类别数量分布不均匀，非同类内部差异"},{"id":350,"type":"single","text":"下列哪项是一种将时间归正与距离测度计算相结合的非线性归正技术（）。","options":[{"label":"A","text":"GTW"},{"label":"B","text":"CTW"},{"label":"C","text":"ATW"},{"label":"D","text":"DTW"}],"answer":"D","explanation":"在语音识别中，简单地将输入模板与相应的参考模板直接做比较存在很大的缺点。因为语音信号具有相当大的随机性，即使是同一个人在不同时刻发的同一个语音，也不可能具有完全相同的时间长度，因此时间归正处理是必不可少的。动态时间弯折(dynamic time warping, DTW)是把时间归正和距离测度计算结合起来的一种非线性归正技术。它也是语音识别中一种很成功的匹配算法。","mnemonic":"DTW动态时间弯折=时间归正+距离测度结合的非线性技术"},{"id":351,"type":"single","text":"留出法、交叉验证法和自助法都是常用的模型评估方法，这几种方法的主要不同点体现在（）。","options":[{"label":"A","text":"适用场景不同"},{"label":"B","text":"评估指标不同"},{"label":"C","text":"训练集和测试集的划分方式不同"},{"label":"D","text":"样本数量不同"}],"answer":"C","explanation":"留出法、交叉验证法和自助法的主要区别在于它们如何划分训练集和测试集","mnemonic":"留出法/交叉验证/自助法主要区别在训练集测试集划分方式不同"},{"id":352,"type":"single","text":"下列哪种方法能够用于文本数据的分词（）。","options":[{"label":"A","text":"中文分词工具"},{"label":"B","text":"最大熵模型"},{"label":"C","text":"K-Means聚类算法"},{"label":"D","text":"朴素贝叶斯算法"}],"answer":"A","explanation":"中文分词是指将一段连续汉字序列切分成具有语义的词汇序列的过程。中文分词工具是进行中文文本数据处理的必备工具之一。","mnemonic":"中文分词工具直接用于文本分词，K-Means和贝叶斯不做分词"},{"id":353,"type":"single","text":"在制定文本数据处理流程时，下列哪个环节并非必需的（）。","options":[{"label":"A","text":"数据收集"},{"label":"B","text":"数据清理与预处理"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据分析和建模"}],"answer":"C","explanation":"数据可视化可直观展示数据特征，但非文本处理必需步骤，仅为可选辅助功能。","mnemonic":"数据可视化非文本处理必需环节，仅为可选辅助步骤"},{"id":354,"type":"multi","text":"可供人机交互使用的设备，主要有哪些以及各类模式识别设备等？","options":[{"label":"A","text":"键盘"},{"label":"B","text":"鼠标"},{"label":"C","text":"冰箱"},{"label":"D","text":"洗衣机"}],"answer":"A,B","explanation":"人机交互功能主要靠可输入输出的外部设备和相应的软件来完成。可供人机交互使用的设备主要有键盘、鼠标、各种模式识别设备等。","mnemonic":"人机交互设备：键鼠是标配，冰箱洗衣机是家电不是交互设备"},{"id":355,"type":"multi","text":"下列属于 NoSQL 数据库的有哪些（）。","options":[{"label":"A","text":"键值数据库"},{"label":"B","text":"列族数据库"},{"label":"C","text":"文档数据库"},{"label":"D","text":"分布式数据库"}],"answer":"A,B,C","explanation":"在大数据的存储与处理上，NoSQL具备传统关系数据库无法比拟的性能优势。随着人们对非关系数据库的日益重视，目前已开发出众多性能优异的NoSQL数据库产品，如MongoDB、HBase、Redis等。根据这些产品的功能侧重，可以将NoSQL数据库分为键值数据库、列族数据库、文档数据库和图形数据库。","mnemonic":"NoSQL四类：键列文图，分布式不在其中，排D选ABC"},{"id":356,"type":"multi","text":"逻辑树大致可分为哪三种（）。","options":[{"label":"A","text":"对整体的构成要素进行 分解和整理的“What?”树"},{"label":"B","text":"用于找出问题原因的“Why?”树"},{"label":"C","text":"用于找出问题在哪的“Where？”树"},{"label":"D","text":"寻找解决办法的“How?”树"}],"answer":"A,B,D","explanation":"逻辑树大致可以分为三种，分别是:对整体的构成要素进行分解和整理的“What?”树，用于找出问题原因的“Why?”树和寻找解决办法的“How?”树。","mnemonic":"逻辑树三棵：What分解+Why找因+How解决，没有Where树"},{"id":357,"type":"multi","text":"趋势分析法有哪些典型的应用场景（ ）。","options":[{"label":"A","text":"预测企业未来3年的营业收入增长"},{"label":"B","text":"评估某行业短期（如1个月内）的价格波动"},{"label":"C","text":"分析消费者偏好变化的长期趋势"},{"label":"D","text":"测量单一产品的即时市场需求"}],"answer":"A,C","explanation":"趋势分析是将不同时期同一指标的数值进行对比，以确定时间动态数列增减变动趋势的分析方法。利用趋势分析法能从动态上考察指标的发展特征和变化规律，得出上升、下降或稳定不变等结论，从而鉴定企业的管理水平，据以对企业未来变动方向做出预测。","mnemonic":"趋势分析看长期：预测营收增长、消费偏好变化，短期波动和即时需求不适用"},{"id":358,"type":"multi","text":"在从事职业工作的过程中，什么样的行为是与职业道德要求相违背的（）。","options":[{"label":"A","text":"向同事请教遇到的难题"},{"label":"B","text":"在工作中撒谎掩盖错误"},{"label":"C","text":"给客户提供虚假的服务内容"},{"label":"D","text":"将客户个人信息泄露给他人"}],"answer":"B,C,D","explanation":"在职业工作中，诚实守信和保护客户隐私是职业道德的重要要求。撒谎掩盖错误、提供虚假服务内容和泄露客户个人信息都是违背职业道德的不良行为。相反，向同事请教遇到的难题可以促进团队合作和完成工作任务，符合职业道德要求。","mnemonic":"违背职业道德：撒谎+虚假+泄露，请教同事是正当行为"},{"id":359,"type":"multi","text":"全新设计法是根据流程优化目标来做什么（）。","options":[{"label":"A","text":"彻底颠覆原有流程"},{"label":"B","text":"从零开始对新流程进行设计"},{"label":"C","text":"对流程进行整合"},{"label":"D","text":"可以节约分析时间和成本"}],"answer":"A,B","explanation":"全新设计法就是根据流程优化目标，彻底颠覆原有流程，从零开始对新流程进行设计。","mnemonic":"全新设计法：彻底颠覆+从零开始，不是整合也不省成本"},{"id":360,"type":"multi","text":"下列属于基于区域的图像分割方法的是（）。","options":[{"label":"A","text":"基于阈值的分割"},{"label":"B","text":"区域生长"},{"label":"C","text":"区域分裂与合并"},{"label":"D","text":"基于边缘的分割"}],"answer":"B,C","explanation":"基于区域的图像分割方法主要包括区域生长和区域分裂与合并两种典型的方法。区域生长法是从单个像素出发，逐渐合并周围像素，最后形成所需要的分割结果;分裂与合并法是从整幅图像出发，逐渐分裂或合并，最后形成所需要的分割结果。","mnemonic":"基于区域分割：区域生长+分裂合并，阈值和边缘是其他方法"},{"id":361,"type":"multi","text":"下列属于 Kettle 所具备的特点的有（）。","options":[{"label":"A","text":"开源软件"},{"label":"B","text":"图形化操作"},{"label":"C","text":"数据备份和恢复"},{"label":"D","text":"数据可视化和报表"}],"answer":"A,B","explanation":"作为广受用户欢迎的ETL工具，Kettle具有以下特点。开源软件，可以在多个常用的操作系统下运行。图形化操作，使用十分简单与方便。支持多种常用数据库和文件的数据格式，适应范围广。具有完整的工作流控制，能够较好地控制复杂的数据转换工作。提供定时调度功能，方便用户及时处理数据。","mnemonic":"Kettle特点：开源+图形化，备份恢复和可视化报表不是其特点"},{"id":362,"type":"multi","text":"在移动界面设计中，（）可以有效增强移动应用的可用性和用户体验。","options":[{"label":"A","text":"简单直观"},{"label":"B","text":"界面风格一致"},{"label":"C","text":"提供清晰、简洁的操作流程"},{"label":"D","text":"使用丰富的文本和长篇描述提供详细信息"}],"answer":"A,B,C","explanation":"虽然提供详细信息有时是必要的，但过多的文本和长篇描述可能导致界面显得繁琐，影响用户的操作流畅性。移动界面应尽量避免冗长的文字，简洁的语言能更好地提高用户体验。因此，B不是正确的选项。","mnemonic":"移动界面设计：简单直观+风格一致+流程简洁，长篇文字是大忌"},{"id":363,"type":"multi","text":"在可用性设计中，以下（）设计原则有助于提高产品的易用性。","options":[{"label":"A","text":"让用户能够快速学会如何使用产品"},{"label":"B","text":"设计时避免考虑用户的错误操作"},{"label":"C","text":"提供灵活的操作方式以适应不同用户需求"},{"label":"D","text":"产品设计需要具有容错性，避免用户因小错误而失败"}],"answer":"A,C,D","explanation":"可学习性是可用性设计的一个重要原则，旨在让新用户快速理解和掌握如何使用产品，减少学习成本。容错能力是可用性设计的一个关键方面，设计时应该考虑到用户可能的错误操作，并通过适当的反馈和修正机制帮助用户避免和恢复错误操作。灵活性是可用性设计中的另一个原则，旨在通过提供多种操作方式或适应不同情境来满足不同用户的需求。","mnemonic":"可用性设计三原则：快速学会+灵活操作+容错性，排除B不考虑错误操作"},{"id":364,"type":"multi","text":"下列哪些设计措施能够有效增强图形用户界面的易用性呢？（）","options":[{"label":"A","text":"界面应提供即时反馈，告知用户操作是否成功"},{"label":"B","text":"界面应使用复杂的菜单和多层次的导航，以增加功能性"},{"label":"C","text":"界面布局应简洁，避免不必要的元素和控件"},{"label":"D","text":"界面元素应保持一致性，确保相同功能的按钮在不同页面中位置相同"}],"answer":"A,C,D","explanation":"选项B使用复杂的菜单和多层次的导航会使得用户的操作变得更加困难，不符合简洁和易用性的设计原则，因此不应选。选项A提到即时反馈，这对于提升易用性至关重要。通过明确的反馈，用户能知道操作的结果，从而减少困惑和不确定感。选项C强调简洁的布局，避免过多的元素，这能帮助用户快速找到所需功能，减少视觉负担，提升界面的可用性。选项D提到界面元素的一致性，保持按钮和功能的一致性能够帮助用户更快速地理解和适应界面，是易用性的重要因素。","mnemonic":"GUI易用性：即时反馈+简洁布局+一致性，复杂菜单多层导航是反面"},{"id":365,"type":"multi","text":"依据《中华人民共和国个人信息保护法》，个人信息的处理活动包含哪些？","options":[{"label":"A","text":"收集"},{"label":"B","text":"存储"},{"label":"C","text":"公开"},{"label":"D","text":"传输"}],"answer":"A,B,C,D","explanation":"《中华人民共和国个人信息保护法》第四条规定，个人信息是以电子或者其他方式记录的与已识别或者可识别的自然人有关的各种信息，不包括匿名化处理后的信息。个人信息的处理包括个人信息的收集、存储、使用、加工、传输、提供、公开、删除等。","mnemonic":"个人信息处理活动：收存公传全包含，ABCD四个都选"},{"id":366,"type":"multi","text":"下列哪项方法能够有效减轻算法的过拟合问题（）。","options":[{"label":"A","text":"增加正则化项"},{"label":"B","text":"提高学习率"},{"label":"C","text":"增加训练数据集大小"},{"label":"D","text":"增加神经网络的层数"}],"answer":"A,C","explanation":"算法过拟合指的是模型过于复杂，导致在训练数据上表现很好，但在测试数据上表现较差。为减少过拟合，常用的方法包括：增加正则化项：正则化（如L1或L2正则化）通过在损失函数中加入惩罚项来限制模型的复杂度，防止模型对训练数据过拟合。提高学习率：提高学习率不会减少过拟合，反而可能导致训练过程不稳定，因此这不是有效的减少过拟合的方法。增加训练数据集大小：更多的训练数据有助于提高模型的泛化能力，从而减少对训练数据的过拟合。增加神经网络的层数：增加神经网络的层数会增加模型的复杂度，从而加剧过拟合的风险。","mnemonic":"减轻过拟合：正则化+增加数据，提高学习率和加深网络反而加剧"},{"id":367,"type":"multi","text":"在职业道德所要求的 “专业行为” 中，下列哪一项属于其具体的内容？（）","options":[{"label":"A","text":"保持学习和提升专业能力"},{"label":"B","text":"严格遵守职业准则和规范"},{"label":"C","text":"利用职权为个人谋取便利"},{"label":"D","text":"尊重职业界的标准和规范"}],"answer":"A,B,D","explanation":"“专业行为”要求职业人员应该具备高水平的专业知识和技能，并以专业的态度和行为履行岗位职责。这包括保持学习和不断提升自己的专业能力，严格遵守职业准则和规范，并尊重职业界的标准和规范。","mnemonic":"专业行为三要素：保持学习+遵守准则+尊重标准，利用职权谋私是违规"},{"id":368,"type":"multi","text":"构建智能交通系统需要综合运用多种先进技术和方法，它主要涉及哪些方面（）。","options":[{"label":"A","text":"无线通信技术"},{"label":"B","text":"基础设施传感器系统"},{"label":"C","text":"车载传感系统"},{"label":"D","text":"协作系统"}],"answer":"A,B,C,D","explanation":"智能交通系统的构建需要综合运用多种先进技术和方法，主要包括无线通信技术、基础设施传感器系统、车载传感系统、协作系统和计算技术。","mnemonic":"智能交通四技术：无线通信+基础传感+车载传感+协作系统，ABCD全选"},{"id":369,"type":"multi","text":"在 GOMS 模型中，下列哪项属于 “目标” 的特点？","options":[{"label":"A","text":"可分解为具体操作"},{"label":"B","text":"可以层次化"},{"label":"C","text":"描述用户的意图"},{"label":"D","text":"仅限于短期目标"}],"answer":"A,B,C","explanation":"选项A、B、C均符合描述GOMS模型中“目标”特征的准确说法。选项D描述错误，目标可以是长期或短期的，不限于短期目标。","mnemonic":"GOMS目标特点：可分解+可层次化+描述意图，不限于短期目标"},{"id":370,"type":"multi","text":"若按照处理的对象及其数据的表示方式来划分，计算机可以分为哪几类（）。","options":[{"label":"A","text":"数字计算机"},{"label":"B","text":"模拟计算机"},{"label":"C","text":"通用计算机"},{"label":"D","text":"数字模拟混合计算机"}],"answer":"A,B,D","explanation":"按照计算机处理的对象及其数据的表示形式可分为数字计算机、模拟计算机、数字模拟混合计算机。","mnemonic":"按数据表示分计算机：数字+模拟+混合三类，通用计算机是按用途分的"},{"id":371,"type":"multi","text":"诚实公正的基本要求中不包含的是（）。","options":[{"label":"A","text":"损害他人的权益"},{"label":"B","text":"追求个人利益，夸大或隐瞒事实"},{"label":"C","text":"保护雇主或客户的权益"},{"label":"D","text":"故意不提供准确、真实和完整的信息"}],"answer":"A,B,D","explanation":"根据诚实公正的基本要求，从业人员要做到以下几点，一、诚实，从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。二、公正，从业人员应该公正地对待所有相关方，不偏袒任何一方。基于客观事实和公正标准做出决策和评估。三、透明，从业人员应该及时、清晰地向相关方提供信息，并确保相关方理解信息的真实性和重要性。遵守披露要求，不得隐瞒重要信息。四、忠诚和权益保护，从业人员应该忠诚于雇主或客户的利益，并保护他们的权益。不得利用职务之便谋取个人私利，也不得损害他人的权益。ABD选项均违背了诚实公正的要求，符合题意。","mnemonic":"诚实公正不包含：损害权益+夸大隐瞒+不提供真实信息，保护客户权益才正确"},{"id":372,"type":"multi","text":"进行数据集成时，有哪些问题是需要考虑并加以解决的？（）","options":[{"label":"A","text":"数据容量问题"},{"label":"B","text":"冗余问题"},{"label":"C","text":"数据值冲突检测与消除问题"},{"label":"D","text":"模式集成问题"}],"answer":"B,C,D","explanation":"在数据集成过程中，需要考虑解决的问题包括模式集成问题、冗余问题、数据值冲突检测与消除问题。","mnemonic":"数据集成三问题：冗余+值冲突+模式集成，容量问题不在考虑范围"},{"id":373,"type":"multi","text":"指导中级工作人员进行语音数据标注时，有哪些问题是不容忽视的？（）","options":[{"label":"A","text":"确认图像分割方式"},{"label":"B","text":"确定是否包含有效语音"},{"label":"C","text":"确定语音的噪声情况"},{"label":"D","text":"确定说话人数量"}],"answer":"B,C,D","explanation":"在指导初级工进行语音数据标注时应注意确认是否包含有效语音、语音的噪声情况、说话人数量等信息。","mnemonic":"语音标注三注意：有效语音+噪声情况+说话人数，图像分割是视觉任务"},{"id":374,"type":"multi","text":"下列关于聚类分析的说法，正确的是（）。","options":[{"label":"A","text":"聚类分析是将数据集分为不同的组别"},{"label":"B","text":"聚类分析是无监督学习方法"},{"label":"C","text":"聚类分析需要数据带有类别标签"},{"label":"D","text":"聚类分析是一种有监督学习方法"}],"answer":"A,B","explanation":"聚类分析是一种无监督学习方法，无需标签数据，其主要目的是将数据集划分为具有相似特征的不同组别，即聚类。","mnemonic":"聚类分析：无监督+分组别，不需标签非有监督"},{"id":375,"type":"multi","text":"在 Python 中读取文本数据时，能实现按行分割文件功能的方法是（）。","options":[{"label":"A","text":"split()"},{"label":"B","text":"read()"},{"label":"C","text":"readlines()"},{"label":"D","text":"splitlines()"}],"answer":"C,D","explanation":"readlines()方法可以读取文件中的每一行，并将其作为一个元素存储在一个列表中；splitlines()方法也可以读取每一行，但是将每一行的换行符去掉，返回一个无换行符的列表。","mnemonic":"Python按行分割：readlines读行列表+splitlines去换行分割"},{"id":376,"type":"multi","text":"关于 G-U-L 模型的特点，下列说法正确的有哪些？（）","options":[{"label":"A","text":"G-U-L模型结合了GOMS、UAN和LOTOS模型，能够能全面预测用户的行为、操作、时序关系"},{"label":"B","text":"G-U-L模型只适用于分析熟练用户的行为，不适用于非熟练用户"},{"label":"C","text":"G-U-L模型利用GOMS进行任务分解，使用UAN描述原子操作，并通过LOTOS表示任务之间的时序关系"},{"label":"D","text":"G-U-L模型强调用户与界面物理对象的交互，侧重于系统的实现细节"}],"answer":"A,C","explanation":"A选项正确：G-U-L模型通过结合GOMS、UAN和LOTOS模型，提供了一个全面的框架，能够更精确地预测用户在复杂任务中的行为。B选项错误：G-U-L模型并不限于熟练用户的行为预测，它适用于不同类型的用户，包括非熟练用户，尤其是在复杂任务中可以提高预测准确性。C选项正确：G-U-L模型的核心方法是将GOMS模型用于任务分解，UAN模型用于描述用户的原子操作，LOTOS模型用于表示任务之间的时序关系。D选项错误：G-U-L模型虽然涉及用户行为和界面交互，但它并不侧重于系统实现的细节。UAN模型关注的是用户视角，而不是底层实现的技术细节。","mnemonic":"G-U-L模型：GOMS任务分解+UAN原子操作+LOTOS时序关系，适用所有用户非仅熟练"},{"id":377,"type":"multi","text":"勤勉好学在基本要求上表现为（）。","options":[{"label":"A","text":"对工作充满热情"},{"label":"B","text":"拥有持续学习的意识"},{"label":"C","text":"避免与他人交流和合作"},{"label":"D","text":"保持高度的责任心和工作效率"}],"answer":"A,B,D","explanation":"勤勉好学的基本要求包括对工作充满热情、拥有持续学习的意识以及保持高度的责任心和工作效率。避免与他人交流和合作不符合勤勉好学的基本要求。","mnemonic":"勤勉好学三要求：热情+持续学习+责任心效率，避免交流合作是错误的"},{"id":378,"type":"multi","text":"下列选项中，属于 Word 邮件合并的数据源的是（）。","options":[{"label":"A","text":"Outlook联系人列表"},{"label":"B","text":"在线云盘中的Excel电子表格"},{"label":"C","text":"现有本地Excel电子表格"},{"label":"D","text":"Access数据库"}],"answer":"A,C,D","explanation":"邮件合并的收件人通常来自Excel电子表格或Outlook联系人列表等现有列表中的姓名和数据列表。 现有列表也可是你能连接到的任何数据库。 如果还没有列表，则邮件合并期间可在 Word 中键入一个列表。无论将哪种类型的文件用作数据源，请务必将其保存在本地计算机或文件共享上；邮件合并不支持保存在 HTTP 位置。","mnemonic":"Word邮件合并数据源：Outlook联系人+本地Excel+Access，在线云盘不支持"},{"id":379,"type":"multi","text":"下列选项中，属于特征选择里过滤方法的是（）。","options":[{"label":"A","text":"卡方检验"},{"label":"B","text":"信息增益"},{"label":"C","text":"递归特征消除"},{"label":"D","text":"主成分分析"}],"answer":"A,B","explanation":"A选项正确，卡方检验是基于统计假设检验的方法，衡量每个特征与目标变量的独立性，是一种典型的过滤式方法，常用于分类任务。B选项正确，信息增益度量了特征对分类的贡献程度，通常在决策树算法中使用，也可以作为过滤式方法进行特征选择。C选项错误，递归特征消除（RFE）是包裹式方法，依赖于模型训练的反馈来选择特征，而非独立于模型的过滤式方法。D选项错误，主成分分析（PCA）是一种降维技术，通过对数据进行线性变换来减少维度，属于降维方法，而不是过滤式特征选择方法。","mnemonic":"过滤式特征选择：卡方检验+信息增益，递归消除是包裹式，PCA是降维"},{"id":380,"type":"multi","text":"HMM 模型的原理可以简要描述为（）。","options":[{"label":"A","text":"定义状态集合"},{"label":"B","text":"定义状态转移概率矩阵和观测概率矩阵"},{"label":"C","text":"对待分词语句进行序列标注"},{"label":"D","text":"计算最优路径"}],"answer":"A,B,C,D","explanation":"HMM模型的原理可以概括为：定义状态集合，定义状态转移概率矩阵和观测概率矩阵，对待分词语句进行序列标注，计算最优路径，其中状态集合根据需要可以精细地分为多个细分状态，状态转移概率矩阵和观测概率矩阵则是根据语料库的统计信息进行估计，序列标注和最优路径计算则是利用Viterbi算法进行实现。","mnemonic":"HMM四步原理：定义状态+转移观测矩阵+序列标注+最优路径，ABCD全选"},{"id":381,"type":"multi","text":"下列哪些内容属于 “严谨求是” 的基本要求？","options":[{"label":"A","text":"深入分析问题，避免草率臆断"},{"label":"B","text":"依据数据和事实支持决策"},{"label":"C","text":"以客观态度寻求真相，避免偏见"},{"label":"D","text":"保持当前知识技能，无需更新知识结构"}],"answer":"A,B,C","explanation":"根据严谨求是的基本要求，深入分析问题，避免草率臆断、依据数据和事实支持决策、以客观态度寻求真相，避免偏见均符合严谨求是的要求，除此之外还应该持续学习和研究，跟进行业发展和最新信息，以不断提升自己的知识和能力。因此只有D选项不符合题目要求。","mnemonic":"严谨求是三要求：深入分析+依据事实+客观避偏见，不更新知识是错误的"},{"id":382,"type":"multi","text":"下面关于状态转换网络（STN）的描述，正确的选项是（）。","options":[{"label":"A","text":"状态转换网络适用于描述复杂的并发行为"},{"label":"B","text":"状态转换网络通过定义系统状态和状态之间的转换规则来描述交互过程。"},{"label":"C","text":"状态转换网络的规模随着系统状态数的增加而呈指数级增长。"},{"label":"D","text":"状态转换网络仅适用于小型系统，不适合复杂或大型系统的设计。"}],"answer":"B,C,D","explanation":"A项错误：状态转换网络（STN）主要用于描述顺序和串行行为，它对并发行为的描述能力较差。对于复杂的并发任务，扩展状态转换网络（State Charts）更为合适。B项正确：STN的核心就是通过定义系统的状态以及状态之间的转换规则来描述交互过程。每个状态代表系统的一种特定条件，而状态间的转换由事件触发。C项正确：随着系统状态数的增加，状态转换网络的状态和转换数目会呈指数级增长。这使得大规模系统中的状态图变得非常复杂，难以管理。D项正确：STN在小型系统中可以很有效地工作，但在大型系统中，由于状态数量的急剧增加，导致其过于复杂，因此不适用于复杂或大型系统的设计。","mnemonic":"STN状态转换网络：定义状态和转换规则+指数级增长+仅适小型系统，不适合描述并发"},{"id":383,"type":"multi","text":"下列哪项可用于读取文本数据（）。","options":[{"label":"A","text":"read()"},{"label":"B","text":"readlines()"},{"label":"C","text":"read_excel()"},{"label":"D","text":"open()"}],"answer":"A,B,D","explanation":"read()和readlines()可以用于读取文本文件中的内容，open()可以用于打开文件。","mnemonic":"读取文本数据三法：read读+readlines读行+open打开，read_excel是读表格"},{"id":384,"type":"multi","text":"职业道德在要求上涵盖了哪些方面（）。","options":[{"label":"A","text":"诚实守信"},{"label":"B","text":"私心杂念"},{"label":"C","text":"职业操守"},{"label":"D","text":"个人利益"}],"answer":"A,C","explanation":"职业道德是指在特定职业中，需要遵循的一些准则和规范。其中，诚实守信和职业操守是职业道德的重要要求，私心杂念和个人利益则是违背职业道德的表现。","mnemonic":"职业道德两要求：诚实守信+职业操守，私心杂念和个人利益是反面"},{"id":385,"type":"multi","text":"以下关于 LOTOS 语言及其算子特点的描述，正确的有哪些（）。","options":[{"label":"A","text":"LOTOS基于进程代数和抽象数据类型理论构建"},{"label":"B","text":"LOTOS算子可以描述非确定性行为"},{"label":"C","text":"LOTOS语言只能用于描述网络协议，不能描述其他系统行为"},{"label":"D","text":"LOTOS语言作为ISO标准的一部分，主要应用于开放分布式系统的描述"}],"answer":"A,B,D","explanation":"LOTOS的理论基础包括进程代数（CCS）和抽象数据类型建模语言（ACT-ONE）。LOTOS支持描述具有非确定性（Nondeterministic）特征的行为，这是并发系统的一个重要特点。虽然LOTOS最初主要用于描述网络协议，但它也能用来建模其他类型的开放分布式系统。LOTOS是ISO的一部分，专门用于开放分布式系统的行为建模。","mnemonic":"LOTOS语言特点：进程代数+抽象数据类型+非确定性+ISO标准，不限于网络协议"},{"id":386,"type":"multi","text":"在 ETL 的增量抽取中，常用于捕捉变化数据的方式包括（）。","options":[{"label":"A","text":"触发器"},{"label":"B","text":"时间戳"},{"label":"C","text":"文件对比"},{"label":"D","text":"日志对比"}],"answer":"A,B,D","explanation":"ETL中增量抽取常用的捕获变化数据的方法有四种，分别为触发器、时间戳、全表对比、日志对比。","mnemonic":"ETL增量抽取捕获变化：触发器+时间戳+日志对比，文件对比不是常用方式"},{"id":387,"type":"multi","text":"Windows Server 2008 的 NTFS 许可权限中，属于普通权限的有哪些（）。","options":[{"label":"A","text":"写入"},{"label":"B","text":"读取"},{"label":"C","text":"修噶"},{"label":"D","text":"删除文件"}],"answer":"A,B,C","explanation":"Windows Server 2008 的NTFS 的普通权限有读取、列出文件夹内容、写入、读并且执行、修改和完全控制。而删除文件属于特殊权限。","mnemonic":"NTFS普通权限：读取+写入+修改，删除文件属于特殊权限"},{"id":388,"type":"multi","text":"在 Word 里，关于邮件合并的主文档，下列说法正确的是（）。","options":[{"label":"A","text":"主文档包含所有输出文档中都相同的基本文本"},{"label":"B","text":"主文档包含收件人具体信息"},{"label":"C","text":"主文档可能包含信头、 文本和说明中插入的文本"},{"label":"D","text":"主文档可以从模板开始或者现有文档开始设置"}],"answer":"A,C,D","explanation":"主文档包含所有输出文档中都相同的基本文本。它可能包含了信头、 文本和说明中插入的文本 （例如收件人姓名和地址）合并域到另一个输出文档而异。主文档可以从模板开始或者现有文档开始设置。主文档设置完成后才去指定数据源选择收件人。","mnemonic":"邮件合并主文档：相同基本文本+含信头说明+可从模板或文档开始，不含收件人具体信息"},{"id":389,"type":"multi","text":"下列关于聚类分析的说法，不正确的是（）。","options":[{"label":"A","text":"聚类分析是一种有监督学习方法"},{"label":"B","text":"聚类分析是一种无监督学习方法"},{"label":"C","text":"聚类分析只能用于分类问题"},{"label":"D","text":"聚类分析一般使用回归分析方法"}],"answer":"A,C,D","explanation":"聚类分析是一种无监督学习方法，它不需要有预先定义的分类或标签，它通过将数据对象分组来对数据进行分类，这些分组通常称为簇。聚类不仅用于数据分组，还可用于异常检测（如DBSCAN识别噪声点）。回归分析用于预测连续值，而聚类分析用于将数据分组。","mnemonic":"聚类分析不正确：有监督×无监督✓，不限分类问题，不用回归方法"},{"id":390,"type":"multi","text":"下列选项中，哪些场景能够应用自然交互技术？（）","options":[{"label":"A","text":"语音助理"},{"label":"B","text":"智能家居控制"},{"label":"C","text":"虚拟现实游戏"},{"label":"D","text":"航空飞行模拟"}],"answer":"A,B,C,D","explanation":"语音助理是自然交互技术的一种应用，它通过语音识别技术接受并理解用户指令，执行任务或回答问题，因此可以应用自然交互技术。智能家居控制系统可以通过自然交互技术（如语音识别、手势识别等）来实现与家居设备的互动，用户可以通过语音或手势控制智能家电，因此也属于自然交互技术的应用场景。虚拟现实游戏通常结合手势识别技术或动作捕捉设备，让玩家通过自然动作与虚拟世界互动，这是一种典型的自然交互技术应用场景。航空飞行模拟可以通过自然交互技术（如手势识别、语音命令等）来模拟飞行员操作控制器，实现更加直观和沉浸的飞行训练体验，因此也可以应用自然交互技术。","mnemonic":"自然交互技术场景：语音助理+智能家居+VR游戏+飞行模拟，ABCD全选"},{"id":391,"type":"multi","text":"在现代计算机出现之前，计算机的发展历程曾经历过哪些阶段（）。","options":[{"label":"A","text":"机械式计算机"},{"label":"B","text":"机电式计算机"},{"label":"C","text":"萌芽期的电子计算机"},{"label":"D","text":"分析机"}],"answer":"A,B,C","explanation":"早在现代计算机问世之前，计算机的发展经历了机械式计算机、机电式计算机和萌芽期的电子计算机三个阶段。","mnemonic":"现代计算机前三阶段：机械式→机电式→萌芽期电子，分析机不算独立阶段"},{"id":392,"type":"multi","text":"下列对算法复杂度的描述，正确的是（）。","options":[{"label":"A","text":"渐进复杂度描述的是算法最坏运行时间"},{"label":"B","text":"平均复杂度描述的是算法平均运行时间"},{"label":"C","text":"常数复杂度描述算法的执行时间恒定，不受数据量大小影响"},{"label":"D","text":"指数复杂度描述的是算法的运行时间随着问题规模以指数级别增长"}],"answer":"B,C,D","explanation":"渐进复杂度是指算法的增长趋势，通常描述的是在极限情况下（最坏、最好或平均）的时间或空间复杂度，表述不准确。平均复杂度描述的是算法在所有可能输入情况下的平均运行时间。常数复杂度表示算法的运行时间或操作次数不随输入规模变化，保持恒定。指数复杂度表示随着问题规模增大，算法的运行时间呈指数级增长。","mnemonic":"算法复杂度：平均描述平均时间+常数不受规模影响+指数级增长，渐进复杂度描述不准确"},{"id":393,"type":"multi","text":"对于可用性评估的相关方法，下列哪些表述是错误的？（）","options":[{"label":"A","text":"诊查式方法主要通过实际用户参与来进行评估"},{"label":"B","text":"测试式方法通常依赖专家对产品进行分析，而不涉及用户"},{"label":"C","text":"可用性评估的方法可以帮助发现设计中可能存在的可用性问题，并提供改进建议"},{"label":"D","text":"在可用性评估中，诊查式方法比测试式方法更注重用户行为的实时反馈"}],"answer":"A,B,D","explanation":"选项A：诊查式方法并不依赖于实际用户的参与，而是由专家进行分析和评估。例如启发式评估和认知性遍历就是典型的诊查式方法。选项B：测试式方法正是依赖于用户参与的评估方法，如用户测试、问卷调查等。它是通过用户的实际使用行为来评估产品的可用性。选项C：可用性评估的核心目的是发现产品设计中可能存在的可用性问题，并通过不同的评估方法（无论是诊查式方法还是测试式方法）提出改进建议。选项D：诊查式方法的重点在于专家评估，通常并不依赖于实时的用户行为反馈，反而是通过理论分析和经验评估来找出潜在问题。测试式方法才注重用户行为的实时反馈。","mnemonic":"可用性评估方法错误：诊查式靠专家非用户+测试式靠用户非专家，AB和D说反了"},{"id":394,"type":"multi","text":"常见的文本向量化方法有哪些（）。","options":[{"label":"A","text":"one-hot编码"},{"label":"B","text":"词袋模型"},{"label":"C","text":"TF-IDF"},{"label":"D","text":"词性标注模型"}],"answer":"A,B,C","explanation":"常见的文本向量化方法包括one-hot编码、词袋模型和TF-IDF。其中，one-hot编码将每个词转换成一个唯一的向量，向量维度等于词表中词语数量；词袋模型将文本表示为一个固定长度的词向量，向量的每个维度表示对应词在文本中出现的次数；TF-IDF方法基于词袋模型，考虑到一些高频词对文本分类的影响不大，因此在计算向量时会对高频次数进行调整。词性标注模型是一种将文本中的单词标记为特定词性的方法，例如名词、动词、形容词等。它不是一种文本向量化方法，而是一种文本分析方法。","mnemonic":"文本向量化三方法：one-hot+词袋模型+TF-IDF，词性标注不是向量化"},{"id":395,"type":"multi","text":"ETL 所包含的主要环节有（）。","options":[{"label":"A","text":"数据抽取"},{"label":"B","text":"数据转换"},{"label":"C","text":"数据压缩"},{"label":"D","text":"数据装载"}],"answer":"A,B,D","explanation":"ETL主要包括数据抽取、数据转换、数据装载3部分内容。","mnemonic":"ETL三环节：抽取+转换+装载，数据压缩不属于ETL"},{"id":396,"type":"multi","text":"下列选项中，关于人机交互的说法正确的是哪一项？","options":[{"label":"A","text":"人机交互是计算机科学和认知心理学两大科学相结合的产物，同时也吸收了语言学、人机工程学和社会学等科学的研究成果。"},{"label":"B","text":"人机交互是关于设计、评价和实现供人们使用的交互式计算机系统且围绕这些方面进行研究的科学。"},{"label":"C","text":"人机交互是指用户与计算机系统之间的通信，是人与计算机之间各种符号和动作的双向信息交换。"},{"label":"D","text":"人机交互是指通过机器学习算法实现人机对话"}],"answer":"A,B,C","explanation":"选项D的定义过于狭窄，它只提到了机器学习算法在人机对话中的应用，而人机交互是一个更广泛的概念，不仅仅局限于对话。","mnemonic":"人机交互定义：计算机+认知心理学+设计评价实现+双向信息交换，非仅机器学习对话"},{"id":397,"type":"multi","text":"对于 SWOT 模型的定义，下列说法不正确的是（）。","options":[{"label":"A","text":"SWOT模型对企业市场环境的扫描和分析"},{"label":"B","text":"SWOT模型对企业内部资源和外部环境的分析"},{"label":"C","text":"SWOT模型对企业战略规划和实施的监控和调整"},{"label":"D","text":"SWOT模型对企业市场竞争力的评估和提高"}],"answer":"A,C,D","explanation":"SWOT模型是指对企业内部的优劣势和外部环境的机会和威胁进行分析和评估，从而制定出相应的战略，因此选项B是正确的。","mnemonic":"SWOT定义：内部资源+外部环境分析才对，市场扫描、战略监控、竞争力评估都不准确"},{"id":398,"type":"multi","text":"在 Python 的语音处理工具体系里，能够用于处理语音信号并提供相关功能的库有（）。","options":[{"label":"A","text":"librosa - 提供语音的采样率转换、梅尔频谱提取、频率掩蔽等功能"},{"label":"B","text":"正确：pydub库提供了一个用户友好的高层语音操作API，可以轻松处理数字音频样本，例如音频的剪辑、拼接、音量调整等。"},{"label":"C","text":"正确：wave库可以用于读取和写入WAV格式的语音文件，是处理WAV文件的基本工具。"},{"label":"D","text":"正确：numpy库虽然主要用于数值计算，但可以用于处理音频数据，例如进行信号处理和分析。"}],"answer":"A,B,C,D","explanation":"A. 正确：librosa库提供了丰富的音频和音乐信号处理功能，包括语音的采样率转换、梅尔频谱提取、频率掩蔽等。","mnemonic":"Python语音处理库：librosa+pydub+wave+numpy，ABCD全选"},{"id":399,"type":"multi","text":"下列哪项属于计算机的主要应用领域（）。","options":[{"label":"A","text":"办公处理"},{"label":"B","text":"游戏娱乐"},{"label":"C","text":"科学研究"},{"label":"D","text":"传统手工蔬菜生产"}],"answer":"A,B,C","explanation":"计算机的主要应用包括办公处理、游戏娱乐、科学研究、通讯与信息传播等领域。D项属于非计算机应用领域。","mnemonic":"计算机应用领域：办公+游戏+科研，传统手工蔬菜生产不需要计算机"},{"id":400,"type":"multi","text":"下列选项中，属于非关系型数据库类型的有（）。","options":[{"label":"A","text":"MongoDB"},{"label":"B","text":"Redis"},{"label":"C","text":"PostgreSQL"},{"label":"D","text":"HBase"}],"answer":"A,B,D","explanation":"MongoDB、Redis、HBase都属于非关系型数据库，而PostgreSQL属于关系型数据库。","mnemonic":"非关系型数据库：MongoDB+Redis+HBase，PostgreSQL是关系型数据库"},{"id":401,"type":"multi","text":"下列选项中，因算法过拟合而导致评估指标产生误导的是（）。","options":[{"label":"A","text":"训练集准确率显著高于测试集准确率（如差距超过20%）"},{"label":"B","text":"模型在训练集上的精确度和召回率接近1且测试集指标显著低于训练集"},{"label":"C","text":"训练集上的错误率较高，但测试集的错误率很低"},{"label":"D","text":"训练集和测试集的准确率差距较小，且精确度较高"}],"answer":"A,B","explanation":"A：当训练集准确率显著高于测试集准确率时，这通常意味着模型过度拟合了训练集上的数据。这种情况会导致模型的泛化能力变差，导致评估指标失真，难以真实反映模型在未见过的数据上的表现。B：如果模型在训练集上达到了接近1的精确度和召回率，而测试集上有显著差距，这也通常是过拟合的表现。过拟合使得模型在训练数据上过度学习，丧失了对新数据的泛化能力，进而影响评估指标的真实性。C：训练集错误率高且测试集错误率低不符合过拟合的典型表现。过拟合通常表现为训练集错误率低而测试集错误率高。D：如果训练集和测试集的准确率差距较小，且精确度较高，通常表示模型没有发生过拟合，反而是良好的泛化能力，因此这种情况并不表明过拟合。","mnemonic":"过拟合误导指标：训练集远高于测试集准确率+训练集指标接近1而测试集低"},{"id":402,"type":"multi","text":"下列关于人机交互发展阶段的说法，正确的是（）。","options":[{"label":"A","text":"第一代人机交互是采用命令行界面的方式进行交互，用户需要记住一些特定的命令来操作"},{"label":"B","text":"第二代人机交互是采用图形用户界面（GUI）的方式进行交互，使得使用者可以通过“指针”直接在屏幕上选择和操作"},{"label":"C","text":"第三代人机交互是基于自然语言和语音识别技术的交互方式，用户只需要说出想要做的事情，机器便能够理解并执行相应指令"},{"label":"D","text":"第三代人机交互已实现无需任何设备的全脑电波控制，用户可直接通过思维操作所有智能系统。"}],"answer":"A,B,C","explanation":"命令行界面（CLI）确实是第一代人机交互的核心特征，用户通过键盘输入命令与计算机交互。图形用户界面（GUI）是第二代人机交互的代表，允许用户通过鼠标、触摸屏等设备来选择、操作图标和菜单。第三代人机交互通常是基于自然语言处理（NLP）和语音识别技术，例如语音助手（如Siri、Alexa等）便采用这种交互方式，第三代交互仍需要有设备的接入来操作智能系统。","mnemonic":"人机交互三代：命令行→GUI图形界面→自然语言语音识别，全脑电波控制尚未实现"},{"id":403,"type":"multi","text":"下列关于关联分析算法的说法，正确的有（ ）。","options":[{"label":"A","text":"Apriori算法是一种经典的关联规则学习算法"},{"label":"B","text":"FP-growth算法通过构建FP树来提高频繁项集的发现效率"},{"label":"C","text":"Eclat算法基于深度优先搜索策略"},{"label":"D","text":"关联分析只能用于小规模数据集"}],"answer":"A,B,C","explanation":"Apriori算法是最经典的挖掘频繁项集的算法，第一次实现了在大数据集上可行的关联规则提取。FP-growth算法采用前缀树的形式来表征数据，减少了扫描事务数据库的次数，通过递归地生成条件FP树来挖掘频繁项。Eclat算法是一种深度优先算法，采用垂直数据表示形式。","mnemonic":"关联分析三算法：Apriori经典+FP-growth建树+Eclat深度优先，不限小规模数据"},{"id":404,"type":"multi","text":"下列哪一项不能准确地阐释 “以用户为中心的设计宗旨”？（）","options":[{"label":"A","text":"设计师将自己的审美观念强加于用户"},{"label":"B","text":"设计师以用户的需求和期望为出发点，从而创造出更好的用户体验"},{"label":"C","text":"设计师只考虑产品的外观和功能，而忽略用户的感受和需求"},{"label":"D","text":"设计师只考虑自己的利益，而忽略用户的体验和需求"}],"answer":"A,C,D","explanation":"选项A设计师将自己的审美观念强加于用户，不符合“以用户为中心”的设计宗旨。选项B设计师以用户需求和期望为出发点，符合“以用户为中心”的设计宗旨。选项C设计师只考虑外观和功能，而忽略用户的需求和感受，不符合“以用户为中心”的设计宗旨。选项D设计师忽略用户体验而只关注个人或商业利益，违背了“以用户为中心”的设计宗旨。","mnemonic":"非用户中心设计：强加审美+只看外观功能+只顾自身利益，以用户需求期望为出发点才对"},{"id":405,"type":"multi","text":"在 PowerPoint 里，下列属于幻灯片切换效果的选项是（）。","options":[{"label":"A","text":"平滑"},{"label":"B","text":"淡入/淡出"},{"label":"C","text":"推入"},{"label":"D","text":"切入"}],"answer":"A,B,C,D","explanation":"幻灯片切换是在放映演示文稿期间，从一张幻灯片移至下一张幻灯片时出现的类似动画的效果。 添加幻灯片切换效果，使 PowerPoint 演示文稿生动生动。在PowerPoint中，常见的幻灯片切换效果包括平滑、淡入/淡出、推入、切入等。","mnemonic":"PPT切换效果：平滑+淡入淡出+推入+切入，ABCD全选"},{"id":406,"type":"multi","text":"为了让中级工作人员处理图像数据标注时保证数据的准确率，有哪些要点需要他们注意？（）","options":[{"label":"A","text":"若出现图像较模糊无法标注的则不标"},{"label":"B","text":"在被遮挡的情况下，遮挡部分需要脑补，但是不要脑补到图像外"},{"label":"C","text":"只标注形状大的物体，其他无需标注"},{"label":"D","text":"可以遗漏部分像素点"}],"answer":"A,B","explanation":"在指导中级工解决图像数据标注问题时，为了确保标注数据的准确率，需要注意的问题有:若出现图像较模糊无法标注的则不标、在被遮挡的情况下，遮挡部分需要脑补，但是不要脑补到图像外。","mnemonic":"图像标注要点：模糊不标+遮挡脑补不出界，大小都要标且不能遗漏像素"},{"id":407,"type":"multi","text":"下列哪项属于数据库管理系统的主要功能（）。","options":[{"label":"A","text":"数据定义功能"},{"label":"B","text":"数据操纵功能"},{"label":"C","text":"数据可视化功能"},{"label":"D","text":"硬件资源分配功能"}],"answer":"A,B","explanation":"数据库管理系统的主要功能有数据定义功能、数据操纵功能、数据库的运行管理、数据库的建立和维护功能、数据组织、存储和管理和数据通信功能。","mnemonic":"数据库管理系统功能：数据定义+数据操纵，可视化和硬件分配不是DBMS功能"},{"id":408,"type":"multi","text":"支持向量机算法的核函数有（）。","options":[{"label":"A","text":"线性核函数"},{"label":"B","text":"多项式核函数"},{"label":"C","text":"径向基函数"},{"label":"D","text":"sigmoid核函数"}],"answer":"A,B,C,D","explanation":"支持向量机算法中的核函数用于将输入空间映射到另一个更高维的空间中，以便于寻找线性可分的超平面。常见的核函数有线性核函数、多项式核函数、径向基函数等。线性核函数是最简单的核函数，直接将输入数据映射到原空间；多项式核函数采用多项式函数将原数据映射到更高维的空间；径向基函数则采用径向基函数来进行映射；sigmoid核函数也是一种支持向量机算法的核函数。","mnemonic":"SVM核函数四种：线性+多项式+径向基+sigmoid，ABCD全选"},{"id":409,"type":"multi","text":"在对神经网络进行训练时，有一种技术专门通过直接抑制过拟合现象，从而增强模型的泛化能力，这种技术是（）。","options":[{"label":"A","text":"Dropout"},{"label":"B","text":"L2正则化"},{"label":"C","text":"批量归一化"},{"label":"D","text":"激活函数ReLU"}],"answer":"A,B","explanation":"Dropout：Dropout 是一种常用的正则化技术，通过在训练过程中随机丢弃神经元，减少模型对特定输入的依赖，从而提高泛化能力。L2正则化：L2正则化通过向损失函数中加入权重的平方和惩罚项，能够限制模型的复杂度，防止过拟合，提高泛化能力。批量归一化：批量归一化通过标准化每一层的输入，能够加速神经网络的训练，但其设计目标并非直接抑制过拟合。激活函数ReLU：ReLU作为一种激活函数，并不会直接影响模型的泛化能力，它更多是解决了深层神经网络中梯度消失的问题，因此它不属于提高泛化能力的技术。","mnemonic":"抑制过拟合技术：Dropout随机丢弃+L2正则化惩罚权重，批归一化加速训练非防过拟合"},{"id":410,"type":"multi","text":"在文本数据处理流程中，下列哪项不属于特征工程的主要任务（）。","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据归一化"}],"answer":"A,C,D","explanation":"特征工程在文本数据处理流程中的主要任务是从原始的文本数据中提取出有意义的特征，用于后续的模型训练和预测。","mnemonic":"特征工程主要任务：仅特征提取，数据清洗、可视化、归一化都不属于"},{"id":411,"type":"multi","text":"下列选项里，哪些场景能够体现出计算机自动化程度高这一特点（）。","options":[{"label":"A","text":"利用计算机实行商场、仓库和企业管理"},{"label":"B","text":"飞机票联网预订"},{"label":"C","text":"银行联网储蓄"},{"label":"D","text":"项目管理"}],"answer":"A,B,C","explanation":"由于计算机的工作方式是将程序和数据先存放在机器内,工作时按程序规定的操作一步一步地自动完成，一般无须人工干预，因此自动化程度较高。在工农业生产、国防、文化教育、科学研究以及日常生活等诸多领域都有着广泛应用。例如，利用计算机实行商场、仓库和企业管理，或进行飞机票联网预订、银行联网储蓄等信息处理和管理，从而使我们的工作和生活获得了极大的便利。而项目管理往往需要人员的主观意识介入，及时识别风险和制定应对措施。","mnemonic":"计算机自动化高：商场管理+机票联网+银行联网，项目管理需人为干预"},{"id":412,"type":"multi","text":"下列关于短时谱和移动窗的说法，正确的是（）。","options":[{"label":"A","text":"长窗起到了时间上的平均作用。"},{"label":"B","text":"短窗具有较低的频率分辨率，较高的时间分辨率。"},{"label":"C","text":"短窗具有较好的时间分辨率，能够提取出语音信号中的短时变化，损失了频率分辨率。"},{"label":"D","text":"矩形窗和汉明窗的频谱特性都具有低通的性质，在截止频率处都比较尖锐，当其通带都比
