<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI三级理论知识总练习1000-去除600-a重复题 - 刷题系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --primary-bg: #eef2ff;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --warn: #f59e0b;
  --warn-bg: #fffbeb;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Header ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff;
  padding: 16px 20px;
  box-shadow: var(--shadow-md);
}
.header h1 {
  font-size: 18px; font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}
.header .subtitle {
  font-size: 12px; opacity: .85;
  text-align: center;
}

/* ===== Home Page ===== */
.page { display: none; }
.page.active { display: block; }

.home-section {
  padding: 16px;
}
.mode-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.mode-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .2s;
  border: 2px solid transparent;
  user-select: none;
}
.mode-card:active { transform: scale(.97); }
.mode-card.selected { border-color: var(--primary); background: var(--primary-bg); }
.mode-card .icon { font-size: 36px; margin-bottom: 8px; }
.mode-card .label { font-size: 16px; font-weight: 600; color: var(--gray-800); }
.mode-card .desc { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

.batch-title {
  font-size: 16px; font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.batch-title::before {
  content: '';
  width: 4px; height: 20px;
  background: var(--primary);
  border-radius: 2px;
}
.batch-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.batch-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  user-select: none;
}
.batch-card:active { transform: scale(.97); }
.batch-card .batch-num {
  font-size: 14px; font-weight: 700;
  color: var(--primary);
  margin-bottom: 2px;
}
.batch-card .batch-range {
  font-size: 12px; color: var(--gray-500);
}
.batch-card .batch-progress {
  margin-top: 8px;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  overflow: hidden;
}
.batch-card .batch-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 2px;
  transition: width .3s;
}
.batch-card .batch-stats {
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 4px;
}

/* ===== Quiz Mode ===== */
.quiz-header {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 90;
}
.quiz-back {
  background: none; border: none;
  font-size: 24px; color: var(--gray-600);
  cursor: pointer; padding: 4px 8px;
}
.quiz-progress-text {
  font-size: 14px; font-weight: 600;
  color: var(--gray-700);
}
.quiz-nav-btns {
  display: flex; gap: 6px;
}
.quiz-nav-btns button {
  background: var(--gray-100); border: 1px solid var(--gray-200);
  border-radius: 8px; padding: 6px 12px;
  font-size: 13px; color: var(--gray-600);
  cursor: pointer;
}
.quiz-nav-btns button:disabled { opacity: .4; }

.quiz-body {
  padding: 16px;
  padding-bottom: 100px;
}
.q-type-badge {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 10px;
}
.q-type-badge.single { background: #dbeafe; color: #1d4ed8; }
.q-type-badge.multi { background: #fce7f3; color: #be185d; }
.q-type-badge.judge { background: #fef3c7; color: #b45309; }

.q-text {
  font-size: 16px; font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 16px;
  line-height: 1.7;
}

.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-option {
  background: #fff;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 15px;
  color: var(--gray-700);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  user-select: none;
  line-height: 1.5;
}
.q-option:active { transform: scale(.98); }
.q-option .opt-label {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
  color: var(--gray-500);
  transition: all .15s;
}
.q-option.selected {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.q-option.selected .opt-label {
  background: var(--primary); color: #fff;
}
.q-option.correct {
  border-color: var(--success) !important;
  background: var(--success-bg) !important;
}
.q-option.correct .opt-label {
  background: var(--success) !important; color: #fff !important;
}
.q-option.wrong {
  border-color: var(--danger) !important;
  background: var(--danger-bg) !important;
}
.q-option.wrong .opt-label {
  background: var(--danger) !important; color: #fff !important;
}
.q-option.disabled { pointer-events: none; }

/* Multi-select confirm button */
.multi-confirm-wrap {
  margin-top: 12px;
  text-align: center;
  display: none;
}
.multi-confirm-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 32px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.multi-confirm-btn:disabled {
  opacity: .5;
}

/* Judge options */
.judge-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.judge-option {
  background: #fff;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.judge-option:active { transform: scale(.97); }
.judge-option.selected { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.judge-option.correct { border-color: var(--success) !important; background: var(--success-bg) !important; color: var(--success) !important; }
.judge-option.wrong { border-color: var(--danger) !important; background: var(--danger-bg) !important; color: var(--danger) !important; }
.judge-option.disabled { pointer-events: none; }

/* Result card */
.result-card {
  margin-top: 16px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-header {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.result-header.correct-header { background: var(--success-bg); color: var(--success); }
.result-header.wrong-header { background: var(--danger-bg); color: var(--danger); }
.result-answer {
  padding: 12px 16px;
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  border-bottom: 1px solid var(--gray-100);
}
.result-explanation {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.7;
  border-bottom: 1px solid var(--gray-100);
}
.result-mnemonic {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--warn);
  background: var(--warn-bg);
  line-height: 1.6;
}
.result-explanation strong, .result-mnemonic strong {
  font-weight: 700;
}

/* Bottom nav for quiz */
.quiz-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 90;
  box-shadow: 0 -2px 10px rgba(0,0,0,.05);
}
.quiz-bottom button {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
}
.quiz-bottom button:disabled { opacity: .4; }
.btn-prev { background: var(--gray-100); color: var(--gray-600); }
.btn-next { background: var(--primary); color: #fff; }
.btn-next:active { background: #4338ca; }
.quiz-counter {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 600;
}

/* ===== Study Mode ===== */
.study-header {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 90;
}
.study-back {
  background: none; border: none;
  font-size: 24px; color: var(--gray-600);
  cursor: pointer; padding: 4px 8px;
}
.study-title {
  font-size: 16px; font-weight: 600; color: var(--gray-800);
}

.study-body {
  padding: 12px;
  padding-bottom: 40px;
}
.study-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.study-card .sc-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-num {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.study-card .sc-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-800);
  line-height: 1.6;
}
.study-card .sc-options {
  padding: 8px 14px;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-opt {
  padding: 4px 0;
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.5;
}
.study-card .sc-opt.is-answer {
  color: var(--success);
  font-weight: 700;
}
.study-card .sc-answer {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  background: var(--primary-bg);
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-explain {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.6;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-mnemonic {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--warn);
  background: var(--warn-bg);
  line-height: 1.5;
}
.study-card .sc-answer-text {
  padding: 10px 14px 14px;
  font-size: 13px;
  color: var(--gray-700);
  line-height: 1.75;
  white-space: pre-wrap;
}
.study-card .sc-note {
  padding: 10px 14px 14px;
  font-size: 12px;
  color: var(--gray-500);
  background: #fafafa;
  line-height: 1.6;
  white-space: pre-wrap;
}
.batch-card.extra-study {
  border: 1px solid var(--primary-light);
  background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
}

/* ===== Action Buttons ===== */
.action-section {
  padding: 16px;
  padding-top: 8px;
}
.action-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  margin-bottom: 10px;
}
.action-btn:active { transform: scale(.98); }
.btn-clear {
  background: #fff;
  color: var(--danger);
  border: 1px solid var(--danger);
}

/* ===== Stats Bar ===== */
.stats-bar {
  background: #fff;
  margin: 0 16px 16px;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-around;
}
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.stat-num.green { color: var(--success); }
.stat-num.red { color: var(--danger); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.8);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  animation: slideUp .2s ease;
}
.modal-box h3 { font-size: 16px; color: var(--gray-800); margin-bottom: 8px; }
.modal-box p { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.modal-cancel { background: var(--gray-100); color: var(--gray-600); }
.modal-confirm { background: var(--danger); color: #fff; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 0; }

/* ===== Loading ===== */
.loading-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  color: #fff;
  transition: opacity .3s;
}
.loading-screen.fade-out { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 16px; font-weight: 600; }

/* ===== Favorite Button ===== */
.fav-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: 1.5px solid var(--gray-300);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 13px;
  color: var(--gray-400);
  cursor: pointer;
  transition: all .2s;
  margin-left: auto;
  float: right;
  user-select: none;
}
.fav-btn:active { transform: scale(.95); }
.fav-btn.faved {
  border-color: var(--warn);
  color: var(--warn);
  background: var(--warn-bg);
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载题库...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">确认清空</h3>
    <p id="modalMsg">确定要清空所有做题记录吗？此操作不可恢复。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" id="modalConfirmBtn">确定清空</button>
    </div>
  </div>
</div>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="homePage">
  <div class="header">
    <h1>AI三级理论知识</h1>
    <div class="subtitle">去除600-a重复题 · 共 581 题</div>
  </div>

  <!-- Stats -->
  <div style="padding:16px 16px 0">
    <div class="stats-bar" style="margin:0">
      <div class="stat-item">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">已做题数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num green" id="statCorrect">0</div>
        <div class="stat-label">答对</div>
      </div>
      <div class="stat-item">
        <div class="stat-num red" id="statWrong">0</div>
        <div class="stat-label">答错</div>
      </div>
      <div class="stat-item" onclick="openWrongBook()" style="cursor:pointer">
        <div class="stat-num red" id="statWrongBook">0</div>
        <div class="stat-label">错题集 &#9654;</div>
      </div>
      <div class="stat-item" onclick="openFavorites()" style="cursor:pointer">
        <div class="stat-num" id="statFavorites" style="color:var(--warn)">0</div>
        <div class="stat-label">收藏夹 &#9654;</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statRate" style="color:var(--warn)">0%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>
  </div>

  <div class="home-section">
    <!-- Mode Selection -->
    <div class="batch-title">选择模式</div>
    <div class="mode-cards">
      <div class="mode-card selected" id="modeQuiz" onclick="selectMode('quiz')">
        <div class="icon">&#9997;&#65039;</div>
        <div class="label">刷题模式</div>
        <div class="desc">选择答案立即判对错</div>
      </div>
      <div class="mode-card" id="modeStudy" onclick="selectMode('study')">
        <div class="icon">&#128214;</div>
        <div class="label">背题模式</div>
        <div class="desc">直接展示答案解析</div>
      </div>
    </div>

    <!-- Batch Selection -->
    <div class="batch-title">选择题库</div>
    <div class="batch-grid" id="batchGrid"></div>
  </div>

  <div class="action-section">
    <button class="action-btn btn-clear" onclick="showClearModal()">&#128465; 一键清空所有做题记录</button>
  </div>
</div>

<!-- ===== QUIZ PAGE ===== -->
<div class="page" id="quizPage">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">&#8592;</button>
    <span class="quiz-progress-text" id="quizProgressText"></span>
    <div class="quiz-nav-btns">
      <button onclick="jumpToQuestion()" title="跳转">&#128203;</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div style="height:3px;background:var(--gray-200);">
    <div id="quizProgressBar" style="height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));transition:width .3s;width:0"></div>
  </div>

  <div class="quiz-body" id="quizBody"></div>

  <div class="quiz-bottom">
    <button class="btn-prev" id="btnPrev" onclick="prevQuestion()">&#9664; 上一题</button>
    <span class="quiz-counter" id="quizCounter"></span>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 &#9654;</button>
  </div>
</div>

<!-- ===== STUDY PAGE ===== -->
<div class="page" id="studyPage">
  <div class="study-header">
    <button class="study-back" onclick="goHome()">&#8592;</button>
    <span class="study-title" id="studyTitle"></span>
  </div>
  <div class="study-body" id="studyBody"></div>
</div>

<!-- wrongBookPage removed: wrong book now uses quizPage -->

<script>
// ===== DATA =====
const ALL_QUESTIONS = [{"id":1,"type":"single","text":"数据整合的主要目的是（）。","options":[{"label":"A","text":"将分散的数据存储在同一个数据库中"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"将来自不同来源的数据进行合并和统一处理"},{"label":"D","text":"增强数据的安全性"}],"answer":"C","explanation":"数据整合通过ETL过程合并多源数据，增强数据功能和应用价值。","mnemonic":"整合=合并统一，多源数据合一选C"},{"id":2,"type":"single","text":"在对用户进行分类时，专家型用户通常具有哪些特点？（）","options":[{"label":"A","text":"只关注产品的外观和品牌形象。"},{"label":"B","text":"需要大量指导才能完成基本操作。"},{"label":"C","text":"对产品非常熟悉，能够高效使用其所有功能。"},{"label":"D","text":"使用频率低，但对产品有较强的需求。"}],"answer":"C","explanation":"专家型用户是高度熟练的用户，对产品非常熟悉，能够充分利用其所有功能，甚至发现并利用一些隐藏的高级功能","mnemonic":"专家型=熟练+高效，样样精通选C"},{"id":3,"type":"single","text":"K 折交叉验证的核心思路是（）。","options":[{"label":"A","text":"根据训练集和测试集的误差调整模型参数，直到误差最小化"},{"label":"B","text":"对训练集数据进行重复采样得到多个子集，每个子集用于训练和测试，最终将结果平均化"},{"label":"C","text":"将多个模型的输出结果加权融合，得到最终预测结果"},{"label":"D","text":"将数据集分为K个部分，每次将其中一个部分作为测试集，其余部分作为训练集，重复K次"}],"answer":"D","explanation":"K折交叉验证的基本思想是将数据集分为K个部分，每次将其中一个部分作为测试集，其余部分作为训练集，重复K次","mnemonic":"K折=分K份轮流当测试，选D不选B（B是重复采样）"},{"id":4,"type":"single","text":"在 Python 中，（）函数可以对图像实施中值滤波处理。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.GaussianBlur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"D","explanation":"在Python中，可以使用cv2.medianBlur()函数对图像进行中值滤波处理","mnemonic":"中值滤波=medianBlur，median就是中值选D"},{"id":5,"type":"single","text":"1969 年，贝尔实验室研发出的计算机操作系统是什么（）。","options":[{"label":"A","text":"Unix"},{"label":"B","text":"Linux"},{"label":"C","text":"MacOS"},{"label":"D","text":"Windows"}],"answer":"A","explanation":"Unix是最早的计算机操作系统之一，于1969年由贝尔实验室开发。","mnemonic":"1969贝尔=Unix，谐音\"优你可思\"选A"},{"id":6,"type":"single","text":"图像处理中的卷积操作具体指的是（）。","options":[{"label":"A","text":"图像的旋转"},{"label":"B","text":"图像的缩放"},{"label":"C","text":"图像的滤波"},{"label":"D","text":"图像的修复"}],"answer":"C","explanation":"卷积操作通过核函数与图像卷积实现滤波效果。","mnemonic":"卷积=滤波，卷积核滑过图像做滤波选C"},{"id":7,"type":"single","text":"支持向量机算法的原理是建立在（）基础上的。","options":[{"label":"A","text":"最小二乘法"},{"label":"B","text":"线性回归"},{"label":"C","text":"最大熵模型"},{"label":"D","text":"最大间隔"}],"answer":"D","explanation":"支持向量机通过最大化分类间隔寻找最优分类超平面。","mnemonic":"SVM=最大间隔，支持向量撑开最大距离选D"},{"id":8,"type":"single","text":"图像增强里的对比度增强属于哪一类型的增强（）。","options":[{"label":"A","text":"光学增强"},{"label":"B","text":"空域增强"},{"label":"C","text":"频域增强"},{"label":"D","text":"几何增强"}],"answer":"B","explanation":"空域法是直接作用于图像像素改变其固有特性的图像增强方法，以灰度映射为基础，通过改变图像灰度的动态范围，有效提升了图像的对比度和细节信息","mnemonic":"对比度增强=空域增强，直接改像素灰度值选B"},{"id":9,"type":"single","text":"对比分析的作用是比较不同组别或对象之间存在的（）。","options":[{"label":"A","text":"趋势"},{"label":"B","text":"分布"},{"label":"C","text":"差异"},{"label":"D","text":"相关性"}],"answer":"C","explanation":"对比分析揭示不同组别间差异。","mnemonic":"对比分析比的是\"差异\"，有比较才有差异选C"},{"id":10,"type":"single","text":"业务流程重组（BPR）与信息技术（IT）之间的关系可以怎样描述（）。","options":[{"label":"A","text":"BPR完全依赖于IT"},{"label":"B","text":"BPR与IT相互独立"},{"label":"C","text":"BPR在某些情况下可以独立于IT"},{"label":"D","text":"BPR和IT是完全相同的概念"}],"answer":"C","explanation":"业务流程重组（BPR）可以独立于信息技术（IT）而存在，但这种独立是相对的。在BPR实施过程中，IT作为技术工具，可以促进BPR的实施，起到催化剂的作用。因此，选项C正确描述了BPR与IT之间的关系。选项A、B和D都没有准确反映这种关系。","mnemonic":"BPR某些情况可独立于IT，不完全依赖选C"},{"id":11,"type":"single","text":"RFM 模型里的 “R” 所指代的是（）。","options":[{"label":"A","text":"客户的满意度"},{"label":"B","text":"客户的消费金额"},{"label":"C","text":"客户购买的频率"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"D","explanation":"RFM模型中，R代表了最近一次购买时间间隔，指用户最近一次消费时间距离现在的时间间隔，这个指标可以反映出客户的购买意愿。","mnemonic":"RFM的R=Recency=最近一次购买时间间隔选D"},{"id":12,"type":"single","text":"在现代操作系统的各项特性里，最为关键的特性是（）。","options":[{"label":"A","text":"虚拟性"},{"label":"B","text":"异步性"},{"label":"C","text":"共享性"},{"label":"D","text":"并发性"}],"answer":"D","explanation":"现代操作系统应该具备并发性、共享性、异步性和虚拟性四种最基本特性，其中并发性是最重要的特性","mnemonic":"操作系统最关键=并发性，\"并\"排第一选D"},{"id":13,"type":"single","text":"下列哪项不属于计算机的特点（）。","options":[{"label":"A","text":"可拓展性强"},{"label":"B","text":"自动化程度高"},{"label":"C","text":"运算速度快"},{"label":"D","text":"存储功能强"}],"answer":"A","explanation":"计算机的特点主要体现在运转速度快、运算精度高、存储功能强、具有逻辑判断能力、自动化程度高。","mnemonic":"可拓展性不属于计算机经典五大特点选A"},{"id":14,"type":"single","text":"以下哪种行为触犯了《中华人民共和国个人信息保护法》的规定？","options":[{"label":"A","text":"个人同意将手机号码授权给某企业，但该企业将该号码出售给第三方公司。"},{"label":"B","text":"个人在某电商平台上购买商品时，需要提供姓名、地址等信息。"},{"label":"C","text":"某医疗机构公布患者病历信息，但已经对患者姓名等信息进行脱敏处理。"},{"label":"D","text":"某企业在其公司网站上公布待招聘的岗位职称、工资水平等信息。"}],"answer":"A","explanation":"根据《中华人民共和国个人信息保护法》第十条规定，任何组织、个人不得非法收集、使用、加工、传输他人个人信息，不得非法买卖、提供或者公开他人个人信息；不得从事危害国家安全、公共利益的个人信息处理活动，A选项该企业将手机号码出售给第三方公司，违反了相关法律规定。","mnemonic":"授权给A却被A卖给B=违法转卖个人信息选A"},{"id":15,"type":"single","text":"在计算机执行计算的基础硬件部件里，处于核心地位的组成部分是（）。","options":[{"label":"A","text":"输入设备"},{"label":"B","text":"输出设备"},{"label":"C","text":"CPU（中央处理单元）"},{"label":"D","text":"存储器"}],"answer":"C","explanation":"计算机的CPU（中央处理单元）、存储器、输入/输出设备是计算机执行计算的基础硬件部件。CPU是计算机最核心的组成部分，它负责执行运算和控制指令，是计算能力的直接体现。","mnemonic":"CPU是计算机的大脑和核心选C"},{"id":16,"type":"single","text":"若某算法的时间复杂度为 O (nlogn)，则其效率会高于具有（）算法复杂度的算法。","options":[{"label":"A","text":"O(logn)"},{"label":"B","text":"O(n²)"},{"label":"C","text":"O(n)"},{"label":"D","text":"O(1)"}],"answer":"B","explanation":"根据时间复杂度理论，O(nlogn) 的效率高于 O(n²)，但低于 O(1)、O(logn) 和 O(n)","mnemonic":"O(nlogn)比O(n²)快，n²最慢所以效率高于它选B"},{"id":17,"type":"single","text":"下列哪种行为符合诚实公正这一基本要求（）。","options":[{"label":"A","text":"利用他人的弱点谋取个人利益"},{"label":"B","text":"基于客观事实做出决策和评估"},{"label":"C","text":"故意虚假陈述或隐瞒事实"},{"label":"D","text":"说谎来避免责任"}],"answer":"B","explanation":"诚实公正要求从业者公平对待各方，依据客观事实和公正标准决策评估。","mnemonic":"诚实公正=基于客观事实，实事求是选B"},{"id":18,"type":"single","text":"GOMS 模型无法考虑到哪些因素？","options":[{"label":"A","text":"心理特征"},{"label":"B","text":"交互细节"},{"label":"C","text":"个体差异"},{"label":"D","text":"人类记忆机制"}],"answer":"C","explanation":"GOMS模型无法考虑个体差异，但涵盖心理特征和交互细节。","mnemonic":"GOMS不考虑个体差异，模型统一不分人选C"},{"id":19,"type":"single","text":"在图形用户界面设计过程中，遵循前期确定的设计规范且使用一致的描述词语，这所依据的设计原则是（）。","options":[{"label":"A","text":"美观性"},{"label":"B","text":"性能优化"},{"label":"C","text":"用户反馈"},{"label":"D","text":"一致性"}],"answer":"D","explanation":"一致性设计原则确保界面元素统一，提升用户操作效率和体验。","mnemonic":"设计规范+一致描述=一致性原则选D"},{"id":20,"type":"single","text":"在产品设计中，可用性设计的主要目的是（）。","options":[{"label":"A","text":"可以提高用户体验"},{"label":"B","text":"可以节省产品设计成本"},{"label":"C","text":"可以快速推广产品"},{"label":"D","text":"可以提高产品的安全性"}],"answer":"A","explanation":"可用性设计的核心目标是提升用户体验，使得用户在使用过程中能够高效、愉快地完成任务，并对产品产生正向的情感反馈。虽然良好的可用性设计可以在后期减少维护成本，但节省成本不是可用性设计的直接目的，节省成本更多是设计过程中其他方面的目标。市场份额的增加是产品成功的结果，尽管可用性设计可以帮助产品更好地被用户接受，但它本身并不是针对市场份额的目标。安全性是一个独立的设计目标，与可用性设计并不直接相关。虽然安全性对用户体验至关重要，但它是其他专门设计领域的关注重点。","mnemonic":"可用性设计=提高用户体验，用着舒服选A"},{"id":21,"type":"single","text":"从指标构成角度进行拆解，指的是什么（）。","options":[{"label":"A","text":"将问题进行归纳总结，形成一个总结树。"},{"label":"B","text":"将问题进行分类，形成一个分类树。"},{"label":"C","text":"先进行细分，再将问题进行分层。"},{"label":"D","text":"从指标的定义来看指标的构成"}],"answer":"D","explanation":"从指标构成来拆解是指从指标的定义来看指标的构成","mnemonic":"指标构成拆解=从定义看构成选D"},{"id":22,"type":"single","text":"下列哪项情况能够判断算法存在过拟合问题（）。","options":[{"label":"A","text":"模型在不同的验证集上表现一致，且在每个验证集上误差较低"},{"label":"B","text":"交叉验证的结果显示，训练误差明显低于验证误差"},{"label":"C","text":"训练集和测试集的特征分布相似"},{"label":"D","text":"使用较低的正则化强度，导致训练集上误差明显提高"}],"answer":"B","explanation":"训练误差远低于验证误差表明模型可能过拟合，泛化能力不足。","mnemonic":"训练误差小测试误差大=过拟合，考试抄答案选B"},{"id":23,"type":"single","text":"1946 年，美国宾夕法尼亚大学的约翰・莫奇利与哪位科学家一同发明了世界上第一台通用电子计算机 ENIAC（）。","options":[{"label":"A","text":"李约瑟"},{"label":"B","text":"普雷斯珀・埃克特"},{"label":"C","text":"诺贝尔"},{"label":"D","text":"爱迪生"}],"answer":"B","explanation":"世界上第一台通用电子计算机 ENIAC 是在1946年由美国宾夕法尼亚大学的约翰・莫奇利和J.普雷斯珀・埃克特发明。","mnemonic":"ENIAC发明者=莫奇利+埃克特，\"埃克特\"谐音\"额客特\"选B"},{"id":24,"type":"single","text":"PEST 模型中的 “政治” 因素涉及（）方面。","options":[{"label":"A","text":"人才储备、竞争力、专利技术和知识产权"},{"label":"B","text":"社会心理、消费习惯、文化差异和地理位置"},{"label":"C","text":"同行竞争、技术变革、市场规模和市场趋势"},{"label":"D","text":"政府政策、法律法规、税收政策、政治稳定性"}],"answer":"D","explanation":"PEST模型中政治因素包括政策、法规、税收及稳定性。","mnemonic":"PEST的P=Political=政府政策法律税收选D"},{"id":25,"type":"single","text":"在行为模型的交互流程中，下列哪项描述了行为模型与环境之间进行信息交换的方式？","options":[{"label":"A","text":"决策树的建立和优化"},{"label":"B","text":"强化学习的奖励函数"},{"label":"C","text":"学习算法的选择"},{"label":"D","text":"观察-行动-评估循环"}],"answer":"D","explanation":"观察-行动-评估循环是描述行为模型与环境之间信息交流的方法","mnemonic":"观察-行动-评估循环=行为模型与环境交互方式选D"},{"id":26,"type":"single","text":"关于数据标注流程的制定，下列说法不正确的是（）。","options":[{"label":"A","text":"每次标注可以安排多个标注人员进行，以保证标注结果的准确性"},{"label":"B","text":"标注过程中应该尽量减少标注人员之间的交流"},{"label":"C","text":"标注人员的选拔和培训非常重要"},{"label":"D","text":"合理的数据标注流程可以有效提高算法的训练效果"}],"answer":"B","explanation":"标注过程中适当交流有助于统一标准，提高准确性。","mnemonic":"标注人员应多交流统一标准，减少交流是错的选B"},{"id":27,"type":"single","text":"分析机这种机械式通用计算机，其设计者是英国数学家谁（）。","options":[{"label":"A","text":"亚当·欧泽尼斯基"},{"label":"B","text":"查理斯·巴贝奇"},{"label":"C","text":"史蒂夫·乔布斯"},{"label":"D","text":"比尔·盖茨"}],"answer":"B","explanation":"分析机是由英国数学家查尔斯·巴贝奇设计的一种机械式通用计算机。","mnemonic":"分析机=巴贝奇，\"巴巴\"分析选B"},{"id":28,"type":"single","text":"对于专家型用户而言，菜单系统的响应速度应该具有以下哪项特点？（）","options":[{"label":"A","text":"快速响应"},{"label":"B","text":"缓慢响应"},{"label":"C","text":"慢慢响应"},{"label":"D","text":"无所谓响应速度"}],"answer":"A","explanation":"专家型用户需要快速响应的菜单系统以提高效率。","mnemonic":"专家用户要快速响应，高手不等人选A"},{"id":29,"type":"single","text":"下列哪项并非文件所具有的属性（）。","options":[{"label":"A","text":"名称"},{"label":"B","text":"文件大小"},{"label":"C","text":"文件创建时间"},{"label":"D","text":"文件内容"}],"answer":"D","explanation":"文件的基本属性包括名称、类型、创建者、位置、大小、创建时间等。","mnemonic":"文件内容不是文件属性，属性是描述信息选D"},{"id":30,"type":"single","text":"在特征选择方法中，哪项通常依据特征与目标变量之间的相关性来进行特征选择（）。","options":[{"label":"A","text":"过滤式方法"},{"label":"B","text":"包裹式方法"},{"label":"C","text":"嵌入式方法"},{"label":"D","text":"主成分分析"}],"answer":"A","explanation":"过滤式方法（Filter Method）是通过评估各个特征与目标变量之间的相关性（如通过相关系数、卡方检验、信息增益等统计方法）来选择最相关的特征，通常独立于任何机器学习模型。因此，选项A是正确的。包裹式方法（Wrapper Method）通过使用特定的学习算法来评估特征子集的性能，选择对模型表现最有利的特征。嵌入式方法（Embedded Method）在训练模型的过程中同时进行特征选择，常见的如L1正则化（Lasso）和决策树等模型。主成分分析（PCA）是一种降维技术，而不是特征选择方法，虽然它也涉及特征的重要性评估，但其目的在于将数据投影到较低维度空间，而非直接选择特征。","mnemonic":"过滤式=看相关性筛特征，像筛子过滤选A"},{"id":31,"type":"single","text":"在神经网络里，下列类网络适合处理序列数据和时序信息（）。","options":[{"label":"A","text":"GAN(GenerativeAdversarialNetwork)"},{"label":"B","text":"MLP(Multi-LayerPerceptron)"},{"label":"C","text":"CNN(ConvolutionalNeuralNetwork)"},{"label":"D","text":"RNN(RecurrentNeuralNetwork)"}],"answer":"D","explanation":"RNN是一种适合处理序列数据和时序信息的神经网络","mnemonic":"RNN处理序列，R=Recurrent=循环=时序选D"},{"id":32,"type":"single","text":"职业道德的实践目标在于（）。","options":[{"label":"A","text":"改善职业实践者的工作条件"},{"label":"B","text":"提高职业实践者的薪资待遇"},{"label":"C","text":"保护公民的利益和权益"},{"label":"D","text":"保护职业从业者的个人利益"}],"answer":"C","explanation":"职业道德的根本目标是维护公众的权利和利益，要求从业者恪守职业规范，确保行为不对他人造成损害。","mnemonic":"职业道德目标=保护公民利益权益，为民服务选C"},{"id":33,"type":"single","text":"在下列语音信号处理方法中，主要用于去除语音信号中背景噪声的是（）。","options":[{"label":"A","text":"语音活动检测"},{"label":"B","text":"动态时间规整"},{"label":"C","text":"谱减法"},{"label":"D","text":"线性预测编码"}],"answer":"C","explanation":"A. 线性预测编码（LPC）是一种特征提取方法，主要用于描述语音信号的声道模型，并不直接用于去噪","mnemonic":"谱减法去背景噪声，\"谱\"减去噪声的\"谱\"选C"},{"id":34,"type":"single","text":"在关联分析所使用的算法中，通过基于频繁模式树的方式来发现频繁项集的是（）。","options":[{"label":"A","text":"Eclat算法"},{"label":"B","text":"FP-growth算法"},{"label":"C","text":"Apriori算法"},{"label":"D","text":"K-means算法"}],"answer":"B","explanation":"FP-growth算法通过频繁模式树高效发现频繁项集。","mnemonic":"FP-growth=频繁模式树，FP=Frequent Pattern选B"},{"id":35,"type":"single","text":"在业务流程重组（BPR）中，下列哪一项不是造成项目失败的主要原因（）。","options":[{"label":"A","text":"流程重组后缺乏对员工的奖励机制"},{"label":"B","text":"组织对变革的抗拒"},{"label":"C","text":"不切实际的实施范围与期望"},{"label":"D","text":"缺乏高层管理人员的支持和参与"}],"answer":"A","explanation":"高层管理人员的支持对于BPR的成功至关重要，他们的参与可以确保项目获得必要的资源和关注。如果项目的范围过于广泛或期望过高，可能导致项目难以实现预定目标。员工和管理层可能对变革持保守态度，这种抗拒会阻碍BPR的实施。","mnemonic":"缺乏奖励机制不是BPR失败主因，其余三项才是选A"},{"id":36,"type":"single","text":"留出法与交叉验证法的不同点在于（）。","options":[{"label":"A","text":"留出法只使用训练集训练模型，交叉验证法同时使用训练集和测试集训练模型"},{"label":"B","text":"留出法不考虑数据分布的问题，交叉验证法考虑数据分布"},{"label":"C","text":"留出法只适用于二分类问题，交叉验证法适用于多分类问题"},{"label":"D","text":"留出法基于单次划分，但往往需多次随机划分取平均，交叉验证法通过k折结构系统划分"}],"answer":"D","explanation":"留出法和交叉验证法都是常用的模型评估方法，不同之处在于留出法只划分一次数据集，将数据集分为训练集和测试集，最终的模型评估结果的平均值就是测试集的评估结果，由于单次划分可能导致结果波动（如不同随机种子影响），实际应用中需通过​​多次随机划分并取平均​​（如100次）提升稳定性","mnemonic":"留出法单次划分多次取均，交叉验证K折系统划分选D"},{"id":37,"type":"single","text":"追求卓越所需要遵循的基本要求是（）。","options":[{"label":"A","text":"持续改进"},{"label":"B","text":"忽视细节"},{"label":"C","text":"缺乏规划"},{"label":"D","text":"保持现状"}],"answer":"A","explanation":"追求卓越的基本要求是高标准要求、持续改进、创造创新、追求专业素养和发挥潜力。A选项符合题意。","mnemonic":"追求卓越=持续改进，越来越好选A"},{"id":38,"type":"single","text":"在机器学习领域，当出现（）情况时，说明算法发生了过拟合。","options":[{"label":"A","text":"训练集的误差和测试集的误差都很小"},{"label":"B","text":"训练集和测试集的误差都很大"},{"label":"C","text":"训练集的误差很小，但测试集的误差很大"},{"label":"D","text":"训练集和测试集的误差相差很小"}],"answer":"C","explanation":"过拟合表现为训练误差小、测试误差大。","mnemonic":"过拟合=训练好测试差，背答案不会举一反三选C"},{"id":39,"type":"single","text":"深度神经网络里，反向传播算法的主要功能是（）。","options":[{"label":"A","text":"调整学习率以加速训练"},{"label":"B","text":"通过正则化防止过拟合"},{"label":"C","text":"计算损失函数对网络参数的梯度"},{"label":"D","text":"计算激活函数的输出"}],"answer":"C","explanation":"反向传播算法（Backpropagation）是深度学习中最常用的优化算法之一，其主要目的是计算损失函数对网络中各层权重的梯度","mnemonic":"反向传播=计算梯度，BP算梯度更新权重选C"},{"id":40,"type":"single","text":"在 Word 中完成邮件合并后，能用什么功能来预览并编辑合并后的邮件（）。","options":[{"label":"A","text":"“预览结果”选项"},{"label":"B","text":"“编辑收件人列表”选项"},{"label":"C","text":"“写信”选项"},{"label":"D","text":"“保存”选项"}],"answer":"A","explanation":"“预览结果”功能可用于查看和编辑邮件合并后的内容，支持个性化调整。","mnemonic":"邮件合并后用\"预览结果\"查看编辑选A"},{"id":41,"type":"single","text":"下列关于 BOW 模型的说法，错误的是（）。","options":[{"label":"A","text":"文档中每个词不是独立的"},{"label":"B","text":"有维数大和稀疏性的缺点"},{"label":"C","text":"不能保留语义"},{"label":"D","text":"BOW模型忽略文档的词语顺序语法、句法等要素"}],"answer":"A","explanation":"BOW模型忽略词语顺序和语法，假设词间独立。","mnemonic":"BOW模型中词是独立的，说不独立是错的选A"},{"id":42,"type":"single","text":"数据仓库的特征中，不包含的是（）。","options":[{"label":"A","text":"时变性"},{"label":"B","text":"数据经常变化且更新频率高"},{"label":"C","text":"集成性"},{"label":"D","text":"面向主题"}],"answer":"B","explanation":"数据仓库的特征在于面向主题、集成性、稳定性、时变性（随时间变化的）","mnemonic":"数据仓库特征=稳定不常变，频繁更新不属于选B"},{"id":43,"type":"single","text":"K - 近邻算法属于一种（）。","options":[{"label":"A","text":"强化学习算法"},{"label":"B","text":"半监督学习算法"},{"label":"C","text":"非监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"D","explanation":"K-近邻算法是一种监督学习算法，它通过计算待分类样本与训练数据集中的每个样本之间的距离，选择距离最近的样本进行分类","mnemonic":"KNN=监督学习，需要标签才能找邻居分类选D"},{"id":44,"type":"single","text":"依据勤勉好学的基本要求，勤勉好学的人会拥有（）品质。","options":[{"label":"A","text":"自私自利，不愿意为他人着想"},{"label":"B","text":"缺乏学习能力，不善于接受新的知识"},{"label":"C","text":"保持高度的责任心和工作效率"},{"label":"D","text":"不重视团队合作，喜欢单打独斗"}],"answer":"C","explanation":"勤勉好学的人具备良好的工作态度，勤奋努力地完成工作，保持高度的责任心和工作效率，愿意加班和付出额外的努力以完成任务。而自私自利、缺乏学习能力、不重视团队合作、喜欢单打独斗的人则不能被称为勤勉好学的人。","mnemonic":"勤勉好学=高责任心+高效率，勤奋出效率选C"},{"id":45,"type":"single","text":"当模型存在欠拟合问题时，训练误差与测试误差会呈现出（）的状态。","options":[{"label":"A","text":"训练误差和测试误差都很小"},{"label":"B","text":"训练误差很小，测试误差很大"},{"label":"C","text":"训练误差和测试误差都很大"},{"label":"D","text":"训练误差很大，测试误差很小"}],"answer":"C","explanation":"当模型欠拟合时，表示模型对训练数据的拟合能力较弱，无法捕捉到数据的规律，因此训练误差较高。由于模型的不足，它在测试数据上的表现也同样不好，因此测试误差也较高。欠拟合通常意味着模型过于简单，无法有效学习数据中的模式。","mnemonic":"欠拟合=训练测试都差，模型太简单啥都学不会选C"},{"id":46,"type":"single","text":"关于模型复杂度与过拟合、欠拟合之间关系的描述，正确的是（）。","options":[{"label":"A","text":"欠拟合通常发生在训练集上的误差较低，但测试集误差较高的情况下"},{"label":"B","text":"过拟合和欠拟合之间存在一个权衡，增加模型复杂度可以减少欠拟合，但可能增加过拟合的风险"},{"label":"C","text":"当模型过于简单时，可能会导致过拟合"},{"label":"D","text":"增加模型复杂度通常会导致欠拟合的风险增加"}],"answer":"B","explanation":"A选项：增加模型复杂度通常会降低欠拟合的风险，因为复杂模型能更好地拟合训练数据，但不会增加欠拟合的风险","mnemonic":"复杂度权衡：增加复杂度减欠拟合但增过拟合风险选B"},{"id":47,"type":"single","text":"在支持向量机算法中，最大化间隔的目的是（）。","options":[{"label":"A","text":"使分类器的复杂度更小"},{"label":"B","text":"使分类器的测试误差更小"},{"label":"C","text":"使分类器的训练误差更小"},{"label":"D","text":"使分类器的泛化性能更好"}],"answer":"D","explanation":"支持向量机最大化间隔以提升泛化性能，减少过拟合。","mnemonic":"SVM最大间隔=提升泛化性能，间隔大泛化好选D"},{"id":48,"type":"single","text":"下列选项中，不属于 SWOT 分析模型包含的要素的是（）。","options":[{"label":"A","text":"优势"},{"label":"B","text":"资源"},{"label":"C","text":"机会"},{"label":"D","text":"威胁"}],"answer":"B","explanation":"SWOT分析包含优势、劣势、机会和威胁四个要素，资源不属于其组成部分。","mnemonic":"SWOT=优劣机威，没有\"资源\"这个要素选B"},{"id":49,"type":"single","text":"对于 RFM 模型，下列表述正确的是（）。","options":[{"label":"A","text":"RFM模型是一种用户的分群和分层模型"},{"label":"B","text":"RFM模型只考虑了消费金额这一指标"},{"label":"C","text":"RFM模型不适用于电子商务场景"},{"label":"D","text":"RFM模型主要是基于客户的社交资本进行分类的"}],"answer":"A","explanation":"RFM模型根据最近购买时间、消费频率和金额对用户分群，用于精准营销。","mnemonic":"RFM=分群分层模型，R+F+M三维度分用户选A"},{"id":50,"type":"single","text":"能够评估企业内外部环境的是（）。","options":[{"label":"A","text":"战略规划"},{"label":"B","text":"用户调研"},{"label":"C","text":"竞争对手分析"},{"label":"D","text":"SWOT分析"}],"answer":"D","explanation":"SWOT分析是一种常用的业务分析方法，通过评估企业的内部优势和弱点以及外部环境的机会和威胁来评估企业的整体情况，为企业制定战略提供依据","mnemonic":"SWOT评估企业内外部环境，内优劣外机威选D"},{"id":51,"type":"single","text":"下列哪一项并非 RFM 模型中的衡量指标（）。","options":[{"label":"A","text":"购买的频率"},{"label":"B","text":"固定资产投资额"},{"label":"C","text":"客户的购买额度"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"B","explanation":"RFM指标含购买时间、频率、金额，不含固定资产投资。","mnemonic":"RFM三字母=最近购买(R)、频率(F)、金额(M)，固定资产投资不沾边，选B"},{"id":52,"type":"single","text":"漏斗分析的具体含义是什么（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"对于某一转化目标，把用户从进入网站、注册、浏览、加入购物车、到提交订单的各个步骤称为漏斗，分析各个步骤的转化率"},{"label":"C","text":"通过统计用户停留时长和点击数据，了解用户对页面的喜好和需求"},{"label":"D","text":"对使用某款产品或服务的用户行为进行分解并分析的方法"}],"answer":"B","explanation":"从业务流程起点开始到最后目标完成的每个环节都会有用户流失，因此需要一种分析方法来衡量业务流程每一步的转化效率，漏斗分析方法就是这样的分析方法","mnemonic":"漏斗分析=各步骤转化率分析，像漏斗逐层过滤用户，选B描述最精准"},{"id":53,"type":"single","text":"在特征选择中，运用 L1 正则化主要是为了实现什么功能（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"解决特征之间的多重共线性问题"},{"label":"C","text":"对特征进行降维处理"},{"label":"D","text":"自动进行特征选择"}],"answer":"D","explanation":"L1正则化（Lasso）通过对模型参数施加L1惩罚，使得部分特征的系数被推向零，从而实现特征选择","mnemonic":"L1正则化=Lasso=系数归零=自动特征选择，L1让特征\"消失\"选D"},{"id":54,"type":"single","text":"计算机在农业领域有哪些具体应用（）。","options":[{"label":"A","text":"农作物种植与管理"},{"label":"B","text":"动物饲养与繁殖"},{"label":"C","text":"农产品加工和销售"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"计算机在农业领域中的应用包括农作物种植与管理、动物饲养与繁殖、农产品加工和销售等方面。","mnemonic":"计算机农业应用：种植+饲养+加工销售全覆盖，\"农业全能\"选D"},{"id":55,"type":"single","text":"高性能计算（HPC）所支持的并行负载，其常见使用场景中不包括的是（）。","options":[{"label":"A","text":"上下文搜索"},{"label":"B","text":"交通管理"},{"label":"C","text":"分子建模"},{"label":"D","text":"风险模拟"}],"answer":"B","explanation":"高性能计算支持的并行负载场景包括风险模拟、分子建模等，交通管理属于紧密耦合负载。","mnemonic":"HPC并行负载：风险模拟、分子建模、上下文搜索都是，交通管理是紧耦合选B"},{"id":56,"type":"single","text":"根据《中华人民共和国民法典》，关于自然人的民事权利能力，下列说法正确的是（）。","options":[{"label":"A","text":"只有完全民事行为能力人有民事权利能力"},{"label":"B","text":"自然人的民事权利能力一律平等"},{"label":"C","text":"胎儿没有民事权利能力"},{"label":"D","text":"自然人的民事权利能力始于出生，终于死亡，并且可以被剥夺"}],"answer":"B","explanation":"自然人民事权利能力始于出生终于死亡，一律平等且不可剥夺。","mnemonic":"民事权利能力一律平等，始于出生终于死亡不可剥夺，选B\"平等\""},{"id":57,"type":"single","text":"什么是聚类分析（）。","options":[{"label":"A","text":"对数据进行时序分析的一种方法"},{"label":"B","text":"对数据进行因果分析的一种方法"},{"label":"C","text":"对数据进行回归分析的一种方法"},{"label":"D","text":"对数据进行分组的一种方法"}],"answer":"D","explanation":"聚类分析是一种对数据进行分组的方法，其目的是将具有相似特征的数据点聚集到一起，从而形成不同的类别","mnemonic":"聚类=聚在一起=分组，不是时序/因果/回归，\"物以类聚\"选D"},{"id":58,"type":"single","text":"下列问题中，不属于 5W2H 模型核心要素范畴的是？","options":[{"label":"A","text":"Why"},{"label":"B","text":"Who"},{"label":"C","text":"Which"},{"label":"D","text":"What"}],"answer":"C","explanation":"5W2H要素包括What/Why/Who/When/Where/How/How much，不含Which。","mnemonic":"5W2H=What/Why/Who/When/Where+How/How much，没有Which选C排除"},{"id":59,"type":"single","text":"下列选项中，不能体现职业道德特征的是（）。","options":[{"label":"A","text":"持续学习和专业发展"},{"label":"B","text":"追求个人权力和地位"},{"label":"C","text":"提供公正和专业的服务"},{"label":"D","text":"保护客户隐私和机密"}],"answer":"B","explanation":"保护客户隐私和机密、提供公正和专业的服务以及持续学习和专业发展都是职业道德的重要体现","mnemonic":"追求个人权力地位是反面典型，不体现职业道德，选B"},{"id":60,"type":"single","text":"关于交叉验证说法正确的是（）。","options":[{"label":"A","text":"交叉验证将数据集划分为两个子集，分别作为训练集和测试集，进行一次性训练和测试"},{"label":"B","text":"交叉验证通过将数据集划分为k个子集，依次使用每个子集作为测试集，其余k-1个子集作为训练集，最终综合所有测试结果"},{"label":"C","text":"交叉验证每次随机选择部分样本作为训练集，剩余样本作为测试集，直到所有样本都作为测试集"},{"label":"D","text":"交叉验证仅使用一个子集进行训练，其他子集不参与模型训练与测试"}],"answer":"B","explanation":"k折交叉验证将数据分为k个子集，轮换测试并平均结果，以评估模型性能。","mnemonic":"k折交叉验证：分k份轮换测试取平均，选B描述最完整准确"},{"id":61,"type":"single","text":"导致数据不完整的主要原因有（）。","options":[{"label":"A","text":"命名规则或数据代码不同"},{"label":"B","text":"由于误解或检测设备失灵，相关数据没有被记录下来"},{"label":"C","text":"数据维度过高"},{"label":"D","text":"数据安全性较差"}],"answer":"B","explanation":"数据不完整的主要原因包括记录遗漏、设备失灵、数据不一致或历史忽略等。","mnemonic":"数据不完整=记录遗漏或设备失灵导致数据缺失，选B"},{"id":62,"type":"single","text":"下列哪一项不属于人机交互中的用户类别？（）","options":[{"label":"A","text":"机器用户"},{"label":"B","text":"熟练型用户"},{"label":"C","text":"生疏型用户"},{"label":"D","text":"专家型用户"}],"answer":"A","explanation":"机器用户不是有效的人机交互用户类别。","mnemonic":"人机交互用户分类：生疏型/熟练型/专家型，\"机器用户\"不是人选A"},{"id":63,"type":"single","text":"下列哪一做法体现了恪尽职守（）。","options":[{"label":"A","text":"工作不积极，效率不高"},{"label":"B","text":"有意忽视工作中出现的问题"},{"label":"C","text":"严格遵守保密规定"},{"label":"D","text":"对业务知识缺乏了解和应用"}],"answer":"C","explanation":"严格遵守保密规定是恪尽职守的体现，从业人员应该严格遵守保密规定，对工作中的机密信息予以妥善保管，并不得泄露相关信息。具备保密意识，确保客户和组织的利益不受损害。","mnemonic":"恪尽职守=严守保密规定，其余ABD都是失职表现，选C"},{"id":64,"type":"single","text":"Web 界面设计中 “简单性原则” 的核心内容是什么？（）","options":[{"label":"A","text":"指导设计师要考虑到用户界面的可理解性和易操作性"},{"label":"B","text":"强调消除不必要的复杂性和混乱，以提供直观和易于操作的用户体验"},{"label":"C","text":"强调将界面设计与用户习惯和期望相一致"},{"label":"D","text":"强调给予用户明确的反馈，使用户了解其操作的结果和当前状态"}],"answer":"B","explanation":"简单性原则强调在Web界面设计中消除不必要的复杂性和混乱，旨在为用户提供直观、易于操作的界面","mnemonic":"简单性原则=消除不必要复杂性，\"简单直观易操作\"选B"},{"id":65,"type":"single","text":"在特征选择时，卡方检验常用于哪类数据（）。","options":[{"label":"A","text":"连续型数据"},{"label":"B","text":"离散型数据"},{"label":"C","text":"混合型数据"},{"label":"D","text":"数值型数据"}],"answer":"B","explanation":"卡方检验是用于检验类别变量之间的独立性的统计方法，常用于离散型数据。它通过比较观察频次与期望频次之间的差异来判断两个分类变量是否有显著关系。卡方检验不适用于连续型或数值型数据。","mnemonic":"卡方检验用于离散型/分类变量的独立性检验，\"卡方查分类\"选B"},{"id":66,"type":"single","text":"人机交互的定义是什么？","options":[{"label":"A","text":"人类通过机器完成某项任务"},{"label":"B","text":"机器能够理解人类思维"},{"label":"C","text":"机器在没有人参与的情况下自动工作"},{"label":"D","text":"人类与机器之间的互动"}],"answer":"D","explanation":"人机交互是人与机器设备间的互动过程。","mnemonic":"人机交互=人与机器之间的互动，最简洁准确的定义选D"},{"id":67,"type":"single","text":"哪个步骤能够借助数据分析，设计出在单一场景下人工与智能交互的最佳流程？（）","options":[{"label":"A","text":"人机交互流程设计"},{"label":"B","text":"智能系统监控和优化"},{"label":"C","text":"数据处理规范制定"},{"label":"D","text":"业务模块效果优化"}],"answer":"A","explanation":"人机交互流程设计通过数据分析优化单一场景下的人机交互流程。","mnemonic":"人机交互流程设计=借助数据分析设计人机交互最佳流程，选A"},{"id":68,"type":"single","text":"SmartArt 工具能够实现哪些功能（）。","options":[{"label":"A","text":"添加多媒体文件到演示文稿"},{"label":"B","text":"将逻辑关系视觉化呈现"},{"label":"C","text":"获取分数和百分比"},{"label":"D","text":"分类和算数"}],"answer":"B","explanation":"SmartArt工具将逻辑关系视觉化呈现，提升信息传达速率","mnemonic":"SmartArt=将逻辑关系视觉化呈现，\"Smart图示逻辑\"选B"},{"id":69,"type":"single","text":"在 Python 中，可用于对图像执行均值滤波处理的函数是（）。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.blur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"B","explanation":"在Python中，可以使用 cv2.blur() 函数对图像进行均值滤波处理","mnemonic":"cv2.blur()=均值滤波，median是中值，bilateral是双边，选B"},{"id":70,"type":"single","text":"下列哪项是用于数据存储的传统关系型数据库（）。","options":[{"label":"A","text":"Elasticsearch"},{"label":"B","text":"PostgreSQL"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop"}],"answer":"B","explanation":"Hadoop是一个分布式计算框架，MongoDB是一种NoSQL数据库，Elasticsearch是一种全文搜索引擎","mnemonic":"传统关系型数据库=PostgreSQL，MongoDB是NoSQL，Hadoop是框架选B"},{"id":71,"type":"single","text":"TF-IDF 是哪项的组成部分（）。","options":[{"label":"A","text":"主题模型"},{"label":"B","text":"词嵌入"},{"label":"C","text":"词袋模型"},{"label":"D","text":"One-hot向量化"}],"answer":"C","explanation":"TF-IDF表示是指用一个向量表示一句话或一个文档，它是在词袋的基础上对词出现的频次赋予TF-IDF权值，对词袋模型进行修正，进而表示该词在文档集合中的重要程度","mnemonic":"TF-IDF是词袋模型的加权改进版，\"TF-IDF属于词袋家族\"选C"},{"id":72,"type":"single","text":"哪项可以衡量词与词之间的相似程度（）。","options":[{"label":"A","text":"One-hot向量化"},{"label":"B","text":"BOW模型"},{"label":"C","text":"Word2Vec模型"},{"label":"D","text":"主题模型"}],"answer":"C","explanation":"Word2Vec模型能高效训练大规模语料，并有效度量词汇间相似度。","mnemonic":"Word2Vec将词映射为向量可衡量相似度，\"词向量量相似\"选C"},{"id":73,"type":"single","text":"在 PowerPoint 的母版视图中，只有修改哪项的设计，才能对所有幻灯片的设计产生影响（）。","options":[{"label":"A","text":"当前打开的幻灯片"},{"label":"B","text":"单个幻灯片"},{"label":"C","text":"幻灯片版式"},{"label":"D","text":"幻灯片母版"}],"answer":"D","explanation":"在母版视图中，只有更改幻灯片母版的设计才能同时影响所有幻灯片的设计","mnemonic":"PPT母版视图中改幻灯片母版才能影响全部幻灯片，\"母版管全局\"选D"},{"id":74,"type":"single","text":"漏斗分析在数据分析方法中属于（）类别。","options":[{"label":"A","text":"基于位置的分析"},{"label":"B","text":"转化率分析"},{"label":"C","text":"可视化分析"},{"label":"D","text":"用户画像分析"}],"answer":"B","explanation":"漏斗分析是一种针对用户在特定过程中的转化率进行分析的方法，属于转化率分析的范畴。","mnemonic":"漏斗分析=分析各环节转化率，属于转化率分析类别选B"},{"id":75,"type":"single","text":"人机交互 GOMS 模型中的 “G” 指的是什么？","options":[{"label":"A","text":"状态"},{"label":"B","text":"目的"},{"label":"C","text":"方法"},{"label":"D","text":"操作时间"}],"answer":"B","explanation":"GOMS模型中的“G”代表用户完成任务的目标（Goal）。","mnemonic":"GOMS中G=Goal=目的/目标，\"G打头就是Goal\"选B"},{"id":76,"type":"single","text":"NTFS 文件系统适合在哪些操作系统中使用（）。","options":[{"label":"A","text":"Linux"},{"label":"B","text":"Windows"},{"label":"C","text":"MacOS"},{"label":"D","text":"Android"}],"answer":"B","explanation":"NTFS（New Technology File System）是Windows操作系统中使用的一种文件系统","mnemonic":"NTFS=New Technology File System=Windows专属，选B"},{"id":77,"type":"single","text":"下面哪一项不在初级培训的知识点范畴内（）。","options":[{"label":"A","text":"智能系统操作"},{"label":"B","text":"数据标注"},{"label":"C","text":"深度学习基础"},{"label":"D","text":"数据采集"}],"answer":"C","explanation":"智能系统操作、数据标注、数据采集属于初级培训的知识点，深度学习基础不属于初级培训的知识点。","mnemonic":"初级培训：系统操作/数据标注/数据采集，深度学习不在初级选C"},{"id":78,"type":"single","text":"下列哪项不是中级知识体系所涉及的知识点？（）","options":[{"label":"A","text":"智能系统维护"},{"label":"B","text":"标注数据审核"},{"label":"C","text":"数据采集"},{"label":"D","text":"实践教学方法"}],"answer":"D","explanation":"实践教学方法不属于中级知识体系中涉及到的知识点","mnemonic":"中级知识体系：系统维护/标注审核/数据采集，实践教学方法不属于选D"},{"id":79,"type":"single","text":"下列哪项是所有软件里最基础且最核心的部分，它能控制和管理计算机系统的各类硬件与软件资源，还能高效地组织多道程序运行（）。","options":[{"label":"A","text":"内存"},{"label":"B","text":"软件系统"},{"label":"C","text":"操作系统"},{"label":"D","text":"硬件系统"}],"answer":"C","explanation":"操作系统是所有软件中最基础和最核心的部分，是控制和管理计算机系统各种硬件和软件资源，有效地组织多道程序运行的系统软件，是计算机用户和计算机硬件之间的中介程序，它为用户执行程序提供更方便、更有效的环境","mnemonic":"操作系统=最基础最核心的软件，管理硬件软件资源选C"},{"id":80,"type":"single","text":"在业务数据的流转流程里，哪个环节是实现数据从源头到最终应用的关键转化步骤？","options":[{"label":"A","text":"数据采集"},{"label":"B","text":"数据存储"},{"label":"C","text":"数据清洗与转换"},{"label":"D","text":"数据分析与可视化"}],"answer":"C","explanation":"数据清洗与转换确保数据质量，通过处理和格式化提升数据可用性，是数据流程中的核心步骤。","mnemonic":"数据清洗与转换=源头到应用的关键转化步骤，\"洗转是桥梁\"选C"},{"id":81,"type":"single","text":"触屏交互指的是（）。","options":[{"label":"A","text":"使用鼠标进行操作的交互模式"},{"label":"B","text":"使用触摸屏幕进行操作的交互模式"},{"label":"C","text":"使用键盘进行操作的交互模式"},{"label":"D","text":"使用手势进行操作的交互模式"}],"answer":"B","explanation":"触屏交互是一种使用触摸屏幕进行操作的交互模式。用户可以通过手指在屏幕上的触摸、滑动、拖动等操作，与系统进行互动。触屏交互模式已经被广泛应用到智能手机、平板电脑等移动设备中。","mnemonic":"触屏交互=触摸屏幕操作，字面意思直接对应选B"},{"id":82,"type":"single","text":"象限分析法隶属于（）类型的思维模式。","options":[{"label":"A","text":"形象直观思维"},{"label":"B","text":"随机直觉思维"},{"label":"C","text":"策略驱动思维"},{"label":"D","text":"创意发散思维"}],"answer":"C","explanation":"象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等","mnemonic":"象限分析法=策略驱动思维，用象限划分策略方向选C"},{"id":83,"type":"single","text":"依据《计算机软件保护条例》的规定，软件著作权由谁来享有？","options":[{"label":"A","text":"开发者"},{"label":"B","text":"使用者"},{"label":"C","text":"委托人"},{"label":"D","text":"国家"}],"answer":"A","explanation":"《计算机软件保护条例》第九条规定，软件著作权属于软件开发者，本条例另有规定的除外","mnemonic":"软件著作权属于开发者，\"谁开发谁拥有\"选A"},{"id":84,"type":"single","text":"下列哪项设备属于计算机的输出设备（）。","options":[{"label":"A","text":"音箱"},{"label":"B","text":"摄像机"},{"label":"C","text":"麦克风"},{"label":"D","text":"扫描仪"}],"answer":"A","explanation":"常见的输出设备有显示器、打印机、绘图仪、影像输出系统、语音输出系统、磁记录设备等","mnemonic":"音箱是输出设备，摄像机/麦克风/扫描仪都是输入设备选A"},{"id":85,"type":"single","text":"以下哪个场景不适合采用漏斗分析（）。","options":[{"label":"A","text":"分析电商网站的购物流程转化率"},{"label":"B","text":"评估一款游戏的关卡通过率"},{"label":"C","text":"统计某地区的人口年龄结构"},{"label":"D","text":"优化APP的用户注册流程"}],"answer":"C","explanation":"漏斗分析适用于有明确转化步骤的场景，如购物或注册流程，不适用于简单统计如人口年龄结构。","mnemonic":"漏斗分析适用于有转化步骤的场景，人口统计无转化流程选C"},{"id":86,"type":"single","text":"AARRR 模型中 \"AA\" 的目的是（）。","options":[{"label":"A","text":"增加收入，提高品牌口碑"},{"label":"B","text":"让用户体验产品，获取新流量"},{"label":"C","text":"提高品牌知名度"},{"label":"D","text":"获取新用户，将其变成活跃用户"}],"answer":"D","explanation":"AARRR模型中AA阶段目标是获取用户并激活。","mnemonic":"AARRR中AA=Acquisition获取+Activation激活，获取并激活用户选D"},{"id":87,"type":"single","text":"业务流程重组（BPR）中的组织重组，包含哪一项内容（）。","options":[{"label":"A","text":"充分发挥信息技术（IT）的潜能，利用IT改造企业过程"},{"label":"B","text":"建立流程管理机构，明确其权责范围，制定各流程内部的运转规则与各流程之间的关系规则，逐步用流程管理图取代传统企业中的组织机构图，实现组织结构扁平化"},{"label":"C","text":"对企业的现有流程进行调研分析、诊断、再设计"},{"label":"D","text":"变革基本信念、转变经营机制、重建组织文化"}],"answer":"B","explanation":"组织重组包括建立流程管理机构，明确权责，以流程管理图替代组织机构图。","mnemonic":"BPR组织重组=建立流程管理机构+扁平化，用流程图替代组织图选B"},{"id":88,"type":"single","text":"业务流程重组（BPR）的核心理念可表述为（）。","options":[{"label":"A","text":"保持现有的组织结构不变"},{"label":"B","text":"仅关注成本和质量的提升"},{"label":"C","text":"根本的再思考和彻底的再设计"},{"label":"D","text":"渐进式的流程改进"}],"answer":"C","explanation":"业务流程重组（BPR）的核心理念是对企业进行根本的再思考和彻底的再设计（B）","mnemonic":"BPR核心=根本再思考+彻底再设计，\"推翻重来\"选C"},{"id":89,"type":"single","text":"下列通过对像素灰度值和阈值进行比较来实现图像分割的方法是（）。","options":[{"label":"A","text":"基于阈值的分割方法"},{"label":"B","text":"边缘检测法"},{"label":"C","text":"高斯混合模型"},{"label":"D","text":"区域生长法"}],"answer":"A","explanation":"基于阈值的分割方法是根据像素的灰度值与预先设定的阈值进行比较，从而实现图像分割。","mnemonic":"比较像素灰度值与阈值进行分割=基于阈值的分割方法，选A"},{"id":90,"type":"single","text":"在人机交互中，用户体验设计的主要宗旨是什么？","options":[{"label":"A","text":"提升品牌形象"},{"label":"B","text":"降低生产成本"},{"label":"C","text":"提高系统性能"},{"label":"D","text":"增加用户满意度"}],"answer":"D","explanation":"用户体验设计中，提升用户在使用产品或服务过程中的满意度和愉悦感是其主要目标","mnemonic":"用户体验设计主旨=增加用户满意度，\"用户满意是王道\"选D"},{"id":91,"type":"single","text":"下面哪一项不属于中级培训的知识点（）。","options":[{"label":"A","text":"数据处理方法优化"},{"label":"B","text":"数据标注审核"},{"label":"C","text":"人机交互程序设计"},{"label":"D","text":"智能系统优化"}],"answer":"C","explanation":"人机交互程序设计不属中级培训内容。","mnemonic":"中级培训：数据处理优化/标注审核/系统优化，人机交互程序设计不属于选C"},{"id":92,"type":"single","text":"自助法有哪些优点（）。","options":[{"label":"A","text":"通过对原始数据集进行有放回抽样生成多个训练集，提高模型稳定性"},{"label":"B","text":"可以减少模型的方差，避免过拟合"},{"label":"C","text":"产生的样本分布与原始数据集相同"},{"label":"D","text":"可以减少训练时间"}],"answer":"A","explanation":"自助法通过有放回抽样增加训练样本量，提高稳定性，适用于小样本和不均衡数据，但可能引入偏差。","mnemonic":"自助法优点=有放回抽样生成多个训练集提高稳定性，\"放回抽样稳定强\"选A"},{"id":93,"type":"single","text":"下列哪一项属于初级培训包含的知识点（）。","options":[{"label":"A","text":"机器学习"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"数据标注工具的使用"},{"label":"D","text":"数据审核的标准和方法"}],"answer":"C","explanation":"数据标注工具使用是初级培训知识点。","mnemonic":"初级培训知识点=数据标注工具使用，机器学习/NLP/审核标准太高级选C"},{"id":94,"type":"single","text":"初级工在进行音频数据标注时，需要注意（）问题。","options":[{"label":"A","text":"标注时应该快速完成任务，以提高效率"},{"label":"B","text":"当背景噪音过大时语音应标为无效"},{"label":"C","text":"标注时仅仅关注音频中的语音信号，忽略其它噪声和干扰"},{"label":"D","text":"开始标注时不需要仔细听一遍录音，只需大致扫描一下即可"}],"answer":"B","explanation":"音频标注时背景噪音大的语音应标为无效。","mnemonic":"音频标注：背景噪音过大→标为无效，\"噪音大判无效\"选B"},{"id":95,"type":"single","text":"针对线性不可分的二分类问题，引入核函数将数据映射到高维空间后，可转变为（）。","options":[{"label":"A","text":"多分类问题"},{"label":"B","text":"三分类问题"},{"label":"C","text":"非线性可分问题"},{"label":"D","text":"线性可分问题"}],"answer":"D","explanation":"通过引入核函数，可以将线性不可分的问题转化为线性可分的问题，从而使得支持向量机算法能够有效处理更为复杂的问题","mnemonic":"核函数将线性不可分映射到高维变成线性可分，\"核函数升维变可分\"选D"},{"id":96,"type":"single","text":"下列哪个指标数值越大，表明聚类效果越好（）。","options":[{"label":"A","text":"计算准确率"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"熵权法"},{"label":"D","text":"DB指数"}],"answer":"B","explanation":"轮廓系数越大表示类内距离越小，类间距离越大，聚类效果越好","mnemonic":"轮廓系数越大聚类越好，\"轮廓大聚类优\"选B"},{"id":97,"type":"single","text":"Python 中，（）库具备实现决策树算法的相关功能。","options":[{"label":"A","text":"matplotlib"},{"label":"B","text":"pandas"},{"label":"C","text":"sklearn"},{"label":"D","text":"numpy"}],"answer":"C","explanation":"sklearn（即scikit-learn）是一个广泛使用的机器学习库，其中包含了实现决策树算法的功能","mnemonic":"sklearn(scikit-learn)实现决策树，\"学习库sklearn\"选C"},{"id":98,"type":"single","text":"在 CART 决策树的节点划分过程中，所采用的指标是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"熵"},{"label":"C","text":"基尼不纯度"},{"label":"D","text":"信息增益"}],"answer":"C","explanation":"在CART决策树算法中常见用于划分节点的指标为基尼不纯度","mnemonic":"CART决策树用基尼不纯度划分节点，\"CART配基尼\"选C"},{"id":99,"type":"single","text":"在 OpenCV 中，能实现中值滤波的函数是（）。","options":[{"label":"A","text":"cv2.medianBlur()"},{"label":"B","text":"skimage.transform.resize()"},{"label":"C","text":"cv2.crop()"},{"label":"D","text":"cv2.resize()"}],"answer":"A","explanation":"在OpenCV中，通过cv2.medianBlur函数进行中值滤波，其基本使用格式如下Cv2,medianBlur(src,ksize[,dst])","mnemonic":"cv2.medianBlur()=中值滤波，\"median就是中值\"选A"},{"id":100,"type":"single","text":"哪项能够体现出 ETL 数据整合工具的可扩展性（）。","options":[{"label":"A","text":"支持与外部API和服务集成"},{"label":"B","text":"提供数据质量监控和错误处理机制"},{"label":"C","text":"提供自动化调度和任务管理功能"},{"label":"D","text":"支持多种数据源和目标系统"}],"answer":"D","explanation":"支持多种数据源体现ETL工具可扩展性，适应不同整合需求。","mnemonic":"ETL可扩展性=支持多种数据源和目标系统，\"多源多目标\"选D"},{"id":101,"type":"single","text":"均方根误差（RMSE）与平均绝对误差（MAE）之间的不同之处在于（）。","options":[{"label":"A","text":"MAE比RMSE更容易受到极端误差值的影响"},{"label":"B","text":"RMSE未对误差幅度进行平方处理"},{"label":"C","text":"MAE对误差幅度较大的样本更敏感"},{"label":"D","text":"RMSE对误差幅度较大的样本更敏感"}],"answer":"D","explanation":"RMSE对大幅误差更敏感（平方效应），MAE平等对待误差。","mnemonic":"RMSE对大误差更敏感因为有平方效应，MAE平等对待，选D"},{"id":102,"type":"single","text":"时间复杂度的核心在于（）。","options":[{"label":"A","text":"基本操作执行次数随输入规模增长的变化趋势"},{"label":"B","text":"计算机内存空间"},{"label":"C","text":"程序代码行数"},{"label":"D","text":"计算机执行时间"}],"answer":"A","explanation":"时间复杂度是指算法中基本操作重复执行的次数是问题规模 n 的某个函数，其度量方法是计算算法的渐进时间复杂度，即分析基本操作的执行次数随 n 的变化趋势","mnemonic":"时间复杂度看\"基本操作执行次数\"与输入规模的关系，不是内存、行数或时间"},{"id":10 "options":[{"label":"A","text":"导入jieba库"},{"label":"B","text":"载入词典"},{"label":"C","text":"分词操作"},{"label":"D","text":"获取分词结果"}],"answer":"C","explanation":"分词操作实现文本到词语的切分。","mnemonic":"jieba分词三步：导入库→分词操作→获取结果，\"分词操作\"是核心切分步骤"},{"id":110,"type":"single","text":"指导中级工作人员解决数据标注方面的问题时，需要关注有一种标注方式常被用于对文本中的实体进行识别，这种方式是什么？（）","options":[{"label":"A","text":"语义分割"},{"label":"B","text":"目标检测"},{"label":"C","text":"序列标注"},{"label":"D","text":"分类标注"}],"answer":"C","explanation":"序列标注适用于识别文本中的实体等连续结构","mnemonic":"文本实体识别用\"序列标注\"，记\"序列=一串文字标出实体\""},{"id":111,"type":"single","text":"凭借灰度的突然变化来找到图像中区域边界的是（）。","options":[{"label":"A","text":"K-means聚类分割"},{"label":"B","text":"区域生长法"},{"label":"C","text":"边缘检测分割"},{"label":"D","text":"阈值分割"}],"answer":"C","explanation":"在图像中不同区域的边界上像素的灰度通常会有较大的变化，边缘检测就是根据灰度的突变来找到图像中区域边界的方法","mnemonic":"灰度突变找边界=边缘检测分割，记\"突变=边缘\""},{"id":112,"type":"single","text":"在业务流程重组（BPR）里，信息技术（IT）所起到的作用是（）。","options":[{"label":"A","text":"BPR的核心思想"},{"label":"B","text":"BPR的辅助工具"},{"label":"C","text":"BPR的替代方法"},{"label":"D","text":"BPR的最终目标"}],"answer":"B","explanation":"信息技术（IT）在业务流程重组（BPR）中起到催化剂的作用。IT是一种技术，而BPR是一种思想，IT在BPR由思想到现实的转变中，起到促进和辅助的作用。因此，IT是BPR的辅助工具，而不是核心思想、替代方法或最终目标。","mnemonic":"IT在BPR中是\"辅助工具\"，像催化剂促进但非核心"},{"id":113,"type":"single","text":"自助法（bootstrap）作为一种常用的数据集划分方式，其基本思想是什么（）。","options":[{"label":"A","text":"将原始数据集按特定比例分成训练集和测试集"},{"label":"B","text":"将原始数据集分成训练集和测试集"},{"label":"C","text":"从原始数据集中随机无放回地抽取样本，构成新的训练集"},{"label":"D","text":"从原始数据集中随机有放回地抽取样本，构成新的训练集"}],"answer":"D","explanation":"自助法是一种基于有放回抽样的数据集划分方法，它的基本思想是从原始数据集中随机有放回地抽取样本，构成新的训练集，可以重复抽取多次构成多个不同的训练集，这些训练集之间可能存在重复样本","mnemonic":"自助法bootstrap记\"有放回抽样\"，boot=反复穿靴子=放回再抽"},{"id":114,"type":"single","text":"多分类模型中的精确率（Precision），它所衡量的是（）。","options":[{"label":"A","text":"被预测为某一类别的样本中，实际属于该类别的比例"},{"label":"B","text":"模型整体的分类准确性"},{"label":"C","text":"所有预测正确的样本占总样本数的比例"},{"label":"D","text":"模型的分类错误率"}],"answer":"A","explanation":"精确率衡量被预测为正例的样本中实际为正例的比例。","mnemonic":"精确率Precision：预测为正的里面真正对的比例，记\"查准率\""},{"id":115,"type":"single","text":"智慧农业解决方案能够帮助农民达成哪些目标？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"改善农产品质量和食品安全"},{"label":"C","text":"优化资源利用"},{"label":"D","text":"提高生产效率"}],"answer":"A","explanation":"智慧农业解决方案可以帮助农民实现提高生产效率、优化资源利用、改善农产品质量和食品安全、实现可持续发展等","mnemonic":"智慧农业帮农民：提效+优化资源+改善质量安全，全选A"},{"id":116,"type":"single","text":"在逻辑回归里，决策边界的确定是通过将（）的输出与阈值作比较来实现的。","options":[{"label":"A","text":"余弦相似度函数"},{"label":"B","text":"对数损失函数"},{"label":"C","text":"Sigmoid函数"},{"label":"D","text":"线性回归函数"}],"answer":"C","explanation":"逻辑回归用Sigmoid函数输出概率，与阈值比较确定类别。","mnemonic":"逻辑回归决策靠Sigmoid函数输出概率与阈值比较，记\"S曲线定分类\""},{"id":117,"type":"single","text":"按照标注的规范和具体要求，完成文本、视觉、语音数据的清洗工作，这一内容属于初级培训知识里的哪个部分（）。","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"业务数据处理"},{"label":"C","text":"数据采集"},{"label":"D","text":"智能系统运维"}],"answer":"A","explanation":"能够根据标注规范和要求，完成对文本、视觉、语音数据清洗属于初级培训知识数据标注部分的内容","mnemonic":"按标注规范清洗文本/视觉/语音数据属于\"数据标注\"培训内容"},{"id":118,"type":"single","text":"下列哪项属于智慧农业的应用实例？","options":[{"label":"A","text":"农业互联网"},{"label":"B","text":"精准农业技术"},{"label":"C","text":"智能温室管理系统"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"智慧农业的应用案例包括农业互联网、精准农业技术、智能温室管理系统和农业无人机应用等。","mnemonic":"智慧农业应用：农业互联网+精准农业+智能温室，全选D"},{"id":119,"type":"single","text":"在 Word 中，可用哪些方法插入脚注（）。","options":[{"label":"A","text":"点击“引用”选项卡，选择“脚注”。"},{"label":"B","text":"点击“参考文献”选项卡，选择“脚注”。"},{"label":"C","text":"点击“编辑”选项卡，选择“脚注”。"},{"label":"D","text":"点击“视图”选项卡，选择“脚注”。"}],"answer":"A","explanation":"在Word中，可通过“引用”选项卡中的“脚注”功能插入脚注，并自定义格式。","mnemonic":"Word插脚注：引用选项卡→脚注，记\"引用出脚注\""},{"id":120,"type":"single","text":"下列选项中，属于键值存储的典型数据库是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Cassandra"},{"label":"C","text":"Redis"},{"label":"D","text":"MongoDB"}],"answer":"C","explanation":"Redis属于键值数据库；MySQL属于关系型数据库；Cassandra是列族数据库；MongoDB是文档数据库。","mnemonic":"Redis=键值存储，记\"Redis的R像钥匙=Key-Value\""},{"id":121,"type":"single","text":"下列哪项会造成算法出现过拟合现象（）。","options":[{"label":"A","text":"训练数据过多"},{"label":"B","text":"学习率过低"},{"label":"C","text":"训练数据太少"},{"label":"D","text":"模型太简单"}],"answer":"C","explanation":"训练数据不足易导致过拟合，模型泛化能力差。","mnemonic":"训练数据太少→过拟合，记\"数据少模型死记硬背=过拟合\""},{"id":122,"type":"single","text":"下列主要依靠图像中的边缘信息来完成分割的方法是（）。","options":[{"label":"A","text":"基于深度学习的方法"},{"label":"B","text":"区域生长法"},{"label":"C","text":"边缘检测法"},{"label":"D","text":"基于聚类的方法"}],"answer":"C","explanation":"边缘检测法依靠图像灰度跃变确定边缘位置完成分割。","mnemonic":"边缘检测法靠\"边缘信息\"分割，名字即答案"},{"id":123,"type":"single","text":"在体现 “选择” 关系的状态转换网络中，状态 S0 具有怎样的特点？（）","options":[{"label":"A","text":"S0 是一个孤立状态，没有任何转换关系"},{"label":"B","text":"S0 只能通过内部事件触发状态转换"},{"label":"C","text":"S0 是初始状态，可以通过外部事件0 和外部事件1 转换到其他状态"},{"label":"D","text":"S0 是一个终止状态，不能转换到其他状态"}],"answer":"C","explanation":"根据“选择”关系的状态转换网络，S0 是初始状态，可以通过外部事件0 转换到状态 S1，或者通过外部事件1 转换到状态 S2。此外，它也可以通过 G0 或 G1 的正常结束事件回到自身。","mnemonic":"选择关系中S0是初始状态，可通过外部事件转到其他状态"},{"id":124,"type":"single","text":"能够借助上下文信息进行中文分词的是（）。","options":[{"label":"A","text":"递归神经网络"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"A","explanation":"递归神经网络（RNN）可以利用上下文信息进行中文分词","mnemonic":"RNN利用上下文分词，记\"递归=前后文相连\""},{"id":125,"type":"single","text":"核心思想是将图像表示为一组基向量的线性组合的是（）。","options":[{"label":"A","text":"高斯滤波"},{"label":"B","text":"非局部均值滤波"},{"label":"C","text":"基于稀疏表示的方法"},{"label":"D","text":"小波变换"}],"answer":"C","explanation":"稀疏表示去噪法将图像表示为基向量的线性组合，利用稀疏性去除噪声并保留细节。","mnemonic":"稀疏表示=基向量线性组合，记\"稀疏=少量基向量表达图像\""},{"id":126,"type":"single","text":"以下哪种数据存储方式最适合用来存储大量结构化数据，并且支持高效的查询操作和事务处理（）。","options":[{"label":"A","text":"分布式文件系统存储"},{"label":"B","text":"基于数据仓库的数据存储"},{"label":"C","text":"基于数据库的数据存储"},{"label":"D","text":"基于文件系统的数据存储"}],"answer":"C","explanation":"基于文件系统的数据存储适合存储非结构化数据，如文本文件、图片、视频等","mnemonic":"结构化数据+高效查询+事务处理=数据库存储，记\"结构化找数据库\""},{"id":127,"type":"single","text":"下列（）不属于可用性的五个关键维度。","options":[{"label":"A","text":"安全性"},{"label":"B","text":"容错能力"},{"label":"C","text":"吸引力"},{"label":"D","text":"有效性"}],"answer":"A","explanation":"有效性是可用性的一个关键方面，指用户能够成功地完成其目标或任务。因此，这个选项是正确的，属于可用性的五个方面之一。吸引力是指产品是否具有吸引用户的外观和交互设计，这也是可用性的一个方面，主要涉及用户的情感和视觉体验。容错能力是指产品能够宽容用户的错误操作并提供反馈或修正途径。这也是可用性的重要方面之一。安全性与用户数据保护、系统稳定性等因素相关，通常不是可用性评价中的直接方面。虽然安全性对用户体验很重要，但它不直接涉及有效性、效率、吸引力、容错能力和易于学习这些基本可用性方面。","mnemonic":"可用性五维不含\"安全性\"，记\"有效、效率、吸引、容错、易学，无安全\""},{"id":128,"type":"single","text":"对比分析法指的是对多少个及以上的数据进行比较（）。","options":[{"label":"A","text":"一组"},{"label":"B","text":"三组或三组上"},{"label":"C","text":"两组或两组以上"},{"label":"D","text":"至少三组"}],"answer":"C","explanation":"对比分析法，即对两组或两组以上的数据进行比较，是最通用的一种方法","mnemonic":"对比分析法：两组或两组以上数据比较，记\"对比至少两组\""},{"id":129,"type":"single","text":"数据转换能力是 ETL 工具的核心功能之一，下列最能反映这一特性的是（）。","options":[{"label":"A","text":"从多个数据库表提取数据"},{"label":"B","text":"将数据加载到目标数据仓库"},{"label":"C","text":"对数据进行聚合、清洗和格式标准化"},{"label":"D","text":"监控数据管道的运行状态"}],"answer":"C","explanation":"数据转换核心在于根据业务规则清洗和格式化数据，提升数据质量和一致性。","mnemonic":"ETL的T=Transform=转换：聚合+清洗+格式标准化"},{"id":130,"type":"single","text":"根据《中华人民共和国个人信息保护法》，个人信息不涉及（）。","options":[{"label":"A","text":"匿名化处理后的信息"},{"label":"B","text":"个人财产信息、交易信息、账户信息等财产信息"},{"label":"C","text":"通讯录、通话记录、通讯内容等通讯信息"},{"label":"D","text":"姓名、出生日期、身份证号码等身份信息"}],"answer":"A","explanation":"《中华人民共和国个人信息保护法》第四条规定，个人信息是以电子或者其他方式记录的与已识别或者可识别的自然人有关的各种信息，不包括匿名化处理后的信息","mnemonic":"个人信息保护法不保护\"匿名化处理后的信息\"，记\"匿名=非个人信息\""},{"id":131,"type":"single","text":"哪个步骤是结合人工智能技术的要求，对业务数据的采集规范进行梳理的？（）","options":[{"label":"A","text":"标注数据审核"},{"label":"B","text":"业务数据质量检测"},{"label":"C","text":"数据处理方法优化"},{"label":"D","text":"数据归类和定义"}],"answer":"B","explanation":"业务数据质量检测环节梳理数据采集规范。","mnemonic":"结合AI梳理采集规范=业务数据质量检测，记\"质检查规范\""},{"id":132,"type":"single","text":"在 Excel 中，哪项功能可以按照条件对数据进行筛选（）。","options":[{"label":"A","text":"Subtotal"},{"label":"B","text":"Group"},{"label":"C","text":"Filter"},{"label":"D","text":"Sort"}],"answer":"C","explanation":"Filter功能可以用于按条件筛选数据","mnemonic":"Excel按条件筛选=Filter，记\"Filter=过滤=筛选\""},{"id":133,"type":"single","text":"计算机系统要完成任务，首先得从哪里读取指令（）。","options":[{"label":"A","text":"控制器"},{"label":"B","text":"存储器"},{"label":"C","text":"运算器"},{"label":"D","text":"输入/输出设备"}],"answer":"B","explanation":"计算机系统通过控制器、运算器、存储器和I/O设备的紧密协作来完成任务： 控制器负责从存储器中读取指令，指挥运算器执行算术和逻辑操作，并协调数据在各设备间的传输。","mnemonic":"计算机读指令从\"存储器\"开始，记\"指令存在存储器里\""},{"id":134,"type":"single","text":"下列哪项属于职业道德的特征（）。","options":[{"label":"A","text":"随意性"},{"label":"B","text":"主观性"},{"label":"C","text":"实践性"},{"label":"D","text":"阶段性"}],"answer":"C","explanation":"职业道德具备职业性、实践性、继承性与多样性等特征：职业性限定于特定行业；实践性体现于实际职业行为；继承性保留核心道德内容；多样性因行业差异而不同。","mnemonic":"职业道德特征=实践性，记\"道德在实践中体现\"，排除随意/主观/阶段"},{"id":135,"type":"single","text":"在初级培训的知识点当中，数据标注方面有哪些是需要掌握的（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"视觉标注"},{"label":"C","text":"语音标注"},{"label":"D","text":"文本标注"}],"answer":"A","explanation":"在初级培训知识点中，需要掌握数据标注中的文本标注、语音标注、视觉标注","mnemonic":"初级数据标注：文本+语音+视觉三种标注全要掌握，选A"},{"id":136,"type":"single","text":"下列哪项不属于图像数据处理的基本流程（）。","options":[{"label":"A","text":"模型部署"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据预处理"},{"label":"D","text":"模型训练"}],"answer":"A","explanation":"图像数据处理流程中的基本流程包括数据预处理、特征提取、模型训练等步骤，最后可以根据需要进行模型部署","mnemonic":"模型部署不属于图像处理\"基本流程\"，基本流程=预处理+特征提取+训练"},{"id":137,"type":"single","text":"对于二分类模型，当学习器的 ROC 曲线出现交叉情况时，能对模型整体表现进行评估的指标是（）。","options":[{"label":"A","text":"AUC值"},{"label":"B","text":"错误率"},{"label":"C","text":"召回率"},{"label":"D","text":"准确率"}],"answer":"A","explanation":"AUC值综合所有阈值下表现，评估模型整体性能。","mnemonic":"ROC曲线交叉时看AUC值，记\"AUC=曲线下面积，综合评判\""},{"id":138,"type":"single","text":"当借助 scikit-learn 库来实现朴素贝叶斯分类器时，（）对于 MultinomialNB 类是适用的。","options":[{"label":"A","text":"连续型特征数据"},{"label":"B","text":"二元型特征数据"},{"label":"C","text":"多项式型特征数据"},{"label":"D","text":"类别型特征数据"}],"answer":"C","explanation":"MultinomialNB适用于多项式特征数据（如词频），GaussianNB用于连续数据，BernoulliNB用于二元数据。","mnemonic":"MultinomialNB适用多项式特征，记\"Multinomial=多项式=词频计数\""},{"id":139,"type":"single","text":"管理系统资源是操作系统的主要功能之一，下列哪项不在其管理范围内（）。","options":[{"label":"A","text":"插排调整"},{"label":"B","text":"存储分配"},{"label":"C","text":"进程调度"},{"label":"D","text":"文件操作"}],"answer":"A","explanation":"操作系统的功能如下：①进程管理，主要是进程调度。②存储管理：存储分配、存储共享、存储保护 、存储扩张。③设备管理：设备分配、设备传输控制 、设备独立性。④文件管理：文件存储空间的管理、目录管理 、文件操作管理、文件保护。⑤作业管理是负责处理用户提交的任何要求。","mnemonic":"操作系统不管\"插排调整\"，插排是物理电器，记\"插排不归OS管\""},{"id":140,"type":"single","text":"对比分析主要有哪两种形式（）。","options":[{"label":"A","text":"绝对数比较、相对数比较"},{"label":"B","text":"问题因素的名称"},{"label":"C","text":"相反数比较"},{"label":"D","text":"问题因素的数量"}],"answer":"A","explanation":"对比分析主要有绝对数比较和相对数比较两种形式。","mnemonic":"对比分析两种形式：绝对数比较+相对数比较，记\"绝对+相对\""},{"id":141,"type":"single","text":"下列哪项做法违背了严谨求是的原则（）。","options":[{"label":"A","text":"主观判断"},{"label":"B","text":"谨慎处理"},{"label":"C","text":"精确表达"},{"label":"D","text":"严密思考"}],"answer":"A","explanation":"过度主观的判断会导致不客观、不严谨，因此不符合严谨求是的原则","mnemonic":"主观判断违背严谨求是，记\"主观=不客观=不严谨\""},{"id":142,"type":"single","text":"业务流程优化的含义是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"构建一种简单直接的业务流程，提升企业应对外部环境变化的反应能力将企业无效的业务活动、不增值的业务活动、等待时间、重复工作、协调工作量减到最少。"},{"label":"C","text":"在IT技术及相关配套技术的支持下，以满足业务及管理需求为前提，打破部门壁垒"},{"label":"D","text":"针对企业业务流程现存的各种问题，对企业现有的业务流程进行调研、分析、梳理、完善、改进"}],"answer":"A","explanation":"业务流程优化需借助IT技术打破部门壁垒，减少无效活动，提升响应能力。","mnemonic":"业务流程优化含义：调研改进+打破壁垒+简化提效，全选A"},{"id":143,"type":"single","text":"下列这些 ETL 工具中，属于开源的是（）。","options":[{"label":"A","text":"MicrosoftSQLServerIntegrationServices(SSIS)"},{"label":"B","text":"IBMInfoSphereDataStage"},{"label":"C","text":"InformaticaPowerCenter"},{"label":"D","text":"Kettle"}],"answer":"D","explanation":"Kettle是开源ETL工具，其他为商业软件。","mnemonic":"开源ETL工具=Kettle，记\"水壶Kettle是开源的\"，其余SSIS/DataStage/PowerCenter都是商业"},{"id":144,"type":"single","text":"傅里叶变换的作用是将时域信号转换为（）。","options":[{"label":"A","text":"频域信号"},{"label":"B","text":"时域信号"},{"label":"C","text":"噪声信号"},{"label":"D","text":"滤波信号"}],"answer":"A","explanation":"傅里叶变换，则是将时域(Time Domain)信号转换为频域(FrequencyDomain)信号","mnemonic":"傅里叶变换：时域→频域，记\"傅里叶=时变频\""},{"id":145,"type":"single","text":"图像处理指的是（）。","options":[{"label":"A","text":"使用人工智能技术对图像进行分析和识别的过程"},{"label":"B","text":"通过计算机对图像进行分析、操作的处理技术"},{"label":"C","text":"将图像转换为数字信号的过程"},{"label":"D","text":"从图像中提取有用信息的过程"}],"answer":"B","explanation":"图像处理，顾名思义，可以简单地定义为利用计算机算法(通过代码)对图像进行分析、操作的处理技术","mnemonic":"图像处理=计算机对图像分析操作的处理技术，最全面的定义选B"},{"id":146,"type":"single","text":"下列哪项不是采用滤波器对语音信号的频谱进行分析时所具有的优点（）。","options":[{"label":"A","text":"简单"},{"label":"B","text":"实时性好"},{"label":"C","text":"频率高"},{"label":"D","text":"受外界环境的影响小"}],"answer":"C","explanation":"利用一组滤波器来分析语音信号的频谱，是最早采用的频谱分析方法之一。这种方法使用简单、实时性好、受外界环境的影响小，所以至今这一方法仍是频谱分析的常用方法。","mnemonic":"滤波器频谱分析优点：简单+实时+抗干扰，\"频率高\"不是优点"},{"id":147,"type":"single","text":"在文件系统的备份工作中，对于逻辑转储算法的描述，下列哪项是正确的？","options":[{"label":"A","text":"逻辑转储算法通过备份整个文件系统的空闲块列表来确保恢复时数据的完整性"},{"label":"B","text":"物理转储相比逻辑转储的主要优势在于能够选择性跳过特定目录进行增量备份"},{"label":"C","text":"逻辑转储需要备份通向修改文件路径上的所有目录，即使这些目录本身未被修改。"},{"label":"D","text":"逻辑转储仅备份自上次转储以来修改过的文件和目录，未修改的目录无需处理"}],"answer":"C","explanation":"逻辑转储算法在备份时，会转储通向修改过的文件或目录的路径上的所有目录（甚至包括未修改的目录），主要原因包括恢复时重建目录结构的需要以及支持单个文件的增量恢复","mnemonic":"逻辑转储必须备份通向修改文件的所有目录路径，即使目录未修改"},{"id":148,"type":"single","text":"下列哪项设备不属于计算机的输入设备（）。","options":[{"label":"A","text":"扫描仪"},{"label":"B","text":"打印机"},{"label":"C","text":"鼠标"},{"label":"D","text":"键盘"}],"answer":"B","explanation":"计算机常用的输入设备有键盘、鼠标、光笔、扫描仪、数字化仪、条形码阅读器、视频摄像机等","mnemonic":"打印机是输出设备不是输入设备，记\"打印只出不进\""},{"id":149,"type":"single","text":"下列哪类行为不符合诚实公正的基本要求（）。","options":[{"label":"A","text":"提供准确、真实和完整的信息"},{"label":"B","text":"忠诚于雇主或客户的利益"},{"label":"C","text":"在交易中提供虚假信息"},{"label":"D","text":"及时、清晰地向相关方提供信息"}],"answer":"C","explanation":"根据诚实公正基本要求，从业人员在处理工作和与他人交往的过程中应该保持诚实和公正的态度","mnemonic":"提供虚假信息不符合诚实公正，记\"虚假=不诚实\""},{"id":150,"type":"single","text":"Windows Server 2008 的磁盘分区通常支持的文件系统格式有哪些（）。","options":[{"label":"A","text":"FAT"},{"label":"B","text":"FAT32"},{"label":"C","text":"NTFS"},{"label":"D","text":"以上全都包含"}],"answer":"D","explanation":"Windows Server 2008的磁盘分区一般支持三种格式的文件系统：FAT、FAT32和NTFS。","mnemonic":"Windows Server 2008支持FAT+FAT32+NTFS三种文件系统，全选D"},{"id":151,"type":"single","text":"在 K - 近邻算法里，K 值越大，对应的模型复杂度就（）。","options":[{"label":"A","text":"不确定"},{"label":"B","text":"随机"},{"label":"C","text":"增加"},{"label":"D","text":"降低"}],"answer":"D","explanation":"K值增大降低K近邻模型复杂度，决策边界更平滑。","mnemonic":"KNN中K值越大模型越简单，复杂度降低，记\"K大=粗略=简单\""},{"id":152,"type":"single","text":"什么是趋势分析法（）。","options":[{"label":"A","text":"通过回归分析确定未来数据"},{"label":"B","text":"利用多个指标进行交叉分析"},{"label":"C","text":"对增加率进行线性回归分析"},{"label":"D","text":"分析过去数据预测未来趋势"}],"answer":"D","explanation":"趋势分析法是基于数据惯性，用历史判断未来的一种分析方法。因此，选项D为正确答案。","mnemonic":"趋势分析法=分析过去数据预测未来趋势，记\"看历史推未来\""},{"id":153,"type":"single","text":"要给 Word 文档中的文本添加下划线格式，应选择哪项操作（）。","options":[{"label":"A","text":"文字后按下Ctrl+Shift+K"},{"label":"B","text":"文字后按下Ctrl+Shift+T"},{"label":"C","text":"文字后按下Ctrl+Shift+A"},{"label":"D","text":"文字后按下Ctrl+U"}],"answer":"D","explanation":"对文本应用下划线格式可以使用快捷键Ctrl+U","mnemonic":"Word下划线快捷键Ctrl+U，记\"U=Underline=下划线\""},{"id":154,"type":"single","text":"哪一项是模拟人耳听力特点所设计的一组滤波器（）。","options":[{"label":"A","text":"分帧加窗"},{"label":"B","text":"采样频率"},{"label":"C","text":"梅尔滤波器组"},{"label":"D","text":"短时傅里叶变换"}],"answer":"C","explanation":"梅尔滤波器组模仿人耳对频率的非线性感知，用于特征提取，尤其适用于语音信号处理。","mnemonic":"梅尔滤波器组模拟人耳听觉特性，记\"梅尔=Mel=人耳\""},{"id":155,"type":"single","text":"下列哪种算法属于基于原型的聚类算法（）。","options":[{"label":"A","text":"Apriori算法"},{"label":"B","text":"DBSCAN算法"},{"label":"C","text":"层次聚类算法"},{"label":"D","text":"K-means算法"}],"answer":"D","explanation":"K-means算法是一种基于原型的聚类算法","mnemonic":"K-means是基于原型的聚类，记\"K均值=以质心为原型\""},{"id":156,"type":"single","text":"属于依据统计特征开展中文分词工作的是（）。","options":[{"label":"A","text":"递归神经网络"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"D","explanation":"隐马尔可夫模型（HMM）是一种基于统计特征的中文分词模型","mnemonic":"隐马尔可夫模型HMM基于统计特征分词，记\"HMM=隐=统计概率\""},{"id":157,"type":"single","text":"在人机交互领域，G-U-L 模型里的 “G” 对应的是 GOMS 模型中的（ ）。","options":[{"label":"A","text":"用户与界面交互的基本操作"},{"label":"B","text":"完成任务所需的具体步骤"},{"label":"C","text":"用户的最终任务目标"},{"label":"D","text":"在多种方法中选择最优方案的规则"}],"answer":"C","explanation":"G-U-L模型中的“G”对应GOMS模型中的目标（Goal）。","mnemonic":"G-U-L的G=Goal=GOMS中的目标，记\"G=Goal目标\""},{"id":158,"type":"single","text":"在下列业务分析方法中，可用于了解外部环境中的政治、经济、社会和技术因素的是（）。","options":[{"label":"A","text":"竞争对手分析"},{"label":"B","text":"用户调研"},{"label":"C","text":"PEST分析"},{"label":"D","text":"SWOT分析"}],"answer":"C","explanation":"PEST分析是一种常用的业务分析方法，通过评估外部环境中的政治、经济、社会和技术因素，了解宏观经济环境中的各种因素，为企业制定发展战略提供依据","mnemonic":"分析政治经济社会技术=PEST分析，记\"PEST=宏观外部环境\""},{"id":159,"type":"single","text":"实施业务流程重组（BPR）时，通常会采用哪种方式（）。","options":[{"label":"A","text":"完全依赖外部咨询公司的建议"},{"label":"B","text":"结合研究现有流程和从零开始构建理想流程的方法"},{"label":"C","text":"仅从零开始构建理想的业务流程"},{"label":"D","text":"仅通过研究和描述现有业务流程进行重新设计"}],"answer":"B","explanation":"业务流程重组（BPR）通常结合研究和描述企业现有业务流程进行重新设计，以及从零开始构建理想的业务流程的方法（C）","mnemonic":"BPR结合\"研究现有+从零构建\"双管齐下，选B不选极端项"},{"id":160,"type":"single","text":"在自然语言对话里，下列哪项不在短语识别的范畴之内？","options":[{"label":"A","text":"句法分析"},{"label":"B","text":"词性识别"},{"label":"C","text":"语义分析"},{"label":"D","text":"语音信号的分析"}],"answer":"D","explanation":"自然语言对话包括语音信号的分析、语义分析、词性识别、句法分析等内容","mnemonic":"短语识别管\"词性句法语义\"，语音信号分析不归它管，选D排除"},{"id":161,"type":"single","text":"下列哪项不属于象限分析法常被应用的领域（）。","options":[{"label":"A","text":"客户管理"},{"label":"B","text":"产品分析"},{"label":"C","text":"市场分析"},{"label":"D","text":"艺术创作"}],"answer":"D","explanation":"象限分析法适用于市场、产品分析，不用于艺术创作。","mnemonic":"象限分析用于市场产品客户管理，\"艺术创作\"太文艺不沾边"},{"id":162,"type":"single","text":"智慧城市的作用不包含哪一项（）。","options":[{"label":"A","text":"加强城市治理能力"},{"label":"B","text":"改善城市生活品质"},{"label":"C","text":"提升城市运行效率"},{"label":"D","text":"提高人均收入水平"}],"answer":"D","explanation":"智慧城市提升运行效率与生活品质，不直接提高收入。","mnemonic":"智慧城市管治理效率品质，不直接管\"人均收入\"钱袋子"},{"id":163,"type":"single","text":"（）的情况属于欠拟合。","options":[{"label":"A","text":"模型过于简单，不能很好地拟合数据"},{"label":"B","text":"模型过于复杂，过拟合"},{"label":"C","text":"数据量过大，无法拟合模型"},{"label":"D","text":"数据异常，无法拟合模型"}],"answer":"A","explanation":"欠拟合是指模型过于简单，无法有效地拟合数据，从而导致训练和测试误差都较高。选项B描述的是过拟合，指的是模型过于复杂，导致模型在训练数据上表现良好，但在测试数据上表现较差。选项C提到的是数据量过大，这与欠拟合无关，更多的是与计算资源和训练时间相关，而非模型的复杂度。选项D提到的是数据异常问题，虽然数据质量对模型性能有影响，但数据异常更多地会导致模型无法正常训练，而不一定与欠拟合直接相关。","mnemonic":"欠拟合=模型太简单，\"欠\"就是不够复杂，选A"},{"id":164,"type":"single","text":"《中华人民共和国民法典》中所实行的婚姻制度，不包含下列哪项（）。","options":[{"label":"A","text":"婚姻自由"},{"label":"B","text":"一夫一妻"},{"label":"C","text":"男女平等"},{"label":"D","text":"门当户对"}],"answer":"D","explanation":"《中华人民共和国民法典》第一千零四十一条规定，婚姻家庭受国家保护。实行婚姻自由、一夫一妻、男女平等的婚姻制度。保护妇女、未成年人、老年人、残疾人的合法权益。","mnemonic":"婚姻制度三原则：自由一夫一妻男女平等，\"门当户对\"是封建糟粕"},{"id":165,"type":"single","text":"可以判断语音信号是清音还是浊音的是（）。","options":[{"label":"A","text":"短时傅里叶变换"},{"label":"B","text":"离散余弦变换"},{"label":"C","text":"短时自相关计算"},{"label":"D","text":"短时平均过零率"}],"answer":"D","explanation":"短时平均过零率可以用于语音信号清、浊音的判断。语音产生模型表明，由于声门波引起了谱的高频跌落，所以浊音语音能量约集中在3kHz以下。但对于清音语音，多数能量却是出现在较高的频率上。所以，如果过零率高，语音信号就是清音，如果过零率低，语音信号就是浊音。但有的音，位于浊音和清音的重叠区域，这时，只根据短时平均过零率就不可能来明确地判别清、浊音。","mnemonic":"过零率判清浊音：过零高是清音，过零低是浊音，选D"},{"id":166,"type":"single","text":"对比法能够揭示出什么（）。","options":[{"label":"A","text":"数据变化的规律"},{"label":"B","text":"数据的潜在变化"},{"label":"C","text":"数据安全"},{"label":"D","text":"数据的准确性"}],"answer":"A","explanation":"对比法通过比较揭示数据变化规律，常与其他分析方法结合使用。","mnemonic":"对比法比出\"变化规律\"，A选项对比见规律"},{"id":167,"type":"single","text":"下列哪项设备既不属于计算机的输入设备，也不属于输出设备（）。","options":[{"label":"A","text":"打印机"},{"label":"B","text":"麦克风"},{"label":"C","text":"手写笔"},{"label":"D","text":"鼠标垫"}],"answer":"D","explanation":"鼠标垫仅作为鼠标的辅助工具，不具备数据输入或输出功能。","mnemonic":"鼠标垫既不输入也不输出，只是个垫子，选D"},{"id":168,"type":"single","text":"下列能从 WAV 文件中读取语音数据的函数是（）。","options":[{"label":"A","text":"librosa.load_wav()"},{"label":"B","text":"librosa.load()"},{"label":"C","text":"librosa.load_audio()"},{"label":"D","text":"librosa.read_wav()"}],"answer":"B","explanation":"librosa.load()是librosa库中的函数，用于从WAV文件（或其他音频文件格式）中读取音频数据，并返回音频数据和采样率。","mnemonic":"librosa读音频用load()，简洁明了选B"},{"id":169,"type":"single","text":"下列哪项设备既能充当输入设备，又能当作输出设备（）。","options":[{"label":"A","text":"鼠标"},{"label":"B","text":"扫描仪"},{"label":"C","text":"磁盘驱动器"},{"label":"D","text":"绘图仪"}],"answer":"C","explanation":"磁盘驱动器既能读磁盘数据到内存，又能写内存数据到磁盘，兼具输入输出功能。","mnemonic":"磁盘驱动器能读能写，既输入又输出，选C"},{"id":170,"type":"single","text":"在结构模型里，（）属于一种基于条件与动作的规则，它的功能是判断用户输入是否符合特定条件，并由此引发对应的动作。","options":[{"label":"A","text":"产生式规则"},{"label":"B","text":"事件-对象模型"},{"label":"C","text":"扩展状态转换网络"},{"label":"D","text":"状态转换网络"}],"answer":"A","explanation":"产生式规则是一种形式化语言，通过条件和动作的映射来描述系统行为","mnemonic":"产生式规则=\"条件→动作\"，IF-THEN规则选A"},{"id":171,"type":"single","text":"能够把文本数据转换为稀疏向量表示的是（）。","options":[{"label":"A","text":"One-hot模型"},{"label":"B","text":"Transformer模型"},{"label":"C","text":"LSTM模型"},{"label":"D","text":"Word2Vec模型"}],"answer":"A","explanation":"One-hot模型将文本表示为稀疏向量，每个词对应一个独热编码。","mnemonic":"One-hot编码=稀疏向量，一个位置是1其余全0，选A"},{"id":172,"type":"single","text":"GOMS 模型的局限性体现在哪些方面？","options":[{"label":"A","text":"缺乏科学依据"},{"label":"B","text":"无法预测人类行为"},{"label":"C","text":"只适用于特定情境"},{"label":"D","text":"过于复杂且难以使用"}],"answer":"C","explanation":"GOMS模型的主要局限性在于其适用范围有限，只适用于特定情境下的用户行为分析","mnemonic":"GOMS模型局限性：只适用于特定情境，适用范围有限选C"},{"id":173,"type":"single","text":"属于基于信号分解的方法的是（）。","options":[{"label":"A","text":"高斯滤波"},{"label":"B","text":"小波变换"},{"label":"C","text":"字典学习模型"},{"label":"D","text":"中值滤波"}],"answer":"B","explanation":"小波变换是一种基于信号分解的方法，它将信号分解成不同频率的子带，并且能够在保留原始信息的同时去除噪声","mnemonic":"小波变换=信号分解法，\"波\"就是分解信号的波，选B"},{"id":174,"type":"single","text":"在行为模型的交互流程中，用户针对系统输出所做出的反馈包含哪些内容？","options":[{"label":"A","text":"明确的指令"},{"label":"B","text":"设计师的交互理念"},{"label":"C","text":"行动结果的评价"},{"label":"D","text":"交互流程图和技术参数"}],"answer":"C","explanation":"用户对行动结果的评价是行为模型中的重要反馈，用于系统改进。","mnemonic":"行为模型中用户反馈=对行动结果的评价，选C评价"},{"id":175,"type":"single","text":"在 Python 里使用 thulac 中文分词工具时，哪个参数能在模型初始化时载入用户自己定义的词典（）。","options":[{"label":"A","text":"tf-idf"},{"label":"B","text":"user_dict"},{"label":"C","text":"cut_all"},{"label":"D","text":"HMM"}],"answer":"B","explanation":"thulac参数user_dict支持加载用户自定义词典。","mnemonic":"thulac加载自定义词典用user_dict参数，用户词典选B"},{"id":176,"type":"single","text":"特征选择具有哪些优点（）。","options":[{"label":"A","text":"可以减少维度，提高训练速度"},{"label":"B","text":"可以增加特征，提高模型精度"},{"label":"C","text":"可以快速识别异常特征"},{"label":"D","text":"可以避免欠拟合"}],"answer":"A","explanation":"选项A：正确。特征选择能够有效减少维度，提高训练速度。选项B：错误。特征选择不会增加特征，反而是减少冗余特征。选项C：错误。虽然特征选择可以去除无关特征，但并不专门用于识别异常特征。异常检测是另一个独立的任务。选项D：错误。特征选择主要帮助减少过拟合，而不是直接避免欠拟合。","mnemonic":"特征选择减维度提速度，\"选择\"就是精简，选A"},{"id":177,"type":"single","text":"4. 在Python中，哪一个类更适合应用于包含较多主题的语料集（）。","options":[{"label":"A","text":"TfidfVectorizer"},{"label":"B","text":"HashingVectorizer"},{"label":"C","text":"DictVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"D","explanation":"CountVectorizer适合于主题较多的语料集，CountVectorizer构成特征矩阵的每一行表示一个训练文本的词频统计结果，只考虑每个单词在文本中出现的频率","mnemonic":"CountVectorizer适合多主题语料集，计数词频选D"},{"id":178,"type":"single","text":"下列哪项不在中级知识体系之列？（）","options":[{"label":"A","text":"数据处理方法优化"},{"label":"B","text":"数据审核"},{"label":"C","text":"数据聚类工具知识"},{"label":"D","text":"文本分析"}],"answer":"D","explanation":"文本分析不属于中级知识体系的内容。","mnemonic":"文本分析不属于中级知识体系，D是高级内容"},{"id":179,"type":"single","text":"趋势分析法的核心是借助数据的（ ）来推测未来的发展走向。","options":[{"label":"A","text":"间断性"},{"label":"B","text":"延续性"},{"label":"C","text":"突变性"},{"label":"D","text":"随机性"}],"answer":"B","explanation":"趋势分析法基于历史数据延续性预测未来发展趋势。","mnemonic":"趋势分析靠数据\"延续性\"推测未来，历史延续选B"},{"id":180,"type":"single","text":"下列选项中，不属于常见漏斗分析模型的是（）。","options":[{"label":"A","text":"AARRR 模型"},{"label":"B","text":"RFM 模型"},{"label":"C","text":"电商漏斗模型"},{"label":"D","text":"AIDMA 模型"}],"answer":"B","explanation":"AARRR模型是常用用户增长漏斗模型，而RFM模型不属于漏斗分析模型。","mnemonic":"RFM是客户价值模型不是漏斗模型，AARRR和AIDMA才是漏斗"},{"id":181,"type":"single","text":"AARRR 模型中，RRR 所代表的三个指标是（）。","options":[{"label":"A","text":"关注、留存、成交"},{"label":"B","text":"获客、关注、回访"},{"label":"C","text":"留存、收入、推荐"},{"label":"D","text":"反应、注册、收入"}],"answer":"C","explanation":"AARRR模型中五个指标分别是Acquisition（获客）、Activation（活跃）、Retention（留存）、Revenue（收入）、Referral（推荐）","mnemonic":"AARRR后三个R=Retention留存+Revenue收入+Referral推荐，选C"},{"id":182,"type":"single","text":"下面选项中，哪一项不在计算机的主要应用范畴内（）。","options":[{"label":"A","text":"科学计算"},{"label":"B","text":"金融交易"},{"label":"C","text":"办公自动化"},{"label":"D","text":"传统手工艺品制作"}],"answer":"D","explanation":"计算机的主要应用领域包括科学计算、工程设计、金融交易、办公自动化等，但不包括传统手工艺品制作。","mnemonic":"传统手工艺品制作不属于计算机应用范畴，选D手工≠电脑"},{"id":183,"type":"single","text":"在行为模型的交互流程中，哪个环节负责将用户输入转换为机器可识别的数据？","options":[{"label":"A","text":"发送请求"},{"label":"B","text":"处理请求"},{"label":"C","text":"返回响应"},{"label":"D","text":"转换请求"}],"answer":"D","explanation":"转换请求环节将用户输入转为机器可处理数据。","mnemonic":"\"转换请求\"环节将用户输入转为机器可识别数据，选D转换"},{"id":184,"type":"single","text":"下列哪一项最能说明 “状态转移网络” 在结构模型中的应用情况？（）","options":[{"label":"A","text":"它是一种图示化结构，用于描述人机之间的状态的转换，适用于描述系统的行为过程"},{"label":"B","text":"它用于定义产生式规则系统中条件与动作的匹配关系"},{"label":"C","text":"它是基于面向对象的模型，强调事件与对象的交互"},{"label":"D","text":"它描述了事件驱动系统中，状态间的变化和转移路径"}],"answer":"A","explanation":"状态转移网络（STN）是用图示化的方式描述系统中不同状态以及它们之间的转移规则的模型。它通过定义系统在各种状态下的行为和状态间的转换路径，帮助设计人员清晰地理解系统的状态变化。特别是在面对用户输入或系统内部事件时，STN描述了从一个状态到另一个状态的转换过程。","mnemonic":"状态转移网络STN=图示化描述状态转换，选A图示化结构"},{"id":185,"type":"single","text":"支持向量机算法中，适合采用线性核函数的情况是（）。","options":[{"label":"A","text":"数据集包含缺失值"},{"label":"B","text":"数据集包含大量异常值"},{"label":"C","text":"数据集是非线性可分的"},{"label":"D","text":"数据集是线性可分的"}],"answer":"D","explanation":"线性核函数在支持向量机中适用于处理线性可分的数据集","mnemonic":"线性核函数适合线性可分数据集，\"线性对线性\"选D"},{"id":186,"type":"single","text":"在 jieba 分词过程中，关键词提取是在哪个步骤完成之后开展的（）。","options":[{"label":"A","text":"获取分词结果"},{"label":"B","text":"分词操作"},{"label":"C","text":"载入词典"},{"label":"D","text":"导入jieba库"}],"answer":"A","explanation":"jieba关键词提取在分词完成后进行。","mnemonic":"jieba关键词提取在\"获取分词结果\"之后进行，先分词再提取
