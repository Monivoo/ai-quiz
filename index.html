征包括：以业务流程为改造对象和中心（A），关注客户的需求和满意度（B），对现有业务流程进行根本的再思考和彻底的再设计（C），利用先进的制造技术、信息技术以及现代化的管理手段（D）","mnemonic":"BPR目标特征全面覆盖：流程为中心+客户+再思考+先进技术，全选"},{"id":426,"type":"multi","text":"在文本数据处理流程中，下列哪项不属于特征工程的主要任务（）。","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据归一化"}],"answer":"A,C,D","explanation":"特征工程在文本数据处理流程中的主要任务是从原始的文本数据中提取出有意义的特征，用于后续的模型训练和预测。","mnemonic":"特征工程核心是\"特征提取\"，清洗/可视化/归一化不是主任务，选ACD"},{"id":427,"type":"multi","text":"下列关于漏斗分析的描述，正确的有（ ）。","options":[{"label":"A","text":"漏斗分析的主要目的是度量用户在流程中的转化情况。"},{"label":"B","text":"漏斗分析可用于探索流失率较高的环节，通过绘制功能漏斗找到用户流失点。"},{"label":"C","text":"漏斗分析仅能用于探索用户流失环节，无法用于日常监控。"},{"label":"D","text":"漏斗分析可用于日常监控核心路径漏斗，作为数据监控依据。"}],"answer":"A,B,D","explanation":"漏斗分析的主要目的确实是度量用户在流程中的转化情况,可用于探索流失率较高的环节，通过绘制功能漏斗找到用户流失点，还可用于日常监控核心路径漏斗，当数据出现下跌时可作为人工排查的依据。","mnemonic":"漏斗分析能监控也能探索流失，C说\"仅能\"错误，选ABD"},{"id":428,"type":"multi","text":"对于产生式规则的描述，下列说法中正确的有哪些？（）","options":[{"label":"A","text":"产生式规则通过匹配用户输入的条件，激活相应的动作或系统行为"},{"label":"B","text":"产生式规则系统仅能描述简单的用户界面交互，无法应用于复杂系统"},{"label":"C","text":"产生式规则可以描述误操作"},{"label":"D","text":"产生式规则的顺序不影响其执行，规则可以独立于执行顺序匹配和激活"}],"answer":"A,D","explanation":"A项正确：产生式规则的基本原理是通过定义条件和相应的动作，系统在检测到用户输入符合某一条件时触发相应的动作或行为。B项错误：虽然产生式规则适用于简单的界面交互，但它也可以应用于复杂的系统设计中，尤其是在多条件和多动作的场景下。C项错误：产生式规则不能描述误操作。D项正确：产生式规则的顺序通常不影响执行，只要条件匹配，系统就会激活相应的动作。产生式规则的独立性使得它们更容易实现和维护。","mnemonic":"产生式规则：条件匹配触发动作+顺序无关，但不能描述误操作，选AD"},{"id":429,"type":"multi","text":"在 Python 的语音处理工具体系里，能够用于处理语音信号并提供相关功能的库有（）。","options":[{"label":"A","text":"librosa - 提供语音的采样率转换、梅尔频谱提取、频率掩蔽等功能"},{"label":"B","text":"正确：pydub库提供了一个用户友好的高层语音操作API，可以轻松处理数字音频样本，例如音频的剪辑、拼接、音量调整等。"},{"label":"C","text":"正确：wave库可以用于读取和写入WAV格式的语音文件，是处理WAV文件的基本工具。"},{"label":"D","text":"正确：numpy库虽然主要用于数值计算，但可以用于处理音频数据，例如进行信号处理和分析。"}],"answer":"A,B,C,D","explanation":"A. 正确：librosa库提供了丰富的音频和音乐信号处理功能，包括语音的采样率转换、梅尔频谱提取、频率掩蔽等。","mnemonic":"Python语音处理：librosa/pydub/wave/numpy都能用，全选ABCD"},{"id":430,"type":"multi","text":"对于 SWOT 模型的定义，下列说法不正确的是（）。","options":[{"label":"A","text":"SWOT模型对企业市场环境的扫描和分析"},{"label":"B","text":"SWOT模型对企业内部资源和外部环境的分析"},{"label":"C","text":"SWOT模型对企业战略规划和实施的监控和调整"},{"label":"D","text":"SWOT模型对企业市场竞争力的评估和提高"}],"answer":"A,C,D","explanation":"SWOT模型是指对企业内部的优劣势和外部环境的机会和威胁进行分析和评估，从而制定出相应的战略，因此选项B是正确的。","mnemonic":"SWOT=内部优劣势+外部机会威胁，只有B正确，排除ACD"},{"id":431,"type":"multi","text":"（）是对图像边缘的描述。","options":[{"label":"A","text":"边缘法线方向"},{"label":"B","text":"边缘方向"},{"label":"C","text":"边缘强度"},{"label":"D","text":"边缘颜色"}],"answer":"A,B,C","explanation":"边缘的描述包含以下几个方面:(1)边缘法线方向--在某点灰度变化最剧烈的方向，与边缘方向垂直(2)边缘方向--与边缘法线方向垂直，是目标边界的切线方向。(3)边缘强度--沿边缘法线方向图像局部的变化强度的量度,","mnemonic":"边缘三要素：法线方向+边缘方向+边缘强度，无颜色，选ABC"},{"id":432,"type":"multi","text":"业务流程重组（BPR）涉及的关键技术包括哪些方面（）。","options":[{"label":"A","text":"业务流程设计与改进技术"},{"label":"B","text":"标杆瞄准"},{"label":"C","text":"建模与仿真技术"},{"label":"D","text":"人力资源管理"}],"answer":"A,B,C","explanation":"业务流程重组（BPR）的关键技术主要包括：业务流程设计与改进技术（A）：重新设计现有流程或完善新设计的流程，以更好地满足客户需求和提高效率。标杆瞄准（Benchmarking）（B）：通过分析世界领先企业的最佳实践，确定本企业的业绩目标。建模与仿真技术（C）：通过建模和仿真来评估和优化新流程，降低实施风险，提高成功率。人力资源管理（D）不是BPR的关键技术之一。虽然人力资源管理对于企业变革管理非常重要，但它并不直接属于BPR的关键技术范畴。人力资源管理更多关注于员工的招聘、培训、激励等方面，而BPR的关键技术更侧重于流程的设计、改进和实施。","mnemonic":"BPR关键技术：流程设计+标杆瞄准+建模仿真，人力资源不算，选ABC"},{"id":433,"type":"multi","text":"下列属于业务流程优化需要遵循的原则的是（）。","options":[{"label":"A","text":"以流程为导向"},{"label":"B","text":"基于现实"},{"label":"C","text":"循序渐进"},{"label":"D","text":"面向客户"}],"answer":"A,B,C,D","explanation":"业务流程优化需要遵循的十大原则有以流程为导向、基于现实、循序渐进、面向客户、结果导向、职责完整性、并行原则、价值增值、定义精确、IT支持等","mnemonic":"业务流程优化十大原则全含ABCD，全选"},{"id":434,"type":"multi","text":"以下属于常见的聚类分析方法的是（）。","options":[{"label":"A","text":"K-Means聚类算法"},{"label":"B","text":"BIRCH"},{"label":"C","text":"DBSCAN"},{"label":"D","text":"支持向量机"}],"answer":"A,B,C","explanation":"K-means聚类是常用的聚类算法之一，通过迭代将数据点划分为K个簇。BIRCH是一种适用于大规模数据集的层次聚类算法。DBSCAN是一种基于密度的聚类算法，能够识别任意形状的簇，并且对噪声具有鲁棒性。支持向量机（SVM）是监督学习方法，用于分类或回归任务，与无监督的聚类无关。","mnemonic":"聚类算法：K-Means/BIRCH/DBSCAN，SVM是分类不是聚类，选ABC"},{"id":435,"type":"multi","text":"多维度拆解分析方法中，需要理解的两个关键词是（）。","options":[{"label":"A","text":"维度"},{"label":"B","text":"维系"},{"label":"C","text":"解析"},{"label":"D","text":"拆解"}],"answer":"A,D","explanation":"对于多维度拆解分析方法，要理解两个关键词:维度、拆解。","mnemonic":"多维度拆解分析两个关键词就在名字里：\"维度\"和\"拆解\"，选AD"},{"id":436,"type":"multi","text":"关于可用性设计，以下哪些描述是正确的？（）","options":[{"label":"A","text":"可用性设计的主要目标是让用户能够快速且有效地完成任务"},{"label":"B","text":"可用性设计只关注产品的外观和吸引力，不涉及操作流程"},{"label":"C","text":"可用性设计应该帮助用户在使用过程中避免犯错并提供修正措施"},{"label":"D","text":"可用性设计包括提高用户学习成本，使用户能在复杂环境下灵活操作"}],"answer":"A,C","explanation":"可用性设计的核心是提高产品的效力（有效性）和效率，确保用户能够顺利、快速地完成任务，这是可用性设计的核心目标之一。可用性设计的目标是降低用户的学习成本，使产品易于学习，而不是提高学习成本。提高学习成本会增加用户的使用难度和不满。可用性设计时要考虑用户操作错误的情况，并尽可能提供修正或恢复机制，提升用户体验。虽然吸引力是可用性的一部分，但可用性设计不仅仅关注外观，更加注重用户在使用过程中是否能够高效完成任务，操作流程的设计也至关重要。","mnemonic":"可用性设计：快速完成任务+防错纠错，不是提高学习成本，选AC"},{"id":437,"type":"multi","text":"智慧校园建设的目标包括下列哪项？","options":[{"label":"A","text":"改善学校教育教学的效果"},{"label":"B","text":"改善学校管理水平"},{"label":"C","text":"提升学生服务水平"},{"label":"D","text":"提升校园安全性"}],"answer":"A,B,C,D","explanation":"智慧校园的目的包括改善学校教育教学的效果、改善学校管理水平、提升学生服务水平、提升校园安全性。","mnemonic":"智慧校园四大目标：教学+管理+服务+安全，全选ABCD"},{"id":438,"type":"multi","text":"神经网络算法的关键原理有哪些（）。","options":[{"label":"A","text":"反向传播算法"},{"label":"B","text":"梯度下降算法"},{"label":"C","text":"神经元模型"},{"label":"D","text":"特征选择技术"}],"answer":"A,B,C","explanation":"神经网络算法的关键原理包括反向传播算法、梯度下降算法和神经元模型。反向传播算法用于训练神经网络，梯度下降算法用于更新权重和偏置，神经元模型描述神经元的计算过程。而特征选择技术不是神经网络算法的原理。","mnemonic":"神经网络三大原理：反向传播+梯度下降+神经元模型，特征选择不算，选ABC"},{"id":439,"type":"multi","text":"在分类模型的各类评估指标中，属于基于混淆矩阵的指标是（）。","options":[{"label":"A","text":"精确率（Precision）"},{"label":"B","text":"准确率（Accuracy）"},{"label":"C","text":"召回率（Recall）"},{"label":"D","text":"AUC"}],"answer":"A,B,C","explanation":"精确率（Precision）、准确率（Accuracy）、召回率（Recall）都是基于混淆矩阵计算的指标，可以全面评价分类模型的效果；AUC是通过绘制ROC曲线得到的，可以用于比较多个分类模型的性能。","mnemonic":"精确率准确率召回率基于混淆矩阵，AUC基于ROC曲线，选ABC"},{"id":440,"type":"multi","text":"下列选项中，属于 ETL 工具的是（）。","options":[{"label":"A","text":"Kettle"},{"label":"B","text":"MicrosoftSQLServerIntegrationServices(SSIS)"},{"label":"C","text":"InformaticaPowerCenter"},{"label":"D","text":"OracleDataIntegrator"}],"answer":"A,B,C,D","explanation":"MicrosoftSQLServerIntegrationServices(SSIS)和OracleDataIntegrator属于数据库厂商自带的ETL工具，Kettle和InformaticaPowerCenter属于第三方工具提供库，两种都是ETL工具。","mnemonic":"ETL工具：Kettle/SSIS/Informatica/ODI都是，全选ABCD"},{"id":441,"type":"multi","text":"下列属于 NoSQL 数据库主要优势的是（）。","options":[{"label":"A","text":"高可扩展性"},{"label":"B","text":"强一致性保证"},{"label":"C","text":"灵活的数据模型"},{"label":"D","text":"复杂的事务支持"}],"answer":"A,C","explanation":"NoSQL数据库的主要优势包括高可扩展性，能够处理大规模数据和高并发负载；灵活的数据模型，能够存储非结构化和半结构化的数据。NoSQL数据库通常遵循CAP理论，在可用性和分区容错性之间做权衡，牺牲强一致性来换取高可用性和分区容错性。NoSQL数据库通常对复杂事务支持较弱，它们更擅长处理简单事务和高并发场景。","mnemonic":"NoSQL优势：高可扩展+灵活模型，牺牲强一致性和复杂事务，选AC"},{"id":442,"type":"multi","text":"支持向量机算法的核函数有（）。","options":[{"label":"A","text":"线性核函数"},{"label":"B","text":"多项式核函数"},{"label":"C","text":"径向基函数"},{"label":"D","text":"sigmoid核函数"}],"answer":"A,B,C,D","explanation":"支持向量机算法中的核函数用于将输入空间映射到另一个更高维的空间中，以便于寻找线性可分的超平面。常见的核函数有线性核函数、多项式核函数、径向基函数等。线性核函数是最简单的核函数，直接将输入数据映射到原空间；多项式核函数采用多项式函数将原数据映射到更高维的空间；径向基函数则采用径向基函数来进行映射；sigmoid核函数也是一种支持向量机算法的核函数。","mnemonic":"SVM四大核函数：线性/多项式/径向基/sigmoid，全选ABCD"},{"id":443,"type":"multi","text":"下列哪项方法能够有效减轻算法的过拟合问题（）。","options":[{"label":"A","text":"增加正则化项"},{"label":"B","text":"提高学习率"},{"label":"C","text":"增加训练数据集大小"},{"label":"D","text":"增加神经网络的层数"}],"answer":"A,C","explanation":"算法过拟合指的是模型过于复杂，导致在训练数据上表现很好，但在测试数据上表现较差。为减少过拟合，常用的方法包括：增加正则化项：正则化（如L1或L2正则化）通过在损失函数中加入惩罚项来限制模型的复杂度，防止模型对训练数据过拟合。提高学习率：提高学习率不会减少过拟合，反而可能导致训练过程不稳定，因此这不是有效的减少过拟合的方法。增加训练数据集大小：更多的训练数据有助于提高模型的泛化能力，从而减少对训练数据的过拟合。增加神经网络的层数：增加神经网络的层数会增加模型的复杂度，从而加剧过拟合的风险。","mnemonic":"减少过拟合：正则化+加数据，提高学习率和加层数反而有害，选AC"},{"id":444,"type":"multi","text":"下列属于中值滤波步骤的是（）。","options":[{"label":"A","text":"确定像素的邻域窗口"},{"label":"B","text":"对像素点的灰度值排序"},{"label":"C","text":"用灰度中值替换中心点像素的加度值"},{"label":"D","text":"不需要遍历所有像素点"}],"answer":"A,B,C","explanation":"中值滤波的具体步骤如下。(1)对于给定的图像像素点，确定以该像素为中心的一个邻域窗口，形状通常为正方形，尺寸可根据图像细节和噪声情况来调整。(2)确定邻域窗口的形状和尺寸后，针对每一个像素，对以该像素为中心点的邻域窗口内所有像素点的灰度值进行排序，然后使用这些灰度值的中值替换中心点像素的加度值。在图像中遍历完所有的像素点并进行处理后，便完成了对该图像的中值滤波处理","mnemonic":"中值滤波三步：定窗口→排序→取中值替换，需遍历所有像素，选ABC"},{"id":445,"type":"multi","text":"数据标注的类型包括（）。","options":[{"label":"A","text":"图像类数据标注"},{"label":"B","text":"文本类数据标注"},{"label":"C","text":"语音类数据标注"},{"label":"D","text":"视频类数据标注"}],"answer":"A,B,C,D","explanation":"数据标注分为4种基本类型，包括图像类数据标注、文本类数据标注、语音类数据标注、视频类数据标注及其他类数据标注。","mnemonic":"数据标注四类：图像+文本+语音+视频，全选ABCD"},{"id":446,"type":"multi","text":"职业道德在要求上涵盖了哪些方面（）。","options":[{"label":"A","text":"诚实守信"},{"label":"B","text":"私心杂念"},{"label":"C","text":"职业操守"},{"label":"D","text":"个人利益"}],"answer":"A,C","explanation":"职业道德是指在特定职业中，需要遵循的一些准则和规范。其中，诚实守信和职业操守是职业道德的重要要求，私心杂念和个人利益则是违背职业道德的表现。","mnemonic":"职业道德要求：诚实守信+职业操守，私心和个人利益违背道德，选AC"},{"id":447,"type":"multi","text":"以下关于 LOTOS 语言及其算子特点的描述，正确的有哪些（）。","options":[{"label":"A","text":"LOTOS基于进程代数和抽象数据类型理论构建"},{"label":"B","text":"LOTOS算子可以描述非确定性行为"},{"label":"C","text":"LOTOS语言只能用于描述网络协议，不能描述其他系统行为"},{"label":"D","text":"LOTOS语言作为ISO标准的一部分，主要应用于开放分布式系统的描述"}],"answer":"A,B,D","explanation":"LOTOS的理论基础包括进程代数（CCS）和抽象数据类型建模语言（ACT-ONE）。LOTOS支持描述具有非确定性（Nondeterministic）特征的行为，这是并发系统的一个重要特点。虽然LOTOS最初主要用于描述网络协议，但它也能用来建模其他类型的开放分布式系统。LOTOS是ISO的一部分，专门用于开放分布式系统的行为建模。","mnemonic":"LOTOS基于进程代数+描述非确定性+ISO标准，不限于网络协议，选ABD"},{"id":448,"type":"multi","text":"在神经网络算法中，下列哪项通常不被用于防止过拟合问题（）。","options":[{"label":"A","text":"梯度下降算法"},{"label":"B","text":"L1正则化"},{"label":"C","text":"随机梯度下降算法"},{"label":"D","text":"Dropout算法"}],"answer":"A,C","explanation":"梯度下降算法：用于优化损失函数，不针对过拟合。L1正则化：通过惩罚项限制权重大小，有效防止过拟合。随机梯度下降算法：是梯度下降算法的一种变体，核心功能是优化损失函数，并非用于防止过拟合的技术。Dropout算法：通过随机丢弃神经元，有效防止过拟合。","mnemonic":"梯度下降和SGD用于优化损失函数，不防过拟合，选AC"},{"id":449,"type":"multi","text":"在推进业务流程优化的过程里，下列哪几项步骤是必须完成的（）。","options":[{"label":"A","text":"成立业务流程优化项目小组"},{"label":"B","text":"找到阻碍流程优化目标实现的因素"},{"label":"C","text":"直接实施新的流程方案，无需分析和反馈"},{"label":"D","text":"对初步制定的流程优化方案进行进一步优化"}],"answer":"A,B,D","explanation":"根据业务流程优化的顺序，成立业务流程优化项目小组（A）是前提，找到阻碍流程优化目标实现的因素（B）是关键步骤，而对初步制定的流程优化方案进行进一步优化（D）是确保方案可行性的必要环节。直接实施新的流程方案而无需分析和反馈（C）是不合理的，可能会导致方案无法有效执行。","mnemonic":"流程优化需成立小组+找阻碍+优化方案，不能跳过分析直接实施，选ABD"},{"id":450,"type":"multi","text":"在中级培训的知识点中，属于数据采集和处理培训内容的是哪项？（）","options":[{"label":"A","text":"数据采集"},{"label":"B","text":"数据处理"},{"label":"C","text":"模型训练"},{"label":"D","text":"业务数据采集规范和方法"}],"answer":"A,B,D","explanation":"数据采集、数据处理、业务数据采集规范和方法属于中级培训知识点中数据采集和处理的培训内容。","mnemonic":"中级培训数据采集处理：采集+处理+规范方法，模型训练不属于，选ABD"},{"id":451,"type":"multi","text":"诚实公正的基本要求包含哪些内容（）。","options":[{"label":"A","text":"公正地对待所有相关方"},{"label":"B","text":"隐瞒重要信息"},{"label":"C","text":"利用职务之便谋取个人私利"},{"label":"D","text":"及时、清晰地向相关方提供信息"}],"answer":"A,D","explanation":"根据诚实公正的基本要求，从业人员要做到以下几点，一、诚实，从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。二、公正，从业人员应该公正地对待所有相关方，不偏袒任何一方。基于客观事实和公正标准做出决策和评估。三、透明，从业人员应该及时、清晰地向相关方提供信息，并确保相关方理解信息的真实性和重要性。遵守披露要求，不得隐瞒重要信息。四、忠诚和权益保护，从业人员应该忠诚于雇主或客户的利益，并保护他们的权益。不得利用职务之便谋取个人私利，也不得损害他人的权益。因此AD选项符合题目要求。","mnemonic":"诚实公正：公正对待+及时提供信息，隐瞒和谋私利是反面，选AD"},{"id":452,"type":"multi","text":"以下哪类算法可看作是随机森林在集成结构或随机性设计上的优化或衍生版本？（）","options":[{"label":"A","text":"孤立森林算法"},{"label":"B","text":"Boosting算法"},{"label":"C","text":"Adaboost算法"},{"label":"D","text":"Extra-Trees算法"}],"answer":"A,D","explanation":"Extra-Trees算法：Extra-Trees与随机森林非常相似，区别在于Extra-Trees增加了更多的随机性。在构建树时，Extra-Trees不仅随机选择特征子集，还随机化决策树节点的分裂阈值，这样可以进一步提高模型的泛化能力，因此，Extra-Trees可以被看作是随机森林的变种。孤立森林：孤立森林继承了随机森林的​​集成架构​​和​​随机特征选择​​特性，因此属于衍生变种；但它主要用于异常检测（离群点检测）。Boosting算法和Adaboost算法：Boosting是另一种集成学习方法，主要通过对前一轮学习器的错误样本赋予更高权重来提高模型的准确性。Adaboost是Boosting的一种实现。它们与随机森林的核心思想不同，尤其是在集成方式和目标上，因此不应视为随机森林的变种。","mnemonic":"随机森林衍生：孤立森林(异常检测)+Extra-Trees(更随机)，Boosting不同体系，选AD"},{"id":453,"type":"multi","text":"智慧商场中常见的关键技术有哪些（）。","options":[{"label":"A","text":"物联网技术"},{"label":"B","text":"大数据与云计算"},{"label":"C","text":"人工智能技术"},{"label":"D","text":"5G技术"}],"answer":"A,B,C,D","explanation":"物联网技术、大数据与云计算、人工智能技术和5G技术是智慧商场中常见的关键技术。","mnemonic":"智慧商场关键技术：物联网+大数据云计算+AI+5G，全选ABCD"},{"id":454,"type":"multi","text":"在从事职业工作的过程中，什么样的行为是与职业道德要求相违背的（）。","options":[{"label":"A","text":"向同事请教遇到的难题"},{"label":"B","text":"在工作中撒谎掩盖错误"},{"label":"C","text":"给客户提供虚假的服务内容"},{"label":"D","text":"将客户个人信息泄露给他人"}],"answer":"B,C,D","explanation":"在职业工作中，诚实守信和保护客户隐私是职业道德的重要要求。撒谎掩盖错误、提供虚假服务内容和泄露客户个人信息都是违背职业道德的不良行为。相反，向同事请教遇到的难题可以促进团队合作和完成工作任务，符合职业道德要求。","mnemonic":"违背职业道德：撒谎+虚假服务+泄露隐私，请教同事是正常行为，选BCD"},{"id":455,"type":"multi","text":"K - 近邻算法的分类流程包括（）。","options":[{"label":"A","text":"计算测试数据与训练数据之间的距离"},{"label":"B","text":"选取K个距离最近的训练数据点"},{"label":"C","text":"根据K个最近邻的多数投票确定测试数据的类别归属"},{"label":"D","text":"对测试数据进行划分"}],"answer":"A,B,C","explanation":"K-近邻算法的分类流程包括以下步骤：计算测试数据与训练数据之间的距离、选取K个距离最近的训练数据点、根据K个最近邻的多数投票确定测试数据的类别归属。选项D对测试数据进行划分属于数据预处理的步骤，而非KNN算法的分类流程。","mnemonic":"KNN分类三步：算距离→选K个最近→多数投票，划分数据是预处理，选ABC"},{"id":456,"type":"multi","text":"下列属于 NoSQL 数据库主要优势的是（）。","options":[{"label":"A","text":"高可扩展性"},{"label":"B","text":"强一致性保证"},{"label":"C","text":"灵活的数据模型"},{"label":"D","text":"复杂的事务支持"}],"answer":"A,C","explanation":"NoSQL数据库的主要优势包括高可扩展性，能够处理大规模数据和高并发负载；灵活的数据模型，能够存储非结构化和半结构化的数据。NoSQL数据库通常遵循CAP理论，在可用性和分区容错性之间做权衡，牺牲强一致性来换取高可用性和分区容错性。NoSQL数据库通常对复杂事务支持较弱，它们更擅长处理简单事务和高并发场景。","mnemonic":"NoSQL优势：高扩展+灵活模型，强一致和复杂事务是短板，选AC（同441）"},{"id":457,"type":"multi","text":"下列哪项是数据仓库的主要特点（）。","options":[{"label":"A","text":"面向分析和决策支持"},{"label":"B","text":"实时数据处理"},{"label":"C","text":"存储大量历史数据"},{"label":"D","text":"高度冗余的数据结构"}],"answer":"A,C","explanation":"数据仓库的主要特点包括面向分析和决策支持，以及存储大量历史数据。数据仓库被设计用于支持复杂的数据分析和提供决策支持，同时它还具有存储大量历史数据的能力，以便进行趋势分析和历史数据的比较。","mnemonic":"数据仓库：面向分析决策+存历史数据，非实时处理非冗余，选AC"},{"id":458,"type":"multi","text":"下列关于数据集划分方法的说法，正确的是（）。","options":[{"label":"A","text":"留出法将数据集分为训练集和测试集，数据集的划分比例通常为70%：30%或80%：20%"},{"label":"B","text":"交叉验证法通过将数据集分成多个子集，每个子集轮流作为测试集，其余子集作为训练集"},{"label":"C","text":"自助法通过从原数据集有放回的随机抽取样本来构建训练集，未被选中的样本作为测试集"},{"label":"D","text":"分层抽样可以保证每个子集中的类别分布与原数据集相同，适用于类别不平衡的数据集"}],"answer":"A,B,C,D","explanation":"选项A正确。留出法（Hold-Out Method）将数据集分为训练集和测试集，通常按照70%：30%或80%：20%的比例划分，适用于简单的模型评估。选项B正确。交叉验证法（Cross-Validation）将数据集分为多个子集（如k个子集），每个子集轮流作为测试集，其他子集用作训练集，通常用于提高模型评估的稳定性。选项C正确。自助法（Bootstrap）通过从原数据集随机抽取样本，构建训练集，其中一些样本会重复抽取，而剩下的未被选中的样本作为测试集，用于评估模型的泛化能力。选项D正确。分层抽样（Stratified Sampling）通过保持类别分布的一致性，将数据集按类别分层，再进行随机划分。适用于类别不平衡的数据集，以确保训练集和测试集中的每个类别的样本比例相同。","mnemonic":"数据集划分四种方法全正确：留出/交叉/自助/分层，全选ABCD"},{"id":459,"type":"multi","text":"下列哪一种（）算法不能用于关联分析。","options":[{"label":"A","text":"KNN算法"},{"label":"B","text":"决策树算法"},{"label":"C","text":"KMeans算法"},{"label":"D","text":"Apriori算法"}],"answer":"A,B,C","explanation":"Apriori算法是一种经典的关联规则挖掘算法，可用于发现数据集中频繁出现的项集之间的关联关系。KNN和决策树是一种监督学习算法，主要用于分类和回归任务。KMeans是一种无监督学习算法，主要用于聚类任务。","mnemonic":"关联分析只有Apriori，KNN决策树分类，KMeans聚类，选ABC排除D"},{"id":460,"type":"multi","text":"下列哪项属于数据库管理系统的主要功能（）。","options":[{"label":"A","text":"数据定义功能"},{"label":"B","text":"数据操纵功能"},{"label":"C","text":"数据可视化功能"},{"label":"D","text":"硬件资源分配功能"}],"answer":"A,B","explanation":"数据库管理系统的主要功能有数据定义功能、数据操纵功能、数据库的运行管理、数据库的建立和维护功能、数据组织、存储和管理和数据通信功能。","mnemonic":"数据库管理系统：数据定义+数据操纵，可视化和硬件分配不属于，选AB"},{"id":461,"type":"multi","text":"下列各项中，可能造成决策树模型出现过拟合现象的因素是（）。","options":[{"label":"A","text":"样本数量过少"},{"label":"B","text":"特征数量过多"},{"label":"C","text":"树的深度过大"},{"label":"D","text":"使用了较大的训练集"}],"answer":"A,B,C","explanation":"选项A：样本数量过少可能导致决策树模型无法有效地泛化，容易过拟合。较少的样本使得树在拟合过程中很容易把噪声和特殊情况当作规律，导致对训练数据的记忆而非学习一般规律。选项B：特征选择过多可能导致决策树模型变得非常复杂，增加了树的分裂次数和深度，从而导致过拟合。特别是在某些特征与目标变量没有强相关性的情况下，过多的特征可能使得决策树模型难以找到最优的划分规则。选项C：树的深度过大是导致过拟合的常见原因。过深的树会把训练数据的每一个小变化都考虑进去，导致模型对训练集的过度拟合，从而丧失泛化能力。选项D：使用较大的训练集通常有助于减少过拟合，因为更多的数据可以提供更多的信息，有助于模型学习到数据的总体规律。","mnemonic":"过拟合因素：样本少+特征多+树太深，大训练集反而减少过拟合，选ABC"},{"id":462,"type":"multi","text":"下列哪项属于中级培训包含的知识点？（）","options":[{"label":"A","text":"掌握数据采集知识"},{"label":"B","text":"平台化推广方法"},{"label":"C","text":"掌握深度学习算法的模型构建"},{"label":"D","text":"掌握数据聚类工具知识"}],"answer":"A,D","explanation":"掌握数据采集知识、掌握数据聚类工具知识属于中级培训的知识点。","mnemonic":"中级培训：数据采集+聚类工具知识，深度学习和推广不属于，选AD"},{"id":463,"type":"multi","text":"常见的文本向量化方法有哪些（）。","options":[{"label":"A","text":"one-hot编码"},{"label":"B","text":"词袋模型"},{"label":"C","text":"TF-IDF"},{"label":"D","text":"词性标注模型"}],"answer":"A,B,C","explanation":"常见的文本向量化方法包括one-hot编码、词袋模型和TF-IDF。其中，one-hot编码将每个词转换成一个唯一的向量，向量维度等于词表中词语数量；词袋模型将文本表示为一个固定长度的词向量，向量的每个维度表示对应词在文本中出现的次数；TF-IDF方法基于词袋模型，考虑到一些高频词对文本分类的影响不大，因此在计算向量时会对高频次数进行调整。词性标注模型是一种将文本中的单词标记为特定词性的方法，例如名词、动词、形容词等。它不是一种文本向量化方法，而是一种文本分析方法。","mnemonic":"文本向量化：one-hot+词袋+TF-IDF，词性标注是分析非向量化，选ABC"},{"id":464,"type":"multi","text":"在初级培训知识点里，数据标注的培训内容包含哪一项（）。","options":[{"label":"A","text":"脚本标注"},{"label":"B","text":"文本标注"},{"label":"C","text":"语音标注"},{"label":"D","text":"视觉标注"}],"answer":"B,C,D","explanation":"文本标注、语音标注、视觉标注属于初级级培训知识点中数据标注的培训内容。","mnemonic":"初级标注培训：文本+语音+视觉标注，无\"脚本标注\"，选BCD"},{"id":465,"type":"multi","text":"在人机交互中，一个完整的人体动作分析过程主要包含哪些步骤？","options":[{"label":"A","text":"动作捕捉"},{"label":"B","text":"动作预测"},{"label":"C","text":"动作特征描述"},{"label":"D","text":"动作分类识别"}],"answer":"A,C,D","explanation":"一个完整的人体动作分析过程主要包括动作捕捉、动作特征描述和动作分类识别三大部分。","mnemonic":"人体动作分析三步：捕捉→特征描述→分类识别，无\"预测\"，选ACD"},{"id":466,"type":"multi","text":"下列哪种方法主要被用于评估随机森林模型中的特征重要程度？（）","options":[{"label":"A","text":"基于熵的重要性"},{"label":"B","text":"基于信息增益的重要性"},{"label":"C","text":"基于平均减少不纯度的重要性"},{"label":"D","text":"基于特征的平均减少准确度"}],"answer":"C,D","explanation":"在随机森林模型中，特征重要性评估是通过每棵决策树的分裂情况来确定的。基于平均减少不纯度的重要性： 随机森林使用这种方法来评估特征的重要性，通过计算每个特征的分裂所带来的不纯度减少，最终得出每个特征的重要性评分。基于特征的平均减少准确度： 这是评估特征在模型中贡献的重要性的一种方法，通过计算特征在训练过程中对准确度的影响，通常用于交叉验证中。“基于熵的重要性” 和 “基于信息增益的重要性” 主要用于单个决策树的节点分裂依据，并非随机森林的特征重要性评估方法。","mnemonic":"随机森林特征重要性：平均减少不纯度+平均减少准确度，选CD"},{"id":467,"type":"multi","text":"以下关于 NoSQL 数据库的描述，正确的是（）。","options":[{"label":"A","text":"NoSQL数据库没有固定的表结构，数据模型灵活"},{"label":"B","text":"NoSQL数据库采用传统的关系模型"},{"label":"C","text":"NoSQL数据库不需要严格遵守ACID约束"},{"label":"D","text":"NoSQL数据库采用类似键值、列族、文档等非关系模型"}],"answer":"A,C,D","explanation":"NoSQL数据库不使用固定表结构，数据模型灵活。NoSQL数据库不采用传统关系模型，而是使用键值、列族、文档、图等非关系模型。NoSQL数据库通常在设计上会根据具体应用场景在一致性、可用性和分区容错性之间进行权衡，不需要严格遵守ACID约束。NoSQL数据库采用键值、列族、文档、图等非关系模型存储数据。","mnemonic":"NoSQL：无固定表结构+不严格ACID+键值文档等非关系模型，B说关系模型错，选ACD"},{"id":468,"type":"multi","text":"业务流程重组（BPR）有哪些实施方法（）。","options":[{"label":"A","text":"在研究和描述企业现有业务流程的基础上进行重新设计"},{"label":"B","text":"从一张白纸开始构建企业理想的业务流程"},{"label":"C","text":"完全依赖外部咨询公司的建议，不进行内部研究"},{"label":"D","text":"参考相关企业的管理水准进行构建"}],"answer":"A,B,D","explanation":"业务流程重组（BPR）的实施方法包括：在研究和描述企业现有业务流程的基础上进行重新设计（A），从一张白纸开始构建企业理想的业务流程（B），以及参考相关企业的管理水准进行构建（D）。完全依赖外部咨询公司的建议而不进行内部研究（C）并不是一种推荐的实施方法。","mnemonic":"BPR实施：研究现有+白纸构建+参考标杆，不能完全依赖外部，选ABD"},{"id":469,"type":"multi","text":"以下对数据仓库的描述，正确的是（）。","options":[{"label":"A","text":"面向分析和决策支持，而非日常事务处理"},{"label":"B","text":"实时处理高并发的事务操作（如订单提交）"},{"label":"C","text":"存储大量历史数据以支持长期趋势分析"},{"label":"D","text":"通过ETL过程整合多源异构数据"}],"answer":"A,C,D","explanation":"数据仓库的核心目标是支持复杂的查询和分析。实时事务处理是OLTP系统的职责。数据仓库通过定期ETL积累历史数据。ETL（抽取、转换、加载）是数据仓库的核心流程，解决数据来源多样、格式不一致等问题，形成统一的语义层。","mnemonic":"数据仓库：面向分析+存历史+ETL整合，实时事务是OLTP，选ACD"},{"id":470,"type":"multi","text":"在对神经网络进行训练时，有一种技术专门通过直接抑制过拟合现象，从而增强模型的泛化能力，这种技术是（）。","options":[{"label":"A","text":"Dropout"},{"label":"B","text":"L2正则化"},{"label":"C","text":"批量归一化"},{"label":"D","text":"激活函数ReLU"}],"answer":"A,B","explanation":"Dropout：Dropout 是一种常用的正则化技术，通过在训练过程中随机丢弃神经元，减少模型对特定输入的依赖，从而提高泛化能力。L2正则化：L2正则化通过向损失函数中加入权重的平方和惩罚项，能够限制模型的复杂度，防止过拟合，提高泛化能力。批量归一化：批量归一化通过标准化每一层的输入，能够加速神经网络的训练，但其设计目标并非直接抑制过拟合。激活函数ReLU：ReLU作为一种激活函数，并不会直接影响模型的泛化能力，它更多是解决了深层神经网络中梯度消失的问题，因此它不属于提高泛化能力的技术。","mnemonic":"直接抑制过拟合：Dropout随机丢弃+L2正则化惩罚权重，选AB"},{"id":471,"type":"multi","text":"按照数据存储方式的差异，数据存储可分为哪几类（）。","options":[{"label":"A","text":"直连存储"},{"label":"B","text":"网络附加存储"},{"label":"C","text":"存储区域网络"},{"label":"D","text":"缓存存储"}],"answer":"A,B,C","explanation":"根据数据存储方式的不同，数据存储可分为直连存储(DirectAttachedStorage,DAS)、网络附加存储(NetworkAttachedStorage,NAS),存储区域网络(StorageAreaNetwork,SAN)。","mnemonic":"数据存储三类：DAS直连+NAS网络附加+SAN存储区域网络，选ABC"},{"id":472,"type":"multi","text":"以下对关联分析的描述，正确的有（ ）。","options":[{"label":"A","text":"关联分析旨在发现数据集中项之间的有趣关联和相关性"},{"label":"B","text":"关联分析常用于购物篮分析等市场应用"},{"label":"C","text":"关联分析中，支持度和置信度是衡量关联规则的常用指标"},{"label":"D","text":"关联分析只能处理数值型数据"}],"answer":"A,B,C","explanation":"关联规则挖掘是指从一个大型的数据集中发现有趣的关联或相关关系，即从数据集中识别出频繁出现的属性值集，也称为频繁项集，然后利用这些频繁项集创建描述关联关系规则的过程。购物篮分析是关联分析的经典应用场景，通过分析顾客购买行为发现商品间的关联性，从而优化商品陈列、促销策略等。支持度和置信度是衡量关联规则的常用指标。关联分析主要适用于类别型数据（如商品ID、用户行为标签），而非数值型数据。","mnemonic":"关联分析：发现关联+购物篮应用+支持度置信度，非仅数值型，选ABC"},{"id":473,"type":"multi","text":"文本向量化是把文本数据转化为向量的过程，下列说法不正确的是（）。","options":[{"label":"A","text":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式"},{"label":"B","text":"文本向量化只能用于英文文本数据处理"},{"label":"C","text":"文本向量化的结果是唯一的"},{"label":"D","text":"文本向量化可以保留文本数据的所有信息"}],"answer":"B,C,D","explanation":"文本向量化可以将文本数据转换成计算机可以处理的数字形式，为实现文本分类、情感分析等任务提供了基础。文本向量化不仅可以用于英文文本数据处理，也可以用于其他语言文本数据处理。文本向量化的结果不一定唯一，比如可以使用不同的词袋模型、文本预处理方式等，得到不同的向量表示。文本向量化通常会丢失一部分文本数据的信息。","mnemonic":"文本向量化：可用于多语言、结果不唯一、会丢信息，BCD说法错，选BCD"},{"id":474,"type":"multi","text":"在 Python 中，（）库能够读取语音文件。","options":[{"label":"A","text":"audioop"},{"label":"B","text":"aifc"},{"label":"C","text":"wav"},{"label":"D","text":"Scikit-learn"}],"answer":"A,B,C","explanation":"对于语音文件的读取，可以使用Python的audioop、aifc、wav等库实现。。","mnemonic":"Python读语音文件：audioop/aifc/wav可以，Scikit-learn是机器学习库，选ABC"},{"id":475,"type":"multi","text":"判断模型是否欠拟合时，通常需要综合考量的因素包括（）。","options":[{"label":"A","text":"训练误差"},{"label":"B","text":"验证误差"},{"label":"C","text":"测试误差"},{"label":"D","text":"模型复杂度"}],"answer":"A,B,C,D","explanation":"训练误差：反映模型在训练集上的表现，训练误差较高是欠拟合的标志。验证误差：反映模型在验证集（中间评估集）上的表现，较高的验证误差和较高的训练误差可能表明欠拟合。测试误差：反映模型在测试集（最终未见过的数据）上的表现，较高的测试误差通常与欠拟合或过拟合相关，具体需要综合训练误差来判断。模型复杂度：如果模型复杂度过低，可能无法捕捉数据的复杂关系，导致欠拟合。","mnemonic":"判断欠拟合要综合：训练误差+验证误差+测试误差+模型复杂度，全选ABCD"},{"id":476,"type":"multi","text":"关于 RFM 模型的定义，下列说法错误的是（）。","options":[{"label":"A","text":"RFM模型是一种针对客户价值的分析方法"},{"label":"B","text":"RFM模型是一种用于评估产品质量的方法"},{"label":"C","text":"RFM模型是一种用于计算投资回报率的方法"},{"label":"D","text":"RFM模型是一种用于评估市场份额的方法"}],"answer":"B,C,D","explanation":"RFM模型是一种基于客户价值的分析方法，通过对客户的消费行为、购买习惯和交易历史进行分析，确定客户的价值并制定精细化的市场营销策略。","mnemonic":"RFM只分析客户价值，不评产品质量/投资回报/市场份额，选BCD"},{"id":477,"type":"multi","text":"下列哪项属于常见的神经网络层类型（）。","options":[{"label":"A","text":"卷积层"},{"label":"B","text":"循环层"},{"label":"C","text":"全连接层"},{"label":"D","text":"池化层"}],"answer":"A,B,C,D","explanation":"卷积层用于处理图像等二维数据，循环层用于处理时间序列等序列数据，全连接层是最基本的神经网络层。池化层通常在卷积神经网络中与卷积层一起使用，用于降低特征图的维度。","mnemonic":"神经网络层：卷积+循环+全连接+池化，全选ABCD"},{"id":478,"type":"multi","text":"下列哪一选项属于初次接触系统的新手用户所具备的特征？（）","options":[{"label":"A","text":"对系统不熟悉"},{"label":"B","text":"需要系统提供详细的操作指南"},{"label":"C","text":"容易犯错"},{"label":"D","text":"能够独立使用系统"}],"answer":"A,B,C","explanation":"新手用户是指初次接触该系统的用户。他们对系统不熟悉，需要系统提供详细的操作指南，以便能够快速了解系统的功能和使用方法。由于对系统不熟悉，他们容易犯错，需要系统提供尽可能多、尽可能详尽的信息和指导，以便能够一步一步地操作。由于刚刚接触该系统，他们往往需要帮助和指导，所以不能独立使用系统。","mnemonic":"新手用户：不熟悉+需指南+易犯错，不能独立使用，选ABC"},{"id":479,"type":"multi","text":"以下选项中，不在 PEST 模型所界定的范围之内的是（）。","options":[{"label":"A","text":"分析企业的生产过程和经营管理的各个方面"},{"label":"B","text":"分析企业外部环境的政治、经济、社会和技术方面"},{"label":"C","text":"分析企业与供应商、顾客和竞争对手之间的关系"},{"label":"D","text":"分析企业的人员组成和人力资源管理情况"}],"answer":"A,C,D","explanation":"PEST模型主要用于分析企业外部环境，包括政治、经济、社会和技术四个方面。","mnemonic":"PEST只分析外部政经社技，内部生产/供应链/人力不属于，选ACD"},{"id":480,"type":"multi","text":"下列关于人机交互发展阶段的说法，正确的是（）。","options":[{"label":"A","text":"第一代人机交互是采用命令行界面的方式进行交互，用户需要记住一些特定的命令来操作"},{"label":"B","text":"第二代人机交互是采用图形用户界面（GUI）的方式进行交互，使得使用者可以通过“指针”直接在屏幕上选择和操作"},{"label":"C","text":"第三代人机交互是基于自然语言和语音识别技术的交互方式，用户只需要说出想要做的事情，机器便能够理解并执行相应指令"},{"label":"D","text":"第三代人机交互已实现无需任何设备的全脑电波控制，用户可直接通过思维操作所有智能系统。"}],"answer":"A,B,C","explanation":"命令行界面（CLI）确实是第一代人机交互的核心特征，用户通过键盘输入命令与计算机交互。图形用户界面（GUI）是第二代人机交互的代表，允许用户通过鼠标、触摸屏等设备来选择、操作图标和菜单。第三代人机交互通常是基于自然语言处理（NLP）和语音识别技术，例如语音助手（如Siri、Alexa等）便采用这种交互方式，第三代交互仍需要有设备的接入来操作智能系统。","mnemonic":"人机交互三代：命令行→GUI→自然语言语音，全脑电波控制尚未实现，选ABC"},{"id":481,"type":"multi","text":"下列哪项方法能够有效减轻算法的过拟合问题（）。","options":[{"label":"A","text":"增加正则化项"},{"label":"B","text":"提高学习率"},{"label":"C","text":"增加训练数据集大小"},{"label":"D","text":"增加神经网络的层数"}],"answer":"A,C","explanation":"算法过拟合指的是模型过于复杂，导致在训练数据上表现很好，但在测试数据上表现较差。为减少过拟合，常用的方法包括：增加正则化项：正则化（如L1或L2正则化）通过在损失函数中加入惩罚项来限制模型的复杂度，防止模型对训练数据过拟合。提高学习率：提高学习率不会减少过拟合，反而可能导致训练过程不稳定，因此这不是有效的减少过拟合的方法。增加训练数据集大小：更多的训练数据有助于提高模型的泛化能力，从而减少对训练数据的过拟合。增加神经网络的层数：增加神经网络的层数会增加模型的复杂度，从而加剧过拟合的风险。","mnemonic":"减过拟合：正则化+加数据，提学习率加层数有害，选AC（同443）"},{"id":482,"type":"multi","text":"业务流程重组（BPR）的主要目标和特征包含以下哪几方面（）。","options":[{"label":"A","text":"以业务流程为改造对象和中心"},{"label":"B","text":"关注客户的需求和满意度"},{"label":"C","text":"对现有业务流程进行根本的再思考和彻底的再设计"},{"label":"D","text":"利用先进的制造技术、信息技术以及现代化的管理手段"}],"answer":"A,B,C,D","explanation":"业务流程重组（BPR）的主要目标和特征包括：以业务流程为改造对象和中心（A），关注客户的需求和满意度（B），对现有业务流程进行根本的再思考和彻底的再设计（C），利用先进的制造技术、信息技术以及现代化的管理手段（D）","mnemonic":"BPR目标特征全覆盖四项，全选ABCD（同425）"},{"id":483,"type":"multi","text":"在人机交互行为模型里，下列关于状态同步交互的说法正确的是？","options":[{"label":"A","text":"允许用户与系统共享实时状态信息"},{"label":"B","text":"系统通过传感器和通信技术动态更新用户状态"},{"label":"C","text":"状态变化会触发界面反馈"},{"label":"D","text":"必须依赖加锁机制保证状态一致性"}],"answer":"A,B,C","explanation":"共享状态交互中，两个或多个并发执行的行为可以共享状态变量，而状态变量可以被所有并发的行为访问。由于并发行为的执行顺序是不确定的，因此需要使用同步机制来保证访问共享状态变量的一致性，而加锁机制只是同步机制的一种。","mnemonic":"状态同步交互：共享状态+传感器更新+触发反馈，加锁只是同步方式之一，选ABC"},{"id":484,"type":"multi","text":"关于图像去噪算法，下列说法正确的是（）。","options":[{"label":"A","text":"任何情况下，中值滤波的去噪效果都要优于高斯滤波"},{"label":"B","text":"均值滤波以取均值的方式对每次滑动范围内的数值进行平滑操作，这种方法适用于轻微的噪声。"},{"label":"C","text":"中值滤波也是常用的一种滤波器，它将每个像素的值替换为周围像素的中值，这种方法适用于更强烈的噪声。"},{"label":"D","text":"高斯滤波则采用了高斯函数对数字图像进行滤波操作，它可以更好地保留图像的边缘信息，但也可能会使图像变得模糊。"}],"answer":"B,C,D","explanation":"中值滤波和高斯滤波在去噪效果上是有差异的，而且这种差异与具体的场景和噪声特征有关。均值滤波以取均值的方式对每次滑动范围内的数值进行平滑操作，这种方法适用于轻微的噪声。中值滤波也是常用的一种滤波器，它将每个像素的值替换为周围像素的中值，这种方法适用于更强烈的噪声。高斯滤波则采用了高斯函数对数字图像进行滤波操作，它可以更好地保留图像的边缘信息，但也可能会使图像变得模糊。","mnemonic":"去噪没有\"任何情况都优于\"的说法，A绝对化错误，选BCD"},{"id":485,"type":"multi","text":"制定文本数据处理流程的步骤有哪些（）。","options":[{"label":"A","text":"数据预处理"},{"label":"B","text":"特征工程"},{"label":"C","text":"模型训练"},{"label":"D","text":"模型预测"}],"answer":"A,B,C,D","explanation":"文本数据处理流程制定一般包括数据预处理、特征工程、模型训练和模型预测四个步骤，每个步骤都是必要的。","mnemonic":"文本处理流程四步全要：预处理+特征工程+训练+预测，全选ABCD"},{"id":486,"type":"multi","text":"通过傅里叶变换及其反变换，能够求得（）。","options":[{"label":"A","text":"傅里叶谱"},{"label":"B","text":"自相关函数"},{"label":"C","text":"功率谱"},{"label":"D","text":"倒谱"}],"answer":"A,B,C,D","explanation":"傅里叶频谱分析的基础是傅里叶变换，用傅里叶变换及其反变换可以求得傅里叶谱、自相关函数、功率谱、倒谱。","mnemonic":"傅里叶变换可求：傅里叶谱+自相关+功率谱+倒谱，全选ABCD"},{"id":487,"type":"multi","text":"在（）方面可以体现职业道德的功能。","options":[{"label":"A","text":"促进行业健康发展"},{"label":"B","text":"增进职业信誉和声誉"},{"label":"C","text":"提高职业人员的社会地位和待遇"},{"label":"D","text":"调节职业交往中从业人员内部以及从业人员与服务对象间的关系"}],"answer":"A,B,D","explanation":"提高职业人员的社会地位和待遇并非职业道德的直接功能。虽然良好的职业道德可能在一定程度上提升职业的社会认可度，但社会地位和待遇更多地受到经济、社会等多种因素的影响。","mnemonic":"职业道德功能：促进行业+增信誉+调节关系，不直接提升地位待遇，选ABD"},{"id":488,"type":"multi","text":"支持向量机算法的主要优势有（）。","options":[{"label":"A","text":"在高维空间中有效处理数据"},{"label":"B","text":"可处理非线性分类问题"},{"label":"C","text":"对小样本数据表现良好"},{"label":"D","text":"计算速度快"}],"answer":"A,B,C","explanation":"支持向量机的优点之一是能够通过核函数有效地处理高维数据，并能够应对非线性分类问题。对于小样本数据，SVM通常能够表现良好，因为它通过最大化类别之间的间隔来训练模型，通常具有较强的泛化能力，尤其在训练样本较少的情况下。然而，SVM的计算速度相对较慢，尤其在数据量大或维度高时，训练时间通常较长。使用非线性核时，计算复杂度会显著增加。","mnemonic":"SVM优势：高维有效+非线性+小样本好，但计算速度慢，选ABC"},{"id":489,"type":"multi","text":"K - 近邻算法中，选择 K 值的方法有哪些（）。","options":[{"label":"A","text":"网格搜索"},{"label":"B","text":"交叉验证"},{"label":"C","text":"奇偶划分"},{"label":"D","text":"最小误差法"}],"answer":"A,B","explanation":"选择K值是K-近邻算法中的重要步骤，常用的方法包括网格搜索和交叉验证。奇偶划分和最小误差法与K-近邻算法的K值选择无关。","mnemonic":"KNN选K值：网格搜索+交叉验证，奇偶划分和最小误差法无关，选AB"},{"id":490,"type":"multi","text":"下列对支持向量机的描述，正确的是（）。","options":[{"label":"A","text":"支持向量机通过寻找一个超平面来分隔不同类别的样本"},{"label":"B","text":"支持向量机的优化目标是最小化训练误差"},{"label":"C","text":"核函数用于将非线性可分问题映射到高维空间，使其在高维空间中变得线性可分"},{"label":"D","text":"支持向量机的训练过程可以通过拉格朗日乘子法来求解最优超平面"}],"answer":"A,C,D","explanation":"A选项正确。支持向量机的核心原理就是通过寻找一个最优的超平面，最大化间隔来分隔不同类别的样本。B选项错误。支持向量机的优化目标并不是最小化训练误差，而是最大化类别间的边界间隔（即分类间隔）。这与其他算法（如逻辑回归）的目标有所不同。C选项正确。核函数的作用是将原始数据映射到高维空间，使得在高维空间中可以找到一个线性超平面进行分类，解决了非线性可分的问题。D选项正确。支持向量机的训练过程中，确实是通过拉格朗日乘子法来求解最优超平面，并通过求解相应的优化问题来找到支持向量。","mnemonic":"SVM：找超平面+核函数映射高维+拉格朗日求解，目标是最大化间隔非最小化误差，选ACD"},{"id":491,"type":"multi","text":"在选择 ETL 数据整合工具时，需要考虑的特性有（）。","options":[{"label":"A","text":"数据源和目标系统的兼容性"},{"label":"B","text":"数据转换能力"},{"label":"C","text":"工具的颜色主题"},{"label":"D","text":"良好的集成性和开放性"}],"answer":"A,B,D","explanation":"在选择ETL数据整合工具时，需要考虑的关键特性包括数据源和目标系统的兼容性，以确保工具能够连接到各种数据源并加载到目标系统；强大的数据转换能力，用于处理复杂的数据清洗、映射和聚合逻辑；以及良好的集成性和开放性，以便工具能够与其他系统无缝集成并支持扩展。相比之下，工具的颜色主题对ETL工具的功能和性能并无实质性影响，不应作为主要考量因素。","mnemonic":"选ETL工具看：兼容性+转换能力+集成开放性，颜色主题无关，选ABD"},{"id":492,"type":"multi","text":"中文分词所采用的方法包括（）。","options":[{"label":"A","text":"词典匹配"},{"label":"B","text":"基于深度学习的分词方法"},{"label":"C","text":"基于规则的分词方法"},{"label":"D","text":"统计分析方法"}],"answer":"A,B,C,D","explanation":"中文分词的主要方法包括：词典匹配（通过预定义词典进行切分，常见算法FMM、BMM和双向匹配）、基于深度学习的分词方法（例如BiLSTM-CRF）、基于规则的分词方法和统计分析方法（常用模型包括隐马尔可夫模型（HMM）、条件随机场（CRF）和N-gram语言模型）。","mnemonic":"中文分词四法全有：词典匹配+深度学习+规则+统计，全选ABCD"},{"id":493,"type":"multi","text":"根据《中华人民共和国专利法》，下列哪项行为构成对专利权的侵权（）。","options":[{"label":"A","text":"未经专利权人许可，制造、销售专利产品"},{"label":"B","text":"未经专利权人许可以营利为目的使用其专利产品"},{"label":"C","text":"未经专利权人许可，将专利产品直接引入境外销售"},{"label":"D","text":"使用他人的专利进行科学研究和实验"}],"answer":"A,B,C","explanation":"根据《中华人民共和国专利法》第十一条相关规定，发明和实用新型专利权被授予后，除本法另有规定的以外，任何单位或者个人未经专利权人许可，都不得实施其专利，即不得为生产经营目的制造、使用、许诺销售、销售、进口其专利产品，或者使用其专利方法以及使用、许诺销售、销售、进口依照该专利方法直接获得的产品。","mnemonic":"专利侵权：未授权制造销售+营利使用+境外销售，科研实验不侵权，选ABC"},{"id":494,"type":"multi","text":"在图像增强的处理流程中，能够提高图像对比度的方法是（）。","options":[{"label":"A","text":"直方图均衡化"},{"label":"B","text":"灰度拉伸"},{"label":"C","text":"反相处理"},{"label":"D","text":"通道分离"}],"answer":"A,B","explanation":"直方图均衡化和灰度拉伸都是常用的图像增强方法，可以有效地提高图像的对比度。直方图均衡化通过调整图像亮度分布，使得图像中的各个像素值出现的频率尽可能均匀，从而提高图像的对比度；灰度拉伸则是通过调整图像中像素值的范围，将像素值拉伸到更广的范围内，以增强图像的视觉效果。","mnemonic":"提高对比度：直方图均衡化+灰度拉伸，反相和通道分离不提升对比度，选AB"},{"id":495,"type":"multi","text":"关联分析的方法能够应用在以下哪些（）领域。","options":[{"label":"A","text":"市场营销"},{"label":"B","text":"医疗保健"},{"label":"C","text":"社交网络"},{"label":"D","text":"手写文字识别"}],"answer":"A,B,C","explanation":"关联分析的方法可以用于分析大量数据中的关联关系，关联分析在市场营销中广泛应用，例如通过购物篮分析发现顾客经常一起购买的商品组合，从而优化商品陈列、设计促销策略等。在医疗保健领域，关联分析可以用于发现疾病与症状之间的关联、药物与副作用之间的关系等，辅助医生进行诊断和治疗决策。关联分析可用于分析社交网络中的用户关系和互动模式。手写文字识别主要涉及图像处理和模式识别技术，与关联分析的方法和目标不同。","mnemonic":"关联分析应用：营销+医疗+社交网络，手写识别是图像识别，选ABC"},{"id":496,"type":"multi","text":"下列排序算法中，时间复杂度为 O (nlogn) 且不一定属于稳定排序算法的是（）。","options":[{"label":"A","text":"堆排序"},{"label":"B","text":"归并排序"},{"label":"C","text":"希尔排序"},{"label":"D","text":"平均情况下的快速排序"}],"answer":"A,D","explanation":"堆排序（A）：堆排序的时间复杂度是 O(nlogn)，它通过建立最大堆（或最小堆）来进行排序，涉及多次交换操作。由于堆排序过程中可能改变相等元素的顺序，所以它是不稳定的排序算法。归并排序（B）：归并排序的时间复杂度是 O(nlogn)，并且它是一个稳定排序算法。归并排序采用分治法，将数组分成小块并递归排序，然后在合并阶段保持相等元素的相对顺序，因此它是稳定的。希尔排序（C）：希尔排序的时间复杂度通常不是 O(nlogn)，而是接近 O(n²)，具体取决于步长序列。希尔排序的插入排序阶段可能会打乱相等元素的顺序，因此它不是稳定排序。快速排序（D）：快速排序的平均时间复杂度为 O(nlogn)，它通过递归划分数组和交换元素来排序。由于交换操作可能会改变相等元素的顺序，快速排序不是稳定排序。","mnemonic":"O(nlogn)且不稳定：堆排序+快速排序，归并稳定希尔非nlogn，选AD"},{"id":497,"type":"multi","text":"属于人机交互范畴内的用户类别包括（）。","options":[{"label":"A","text":"专家型用户"},{"label":"B","text":"熟练型用户"},{"label":"C","text":"生疏型用户"},{"label":"D","text":"偶然型用户"}],"answer":"A,B,C,D","explanation":"在标准的人机交互分类中，用户通常被分为专家型用户、熟练型用户、生疏型用户（或称为新手用户）和偶然型用户。这些分类反映了用户的熟练程度和使用产品的频率。","mnemonic":"用户四类：专家+熟练+生疏+偶然，全选ABCD"},{"id":498,"type":"multi","text":"K - 近邻算法（K-NearestNeighbors）可应用在（）。","options":[{"label":"A","text":"分类任务"},{"label":"B","text":"回归任务"},{"label":"C","text":"聚类任务"},{"label":"D","text":"特征选择任务"}],"answer":"A,B","explanation":"K-近邻算法可以应用于分类任务和回归任务。在分类任务中，K-近邻算法基于训练样本的标签信息，通过计算样本之间的距离来确定样本的类别。在回归任务中，K-近邻算法通过计算最近邻样本的平均值或加权平均值来进行连续值的预测。K-近邻算法并不适用于聚类任务和特征选择任务。","mnemonic":"KNN可用于分类和回归，不适用聚类和特征选择，选AB"},{"id":499,"type":"multi","text":"趋势分析法的具体定义是（）。","options":[{"label":"A","text":"一种预测方法"},{"label":"B","text":"对历史数据进行分析"},{"label":"C","text":"描述变量的变化趋势"},{"label":"D","text":"基于概率论的方法"}],"answer":"A,B,C","explanation":"趋势分析法是一种预测方法，它对历史数据进行分析，描述变量的变化趋势。","mnemonic":"趋势分析法：预测方法+分析历史+描述趋势，非概率论方法，选ABC"},{"id":500,"type":"multi","text":"在中级培训中，智能系统运维所涵盖的知识点有哪些？（）","options":[{"label":"A","text":"智能应用方法"},{"label":"B","text":"数据整理方法"},{"label":"C","text":"标注工具使用方法"},{"label":"D","text":"数据分析基础方法"}],"answer":"A,D","explanation":"在中级培训中，智能系统运维涉及到的知识点包括智能应用方法、数据分析基础方法。","mnemonic":"中级培训智能系统运维：智能应用方法+数据分析基础方法，选AD"},{"id":501,"type":"multi","text":"企业在开展业务流程优化工作时，需纳入考量的因素有哪些（）。","options":[{"label":"A","text":"国内外成功的企业管理经验"},{"label":"B","text":"企业的业务特点"},{"label":"C","text":"企业的战略定位及战略思想"},{"label":"D","text":"企业的财务报表格式"}],"answer":"A,B,C","explanation":"企业在优化业务流程时，需要借鉴国内外成功的企业管理经验（A），结合自身的业务特点（B），并考虑企业的战略定位及战略思想（C）。财务报表格式（D）虽然重要，但不是业务流程优化的核心因素。","mnemonic":"选ABC，业务流程优化看经验、特点、战略，D财务报表格式是摆设"},{"id":502,"type":"multi","text":"Web 界面设计所遵循的设计原则包含（）。","options":[{"label":"A","text":"简洁"},{"label":"B","text":"直观"},{"label":"C","text":"一致性"},{"label":"D","text":"响应式设计"}],"answer":"A,B,C","explanation":"Web界面设计的主要目标是提供用户友好的界面，简洁、直观和一致性都是Web界面设计中不可或缺的重要原则，响应式设计是一种技术手段，用于确保Web页面在不同设备上都能正常显示和交互，虽然响应式设计是Web开发的关键技术之一，但它并非设计原则。","mnemonic":"选ABC，Web设计原则\"简直一\"（简洁直观一致性），响应式是技术不是原则"},{"id":503,"type":"multi","text":"智慧医疗所发挥的作用包含以下哪项？","options":[{"label":"A","text":"改善医疗服务"},{"label":"B","text":"提高医疗资源利用效率"},{"label":"C","text":"提升患者护理质量"},{"label":"D","text":"延缓治疗速度"}],"answer":"A,B,C","explanation":"智慧医疗的作用包括改善医疗服务、提高医疗资源利用效率、提升患者护理质量。","mnemonic":"选ABC，智慧医疗改善效率提质量，D延缓治疗是反作用"},{"id":504,"type":"multi","text":"下列属于 Kettle 所具备的特点的有（）。","options":[{"label":"A","text":"开源软件"},{"label":"B","text":"图形化操作"},{"label":"C","text":"数据备份和恢复"},{"label":"D","text":"数据可视化和报表"}],"answer":"A,B","explanation":"作为广受用户欢迎的ETL工具，Kettle具有以下特点。开源软件，可以在多个常用的操作系统下运行。图形化操作，使用十分简单与方便。支持多种常用数据库和文件的数据格式，适应范围广。具有完整的工作流控制，能够较好地控制复杂的数据转换工作。提供定时调度功能，方便用户及时处理数据。","mnemonic":"选AB，Kettle两大特点：开源+图形化，CD数据备份和可视化不是它的活"},{"id":505,"type":"multi","text":"中级知识体系所涵盖的模块有哪几项（）。","options":[{"label":"A","text":"excel操作"},{"label":"B","text":"数据标注"},{"label":"C","text":"数据采集和处理"},{"label":"D","text":"智能系统运维"}],"answer":"B,C,D","explanation":"中级知识体系包含数据标注、数据采集和处理、智能系统运维等模块。","mnemonic":"选BCD，中级体系\"标采运\"（标注采集运维），A的excel太初级"},{"id":506,"type":"multi","text":"智慧农业解决方案的主要目标是什么？","options":[{"label":"A","text":"提高农业生产效率"},{"label":"B","text":"实现农业资源的高效利用和可持续发展"},{"label":"C","text":"提供优质、安全的农产品"},{"label":"D","text":"促进农村经济的发展和农民的福利提升"}],"answer":"A,B,C,D","explanation":"智慧农业解决方案的主要目的是提高农业生产效率、实现农业资源的高效利用和可持续发展、提供优质、安全的农产品、促进农村经济的发展和农民的福利提升。","mnemonic":"全选ABCD，智慧农业目标全面：效率+资源+安全+经济福利"},{"id":507,"type":"multi","text":"勤勉好学的基本要求主要有哪些（）。","options":[{"label":"A","text":"持久学习的态度和意愿"},{"label":"B","text":"主动寻求知识和学习机会"},{"label":"C","text":"保持谦虚和开放的心态"},{"label":"D","text":"忽视反馈和批评的态度"}],"answer":"A,B,C","explanation":"勤勉好学的基本要求包括持久学习的态度和意愿、主动寻求知识和学习机会，以及保持谦虚和开放的心态。忽视反馈和批评的态度与勤勉好学相悖。","mnemonic":"选ABC，勤勉好学要持久主动谦虚，D忽视反馈恰好相反"},{"id":508,"type":"multi","text":"下列哪项属于较为常见的资源服务器（）。","options":[{"label":"A","text":"DNS服务器"},{"label":"B","text":"E-mail服务器"},{"label":"C","text":"Web服务器"},{"label":"D","text":"相控阵雷达"}],"answer":"A,B,C","explanation":"常见的资源服务器有DNS（域名解析）服务器、E-mail（电子邮件）服务器、Web（网页）服务器等。","mnemonic":"选ABC，常见资源服务器DNS/Email/Web，D雷达是军事设备不是服务器"},{"id":509,"type":"multi","text":"业务流程优化具体指的是什么（）。","options":[{"label":"A","text":"以提升企业绩效为目标"},{"label":"B","text":"对现有的业务流程进行分析、梳理，对其中存在的问题进行完善、改进"},{"label":"C","text":"增强部门间的横向协作，提升企业运作效率"},{"label":"D","text":"降低企业运营成本，增强企业的竞争力"}],"answer":"A,B,C,D","explanation":"业务流程优化指的是以提升企业绩效为目标，对现有的业务流程进行分析、梳理，对其中存在的问题进行完善、改进，实现部门间的无障碍沟通，增强部门间的横向协作，提升企业运作效率，降低企业运营成本，增强企业的竞争力。","mnemonic":"全选ABCD，业务流程优化四要素：绩效目标+分析改进+横向协作+降本增效"},{"id":510,"type":"multi","text":"为了应对 ETL 任务调度中的复杂挑战，调度系统或许会引入哪些内容（）。","options":[{"label":"A","text":"任务按类别划分"},{"label":"B","text":"设置任务优先级"},{"label":"C","text":"定义任务的运行开始时间要求"},{"label":"D","text":"限制任务的资源（如CPU、内存）"}],"answer":"A,B,C,D","explanation":"实际的生产环境中，调度的逻辑会比这里的伪代码复杂得多，但是究其本质，无外乎这几行逻辑。为了满足复杂的业务需求，以及不断膨胀的ETL任务列表，以及有限的资源，会在调度的基础逻辑上增加很多的策略，比如ETL任务的类别、按照优先级调度、运行开始时间要求、任务的资源限制等。","mnemonic":"全选ABCD，ETL调度策略\"类优时资\"：分类、优先级、开始时间、资源限制"},{"id":511,"type":"multi","text":"下列关于《中华人民共和国劳动合同法》中关于劳动合同签订的规定，说法正确的是（）。","options":[{"label":"A","text":"已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同"},{"label":"B","text":"用人单位与劳动者在用工前订立劳动合同的，劳动关系自用工之日起建立"},{"label":"C","text":"劳动期限分为固定期限和无固定期限两种形式"},{"label":"D","text":"固定期限劳动合同，是指用人单位与劳动者约定合同终止时间的劳动合同"}],"answer":"A,B,D","explanation":"根据《中华人民共和国劳动合同法》第十条规定，建立劳动关系，应当订立书面劳动合同。已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同。用人单位与劳动者在用工前订立劳动合同的，劳动关系自用工之日起建立。第十二条规定，劳动合同分为固定期限劳动合同、无固定期限劳动合同和以完成一定工作任务为期限的劳动合同。第十三条规定，固定期限劳动合同，是指用人单位与劳动者约定合同终止时间的劳动合同。","mnemonic":"选ABD，劳动合同期限分三种（固定/无固定/完成任务），C说两种漏了一种"},{"id":512,"type":"multi","text":"根据《中华人民共和国劳动法》，劳动合同的期限被划分为哪些类型（）。","options":[{"label":"A","text":"3年"},{"label":"B","text":"有固定期限"},{"label":"C","text":"无固定期限"},{"label":"D","text":"以完成一定的工作为期限"}],"answer":"B,C,D","explanation":"根据《中华人民共和国劳动法》第二十条规定，劳动合同的期限分为有固定期限、无固定期限和以完成一定的工作为期限。劳动者在同一用人单位连续工作满十年以上，当事人双方同意续延劳动合同的，如果劳动者提出订立无固定期限的劳动合同，应当订立无固定期限的劳动合同。","mnemonic":"选BCD，劳动合同期限三类型：有固定/无固定/完成任务，A的3年是具体年限不是类型"},{"id":513,"type":"multi","text":"属于图像去噪的传统算法有哪些（）。","options":[{"label":"A","text":"基于滤波器的方法"},{"label":"B","text":"小波变换方法"},{"label":"C","text":"基于稀疏表示的方法"},{"label":"D","text":"基于统计学习的方法"}],"answer":"A,B,C,D","explanation":"图像去噪的传统算法主要包括基于滤波器的方法、小波变换方法、基于稀疏表示的方法和基于统计学习的方法。","mnemonic":"全选ABCD，图像去噪传统算法四种：滤波器+小波+稀疏表示+统计学习"},{"id":514,"type":"multi","text":"象限分析法的应用范围主要包括（）。","options":[{"label":"A","text":"市场分析"},{"label":"B","text":"产品分析"},{"label":"C","text":"客户管理"},{"label":"D","text":"艺术创作"}],"answer":"A,B,C","explanation":"象限分析法是指以两个或多个维度为坐标并划分出不同象限，不同象限表示不同的价值导向。象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等。","mnemonic":"选ABC，象限分析用于市场产品客户管理，D艺术创作不属于策略分析"},{"id":515,"type":"multi","text":"象限分析法具有哪些特点（）。","options":[{"label":"A","text":"以两个或多个维度为坐标划分象限"},{"label":"B","text":"仅限于财务数据分析"},{"label":"C","text":"不同象限表示不同的价值导向"},{"label":"D","text":"是一种策略驱动思维"}],"answer":"A,C,D","explanation":"象限分析法是指以两个或多个维度为坐标并划分出不同象限，不同象限表示不同的价值导向。象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等。","mnemonic":"选ACD，象限分析\"多维划象限+价值导向+策略驱动\"，B仅限财务是错误限制"},{"id":516,"type":"multi","text":"计算机硬件系统中的外部设备包含哪些（）。","options":[{"label":"A","text":"外存储器"},{"label":"B","text":"中央处理器"},{"label":"C","text":"输入设备"},{"label":"D","text":"输出设备"}],"answer":"A,C,D","explanation":"计算机硬件系统的外部设备简称“外设”，是计算机系统中输入、输出设备、外存储器的统称。内存储器和中央处理器属于硬件系统的主机。","mnemonic":"选ACD，外部设备=外存+输入+输出，B中央处理器属于主机内部"},{"id":517,"type":"multi","text":"计算机在标准办公处理方面的主要应用有哪些（）。","options":[{"label":"A","text":"电子邮件"},{"label":"B","text":"电子表格"},{"label":"C","text":"文字处理"},{"label":"D","text":"音频处理"}],"answer":"A,B,C","explanation":"计算机在办公处理中的主要应用包括电子邮件、电子表格、文字处理、演示文稿、图像处理等。D项是多媒体处理中的应用，需借助专业软件（如Audacity），通常不纳入标准办公处理范畴。","mnemonic":"选ABC，标准办公处理：邮件+表格+文字，D音频属于多媒体专业处理"},{"id":518,"type":"multi","text":"UAN 模型具有哪些特点？（）","options":[{"label":"A","text":"UAN模型通过符号语言表达用户的行为序列及界面状态变化。"},{"label":"B","text":"UAN模型强调通过图形化方式来展示用户行为，减少文字描述。"},{"label":"C","text":"UAN模型可以清晰表示任务中的条件控制、动作序列以及界面状态反馈。"},{"label":"D","text":"UAN模型适用于界面设计中用户行为的建模"}],"answer":"A,C,D","explanation":"选项A是正确的，UAN模型通过符号语言来表达用户行为、界面状态变化和交互逻辑，这是它的核心特点。选项B是错误的，UAN模型并非通过图形化方式，而是通过符号语言来表达用户行为，注重简洁的符号描述。选项C是正确的，UAN模型通过符号化的方式可以清晰表达条件控制、动作序列以及界面的状态反馈，适合任务建模。选项D是正确的，UAN适合建模用户行为。","mnemonic":"选ACD，UAN用符号语言建模用户行为，B说图形化方式是错的"},{"id":519,"type":"multi","text":"在数据整合时，ETL（抽取、转换、加载）工具所起到的作用是（）。","options":[{"label":"A","text":"提取数据"},{"label":"B","text":"转换数据格式和结构"},{"label":"C","text":"加载数据到目标系统"},{"label":"D","text":"进行数据分析"}],"answer":"A,B,C","explanation":"ETL工具用于从不同数据源中提取数据，对提取到的数据进行转换数据格式和结构，并将其加载到目标系统或数据仓库中。数据分析通常是在数据整合之后进行的操作。","mnemonic":"选ABC，ETL就是Extract抽取+Transform转换+Load加载，D数据分析是后续步骤"},{"id":520,"type":"multi","text":"根据《中华人民共和国劳动法》，劳动合同的期限被划分为哪些类型（）。","options":[{"label":"A","text":"3年"},{"label":"B","text":"有固定期限"},{"label":"C","text":"无固定期限"},{"label":"D","text":"以完成一定的工作为期限"}],"answer":"B,C,D","explanation":"根据《中华人民共和国劳动法》第二十条规定，劳动合同的期限分为有固定期限、无固定期限和以完成一定的工作为期限。劳动者在同一用人单位连续工作满十年以上，当事人双方同意续延劳动合同的，如果劳动者提出订立无固定期限的劳动合同，应当订立无固定期限的劳动合同。","mnemonic":"选BCD，劳动合同期限三类型：有固定/无固定/完成任务，A的3年不是类型"},{"id":521,"type":"multi","text":"关于分类模型评估指标，下列说法正确的是（）。","options":[{"label":"A","text":"精确率（Precision）是最重要的衡量指标"},{"label":"B","text":"精确率（Precision）越高，召回率（Recall）越低的情况属于好的模型"},{"label":"C","text":"F1值是综合考虑精确率（Precision）和召回率（Recall）的指标"},{"label":"D","text":"ROC曲线上的每个点都反映了模型的敏感性"}],"answer":"C,D","explanation":"精确率（Precision）并不总是最重要的衡量指标，在不同的应用场景中，需要根据实际需求选择最能体现模型效果的指标；精确率和召回率（Recall）是以模型预测结果为基础的，二者往往是矛盾的，因此需要在二者之间取得平衡；F1值是综合考虑精确率和召回率的指标，更能全面地反应模型性能；ROC曲线可以用于比较多个分类模型的性能，曲线上的每个点都反映了模型的敏感性。","mnemonic":"选CD，F1值综合精确率召回率，ROC反映敏感性；A精确率未必最重要，B矛盾不等于好"},{"id":522,"type":"multi","text":"下列哪项属于语音数据处理的流程（）。","options":[{"label":"A","text":"分帧加窗"},{"label":"B","text":"短时傅里叶变换(STFT)"},{"label":"C","text":"梅尔滤波器组(MelFilter Banks)"},{"label":"D","text":"离散余弦变换(DCT)"}],"answer":"A,B,C,D","explanation":"语音数据处理的流程有：输入语音、分帧加窗、短时傅里叶变换(STFT)、梅尔滤波器组(MelFilter Banks)、梅尔频谱特征、离散余弦变换(DCT)、梅尔频率倒谱系数(MFCC)","mnemonic":"全选ABCD，语音处理流程口诀\"分傅梅离\"：分帧加窗→STFT→梅尔滤波→DCT"},{"id":523,"type":"multi","text":"《中华人民共和国网络安全法》要求，网络运营者从事经营和服务活动，必须做到（）。","options":[{"label":"A","text":"遵守法律、行政法规"},{"label":"B","text":"行使保护网络安全保护权利"},{"label":"C","text":"尊重社会公德，遵守商业道德"},{"label":"D","text":"接受政府和社会的监督"}],"answer":"A,C,D","explanation":"《中华人民共和国网络安全法》第九条规定网络运营者开展经营和服务活动，必须遵守法律、行政法规，尊重社会公德，遵守商业道德，诚实信用，履行网络安全保护义务，接受政府和社会的监督，承担社会责任。","mnemonic":"选ACD，网络运营者须守法守德受监督，B\"行使权利\"说法不对，应是\"履行义务\""},{"id":524,"type":"multi","text":"在决策树算法构建模型的过程中，为降低过拟合可能性而进行的操作是（）。","options":[{"label":"A","text":"剪枝"},{"label":"B","text":"增加深度"},{"label":"C","text":"减小叶子节点的数量"},{"label":"D","text":"不进行特征选择"}],"answer":"A,C","explanation":"决策树算法容易出现过拟合的问题，为了减少过拟合的风险，可以采取剪枝以及减小叶子节点的数量等措施。增加深度通常会使决策树更复杂，从而容易发生过拟合。特征选择是决策树算法的重要步骤之一，不进行特征选择可能导致决策树过于复杂，从而增加过拟合的风险。","mnemonic":"选AC，决策树防过拟合靠\"剪枝+减叶\"，B增加深度反而加重过拟合"},{"id":525,"type":"multi","text":"关于文本向量化模型的应用，下列说法正确的是（）。","options":[{"label":"A","text":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式"},{"label":"B","text":"常见的文本向量化模型有TF-IDF、Word2Vec、BOW等"},{"label":"C","text":"文本向量化只适用于英文文本"},{"label":"D","text":"文本向量化可用于文本分类、情感分析等任务"}],"answer":"A,B,D","explanation":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式，是自然语言处理中必不可少的一环，可用于文本分类、情感分析等任务。常见的文本向量化模型有TF-IDF、Word2Vec、BOW等，而且这些模型并不仅限于英文文本。","mnemonic":"选ABD，文本向量化转数字用于分类情感分析，C说只适用英文是错的"},{"id":526,"type":"multi","text":"在进行留出法划分时，需要注意（）问题。","options":[{"label":"A","text":"训练集和测试集的比例应该合理"},{"label":"B","text":"划分时应考虑数据集的特性"},{"label":"C","text":"在大多数情况下，划分时应随机选择样本"},{"label":"D","text":"划分时应确保训练集和测试集之间没有重叠"}],"answer":"A,B,C,D","explanation":"进行留出法划分时，需要考虑训练集和测试集的比例是否合理、数据集的特性、是否随机选择样本以及是否确保训练集和测试集之间没有重叠。在大多数情况下，留出法划分会随机选择样本，但对于时间序列数据等特殊情况，可能需要按顺序划分。","mnemonic":"全选ABCD，留出法四注意：比例合理+考虑特性+随机选样+无重叠"},{"id":527,"type":"multi","text":"下列选项中，属于非关系型数据库类型的有（）。","options":[{"label":"A","text":"MongoDB"},{"label":"B","text":"Redis"},{"label":"C","text":"PostgreSQL"},{"label":"D","text":"HBase"}],"answer":"A,B,D","explanation":"MongoDB、Redis、HBase都属于非关系型数据库，而PostgreSQL属于关系型数据库。","mnemonic":"选ABD，非关系型数据库\"MRH\"（MongoDB/Redis/HBase），C的PostgreSQL是关系型"},{"id":528,"type":"multi","text":"下列哪项技术不能用于图像处理中的图像增强（）。","options":[{"label":"A","text":"傅里叶变换"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"边缘检测"},{"label":"D","text":"图像压缩"}],"answer":"A,C,D","explanation":"均值滤波/中值滤波和直方图均衡化，它们是图像增强最强大工具，图像增强的目的是提高图像的质量或使特定的特征显得更加突出。","mnemonic":"选ACD，图像增强只有B直方图均衡化，傅里叶/边缘检测/压缩都不是增强"},{"id":529,"type":"multi","text":"以下哪项属于业务数据处理流程中的数据预处理阶段（）。","options":[{"label":"A","text":"数据挖掘"},{"label":"B","text":"数据清洗"},{"label":"C","text":"数据转换"},{"label":"D","text":"数据建模"}],"answer":"B,C","explanation":"数据预处理是指对数据进行数据合并、数据清洗、数据标准化和数据变换等操作，并将数据用于数据分析与建模的过程。","mnemonic":"选BC，数据预处理阶段做\"清洗+转换\"，AD的挖掘和建模是后续分析阶段"},{"id":530,"type":"multi","text":"在选择 ETL 数据整合工具时，需要考虑的特性有（）。","options":[{"label":"A","text":"数据源和目标系统的兼容性"},{"label":"B","text":"数据转换能力"},{"label":"C","text":"工具的颜色主题"},{"label":"D","text":"良好的集成性和开放性"}],"answer":"A,B,D","explanation":"在选择ETL数据整合工具时，需要考虑的关键特性包括数据源和目标系统的兼容性，以确保工具能够连接到各种数据源并加载到目标系统；强大的数据转换能力，用于处理复杂的数据清洗、映射和聚合逻辑；以及良好的集成性和开放性，以便工具能够与其他系统无缝集成并支持扩展。相比之下，工具的颜色主题对ETL工具的功能和性能并无实质性影响，不应作为主要考量因素。","mnemonic":"选ABD，选ETL工具看兼容性+转换能力+集成开放性，C颜色主题纯属无关"},{"id":531,"type":"multi","text":"下列哪项属于典型的 NoSQL 类型（）。","options":[{"label":"A","text":"键值数据库"},{"label":"B","text":"列族数据库"},{"label":"C","text":"文档数据库"},{"label":"D","text":"图形数据库"}],"answer":"A,B,C,D","explanation":"典型的NoSQL数据库通常包括键值数据库、列族数据库、文档数据库和图形数据库。","mnemonic":"全选ABCD，NoSQL四大类型\"键列文图\"：键值/列族/文档/图形数据库"},{"id":532,"type":"multi","text":"人工智能训练师的中级知识体系需要具备（）等方面的内容。","options":[{"label":"A","text":"能够编写初级培训讲义"},{"label":"B","text":"能够通过数据分析，设计单 一场景下人工和智能交互的最优流程"},{"label":"C","text":"能够对业务数据采集流程提出优化建议"},{"label":"D","text":"能够完成对标注数据准确性和完整性审核"}],"answer":"C,D","explanation":"作为一名人工智能训练师，需要具备能够对业务数据采集流程提出优化建议、能够完成对标注数据准确性和完整性审核等中级知识体系。","mnemonic":"选CD，中级知识体系：优化采集流程+审核标注数据，AB属于高级或初级内容"},{"id":533,"type":"multi","text":"在初级培训知识点里，数据标注的培训内容包含哪一项（）。","options":[{"label":"A","text":"脚本标注"},{"label":"B","text":"文本标注"},{"label":"C","text":"语音标注"},{"label":"D","text":"视觉标注"}],"answer":"B,C,D","explanation":"文本标注、语音标注、视觉标注属于初级级培训知识点中数据标注的培训内容。","mnemonic":"选BCD，初级数据标注培训\"文语视\"（文本/语音/视觉），A脚本标注不在初级"},{"id":534,"type":"multi","text":"5W2H 模型能够应用于哪些分析场景（）。","options":[{"label":"A","text":"质量控制和工艺改进"},{"label":"B","text":"项目管理和规划"},{"label":"C","text":"事故或事件的根本原因分析"},{"label":"D","text":"营销策略制定"}],"answer":"A,B,C,D","explanation":"5W2H模型可以用于分析质量控制和工艺改进、项目管理和规划、事故或事件的根本原因分析、营销策略制定等场景。","mnemonic":"全选ABCD，5W2H万能分析法：质量+项目+根因+营销全覆盖"},{"id":535,"type":"multi","text":"可用于基于边缘的图像分割方法的算法是（）。","options":[{"label":"A","text":"K-Means聚类算法"},{"label":"B","text":"Canny算子"},{"label":"C","text":"LoG算子"},{"label":"D","text":"均值漂移算法"}],"answer":"B,C","explanation":"K-Means聚类算法是通过无监督学习基于像素特征对图像进行分割，但它并不依赖于图像的边缘信息。Canny算子是一种常用的边缘检测算法，用于检测图像中的边缘信息。LoG算子是由Marr提出的边缘检测算子，因此有时又被称为Marr算子。均值漂移算法是一种基于区域的分割方法，主要通过像素特征的密度估计来进行分割，而不是依赖于边缘信息。","mnemonic":"选BC，基于边缘的图像分割用Canny和LoG算子，AD是聚类和区域方法"},{"id":536,"type":"multi","text":"Windows Server 2008 的 NTFS 许可权限中，属于普通权限的有哪些（）。","options":[{"label":"A","text":"写入"},{"label":"B","text":"读取"},{"label":"C","text":"修噶"},{"label":"D","text":"删除文件"}],"answer":"A,B,C","explanation":"Windows Server 2008 的NTFS 的普通权限有读取、列出文件夹内容、写入、读并且执行、修改和完全控制。而删除文件属于特殊权限。","mnemonic":"选ABC，NTFS普通权限有读写改，D删除文件属于特殊权限"},{"id":537,"type":"multi","text":"使用 Word 插入表格的过程中，能够进行哪些设置（）。","options":[{"label":"A","text":"表格行数和列数"},{"label":"B","text":"单元格样式和边框线型"},{"label":"C","text":"自动调整表格固定列宽"},{"label":"D","text":"单元格内容的字体和字号"}],"answer":"A,C","explanation":"在Word中插入表格时，可以设置表格的行数和列数，自动调整表格的固定列宽，并没有设置单元格内容的字体、字号和单元格的样式、边框线型的操作。","mnemonic":"选AC，Word插入表格设置行列数和固定列宽，BD字体样式是插入后再设"},{"id":538,"type":"multi","text":"在回归模型中，下列哪项指标能够用于评估模型的准确性和性能（）。","options":[{"label":"A","text":"均方误差（MSE）"},{"label":"B","text":"平均绝对误差（MAE）"},{"label":"C","text":"决定系数（R-squared）"},{"label":"D","text":"对数损失（LogLoss）"}],"answer":"A,B,C","explanation":"均方误差（MSE）和平均绝对误差（MAE）可以分别用来评估预测值和真实值之间的距离。决定系数（R-squared）用来衡量模型对观测值的解释能力。而对数损失（LogLoss）则主要用于评估分类模型的概率输出质量，如逻辑回归等概率型分类模型。","mnemonic":"选ABC，回归模型评估用MSE/MAE/R方，D对数损失LogLoss用于分类模型"},{"id":539,"type":"multi","text":"下列属于数据集划分方法的是（）。","options":[{"label":"A","text":"贝叶斯划分"},{"label":"B","text":"分层随机划分"},{"label":"C","text":"K折交叉验证"},{"label":"D","text":"简单随机划分"}],"answer":"B,C,D","explanation":"选项A：贝叶斯划分是一种基于概率的分类方法，通常用于模型预测，而不是数据集划分方法。选项B：分层随机划分是一种常用的数据集划分方法，确保每个子集中的类别分布与原数据集保持一致，适用于类别不平衡的情况。选项C：K折交叉验证是将数据集分成k个大小相似的子集，k-1个子集的并集作为训练集，剩下的一个子集作为测试集。每个子集都会轮流作为测试集，剩余的子集用作训练集。选项D：简单随机划分是最基本的数据集划分方法，将数据集随机分为训练集和测试集，适用于大多数情形。","mnemonic":"选BCD，数据集划分\"分K简\"（分层/K折/简单随机），A贝叶斯是分类方法非划分"},{"id":540,"type":"multi","text":"在 PowerPoint 里，下列属于幻灯片切换效果的选项是（）。","options":[{"label":"A","text":"平滑"},{"label":"B","text":"淡入/淡出"},{"label":"C","text":"推入"},{"label":"D","text":"切入"}],"answer":"A,B,C,D","explanation":"幻灯片切换是在放映演示文稿期间，从一张幻灯片移至下一张幻灯片时出现的类似动画的效果。 添加幻灯片切换效果，使 PowerPoint 演示文稿生动生动。在PowerPoint中，常见的幻灯片切换效果包括平滑、淡入/淡出、推入、切入等。","mnemonic":"全选ABCD，PPT切换效果\"平淡推切\"全都是：平滑/淡入淡出/推入/切入"},{"id":541,"type":"judge","text":"汇编作品的著作权由汇编人享有，不过在运用这项权利时，不能侵犯原作品的著作权。","options":[],"answer":"正确","explanation":"《中华人民共和国著作权法》第十五条规定，汇编若干作品、作品的片段或者不构成作品的数据或者其他材料，对其内容的选择或者编排体现独创性的作品，为汇编作品，其著作权由汇编人享有，但行使著作权时，不得侵犯原作品的著作权。","mnemonic":"正确√ 汇编作品著作权归汇编人，但不得侵犯原作品著作权"},{"id":542,"type":"judge","text":"按照象限分析的框架，公用事业的各项制度都在特定象限内运行，某一象限的特定制度一旦跨越到其他象限，就会出现制度性错位。","options":[],"answer":"正确","explanation":"根据象限分析框架，公用事业的各项制度在特定的象限内运作，某一象限的特定制度不能跨越进入其他象限，否则会形成制度性错位。","mnemonic":"正确√ 象限分析框架下制度不可跨象限，否则\"制度性错位\""},{"id":543,"type":"judge","text":"决策树算法中，执行剪枝操作是为了加快模型的训练速度。","options":[],"answer":"错误","explanation":"剪枝操作的主要目的是为了防止决策树过拟合，而不是提高训练速度。过拟合是指模型在训练数据上表现很好，但在新数据上表现差。剪枝通过去除一些不必要的树枝，简化模型结构，从而提高模型的泛化能力。","mnemonic":"错误✗ 剪枝目的是防过拟合提升泛化能力，不是加快训练速度"},{"id":544,"type":"judge","text":"《中华人民共和国商标法》规定，申请注册的商标必须具备显著特征，便于识别，且不得与他人此前已取得的合法权利相冲突。","options":[],"answer":"正确","explanation":"根据《中华人民共和国商标法》第九条规定，申请注册的商标，应当有显著特征，便于识别，并不得与他人在先取得的合法权利相冲突。商标注册人有权标明“注册商标”或者注册标记。","mnemonic":"正确√ 商标注册须显著特征+便于识别+不冲突在先权利"},{"id":545,"type":"judge","text":"存储介质是应用程序和用户用来接收、保存、读取及索引电子数据的物理设备。","options":[],"answer":"正确","explanation":"存储介质(StorageMedia)是应用程序和用户用以接收、保留、读取和索引电子数据的物理设备。","mnemonic":"正确√ 存储介质就是接收保存读取索引电子数据的物理设备"},{"id":546,"type":"judge","text":"ETL 任务的调度策略中，并不包含对任务进行优先级调度这一项。","options":[],"answer":"错误","explanation":"为了满足复杂的业务需求，以及不断膨胀的ETL任务列表，以及有限的资源，会在调度的基础逻辑上增加很多的策略，比如ETL任务的类别、按照优先级调度、运行开始时间要求、任务的资源限制等。","mnemonic":"错误✗ ETL调度策略包含优先级调度，题目说\"不包含\"是错的"},{"id":547,"type":"judge","text":"支持向量机的工作方式是在高维空间中找出超平面，让该超平面能最大程度区分不同类别的样本。","options":[],"answer":"正确","explanation":"支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。SVM通过最大化不同类别之间的间隔来实现最佳分类","mnemonic":"正确√ SVM在高维空间找超平面最大化分隔不同类别样本"},{"id":548,"type":"judge","text":"个人信息处理者对敏感个人信息进行处理时，无需开展个人信息保护影响评估。","options":[],"answer":"错误","explanation":"根据《中华人民共和国个人信息保护法》第五十五条规定，有下列情形之一的，个人信息处理者应当事前进行个人信息保护影响评估，并对处理情况进行记录：（一）处理敏感个人信息；（二）利用个人信息进行自动化决策；（三）委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息；（四）向境外提供个人信息；（五）其他对个人权益有重大影响的个人信息处理活动。","mnemonic":"错误✗ 处理敏感个人信息必须事前开展保护影响评估"},{"id":549,"type":"judge","text":"业务流程重组（BPR）能否成功实施，主要取决于内部运营效率的提高，和客户是否参与没有关系。","options":[],"answer":"错误","explanation":"流程重组离不开客户的参与。因此，客户参与是BPR成功实施的重要因素之一","mnemonic":"错误✗ BPR成功离不开客户参与，不是只看内部效率"},{"id":550,"type":"judge","text":"眼动跟踪技术能够通过追踪用户的眼球运动，来判断其注意力的集中之处，常被应用于用户行为分析和界面优化工作中。","options":[],"answer":"正确","explanation":"眼动跟踪技术通过传感器（如红外传感器）追踪用户的眼球运动，能够精准判断用户的注意力集中点，进而分析其行为和反应。该技术在用户体验研究、界面设计优化、广告效果分析等领域得到广泛应用。","mnemonic":"正确√ 眼动跟踪追踪眼球运动判断注意力焦点，用于行为分析和界面优化"},{"id":551,"type":"judge","text":"人机交互是人类用户与计算机系统之间进行信息传递的媒介或方式，涵盖了支持人机双向信息交换的软件与硬件。","options":[],"answer":"错误","explanation":"人机交互和人机界面是两个不同的概念。人机交互是指用户与计算机系统之间的通信，是人与计算机之间各种符号和动作的双向信息交换。人机界面是指人类用户与计算机系统之间的通信媒体或手段，是支持人机双向信息交换的软件和硬件。","mnemonic":"错误✗ 题目描述的是\"人机界面\"而非\"人机交互\"，两个概念要区分"},{"id":552,"type":"judge","text":"精确率（Precision）、召回率（Recall）、准确率（Accuracy）都属于回归模型的评估指标。","options":[],"answer":"错误","explanation":"评估指标可以直观反映模型分类或回归效果的优劣。常用的分类模型评估指标有精确率（Precision）、召回率（Recall）、准确率（Accuracy）、F1值、AUC和K-S。常用的回归模型评估指标有MSE、RMSE、MAE和MAPE。","mnemonic":"错误✗ 精确率/召回率/准确率是分类指标，回归用MSE/RMSE/MAE"},{"id":553,"type":"judge","text":"图像数据处理是利用图像去噪、图形美化、图像数据减弱等手段，根据需求对图像数据进行处理的技术。","options":[],"answer":"错误","explanation":"图像数据处理是利用图像数据去噪、图形分割、图像数据增强等手段根据需求对图像数据进行处理的技术","mnemonic":"错误✗ 图像数据处理是去噪+分割+增强，不是\"美化\"和\"减弱\""},{"id":554,"type":"judge","text":"中文分词模型的作用是把中文文字序列切分成中文里最小的语义单位 —— 词语。","options":[],"answer":"正确","explanation":"不同于单词以及分隔单词的空格符组成文本序列的英文文本，中文文本需要通过分词模型切分出词语。中文分词模型将原来的中文文字序列中切分出中文最小语义单位——词语。","mnemonic":"正确√ 中文分词切分出最小语义单位——词语，与英文空格分词不同"},{"id":555,"type":"judge","text":"收集那些规模庞大、生成迅速的大数据，并且能让这些来自多个源头、结构各异的大数据相互配合发挥作用，进而为大数据分析等应用提供有效支持，这是大数据采集阶段的任务，也是大数据的核心技术之一。","options":[],"answer":"正确","explanation":"大数据的来源多种多样，如何获取这些规模大、产生速度快的大数据，并且能够使这些多源异构的大数据得以协同工作，从而有效地支撑大数据分析等应用，是大数据采集阶段的工作，也是大数据的核心技术之一。","mnemonic":"正确√ 大数据采集要收集多源异构大数据并协同工作，是核心技术之一"},{"id":556,"type":"judge","text":"频繁模式增长算法借助一种紧凑的数据结构 ——FP-tree，来存储和查找发现频繁项集所需的全部信息。","options":[],"answer":"正确","explanation":"频繁模式增长(FP-Growth)算法利用一种紧缩的数据结构FP-tree来存储和查找频繁项集所需要的全部信息。","mnemonic":"正确√ FP-Growth算法用FP-tree紧凑结构存储查找频繁项集信息"},{"id":557,"type":"judge","text":"对比模型在训练集和测试集上的预测准确率，能够判断是否出现过拟合现象。","options":[],"answer":"正确","explanation":"训练集用于训练模型，测试集用于评估模型的泛化能力。如果模型在训练集上的准确率明显高于测试集的准确率，通常表明模型发生了过拟合。通过对比训练集和测试集的准确率，可以有效判断模型是否过拟合。","mnemonic":"正确√ 训练集准确率远高于测试集说明过拟合，对比即可判断"},{"id":558,"type":"judge","text":"ETL 指的是把数据从来源端经过转译、上传到目标端的过程。","options":[],"answer":"错误","explanation":"ETL是将数据从数据来源端经过抽取、转换、装载至目标端的过程。","mnemonic":"错误✗ ETL是抽取→转换→装载，不是\"转译→上传\""},{"id":559,"type":"judge","text":"HBase 属于非关系数据库的一种。","options":[],"answer":"正确","explanation":"ApacheHBase是一个开源、分布式、版本化的非关系数据库。","mnemonic":"正确√ HBase是开源分布式版本化的非关系数据库"},{"id":560,"type":"judge","text":"输入设备是向计算机系统输送信息的设备，像键盘、鼠标、摄像头、扫描仪等都属于此类。","options":[],"answer":"正确","explanation":"输人设备指向计算机系统提供信息输人的设备。现有计算机系统的输人设备主要有键盘、鼠标、触摸屏、摄像头、光笔和扫描仪等。","mnemonic":"正确√ 输入设备向计算机输送信息：键盘鼠标摄像头扫描仪等"},{"id":561,"type":"judge","text":"RFM 模型是一种基于客户购买成果的方法，它较为动态地展示了客户的大部分形象，为个性化沟通和服务提供了依据。","options":[],"answer":"错误","explanation":"RFM模型是一种基于客户行为细分的方法，RFM模型较为动态地显示了一个客户的全部轮廓，这对个性化的沟通和服务提供了依据。","mnemonic":"错误✗ RFM基于客户\"行为\"细分，显示\"全部轮廓\"，非\"购买成果\"和\"大部分形象\""},{"id":562,"type":"judge","text":"《中华人民共和国网络安全法》提及，网信部门及有关部门在履行网络安全保护职责时获取的信息，可用于其他方面。","options":[],"answer":"错误","explanation":"《中华人民共和国网络安全法》第三十条规定，网信部门和有关部门在履行网络安全保护职责中获取的信息，只能用于维护网络安全的需要，不得用于其他用途。","mnemonic":"错误✗ 网信部门获取的信息只能用于维护网络安全，不得用于其他用途"},{"id":563,"type":"judge","text":"逻辑回归通过让对数似然函数达到最大来优化模型参数，进而找到最优的分类边界。","options":[],"answer":"正确","explanation":"逻辑回归算法的优化目标是最大化对数似然函数。对数似然函数的最大化过程通过最大化样本数据的概率来找到模型参数，使得模型对分类任务的拟合度最优。这一过程是通过优化算法（如梯度下降）来实现的。通过最大化对数似然函数，逻辑回归能够找到最佳的分类边界，以便对新样本进行分类。","mnemonic":"正确√ 逻辑回归最大化对数似然函数来优化参数找最优分类边界"},{"id":564,"type":"judge","text":"业务数据主要流程的开端是数据分析与建模，它的功能是直接为数据获取工作提供指引。","options":[],"answer":"错误","explanation":"业务数据的主要流程为需求分析、数据获取、数据预处理、分析与建模、模型评价与优化和部署。","mnemonic":"错误✗ 业务数据流程开端是需求分析，不是数据分析与建模"},{"id":565,"type":"judge","text":"LOTOS 包含两个部分，第一部分基于进程代数 CCS，对进程的行为及相互作用进行描述；第二部分基于抽象数据类型语言 ACT-ONE，对数据结构和值表达式进行描述。","options":[],"answer":"正确","explanation":"LOTOS包括两个部分，第一部分基于进程代数CCS，描述进程的行为和相互作用，第二部分基于抽象数据类型语言ACT-ONE，描述数据结构和值表达式。","mnemonic":"正确√ LOTOS两部分：CCS描述进程行为+ACT-ONE描述数据结构"},{"id":566,"type":"judge","text":"当劳动合同被确认无效时，即便劳动者已经付出劳动，用人单位也可以不向其支付劳动报酬。","options":[],"answer":"错误","explanation":"《中华人民共和国劳动合同法》第二十八条规定，劳动合同被确认无效，劳动者已付出劳动的，用人单位应当向劳动者支付劳动报酬。劳动报酬的数额，参照本单位相同或者相近岗位劳动者的劳动报酬确定。","mnemonic":"错误✗ 合同无效但已付出劳动的，用人单位仍应支付劳动报酬"},{"id":567,"type":"judge","text":"人机交互的原型设计是依据需求文档，设计出产品各阶段所需的原型。","options":[],"answer":"正确","explanation":"原型设计是根据需求文档设计各阶段所需的产品原型，探索满足需求的各种解决方案(包括任务流和页面交互)，并组织评审和讨论会对原型进行评估(包括技术可行性咨询)，最后输出一个确认版的高保真原型及交互说明文档。","mnemonic":"正确√ 原型设计依据需求文档设计各阶段产品原型"},{"id":568,"type":"judge","text":"NoSQL 数据库完全不支持 ACID（原子性、一致性、隔离性、持久性）事务。","options":[],"answer":"错误","explanation":"NoSQL数据库不一定支持ACID（原子性、一致性、隔离性、持久性）事务，而不是完全不支持。","mnemonic":"错误✗ NoSQL不是\"完全不支持\"ACID，是\"不一定支持\"，注意绝对化表述"},{"id":569,"type":"judge","text":"漏斗分析能够把用户在某电商平台的购买流程当作一个整体，对其中各关键步骤的转化率及随时间的变动情况展开分析。","options":[],"answer":"正确","explanation":"比如用户在某电商平台的购买流程包含浏览商品、点击商品详情、发起拼单、立即支付、支付完成等步骤，漏斗分析可以将该流程视为一个整体，分析其中各重要步骤的转化率和随时间的变化情况。","mnemonic":"正确√ 漏斗分析将购买流程视为整体，分析各步骤转化率及变化"},{"id":570,"type":"judge","text":"决策树能够同时应对分类问题和回归问题。","options":[],"answer":"正确","explanation":"决策树能够处理离散和连续变量，也能处理分类和回归问题。","mnemonic":"正确√ 决策树既能分类又能回归，双任务通吃"},{"id":571,"type":"judge","text":"从业者应当说真话，不能故意做虚假陈述或隐瞒实情，要提供准确、真实、完整的信息，避免误导他人，这体现了诚实公正基本要求里的诚实原则。","options":[],"answer":"正确","explanation":"诚实公正基本要求的诚实：从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。","mnemonic":"正确√ 诚实原则：说实话不虚假陈述不隐瞒，提供准确真实完整信息"},{"id":572,"type":"judge","text":"GOMS 作为一种人机交互界面表示的理论模型，将所有任务都视为面向操作目标的，但它能够解决的问题本质以及用户间的个体差异存在局限。","options":[],"answer":"错误","explanation":"GOMS是一种人机交互界面表示的理论模型，它把所有的任务都看作是面向操作目标的，但忽略了一些任务所要解决的问题本质以及用户间的个体差异。","mnemonic":"错误✗ GOMS\"忽略了\"问题本质和个体差异，不是\"存在局限但能解决\""},{"id":573,"type":"judge","text":"图像数据处理是借助图像去噪、图形分割、图像数据增强等手段，根据需求对图像数据进行处理的技术。","options":[],"answer":"正确","explanation":"图像数据处理是利用图像数据去噪、图形分割、图像数据增强等手段根据需求对图像数据进行处理的技术。","mnemonic":"正确√ 图像数据处理三手段：去噪+分割+增强（注意553题的\"美化减弱\"是错的）"},{"id":574,"type":"judge","text":"在 Pillow 模块中，convert () 方法可用于将图像转换为灰度图像。","options":[],"answer":"正确","explanation":"Pillow模块中可以利用convert()方法将图像转化成灰度图像。","mnemonic":"正确√ Pillow模块convert()方法可将图像转换为灰度图像"},{"id":575,"type":"judge","text":"智慧城市是指通过各种技术手段，提高城市规划、智能化水平等，让城市生活更加美好。","options":[],"answer":"正确","explanation":"智慧城市是指通过广泛采用物联网、云计算、移动互联网、大数据等新一代信息技术，提高城市规划、建设、管理、服务、生产、生活的自动化、智能化水平，使城市运转更高效、更敏捷、更低碳。","mnemonic":"正确√ 智慧城市用物联网云计算等技术提高城市智能化水平"},{"id":576,"type":"judge","text":"决策树算法中，执行剪枝操作是为了加快模型的训练速度。","options":[],"answer":"错误","explanation":"剪枝操作的主要目的是为了防止决策树过拟合，而不是提高训练速度。过拟合是指模型在训练数据上表现很好，但在新数据上表现差。剪枝通过去除一些不必要的树枝，简化模型结构，从而提高模型的泛化能力。","mnemonic":"错误✗ 决策树剪枝防过拟合，不是加快训练速度（同543题）"},{"id":577,"type":"judge","text":"对比分析法只包括对行业趋势、竞品的分析以及与自身的同比、环比比较，不涵盖其他类型的对比。","options":[],"answer":"错误","explanation":"对比分析法是一种广泛应用于数据分析的方法，用于通过确定对比对象和对比维度，对目标事物和对比事物进行比较，从而识别差异、趋势和潜在的改进领域。虽然行业对比、竞品对比、与自身同比、环比是比较常见和基础的对比类型，但对比分析法的应用范围远不止于此。","mnemonic":"错误✗ 对比分析法范围很广，不限于行业竞品同比环比，注意\"只\"字陷阱"},{"id":578,"type":"judge","text":"企业进行业务流程优化时，无需参考国内外成功企业的管理经验，只需根据自身情况就能完成优化。","options":[],"answer":"错误","explanation":"根据业务流程优化的思路，企业需要借鉴国内外成功的企业管理经验，结合自身的业务特点及发展战略，才能更好地进行优化。","mnemonic":"错误✗ 业务流程优化需要借鉴国内外经验，\"无需参考\"说法错误"},{"id":579,"type":"judge","text":"业务流程重组（BPR）能够不依赖信息技术（IT）存在，但 IT 在 BPR 的实施中起到了重要的支持作用。","options":[],"answer":"正确","explanation":"业务流程重组（BPR）确实可以独立于信息技术（IT）存在，但IT在BPR的实施中起到了重要的支持作用。BPR是一种管理思想，而IT是一种技术，两者相辅相成。因此，这一说法是正确的。","mnemonic":"正确√ BPR可独立于IT存在，但IT起重要支持作用，两者相辅相成"},{"id":580,"type":"judge","text":"数据整合仅仅是将不同来源的数据合并到同一个存储系统中，不需要进行数据格式的转换或清洗。","options":[],"answer":"错误","explanation":"整合数据中的数据转换是将从数据源端获取的数据按照业务需求，转换成目标端要求的数据形式，并对错误、不规范、不一致的数据进行清洗和加工。","mnemonic":"错误✗ 数据整合不仅是合并，还需要格式转换和数据清洗"},{"id":581,"type":"judge","text":"企业培训管理的初级阶段，是从无到有逐步建立的阶段。","options":[],"answer":"正确","explanation":"培训管理初级阶段是企业培训管理从无到有的阶段。","mnemonic":"正确√ 培训管理初级阶段就是从无到有的建立过程"},{"id":582,"type":"judge","text":"人机交互是人类用户与计算机系统之间进行信息传递的媒介或方式，涵盖了支持人机双向信息交换的软件与硬件。","options":[],"answer":"错误","explanation":"人机交互和人机界面是两个不同的概念。人机交互是指用户与计算机系统之间的通信，是人与计算机之间各种符号和动作的双向信息交换。人机界面是指人类用户与计算机系统之间的通信媒体或手段，是支持人机双向信息交换的软件和硬件。","mnemonic":"错误✗ 又是混淆\"人机交互\"和\"人机界面\"，题目描述的是界面不是交互"},{"id":583,"type":"judge","text":"区域生长法的做法是从单个像素开始，逐步将周围的像素合并进来。","options":[],"answer":"正确","explanation":"基于区域的图像分割方法主要包括区域生长和区域分裂与合并两种典型的方法。区域生长法从一个初始像素出发，通过比较周围像素的相似性，逐渐合并相邻像素，直到形成一个一致性较强的区域，进而完成图像的分割。","mnemonic":"正确√ 区域生长法从单个像素（种子点）出发逐步合并周围相似像素"},{"id":584,"type":"judge","text":"企业进行业务流程优化时，无需参考国内外成功企业的管理经验，只需根据自身情况就能完成优化。","options":[],"answer":"错误","explanation":"根据业务流程优化的思路，企业需要借鉴国内外成功的企业管理经验，结合自身的业务特点及发展战略，才能更好地进行优化。","mnemonic":"错误✗ 同578题，业务流程优化需借鉴国内外经验，\"无需参考\"是错的"},{"id":585,"type":"judge","text":"采用 k 折交叉验证划分数据时，会将数据集分成 k 个规模相近的子集，其中 k-1 个子集的交集作为训练集。","options":[],"answer":"错误","explanation":"k折交叉验证将数据集分成k个大小相似的子集，k-1个子集的并集作为训练集，剩下的一个子集作为测试集。每个子集都会轮流作为测试集，剩余的子集用作训练集。","mnemonic":"错误✗ k折交叉验证用k-1个子集的\"并集\"做训练集，不是\"交集\""},{"id":586,"type":"judge","text":"个人信息处理者对敏感个人信息进行处理时，无需开展个人信息保护影响评估。","options":[],"answer":"错误","explanation":"根据《中华人民共和国个人信息保护法》第五十五条规定，有下列情形之一的，个人信息处理者应当事前进行个人信息保护影响评估，并对处理情况进行记录：（一）处理敏感个人信息；（二）利用个人信息进行自动化决策；（三）委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息；（四）向境外提供个人信息；（五）其他对个人权益有重大影响的个人信息处理活动。","mnemonic":"错误✗ 处理敏感个人信息必须事前做保护影响评估（同548题）"},{"id":587,"type":"judge","text":"勤勉好学的基本要求有积极主动、刻苦努力、持续学习、探索创新、保持谦逊。","options":[],"answer":"正确","explanation":"勤勉好学的基本要求包括积极主动、刻苦努力、持续学习、探索创新、保持谦逊。","mnemonic":"正确√ 勤勉好学五要求：积极主动+刻苦努力+持续学习+探索创新+保持谦逊"},{"id":588,"type":"judge","text":"按照《中华人民共和国商标法》，自然人、法人或者其他组织在从事生产经营活动时，若其商品或服务需要获得商标专用权，应当向商标局提出商标注册申请。","options":[],"answer":"正确","explanation":"根据《中华人民共和国商标法》第四条规定，自然人、法人或者其他组织在生产经营活动中，对其商品或者服务需要取得商标专用权的，应当向商标局申请商标注册。不以使用为目的的恶意商标注册申请，应当予以驳回。本法有关商品商标的规定，适用于服务商标。","mnemonic":"正确√ 商标法规定需要商标专用权应向商标局申请注册"},{"id":589,"type":"judge","text":"业务流程重组（BPR）的成功实施主要依靠信息技术（IT）的应用，而不是管理上的创新。","options":[],"answer":"错误","explanation":"业务流程重组（BPR）的核心是一种管理创新，而不是单纯依赖信息技术（IT）。虽然IT在BPR的实施中起到了催化剂的作用，但BPR的本质是思维方式的转变和管理创新。因此，这一说法是错误的。","mnemonic":"错误✗ BPR核心是管理创新，IT是催化剂，不能说主要靠IT"},{"id":590,"type":"judge","text":"NoSQL 数据库完全不支持 ACID（原子性、一致性、隔离性、持久性）事务。","options":[],"answer":"错误","explanation":"NoSQL数据库不一定支持ACID（原子性、一致性、隔离性、持久性）事务，而不是完全不支持。","mnemonic":"错误✗ NoSQL不是\"完全不支持\"ACID，绝对化说法必错（同568题）"},{"id":591,"type":"judge","text":"眼动跟踪技术能够通过追踪用户的眼球运动，来判断其注意力的集中之处，常被应用于用户行为分析和界面优化工作中。","options":[],"answer":"正确","explanation":"眼动跟踪技术通过传感器（如红外传感器）追踪用户的眼球运动，能够精准判断用户的注意力集中点，进而分析其行为和反应。该技术在用户体验研究、界面设计优化、广告效果分析等领域得到广泛应用。","mnemonic":"正确√ 眼动跟踪追踪眼球运动判断注意力焦点（同550题）"},{"id":592,"type":"judge","text":"进行图像分割时，区域生长法会先选定一个种子点，之后不断扩大区域范围，直至所有像素都符合某一相似性标准。","options":[],"answer":"正确","explanation":"区域生长法是通过从种子点开始，依据像素的相似性（如灰度值、颜色、纹理等）逐步扩展相邻区域，直到达到预定的停止准则。","mnemonic":"正确√ 区域生长法从种子点开始按相似性逐步扩展合并区域"},{"id":593,"type":"judge","text":"某旅游公司打算分析游客的消费状况，仅依据旅游消费金额这一维度进行分类，为消费金额高的游客提供豪华游服务，这种做法被认为是对象限分析法的合理运用。","options":[],"answer":"错误","explanation":"象限分析法需要两个或多个维度来划分象限，而此处仅使用一个维度，不符合象限分析法的运用方式。","mnemonic":"错误✗ 象限分析法需两个或多个维度，仅一个维度不符合要求"},{"id":594,"type":"judge","text":"人体动作分析是人机交互系统的重要支撑技术。","options":[],"answer":"正确","explanation":"人体动作分析是人机交互系统的重要支撑技术，是一个多学科交叉的研究课题，使用了数学建模、图形图像分析、模式识别及人工智能等知识，具有重要的理论研究价值。","mnemonic":"正确√ 人体动作分析是人机交互系统的重要支撑技术"},{"id":595,"type":"judge","text":"操作系统中的 “文件系统”，指的是操作系统里与文件管理相关的那部分软件、被管理的文件，以及管理文件时所需的数据结构（如目录、索引表等）的总和。","options":[],"answer":"正确","explanation":"操作系统的“文件系统”，是指操作系统中与文件管理有关的那部分软件、被管理的文件，以及管理文件所需要的数据结构(如目录、索引表等)的总体。","mnemonic":"正确√ 文件系统=文件管理软件+被管理文件+目录索引等数据结构的总体"},{"id":596,"type":"judge","text":"短时自相关函数可被用来计算语音信号所具有的周期性特征。","options":[],"answer":"正确","explanation":"短时自相关函数是语音信号处理中常用于计算信号周期性特征的一种方法。它通过计算信号与自身的延迟版本之间的相关性，能够揭示信号的周期性变化。尤其在音高估计、语音活动检测等任务中，短时自相关函数广泛应用于语音信号的时域分析。","mnemonic":"正确√ 短时自相关函数用于计算语音信号的周期性特征"},{"id":597,"type":"judge","text":"LOTOS 包含两个部分，第一部分基于进程代数 CCS，对进程的行为及相互作用进行描述；第二部分基于抽象数据类型语言 ACT-ONE，对数据结构和值表达式进行描述。","options":[],"answer":"正确","explanation":"LOTOS包括两个部分，第一部分基于进程代数CCS，描述进程的行为和相互作用，第二部分基于抽象数据类型语言ACT-ONE，描述数据结构和值表达式。","mnemonic":"正确√ LOTOS两部分：CCS描述进程+ACT-ONE描述数据结构（同565题）"},{"id":598,"type":"judge","text":"算法分析指标能够帮助我们理解算法，并为其优化提供指导。","options":[],"answer":"正确","explanation":"复杂度分析揭示了算法的理论效率趋势，实际优化需综合考虑常数因子、硬件缓存等因素，但其仍是优化方向的核心依据。","mnemonic":"正确√ 算法分析指标帮助理解算法并指导优化方向"},{"id":599,"type":"judge","text":"业务流程重组（BPR）的核心是围绕客户需求，所以在实施过程中，流程的设计与优化都应始终以客户需求为中心。","options":[],"answer":"正确","explanation":"流程重组始于对客户需求的深度理解与全面把握，并且始终围绕客户需求进行。","mnemonic":"正确√ BPR始终围绕客户需求，流程设计以客户需求为中心"},{"id":600,"type":"judge","text":"像 SSIS、ODI、Kettle、Informatica 等，都是比较常见的数据整合工具。","options":[],"answer":"正确","explanation":"常见的数据整合工具有：SSIS、ODI、Kettle、Informatica等。","mnemonic":"正确√ SSIS/ODI/Kettle/Informatica都是常见数据整合工具"}];

// ===== STATE =====
let currentMode = 'quiz';
let currentBatch = -1;
let currentIndex = 0;
let answered = {}; // { questionId: { selected: [...], correct: bool } }
let multiSelected = []; // for multi-select during answering
let wrongQuizIds = []; // wrong question ids for wrong quiz mode
let isWrongQuizMode = false;
let wrongQuizPending = new Set(); // IDs pending re-answer in current wrong quiz round
let favorites = new Set(); // favorite question IDs
let isFavQuizMode = false;
let favQuizIds = [];
let favQuizPending = new Set(); // IDs pending re-answer in fav quiz round

const STORAGE_KEY = 'ai3_quiz_records';
const PROGRESS_KEY = 'ai3_quiz_progress';
const FAVORITES_KEY = 'ai3_quiz_favorites';

// ===== INIT =====
function init() {
  loadRecords();
  loadFavorites();
  renderBatchGrid();
  updateStats();
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('fade-out');
    setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 300);
  }, 400);
}

function loadRecords() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) answered = JSON.parse(data);
  } catch(e) { answered = {}; }
}

function saveRecords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answered));
}

function loadProgress() {
  try {
    const data = localStorage.getItem(PROGRESS_KEY);
    if (data) return JSON.parse(data);
  } catch(e) {}
  return {};
}

function saveProgress(batch, index) {
  const p = loadProgress();
  p[batch] = index;
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function loadFavorites() {
  try {
    const data = localStorage.getItem(FAVORITES_KEY);
    if (data) favorites = new Set(JSON.parse(data));
  } catch(e) { favorites = new Set(); }
}

function saveFavorites() {
  localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites]));
}

function toggleFavorite(qid) {
  if (favorites.has(qid)) {
    favorites.delete(qid);
  } else {
    favorites.add(qid);
  }
  saveFavorites();
  updateStats();
  renderQuizQuestion();
}

// ===== STATS =====
function updateStats() {
  const keys = Object.keys(answered);
  const total = keys.length;
  const correct = keys.filter(k => answered[k].correct).length;
  const wrong = total - correct;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statWrongBook').textContent = wrong;
  document.getElementById('statFavorites').textContent = favorites.size;
  document.getElementById('statRate').textContent = rate + '%';
}

// ===== MODE =====
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeQuiz').classList.toggle('selected', mode === 'quiz');
  document.getElementById('modeStudy').classList.toggle('selected', mode === 'study');
  renderBatchGrid();
}

// ===== BATCH GRID =====
function getBatchQuestions(batch) {
  const start = batch * 100;
  return ALL_QUESTIONS.slice(start, start + 100);
}

function renderBatchGrid() {
  const grid = document.getElementById('batchGrid');
  let html = '';
  for (let b = 0; b < 6; b++) {
    const qs = getBatchQuestions(b);
    const startId = qs[0].id;
    const endId = qs[qs.length - 1].id;
    const done = qs.filter(q => answered[q.id]).length;
    const pct = Math.round(done / qs.length * 100);

    let typeLabel = '';
    if (b < 4) typeLabel = '单选';
    else if (b === 4) typeLabel = '单选+多选';
    else typeLabel = '多选+判断';

    html += `<div class="batch-card" onclick="openBatch(${b})">
      <div class="batch-num">第 ${b + 1} 批</div>
      <div class="batch-range">${startId}-${endId}题 · ${typeLabel}</div>
      <div class="batch-progress"><div class="batch-progress-bar" style="width:${pct}%"></div></div>
      <div class="batch-stats">${currentMode === 'quiz' ? `已做 ${done}/${qs.length}` : '点击查看全部'}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ===== OPEN BATCH =====
function openBatch(batch) {
  currentBatch = batch;
  if (currentMode === 'quiz') {
    openQuizMode(batch);
  } else {
    openStudyMode(batch);
  }
}

// ===== QUIZ MODE =====
function openQuizMode(batch) {
  isWrongQuizMode = false;
  isFavQuizMode = false;
  wrongQuizIds = [];
  wrongQuizPending = new Set();
  favQuizIds = [];
  favQuizPending = new Set();
  const qs = getBatchQuestions(batch);
  const progress = loadProgress();
  currentIndex = progress[batch] || 0;
  if (currentIndex >= qs.length) currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function getCurrentQuestions() {
  if (isWrongQuizMode) return getWrongQuizQuestions();
  if (isFavQuizMode) return getFavQuizQuestions();
  return getBatchQuestions(currentBatch);
}

function renderQuizQuestion() {
  const qs = getCurrentQuestions();
  if (qs.length === 0) { goHome(); return; }
  const q = qs[currentIndex];
  const record = answered[q.id];
  // In wrong quiz mode, treat pending questions as unanswered so user can re-answer
  const isAnswered = isWrongQuizMode ? !wrongQuizPending.has(q.id) : (isFavQuizMode ? !favQuizPending.has(q.id) : !!record);

  // Header
  if (isWrongQuizMode) {
    document.getElementById('quizProgressText').textContent = `错题集 · ${currentIndex + 1}/${qs.length}`;
  } else if (isFavQuizMode) {
    document.getElementById('quizProgressText').textContent = `收藏夹 · ${currentIndex + 1}/${qs.length}`;
  } else {
    document.getElementById('quizProgressText').textContent = `第${currentBatch + 1}批 · ${currentIndex + 1}/${qs.length}`;
  }
  document.getElementById('quizProgressBar').style.width = ((currentIndex + 1) / qs.length * 100) + '%';
  document.getElementById('quizCounter').textContent = `${q.id}/600`;

  // Buttons
  document.getElementById('btnPrev').disabled = currentIndex === 0;
  let nextBtnText = '下一题 \u25B6';
  if (currentIndex === qs.length - 1) {
    nextBtnText = isWrongQuizMode ? '完成错题 \u25B6' : (isFavQuizMode ? '继续刷题 \u25B6' : '返回首页 \u25B6');
  }
  document.getElementById('btnNext').textContent = nextBtnText;

  let html = '';
  // Type badge
  const typeLabels = { single: '单选题', multi: '多选题', judge: '判断题' };
  html += `<div class="q-type-badge ${q.type}">${typeLabels[q.type]}${q.type === 'multi' ? '（可多选）' : ''}</div>`;
  // Favorite button
  const isFaved = favorites.has(q.id);
  html += `<button class="fav-btn${isFaved ? ' faved' : ''}" onclick="toggleFavorite(${q.id})">${isFaved ? '\u2605 已收藏' : '\u2606 收藏'}</button>`;
  // Question text
  html += `<div class="q-text">${q.id}. ${escapeHtml(q.text)}</div>`;

  if (q.type === 'judge') {
    html += '<div class="judge-options">';
    ['正确', '错误'].forEach(opt => {
      let cls = '';
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt)) cls += record.correct ? ' correct' : ' wrong';
        if (opt === q.answer && !record.correct) cls += ' correct';
      }
      html += `<div class="judge-option${cls}" onclick="answerJudge('${opt}', ${q.id})">${opt}</div>`;
    });
    html += '</div>';
  } else if (q.type === 'multi') {
    html += '<div class="q-options">';
    q.options.forEach(opt => {
      let cls = '';
      const correctArr = q.answer.split(',').map(s => s.trim());
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt.label)) {
          cls += correctArr.includes(opt.label) ? ' correct' : ' wrong';
        } else if (correctArr.includes(opt.label)) {
          cls += ' correct';
        }
      } else if (multiSelected.includes(opt.label)) {
        cls += ' selected';
      }
      html += `<div class="q-option${cls}" onclick="toggleMultiOption('${opt.label}', ${q.id})">
        <span class="opt-label">${opt.label}</span>
        <span>${escapeHtml(opt.text)}</span>
      </div>`;
    });
    html += '</div>';
    if (!isAnswered) {
      html += `<div class="multi-confirm-wrap" id="multiConfirmWrap" style="display:${multiSelected.length > 0 ? 'block' : 'none'}">
        <button class="multi-confirm-btn" onclick="confirmMulti(${q.id})">确认提交（已选${multiSelected.length}项）</button>
      </div>`;
    }
  } else {
    html += '<div class="q-options">';
    q.options.forEach(opt => {
      let cls = '';
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt.label)) cls += record.correct ? ' correct' : ' wrong';
        if (opt.label === q.answer && !record.selected.includes(opt.label)) cls += ' correct';
      }
      html += `<div class="q-option${cls}" onclick="answerSingle('${opt.label}', ${q.id})">
        <span class="opt-label">${opt.label}</span>
        <span>${escapeHtml(opt.text)}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Show result if answered
  if (isAnswered) {
    const isCorrect = record.correct;
    html += `<div class="result-card">
      <div class="result-header ${isCorrect ? 'correct-header' : 'wrong-header'}">
        ${isCorrect ? '\u2705 回答正确' : '\u274C 回答错误'}
      </div>
      <div class="result-answer">\u2714 正确答案：${q.answer}</div>
      ${q.explanation ? `<div class="result-explanation"><strong>\ud83d\udcdd 解析：</strong>${escapeHtml(q.explanation)}</div>` : ''}
      ${q.mnemonic ? `<div class="result-mnemonic"><strong>\ud83d\udca1 巧记：</strong>${escapeHtml(q.mnemonic)}</div>` : ''}
    </div>`;
  }

  document.getElementById('quizBody').innerHTML = html;
  document.getElementById('quizBody').scrollTop = 0;
  window.scrollTo(0, 0);

  if (!isWrongQuizMode && !isFavQuizMode) saveProgress(currentBatch, currentIndex);
}

function answerSingle(label, qid) {
  if (isWrongQuizMode) {
    if (!wrongQuizPending.has(qid)) return;
  } else if (isFavQuizMode) {
    if (!favQuizPending.has(qid)) return;
  } else {
    if (answered[qid]) return;
  }
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correct = label === q.answer.trim();
  answered[qid] = { selected: [label], correct };
  wrongQuizPending.delete(qid);
  favQuizPending.delete(qid);
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function answerJudge(val, qid) {
  if (isWrongQuizMode) {
    if (!wrongQuizPending.has(qid)) return;
  } else if (isFavQuizMode) {
    if (!favQuizPending.has(qid)) return;
  } else {
    if (answered[qid]) return;
  }
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correct = val === q.answer.trim();
  answered[qid] = { selected: [val], correct };
  wrongQuizPending.delete(qid);
  favQuizPending.delete(qid);
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function toggleMultiOption(label, qid) {
  if (isWrongQuizMode) {
    if (!wrongQuizPending.has(qid)) return;
  } else if (isFavQuizMode) {
    if (!favQuizPending.has(qid)) return;
  } else {
    if (answered[qid]) return;
  }
  const idx = multiSelected.indexOf(label);
  if (idx >= 0) multiSelected.splice(idx, 1);
  else multiSelected.push(label);
  renderQuizQuestion();
}

function confirmMulti(qid) {
  const canAnswer = isWrongQuizMode ? wrongQuizPending.has(qid) : (isFavQuizMode ? favQuizPending.has(qid) : !answered[qid]);
  if (!canAnswer || multiSelected.length === 0) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correctArr = q.answer.split(',').map(s => s.trim()).sort();
  const selectedArr = [...multiSelected].sort();
  const correct = JSON.stringify(selectedArr) === JSON.stringify(correctArr);
  answered[qid] = { selected: [...multiSelected], correct };
  multiSelected = [];
  wrongQuizPending.delete(qid);
  favQuizPending.delete(qid);
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    multiSelected = [];
    renderQuizQuestion();
  }
}

function nextQuestion() {
  const qs = getCurrentQuestions();
  if (currentIndex < qs.length - 1) {
    currentIndex++;
    multiSelected = [];
    renderQuizQuestion();
  } else {
    if (isWrongQuizMode) {
      // Check if there are still wrong answers from this round
      const stillWrong = wrongQuizIds.filter(id => answered[id] && !answered[id].correct);
      if (stillWrong.length > 0) {
        wrongQuizIds = stillWrong;
        wrongQuizPending = new Set(stillWrong);
        currentIndex = 0;
        multiSelected = [];
        showToast(`还有 ${stillWrong.length} 题未答对，继续刷！`);
        renderQuizQuestion();
      } else {
        isWrongQuizMode = false;
        wrongQuizIds = [];
        wrongQuizPending = new Set();
        showToast('恭喜！错题全部答对！');
        goHome();
      }
    } else if (isFavQuizMode) {
      // Refresh favorites list - keep only still-favorited questions
      const remaining = [...favorites].sort((a, b) => a - b);
      if (remaining.length > 0) {
        favQuizIds = remaining;
        favQuizPending = new Set(remaining);
        currentIndex = 0;
        multiSelected = [];
        showToast(`收藏夹还有 ${remaining.length} 题，继续刷！`);
        renderQuizQuestion();
      } else {
        isFavQuizMode = false;
        favQuizIds = [];
        favQuizPending = new Set();
        showToast('收藏夹已清空！');
        goHome();
      }
    } else {
      goHome();
    }
  }
}

function jumpToQuestion() {
  const qs = getCurrentQuestions();
  const input = prompt(`输入题号 (1-${qs.length})：`, currentIndex + 1);
  if (input === null) return;
  const n = parseInt(input);
  if (n >= 1 && n <= qs.length) {
    currentIndex = n - 1;
    multiSelected = [];
    renderQuizQuestion();
  } else {
    showToast('请输入有效题号');
  }
}

// ===== STUDY MODE =====
function openStudyMode(batch) {
  const qs = getBatchQuestions(batch);
  const startId = qs[0].id;
  const endId = qs[qs.length - 1].id;

  document.getElementById('studyTitle').textContent = `第${batch + 1}批 (${startId}-${endId}题)`;
  showPage('studyPage');

  let html = '';
  qs.forEach(q => {
    const typeLabels = { single: '单选', multi: '多选', judge: '判断' };
    html += '<div class="study-card">';
    html += `<div class="sc-header">
      <span class="sc-num">${q.id}</span>
      <span class="q-type-badge ${q.type}" style="margin:0">${typeLabels[q.type]}</span>
    </div>`;
    html += `<div style="padding:10px 14px;border-bottom:1px solid var(--gray-100)">
      <div class="sc-text">${escapeHtml(q.text)}</div>
    </div>`;

    if (q.options.length > 0) {
      html += '<div class="sc-options">';
      const correctArr = q.answer.split(',').map(s => s.trim());
      q.options.forEach(opt => {
        const isAns = correctArr.includes(opt.label);
        html += `<div class="sc-opt${isAns ? ' is-answer' : ''}">${isAns ? '\u2714 ' : ''}${opt.label}. ${escapeHtml(opt.text)}</div>`;
      });
      html += '</div>';
    }

    html += `<div class="sc-answer">\u2714 正确答案：${q.answer}</div>`;
    if (q.explanation) html += `<div class="sc-explain">\ud83d\udcdd ${escapeHtml(q.explanation)}</div>`;
    if (q.mnemonic) html += `<div class="sc-mnemonic">\ud83d\udca1 ${escapeHtml(q.mnemonic)}</div>`;
    html += '</div>';
  });

  document.getElementById('studyBody').innerHTML = html;
  window.scrollTo(0, 0);
}

// ===== WRONG BOOK (Quiz Mode) =====
function openWrongBook() {
  wrongQuizIds = Object.keys(answered).filter(k => !answered[k].correct).map(Number).sort((a, b) => a - b);
  if (wrongQuizIds.length === 0) {
    showToast('暂无错题');
    return;
  }

  isWrongQuizMode = true;
  wrongQuizPending = new Set(wrongQuizIds);
  currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function getWrongQuizQuestions() {
  return wrongQuizIds.map(id => ALL_QUESTIONS.find(q => q.id === id)).filter(Boolean);
}

// ===== FAVORITES (Quiz Mode) =====
function openFavorites() {
  favQuizIds = [...favorites].sort((a, b) => a - b);
  if (favQuizIds.length === 0) {
    showToast('暂无收藏');
    return;
  }

  isFavQuizMode = true;
  isWrongQuizMode = false;
  favQuizPending = new Set(favQuizIds);
  currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function getFavQuizQuestions() {
  return favQuizIds.map(id => ALL_QUESTIONS.find(q => q.id === id)).filter(Boolean);
}

// ===== NAVIGATION =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function goHome() {
  isWrongQuizMode = false;
  isFavQuizMode = false;
  wrongQuizIds = [];
  wrongQuizPending = new Set();
  favQuizIds = [];
  favQuizPending = new Set();
  showPage('homePage');
  renderBatchGrid();
  updateStats();
  window.scrollTo(0, 0);
}

// ===== CLEAR RECORDS =====
function showClearModal() {
  document.getElementById('modal').classList.add('show');
  document.getElementById('modalConfirmBtn').onclick = clearAllRecords;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function clearAllRecords() {
  answered = {};
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(PROGRESS_KEY);
  closeModal();
  renderBatchGrid();
  updateStats();
  showToast('已清空所有记录');
}

// ===== UTILS =====
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== START =====
init();
</script>
