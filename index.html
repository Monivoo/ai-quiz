<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI三级理论知识 - 1000题刷题系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --primary-bg: #eef2ff;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --warn: #f59e0b;
  --warn-bg: #fffbeb;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Header ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff;
  padding: 16px 20px;
  box-shadow: var(--shadow-md);
}
.header h1 {
  font-size: 18px; font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}
.header .subtitle {
  font-size: 12px; opacity: .85;
  text-align: center;
}

/* ===== Home Page ===== */
.page { display: none; }
.page.active { display: block; }

.home-section {
  padding: 16px;
}
.mode-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.mode-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .2s;
  border: 2px solid transparent;
  user-select: none;
}
.mode-card:active { transform: scale(.97); }
.mode-card.selected { border-color: var(--primary); background: var(--primary-bg); }
.mode-card .icon { font-size: 36px; margin-bottom: 8px; }
.mode-card .label { font-size: 16px; font-weight: 600; color: var(--gray-800); }
.mode-card .desc { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

.batch-title {
  font-size: 16px; font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.batch-title::before {
  content: '';
  width: 4px; height: 20px;
  background: var(--primary);
  border-radius: 2px;
}
.batch-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.batch-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  user-select: none;
}
.batch-card:active { transform: scale(.97); }
.batch-card .batch-num {
  font-size: 14px; font-weight: 700;
  color: var(--primary);
  margin-bottom: 2px;
}
.batch-card .batch-range {
  font-size: 12px; color: var(--gray-500);
}
.batch-card .batch-progress {
  margin-top: 8px;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  overflow: hidden;
}
.batch-card .batch-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 2px;
  transition: width .3s;
}
.batch-card .batch-stats {
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 4px;
}

/* ===== Quiz Mode ===== */
.quiz-header {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 90;
}
.quiz-back {
  background: none; border: none;
  font-size: 24px; color: var(--gray-600);
  cursor: pointer; padding: 4px 8px;
}
.quiz-progress-text {
  font-size: 14px; font-weight: 600;
  color: var(--gray-700);
}
.quiz-nav-btns {
  display: flex; gap: 6px;
}
.quiz-nav-btns button {
  background: var(--gray-100); border: 1px solid var(--gray-200);
  border-radius: 8px; padding: 6px 12px;
  font-size: 13px; color: var(--gray-600);
  cursor: pointer;
}
.quiz-nav-btns button:disabled { opacity: .4; }

.quiz-body {
  padding: 16px;
  padding-bottom: 100px;
}
.q-type-badge {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 10px;
}
.q-type-badge.single { background: #dbeafe; color: #1d4ed8; }
.q-type-badge.multi { background: #fce7f3; color: #be185d; }
.q-type-badge.judge { background: #fef3c7; color: #b45309; }

.q-text {
  font-size: 16px; font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 16px;
  line-height: 1.7;
}

.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-option {
  background: #fff;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 15px;
  color: var(--gray-700);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  user-select: none;
  line-height: 1.5;
}
.q-option:active { transform: scale(.98); }
.q-option .opt-label {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
  color: var(--gray-500);
  transition: all .15s;
}
.q-option.selected {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.q-option.selected .opt-label {
  background: var(--primary); color: #fff;
}
.q-option.correct {
  border-color: var(--success) !important;
  background: var(--success-bg) !important;
}
.q-option.correct .opt-label {
  background: var(--success) !important; color: #fff !important;
}
.q-option.wrong {
  border-color: var(--danger) !important;
  background: var(--danger-bg) !important;
}
.q-option.wrong .opt-label {
  background: var(--danger) !important; color: #fff !important;
}
.q-option.disabled { pointer-events: none; }

/* Multi-select confirm button */
.multi-confirm-wrap {
  margin-top: 12px;
  text-align: center;
  display: none;
}
.multi-confirm-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 32px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.multi-confirm-btn:disabled {
  opacity: .5;
}

/* Judge options */
.judge-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.judge-option {
  background: #fff;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.judge-option:active { transform: scale(.97); }
.judge-option.selected { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.judge-option.correct { border-color: var(--success) !important; background: var(--success-bg) !important; color: var(--success) !important; }
.judge-option.wrong { border-color: var(--danger) !important; background: var(--danger-bg) !important; color: var(--danger) !important; }
.judge-option.disabled { pointer-events: none; }

/* Result card */
.result-card {
  margin-top: 16px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-header {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.result-header.correct-header { background: var(--success-bg); color: var(--success); }
.result-header.wrong-header { background: var(--danger-bg); color: var(--danger); }
.result-answer {
  padding: 12px 16px;
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  border-bottom: 1px solid var(--gray-100);
}
.result-explanation {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.7;
  border-bottom: 1px solid var(--gray-100);
}
.result-mnemonic {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--warn);
  background: var(--warn-bg);
  line-height: 1.6;
}
.result-explanation strong, .result-mnemonic strong {
  font-weight: 700;
}

/* Bottom nav for quiz */
.quiz-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 90;
  box-shadow: 0 -2px 10px rgba(0,0,0,.05);
}
.quiz-bottom button {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
}
.quiz-bottom button:disabled { opacity: .4; }
.btn-prev { background: var(--gray-100); color: var(--gray-600); }
.btn-next { background: var(--primary); color: #fff; }
.btn-next:active { background: #4338ca; }
.quiz-counter {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 600;
}

/* ===== Study Mode ===== */
.study-header {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 90;
}
.study-back {
  background: none; border: none;
  font-size: 24px; color: var(--gray-600);
  cursor: pointer; padding: 4px 8px;
}
.study-title {
  font-size: 16px; font-weight: 600; color: var(--gray-800);
}

.study-body {
  padding: 12px;
  padding-bottom: 40px;
}
.study-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.study-card .sc-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-num {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.study-card .sc-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-800);
  line-height: 1.6;
}
.study-card .sc-options {
  padding: 8px 14px;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-opt {
  padding: 4px 0;
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.5;
}
.study-card .sc-opt.is-answer {
  color: var(--success);
  font-weight: 700;
}
.study-card .sc-answer {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  background: var(--primary-bg);
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-explain {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.6;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-mnemonic {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--warn);
  background: var(--warn-bg);
  line-height: 1.5;
}

/* ===== Action Buttons ===== */
.action-section {
  padding: 16px;
  padding-top: 8px;
}
.action-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  margin-bottom: 10px;
}
.action-btn:active { transform: scale(.98); }
.btn-clear {
  background: #fff;
  color: var(--danger);
  border: 1px solid var(--danger);
}

/* ===== Stats Bar ===== */
.stats-bar {
  background: #fff;
  margin: 0 16px 16px;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-around;
}
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.stat-num.green { color: var(--success); }
.stat-num.red { color: var(--danger); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.8);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  animation: slideUp .2s ease;
}
.modal-box h3 { font-size: 16px; color: var(--gray-800); margin-bottom: 8px; }
.modal-box p { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.modal-cancel { background: var(--gray-100); color: var(--gray-600); }
.modal-confirm { background: var(--danger); color: #fff; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 0; }

/* ===== Loading ===== */
.loading-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  color: #fff;
  transition: opacity .3s;
}
.loading-screen.fade-out { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 16px; font-weight: 600; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载题库...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">确认清空</h3>
    <p id="modalMsg">确定要清空所有做题记录吗？此操作不可恢复。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" id="modalConfirmBtn">确定清空</button>
    </div>
  </div>
</div>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="homePage">
  <div class="header">
    <h1>AI三级理论知识</h1>
    <div class="subtitle">总练习 1000 题刷题系统</div>
  </div>

  <!-- Stats -->
  <div style="padding:16px 16px 0">
    <div class="stats-bar" style="margin:0">
      <div class="stat-item">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">已做题数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num green" id="statCorrect">0</div>
        <div class="stat-label">答对</div>
      </div>
      <div class="stat-item">
        <div class="stat-num red" id="statWrong">0</div>
        <div class="stat-label">答错</div>
      </div>
      <div class="stat-item" onclick="openWrongBook()" style="cursor:pointer">
        <div class="stat-num red" id="statWrongBook">0</div>
        <div class="stat-label">错题集 &#9654;</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statRate" style="color:var(--warn)">0%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>
  </div>

  <div class="home-section">
    <!-- Mode Selection -->
    <div class="batch-title">选择模式</div>
    <div class="mode-cards">
      <div class="mode-card selected" id="modeQuiz" onclick="selectMode('quiz')">
        <div class="icon">&#9997;&#65039;</div>
        <div class="label">刷题模式</div>
        <div class="desc">选择答案立即判对错</div>
      </div>
      <div class="mode-card" id="modeStudy" onclick="selectMode('study')">
        <div class="icon">&#128214;</div>
        <div class="label">背题模式</div>
        <div class="desc">直接展示答案解析</div>
      </div>
    </div>

    <!-- Batch Selection -->
    <div class="batch-title">选择题库</div>
    <div class="batch-grid" id="batchGrid"></div>
  </div>

  <div class="action-section">
    <button class="action-btn btn-clear" onclick="showClearModal()">&#128465; 一键清空所有做题记录</button>
  </div>
</div>

<!-- ===== QUIZ PAGE ===== -->
<div class="page" id="quizPage">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">&#8592;</button>
    <span class="quiz-progress-text" id="quizProgressText"></span>
    <div class="quiz-nav-btns">
      <button onclick="jumpToQuestion()" title="跳转">&#128203;</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div style="height:3px;background:var(--gray-200);">
    <div id="quizProgressBar" style="height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));transition:width .3s;width:0"></div>
  </div>

  <div class="quiz-body" id="quizBody"></div>

  <div class="quiz-bottom">
    <button class="btn-prev" id="btnPrev" onclick="prevQuestion()">&#9664; 上一题</button>
    <span class="quiz-counter" id="quizCounter"></span>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 &#9654;</button>
  </div>
</div>

<!-- ===== STUDY PAGE ===== -->
<div class="page" id="studyPage">
  <div class="study-header">
    <button class="study-back" onclick="goHome()">&#8592;</button>
    <span class="study-title" id="studyTitle"></span>
  </div>
  <div class="study-body" id="studyBody"></div>
</div>

<!-- ===== WRONG BOOK PAGE ===== -->
<div class="page" id="wrongBookPage">
  <div class="study-header">
    <button class="study-back" onclick="goHome()">&#8592;</button>
    <span class="study-title" id="wrongBookTitle">错题集</span>
  </div>
  <div class="study-body" id="wrongBookBody"></div>
</div>

<script>
// ===== DATA =====
const ALL_QUESTIONS = [{"id":1,"type":"single","text":"数据整合的主要目的是（）。","options":[{"label":"A","text":"将分散的数据存储在同一个数据库中"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"将来自不同来源的数据进行合并和统一处理"},{"label":"D","text":"增强数据的安全性"}],"answer":"C","explanation":"数据整合通过ETL过程合并多源数据，增强数据功能和应用价值。","mnemonic":"整合=合并统一，多源数据合一选C"},{"id":2,"type":"single","text":"根据《中华人民共和国商标法》，下列哪类行为不属于商标侵权行为（）。","options":[{"label":"A","text":"未经商标注册人同意，更换其注册商标并将该更换商标的商品又投入市场"},{"label":"B","text":"销售侵犯注册商标专用权的商品"},{"label":"C","text":"使用注册商标中含有的本商品的通用名称"},{"label":"D","text":"未经许可在同一种商品上使用相同商标"}],"answer":"C","explanation":"商标法规定使用商品通用名称不侵权，其他行为均属侵权。","mnemonic":"通用名称大家用，不算侵权选C"},{"id":3,"type":"single","text":"在行为模型的交互流程里，哪个环节属于用户的输入行为？","options":[{"label":"A","text":"返回响应"},{"label":"B","text":"处理请求"},{"label":"C","text":"发送请求"},{"label":"D","text":"识别请求"}],"answer":"C","explanation":"在行为模型的交互过程中，用户的输入是指发送请求的过程，经过识别请求后，用户向系统发送请求，以获取相应的服务或信息","mnemonic":"用户输入就是\"发送请求\"，主动发出去选C"},{"id":4,"type":"single","text":"（）是逻辑回归算法中常用的损失函数。","options":[{"label":"A","text":"对数似然损失函数"},{"label":"B","text":"均方误差"},{"label":"C","text":"Hinge损失函数"},{"label":"D","text":"平均绝对误差"}],"answer":"A","explanation":"逻辑回归算法采用的是对数损失函数作为损失函数。该函数通过最小化预测概率与真实标签之间的差异，间接优化模型对正样本概率的预测能力。","mnemonic":"逻辑回归配对数，\"逻对\"谐音记住选A"},{"id":5,"type":"single","text":"在对用户进行分类时，专家型用户通常具有哪些特点？（）","options":[{"label":"A","text":"只关注产品的外观和品牌形象。"},{"label":"B","text":"需要大量指导才能完成基本操作。"},{"label":"C","text":"对产品非常熟悉，能够高效使用其所有功能。"},{"label":"D","text":"使用频率低，但对产品有较强的需求。"}],"answer":"C","explanation":"专家型用户是高度熟练的用户，对产品非常熟悉，能够充分利用其所有功能，甚至发现并利用一些隐藏的高级功能","mnemonic":"专家型=熟练+高效，样样精通选C"},{"id":6,"type":"single","text":"K 折交叉验证的核心思路是（）。","options":[{"label":"A","text":"根据训练集和测试集的误差调整模型参数，直到误差最小化"},{"label":"B","text":"对训练集数据进行重复采样得到多个子集，每个子集用于训练和测试，最终将结果平均化"},{"label":"C","text":"将多个模型的输出结果加权融合，得到最终预测结果"},{"label":"D","text":"将数据集分为K个部分，每次将其中一个部分作为测试集，其余部分作为训练集，重复K次"}],"answer":"D","explanation":"K折交叉验证的基本思想是将数据集分为K个部分，每次将其中一个部分作为测试集，其余部分作为训练集，重复K次","mnemonic":"K折=分K份轮流当测试，选D不选B（B是重复采样）"},{"id":7,"type":"single","text":"下列哪种行为没有违背《中华人民共和国个人信息保护法》的条款？","options":[{"label":"A","text":"未经个人同意，将个人的姓名、身份证号码等敏感信息公开在互联网上。"},{"label":"B","text":"未经个人同意，将个人的电话号码、地址等联系方式提供给第三方公司进行推销活动。"},{"label":"C","text":"某企业在其公司网站上公布待招聘的岗位职称、工资水平等信息。"},{"label":"D","text":"未经个人同意，向第三方公司出售个人的健康记录和医疗历史。"}],"answer":"C","explanation":"根据《中华人民共和国个人信息保护法》，个人的职务和工资水平不属于个人敏感信息范畴，因此未经个人同意在公司内部网站上公布员工的职务和工资水平不违反该法律。然而，其他选项中的行为均涉及个人敏感信息的处理和共享，未经个人同意将属于违反《中华人民共和国个人信息保护法》的行为。","mnemonic":"公布岗位工资是公开信息，不涉及个人隐私选C"},{"id":8,"type":"single","text":"数据库管理系统（DBMS）指的是什么（）。","options":[{"label":"A","text":"一种数据存储格式"},{"label":"B","text":"一种网络协议"},{"label":"C","text":"一种软件工具"},{"label":"D","text":"一种硬件设备"}],"answer":"C","explanation":"数据库管理系统（DBMS）是一种软件工具，用于管理和组织数据库中的数据。它提供了数据存储、数据查询、数据修改和数据安全等功能。","mnemonic":"DBMS是软件工具，不是硬件也不是协议选C"},{"id":9,"type":"single","text":"在 Python 中，（）函数可以对图像实施中值滤波处理。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.GaussianBlur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"D","explanation":"在Python中，可以使用cv2.medianBlur()函数对图像进行中值滤波处理","mnemonic":"中值滤波=medianBlur，median就是中值选D"},{"id":10,"type":"single","text":"1969 年，贝尔实验室研发出的计算机操作系统是什么（）。","options":[{"label":"A","text":"Unix"},{"label":"B","text":"Linux"},{"label":"C","text":"MacOS"},{"label":"D","text":"Windows"}],"answer":"A","explanation":"Unix是最早的计算机操作系统之一，于1969年由贝尔实验室开发。","mnemonic":"1969贝尔=Unix，谐音\"优你可思\"选A"},{"id":11,"type":"single","text":"图像处理中的卷积操作具体指的是（）。","options":[{"label":"A","text":"图像的旋转"},{"label":"B","text":"图像的缩放"},{"label":"C","text":"图像的滤波"},{"label":"D","text":"图像的修复"}],"answer":"C","explanation":"卷积操作通过核函数与图像卷积实现滤波效果。","mnemonic":"卷积=滤波，卷积核滑过图像做滤波选C"},{"id":12,"type":"single","text":"在 GOMS 模型中，选择规则（Selection rules）的作用是什么？","options":[{"label":"A","text":"记录用户的操作时间"},{"label":"B","text":"指导用户选择具体的方法"},{"label":"C","text":"描述用户的目标"},{"label":"D","text":"确定用户的心理状态"}],"answer":"B","explanation":"选择规则是GOMS模型中的一个组成部分，用于指导用户在面对多种可能的方法时，如何选择最合适的方法来达成目标","mnemonic":"Selection选择规则=指导选方法，\"选\"对\"选\"选B"},{"id":13,"type":"single","text":"支持向量机算法的原理是建立在（）基础上的。","options":[{"label":"A","text":"最小二乘法"},{"label":"B","text":"线性回归"},{"label":"C","text":"最大熵模型"},{"label":"D","text":"最大间隔"}],"answer":"D","explanation":"支持向量机通过最大化分类间隔寻找最优分类超平面。","mnemonic":"SVM=最大间隔，支持向量撑开最大距离选D"},{"id":14,"type":"single","text":"图像增强里的对比度增强属于哪一类型的增强（）。","options":[{"label":"A","text":"光学增强"},{"label":"B","text":"空域增强"},{"label":"C","text":"频域增强"},{"label":"D","text":"几何增强"}],"answer":"B","explanation":"空域法是直接作用于图像像素改变其固有特性的图像增强方法，以灰度映射为基础，通过改变图像灰度的动态范围，有效提升了图像的对比度和细节信息","mnemonic":"对比度增强=空域增强，直接改像素灰度值选B"},{"id":15,"type":"single","text":"指导初级工标注文本数据时，应当注意（）问题。","options":[{"label":"A","text":"按照标注规范进行标注即可，无需关注其它问题"},{"label":"B","text":"标注文本时要注意同类标注属性需保持一致"},{"label":"C","text":"标注时应该随意忽略文本中的错别字和语病"},{"label":"D","text":"忽略文本样式和格式，只关注文本内容"}],"answer":"B","explanation":"在标注文本数据时，初级工应该注意同类标注属性需保持一致，避免存在不同的标注结果","mnemonic":"标注一致性最重要，同类属性要统一选B"},{"id":16,"type":"single","text":"下列哪项能表示递归地将字符串切半且仅执行常数时间操作的时间复杂度（）。","options":[{"label":"A","text":"O(n²)"},{"label":"B","text":"O(n)"},{"label":"C","text":"O(logn)"},{"label":"D","text":"O(1)"}],"answer":"C","explanation":"递归分半操作（如二分搜索）时间复杂度为O(logn)。","mnemonic":"递归切半=二分=O(logn)，log就是对半砍选C"},{"id":17,"type":"single","text":"对比分析的作用是比较不同组别或对象之间存在的（）。","options":[{"label":"A","text":"趋势"},{"label":"B","text":"分布"},{"label":"C","text":"差异"},{"label":"D","text":"相关性"}],"answer":"C","explanation":"对比分析揭示不同组别间差异。","mnemonic":"对比分析比的是\"差异\"，有比较才有差异选C"},{"id":18,"type":"single","text":"业务流程重组（BPR）与信息技术（IT）之间的关系可以怎样描述（）。","options":[{"label":"A","text":"BPR完全依赖于IT"},{"label":"B","text":"BPR与IT相互独立"},{"label":"C","text":"BPR在某些情况下可以独立于IT"},{"label":"D","text":"BPR和IT是完全相同的概念"}],"answer":"C","explanation":"业务流程重组（BPR）可以独立于信息技术（IT）而存在，但这种独立是相对的。在BPR实施过程中，IT作为技术工具，可以促进BPR的实施，起到催化剂的作用。因此，选项C正确描述了BPR与IT之间的关系。选项A、B和D都没有准确反映这种关系。","mnemonic":"BPR某些情况可独立于IT，不完全依赖选C"},{"id":19,"type":"single","text":"在图像数据处理流程中，首先要进行的步骤是（）。","options":[{"label":"A","text":"模型构建"},{"label":"B","text":"数据预处理"},{"label":"C","text":"特征提取"},{"label":"D","text":"模型训练"}],"answer":"B","explanation":"图像处理首先进行预处理（如归一化、去噪、裁剪和缩放），以提升数据质量，支持后续特征提取和模型训练。","mnemonic":"图像处理第一步=数据预处理，先洗数据再干活选B"},{"id":20,"type":"single","text":"RFM 模型里的 “R” 所指代的是（）。","options":[{"label":"A","text":"客户的满意度"},{"label":"B","text":"客户的消费金额"},{"label":"C","text":"客户购买的频率"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"D","explanation":"RFM模型中，R代表了最近一次购买时间间隔，指用户最近一次消费时间距离现在的时间间隔，这个指标可以反映出客户的购买意愿。","mnemonic":"RFM的R=Recency=最近一次购买时间间隔选D"},{"id":21,"type":"single","text":"在现代操作系统的各项特性里，最为关键的特性是（）。","options":[{"label":"A","text":"虚拟性"},{"label":"B","text":"异步性"},{"label":"C","text":"共享性"},{"label":"D","text":"并发性"}],"answer":"D","explanation":"现代操作系统应该具备并发性、共享性、异步性和虚拟性四种最基本特性，其中并发性是最重要的特性","mnemonic":"操作系统最关键=并发性，\"并\"排第一选D"},{"id":22,"type":"single","text":"下列哪项不属于计算机的特点（）。","options":[{"label":"A","text":"可拓展性强"},{"label":"B","text":"自动化程度高"},{"label":"C","text":"运算速度快"},{"label":"D","text":"存储功能强"}],"answer":"A","explanation":"计算机的特点主要体现在运转速度快、运算精度高、存储功能强、具有逻辑判断能力、自动化程度高。","mnemonic":"可拓展性不属于计算机经典五大特点选A"},{"id":23,"type":"single","text":"在图像增强过程中，下列主要用于图像分解的是（）。","options":[{"label":"A","text":"低通滤波"},{"label":"B","text":"高通滤波"},{"label":"C","text":"小波变换"},{"label":"D","text":"同态滤波"}],"answer":"C","explanation":"小波变换用于图像多尺度分解，低通滤波去噪，高通滤波保留细节，同态滤波处理照明和反射分量。","mnemonic":"小波变换=分解，\"小波分家\"记住选C"},{"id":24,"type":"single","text":"以下哪种行为触犯了《中华人民共和国个人信息保护法》的规定？","options":[{"label":"A","text":"个人同意将手机号码授权给某企业，但该企业将该号码出售给第三方公司。"},{"label":"B","text":"个人在某电商平台上购买商品时，需要提供姓名、地址等信息。"},{"label":"C","text":"某医疗机构公布患者病历信息，但已经对患者姓名等信息进行脱敏处理。"},{"label":"D","text":"某企业在其公司网站上公布待招聘的岗位职称、工资水平等信息。"}],"answer":"A","explanation":"根据《中华人民共和国个人信息保护法》第十条规定，任何组织、个人不得非法收集、使用、加工、传输他人个人信息，不得非法买卖、提供或者公开他人个人信息；不得从事危害国家安全、公共利益的个人信息处理活动，A选项该企业将手机号码出售给第三方公司，违反了相关法律规定。","mnemonic":"授权给A却被A卖给B=违法转卖个人信息选A"},{"id":25,"type":"single","text":"在业务流程重组（BPR）中，以下哪项关键成功因素最有利于保证项目顺利实施（）。","options":[{"label":"A","text":"减少跨部门沟通"},{"label":"B","text":"强化员工对变革的恐惧感"},{"label":"C","text":"确保流程设计符合客户需求"},{"label":"D","text":"增加项目实施的复杂性"}],"answer":"C","explanation":"在业务流程重组（BPR）中，确保流程设计符合客户需求（B选项）是确保项目顺利实施的关键成功因素之一","mnemonic":"BPR关键=符合客户需求，客户至上选C"},{"id":26,"type":"single","text":"在计算机执行计算的基础硬件部件里，处于核心地位的组成部分是（）。","options":[{"label":"A","text":"输入设备"},{"label":"B","text":"输出设备"},{"label":"C","text":"CPU（中央处理单元）"},{"label":"D","text":"存储器"}],"answer":"C","explanation":"计算机的CPU（中央处理单元）、存储器、输入/输出设备是计算机执行计算的基础硬件部件。CPU是计算机最核心的组成部分，它负责执行运算和控制指令，是计算能力的直接体现。","mnemonic":"CPU是计算机的大脑和核心选C"},{"id":27,"type":"single","text":"若某算法的时间复杂度为 O (nlogn)，则其效率会高于具有（）算法复杂度的算法。","options":[{"label":"A","text":"O(logn)"},{"label":"B","text":"O(n²)"},{"label":"C","text":"O(n)"},{"label":"D","text":"O(1)"}],"answer":"B","explanation":"根据时间复杂度理论，O(nlogn) 的效率高于 O(n²)，但低于 O(1)、O(logn) 和 O(n)","mnemonic":"O(nlogn)比O(n²)快，n²最慢所以效率高于它选B"},{"id":28,"type":"single","text":"不属于人机交互设计中的核心原则的是（）？","options":[{"label":"A","text":"橙皮书原则"},{"label":"B","text":"一致性原则"},{"label":"C","text":"反馈原则"},{"label":"D","text":"可见性原则"}],"answer":"A","explanation":"橙皮书原则与药品相关，非人机交互原则。","mnemonic":"橙皮书是药品相关，跟人机交互无关选A"},{"id":29,"type":"single","text":"制定数据标注流程时，第一步应该做什么（）。","options":[{"label":"A","text":"明确数据标注的目的"},{"label":"B","text":"选择适合的工具和设备"},{"label":"C","text":"招募标注人员"},{"label":"D","text":"制定标注规则"}],"answer":"A","explanation":"确定数据标注目的有助于制定清晰合理的流程，保证标注结果的有效性和可靠性。","mnemonic":"标注流程第一步=明确目的，先想清楚为什么选A"},{"id":30,"type":"single","text":"下列哪种行为符合诚实公正这一基本要求（）。","options":[{"label":"A","text":"利用他人的弱点谋取个人利益"},{"label":"B","text":"基于客观事实做出决策和评估"},{"label":"C","text":"故意虚假陈述或隐瞒事实"},{"label":"D","text":"说谎来避免责任"}],"answer":"B","explanation":"诚实公正要求从业者公平对待各方，依据客观事实和公正标准决策评估。","mnemonic":"诚实公正=基于客观事实，实事求是选B"},{"id":31,"type":"single","text":"以下属于数据库管理系统主要功能的是（）。","options":[{"label":"A","text":"支持数据定义与操纵"},{"label":"B","text":"管理操作系统文件"},{"label":"C","text":"提供数据可视化图表"},{"label":"D","text":"控制硬件资源分配"}],"answer":"A","explanation":"数据库管理系统的主要功能包括数据定义，数据操纵，数据组织、存储和管理，数据库运行管理、数据库的建立和维护功能和其他功能。","mnemonic":"DBMS核心=数据定义与操纵，DDL+DML选A"},{"id":32,"type":"single","text":"GOMS 模型无法考虑到哪些因素？","options":[{"label":"A","text":"心理特征"},{"label":"B","text":"交互细节"},{"label":"C","text":"个体差异"},{"label":"D","text":"人类记忆机制"}],"answer":"C","explanation":"GOMS模型无法考虑个体差异，但涵盖心理特征和交互细节。","mnemonic":"GOMS不考虑个体差异，模型统一不分人选C"},{"id":33,"type":"single","text":"在图形用户界面设计过程中，遵循前期确定的设计规范且使用一致的描述词语，这所依据的设计原则是（）。","options":[{"label":"A","text":"美观性"},{"label":"B","text":"性能优化"},{"label":"C","text":"用户反馈"},{"label":"D","text":"一致性"}],"answer":"D","explanation":"一致性设计原则确保界面元素统一，提升用户操作效率和体验。","mnemonic":"设计规范+一致描述=一致性原则选D"},{"id":34,"type":"single","text":"在产品设计中，可用性设计的主要目的是（）。","options":[{"label":"A","text":"可以提高用户体验"},{"label":"B","text":"可以节省产品设计成本"},{"label":"C","text":"可以快速推广产品"},{"label":"D","text":"可以提高产品的安全性"}],"answer":"A","explanation":"可用性设计的核心目标是提升用户体验，使得用户在使用过程中能够高效、愉快地完成任务，并对产品产生正向的情感反馈。虽然良好的可用性设计可以在后期减少维护成本，但节省成本不是可用性设计的直接目的，节省成本更多是设计过程中其他方面的目标。市场份额的增加是产品成功的结果，尽管可用性设计可以帮助产品更好地被用户接受，但它本身并不是针对市场份额的目标。安全性是一个独立的设计目标，与可用性设计并不直接相关。虽然安全性对用户体验至关重要，但它是其他专门设计领域的关注重点。","mnemonic":"可用性设计=提高用户体验，用着舒服选A"},{"id":35,"type":"single","text":"以下选项中，不属于用人单位无需提前三十日书面通知就能合法解除劳动合同的情形是（）。","options":[{"label":"A","text":"被依法追究刑事责任的"},{"label":"B","text":"严重违反劳动纪律或者用人单位规章制度的"},{"label":"C","text":"劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的"},{"label":"D","text":"在试用期间被证明不符合录用条件的"}],"answer":"C","explanation":"根据《中华人民共和国劳动法》第二十五条规定，劳动者有下列情形之一的，用人单位可以解除劳动合同：（一）在试用期间被证明不符合录用条件的；（二）严重违反劳动纪律或者用人单位规章制度的；（三）严重失职，营私舞弊，对用人单位利益造成重大损害的；（四）被依法追究刑事责任的","mnemonic":"不能胜任需提前30天通知，其他三项可立即解除选C"},{"id":36,"type":"single","text":"从指标构成角度进行拆解，指的是什么（）。","options":[{"label":"A","text":"将问题进行归纳总结，形成一个总结树。"},{"label":"B","text":"将问题进行分类，形成一个分类树。"},{"label":"C","text":"先进行细分，再将问题进行分层。"},{"label":"D","text":"从指标的定义来看指标的构成"}],"answer":"D","explanation":"从指标构成来拆解是指从指标的定义来看指标的构成","mnemonic":"指标构成拆解=从定义看构成选D"},{"id":37,"type":"single","text":"下列哪项属于人机交互所具备的优点？","options":[{"label":"A","text":"减少用户参与度"},{"label":"B","text":"可以让人与机器更加独立"},{"label":"C","text":"可以提高工作效率"},{"label":"D","text":"可以让人完全依赖于机器"}],"answer":"C","explanation":"人机交互的优点包括提高工作效率，而非减少参与度或完全依赖机器。","mnemonic":"人机交互优点=提高工作效率，人机配合更快选C"},{"id":38,"type":"single","text":"下列哪项操作能够降低模型的过拟合程度（）。","options":[{"label":"A","text":"不进行特征选择"},{"label":"B","text":"减小正则化参数"},{"label":"C","text":"增加训练数据量"},{"label":"D","text":"增加模型复杂度"}],"answer":"C","explanation":"D错误。增加模型复杂度通常是解决欠拟合的问题，而不是过拟合。当模型过于复杂时，它更容易在训练数据上过拟合，因此不应该增加模型复杂度来减少过拟合。","mnemonic":"增加训练数据=降低过拟合，数据越多越不容易死记硬背选C"},{"id":39,"type":"single","text":"在 K - 近邻算法中，当 K=1 时，对于一个待分类的样本，它的类别会等同于（）。","options":[{"label":"A","text":"训练集中出现最多的类别"},{"label":"B","text":"待分类样本自身的类别"},{"label":"C","text":"所有样本共同决定的类别"},{"label":"D","text":"距离其最近的样本的类别"}],"answer":"D","explanation":"在K-近邻算法中，当K=1时，待分类样本的类别将等于距离其最近的样本的类别。这是因为K=1表示只考虑最近的一个邻居样本，该样本的类别直接决定待分类样本的类别。","mnemonic":"K=1只看最近的一个邻居，最近的说了算选D"},{"id":40,"type":"single","text":"在对比分析的过程中，选择合适的什么是极为关键的步骤（）。","options":[{"label":"A","text":"根节点"},{"label":"B","text":"数值"},{"label":"C","text":"父节点"},{"label":"D","text":"对比标准"}],"answer":"D","explanation":"在对比分析过程中，选择合适的对比标准是十分关键的步骤","mnemonic":"对比分析关键=选对比标准，没有尺子怎么量选D"},{"id":41,"type":"single","text":"人机交互指的是人与计算机之间的信息交流及操作方式，下列哪项描述了人机交互的基本原则？","options":[{"label":"A","text":"用户友好"},{"label":"B","text":"高性能硬件"},{"label":"C","text":"数据安全"},{"label":"D","text":"代码编写技巧"}],"answer":"A","explanation":"人机交互的核心原则是用户友好，关注用户体验和高效操作。","mnemonic":"人机交互基本原则=用户友好，以人为本选A"},{"id":42,"type":"single","text":"下列哪项情况能够判断算法存在过拟合问题（）。","options":[{"label":"A","text":"模型在不同的验证集上表现一致，且在每个验证集上误差较低"},{"label":"B","text":"交叉验证的结果显示，训练误差明显低于验证误差"},{"label":"C","text":"训练集和测试集的特征分布相似"},{"label":"D","text":"使用较低的正则化强度，导致训练集上误差明显提高"}],"answer":"B","explanation":"训练误差远低于验证误差表明模型可能过拟合，泛化能力不足。","mnemonic":"训练误差小测试误差大=过拟合，考试抄答案选B"},{"id":43,"type":"single","text":"职业道德的核心要素中，不包含的是（）。","options":[{"label":"A","text":"尊重他人权利和尊严"},{"label":"B","text":"严守保密原则和隐私权"},{"label":"C","text":"追求个人利益最大化"},{"label":"D","text":"保持学习和提升专业能力"}],"answer":"C","explanation":"职业道德的基本要素涵盖专业行为、诚信诚实、尊重公正、保密隐私、社会责任及持续学习等","mnemonic":"职业道德不含追求个人利益最大化，公不为私选C"},{"id":44,"type":"single","text":"1946 年，美国宾夕法尼亚大学的约翰・莫奇利与哪位科学家一同发明了世界上第一台通用电子计算机 ENIAC（）。","options":[{"label":"A","text":"李约瑟"},{"label":"B","text":"普雷斯珀・埃克特"},{"label":"C","text":"诺贝尔"},{"label":"D","text":"爱迪生"}],"answer":"B","explanation":"世界上第一台通用电子计算机 ENIAC 是在1946年由美国宾夕法尼亚大学的约翰・莫奇利和J.普雷斯珀・埃克特发明。","mnemonic":"ENIAC发明者=莫奇利+埃克特，\"埃克特\"谐音\"额客特\"选B"},{"id":45,"type":"single","text":"PEST 模型中的 “政治” 因素涉及（）方面。","options":[{"label":"A","text":"人才储备、竞争力、专利技术和知识产权"},{"label":"B","text":"社会心理、消费习惯、文化差异和地理位置"},{"label":"C","text":"同行竞争、技术变革、市场规模和市场趋势"},{"label":"D","text":"政府政策、法律法规、税收政策、政治稳定性"}],"answer":"D","explanation":"PEST模型中政治因素包括政策、法规、税收及稳定性。","mnemonic":"PEST的P=Political=政府政策法律税收选D"},{"id":46,"type":"single","text":"在行为模型的交互流程中，下列哪项描述了行为模型与环境之间进行信息交换的方式？","options":[{"label":"A","text":"决策树的建立和优化"},{"label":"B","text":"强化学习的奖励函数"},{"label":"C","text":"学习算法的选择"},{"label":"D","text":"观察-行动-评估循环"}],"answer":"D","explanation":"观察-行动-评估循环是描述行为模型与环境之间信息交流的方法","mnemonic":"观察-行动-评估循环=行为模型与环境交互方式选D"},{"id":47,"type":"single","text":"关于数据标注流程的制定，下列说法不正确的是（）。","options":[{"label":"A","text":"每次标注可以安排多个标注人员进行，以保证标注结果的准确性"},{"label":"B","text":"标注过程中应该尽量减少标注人员之间的交流"},{"label":"C","text":"标注人员的选拔和培训非常重要"},{"label":"D","text":"合理的数据标注流程可以有效提高算法的训练效果"}],"answer":"B","explanation":"标注过程中适当交流有助于统一标准，提高准确性。","mnemonic":"标注人员应多交流统一标准，减少交流是错的选B"},{"id":48,"type":"single","text":"分析机这种机械式通用计算机，其设计者是英国数学家谁（）。","options":[{"label":"A","text":"亚当·欧泽尼斯基"},{"label":"B","text":"查理斯·巴贝奇"},{"label":"C","text":"史蒂夫·乔布斯"},{"label":"D","text":"比尔·盖茨"}],"answer":"B","explanation":"分析机是由英国数学家查尔斯·巴贝奇设计的一种机械式通用计算机。","mnemonic":"分析机=巴贝奇，\"巴巴\"分析选B"},{"id":49,"type":"single","text":"哪个步骤可以结合人工智能技术，为自己负责的业务线提出具有前瞻性的业务发展规划建议？（）","options":[{"label":"A","text":"前期准备"},{"label":"B","text":"实践训练"},{"label":"C","text":"课堂演练"},{"label":"D","text":"业务设计"}],"answer":"D","explanation":"业务设计环节能够结合人工智能技术为所负责的业务线提出具有前瞻性的业务发展规划建议。","mnemonic":"业务设计环节结合AI提出前瞻规划选D"},{"id":50,"type":"single","text":"以下对数据仓库的描述，正确的是（）。","options":[{"label":"A","text":"数据仓库主要用于实时数据交易处理，支持高并发的读写操作"},{"label":"B","text":"数据仓库是一个面向主题的、集成的、相对稳定的、反映历史变化的数据集合，主要用于支持决策分析"},{"label":"C","text":"数据仓库是数据的临时存储，主要用于数据的快速缓存和读取"},{"label":"D","text":"数据仓库主要用于存储和管理操作系统文件，支持文件的高效访问"}],"answer":"B","explanation":"数据仓库是面向主题、集成且稳定的数据集合，用于历史数据分析和决策支持，不同于临时存储。","mnemonic":"数据仓库=面向主题+集成+稳定+历史，支持决策选B"},{"id":51,"type":"single","text":"下列哪一项属于中级培训的知识点（）。","options":[{"label":"A","text":"培训与指导"},{"label":"B","text":"算法测试"},{"label":"C","text":"智能系统优化"},{"label":"D","text":"人机交互程序设计"}],"answer":"C","explanation":"智能系统优化是中级培训的知识点。","mnemonic":"中级培训=智能系统优化，中级搞优化选C"},{"id":52,"type":"single","text":"进行人机交互界面设计时，状态转移网络（STN）所存在的一个主要缺陷是（）。","options":[{"label":"A","text":"它的状态转换过程完全不依赖于事件驱动"},{"label":"B","text":"它完全不适用于小型系统设计"},{"label":"C","text":"它需要明确列出所有可能的系统状态，状态的数量会急剧增加"},{"label":"D","text":"它能很好地描述并发行为和多任务交互"}],"answer":"C","explanation":"D项错误：状态转换网络（STN）擅长描述串行和顺序行为，但对并发行为和多任务交互的描述能力较差。","mnemonic":"STN缺陷=状态数量爆炸，状态太多管不过来选C"},{"id":53,"type":"single","text":"对于专家型用户而言，菜单系统的响应速度应该具有以下哪项特点？（）","options":[{"label":"A","text":"快速响应"},{"label":"B","text":"缓慢响应"},{"label":"C","text":"慢慢响应"},{"label":"D","text":"无所谓响应速度"}],"answer":"A","explanation":"专家型用户需要快速响应的菜单系统以提高效率。","mnemonic":"专家用户要快速响应，高手不等人选A"},{"id":54,"type":"single","text":"计算机在医学影像处理方面的应用，属于哪个领域（）。","options":[{"label":"A","text":"网络应用"},{"label":"B","text":"图形图像处理"},{"label":"C","text":"科学计算"},{"label":"D","text":"文本处理"}],"answer":"B","explanation":"计算机在医学影像处理中的应用属于图形图像处理领域。计算机可以对医学影像进行数字化处理，提高影像的清晰度和准确度，对医学诊断和治疗起到了重要作用。","mnemonic":"医学影像=图形图像处理，影像就是图像选B"},{"id":55,"type":"single","text":"K 折交叉验证中的 K 表示的是什么含义（）。","options":[{"label":"A","text":"数据集被划分的块数"},{"label":"B","text":"数据集的划分倍数"},{"label":"C","text":"测试集所占数据集的比例"},{"label":"D","text":"训练集和测试集的数据量之比"}],"answer":"A","explanation":"K折交叉验证将数据集划分为K个块，每次将其中一个块作为测试集，其余块作为训练集，重复K次","mnemonic":"K折的K=数据集分成K块选A"},{"id":56,"type":"single","text":"下列哪项并非文件所具有的属性（）。","options":[{"label":"A","text":"名称"},{"label":"B","text":"文件大小"},{"label":"C","text":"文件创建时间"},{"label":"D","text":"文件内容"}],"answer":"D","explanation":"文件的基本属性包括名称、类型、创建者、位置、大小、创建时间等。","mnemonic":"文件内容不是文件属性，属性是描述信息选D"},{"id":57,"type":"single","text":"在特征选择方法中，哪项通常依据特征与目标变量之间的相关性来进行特征选择（）。","options":[{"label":"A","text":"过滤式方法"},{"label":"B","text":"包裹式方法"},{"label":"C","text":"嵌入式方法"},{"label":"D","text":"主成分分析"}],"answer":"A","explanation":"过滤式方法（Filter Method）是通过评估各个特征与目标变量之间的相关性（如通过相关系数、卡方检验、信息增益等统计方法）来选择最相关的特征，通常独立于任何机器学习模型。因此，选项A是正确的。包裹式方法（Wrapper Method）通过使用特定的学习算法来评估特征子集的性能，选择对模型表现最有利的特征。嵌入式方法（Embedded Method）在训练模型的过程中同时进行特征选择，常见的如L1正则化（Lasso）和决策树等模型。主成分分析（PCA）是一种降维技术，而不是特征选择方法，虽然它也涉及特征的重要性评估，但其目的在于将数据投影到较低维度空间，而非直接选择特征。","mnemonic":"过滤式=看相关性筛特征，像筛子过滤选A"},{"id":58,"type":"single","text":"在神经网络里，下列类网络适合处理序列数据和时序信息（）。","options":[{"label":"A","text":"GAN(GenerativeAdversarialNetwork)"},{"label":"B","text":"MLP(Multi-LayerPerceptron)"},{"label":"C","text":"CNN(ConvolutionalNeuralNetwork)"},{"label":"D","text":"RNN(RecurrentNeuralNetwork)"}],"answer":"D","explanation":"RNN是一种适合处理序列数据和时序信息的神经网络","mnemonic":"RNN处理序列，R=Recurrent=循环=时序选D"},{"id":59,"type":"single","text":"职业道德的实践目标在于（）。","options":[{"label":"A","text":"改善职业实践者的工作条件"},{"label":"B","text":"提高职业实践者的薪资待遇"},{"label":"C","text":"保护公民的利益和权益"},{"label":"D","text":"保护职业从业者的个人利益"}],"answer":"C","explanation":"职业道德的根本目标是维护公众的权利和利益，要求从业者恪守职业规范，确保行为不对他人造成损害。","mnemonic":"职业道德目标=保护公民利益权益，为民服务选C"},{"id":60,"type":"single","text":"在下列语音信号处理方法中，主要用于去除语音信号中背景噪声的是（）。","options":[{"label":"A","text":"语音活动检测"},{"label":"B","text":"动态时间规整"},{"label":"C","text":"谱减法"},{"label":"D","text":"线性预测编码"}],"answer":"C","explanation":"A. 线性预测编码（LPC）是一种特征提取方法，主要用于描述语音信号的声道模型，并不直接用于去噪","mnemonic":"谱减法去背景噪声，\"谱\"减去噪声的\"谱\"选C"},{"id":61,"type":"single","text":"在关联分析所使用的算法中，通过基于频繁模式树的方式来发现频繁项集的是（）。","options":[{"label":"A","text":"Eclat算法"},{"label":"B","text":"FP-growth算法"},{"label":"C","text":"Apriori算法"},{"label":"D","text":"K-means算法"}],"answer":"B","explanation":"FP-growth算法通过频繁模式树高效发现频繁项集。","mnemonic":"FP-growth=频繁模式树，FP=Frequent Pattern选B"},{"id":62,"type":"single","text":"在聚类效果评估中，仅考虑簇内相似度来衡量聚类质量的指标是（）。","options":[{"label":"A","text":"戴维森堡丁指数"},{"label":"B","text":"紧密性"},{"label":"C","text":"轮廓系数"},{"label":"D","text":"间隔性"}],"answer":"B","explanation":"紧密性指标评估类内样本间的平均距离等。","mnemonic":"紧密性=只看簇内，\"紧\"=内部紧凑选B"},{"id":63,"type":"single","text":"在业务流程重组（BPR）中，下列哪一项不是造成项目失败的主要原因（）。","options":[{"label":"A","text":"流程重组后缺乏对员工的奖励机制"},{"label":"B","text":"组织对变革的抗拒"},{"label":"C","text":"不切实际的实施范围与期望"},{"label":"D","text":"缺乏高层管理人员的支持和参与"}],"answer":"A","explanation":"高层管理人员的支持对于BPR的成功至关重要，他们的参与可以确保项目获得必要的资源和关注。如果项目的范围过于广泛或期望过高，可能导致项目难以实现预定目标。员工和管理层可能对变革持保守态度，这种抗拒会阻碍BPR的实施。","mnemonic":"缺乏奖励机制不是BPR失败主因，其余三项才是选A"},{"id":64,"type":"single","text":"留出法与交叉验证法的不同点在于（）。","options":[{"label":"A","text":"留出法只使用训练集训练模型，交叉验证法同时使用训练集和测试集训练模型"},{"label":"B","text":"留出法不考虑数据分布的问题，交叉验证法考虑数据分布"},{"label":"C","text":"留出法只适用于二分类问题，交叉验证法适用于多分类问题"},{"label":"D","text":"留出法基于单次划分，但往往需多次随机划分取平均，交叉验证法通过k折结构系统划分"}],"answer":"D","explanation":"留出法和交叉验证法都是常用的模型评估方法，不同之处在于留出法只划分一次数据集，将数据集分为训练集和测试集，最终的模型评估结果的平均值就是测试集的评估结果，由于单次划分可能导致结果波动（如不同随机种子影响），实际应用中需通过​​多次随机划分并取平均​​（如100次）提升稳定性","mnemonic":"留出法单次划分多次取均，交叉验证K折系统划分选D"},{"id":65,"type":"single","text":"追求卓越所需要遵循的基本要求是（）。","options":[{"label":"A","text":"持续改进"},{"label":"B","text":"忽视细节"},{"label":"C","text":"缺乏规划"},{"label":"D","text":"保持现状"}],"answer":"A","explanation":"追求卓越的基本要求是高标准要求、持续改进、创造创新、追求专业素养和发挥潜力。A选项符合题意。","mnemonic":"追求卓越=持续改进，越来越好选A"},{"id":66,"type":"single","text":"在机器学习领域，当出现（）情况时，说明算法发生了过拟合。","options":[{"label":"A","text":"训练集的误差和测试集的误差都很小"},{"label":"B","text":"训练集和测试集的误差都很大"},{"label":"C","text":"训练集的误差很小，但测试集的误差很大"},{"label":"D","text":"训练集和测试集的误差相差很小"}],"answer":"C","explanation":"过拟合表现为训练误差小、测试误差大。","mnemonic":"过拟合=训练好测试差，背答案不会举一反三选C"},{"id":67,"type":"single","text":"3. 在Python中，可用于将文本转换为TF-IDF模型的类是（）。","options":[{"label":"A","text":"TfidfVectorizer"},{"label":"B","text":"HashingVectorizer"},{"label":"C","text":"DictVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"A","explanation":"TfidfVectorizer类用于将文本转为TF-IDF模型。","mnemonic":"TF-IDF转换用TfidfVectorizer，名字直接对应选A"},{"id":68,"type":"single","text":"深度神经网络里，反向传播算法的主要功能是（）。","options":[{"label":"A","text":"调整学习率以加速训练"},{"label":"B","text":"通过正则化防止过拟合"},{"label":"C","text":"计算损失函数对网络参数的梯度"},{"label":"D","text":"计算激活函数的输出"}],"answer":"C","explanation":"反向传播算法（Backpropagation）是深度学习中最常用的优化算法之一，其主要目的是计算损失函数对网络中各层权重的梯度","mnemonic":"反向传播=计算梯度，BP算梯度更新权重选C"},{"id":69,"type":"single","text":"决策树分类器实现预测的方式是（）。","options":[{"label":"A","text":"生成一个新的决策树进行分类"},{"label":"B","text":"利用梯度下降法优化参数"},{"label":"C","text":"随机选择一个节点进行分类"},{"label":"D","text":"比较特征属性的值和决策树节点属性的值"}],"answer":"D","explanation":"决策树通过逐层比较节点属性值与样本特征值进行分类。","mnemonic":"决策树=逐层比较节点属性值，一层层往下问选D"},{"id":70,"type":"single","text":"流程优化设计要提高价值创造节点的运行质量，去除或减少不产生价值的流程或节点，规范剩余节点，让所有流程或节点都为主要价值链服务，这是对哪项原则的解释（）。","options":[{"label":"A","text":"价值增值"},{"label":"B","text":"定义精确"},{"label":"C","text":"面向客户"},{"label":"D","text":"并行"}],"answer":"A","explanation":"价值增值是指流程优化设计要提升价值创造节点的运行质量，消除或减少不生产价值的流程或节点，对剩余的节点进行规范，让一切流程或节点为主价值链服务","mnemonic":"去除无价值节点为主价值链服务=价值增值选A"},{"id":71,"type":"single","text":"以图像里局部灰度最大值点作为种子，依据孔隙区域中像素灰度分布的特性，持续向四周扩大种子点所在区域，让该区域尽可能接近完整的孔隙区域。这是（）的核心思路。","options":[{"label":"A","text":"基于k-means聚类的分割"},{"label":"B","text":"区域生长"},{"label":"C","text":"直方图均衡化"},{"label":"D","text":"基于阈值的分割"}],"answer":"B","explanation":"区域生长算法从种子点出发，根据灰度特性扩展区域。","mnemonic":"种子点向四周扩大=区域生长，像种子发芽选B"},{"id":72,"type":"single","text":"遵章守法能带来的积极影响有哪些（）。","options":[{"label":"A","text":"提升个人社会地位"},{"label":"B","text":"维护职业的声誉和信誉"},{"label":"C","text":"扩大个人权力范围"},{"label":"D","text":"使得个人利益最大化"}],"answer":"B","explanation":"通过遵守\"遵章守法\"的基本要求，个人可以保证自己的行为合法合规，并维护职业的声誉和信誉。这有助于建立良好的社会形象，同时也为个人和组织带来可持续的发展和成功。","mnemonic":"遵章守法=维护职业声誉信誉，守法树信选B"},{"id":73,"type":"single","text":"哪一种用户界面最适合应用在移动设备上？","options":[{"label":"A","text":"语音用户界面（VUI）"},{"label":"B","text":"可触式用户界面（TUI）"},{"label":"C","text":"命令行界面（CLI）"},{"label":"D","text":"图形用户界面（GUI）"}],"answer":"B","explanation":"可触式用户界面（TUI）特别适合于移动设备，它们允许用户通过触摸屏幕直接与设备交互","mnemonic":"移动设备=可触式界面TUI，手指点屏幕选B"},{"id":74,"type":"single","text":"在 Word 中完成邮件合并后，能用什么功能来预览并编辑合并后的邮件（）。","options":[{"label":"A","text":"“预览结果”选项"},{"label":"B","text":"“编辑收件人列表”选项"},{"label":"C","text":"“写信”选项"},{"label":"D","text":"“保存”选项"}],"answer":"A","explanation":"“预览结果”功能可用于查看和编辑邮件合并后的内容，支持个性化调整。","mnemonic":"邮件合并后用\"预览结果\"查看编辑选A"},{"id":75,"type":"single","text":"通过降低图像中的高频噪声来提升图像质量的是（）。","options":[{"label":"A","text":"灰度级修正"},{"label":"B","text":"图像平滑"},{"label":"C","text":"图像锐化"},{"label":"D","text":"图像变换"}],"answer":"B","explanation":"图像平滑通过减少高频噪声提升图像质量，同时力求保留边缘信息。","mnemonic":"图像平滑=降低高频噪声，磨平毛刺选B"},{"id":76,"type":"single","text":"下列关于 BOW 模型的说法，错误的是（）。","options":[{"label":"A","text":"文档中每个词不是独立的"},{"label":"B","text":"有维数大和稀疏性的缺点"},{"label":"C","text":"不能保留语义"},{"label":"D","text":"BOW模型忽略文档的词语顺序语法、句法等要素"}],"answer":"A","explanation":"BOW模型忽略词语顺序和语法，假设词间独立。","mnemonic":"BOW模型中词是独立的，说不独立是错的选A"},{"id":77,"type":"single","text":"数据仓库的特征中，不包含的是（）。","options":[{"label":"A","text":"时变性"},{"label":"B","text":"数据经常变化且更新频率高"},{"label":"C","text":"集成性"},{"label":"D","text":"面向主题"}],"answer":"B","explanation":"数据仓库的特征在于面向主题、集成性、稳定性、时变性（随时间变化的）","mnemonic":"数据仓库特征=稳定不常变，频繁更新不属于选B"},{"id":78,"type":"single","text":"K - 近邻算法属于一种（）。","options":[{"label":"A","text":"强化学习算法"},{"label":"B","text":"半监督学习算法"},{"label":"C","text":"非监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"D","explanation":"K-近邻算法是一种监督学习算法，它通过计算待分类样本与训练数据集中的每个样本之间的距离，选择距离最近的样本进行分类","mnemonic":"KNN=监督学习，需要标签才能找邻居分类选D"},{"id":79,"type":"single","text":"数据库管理系统与数据库应用系统之间的主要区别是（）。","options":[{"label":"A","text":"DBMS与数据库应用系统功能相同，只是名称不同"},{"label":"B","text":"DBMS用于存储数据，而数据库应用系统用于处理文件"},{"label":"C","text":"DBMS是用于管理数据的软件，而数据库应用系统是基于DBMS构建的特定用途的应用程序"},{"label":"D","text":"DBMS是一种编程语言，而数据库应用系统是使用该语言开发的程序"}],"answer":"C","explanation":"DBMS是数据管理软件，应用系统是基于DBMS的业务程序。","mnemonic":"DBMS管数据的软件，应用系统是基于它建的程序选C"},{"id":80,"type":"single","text":"在反馈原则中，鼠标指针的状态、按钮的状态、页面元素的动态变化等属于什么？","options":[{"label":"A","text":"视觉反馈"},{"label":"B","text":"声音反馈"},{"label":"C","text":"颜色反馈"},{"label":"D","text":"文本反馈"}],"answer":"A","explanation":"反馈原则是人机交互设计中的核心原则之一，视觉反馈在人机交互设计中比较常见，包括鼠标指针的状态、按钮的状态、页面元素的动态变化等","mnemonic":"鼠标按钮页面变化=视觉反馈，眼睛看到的选A"},{"id":81,"type":"single","text":"在 ETL 数据整合工具里，能让数据抽取效率得到提升的是（）。","options":[{"label":"A","text":"数据转换"},{"label":"B","text":"数据清洗"},{"label":"C","text":"数据压缩"},{"label":"D","text":"并行处理"}],"answer":"D","explanation":"数据转换不直接影响数据抽取的效率","mnemonic":"ETL提升抽取效率=并行处理，多管齐下更快选D"},{"id":82,"type":"single","text":"对于分类任务，随机森林算法的集成方法核心思路是借助（）对多个决策树的预测结果进行集成。","options":[{"label":"A","text":"梯度加权法"},{"label":"B","text":"平均法"},{"label":"C","text":"样本加权法"},{"label":"D","text":"多数投票法"}],"answer":"D","explanation":"选项A：在分类任务中，随机森林使用多数投票法对多个决策树的预测结果进行集成，最终选择得票最多的类别作为最终预测结果","mnemonic":"随机森林分类=多数投票法，少数服从多数选D"},{"id":83,"type":"single","text":"在人机交互的任务分析方法里，观察法的主要功能是（）。","options":[{"label":"A","text":"提高用户满意度"},{"label":"B","text":"监测用户行为"},{"label":"C","text":"确认用户需求"},{"label":"D","text":"收集用户反馈"}],"answer":"B","explanation":"观察法的核心作用是观察并分析用户行为、习惯和活动，因此这是最准确的选项，符合观察法的主要目的","mnemonic":"观察法=监测用户行为，\"观\"就是\"看\"行为选B"},{"id":84,"type":"single","text":"智慧商场通过哪些方式可以提升消费者的体验（）。","options":[{"label":"A","text":"仅提供现金支付方式"},{"label":"B","text":"增加实体店铺面积"},{"label":"C","text":"实现智能停车与自助收银"},{"label":"D","text":"减少商品种类"}],"answer":"C","explanation":"智慧商场利用现代信息技术优化服务，提升消费者体验","mnemonic":"智慧商场=智能停车+自助收银，科技提升体验选C"},{"id":85,"type":"single","text":"依据勤勉好学的基本要求，勤勉好学的人会拥有（）品质。","options":[{"label":"A","text":"自私自利，不愿意为他人着想"},{"label":"B","text":"缺乏学习能力，不善于接受新的知识"},{"label":"C","text":"保持高度的责任心和工作效率"},{"label":"D","text":"不重视团队合作，喜欢单打独斗"}],"answer":"C","explanation":"勤勉好学的人具备良好的工作态度，勤奋努力地完成工作，保持高度的责任心和工作效率，愿意加班和付出额外的努力以完成任务。而自私自利、缺乏学习能力、不重视团队合作、喜欢单打独斗的人则不能被称为勤勉好学的人。","mnemonic":"勤勉好学=高责任心+高效率，勤奋出效率选C"},{"id":86,"type":"single","text":"PEST 模型在（）方面体现出对企业的帮助。","options":[{"label":"A","text":"通过技术升级直接降低生产成本"},{"label":"B","text":"增加销售渠道和客户贡献率"},{"label":"C","text":"提高产品质量和服务水平"},{"label":"D","text":"因地制宜、灵活应对市场变化"}],"answer":"D","explanation":"PEST模型分析有助于企业了解外部环境的情况，提前预判市场趋势，帮助企业因地制宜、灵活应对市场变化，提高市场竞争力","mnemonic":"PEST帮企业因地制宜应对市场变化选D"},{"id":87,"type":"single","text":"（）基于信号分解的方法。","options":[{"label":"A","text":"非局部均值滤波"},{"label":"B","text":"形态学操作去噪"},{"label":"C","text":"颜色转换去噪"},{"label":"D","text":"小波变换去噪"}],"answer":"D","explanation":"小波变换则是一种基于信号分解的方法，它将信号分解成不同频率的子带，并且能够在保留原始信息的同时去除噪声","mnemonic":"小波变换=信号分解去噪，分解再去噪选D"},{"id":88,"type":"single","text":"当模型存在欠拟合问题时，训练误差与测试误差会呈现出（）的状态。","options":[{"label":"A","text":"训练误差和测试误差都很小"},{"label":"B","text":"训练误差很小，测试误差很大"},{"label":"C","text":"训练误差和测试误差都很大"},{"label":"D","text":"训练误差很大，测试误差很小"}],"answer":"C","explanation":"当模型欠拟合时，表示模型对训练数据的拟合能力较弱，无法捕捉到数据的规律，因此训练误差较高。由于模型的不足，它在测试数据上的表现也同样不好，因此测试误差也较高。欠拟合通常意味着模型过于简单，无法有效学习数据中的模式。","mnemonic":"欠拟合=训练测试都差，模型太简单啥都学不会选C"},{"id":89,"type":"single","text":"留出法、交叉验证法和自助法的用途是（）。","options":[{"label":"A","text":"数据预处理"},{"label":"B","text":"训练模型"},{"label":"C","text":"选择最优的模型"},{"label":"D","text":"数据集的划分"}],"answer":"D","explanation":"留出法、交叉验证法和自助法的主要作用是根据不同的方式划分数据集，用于训练模型和评估模型的性能。","mnemonic":"留出法交叉验证自助法=数据集划分方法选D"},{"id":90,"type":"single","text":"关于模型复杂度与过拟合、欠拟合之间关系的描述，正确的是（）。","options":[{"label":"A","text":"欠拟合通常发生在训练集上的误差较低，但测试集误差较高的情况下"},{"label":"B","text":"过拟合和欠拟合之间存在一个权衡，增加模型复杂度可以减少欠拟合，但可能增加过拟合的风险"},{"label":"C","text":"当模型过于简单时，可能会导致过拟合"},{"label":"D","text":"增加模型复杂度通常会导致欠拟合的风险增加"}],"answer":"B","explanation":"A选项：增加模型复杂度通常会降低欠拟合的风险，因为复杂模型能更好地拟合训练数据，但不会增加欠拟合的风险","mnemonic":"复杂度权衡：增加复杂度减欠拟合但增过拟合风险选B"},{"id":91,"type":"single","text":"在支持向量机算法中，最大化间隔的目的是（）。","options":[{"label":"A","text":"使分类器的复杂度更小"},{"label":"B","text":"使分类器的测试误差更小"},{"label":"C","text":"使分类器的训练误差更小"},{"label":"D","text":"使分类器的泛化性能更好"}],"answer":"D","explanation":"支持向量机最大化间隔以提升泛化性能，减少过拟合。","mnemonic":"SVM最大间隔=提升泛化性能，间隔大泛化好选D"},{"id":92,"type":"single","text":"进行图像增强时，通过去除噪声来提高图像质量的方法是（）。","options":[{"label":"A","text":"中值滤波"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"颜色平衡"},{"label":"D","text":"对比度拉伸"}],"answer":"A","explanation":"王帅等人（2022）提出一种改进自适应中值滤波算法的图像去噪，有效提高了图像质量、去除噪声","mnemonic":"中值滤波去噪提质，取中间值去掉极端噪声选A"},{"id":93,"type":"single","text":"下列选项中，不属于 SWOT 分析模型包含的要素的是（）。","options":[{"label":"A","text":"优势"},{"label":"B","text":"资源"},{"label":"C","text":"机会"},{"label":"D","text":"威胁"}],"answer":"B","explanation":"SWOT分析包含优势、劣势、机会和威胁四个要素，资源不属于其组成部分。","mnemonic":"SWOT=优劣机威，没有\"资源\"这个要素选B"},{"id":94,"type":"single","text":"特征选择指的是（）。","options":[{"label":"A","text":"从原始特征集合中挑选最重要的特征"},{"label":"B","text":"通过算法从特征集中选择特征"},{"label":"C","text":"从特征描述中选取最佳特征"},{"label":"D","text":"从算法中选取最佳特征"}],"answer":"A","explanation":"选项A正确。特征选择的核心是从原始特征集合中选择有最大贡献的特征。选项B错误。算法是工具，不是特征选择的定义。选项C错误。特征选择并不是从“描述”中选择特征，而是从特征集合中选择最相关的特征。选项D错误。算法用于评估特征，而非从算法中选择特征。","mnemonic":"特征选择=从原始集合挑最重要的特征选A"},{"id":95,"type":"single","text":"对于 RFM 模型，下列表述正确的是（）。","options":[{"label":"A","text":"RFM模型是一种用户的分群和分层模型"},{"label":"B","text":"RFM模型只考虑了消费金额这一指标"},{"label":"C","text":"RFM模型不适用于电子商务场景"},{"label":"D","text":"RFM模型主要是基于客户的社交资本进行分类的"}],"answer":"A","explanation":"RFM模型根据最近购买时间、消费频率和金额对用户分群，用于精准营销。","mnemonic":"RFM=分群分层模型，R+F+M三维度分用户选A"},{"id":96,"type":"single","text":"下列哪一选项不属于初级知识体系中的基础概念？（）","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"数据采集"},{"label":"D","text":"智能系统运维"}],"answer":"B","explanation":"自然语言处理不属于初级知识体系中的基础概念。","mnemonic":"自然语言处理NLP不属于初级知识体系选B"},{"id":97,"type":"single","text":"流程的最终结果是用最高的效率和质量、最低的成本和风险保障流程产出，这是对哪项原则的解释（）。","options":[{"label":"A","text":"宏观层面"},{"label":"B","text":"过程导向"},{"label":"C","text":"问题导向"},{"label":"D","text":"结果导向"}],"answer":"D","explanation":"结果导向原则强调流程以客户为中心，确保高效率、高质量、低成本、低风险地实现产出。","mnemonic":"最高效率最低成本保障产出=结果导向选D"},{"id":98,"type":"single","text":"能够评估企业内外部环境的是（）。","options":[{"label":"A","text":"战略规划"},{"label":"B","text":"用户调研"},{"label":"C","text":"竞争对手分析"},{"label":"D","text":"SWOT分析"}],"answer":"D","explanation":"SWOT分析是一种常用的业务分析方法，通过评估企业的内部优势和弱点以及外部环境的机会和威胁来评估企业的整体情况，为企业制定战略提供依据","mnemonic":"SWOT评估企业内外部环境，内优劣外机威选D"},{"id":99,"type":"single","text":"在多分类模型里，下列哪项指标可以同时对模型的精确率和召回率进行评估（）。","options":[{"label":"A","text":"AUC值"},{"label":"B","text":"F1值"},{"label":"C","text":"精确率（Precision）"},{"label":"D","text":"召回率（Recall）"}],"answer":"B","explanation":"F1值是精确率（Precision）和召回率（Recall）的调和平均值，能够综合评估模型的准确率和召回率，是评估多分类模型时常用的指标","mnemonic":"F1值=精确率和召回率的调和平均，F1兼顾双率选B"},{"id":100,"type":"single","text":"在随机森林模型里，通过哪个方法能够运用穷举法搜索超参数组合，以此调整模型超参数，进而提升模型性能？（）","options":[{"label":"A","text":"GridSearchCV"},{"label":"B","text":"RandomizedSearchCV"},{"label":"C","text":"KFold"},{"label":"D","text":"StandardScaler"}],"answer":"A","explanation":"GridSearchCV通过穷举搜索和交叉验证寻找最优超参数组合。","mnemonic":"GridSearchCV=穷举搜索超参数，Grid网格逐个试选A"},{"id":101,"type":"single","text":"逻辑回归作为一种分类算法，其核心思路是（）。","options":[{"label":"A","text":"通过对数据进行排序并根据排序结果进行分类"},{"label":"B","text":"通过将数据映射到一个指定区间内，并使用一个阈值对数据进行分类"},{"label":"C","text":"使用多项式函数进行拟合"},{"label":"D","text":"找到一条直线来将数据分为两类"}],"answer":"B","explanation":"逻辑回归算法通过将数据映射到一个指定区间内，并使用一个阈值对数据进行分类","mnemonic":"逻辑回归核心是用sigmoid将线性结果映射到区间，阈值分类，选B映射+阈值"},{"id":102,"type":"single","text":"下列哪一项并非 RFM 模型中的衡量指标（）。","options":[{"label":"A","text":"购买的频率"},{"label":"B","text":"固定资产投资额"},{"label":"C","text":"客户的购买额度"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"B","explanation":"RFM指标含购买时间、频率、金额，不含固定资产投资。","mnemonic":"RFM三字母=最近购买(R)、频率(F)、金额(M)，固定资产投资不沾边，选B"},{"id":103,"type":"single","text":"漏斗分析的具体含义是什么（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"对于某一转化目标，把用户从进入网站、注册、浏览、加入购物车、到提交订单的各个步骤称为漏斗，分析各个步骤的转化率"},{"label":"C","text":"通过统计用户停留时长和点击数据，了解用户对页面的喜好和需求"},{"label":"D","text":"对使用某款产品或服务的用户行为进行分解并分析的方法"}],"answer":"B","explanation":"从业务流程起点开始到最后目标完成的每个环节都会有用户流失，因此需要一种分析方法来衡量业务流程每一步的转化效率，漏斗分析方法就是这样的分析方法","mnemonic":"漏斗分析=各步骤转化率分析，像漏斗逐层过滤用户，选B描述最精准"},{"id":104,"type":"single","text":"在 k 折交叉验证中，假设有一个包含 1000 个样本的数据集，且 k=10，那么每次测试时测试集的样本数量是多少（）。","options":[{"label":"A","text":"1000个样本"},{"label":"B","text":"10个样本"},{"label":"C","text":"200个样本"},{"label":"D","text":"100个样本"}],"answer":"D","explanation":"在k折交叉验证中，数据集被分为k个大小相等的子集","mnemonic":"k折验证：1000样本k=10，每折测试集=1000/10=100，简单除法选D"},{"id":105,"type":"single","text":"在特征选择中，运用 L1 正则化主要是为了实现什么功能（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"解决特征之间的多重共线性问题"},{"label":"C","text":"对特征进行降维处理"},{"label":"D","text":"自动进行特征选择"}],"answer":"D","explanation":"L1正则化（Lasso）通过对模型参数施加L1惩罚，使得部分特征的系数被推向零，从而实现特征选择","mnemonic":"L1正则化=Lasso=系数归零=自动特征选择，L1让特征\"消失\"选D"},{"id":106,"type":"single","text":"应用程序和输入设备同时运行，所有输入的数据都会被存储到一个事件队列中，应用程序可以随时查看并处理这些数据，这种模式被称为（）。","options":[{"label":"A","text":"请求模式"},{"label":"B","text":"采样模式"},{"label":"C","text":"事件模式"},{"label":"D","text":"并发模式"}],"answer":"C","explanation":"首先事件模式是应用程序和输入设备并行工作的模式。输入设备将数据保存到事件队列中，所有输入信息都会被保留，应用程序可以随时检查队列并处理其中的事件。此模式正符合题意。其他选项的解释：在请求模式下，应用程序控制输入设备的启动，程序会暂停，直到输入数据被提供。应用程序与输入设备不是并行工作的，因此不符合题意。采样模式下，输入设备和应用程序是独立工作的，输入设备持续采样并定期提供数据，但数据并不保存为事件队列，应用程序也不会主动处理队列中的事件。因此，不符合题意。并发模式不是标准的输入模式类型，且题目中并没有涉及应用程序与输入设备并行工作下的“并发”处理概念，因此不正确。","mnemonic":"事件队列+并行工作+数据保留=事件模式，\"事件排队不丢失\"选C"},{"id":107,"type":"single","text":"计算机在农业领域有哪些具体应用（）。","options":[{"label":"A","text":"农作物种植与管理"},{"label":"B","text":"动物饲养与繁殖"},{"label":"C","text":"农产品加工和销售"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"计算机在农业领域中的应用包括农作物种植与管理、动物饲养与繁殖、农产品加工和销售等方面。","mnemonic":"计算机农业应用：种植+饲养+加工销售全覆盖，\"农业全能\"选D"},{"id":108,"type":"single","text":"能够对标注数据的准确性和完整性进行审核，并输出审核报告，这属于中级知识体系中（）的知识点。","options":[{"label":"A","text":"智能系统优化"},{"label":"B","text":"数据采集"},{"label":"C","text":"数据处理与分析"},{"label":"D","text":"标注数据审核"}],"answer":"D","explanation":"能够完成对标注数据准确性和完整性审核并输出审核报告属于中级知识体系中标注数据审核的知识点。","mnemonic":"标注数据审核=审核标注准确性和完整性，题目直接点名选D"},{"id":109,"type":"single","text":"高性能计算（HPC）所支持的并行负载，其常见使用场景中不包括的是（）。","options":[{"label":"A","text":"上下文搜索"},{"label":"B","text":"交通管理"},{"label":"C","text":"分子建模"},{"label":"D","text":"风险模拟"}],"answer":"B","explanation":"高性能计算支持的并行负载场景包括风险模拟、分子建模等，交通管理属于紧密耦合负载。","mnemonic":"HPC并行负载：风险模拟、分子建模、上下文搜索都是，交通管理是紧耦合选B"},{"id":110,"type":"single","text":"有关文件系统的种类，下列说法正确的是（）。","options":[{"label":"A","text":"EXT4在Linux操作系统中被广泛使用"},{"label":"B","text":"FAT文件系统只适用于Windows操作系统"},{"label":"C","text":"NTFS是Linux操作系统的默认文件系统"},{"label":"D","text":"HFS是一种适配所有操作系统的日志式文件系统"}],"answer":"A","explanation":"分层文件系统（HFS）是一种由苹果电脑开发，并使用在Mac OS上的文件系统。NTFS是windows特有的文件系统类型，所以原生Linux、MacOS默认不支持此文件系统类型。FAT文件系统是一种通用的文件系统，适用于多种操作系统，如Windows、MacOS、Linux等。 ext4是Linux中最常见的文件系统之一，它是ext3文件系统的改进版本，因此在Linux系统中被广泛使用。","mnemonic":"EXT4是Linux标配文件系统，NTFS归Windows，HFS归苹果，选A"},{"id":111,"type":"single","text":"遵守诚实公正的基本要求，能带来哪些积极影响（）。","options":[{"label":"A","text":"能够利用职权谋取个人利益"},{"label":"B","text":"能够随意利用公司的资源"},{"label":"C","text":"建立职业声誉、维护职业信任"},{"label":"D","text":"获得更多的福利待遇"}],"answer":"C","explanation":"遵守诚实公正的基本要求有助于建立职业声誉、维护职业信任，并推动个人和组织的长期成功","mnemonic":"诚实公正→建立声誉维护信任，ABD都是反面行为，选C"},{"id":112,"type":"single","text":"进行算法测试时，为提升性能需优化算法参数，下列（）属于参数优化的方法。","options":[{"label":"A","text":"聚类算法"},{"label":"B","text":"神经网络"},{"label":"C","text":"支持向量机"},{"label":"D","text":"网格搜索"}],"answer":"D","explanation":"网格搜索是一种常用的参数优化方法，在给定的参数范围内对所有可能的参数组合进行评估，以找到最佳参数组合。","mnemonic":"参数优化方法=网格搜索，其余ABC都是算法本身不是调参方法，选D"},{"id":113,"type":"single","text":"根据《中华人民共和国民法典》，关于自然人的民事权利能力，下列说法正确的是（）。","options":[{"label":"A","text":"只有完全民事行为能力人有民事权利能力"},{"label":"B","text":"自然人的民事权利能力一律平等"},{"label":"C","text":"胎儿没有民事权利能力"},{"label":"D","text":"自然人的民事权利能力始于出生，终于死亡，并且可以被剥夺"}],"answer":"B","explanation":"自然人民事权利能力始于出生终于死亡，一律平等且不可剥夺。","mnemonic":"民事权利能力一律平等，始于出生终于死亡不可剥夺，选B\"平等\""},{"id":114,"type":"single","text":"什么是聚类分析（）。","options":[{"label":"A","text":"对数据进行时序分析的一种方法"},{"label":"B","text":"对数据进行因果分析的一种方法"},{"label":"C","text":"对数据进行回归分析的一种方法"},{"label":"D","text":"对数据进行分组的一种方法"}],"answer":"D","explanation":"聚类分析是一种对数据进行分组的方法，其目的是将具有相似特征的数据点聚集到一起，从而形成不同的类别","mnemonic":"聚类=聚在一起=分组，不是时序/因果/回归，\"物以类聚\"选D"},{"id":115,"type":"single","text":"下列问题中，不属于 5W2H 模型核心要素范畴的是？","options":[{"label":"A","text":"Why"},{"label":"B","text":"Who"},{"label":"C","text":"Which"},{"label":"D","text":"What"}],"answer":"C","explanation":"5W2H要素包括What/Why/Who/When/Where/How/How much，不含Which。","mnemonic":"5W2H=What/Why/Who/When/Where+How/How much，没有Which选C排除"},{"id":116,"type":"single","text":"下列选项中，不能体现职业道德特征的是（）。","options":[{"label":"A","text":"持续学习和专业发展"},{"label":"B","text":"追求个人权力和地位"},{"label":"C","text":"提供公正和专业的服务"},{"label":"D","text":"保护客户隐私和机密"}],"answer":"B","explanation":"保护客户隐私和机密、提供公正和专业的服务以及持续学习和专业发展都是职业道德的重要体现","mnemonic":"追求个人权力地位是反面典型，不体现职业道德，选B"},{"id":117,"type":"single","text":"关于交叉验证说法正确的是（）。","options":[{"label":"A","text":"交叉验证将数据集划分为两个子集，分别作为训练集和测试集，进行一次性训练和测试"},{"label":"B","text":"交叉验证通过将数据集划分为k个子集，依次使用每个子集作为测试集，其余k-1个子集作为训练集，最终综合所有测试结果"},{"label":"C","text":"交叉验证每次随机选择部分样本作为训练集，剩余样本作为测试集，直到所有样本都作为测试集"},{"label":"D","text":"交叉验证仅使用一个子集进行训练，其他子集不参与模型训练与测试"}],"answer":"B","explanation":"k折交叉验证将数据分为k个子集，轮换测试并平均结果，以评估模型性能。","mnemonic":"k折交叉验证：分k份轮换测试取平均，选B描述最完整准确"},{"id":118,"type":"single","text":"《中华人民共和国网络安全法》规定，网络运营者应当采取技术措施监测、记录网络运行状态及网络安全事件，并按规定留存相关网络日志不少于多长时间（）。","options":[{"label":"A","text":"一年"},{"label":"B","text":"三个月"},{"label":"C","text":"六个月"},{"label":"D","text":"一个月"}],"answer":"C","explanation":"《中华人民共和国网络安全法》第二十一条规定，国家实行网络安全等级保护制度","mnemonic":"网络安全法日志留存≥六个月，\"半年保底\"选C"},{"id":119,"type":"single","text":"导致数据不完整的主要原因有（）。","options":[{"label":"A","text":"命名规则或数据代码不同"},{"label":"B","text":"由于误解或检测设备失灵，相关数据没有被记录下来"},{"label":"C","text":"数据维度过高"},{"label":"D","text":"数据安全性较差"}],"answer":"B","explanation":"数据不完整的主要原因包括记录遗漏、设备失灵、数据不一致或历史忽略等。","mnemonic":"数据不完整=记录遗漏或设备失灵导致数据缺失，选B"},{"id":120,"type":"single","text":"下列对于 G-U-L 模型的描述，正确的一项是（）。","options":[{"label":"A","text":"G-U-L模型结合了GOMS、UAN和LOTOS模型，能全面预测用户的行为、操作、时序关系。"},{"label":"B","text":"G-U-L模型仅适用于非熟练用户的行为预测。"},{"label":"C","text":"G-U-L模型主要用于描述用户的原子操作和任务目标的时序关系。"},{"label":"D","text":"G-U-L模型只结合了GOMS和UAN模型，未涉及LOTOS模型。"}],"answer":"A","explanation":"G-U-L模型通过结合GOMS、UAN和LOTOS模型的优势，能够全面且精确地预测用户在复杂任务中的行为，涵盖了任务分解、行为描述和时序关系的分析","mnemonic":"G-U-L=GOMS+UAN+LOTOS三合一，全面预测行为+操作+时序，选A"},{"id":121,"type":"single","text":"下列哪种方式不属于智能系统在教育领域的应用形式？","options":[{"label":"A","text":"个性化学习"},{"label":"B","text":"虚拟实验和模拟"},{"label":"C","text":"知识推荐和资源分享"},{"label":"D","text":"交通拥堵检测"}],"answer":"D","explanation":"交通拥堵检测不属于智能系统在教育领域的运用方式。","mnemonic":"教育领域应用：个性化学习/虚拟实验/知识推荐，交通拥堵检测不搭界选D"},{"id":122,"type":"single","text":"下列关于留出法的划分策略说法正确的是（）。","options":[{"label":"A","text":"多次随机划分后，应取测试误差的最大值以提高模型鲁棒性"},{"label":"B","text":"单次随机划分的结果足够稳定，可直接作为最终评估依据"},{"label":"C","text":"若数据集包含1000个样本（500正例、500反例），按分层抽样以7:3划分，则训练集包含350正例和350反例"},{"label":"D","text":"测试集的比例必须固定为30%"}],"answer":"C","explanation":"分层抽样​​的核心是保持训练集和测试集的类别分布与原始数据集一致。数据集含500正例和500反例，按7:3分层划分后：训练集正例数：500 × 70% = 350训练集反例数：500 × 70% = 350测试集正/反例数均为150，符合分层规则。","mnemonic":"分层抽样7:3，500正例×70%=350，训练集350正350反，选C"},{"id":123,"type":"single","text":"下列哪一项不属于人机交互中的用户类别？（）","options":[{"label":"A","text":"机器用户"},{"label":"B","text":"熟练型用户"},{"label":"C","text":"生疏型用户"},{"label":"D","text":"专家型用户"}],"answer":"A","explanation":"机器用户不是有效的人机交互用户类别。","mnemonic":"人机交互用户分类：生疏型/熟练型/专家型，\"机器用户\"不是人选A"},{"id":124,"type":"single","text":"下列哪一做法体现了恪尽职守（）。","options":[{"label":"A","text":"工作不积极，效率不高"},{"label":"B","text":"有意忽视工作中出现的问题"},{"label":"C","text":"严格遵守保密规定"},{"label":"D","text":"对业务知识缺乏了解和应用"}],"answer":"C","explanation":"严格遵守保密规定是恪尽职守的体现，从业人员应该严格遵守保密规定，对工作中的机密信息予以妥善保管，并不得泄露相关信息。具备保密意识，确保客户和组织的利益不受损害。","mnemonic":"恪尽职守=严守保密规定，其余ABD都是失职表现，选C"},{"id":125,"type":"single","text":"漏斗分析里，下列属于转化率的是（）。","options":[{"label":"A","text":"用户在注册成功后，到浏览商品页面的访问次数比例"},{"label":"B","text":"用户在加入购物车后，到提交订单的比例"},{"label":"C","text":"用户在注册成功后，到浏览商品页面的停留时间比例"},{"label":"D","text":"每个阶段的用户数量"}],"answer":"B","explanation":"漏斗转化率指步骤间用户成功过渡的比例。","mnemonic":"漏斗转化率=步骤间成功过渡比例，购物车→提交订单才是转化率选B"},{"id":126,"type":"single","text":"Web 界面设计中 “简单性原则” 的核心内容是什么？（）","options":[{"label":"A","text":"指导设计师要考虑到用户界面的可理解性和易操作性"},{"label":"B","text":"强调消除不必要的复杂性和混乱，以提供直观和易于操作的用户体验"},{"label":"C","text":"强调将界面设计与用户习惯和期望相一致"},{"label":"D","text":"强调给予用户明确的反馈，使用户了解其操作的结果和当前状态"}],"answer":"B","explanation":"简单性原则强调在Web界面设计中消除不必要的复杂性和混乱，旨在为用户提供直观、易于操作的界面","mnemonic":"简单性原则=消除不必要复杂性，\"简单直观易操作\"选B"},{"id":127,"type":"single","text":"在 LOTOS 模型中，（）用于表示 “两个进程按顺序执行”。","options":[{"label":"A","text":"T1 [] T2"},{"label":"B","text":"T1 ||| T2"},{"label":"C","text":"T1 >> T2"},{"label":"D","text":"T1 |[a1,...,an]| T2"}],"answer":"C","explanation":"T1 >> T2串行（sequentiality）算符用于描述两个进程按顺序执行，即 T1 执行完成后，T2 才能执行","mnemonic":"LOTOS中>>表示串行顺序执行，\">>像箭头往前走\"选C"},{"id":128,"type":"single","text":"ETL 过程中，进行数据抽取是为了实现什么目标（）。","options":[{"label":"A","text":"将数据从目标系统中提取"},{"label":"B","text":"将数据从目标系统中删除"},{"label":"C","text":"将数据从源系统中提取"},{"label":"D","text":"将数据从源系统中删除"}],"answer":"C","explanation":"在ETL过程中，数据抽取是指从源系统中提取数据的过程，通常用于将源系统中的数据移动到ETL流程中进行后续处理","mnemonic":"ETL中E=Extract=从源系统提取数据，\"源头抽水\"选C"},{"id":129,"type":"single","text":"在特征选择时，卡方检验常用于哪类数据（）。","options":[{"label":"A","text":"连续型数据"},{"label":"B","text":"离散型数据"},{"label":"C","text":"混合型数据"},{"label":"D","text":"数值型数据"}],"answer":"B","explanation":"卡方检验是用于检验类别变量之间的独立性的统计方法，常用于离散型数据。它通过比较观察频次与期望频次之间的差异来判断两个分类变量是否有显著关系。卡方检验不适用于连续型或数值型数据。","mnemonic":"卡方检验用于离散型/分类变量的独立性检验，\"卡方查分类\"选B"},{"id":130,"type":"single","text":"人机交互的定义是什么？","options":[{"label":"A","text":"人类通过机器完成某项任务"},{"label":"B","text":"机器能够理解人类思维"},{"label":"C","text":"机器在没有人参与的情况下自动工作"},{"label":"D","text":"人类与机器之间的互动"}],"answer":"D","explanation":"人机交互是人与机器设备间的互动过程。","mnemonic":"人机交互=人与机器之间的互动，最简洁准确的定义选D"},{"id":131,"type":"single","text":"下列不属于图像分割方法的是（）。","options":[{"label":"A","text":"基于形状的分割方法"},{"label":"B","text":"基于边缘的分割方法"},{"label":"C","text":"基于区域的分割方法"},{"label":"D","text":"基于阈值的分割方法"}],"answer":"A","explanation":"现有的图像分割方法主要分以下几种不同的途径:(1)基于阈值的分割方法，是一种最常用的并行区域技术，它是图像分割中应用数量最多的一类","mnemonic":"图像分割方法：阈值/边缘/区域，没有\"基于形状\"的分割选A"},{"id":132,"type":"single","text":"决策树算法处理连续型特征时，一般采用（）来选取最优的分割点。","options":[{"label":"A","text":"特征缩放"},{"label":"B","text":"独热编码"},{"label":"C","text":"动态遍历"},{"label":"D","text":"分箱法"}],"answer":"C","explanation":"决策树算法（如C4.5、CART）处理连续型特征的核心逻辑是​​动态遍历候选分割点​​，而非预先分箱。","mnemonic":"决策树处理连续特征用动态遍历候选分割点，不是预先分箱选C"},{"id":133,"type":"single","text":"采用 KNN 算法时，一般要先拆分数据集，下列操作中属于实现这一目标的标准方式的是（）。","options":[{"label":"A","text":"使用train_test_split()函数"},{"label":"B","text":"使用fit()方法"},{"label":"C","text":"使用scaler.fit()进行归一化"},{"label":"D","text":"使用KFold交叉验证"}],"answer":"A","explanation":"train_test_split()是标准的数据集拆分函数，用于划分训练集和测试集。","mnemonic":"拆分数据集标准方式=train_test_split()函数，\"拆分找split\"选A"},{"id":134,"type":"single","text":"哪个步骤能够借助数据分析，设计出在单一场景下人工与智能交互的最佳流程？（）","options":[{"label":"A","text":"人机交互流程设计"},{"label":"B","text":"智能系统监控和优化"},{"label":"C","text":"数据处理规范制定"},{"label":"D","text":"业务模块效果优化"}],"answer":"A","explanation":"人机交互流程设计通过数据分析优化单一场景下的人机交互流程。","mnemonic":"人机交互流程设计=借助数据分析设计人机交互最佳流程，选A"},{"id":135,"type":"single","text":"SmartArt 工具能够实现哪些功能（）。","options":[{"label":"A","text":"添加多媒体文件到演示文稿"},{"label":"B","text":"将逻辑关系视觉化呈现"},{"label":"C","text":"获取分数和百分比"},{"label":"D","text":"分类和算数"}],"answer":"B","explanation":"SmartArt工具将逻辑关系视觉化呈现，提升信息传达速率","mnemonic":"SmartArt=将逻辑关系视觉化呈现，\"Smart图示逻辑\"选B"},{"id":136,"type":"single","text":"在 Python 中，可用于对图像执行均值滤波处理的函数是（）。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.blur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"B","explanation":"在Python中，可以使用 cv2.blur() 函数对图像进行均值滤波处理","mnemonic":"cv2.blur()=均值滤波，median是中值，bilateral是双边，选B"},{"id":137,"type":"single","text":"下列哪项是用于数据存储的传统关系型数据库（）。","options":[{"label":"A","text":"Elasticsearch"},{"label":"B","text":"PostgreSQL"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop"}],"answer":"B","explanation":"Hadoop是一个分布式计算框架，MongoDB是一种NoSQL数据库，Elasticsearch是一种全文搜索引擎","mnemonic":"传统关系型数据库=PostgreSQL，MongoDB是NoSQL，Hadoop是框架选B"},{"id":138,"type":"single","text":"TF-IDF 是哪项的组成部分（）。","options":[{"label":"A","text":"主题模型"},{"label":"B","text":"词嵌入"},{"label":"C","text":"词袋模型"},{"label":"D","text":"One-hot向量化"}],"answer":"C","explanation":"TF-IDF表示是指用一个向量表示一句话或一个文档，它是在词袋的基础上对词出现的频次赋予TF-IDF权值，对词袋模型进行修正，进而表示该词在文档集合中的重要程度","mnemonic":"TF-IDF是词袋模型的加权改进版，\"TF-IDF属于词袋家族\"选C"},{"id":139,"type":"single","text":"哪项可以衡量词与词之间的相似程度（）。","options":[{"label":"A","text":"One-hot向量化"},{"label":"B","text":"BOW模型"},{"label":"C","text":"Word2Vec模型"},{"label":"D","text":"主题模型"}],"answer":"C","explanation":"Word2Vec模型能高效训练大规模语料，并有效度量词汇间相似度。","mnemonic":"Word2Vec将词映射为向量可衡量相似度，\"词向量量相似\"选C"},{"id":140,"type":"single","text":"在设计人机交互界面时，应考虑到下列哪项？","options":[{"label":"A","text":"数据和算法"},{"label":"B","text":"用户的性别和年龄"},{"label":"C","text":"使用场景和用户需求"},{"label":"D","text":"流行趋势和视觉追求"}],"answer":"C","explanation":"人机交互的基本信息包括使用场景和用户需求","mnemonic":"人机交互界面设计核心考虑：使用场景+用户需求，选C"},{"id":141,"type":"single","text":"在 PowerPoint 的母版视图中，只有修改哪项的设计，才能对所有幻灯片的设计产生影响（）。","options":[{"label":"A","text":"当前打开的幻灯片"},{"label":"B","text":"单个幻灯片"},{"label":"C","text":"幻灯片版式"},{"label":"D","text":"幻灯片母版"}],"answer":"D","explanation":"在母版视图中，只有更改幻灯片母版的设计才能同时影响所有幻灯片的设计","mnemonic":"PPT母版视图中改幻灯片母版才能影响全部幻灯片，\"母版管全局\"选D"},{"id":142,"type":"single","text":"漏斗分析在数据分析方法中属于（）类别。","options":[{"label":"A","text":"基于位置的分析"},{"label":"B","text":"转化率分析"},{"label":"C","text":"可视化分析"},{"label":"D","text":"用户画像分析"}],"answer":"B","explanation":"漏斗分析是一种针对用户在特定过程中的转化率进行分析的方法，属于转化率分析的范畴。","mnemonic":"漏斗分析=分析各环节转化率，属于转化率分析类别选B"},{"id":143,"type":"single","text":"依据劳动法，用人单位安排劳动者延长工作时间的，需向劳动者支付不低于工资（）的报酬。","options":[{"label":"A","text":"百分之一百二十"},{"label":"B","text":"百分之一百八十"},{"label":"C","text":"百分之一百五十"},{"label":"D","text":"百分之二百"}],"answer":"C","explanation":"劳动法规定，延长工作时间需支付不低于工资150%的报酬。","mnemonic":"延长工作时间加班费≥150%工资，\"加班一点五倍\"选C"},{"id":144,"type":"single","text":"人机交互 GOMS 模型中的 “G” 指的是什么？","options":[{"label":"A","text":"状态"},{"label":"B","text":"目的"},{"label":"C","text":"方法"},{"label":"D","text":"操作时间"}],"answer":"B","explanation":"GOMS模型中的“G”代表用户完成任务的目标（Goal）。","mnemonic":"GOMS中G=Goal=目的/目标，\"G打头就是Goal\"选B"},{"id":145,"type":"single","text":"人机交互的发展没有经历过哪个阶段？","options":[{"label":"A","text":"早期的手工作业阶段"},{"label":"B","text":"语音识别阶段"},{"label":"C","text":"图形用户界面(GU)阶段"},{"label":"D","text":"多通道、多媒体的智能人机交互阶段"}],"answer":"B","explanation":"人机交互发展经历了手工作业、命令语言、图形界面、网络界面到智能交互阶段，未经历语音识别阶段。","mnemonic":"人机交互发展：手工→命令→GUI→网络→智能，没有语音识别阶段选B"},{"id":146,"type":"single","text":"与智慧城市关系密切的关键技术包括以下哪些（）。","options":[{"label":"A","text":"物联网技术"},{"label":"B","text":"大数据技术"},{"label":"C","text":"人工智能技术"},{"label":"D","text":"以上选择均正确"}],"answer":"D","explanation":"与智慧城市密切相关的关键技术包括物联网技术、大数据技术、人工智能技术、5G技术等。","mnemonic":"智慧城市关键技术：物联网+大数据+AI+5G全都对选D"},{"id":147,"type":"single","text":"NTFS 文件系统适合在哪些操作系统中使用（）。","options":[{"label":"A","text":"Linux"},{"label":"B","text":"Windows"},{"label":"C","text":"MacOS"},{"label":"D","text":"Android"}],"answer":"B","explanation":"NTFS（New Technology File System）是Windows操作系统中使用的一种文件系统","mnemonic":"NTFS=New Technology File System=Windows专属，选B"},{"id":148,"type":"single","text":"可将文本数据映射到低维空间，且能很好地衡量词与词之间相似性的是（）。","options":[{"label":"A","text":"One-hot模型"},{"label":"B","text":"Transformer模型"},{"label":"C","text":"Word2Vec模型"},{"label":"D","text":"LSTM模型"}],"answer":"C","explanation":"Word2Vec模型可以将文本数据映射到低维空间，且可以很好地度量词与词之间的相似性","mnemonic":"Word2Vec映射低维空间+衡量词相似性，\"词到向量\"选C"},{"id":149,"type":"single","text":"业务流程重组里，简化过程在执行层面的目标是（）。","options":[{"label":"A","text":"增加流程的检查点"},{"label":"B","text":"增加流程的复杂性"},{"label":"C","text":"增加流程的冗余"},{"label":"D","text":"删除多余的流程"}],"answer":"D","explanation":"简化过程的执行目标是删除多余的流程（A），以提高效率和减少不必要的步骤。","mnemonic":"业务流程重组简化过程=删除多余流程提高效率，选D"},{"id":150,"type":"single","text":"下列关于劳动合同的履行与变更的说法，不正确的是（）。","options":[{"label":"A","text":"用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报酬"},{"label":"B","text":"用人单位发生合并或者分立等情况，原劳动合同无效，需重新签订"},{"label":"C","text":"用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响劳动合同的履行"},{"label":"D","text":"用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务"}],"answer":"B","explanation":"《中华人民共和国劳动合同法》第二十九条规定，用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务。第三十条规定，用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报酬。第三十三条规定，用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响劳动合同的履行。第三十四条规定，用人单位发生合并或者分立等情况，原劳动合同继续有效，劳动合同由承继其权利和义务的用人单位继续履行。","mnemonic":"单位合并分立原合同继续有效，不是无效重签，选B说法不正确"},{"id":151,"type":"single","text":"在（）情形下，能够判定模型存在欠拟合。","options":[{"label":"A","text":"模型的训练误差较高，而测试误差也相对较低，两者差距较小。"},{"label":"B","text":"模型的训练误差较小，而测试误差也相对较高，两者差距较大。"},{"label":"C","text":"模型的训练误差较小，而测试误差也相对较小，两者差距较小。"},{"label":"D","text":"模型的训练误差较高，而测试误差也相对较高，两者差距较小。"}],"answer":"D","explanation":"选项A错误，这不是欠拟合的表现。选项B错误，这种情况典型的是过拟合。训练误差小而测试误差大，说明模型可能在训练集上过度拟合，失去了泛化能力。选项C错误，这种情况表明模型在训练和测试集上都表现良好，通常意味着模型没有欠拟合，甚至可能是良好的模型拟合。选项D是典型的欠拟合表现。训练误差和测试误差都较高，且两者差距小，说明模型没有很好地学习数据的规律，无法对训练数据和测试数据进行有效的拟合。","mnemonic":"欠拟合=训练和测试误差都高且差距小，\"学都没学好\"选D"},{"id":152,"type":"single","text":"下面哪一项不在初级培训的知识点范畴内（）。","options":[{"label":"A","text":"智能系统操作"},{"label":"B","text":"数据标注"},{"label":"C","text":"深度学习基础"},{"label":"D","text":"数据采集"}],"answer":"C","explanation":"智能系统操作、数据标注、数据采集属于初级培训的知识点，深度学习基础不属于初级培训的知识点。","mnemonic":"初级培训：系统操作/数据标注/数据采集，深度学习不在初级选C"},{"id":153,"type":"single","text":"下列哪项不是中级知识体系所涉及的知识点？（）","options":[{"label":"A","text":"智能系统维护"},{"label":"B","text":"标注数据审核"},{"label":"C","text":"数据采集"},{"label":"D","text":"实践教学方法"}],"answer":"D","explanation":"实践教学方法不属于中级知识体系中涉及到的知识点","mnemonic":"中级知识体系：系统维护/标注审核/数据采集，实践教学方法不属于选D"},{"id":154,"type":"single","text":"中文分词中的未知词汇问题，是指一段文本里出现了系统词典中没有收录的新词，下列方法中不适合解决未知词汇问题的是（）。","options":[{"label":"A","text":"条件随机场"},{"label":"B","text":"基于字频统计的方法"},{"label":"C","text":"基于规则的方法"},{"label":"D","text":"基于深度学习的方法"}],"answer":"C","explanation":"规则分词方法依赖词典和规则，难以处理未登录词。","mnemonic":"规则分词依赖词典，遇到未知词无能为力，选C基于规则不适合"},{"id":155,"type":"single","text":"下面哪一项不是人机交互中常见的用户特点？（）","options":[{"label":"A","text":"知识储备丰富"},{"label":"B","text":"精细动作能力差"},{"label":"C","text":"对系统的依赖度低"},{"label":"D","text":"专注度高"}],"answer":"C","explanation":"在用户分类中，对系统的依赖度低通常不属于人机交互中常见的用户特点","mnemonic":"对系统依赖度低不是常见用户特点，用户通常依赖系统选C"},{"id":156,"type":"single","text":"业务流程优化中，系统化改造法的优点有（）。","options":[{"label":"A","text":"创新性强，能够从根本上改变现有流程"},{"label":"B","text":"适合外部环境剧烈变化的情况"},{"label":"C","text":"风险较低，基于现有流程进行优化"},{"label":"D","text":"需要投入大量时间和资源进行重新设计"}],"answer":"C","explanation":"系统化改造法基于现有流程，通过整合、简化和自动化等方法进行优化。","mnemonic":"系统化改造法=基于现有流程优化，风险较低，选C"},{"id":157,"type":"single","text":"下列哪项是所有软件里最基础且最核心的部分，它能控制和管理计算机系统的各类硬件与软件资源，还能高效地组织多道程序运行（）。","options":[{"label":"A","text":"内存"},{"label":"B","text":"软件系统"},{"label":"C","text":"操作系统"},{"label":"D","text":"硬件系统"}],"answer":"C","explanation":"操作系统是所有软件中最基础和最核心的部分，是控制和管理计算机系统各种硬件和软件资源，有效地组织多道程序运行的系统软件，是计算机用户和计算机硬件之间的中介程序，它为用户执行程序提供更方便、更有效的环境","mnemonic":"操作系统=最基础最核心的软件，管理硬件软件资源选C"},{"id":158,"type":"single","text":"在业务数据的流转流程里，哪个环节是实现数据从源头到最终应用的关键转化步骤？","options":[{"label":"A","text":"数据采集"},{"label":"B","text":"数据存储"},{"label":"C","text":"数据清洗与转换"},{"label":"D","text":"数据分析与可视化"}],"answer":"C","explanation":"数据清洗与转换确保数据质量，通过处理和格式化提升数据可用性，是数据流程中的核心步骤。","mnemonic":"数据清洗与转换=源头到应用的关键转化步骤，\"洗转是桥梁\"选C"},{"id":159,"type":"single","text":"触屏交互指的是（）。","options":[{"label":"A","text":"使用鼠标进行操作的交互模式"},{"label":"B","text":"使用触摸屏幕进行操作的交互模式"},{"label":"C","text":"使用键盘进行操作的交互模式"},{"label":"D","text":"使用手势进行操作的交互模式"}],"answer":"B","explanation":"触屏交互是一种使用触摸屏幕进行操作的交互模式。用户可以通过手指在屏幕上的触摸、滑动、拖动等操作，与系统进行互动。触屏交互模式已经被广泛应用到智能手机、平板电脑等移动设备中。","mnemonic":"触屏交互=触摸屏幕操作，字面意思直接对应选B"},{"id":160,"type":"single","text":"下列哪种行为与遵章守法的基本要求相契合（）。","options":[{"label":"A","text":"突破行政限制"},{"label":"B","text":"私自改动法律条文"},{"label":"C","text":"遵守生产安全标准"},{"label":"D","text":"只听从个人意愿，不顾及他人"}],"answer":"C","explanation":"遵章守法要求严格遵守国家法律与规章制度，包括安全生产标准等具体规定。","mnemonic":"遵章守法=遵守安全生产标准等规章制度，选C"},{"id":161,"type":"single","text":"象限分析法隶属于（）类型的思维模式。","options":[{"label":"A","text":"形象直观思维"},{"label":"B","text":"随机直觉思维"},{"label":"C","text":"策略驱动思维"},{"label":"D","text":"创意发散思维"}],"answer":"C","explanation":"象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等","mnemonic":"象限分析法=策略驱动思维，用象限划分策略方向选C"},{"id":162,"type":"single","text":"依据《计算机软件保护条例》的规定，软件著作权由谁来享有？","options":[{"label":"A","text":"开发者"},{"label":"B","text":"使用者"},{"label":"C","text":"委托人"},{"label":"D","text":"国家"}],"answer":"A","explanation":"《计算机软件保护条例》第九条规定，软件著作权属于软件开发者，本条例另有规定的除外","mnemonic":"软件著作权属于开发者，\"谁开发谁拥有\"选A"},{"id":163,"type":"single","text":"下列哪项设备属于计算机的输出设备（）。","options":[{"label":"A","text":"音箱"},{"label":"B","text":"摄像机"},{"label":"C","text":"麦克风"},{"label":"D","text":"扫描仪"}],"answer":"A","explanation":"常见的输出设备有显示器、打印机、绘图仪、影像输出系统、语音输出系统、磁记录设备等","mnemonic":"音箱是输出设备，摄像机/麦克风/扫描仪都是输入设备选A"},{"id":164,"type":"single","text":"以下哪个场景不适合采用漏斗分析（）。","options":[{"label":"A","text":"分析电商网站的购物流程转化率"},{"label":"B","text":"评估一款游戏的关卡通过率"},{"label":"C","text":"统计某地区的人口年龄结构"},{"label":"D","text":"优化APP的用户注册流程"}],"answer":"C","explanation":"漏斗分析适用于有明确转化步骤的场景，如购物或注册流程，不适用于简单统计如人口年龄结构。","mnemonic":"漏斗分析适用于有转化步骤的场景，人口统计无转化流程选C"},{"id":165,"type":"single","text":"下列哪项不属于业务分析方法的主要组成部分（）。","options":[{"label":"A","text":"财务报表编制"},{"label":"B","text":"业务分析方法论"},{"label":"C","text":"业务模型分析"},{"label":"D","text":"业务指标分析"}],"answer":"A","explanation":"业务分析方法包括指标分析、模型分析和方法论，财务报表编制属于会计活动，非其核心组成部分。","mnemonic":"业务分析=指标分析+模型分析+方法论，财务报表编制是会计活动选A"},{"id":166,"type":"single","text":"在数据收集过程中，下列哪一项是经常会遇到的困难？（）","options":[{"label":"A","text":"数据质量过高"},{"label":"B","text":"数据格式不一致"},{"label":"C","text":"数据采集工具过于高效"},{"label":"D","text":"数据源单一"}],"answer":"B","explanation":"数据采集过程中，数据格式不一致是常见的难点之一。数据采集需要处理多种数据来源和格式，如结构化数据、非结构化数据等，这些数据在格式上可能存在较大差异，需要进行转换和统一，增加了数据采集的难度。","mnemonic":"数据收集常见困难=数据格式不一致，多源异构是难点选B"},{"id":167,"type":"single","text":"对于阈值化处理，能使所分离的两类像素在灰度分布上具有最大差异，进而实现图像分割的是（）。","options":[{"label":"A","text":"直方图均衡化"},{"label":"B","text":"区域生长"},{"label":"C","text":"OTSU算法"},{"label":"D","text":"二值化"}],"answer":"C","explanation":"通过最大化类间方差（otsu算法），阈值化处理可以使得所分离的两类像素在灰度分布上有最大的差异，从而实现图像分割","mnemonic":"OTSU算法=最大类间方差实现最佳阈值分割，\"大津法分两类\"选C"},{"id":168,"type":"single","text":"在 PowerPoint 中，通过哪项操作能够进入母版视图（）。","options":[{"label":"A","text":"在“插入”选项卡中选择“母版”"},{"label":"B","text":"在“视图”选项卡中选择“母版视图”的“幻灯片母版”"},{"label":"C","text":"关闭所有打开的幻灯片，选择“母版”选项卡，点击“编辑母版”"},{"label":"D","text":"鼠标右键单击幻灯片，选择“母版视图”"}],"answer":"B","explanation":"进入PowerPoint母版视图需要在“视图”选项卡中选择“母版视图”的“幻灯片母版”","mnemonic":"PPT进入母版视图：视图→母版视图→幻灯片母版，\"视图找母版\"选B"},{"id":169,"type":"single","text":"当把 R 方值用作回归模型的评估指标时，该值越接近 1 意味着（）。","options":[{"label":"A","text":"模型预测效果越好"},{"label":"B","text":"模型预测效果越差"},{"label":"C","text":"自变量与因变量无关"},{"label":"D","text":"残差越大"}],"answer":"A","explanation":"R²越接近1，表示模型解释变量变化的能力越强，预测效果越好。","mnemonic":"R方值越接近1模型越好，\"R方趋1效果佳\"选A"},{"id":170,"type":"single","text":"最坏时间复杂度描述的是在（）情况下算法的时间复杂度。","options":[{"label":"A","text":"最坏"},{"label":"B","text":"平均"},{"label":"C","text":"最好"},{"label":"D","text":"任意"}],"answer":"A","explanation":"最坏时间复杂度是描述算法在最坏情况下的时间复杂度，即算法执行所需的最长时间，帮助我们了解算法在最不利情况下的表现，评估其在最极端输入下的执行效率。","mnemonic":"最坏时间复杂度=最坏情况，题目自带答案选A"},{"id":171,"type":"single","text":"AARRR 模型中 \"AA\" 的目的是（）。","options":[{"label":"A","text":"增加收入，提高品牌口碑"},{"label":"B","text":"让用户体验产品，获取新流量"},{"label":"C","text":"提高品牌知名度"},{"label":"D","text":"获取新用户，将其变成活跃用户"}],"answer":"D","explanation":"AARRR模型中AA阶段目标是获取用户并激活。","mnemonic":"AARRR中AA=Acquisition获取+Activation激活，获取并激活用户选D"},{"id":172,"type":"single","text":"业务流程重组（BPR）中的组织重组，包含哪一项内容（）。","options":[{"label":"A","text":"充分发挥信息技术（IT）的潜能，利用IT改造企业过程"},{"label":"B","text":"建立流程管理机构，明确其权责范围，制定各流程内部的运转规则与各流程之间的关系规则，逐步用流程管理图取代传统企业中的组织机构图，实现组织结构扁平化"},{"label":"C","text":"对企业的现有流程进行调研分析、诊断、再设计"},{"label":"D","text":"变革基本信念、转变经营机制、重建组织文化"}],"answer":"B","explanation":"组织重组包括建立流程管理机构，明确权责，以流程管理图替代组织机构图。","mnemonic":"BPR组织重组=建立流程管理机构+扁平化，用流程图替代组织图选B"},{"id":173,"type":"single","text":"业务流程重组（BPR）的核心理念可表述为（）。","options":[{"label":"A","text":"保持现有的组织结构不变"},{"label":"B","text":"仅关注成本和质量的提升"},{"label":"C","text":"根本的再思考和彻底的再设计"},{"label":"D","text":"渐进式的流程改进"}],"answer":"C","explanation":"业务流程重组（BPR）的核心理念是对企业进行根本的再思考和彻底的再设计（B）","mnemonic":"BPR核心=根本再思考+彻底再设计，\"推翻重来\"选C"},{"id":174,"type":"single","text":"计算机存储器的技术指标包含哪些方面（）。","options":[{"label":"A","text":"存储容量"},{"label":"B","text":"存取速度"},{"label":"C","text":"可靠性"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"计算机的存储器技术指标包括存储容量、存取速度、可靠性。","mnemonic":"存储器技术指标：容量+速度+可靠性，三项全对选D"},{"id":175,"type":"single","text":"在可用性评估中，哪种方法主要是依靠专家对界面进行系统的检查，从而找出设计中存在的可用性问题呢？（）","options":[{"label":"A","text":"启发式评估"},{"label":"B","text":"放声思考法"},{"label":"C","text":"问卷调查"},{"label":"D","text":"用户测试"}],"answer":"A","explanation":"启发式评估是一种由专家进行的可用性评估方法","mnemonic":"启发式评估=专家检查法找可用性问题，\"专家来把关\"选A"},{"id":176,"type":"single","text":"5W2H 模型里的 “5W” 包含哪些内容（）。","options":[{"label":"A","text":"Who, What, When, Where, Why"},{"label":"B","text":"Who, What, When, Where, Which"},{"label":"C","text":"Who, Whose When, Which, Why"},{"label":"D","text":"Who, What, When, Where, How"}],"answer":"A","explanation":"5W2H模型涵盖Who、When、Why、How、Where、What和How Much七个要素，用于详细描述事件或任务。","mnemonic":"5W=Who/What/When/Where/Why，五个W开头的疑问词选A"},{"id":177,"type":"single","text":"在 Word 中，若已设定好多级列表的内容，可通过什么方式来设置文档目录的呈现效果（）。","options":[{"label":"A","text":"点击“格式”选项卡，选择“目录”。"},{"label":"B","text":"点击“插入”选项卡，选择“目录”。"},{"label":"C","text":"点击“引用”选项卡，选择“目录”。"},{"label":"D","text":"点击“文件”选项卡，选择“自动目录”。"}],"answer":"C","explanation":"在Word中插入目录，需要先点击“引用”选项卡，然后选择“目录”，再点击“自动目录1”或“自动目录2”，即可插入目录，也可自定义目录","mnemonic":"Word插入目录：引用选项卡→目录，\"引用出目录\"选C"},{"id":178,"type":"single","text":"下列通过对像素灰度值和阈值进行比较来实现图像分割的方法是（）。","options":[{"label":"A","text":"基于阈值的分割方法"},{"label":
