<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI三级理论知识 - 600题刷题系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --primary-bg: #eef2ff;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --warn: #f59e0b;
  --warn-bg: #fffbeb;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Header ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff;
  padding: 16px 20px;
  box-shadow: var(--shadow-md);
}
.header h1 {
  font-size: 18px; font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}
.header .subtitle {
  font-size: 12px; opacity: .85;
  text-align: center;
}

/* ===== Home Page ===== */
.page { display: none; }
.page.active { display: block; }

.home-section {
  padding: 16px;
}
.mode-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.mode-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .2s;
  border: 2px solid transparent;
  user-select: none;
}
.mode-card:active { transform: scale(.97); }
.mode-card.selected { border-color: var(--primary); background: var(--primary-bg); }
.mode-card .icon { font-size: 36px; margin-bottom: 8px; }
.mode-card .label { font-size: 16px; font-weight: 600; color: var(--gray-800); }
.mode-card .desc { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

.batch-title {
  font-size: 16px; font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.batch-title::before {
  content: '';
  width: 4px; height: 20px;
  background: var(--primary);
  border-radius: 2px;
}
.batch-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.batch-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  user-select: none;
}
.batch-card:active { transform: scale(.97); }
.batch-card .batch-num {
  font-size: 14px; font-weight: 700;
  color: var(--primary);
  margin-bottom: 2px;
}
.batch-card .batch-range {
  font-size: 12px; color: var(--gray-500);
}
.batch-card .batch-progress {
  margin-top: 8px;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  overflow: hidden;
}
.batch-card .batch-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 2px;
  transition: width .3s;
}
.batch-card .batch-stats {
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 4px;
}

/* ===== Quiz Mode ===== */
.quiz-header {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 90;
}
.quiz-back {
  background: none; border: none;
  font-size: 24px; color: var(--gray-600);
  cursor: pointer; padding: 4px 8px;
}
.quiz-progress-text {
  font-size: 14px; font-weight: 600;
  color: var(--gray-700);
}
.quiz-nav-btns {
  display: flex; gap: 6px;
}
.quiz-nav-btns button {
  background: var(--gray-100); border: 1px solid var(--gray-200);
  border-radius: 8px; padding: 6px 12px;
  font-size: 13px; color: var(--gray-600);
  cursor: pointer;
}
.quiz-nav-btns button:disabled { opacity: .4; }

.quiz-body {
  padding: 16px;
  padding-bottom: 100px;
}
.q-type-badge {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 10px;
}
.q-type-badge.single { background: #dbeafe; color: #1d4ed8; }
.q-type-badge.multi { background: #fce7f3; color: #be185d; }
.q-type-badge.judge { background: #fef3c7; color: #b45309; }

.q-text {
  font-size: 16px; font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 16px;
  line-height: 1.7;
}

.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-option {
  background: #fff;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 15px;
  color: var(--gray-700);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  user-select: none;
  line-height: 1.5;
}
.q-option:active { transform: scale(.98); }
.q-option .opt-label {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
  color: var(--gray-500);
  transition: all .15s;
}
.q-option.selected {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.q-option.selected .opt-label {
  background: var(--primary); color: #fff;
}
.q-option.correct {
  border-color: var(--success) !important;
  background: var(--success-bg) !important;
}
.q-option.correct .opt-label {
  background: var(--success) !important; color: #fff !important;
}
.q-option.wrong {
  border-color: var(--danger) !important;
  background: var(--danger-bg) !important;
}
.q-option.wrong .opt-label {
  background: var(--danger) !important; color: #fff !important;
}
.q-option.disabled { pointer-events: none; }

/* Multi-select confirm button */
.multi-confirm-wrap {
  margin-top: 12px;
  text-align: center;
  display: none;
}
.multi-confirm-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 32px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.multi-confirm-btn:disabled {
  opacity: .5;
}

/* Judge options */
.judge-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.judge-option {
  background: #fff;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.judge-option:active { transform: scale(.97); }
.judge-option.selected { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.judge-option.correct { border-color: var(--success) !important; background: var(--success-bg) !important; color: var(--success) !important; }
.judge-option.wrong { border-color: var(--danger) !important; background: var(--danger-bg) !important; color: var(--danger) !important; }
.judge-option.disabled { pointer-events: none; }

/* Result card */
.result-card {
  margin-top: 16px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-header {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.result-header.correct-header { background: var(--success-bg); color: var(--success); }
.result-header.wrong-header { background: var(--danger-bg); color: var(--danger); }
.result-answer {
  padding: 12px 16px;
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  border-bottom: 1px solid var(--gray-100);
}
.result-explanation {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.7;
  border-bottom: 1px solid var(--gray-100);
}
.result-mnemonic {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--warn);
  background: var(--warn-bg);
  line-height: 1.6;
}
.result-explanation strong, .result-mnemonic strong {
  font-weight: 700;
}

/* Bottom nav for quiz */
.quiz-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 90;
  box-shadow: 0 -2px 10px rgba(0,0,0,.05);
}
.quiz-bottom button {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
}
.quiz-bottom button:disabled { opacity: .4; }
.btn-prev { background: var(--gray-100); color: var(--gray-600); }
.btn-next { background: var(--primary); color: #fff; }
.btn-next:active { background: #4338ca; }
.quiz-counter {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 600;
}

/* ===== Study Mode ===== */
.study-header {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 90;
}
.study-back {
  background: none; border: none;
  font-size: 24px; color: var(--gray-600);
  cursor: pointer; padding: 4px 8px;
}
.study-title {
  font-size: 16px; font-weight: 600; color: var(--gray-800);
}

.study-body {
  padding: 12px;
  padding-bottom: 40px;
}
.study-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.study-card .sc-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-num {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.study-card .sc-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-800);
  line-height: 1.6;
}
.study-card .sc-options {
  padding: 8px 14px;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-opt {
  padding: 4px 0;
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.5;
}
.study-card .sc-opt.is-answer {
  color: var(--success);
  font-weight: 700;
}
.study-card .sc-answer {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  background: var(--primary-bg);
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-explain {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--gray-500);
  line-height: 1.6;
  border-bottom: 1px solid var(--gray-100);
}
.study-card .sc-mnemonic {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--warn);
  background: var(--warn-bg);
  line-height: 1.5;
}

/* ===== Action Buttons ===== */
.action-section {
  padding: 16px;
  padding-top: 8px;
}
.action-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  margin-bottom: 10px;
}
.action-btn:active { transform: scale(.98); }
.btn-clear {
  background: #fff;
  color: var(--danger);
  border: 1px solid var(--danger);
}

/* ===== Stats Bar ===== */
.stats-bar {
  background: #fff;
  margin: 0 16px 16px;
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-around;
}
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.stat-num.green { color: var(--success); }
.stat-num.red { color: var(--danger); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(.8);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  animation: slideUp .2s ease;
}
.modal-box h3 { font-size: 16px; color: var(--gray-800); margin-bottom: 8px; }
.modal-box p { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.modal-cancel { background: var(--gray-100); color: var(--gray-600); }
.modal-confirm { background: var(--danger); color: #fff; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 0; }

/* ===== Loading ===== */
.loading-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  color: #fff;
  transition: opacity .3s;
}
.loading-screen.fade-out { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 16px; font-weight: 600; }

/* ===== Favorite Button ===== */
.fav-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: 1.5px solid var(--gray-300);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 13px;
  color: var(--gray-400);
  cursor: pointer;
  transition: all .2s;
  margin-left: auto;
  float: right;
  user-select: none;
}
.fav-btn:active { transform: scale(.95); }
.fav-btn.faved {
  border-color: var(--warn);
  color: var(--warn);
  background: var(--warn-bg);
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载题库...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">确认清空</h3>
    <p id="modalMsg">确定要清空所有做题记录吗？此操作不可恢复。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" id="modalConfirmBtn">确定清空</button>
    </div>
  </div>
</div>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="homePage">
  <div class="header">
    <h1>AI三级理论知识</h1>
    <div class="subtitle">演练 600 题刷题系统</div>
  </div>

  <!-- Stats -->
  <div style="padding:16px 16px 0">
    <div class="stats-bar" style="margin:0">
      <div class="stat-item">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">已做题数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num green" id="statCorrect">0</div>
        <div class="stat-label">答对</div>
      </div>
      <div class="stat-item">
        <div class="stat-num red" id="statWrong">0</div>
        <div class="stat-label">答错</div>
      </div>
      <div class="stat-item" onclick="openWrongBook()" style="cursor:pointer">
        <div class="stat-num red" id="statWrongBook">0</div>
        <div class="stat-label">错题集 &#9654;</div>
      </div>
      <div class="stat-item" onclick="openFavorites()" style="cursor:pointer">
        <div class="stat-num" id="statFavorites" style="color:var(--warn)">0</div>
        <div class="stat-label">收藏夹 &#9654;</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statRate" style="color:var(--warn)">0%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>
  </div>

  <div class="home-section">
    <!-- Mode Selection -->
    <div class="batch-title">选择模式</div>
    <div class="mode-cards">
      <div class="mode-card selected" id="modeQuiz" onclick="selectMode('quiz')">
        <div class="icon">&#9997;&#65039;</div>
        <div class="label">刷题模式</div>
        <div class="desc">选择答案立即判对错</div>
      </div>
      <div class="mode-card" id="modeStudy" onclick="selectMode('study')">
        <div class="icon">&#128214;</div>
        <div class="label">背题模式</div>
        <div class="desc">直接展示答案解析</div>
      </div>
    </div>

    <!-- Batch Selection -->
    <div class="batch-title">选择题库</div>
    <div class="batch-grid" id="batchGrid"></div>
  </div>

  <div class="action-section">
    <button class="action-btn btn-clear" onclick="showClearModal()">&#128465; 一键清空所有做题记录</button>
  </div>
</div>

<!-- ===== QUIZ PAGE ===== -->
<div class="page" id="quizPage">
  <div class="quiz-header">
    <button class="quiz-back" onclick="goHome()">&#8592;</button>
    <span class="quiz-progress-text" id="quizProgressText"></span>
    <div class="quiz-nav-btns">
      <button onclick="jumpToQuestion()" title="跳转">&#128203;</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div style="height:3px;background:var(--gray-200);">
    <div id="quizProgressBar" style="height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));transition:width .3s;width:0"></div>
  </div>

  <div class="quiz-body" id="quizBody"></div>

  <div class="quiz-bottom">
    <button class="btn-prev" id="btnPrev" onclick="prevQuestion()">&#9664; 上一题</button>
    <span class="quiz-counter" id="quizCounter"></span>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 &#9654;</button>
  </div>
</div>

<!-- ===== STUDY PAGE ===== -->
<div class="page" id="studyPage">
  <div class="study-header">
    <button class="study-back" onclick="goHome()">&#8592;</button>
    <span class="study-title" id="studyTitle"></span>
  </div>
  <div class="study-body" id="studyBody"></div>
</div>

<!-- wrongBookPage removed: wrong book now uses quizPage -->

<script>
// ===== DATA =====
const ALL_QUESTIONS = [{"id":1,"type":"single","text":"下列哪项用于寻找最亮的点或者与最亮区域相邻的暗点（）。","options":[{"label":"A","text":"高斯滤波器"},{"label":"B","text":"中值滤波器"},{"label":"C","text":"最大值滤波器"},{"label":"D","text":"最小值滤波器"}],"answer":"C","explanation":"最大值滤波器用于寻找最亮点或邻近暗点。","mnemonic":"最大值滤波器找最亮点，\"最大=最亮\"选C"},{"id":2,"type":"single","text":"制定数据标注流程时，第一步应该做什么（）。","options":[{"label":"A","text":"明确数据标注的目的"},{"label":"B","text":"选择适合的工具和设备"},{"label":"C","text":"招募标注人员"},{"label":"D","text":"制定标注规则"}],"answer":"A","explanation":"确定数据标注目的有助于制定清晰合理的流程，保证标注结果的有效性和可靠性。","mnemonic":"流程第一步先\"明目的\"，目的不明方向错，选A"},{"id":3,"type":"single","text":"下列能够综合多种特征进行中文分词的是（）。","options":[{"label":"A","text":"条件随机场"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"A","explanation":"条件随机场（CRF）可结合上下文特征提高分词准确性。","mnemonic":"条件随机场CRF=\"综合多特征分词\"，选A"},{"id":4,"type":"single","text":"在行为模型的交互流程中，下列哪项描述了行为模型与环境之间进行信息交换的方式？","options":[{"label":"A","text":"决策树的建立和优化"},{"label":"B","text":"强化学习的奖励函数"},{"label":"C","text":"学习算法的选择"},{"label":"D","text":"观察-行动-评估循环"}],"answer":"D","explanation":"观察-行动-评估循环是描述行为模型与环境之间信息交流的方法","mnemonic":"行为模型与环境交互靠\"观-行-评\"循环，选D"},{"id":5,"type":"single","text":"PEST 模型在（）方面体现出对企业的帮助。","options":[{"label":"A","text":"通过技术升级直接降低生产成本"},{"label":"B","text":"增加销售渠道和客户贡献率"},{"label":"C","text":"提高产品质量和服务水平"},{"label":"D","text":"因地制宜、灵活应对市场变化"}],"answer":"D","explanation":"PEST模型分析有助于企业了解外部环境的情况，提前预判市场趋势，帮助企业因地制宜、灵活应对市场变化，提高市场竞争力","mnemonic":"PEST=外部环境分析，\"因地制宜\"应对变化，选D"},{"id":6,"type":"single","text":"在计算机执行计算的基础硬件部件里，处于核心地位的组成部分是（）。","options":[{"label":"A","text":"输入设备"},{"label":"B","text":"输出设备"},{"label":"C","text":"CPU（中央处理单元）"},{"label":"D","text":"存储器"}],"answer":"C","explanation":"计算机的CPU（中央处理单元）、存储器、输入/输出设备是计算机执行计算的基础硬件部件。CPU是计算机最核心的组成部分，它负责执行运算和控制指令，是计算能力的直接体现。","mnemonic":"CPU是计算机的\"大脑\"，核心中的核心，选C"},{"id":7,"type":"single","text":"下列关于劳动合同的履行与变更的说法，不正确的是（）。","options":[{"label":"A","text":"用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报酬"},{"label":"B","text":"用人单位发生合并或者分立等情况，原劳动合同无效，需重新签订"},{"label":"C","text":"用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响劳动合同的履行"},{"label":"D","text":"用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务"}],"answer":"B","explanation":"《中华人民共和国劳动合同法》第二十九条规定，用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务。第三十条规定，用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报酬。第三十三条规定，用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响劳动合同的履行。第三十四条规定，用人单位发生合并或者分立等情况，原劳动合同继续有效，劳动合同由承继其权利和义务的用人单位继续履行。","mnemonic":"合并分立≠合同无效，原合同继续有效，B说法错误"},{"id":8,"type":"single","text":"下列哪项是构成计算机硬件的组成部分（）。","options":[{"label":"A","text":"浏览器"},{"label":"B","text":"显卡"},{"label":"C","text":"虚拟机"},{"label":"D","text":"操作系统"}],"answer":"B","explanation":"计算机硬件包括中央处理器、存储器、输入输出设备、主板等，显卡属于计算机硬件的一部分","mnemonic":"显卡是实体硬件，浏览器/虚拟机/操作系统都是软件，选B"},{"id":9,"type":"single","text":"关于交叉验证说法正确的是（）。","options":[{"label":"A","text":"交叉验证将数据集划分为两个子集，分别作为训练集和测试集，进行一次性训练和测试"},{"label":"B","text":"交叉验证通过将数据集划分为k个子集，依次使用每个子集作为测试集，其余k-1个子集作为训练集，最终综合所有测试结果"},{"label":"C","text":"交叉验证每次随机选择部分样本作为训练集，剩余样本作为测试集，直到所有样本都作为测试集"},{"label":"D","text":"交叉验证仅使用一个子集进行训练，其他子集不参与模型训练与测试"}],"answer":"B","explanation":"k折交叉验证将数据分为k个子集，轮换测试并平均结果，以评估模型性能。","mnemonic":"k折交叉验证=\"轮流当测试\"，k个子集轮换，选B"},{"id":10,"type":"single","text":"运用参数优化方法时，下列（）行为是应当避免的。","options":[{"label":"A","text":"限制搜索范围"},{"label":"B","text":"尝试使用默认参数设定"},{"label":"C","text":"用尽所有可用的参数组合"},{"label":"D","text":"将测试数据用于参数选择"}],"answer":"D","explanation":"D 选项是最需要避免的行为。测试数据应该仅用于最终模型评估，而不是在训练和优化过程中使用。如果在优化阶段使用测试数据，可能导致模型对测试数据过拟合，从而失去模型的泛化能力。C选项在某些情况下可能导致计算开销过大，但并不意味着应该完全避免。在资源允许的情况下，穷举所有参数组合是一种常见且有效的方法，尤其在使用 GridSearch 时。B 选项许多模型的默认参数能够提供一个合理的起点，依赖默认参数更多的是一种保守的做法。A 选项中的“限制搜索范围”并不是错误行为，实际上，在一些情况下，适当限制搜索范围有助于提高效率，尤其是当我们对某些超参数有足够了解时。","mnemonic":"测试数据不能用于调参，否则过拟合，选D要避免"},{"id":11,"type":"single","text":"在以下哪些情况中，选择事件模式作为输入模式是最恰当的？（）","options":[{"label":"A","text":"输入数据是连续性的，且需要实时处理，如鼠标和键盘输入"},{"label":"B","text":"输入数据需要在应用程序暂停时等待，直到收到数据后才继续执行"},{"label":"C","text":"应用程序需要同时处理多个输入设备的输入，且保证输入数据不会丢失"},{"label":"D","text":"输入频率较低且不需要实时响应，适合按需触发输入"}],"answer":"C","explanation":"应用程序需要同时处理多个输入设备的输入，且保证输入数据不会丢失，事件模式最适合这种场景，因为它允许输入设备和应用程序并行工作，输入数据会被保存到事件队列中，应用程序可以随时读取，确保数据不会丢失。此选项符合事件模式的特点，因此是正确答案。其他选项解析：输入数据是连续性的，且需要实时处理，如鼠标和键盘输入，这种情况适合采样模式，因为采样模式支持连续性的信息流，并且应用程序可以在处理其他数据时不断采样输入设备数据。输入数据需要在应用程序暂停时等待，直到收到数据后才继续执行，这种情况适合请求模式，因为请求模式要求应用程序在等待输入时暂停执行，直到收到输入数据后才继续执行。输入频率较低且不需要实时响应，适合按需触发输入，这种情况适合请求模式，因为输入的频率较低，且不要求实时响应，适合在应用程序需要输入时才启动输入设备。","mnemonic":"事件模式=多设备并行+事件队列不丢数据，选C"},{"id":12,"type":"single","text":"《中华人民共和国网络安全法》规定，网络运营者应当采取技术措施监测、记录网络运行状态及网络安全事件，并按规定留存相关网络日志不少于多长时间（）。","options":[{"label":"A","text":"一年"},{"label":"B","text":"三个月"},{"label":"C","text":"六个月"},{"label":"D","text":"一个月"}],"answer":"C","explanation":"《中华人民共和国网络安全法》第二十一条规定，国家实行网络安全等级保护制度","mnemonic":"网络安全法日志留存\"六个月\"，半年=六月选C"},{"id":13,"type":"single","text":"在业务流程优化过程中，找到阻碍流程优化目标实现的因素后，接下来应该做什么（）。","options":[{"label":"A","text":"重新成立项目小组"},{"label":"B","text":"将情况反馈给领导并得到确认"},{"label":"C","text":"直接对现有流程进行改造"},{"label":"D","text":"立即开始实施新的流程方案"}],"answer":"B","explanation":"根据业务流程优化的顺序，找到阻碍流程优化目标实现的因素之后，下一步是将情况反馈给领导并得到确认（C）","mnemonic":"找到问题后先\"汇报领导确认\"，再行动，选B"},{"id":14,"type":"single","text":"在体现 “交替” 关系的状态转换网络中，状态 S2 可通过（）转变为状态 S3。","options":[{"label":"A","text":"产生 G 正常结束事件"},{"label":"B","text":"G0 正常结束事件"},{"label":"C","text":"G1 正常结束事件"},{"label":"D","text":"外部事件0"}],"answer":"B","explanation":"根据“交替”关系的状态转换网络，状态 S2 可以通过 G0 正常结束事件直接转换到状态 S3","mnemonic":"交替关系中S2→S3靠G0正常结束事件，选B"},{"id":15,"type":"single","text":"下列哪种行为与遵章守法的基本要求相契合（）。","options":[{"label":"A","text":"突破行政限制"},{"label":"B","text":"私自改动法律条文"},{"label":"C","text":"遵守生产安全标准"},{"label":"D","text":"只听从个人意愿，不顾及他人"}],"answer":"C","explanation":"遵章守法要求严格遵守国家法律与规章制度，包括安全生产标准等具体规定。","mnemonic":"遵章守法=\"遵守安全标准\"，其余都违法，选C"},{"id":16,"type":"single","text":"关于采样模式的描述，哪一项是不正确的？（）","options":[{"label":"A","text":"采样模式允许输入设备与应用程序独立工作，输入设备持续不断地输入数据。"},{"label":"B","text":"在采样模式下，应用程序需要周期性地读取输入设备的状态"},{"label":"C","text":"采样模式适用于实时性要求高的应用场景，例如视频流输入"},{"label":"D","text":"在采样模式下，应用程序无法处理输入设备的数据，直到输入操作完成"}],"answer":"D","explanation":"选项A正确，采样模式的特点之一就是输入设备与应用程序独立工作，输入设备持续不断地采样数据，应用程序在需要时读取这些数据。选项B正确，采样模式下应用程序定期读取输入设备的状态或数据，应用程序和输入设备是独立运行的。选项C是正确的，采样模式对于实时流式数据处理非常适合，例如视频流和实时传感器数据。选项D不正确，采样模式允许输入设备持续工作，应用程序可以随时读取采样数据，而不需要等待输入操作完成。","mnemonic":"采样模式不需等输入完成，可随时读取，D说法错误"},{"id":17,"type":"single","text":"下列哪项方法可以减轻算法的过拟合现象（）。","options":[{"label":"A","text":"减少正则化项权重"},{"label":"B","text":"忽略测试集的性能"},{"label":"C","text":"提高模型复杂度"},{"label":"D","text":"增加训练数据量"}],"answer":"D","explanation":"A选项：增加训练数据量通常能帮助模型更好地学习数据的规律，减少过拟合，因为更多的数据能帮助模型泛化","mnemonic":"过拟合靠\"加数据\"缓解，数据多则泛化好，选D"},{"id":18,"type":"single","text":"在人机交互的多种任务分析手段中，（）主要用于刻画系统里不同用户角色和系统功能之间的交互关联。","options":[{"label":"A","text":"工序约束陈述"},{"label":"B","text":"用例图"},{"label":"C","text":"协作图"},{"label":"D","text":"顺序图"}],"answer":"B","explanation":"用例图描述用户角色与系统功能的交互关系。","mnemonic":"用例图=\"角色与功能的交互图\"，选B"},{"id":19,"type":"single","text":"《中华人民共和国网络安全法》明确，网络产品及服务的提供者严禁设置（）。","options":[{"label":"A","text":"认证程序"},{"label":"B","text":"防护程序"},{"label":"C","text":"恶意程序"},{"label":"D","text":"安全程序"}],"answer":"C","explanation":"《中华人民共和国网络安全法》第二十二条规定，网络产品、服务应当符合相关国家标准的强制性要求。网络产品、服务的提供者不得设置恶意程序；发现其网络产品、服务存在安全缺陷、漏洞等风险时，应当立即采取补救措施，按照规定及时告知用户并向有关主管部门报告。","mnemonic":"网络安全法禁设\"恶意程序\"，恶=C"},{"id":20,"type":"single","text":"以下哪一选项不属于智慧医疗的实际应用案例？","options":[{"label":"A","text":"远程医疗"},{"label":"B","text":"智慧农业"},{"label":"C","text":"智能诊断辅助"},{"label":"D","text":"智能健康监测"}],"answer":"B","explanation":"智慧医疗的相关案例不包括智慧农业。","mnemonic":"智慧农业不属于智慧医疗，\"农≠医\"选B"},{"id":21,"type":"single","text":"对比分析法指的是对多少个及以上的数据进行比较（）。","options":[{"label":"A","text":"一组"},{"label":"B","text":"三组或三组上"},{"label":"C","text":"两组或两组以上"},{"label":"D","text":"至少三组"}],"answer":"C","explanation":"对比分析法，即对两组或两组以上的数据进行比较，是最通用的一种方法","mnemonic":"对比分析法=\"两组或两组以上\"数据比较，选C"},{"id":22,"type":"single","text":"下列哪项不属于业务分析方法论（）。","options":[{"label":"A","text":"因果分析方法"},{"label":"B","text":"同期群分析方法"},{"label":"C","text":"帕拉梅拉分析方法"},{"label":"D","text":"A/B测试分析方法"}],"answer":"C","explanation":"帕拉梅拉分析不是业务分析方法，其他选项是常用方法。","mnemonic":"帕拉梅拉是汽车不是分析法，排除选C"},{"id":23,"type":"single","text":"在从事职业活动时，什么样的行为是符合职业道德要求的（）。","options":[{"label":"A","text":"向客户提供虚假信息"},{"label":"B","text":"坚持原则不做违法行为"},{"label":"C","text":"向领导谎报工作进展情况"},{"label":"D","text":"向同事索要私人财物"}],"answer":"B","explanation":"坚持原则不做违法行为可以体现职业道德的要求，而向同事索要私人财物、向领导谎报工作进展情况、向客户提供虚假信息则均违反职业道德。","mnemonic":"职业道德=\"坚持原则不违法\"，选B"},{"id":24,"type":"single","text":"下列主要依靠图像中的边缘信息来完成分割的方法是（）。","options":[{"label":"A","text":"基于深度学习的方法"},{"label":"B","text":"区域生长法"},{"label":"C","text":"边缘检测法"},{"label":"D","text":"基于聚类的方法"}],"answer":"C","explanation":"边缘检测法依靠图像灰度跃变确定边缘位置完成分割。","mnemonic":"边缘检测法靠\"边缘信息\"分割图像，名副其实选C"},{"id":25,"type":"single","text":"国家规定，劳动者每日的工作时长不超过（）小时，平均每周的工作时长不超过四十四小时。","options":[{"label":"A","text":"14"},{"label":"B","text":"12"},{"label":"C","text":"10"},{"label":"D","text":"8"}],"answer":"D","explanation":"根据《中华人民共和国劳动法》第三十六条规定，国家实行劳动者每日工作时间不超过八小时、平均每周工作时间不超过四十四小时的工时制度","mnemonic":"每日工作不超\"八\"小时，\"八八四四\"劳动法，选D"},{"id":26,"type":"single","text":"下列哪项是用于数据存储的传统关系型数据库（）。","options":[{"label":"A","text":"Elasticsearch"},{"label":"B","text":"PostgreSQL"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop"}],"answer":"B","explanation":"Hadoop是一个分布式计算框架，MongoDB是一种NoSQL数据库，Elasticsearch是一种全文搜索引擎","mnemonic":"PostgreSQL是传统关系型数据库，其余都是非关系型/框架，选B"},{"id":27,"type":"single","text":"多维度拆解分析法是从哪些方面去剖析事物原本的 “面貌”（）。","options":[{"label":"A","text":"多个唯独"},{"label":"B","text":"多个围度"},{"label":"C","text":"多个纬度"},{"label":"D","text":"多个维度"}],"answer":"D","explanation":"多维度拆解分析法就是从多个维度去分析事物本来的“面貌”","mnemonic":"多维度拆解的\"维\"是维度的维，不是纬度/围度，选D"},{"id":28,"type":"single","text":"下列哪一项不属于智慧城市的应用场景？","options":[{"label":"A","text":"智慧交通"},{"label":"B","text":"智慧农业"},{"label":"C","text":"智慧医疗"},{"label":"D","text":"智慧消防"}],"answer":"B","explanation":"智慧城市的应用场景不包括智慧农业。","mnemonic":"智慧农业不在智慧城市范畴，\"农村≠城市\"选B"},{"id":29,"type":"single","text":"在 PowerPoint 的母版视图中，只有修改哪项的设计，才能对所有幻灯片的设计产生影响（）。","options":[{"label":"A","text":"当前打开的幻灯片"},{"label":"B","text":"单个幻灯片"},{"label":"C","text":"幻灯片版式"},{"label":"D","text":"幻灯片母版"}],"answer":"D","explanation":"在母版视图中，只有更改幻灯片母版的设计才能同时影响所有幻灯片的设计","mnemonic":"PPT母版视图改\"母版\"才影响全部幻灯片，选D"},{"id":30,"type":"single","text":"随机森林算法处理分类任务时，每个决策树的节点划分依据是（）。","options":[{"label":"A","text":"熵"},{"label":"B","text":"均方差"},{"label":"C","text":"信息增益"},{"label":"D","text":"基尼系数"}],"answer":"D","explanation":"随机森林使用基尼系数作为节点划分标准。","mnemonic":"随机森林分类用\"基尼系数\"划分节点，选D"},{"id":31,"type":"single","text":"趋势分析法重点关注数据的（ ）。","options":[{"label":"A","text":"随机性"},{"label":"B","text":"单一时点波动"},{"label":"C","text":"动态变化和趋势方向"},{"label":"D","text":"静态数值"}],"answer":"C","explanation":"趋势分析法关注多期连续数据的动态变化。","mnemonic":"趋势分析看\"动态变化和方向\"，趋势=动态，选C"},{"id":32,"type":"single","text":"业务流程重组（BPR）的核心目标体现在什么方面（）。","options":[{"label":"A","text":"提高技术集成水平"},{"label":"B","text":"优化内部管理流程"},{"label":"C","text":"提高员工满意度"},{"label":"D","text":"关注客户的需求和满意度"}],"answer":"D","explanation":"业务流程重组（BPR）的核心目标是关注客户的需求和满意度（A）。虽然提高员工满意度（B）、优化内部管理流程（C）和提高技术集成水平（D）也是BPR的重要方面，但它们并非核心目标。","mnemonic":"BPR核心目标=\"客户需求和满意度\"，以客户为中心，选D"},{"id":33,"type":"single","text":"K - 近邻算法中 K 值的选取，是通过（）给分类结果带来影响的。","options":[{"label":"A","text":"K值的选择需要根据具体情况来确定"},{"label":"B","text":"K值的选择不会对分类结果产生影响"},{"label":"C","text":"K值越大，分类结果越准确"},{"label":"D","text":"K值越小，分类结果越准确"}],"answer":"A","explanation":"K值的选择需要根据具体情况来确定，一般来说，当K值较小时，分类结果容易受到噪声的影响；当K值较大时，分类结果又容易受到邻居数目的影响","mnemonic":"KNN的K值\"具体情况具体分析\"，没有绝对大小之分，选A"},{"id":34,"type":"single","text":"以下用于评估 Calinski-Harabasz 指数聚类质量的是（）。","options":[{"label":"A","text":"类内样本间的平均距离与类间样本间的平均距离"},{"label":"B","text":"类间方差与类内方差"},{"label":"C","text":"簇的数量与样本数量"},{"label":"D","text":"轮廓系数的平均值与标准差"}],"answer":"B","explanation":"Calinski-Harabasz指数通过类内协方差最小化和类间协方差最大化评估聚类质量。","mnemonic":"CH指数=\"类间方差大、类内方差小\"，选B"},{"id":35,"type":"single","text":"流程优化工作的主要目标中，不包含下列哪一项（）。","options":[{"label":"A","text":"明确现存问题，构建统一的流程优化目标;"},{"label":"B","text":"针对流程优化方案形成共识"},{"label":"C","text":"增加流程的复杂性以提高适应性"},{"label":"D","text":"推动后续流程落地实施"}],"answer":"C","explanation":"流程优化旨在提高效率、减少浪费，主要目标包括问题识别、共识形成和落地实施，而非增加复杂性。","mnemonic":"流程优化减复杂而非增复杂，\"增加复杂性\"是反目标，选C"},{"id":36,"type":"single","text":"下列哪项不属于人机交互的研究范畴？","options":[{"label":"A","text":"人机交互评估方法研究"},{"label":"B","text":"用户需求分析"},{"label":"C","text":"人工智能算法研究"},{"label":"D","text":"用户界面设计"}],"answer":"C","explanation":"机交互研究主要关注用户与计算机之间的交互过程，包括用户界面设计、用户需求分析和人机交互评估方法研究等","mnemonic":"人工智能算法研究≠人机交互研究，选C排除"},{"id":37,"type":"single","text":"聚类分析具备（）的功能。","options":[{"label":"A","text":"将数据分为有序的组别"},{"label":"B","text":"通过建立回归模型进行预测"},{"label":"C","text":"寻找数据对象之间的内在结构和关系"},{"label":"D","text":"直接对数据进行特征选择和降维"}],"answer":"C","explanation":"聚类分析是无监督学习，用于将数据分组为相似簇，发现数据内在结构。","mnemonic":"聚类分析=\"发现数据内在结构和关系\"，无监督探索，选C"},{"id":38,"type":"single","text":"可实现图像的自适应阈值分割的函数是（）。","options":[{"label":"A","text":"filters.sobel"},{"label":"B","text":"active_contour"},{"label":"C","text":"adaptiveThreshold"},{"label":"D","text":"threshold"}],"answer":"C","explanation":"Python的 OpenCV库中提供函adaptiveThreshold用于实现图像的自适应阈值分割","mnemonic":"自适应阈值分割用adaptiveThreshold，\"adaptive=自适应\"选C"},{"id":39,"type":"single","text":"哪一项是模拟人耳听力特点所设计的一组滤波器（）。","options":[{"label":"A","text":"分帧加窗"},{"label":"B","text":"采样频率"},{"label":"C","text":"梅尔滤波器组"},{"label":"D","text":"短时傅里叶变换"}],"answer":"C","explanation":"梅尔滤波器组模仿人耳对频率的非线性感知，用于特征提取，尤其适用于语音信号处理。","mnemonic":"梅尔滤波器=\"模拟人耳\"，梅尔对应听觉频率，选C"},{"id":40,"type":"single","text":"在 ETL 流程中，“增量抽取”（Incremental Loading）的核心作用是（）。","options":[{"label":"A","text":"只抽取数据库中新增或修改的数据"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"A","explanation":"增量抽取只抽取自上一次抽取以来，数据库中要抽取的表中新增或修改的数据","mnemonic":"增量抽取=\"只取新增和修改的\"，增量≠全量，选A"},{"id":41,"type":"single","text":"若想缩短流程执行时的等待时间与业务处理时间，可采用的原则是（）。","options":[{"label":"A","text":"并行"},{"label":"B","text":"结果导向"},{"label":"C","text":"面向客户"},{"label":"D","text":"循序渐进"}],"answer":"A","explanation":"并行原则是指为了缩短流程执行过程中的等待时间和业务处理时间，可以将平行开展的流程进行并行处理","mnemonic":"缩短等待时间靠\"并行\"处理，同时做多件事，选A"},{"id":42,"type":"single","text":"关联分析里的支持度，其含义是（）。","options":[{"label":"A","text":"属性的频率"},{"label":"B","text":"属性的重要程度"},{"label":"C","text":"出现某个属性组合的频率"},{"label":"D","text":"两个属性之间的相关程度"}],"answer":"C","explanation":"支持度表示某个属性组合在数据中出现的频率或次数，是关联分析中最基本的概念之一","mnemonic":"支持度=\"某属性组合出现的频率\"，组合频率选C"},{"id":43,"type":"single","text":"计算机的硬件系统是由哪些部分构成的（）。","options":[{"label":"A","text":"运算器、存储器、控制器、"},{"label":"B","text":"运算器、存储器、输入设备、输出设备"},{"label":"C","text":"运算器、存储器、控制器、输入设备、输出设备"},{"label":"D","text":"运算器、输入设备、输出设备"}],"answer":"C","explanation":"计算机硬件系统包括运算器、控制器、存储器、输入设备和输出设备五个基本组成部分。","mnemonic":"计算机硬件五大件=\"运算+存储+控制+输入+输出\"，最全选C"},{"id":44,"type":"single","text":"Web 界面设计中 “简单性原则” 的核心内容是什么？（）","options":[{"label":"A","text":"指导设计师要考虑到用户界面的可理解性和易操作性"},{"label":"B","text":"强调消除不必要的复杂性和混乱，以提供直观和易于操作的用户体验"},{"label":"C","text":"强调将界面设计与用户习惯和期望相一致"},{"label":"D","text":"强调给予用户明确的反馈，使用户了解其操作的结果和当前状态"}],"answer":"B","explanation":"简单性原则强调在Web界面设计中消除不必要的复杂性和混乱，旨在为用户提供直观、易于操作的界面","mnemonic":"简单性原则=\"消除不必要复杂性\"，简单=直观易操作，选B"},{"id":45,"type":"single","text":"业务流程重组（BPR）的核心目标体现在什么方面（）。","options":[{"label":"A","text":"提高技术集成水平"},{"label":"B","text":"优化内部管理流程"},{"label":"C","text":"提高员工满意度"},{"label":"D","text":"关注客户的需求和满意度"}],"answer":"D","explanation":"业务流程重组（BPR）的核心目标是关注客户的需求和满意度（A）。虽然提高员工满意度（B）、优化内部管理流程（C）和提高技术集成水平（D）也是BPR的重要方面，但它们并非核心目标。","mnemonic":"BPR核心=\"关注客户需求和满意度\"，客户至上选D"},{"id":46,"type":"single","text":"（）是逻辑回归算法中常用的损失函数。","options":[{"label":"A","text":"对数似然损失函数"},{"label":"B","text":"均方误差"},{"label":"C","text":"Hinge损失函数"},{"label":"D","text":"平均绝对误差"}],"answer":"A","explanation":"逻辑回归算法采用的是对数损失函数作为损失函数。该函数通过最小化预测概率与真实标签之间的差异，间接优化模型对正样本概率的预测能力。","mnemonic":"逻辑回归用\"对数似然损失函数\"，逻辑=对数，选A"},{"id":47,"type":"single","text":"中文分词的目的是（）。","options":[{"label":"A","text":"使数据更规范"},{"label":"B","text":"优化中文文本的排版效果"},{"label":"C","text":"显示汉字的拼音"},{"label":"D","text":"使句子更具有语义明确性"}],"answer":"D","explanation":"中文分词旨在将文本分割为有意义的词汇，增强语义明确性，便于机器处理和人工阅读。","mnemonic":"中文分词目的=\"语义明确性\"，分词让机器懂语义，选D"},{"id":48,"type":"single","text":"LOTOS 算子能够用来解决哪（）类问题。","options":[{"label":"A","text":"数据库查询优化"},{"label":"B","text":"并发系统设计"},{"label":"C","text":"模拟电路设计"},{"label":"D","text":"图像处理"}],"answer":"B","explanation":"LOTOS算子主要用于并发系统的设计，尤其是用于描述通信协议的行为模型。","mnemonic":"LOTOS算子解决\"并发系统设计\"问题，选B"},{"id":49,"type":"single","text":"LOTOS 算子里的选择操作符 “[]”，它的含义是（）。","options":[{"label":"A","text":"选取一个进程执行路径"},{"label":"B","text":"选取一个行为表达式执行"},{"label":"C","text":"选取一个命题真值"},{"label":"D","text":"选取一个数列子集"}],"answer":"B","explanation":"LOTOS算子中的选择操作符 [] 用于从多个行为表达式中选择一个执行的行为","mnemonic":"LOTOS选择操作符[]=\"选一个行为表达式执行\"，选B"},{"id":50,"type":"single","text":"在数据标注流程的制定中，标注规则的制定是为了达到什么目的（）。","options":[{"label":"A","text":"保护标注人员的权益"},{"label":"B","text":"尽量减少标注成本"},{"label":"C","text":"确保标注结果的准确性和一致性"},{"label":"D","text":"提高标注团队工作效率"}],"answer":"C","explanation":"标注规则的制定是为了确保标注结果的准确性和一致性，使得标注结果具有可比性，有效提高机器学习算法的训练效果","mnemonic":"标注规则为确保\"准确性和一致性\"，统一标准选C"},{"id":51,"type":"single","text":"智慧交通是（ ）等新一代信息技术与交通运输领域深度融合而孕育出的新型业态。","options":[{"label":"A","text":"以上都是"},{"label":"B","text":"大数据"},{"label":"C","text":"物联网"},{"label":"D","text":"人工智能"}],"answer":"A","explanation":"智慧交通是人工智能、物联网、大数据等新一代信息技术与交通运输深度融合的新业态，是推动交通运输质量变革、效率变革、动力变革的重要途径","mnemonic":"智慧交通=AI+物联网+大数据，\"以上都是\"选A"},{"id":52,"type":"single","text":"《中华人民共和国民法典》中所实行的婚姻制度，不包含下列哪项（）。","options":[{"label":"A","text":"婚姻自由"},{"label":"B","text":"一夫一妻"},{"label":"C","text":"男女平等"},{"label":"D","text":"门当户对"}],"answer":"D","explanation":"《中华人民共和国民法典》第一千零四十一条规定，婚姻家庭受国家保护。实行婚姻自由、一夫一妻、男女平等的婚姻制度。保护妇女、未成年人、老年人、残疾人的合法权益。","mnemonic":"民法典婚姻制度无\"门当户对\"，封建糟粕排除选D"},{"id":53,"type":"single","text":"在业务流程重组（BPR）里，信息技术（IT）所起到的作用是（）。","options":[{"label":"A","text":"BPR的核心思想"},{"label":"B","text":"BPR的辅助工具"},{"label":"C","text":"BPR的替代方法"},{"label":"D","text":"BPR的最终目标"}],"answer":"B","explanation":"信息技术（IT）在业务流程重组（BPR）中起到催化剂的作用。IT是一种技术，而BPR是一种思想，IT在BPR由思想到现实的转变中，起到促进和辅助的作用。因此，IT是BPR的辅助工具，而不是核心思想、替代方法或最终目标。","mnemonic":"IT在BPR中是\"辅助工具\"，技术辅助思想，选B"},{"id":54,"type":"single","text":"最能反映第二代人机交互方式的核心特征的是？（）","options":[{"label":"A","text":"通过手势或面部表情控制设备"},{"label":"B","text":"通过图形用户界面（GUI）与计算机交互，使用鼠标和图标"},{"label":"C","text":"通过虚拟现实设备进行沉浸式体验"},{"label":"D","text":"通过语音命令与计算机交互"}],"answer":"B","explanation":"选项A不属于第二代人机交互","mnemonic":"第二代人机交互=GUI+鼠标图标，图形界面时代选B"},{"id":55,"type":"single","text":"在行为模型的交互流程中，哪个环节负责将用户输入转换为机器可识别的数据？","options":[{"label":"A","text":"发送请求"},{"label":"B","text":"处理请求"},{"label":"C","text":"返回响应"},{"label":"D","text":"转换请求"}],"answer":"D","explanation":"转换请求环节将用户输入转为机器可处理数据。","mnemonic":"\"转换请求\"=将用户输入转为机器数据，选D"},{"id":56,"type":"single","text":"下列最能凸显调度系统 “任务重试机制” 价值的是（）。","options":[{"label":"A","text":"加密敏感数据传输"},{"label":"B","text":"实时生成可视化报表"},{"label":"C","text":"网络波动导致任务失败后自动重试"},{"label":"D","text":"数据清洗时自动修正格式错误"}],"answer":"C","explanation":"任务重试机制在网络故障导致失败时自动重试，确保任务完成。","mnemonic":"网络波动后\"自动重试\"体现任务重试机制价值，选C"},{"id":57,"type":"single","text":"下面哪一项不属于 LOTOS 算子的基本操作符（）。","options":[{"label":"A","text":"T1 >> T2（允许 Enabling）"},{"label":"B","text":"T1 * T2（并发 Concurrency）"},{"label":"C","text":"T1 [] T2（选择 Choice）"},{"label":"D","text":"T1 ||| T2（交替 Interleavin）"}],"answer":"B","explanation":"根据LOTOS算符的定义，LOTOS的基本操作符包括以下几种：T1 ||| T2（交替 Interleaving）T1 [] T2（选择 Choice）T1 [> T2（禁止 Deactivation）T1 >> T2（允许 Enabling）","mnemonic":"T1*T2并发不是LOTOS基本操作符，LOTOS无星号，选B"},{"id":58,"type":"single","text":"开展人机交互研究能够实现什么目标？","options":[{"label":"A","text":"加快数据传输速度"},{"label":"B","text":"提高用户满意度"},{"label":"C","text":"减少软件开发成本"},{"label":"D","text":"提高计算机的运算速度"}],"answer":"B","explanation":"人机交互研究的重要性主要体现在提高用户满意度方面，通过改善用户体验，使用户能够更加方便、高效地与计算机进行交互，提高用户满意度和工作效率。","mnemonic":"人机交互研究目标=\"提高用户满意度\"，以用户为本选B"},{"id":59,"type":"single","text":"根据《计算机软件保护条例》，软件著作权的保护范围不延伸至（）。","options":[{"label":"A","text":"软件的功能描述文档"},{"label":"B","text":"开发软件所用的思想"},{"label":"C","text":"软件的程序代码"},{"label":"D","text":"软件开发者的署名权"}],"answer":"B","explanation":"软件著作权不保护开发所用的思想、处理过程等。","mnemonic":"软件著作权不保护\"思想\"，只保护表达形式，选B"},{"id":60,"type":"single","text":"下列哪种方式不属于智能系统在教育领域的应用形式？","options":[{"label":"A","text":"个性化学习"},{"label":"B","text":"虚拟实验和模拟"},{"label":"C","text":"知识推荐和资源分享"},{"label":"D","text":"交通拥堵检测"}],"answer":"D","explanation":"交通拥堵检测不属于智能系统在教育领域的运用方式。","mnemonic":"交通拥堵检测≠教育应用，\"交通≠教育\"选D"},{"id":61,"type":"single","text":"直方图均衡化是一种常用的图像增强手段，其核心思路是（）。","options":[{"label":"A","text":"通过压缩图像的动态范围来提高图像质量"},{"label":"B","text":"通过减少图像的噪声来提高图像质量"},{"label":"C","text":"通过增加图像的分辨率来提高图像质量"},{"label":"D","text":"对原始图像中的像素灰度做某种映射变换，使变换后图像灰度的概率密度是均匀分布的"}],"answer":"D","explanation":"直方图均衡化通过灰度映射使输出图像灰度均匀分布，提高对比度。","mnemonic":"直方图均衡化=\"灰度映射使分布均匀\"，均衡=均匀选D"},{"id":62,"type":"single","text":"业务流程优化需要与什么的应用相结合（）。","options":[{"label":"A","text":"编程技术"},{"label":"B","text":"管理技术"},{"label":"C","text":"空间技术"},{"label":"D","text":"信息技术"}],"answer":"D","explanation":"业务流程优化要与信息技术的应用结合在一起，对于业务流程优化来说，信息技术是基础，也就是说要借助信息技术对管理体系进行规范，对业务流程进行固化，促使其信息交互速度与质量得以有效提升","mnemonic":"业务流程优化结合\"信息技术\"，IT是基础，选D"},{"id":63,"type":"single","text":"在 LOTOS 模型中，（）用于表示 “两个进程按顺序执行”。","options":[{"label":"A","text":"T1 [] T2"},{"label":"B","text":"T1 ||| T2"},{"label":"C","text":"T1 >> T2"},{"label":"D","text":"T1 |[a1,...,an]| T2"}],"answer":"C","explanation":"T1 >> T2串行（sequentiality）算符用于描述两个进程按顺序执行，即 T1 执行完成后，T2 才能执行","mnemonic":"T1>>T2=\"顺序执行\"，双箭头表示先后，选C"},{"id":64,"type":"single","text":"属于依据统计特征开展中文分词工作的是（）。","options":[{"label":"A","text":"递归神经网络"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"D","explanation":"隐马尔可夫模型（HMM）是一种基于统计特征的中文分词模型","mnemonic":"隐马尔可夫HMM=\"基于统计特征\"分词，选D"},{"id":65,"type":"single","text":"什么是企业为应对外部环境变化、规范内部管理而提升竞争力的必然结果（）。","options":[{"label":"A","text":"优化供应链管理"},{"label":"B","text":"评估员工的绩效表现"},{"label":"C","text":"优化业务流程"},{"label":"D","text":"制定公司的财务预算"}],"answer":"C","explanation":"优化业务流程，提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，是企业实现快速、稳定、可持续发展的重要条件","mnemonic":"优化业务流程是企业提升竞争力的\"必然结果\"，选C"},{"id":66,"type":"single","text":"漏斗分析里，下列属于转化率的是（）。","options":[{"label":"A","text":"用户在注册成功后，到浏览商品页面的访问次数比例"},{"label":"B","text":"用户在加入购物车后，到提交订单的比例"},{"label":"C","text":"用户在注册成功后，到浏览商品页面的停留时间比例"},{"label":"D","text":"每个阶段的用户数量"}],"answer":"B","explanation":"漏斗转化率指步骤间用户成功过渡的比例。","mnemonic":"漏斗转化率=\"加购到下单的比例\"，步骤间转化选B"},{"id":67,"type":"single","text":"在计算机执行计算的基础硬件部件里，处于核心地位的组成部分是（）。","options":[{"label":"A","text":"输入设备"},{"label":"B","text":"输出设备"},{"label":"C","text":"CPU（中央处理单元）"},{"label":"D","text":"存储器"}],"answer":"C","explanation":"计算机的CPU（中央处理单元）、存储器、输入/输出设备是计算机执行计算的基础硬件部件。CPU是计算机最核心的组成部分，它负责执行运算和控制指令，是计算能力的直接体现。","mnemonic":"CPU是计算机核心=\"运算+控制\"中枢，选C"},{"id":68,"type":"single","text":"业务流程优化的本质是（）。","options":[{"label":"A","text":"提升客户满意度"},{"label":"B","text":"增加企业利润"},{"label":"C","text":"优化企业的管理体系"},{"label":"D","text":"提高员工工作效率"}],"answer":"C","explanation":"业务流程优化的本质是管理体系的再造或优化（B）","mnemonic":"业务流程优化本质=\"管理体系的再造或优化\"，选C"},{"id":69,"type":"single","text":"NoSQL 数据库的主要特点包括（）。","options":[{"label":"A","text":"严格的事务支持"},{"label":"B","text":"结构化数据存储"},{"label":"C","text":"高可扩展性"},{"label":"D","text":"强一致性"}],"answer":"C","explanation":"NoSQL数据库的主要特点有灵活的数据模型、可扩展性强、高可用性和高并发性。","mnemonic":"NoSQL特点=\"高可扩展性\"，灵活可扩展，选C"},{"id":70,"type":"single","text":"聚类分析属于一种（）。","options":[{"label":"A","text":"强化学习"},{"label":"B","text":"半监督学习"},{"label":"C","text":"有监督学习"},{"label":"D","text":"无监督学习"}],"answer":"D","explanation":"聚类分析是无监督学习方法，不依赖预定义类别。","mnemonic":"聚类分析=\"无监督学习\"，无标签自动分组，选D"},{"id":71,"type":"single","text":"无人零售是一种运用智能技术，让消费者在购物过程中不需要依靠以下哪类人员协助的零售模式？","options":[{"label":"A","text":"系统开发人员"},{"label":"B","text":"营业员、服务员"},{"label":"C","text":"仓库管理员"},{"label":"D","text":"供应商"}],"answer":"B","explanation":"无人零售模式无需营业员或服务员协助。","mnemonic":"无人零售不需\"营业员、服务员\"，无人=无店员，选B"},{"id":72,"type":"single","text":"使用 OpenCV 库的 imread () 函数读取图像时，能够返回原始图像所包含的 alpha 通道的是（）。","options":[{"label":"A","text":"cv.IMREAD_GRAYSCALE"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"Noneoftheabove"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"B","explanation":"使用cv.IMREAD_UNCHANGED可以返回原始图像，包含的alpha通道","mnemonic":"IMREAD_UNCHANGED=\"原始不变含alpha通道\"，选B"},{"id":73,"type":"single","text":"在电商领域，漏斗分析模型主要用于分析以下哪个流程（）。","options":[{"label":"A","text":"商品退货流程"},{"label":"B","text":"用户评论流程"},{"label":"C","text":"商品购买流程"},{"label":"D","text":"用户注册流程"}],"answer":"C","explanation":"电商漏斗模型是电商领域最常见的漏斗模型，主要用于分析用户从进入电商平台到完成支付的完整购物流程，通过监控每个层级上的用户转化，寻找可优化点，以提升整体购买转化率","mnemonic":"电商漏斗分析=\"商品购买流程\"，从浏览到支付，选C"},{"id":74,"type":"single","text":"在人机交互设计的过程中，不属于五个基本阶段范畴的是（）阶段？","options":[{"label":"A","text":"评估测试"},{"label":"B","text":"工作量评估"},{"label":"C","text":"用户需求分析"},{"label":"D","text":"信息架构"}],"answer":"B","explanation":"工作量评估不属人机交互设计基本阶段。","mnemonic":"\"工作量评估\"不属于人机交互设计五阶段，选B"},{"id":75,"type":"single","text":"以下哪项属于职业道德的功能之一（）。","options":[{"label":"A","text":"维护职业行业的垄断地位"},{"label":"B","text":"促进个人利益和发展"},{"label":"C","text":"提高个人财富"},{"label":"D","text":"保护公众利益和社会公正"}],"answer":"D","explanation":"职业道德的功能之一是维护公共利益和社会公正。","mnemonic":"职业道德功能=\"保护公众利益和社会公正\"，选D"},{"id":76,"type":"single","text":"关联规则的评估指标中，置信度描述的是（）。","options":[{"label":"A","text":"在A项集出现的情况下，B项集也出现的概率"},{"label":"B","text":"在B项集出现的情况下，A项集也出现的概率"},{"label":"C","text":"项集在规则中出现的频率"},{"label":"D","text":"规则被应用的次数"}],"answer":"A","explanation":"置信度表示规则A→B的可靠性，即给定A出现时B出现的概率。","mnemonic":"置信度=\"A出现时B也出现的概率\"，A→B的可靠性，选A"},{"id":77,"type":"single","text":"下列不属于图像分割方法的是（）。","options":[{"label":"A","text":"基于形状的分割方法"},{"label":"B","text":"基于边缘的分割方法"},{"label":"C","text":"基于区域的分割方法"},{"label":"D","text":"基于阈值的分割方法"}],"answer":"A","explanation":"现有的图像分割方法主要分以下几种不同的途径:(1)基于阈值的分割方法，是一种最常用的并行区域技术，它是图像分割中应用数量最多的一类","mnemonic":"\"基于形状\"不是图像分割方法，分割靠阈值/边缘/区域，选A"},{"id":78,"type":"single","text":"（）是人机交互发展的第三阶段，该阶段包含了语音识别和虚拟现实技术。","options":[{"label":"A","text":"自然和谐的人机交互（语音、手势、虚拟现实等）"},{"label":"B","text":"触摸屏操作"},{"label":"C","text":"图形用户界面（GUI）"},{"label":"D","text":"命令行界面（CLI）"}],"answer":"A","explanation":"命令行界面是计算机早期的交互方式，用户通过键盘输入命令，计算机进行响应","mnemonic":"第三阶段=语音+手势+VR=\"自然和谐\"交互，选A"},{"id":79,"type":"single","text":"ETL 过程中，进行数据抽取是为了实现什么目标（）。","options":[{"label":"A","text":"将数据从目标系统中提取"},{"label":"B","text":"将数据从目标系统中删除"},{"label":"C","text":"将数据从源系统中提取"},{"label":"D","text":"将数据从源系统中删除"}],"answer":"C","explanation":"在ETL过程中，数据抽取是指从源系统中提取数据的过程，通常用于将源系统中的数据移动到ETL流程中进行后续处理","mnemonic":"ETL数据抽取=\"从源系统提取\"，E=Extract源头取，选C"},{"id":80,"type":"single","text":"RFM 模型里的 “R” 所指代的是（）。","options":[{"label":"A","text":"客户的满意度"},{"label":"B","text":"客户的消费金额"},{"label":"C","text":"客户购买的频率"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"D","explanation":"RFM模型中，R代表了最近一次购买时间间隔，指用户最近一次消费时间距离现在的时间间隔，这个指标可以反映出客户的购买意愿。","mnemonic":"RFM的R=Recency=\"最近一次购买时间间隔\"，选D"},{"id":81,"type":"single","text":"下面选项中，哪一项不在计算机的主要应用范畴内（）。","options":[{"label":"A","text":"科学计算"},{"label":"B","text":"金融交易"},{"label":"C","text":"办公自动化"},{"label":"D","text":"传统手工艺品制作"}],"answer":"D","explanation":"计算机的主要应用领域包括科学计算、工程设计、金融交易、办公自动化等，但不包括传统手工艺品制作。","mnemonic":"传统手工艺品制作不属于计算机应用范畴，选D"},{"id":82,"type":"single","text":"下列通过对像素灰度值和阈值进行比较来实现图像分割的方法是（）。","options":[{"label":"A","text":"基于阈值的分割方法"},{"label":"B","text":"边缘检测法"},{"label":"C","text":"高斯混合模型"},{"label":"D","text":"区域生长法"}],"answer":"A","explanation":"基于阈值的分割方法是根据像素的灰度值与预先设定的阈值进行比较，从而实现图像分割。","mnemonic":"阈值分割=\"灰度值与阈值比较\"，名字即方法，选A"},{"id":83,"type":"single","text":"针对线性不可分的二分类问题，引入核函数将数据映射到高维空间后，可转变为（）。","options":[{"label":"A","text":"多分类问题"},{"label":"B","text":"三分类问题"},{"label":"C","text":"非线性可分问题"},{"label":"D","text":"线性可分问题"}],"answer":"D","explanation":"通过引入核函数，可以将线性不可分的问题转化为线性可分的问题，从而使得支持向量机算法能够有效处理更为复杂的问题","mnemonic":"核函数将线性不可分→\"线性可分\"，升维变简单，选D"},{"id":84,"type":"single","text":"在 Python 中调用中文分词模型时，通过参数（）能够运用隐马尔可夫模型进行分词。","options":[{"label":"A","text":"user_dict"},{"label":"B","text":"tf-idf"},{"label":"C","text":"HMM"},{"label":"D","text":"cut_all"}],"answer":"C","explanation":"在调用中文分词模型时，参数HMM可以使用隐马尔可夫模型进行分词","mnemonic":"Python分词参数HMM=隐马尔可夫模型，参数名即答案，选C"},{"id":85,"type":"single","text":"下列选项中，属于键值存储的典型数据库是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Cassandra"},{"label":"C","text":"Redis"},{"label":"D","text":"MongoDB"}],"answer":"C","explanation":"Redis属于键值数据库；MySQL属于关系型数据库；Cassandra是列族数据库；MongoDB是文档数据库。","mnemonic":"Redis=\"键值存储\"典型代表，Redis=Remote字典服务，选C"},{"id":86,"type":"single","text":"下列哪项操作能够降低模型的过拟合程度（）。","options":[{"label":"A","text":"不进行特征选择"},{"label":"B","text":"减小正则化参数"},{"label":"C","text":"增加训练数据量"},{"label":"D","text":"增加模型复杂度"}],"answer":"C","explanation":"D错误。增加模型复杂度通常是解决欠拟合的问题，而不是过拟合。当模型过于复杂时，它更容易在训练数据上过拟合，因此不应该增加模型复杂度来减少过拟合。C正确。增加训练数据量是一种有效的减少过拟合的方法。更多的训练数据有助于让模型学到更全面的数据规律，避免对训练数据的过度依赖，增强模型的泛化能力，从而减少过拟合。B错误。在过拟合的情况下，应增加正则化强度，而不是减小正则化参数。减小正则化参数会使模型对训练数据的拟合更为精确，导致过拟合现象更加严重。A错误。不进行特征选择可能导致模型使用过多的无关特征，反而增加过拟合的风险。特征选择的目的是减少冗余信息，简化模型结构，从而减少过拟合。","mnemonic":"增加训练数据量减少过拟合，\"数据多泛化好\"，选C"},{"id":87,"type":"single","text":"存储器具有怎样的功能（）。","options":[{"label":"A","text":"存储，并能在计算机运行过程中高速、自动地完成程序或数据的存取"},{"label":"B","text":"控制计算机的运行"},{"label":"C","text":"执行算术和逻辑运算"},{"label":"D","text":"控制输出操作"}],"answer":"A","explanation":"存储器的主要功能是存储程序和各种数据信息，并能在计算机运行过程中高速、自动地完成程序或数据的存取。","mnemonic":"存储器=\"存储+高速自动存取\"程序和数据，选A"},{"id":88,"type":"single","text":"SSIS 的用途是（）。","options":[{"label":"A","text":"数据安全和加密"},{"label":"B","text":"数据存储和查询"},{"label":"C","text":"数据转换"},{"label":"D","text":"数据可视化"}],"answer":"C","explanation":"SQLServerIntegrationServices(SSIS)提供了数据相关的控制流、数据流、日志、变量、事件、连接管理等基础设施","mnemonic":"SSIS=SQL Server集成服务=\"数据转换\"工具，选C"},{"id":89,"type":"single","text":"下列哪项不在中级知识体系之列？（）","options":[{"label":"A","text":"数据处理方法优化"},{"label":"B","text":"数据审核"},{"label":"C","text":"数据聚类工具知识"},{"label":"D","text":"文本分析"}],"answer":"D","explanation":"文本分析不属于中级知识体系的内容。","mnemonic":"文本分析不属于中级知识体系，选D"},{"id":90,"type":"single","text":"下列哪一项不在智慧商场的功能范围之内？","options":[{"label":"A","text":"智能安防"},{"label":"B","text":"智能支付"},{"label":"C","text":"智能导购"},{"label":"D","text":"智能医疗"}],"answer":"D","explanation":"智慧商场的功能包括智能导购、智能支付、智能安防等，不涉及医疗功能","mnemonic":"智能医疗不在智慧商场功能内，\"商场≠医院\"选D"},{"id":91,"type":"single","text":"在支持向量机算法中，最大化间隔的目的是（）。","options":[{"label":"A","text":"使分类器的复杂度更小"},{"label":"B","text":"使分类器的测试误差更小"},{"label":"C","text":"使分类器的训练误差更小"},{"label":"D","text":"使分类器的泛化性能更好"}],"answer":"D","explanation":"支持向量机最大化间隔以提升泛化性能，减少过拟合。","mnemonic":"SVM最大化间隔=\"提升泛化性能\"，大间隔防过拟合，选D"},{"id":92,"type":"single","text":"聚类分析具备（）的功能。","options":[{"label":"A","text":"将数据分为有序的组别"},{"label":"B","text":"通过建立回归模型进行预测"},{"label":"C","text":"寻找数据对象之间的内在结构和关系"},{"label":"D","text":"直接对数据进行特征选择和降维"}],"answer":"C","explanation":"聚类分析是无监督学习，用于将数据分组为相似簇，发现数据内在结构。","mnemonic":"聚类分析发现\"数据内在结构和关系\"，无监督探索选C"},{"id":93,"type":"single","text":"在人机交互设计的流程中，对用户的行为、需求、期望等信息进行研究的是（）阶段？","options":[{"label":"A","text":"原型设计"},{"label":"B","text":"信息架构"},{"label":"C","text":"用户需求分析"},{"label":"D","text":"评估测试"}],"answer":"C","explanation":"用户需求分析是人机交互设计流程的第一个阶段，旨在了解用户的需求、期望、目标等信息，以便将这些信息纳入设计中","mnemonic":"用户需求分析=\"研究用户行为需求期望\"，第一阶段选C"},{"id":94,"type":"single","text":"以下哪个场景不适合采用漏斗分析（）。","options":[{"label":"A","text":"分析电商网站的购物流程转化率"},{"label":"B","text":"评估一款游戏的关卡通过率"},{"label":"C","text":"统计某地区的人口年龄结构"},{"label":"D","text":"优化APP的用户注册流程"}],"answer":"C","explanation":"漏斗分析适用于有明确转化步骤的场景，如购物或注册流程，不适用于简单统计如人口年龄结构。","mnemonic":"统计人口年龄结构无转化步骤，不适合漏斗分析，选C"},{"id":95,"type":"single","text":"在 ETL 任务流程里，数据抽取（Extraction）的核心目标是（）。","options":[{"label":"A","text":"将数据加载到目标系统中"},{"label":"B","text":"清洗和校验数据的完整性"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中提取数据"}],"answer":"D","explanation":"数据抽取是ETL任务流程的第一步，其主要目的是从源系统中提取数据，以便后续处理和加载到目标系统中","mnemonic":"ETL的E=Extraction=\"从源系统提取数据\"，选D"},{"id":96,"type":"single","text":"在 OpenCV 中，能实现中值滤波的函数是（）。","options":[{"label":"A","text":"cv2.medianBlur()"},{"label":"B","text":"skimage.transform.resize()"},{"label":"C","text":"cv2.crop()"},{"label":"D","text":"cv2.resize()"}],"answer":"A","explanation":"在OpenCV中，通过cv2.medianBlur函数进行中值滤波，其基本使用格式如下Cv2,medianBlur(src,ksize[,dst])","mnemonic":"中值滤波用cv2.medianBlur()，\"median=中值\"选A"},{"id":97,"type":"single","text":"时间管理四象限法则中，是由（）来确定划分出的四个象限。","options":[{"label":"A","text":"根据坐标轴分别划分成上下左右四个象限"},{"label":"B","text":"根据事情的重要和紧急程度划分"},{"label":"C","text":"根据同类数据的排名决定划分"},{"label":"D","text":"根据数据的变化趋势决定划分"}],"answer":"B","explanation":"时间管理四象限法则根据任务的重要和紧急程度划分优先级。","mnemonic":"四象限法则按\"重要+紧急\"程度划分，选B"},{"id":98,"type":"single","text":"进行手势识别时，无需考虑下列哪项因素？","options":[{"label":"A","text":"手势的方向"},{"label":"B","text":"手势的运动轨迹"},{"label":"C","text":"手的大小"},{"label":"D","text":"手势的形状"}],"answer":"C","explanation":"手势的形状、位置、运动轨迹和方向等能映射成为丰富的语义内容信息。","mnemonic":"手势识别不考虑\"手的大小\"，关注形状方向轨迹，选C"},{"id":99,"type":"single","text":"在制定文本数据处理流程时，下列哪个环节并非必需的（）。","options":[{"label":"A","text":"数据收集"},{"label":"B","text":"数据清理与预处理"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据分析和建模"}],"answer":"C","explanation":"数据可视化可直观展示数据特征，但非文本处理必需步骤，仅为可选辅助功能。","mnemonic":"数据可视化非文本处理必需环节，仅为辅助，选C"},{"id":100,"type":"single","text":"GOMS 模型的局限性体现在哪些方面？","options":[{"label":"A","text":"缺乏科学依据"},{"label":"B","text":"无法预测人类行为"},{"label":"C","text":"只适用于特定情境"},{"label":"D","text":"过于复杂且难以使用"}],"answer":"C","explanation":"GOMS模型的主要局限性在于其适用范围有限，只适用于特定情境下的用户行为分析","mnemonic":"GOMS模型局限=\"只适用于特定情境\"，范围有限选C"},{"id":101,"type":"single","text":"运用参数优化方法时，下列（）行为是应当避免的。","options":[{"label":"A","text":"限制搜索范围"},{"label":"B","text":"尝试使用默认参数设定"},{"label":"C","text":"用尽所有可用的参数组合"},{"label":"D","text":"将测试数据用于参数选择"}],"answer":"D","explanation":"D 选项是最需要避免的行为。测试数据应该仅用于最终模型评估，而不是在训练和优化过程中使用。如果在优化阶段使用测试数据，可能导致模型对测试数据过拟合，从而失去模型的泛化能力。C选项在某些情况下可能导致计算开销过大，但并不意味着应该完全避免。在资源允许的情况下，穷举所有参数组合是一种常见且有效的方法，尤其在使用 GridSearch 时。B 选项许多模型的默认参数能够提供一个合理的起点，依赖默认参数更多的是一种保守的做法。A 选项中的“限制搜索范围”并不是错误行为，实际上，在一些情况下，适当限制搜索范围有助于提高效率，尤其是当我们对某些超参数有足够了解时。","mnemonic":"测试数据不能用于参数选择，会导致过拟合选D"},{"id":102,"type":"single","text":"根据《中华人民共和国专利法》，实用新型专利权的保护期限为多少年？","options":[{"label":"A","text":"10年"},{"label":"B","text":"15年"},{"label":"C","text":"20年"},{"label":"D","text":"5年"}],"answer":"A","explanation":"根据《中华人民共和国专利法》第四十二条规定，发明专利权的期限为二十年，实用新型专利权的期限为十年，外观设计专利权的期限为十五年，均自申请日起计算。","mnemonic":"专利期限口诀：发明20实用10外观15，实用新型选A十年"},{"id":103,"type":"single","text":"指导中级工作人员解决数据标注方面的问题时，需要关注有一种标注方式常被用于对文本中的实体进行识别，这种方式是什么？（）","options":[{"label":"A","text":"语义分割"},{"label":"B","text":"目标检测"},{"label":"C","text":"序列标注"},{"label":"D","text":"分类标注"}],"answer":"C","explanation":"序列标注适用于识别文本中的实体等连续结构","mnemonic":"文本实体识别用\"序列标注\"，序列对序列选C"},{"id":104,"type":"single","text":"在 ETL 流程中，“增量抽取”（Incremental Loading）的核心作用是（）。","options":[{"label":"A","text":"只抽取数据库中新增或修改的数据"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"A","explanation":"增量抽取只抽取自上一次抽取以来，数据库中要抽取的表中新增或修改的数据","mnemonic":"增量抽取=只取\"新增或修改\"的数据，增量即增改选A"},{"id":105,"type":"single","text":"关于职业道德具体要求的下列说法，正确的是（）。","options":[{"label":"A","text":"对职业帮助他人、回报社会责任要求高，与客户利益无关"},{"label":"B","text":"对职业自我完善、自我实现要求高，与客户利益无关"},{"label":"C","text":"对职业满足客户需求、保护客户利益要求高"},{"label":"D","text":"对职业业务技能要求高，不需具备沟通协调能力"}],"answer":"C","explanation":"职业道德的具体标准包括职业业务技能、满足客户需求、保护客户利益、自我完善与自我实现等方面，但是其中对职业满足客户需求、保护客户利益的要求最为突出","mnemonic":"职业道德核心：满足客户需求、保护客户利益，选C客户为先"},{"id":106,"type":"single","text":"作为一种基于统计学原理的算法，贝叶斯算法的核心思路是（）。","options":[{"label":"A","text":"基于神经网络模型，预测未来事件的概率"},{"label":"B","text":"基于经验和直觉，估计未来可能出现的事件的概率"},{"label":"C","text":"通过人工智能的学习和反馈机制，预测未来的人工智能发展趋势"},{"label":"D","text":"基于历史数据和假设，计算未来可能出现的事件的概率"}],"answer":"D","explanation":"贝叶斯算法基于历史数据计算未来事件概率。","mnemonic":"贝叶斯=历史数据+假设→算概率，基于数据非直觉选D"},{"id":107,"type":"single","text":"随机森林算法中 “随机” 一词的含义是（）。","options":[{"label":"A","text":"随机选择训练样本子集和特征子集"},{"label":"B","text":"随机忽略部分特征的重要性"},{"label":"C","text":"随机选择决策树节点划分特征"},{"label":"D","text":"随机选择决策树节点划分阈值"}],"answer":"A","explanation":"随机森林的“随机”体现在Bootstrap抽样和随机特征选择，增强多样性，减少过拟合。","mnemonic":"随机森林双随机：随机抽样本+随机选特征，选A"},{"id":108,"type":"single","text":"对比分析重点关注的是不同组别或对象之间的（）。","options":[{"label":"A","text":"相对性"},{"label":"B","text":"差异性"},{"label":"C","text":"相似性"},{"label":"D","text":"关联性"}],"answer":"B","explanation":"对比分析主要关注不同组或对象之间的差异性","mnemonic":"对比分析重点看\"差异\"，比较即找不同选B"},{"id":109,"type":"single","text":"计算机属于哪一类设备（）。","options":[{"label":"A","text":"固体"},{"label":"B","text":"设备"},{"label":"C","text":"工具"},{"label":"D","text":"机器"}],"answer":"D","explanation":"计算机是一种能按程序自动进行数值和逻辑运算的机器设备。","mnemonic":"计算机是自动运算的\"机器\"设备，选D"},{"id":110,"type":"single","text":"关于交叉验证说法正确的是（）。","options":[{"label":"A","text":"交叉验证将数据集划分为两个子集，分别作为训练集和测试集，进行一次性训练和测试"},{"label":"B","text":"交叉验证通过将数据集划分为k个子集，依次使用每个子集作为测试集，其余k-1个子集作为训练集，最终综合所有测试结果"},{"label":"C","text":"交叉验证每次随机选择部分样本作为训练集，剩余样本作为测试集，直到所有样本都作为测试集"},{"label":"D","text":"交叉验证仅使用一个子集进行训练，其他子集不参与模型训练与测试"}],"answer":"B","explanation":"k折交叉验证将数据分为k个子集，轮换测试并平均结果，以评估模型性能。","mnemonic":"k折交叉验证：分k份轮流测试取平均，选B"},{"id":111,"type":"single","text":"根据国际标准，云计算的部署模型中不包含的是（）。","options":[{"label":"A","text":"混合云"},{"label":"B","text":"公共云"},{"label":"C","text":"计算服务"},{"label":"D","text":"私有云"}],"answer":"C","explanation":"国际标准（如NIST SP 800-145）定义的云计算部署模型包括：公有云（Public Cloud）、私有云（Private Cloud）、社区云（Community Cloud）和混合云（Hybrid Cloud）","mnemonic":"云部署四模型：公有私有社区混合，\"计算服务\"不是部署模型选C"},{"id":112,"type":"single","text":"漏斗分析的具体含义是什么（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"对于某一转化目标，把用户从进入网站、注册、浏览、加入购物车、到提交订单的各个步骤称为漏斗，分析各个步骤的转化率"},{"label":"C","text":"通过统计用户停留时长和点击数据，了解用户对页面的喜好和需求"},{"label":"D","text":"对使用某款产品或服务的用户行为进行分解并分析的方法"}],"answer":"B","explanation":"从业务流程起点开始到最后目标完成的每个环节都会有用户流失，因此需要一种分析方法来衡量业务流程每一步的转化效率，漏斗分析方法就是这样的分析方法","mnemonic":"漏斗分析=各步骤转化率分析，从进入到下单层层过滤选B"},{"id":113,"type":"single","text":"在防止模型过拟合时，正则化所起到的主要作用是（）。","options":[{"label":"A","text":"减少数据中的噪声"},{"label":"B","text":"提高模型的训练速度"},{"label":"C","text":"限制模型复杂度"},{"label":"D","text":"增加训练数据量"}],"answer":"C","explanation":"正则化通过对模型参数施加约束，减少模型复杂度，从而有效防止过拟合。","mnemonic":"正则化=限制模型复杂度防过拟合，选C"},{"id":114,"type":"single","text":"在数据收集过程中，下列哪一项是经常会遇到的困难？（）","options":[{"label":"A","text":"数据质量过高"},{"label":"B","text":"数据格式不一致"},{"label":"C","text":"数据采集工具过于高效"},{"label":"D","text":"数据源单一"}],"answer":"B","explanation":"数据采集过程中，数据格式不一致是常见的难点之一。数据采集需要处理多种数据来源和格式，如结构化数据、非结构化数据等，这些数据在格式上可能存在较大差异，需要进行转换和统一，增加了数据采集的难度。","mnemonic":"数据收集常见难题：格式不一致需统一，选B"},{"id":115,"type":"single","text":"在图形用户界面设计里，（）有利于增强用户对系统的掌控感，从而提升其操作时的信心。","options":[{"label":"A","text":"界面设计应尽量减少反馈信息，避免干扰用户操作。"},{"label":"B","text":"允许用户与出现在屏幕上的对象直接交互。"},{"label":"C","text":"界面设计应只提供必要的功能，避免复杂的操作步骤。"},{"label":"D","text":"界面设计应提供高质量的视觉效果，以吸引用户的注意力。"}],"answer":"B","explanation":"允许用户与屏幕对象直接交互有助于增强控制感和操作信心。","mnemonic":"直接交互增强掌控感和信心，选B允许用户直接操作"},{"id":116,"type":"single","text":"职业道德的核心要素中，不包含的是（）。","options":[{"label":"A","text":"尊重他人权利和尊严"},{"label":"B","text":"严守保密原则和隐私权"},{"label":"C","text":"追求个人利益最大化"},{"label":"D","text":"保持学习和提升专业能力"}],"answer":"C","explanation":"职业道德的基本要素涵盖专业行为、诚信诚实、尊重公正、保密隐私、社会责任及持续学习等","mnemonic":"职业道德不含\"追求个人利益最大化\"，自私不是道德选C"},{"id":117,"type":"single","text":"趋势分析法在企业财务分析中主要应用于（ ）。","options":[{"label":"A","text":"测量企业的物理资产质量"},{"label":"B","text":"评估企业的员工满意度"},{"label":"C","text":"分析企业财务指标的动态变化"},{"label":"D","text":"确定企业的市场占有率"}],"answer":"C","explanation":"趋势分析法又称水平分析法，是通过对比连续数期财务报告中的相同指标，确定增减变动的方向、数额及幅度，用以说明企业财务数据变动趋势的一种财务分析方法","mnemonic":"趋势分析法=分析财务指标动态变化，选C看趋势"},{"id":118,"type":"single","text":"UAN 模型指的是（）。","options":[{"label":"A","text":"自然语言处理模型"},{"label":"B","text":"机器学习模型"},{"label":"C","text":"用户行为分析模型"},{"label":"D","text":"人工智能算法"}],"answer":"C","explanation":"UAN模型是用户行为分析模型，用于分析用户在网站或APP上的行为。","mnemonic":"UAN=User Action Notation用户行为分析模型，选C"},{"id":119,"type":"single","text":"下列 ETL 工具中，是完全用 Java 编写的是（）。","options":[{"label":"A","text":"Kettle"},{"label":"B","text":"OracleDataIntegrator"},{"label":"C","text":"IBMInfoSphereDataStage"},{"label":"D","text":"Talend"}],"answer":"A","explanation":"Kettle作为开源ETL工具，完全基于Java开发，依赖Java环境运行。","mnemonic":"Kettle（水壶）完全Java编写的ETL工具，选A"},{"id":120,"type":"single","text":"业务流程优化中，系统化改造法的优点有（）。","options":[{"label":"A","text":"创新性强，能够从根本上改变现有流程"},{"label":"B","text":"适合外部环境剧烈变化的情况"},{"label":"C","text":"风险较低，基于现有流程进行优化"},{"label":"D","text":"需要投入大量时间和资源进行重新设计"}],"answer":"C","explanation":"系统化改造法基于现有流程，通过整合、简化和自动化等方法进行优化。","mnemonic":"系统化改造法=基于现有流程优化，风险低选C"},{"id":121,"type":"single","text":"下列存储系统最适合分布式存储海量原始数据，且支持高吞吐量批处理的是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Redis"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop HDFS"}],"answer":"D","explanation":"Hadoop HDFS是为分布式存储海量数据而设计的，具有高容错性和高吞吐量的特点。它非常适合存储原始数据（如日志文件、图片、视频等），并且通过Hadoop生态系统（如MapReduce、Spark等）可以高效地进行批处理。因此，它是最适合题干描述需求的存储系统。","mnemonic":"海量分布式存储+高吞吐批处理=Hadoop HDFS，选D"},{"id":122,"type":"single","text":"《中华人民共和国网络安全法》指出，关键信息基础设施的运营者应自行或委托网络安全服务机构，对其网络的安全性及潜在风险（）至少开展一次检测评估。","options":[{"label":"A","text":"每五年"},{"label":"B","text":"每三年"},{"label":"C","text":"每两年"},{"label":"D","text":"每年"}],"answer":"D","explanation":"《中华人民共和国网络安全法》第三十八条规定，关键信息基础设施的运营者应当自行或者委托网络安全服务机构对其网络的安全性和可能存在的风险每年至少进行一次检测评估，并将检测评估情况和改进措施报送相关负责关键信息基础设施安全保护工作的部门。","mnemonic":"关键基础设施安全检测评估每年至少一次，选D"},{"id":123,"type":"single","text":"下列哪项因素有可能导致算法出现欠拟合（）。","options":[{"label":"A","text":"数据集的特征过于丰富"},{"label":"B","text":"模型训练时间过长"},{"label":"C","text":"训练数据量过大"},{"label":"D","text":"模型过于简单"}],"answer":"D","explanation":"模型过于简单无法捕捉数据规律，导致欠拟合。","mnemonic":"模型太简单→欠拟合，学不到规律选D"},{"id":124,"type":"single","text":"PEST 模型中的 “政治” 因素涉及（）方面。","options":[{"label":"A","text":"人才储备、竞争力、专利技术和知识产权"},{"label":"B","text":"社会心理、消费习惯、文化差异和地理位置"},{"label":"C","text":"同行竞争、技术变革、市场规模和市场趋势"},{"label":"D","text":"政府政策、法律法规、税收政策、政治稳定性"}],"answer":"D","explanation":"PEST模型中政治因素包括政策、法规、税收及稳定性。","mnemonic":"PEST政治=政策法规税收稳定性，P对应政府政策选D"},{"id":125,"type":"single","text":"质量控制是数据标注的难点之一，其在数据标注工作中的重要性体现在哪些方面？（）","options":[{"label":"A","text":"对标注过程进行监督和管理"},{"label":"B","text":"确保标记数据的准确性和可信度"},{"label":"C","text":"对数据进行分类和聚类"},{"label":"D","text":"对数据进行清洗和完善"}],"answer":"B","explanation":"数据标注中的质量控制是非常重要的一环，能够确保标注数据的准确性和可信度，以提高机器学习模型的性能和稳定性","mnemonic":"标注质量控制=确保数据准确性和可信度，选B"},{"id":126,"type":"single","text":"以下对数据仓库的描述，正确的是（）。","options":[{"label":"A","text":"数据仓库主要用于实时数据交易处理，支持高并发的读写操作"},{"label":"B","text":"数据仓库是一个面向主题的、集成的、相对稳定的、反映历史变化的数据集合，主要用于支持决策分析"},{"label":"C","text":"数据仓库是数据的临时存储，主要用于数据的快速缓存和读取"},{"label":"D","text":"数据仓库主要用于存储和管理操作系统文件，支持文件的高效访问"}],"answer":"B","explanation":"数据仓库是面向主题、集成且稳定的数据集合，用于历史数据分析和决策支持，不同于临时存储。","mnemonic":"数据仓库=面向主题集成稳定反映历史，用于决策分析选B"},{"id":127,"type":"single","text":"对于 “用户” 在产品设计中的定义，下面哪一项的描述最为精准？（）","options":[{"label":"A","text":"用户是指任何参与产品设计的人员，不一定是产品的最终使用者。"},{"label":"B","text":"用户是使用产品的人，但不一定需要与产品产生交互，只要购买并拥有产品即可。"},{"label":"C","text":"用户是产品的最终使用者，设计应以他们的需求和体验为中心，确保产品满足他们的使用场景。"},{"label":"D","text":"用户是产品的技术支持人员，他们的工作主要是保障产品的正常运作，设计过程不需要考虑他们的需求。"}],"answer":"C","explanation":"用户是产品的最终使用者，设计应以他们的需求和体验为中心。","mnemonic":"用户=最终使用者，设计以用户需求体验为中心选C"},{"id":128,"type":"single","text":"在 OpenCV 中，可用于执行快速傅里叶变换的函数是（）。","options":[{"label":"A","text":"cv2.crop()"},{"label":"B","text":"cv2.dft()"},{"label":"C","text":"cv2.flip()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"B","explanation":"OpenCV中的cv2.dft()函数用于执行快速傅里叶变换。","mnemonic":"傅里叶变换=dft，cv2.dft()选B"},{"id":129,"type":"single","text":"《中华人民共和国民法典》规定，向人民法院请求保护民事权利的诉讼时效期间为多长时间（）。","options":[{"label":"A","text":"四年"},{"label":"B","text":"三年"},{"label":"C","text":"两年"},{"label":"D","text":"一年"}],"answer":"B","explanation":"《中华人民共和国民法典》第一百八十八条规定，向人民法院请求保护民事权利的诉讼时效期间为三年","mnemonic":"民法典诉讼时效三年，选B"},{"id":130,"type":"single","text":"业务分析方法的核心内容是（）。","options":[{"label":"A","text":"业务指标分析方法"},{"label":"B","text":"业务信息分析"},{"label":"C","text":"系统化业务流程"},{"label":"D","text":"业务量化分析"}],"answer":"A","explanation":"业务指标分析方法是业务分析方法的核心内容","mnemonic":"业务分析核心=业务指标分析方法，选A"},{"id":131,"type":"single","text":"下列哪项不属于图像数据处理的基本流程（）。","options":[{"label":"A","text":"模型部署"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据预处理"},{"label":"D","text":"模型训练"}],"answer":"A","explanation":"图像数据处理流程中的基本流程包括数据预处理、特征提取、模型训练等步骤，最后可以根据需要进行模型部署","mnemonic":"模型部署不属于图像处理基本流程，选A排除"},{"id":132,"type":"single","text":"当中级工作人员需要标注图像中物体的关键点时，有哪些方法能用来确定这些关键点的具体位置？（）","options":[{"label":"A","text":"分割标注"},{"label":"B","text":"区域标注"},{"label":"C","text":"边界框标注"},{"label":"D","text":"关键点标注"}],"answer":"D","explanation":"关键点标注可以标记出图像中关键点的位置，如人脸关键点。","mnemonic":"标注关键点位置用\"关键点标注\"，名字对应选D"},{"id":133,"type":"single","text":"在人机交互中，用户体验设计的主要宗旨是什么？","options":[{"label":"A","text":"提升品牌形象"},{"label":"B","text":"降低生产成本"},{"label":"C","text":"提高系统性能"},{"label":"D","text":"增加用户满意度"}],"answer":"D","explanation":"用户体验设计中，提升用户在使用产品或服务过程中的满意度和愉悦感是其主要目标","mnemonic":"用户体验设计宗旨=增加用户满意度，选D"},{"id":134,"type":"single","text":"原始数据中存在的常见问题有（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"数据缺失"},{"label":"C","text":"数据重复"},{"label":"D","text":"数据不一致"}],"answer":"A","explanation":"原始数据中常见的问题有数据不一致、数据重复、数据不完整、数据含噪声、数据维度高等等","mnemonic":"原始数据问题：缺失重复不一致都有，全选A"},{"id":135,"type":"single","text":"下列（）不属于可用性的五个关键维度。","options":[{"label":"A","text":"安全性"},{"label":"B","text":"容错能力"},{"label":"C","text":"吸引力"},{"label":"D","text":"有效性"}],"answer":"A","explanation":"有效性是可用性的一个关键方面，指用户能够成功地完成其目标或任务。因此，这个选项是正确的，属于可用性的五个方面之一。吸引力是指产品是否具有吸引用户的外观和交互设计，这也是可用性的一个方面，主要涉及用户的情感和视觉体验。容错能力是指产品能够宽容用户的错误操作并提供反馈或修正途径。这也是可用性的重要方面之一。安全性与用户数据保护、系统稳定性等因素相关，通常不是可用性评价中的直接方面。虽然安全性对用户体验很重要，但它不直接涉及有效性、效率、吸引力、容错能力和易于学习这些基本可用性方面。","mnemonic":"可用性五维度不含\"安全性\"，安全不直接属于可用性选A"},{"id":136,"type":"single","text":"在可用性评估的各类方法里，哪一种最着重于通过真实用户的操作来找出界面设计存在的问题？（）","options":[{"label":"A","text":"认知性遍历"},{"label":"B","text":"用户测试"},{"label":"C","text":"启发式评估"},{"label":"D","text":"用户模型法"}],"answer":"B","explanation":"用户测试通过真实用户操作发现界面问题。","mnemonic":"真实用户操作找界面问题=用户测试，选B"},{"id":137,"type":"single","text":"在 ETL 流程中，“抽取”（Extraction）这一步的主要目的是（）。","options":[{"label":"A","text":"对数据进行清洗和校验"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"D","explanation":"ETL中“抽取”步骤从源系统选取目标所需数据。","mnemonic":"ETL抽取=从源系统选取数据，选D"},{"id":138,"type":"single","text":"UAN 模型指的是（）。","options":[{"label":"A","text":"自然语言处理模型"},{"label":"B","text":"机器学习模型"},{"label":"C","text":"用户行为分析模型"},{"label":"D","text":"人工智能算法"}],"answer":"C","explanation":"UAN模型是用户行为分析模型，用于分析用户在网站或APP上的行为。","mnemonic":"UAN=用户行为分析模型，重复题选C"},{"id":139,"type":"single","text":"PEST 模型用于（）方面的分析工作。","options":[{"label":"A","text":"政治、经济、社会、技术"},{"label":"B","text":"价格、环境、社会、人口"},{"label":"C","text":"法律、经济、社会、技术"},{"label":"D","text":"人口、环境、社会、技术"}],"answer":"A","explanation":"PEST模型分析政治、经济、社会和技术因素，帮助企业预测趋势和适应环境。","mnemonic":"PEST=政治经济社会技术四因素，选A"},{"id":140,"type":"single","text":"在 RFM 模型中，计算 Frequency 指标得分时，得分越高表明（）。","options":[{"label":"A","text":"越远期"},{"label":"B","text":"越近期"},{"label":"C","text":"越不活跃"},{"label":"D","text":"越活跃"}],"answer":"D","explanation":"在RFM模型中，Frequency指标得分越高表示客户越活跃。Frequency得分越高表示客户购买频率较高。","mnemonic":"RFM中F频率得分高=越活跃，买得多选D"},{"id":141,"type":"single","text":"当模型存在欠拟合问题时，训练误差与测试误差会呈现出（）的状态。","options":[{"label":"A","text":"训练误差和测试误差都很小"},{"label":"B","text":"训练误差很小，测试误差很大"},{"label":"C","text":"训练误差和测试误差都很大"},{"label":"D","text":"训练误差很大，测试误差很小"}],"answer":"C","explanation":"当模型欠拟合时，表示模型对训练数据的拟合能力较弱，无法捕捉到数据的规律，因此训练误差较高。由于模型的不足，它在测试数据上的表现也同样不好，因此测试误差也较高。欠拟合通常意味着模型过于简单，无法有效学习数据中的模式。","mnemonic":"欠拟合=训练测试误差都大，学不好选C"},{"id":142,"type":"single","text":"数据整合的主要目的是（）。","options":[{"label":"A","text":"将分散的数据存储在同一个数据库中"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"将来自不同来源的数据进行合并和统一处理"},{"label":"D","text":"增强数据的安全性"}],"answer":"C","explanation":"数据整合通过ETL过程合并多源数据，增强数据功能和应用价值。","mnemonic":"数据整合=合并多源数据统一处理，选C"},{"id":143,"type":"single","text":"通过取均值的方式对每次滑动范围内的数值进行平滑操作的是（）。","options":[{"label":"A","text":"小波变换"},{"label":"B","text":"均值滤波"},{"label":"C","text":"高斯滤波"},{"label":"D","text":"中值滤波"}],"answer":"B","explanation":"均值滤波通过取滑动窗口内均值平滑数据。","mnemonic":"取均值平滑=均值滤波，滑动求平均选B"},{"id":144,"type":"single","text":"数据转换能力是 ETL 工具的核心功能之一，下列最能反映这一特性的是（）。","options":[{"label":"A","text":"从多个数据库表提取数据"},{"label":"B","text":"将数据加载到目标数据仓库"},{"label":"C","text":"对数据进行聚合、清洗和格式标准化"},{"label":"D","text":"监控数据管道的运行状态"}],"answer":"C","explanation":"数据转换核心在于根据业务规则清洗和格式化数据，提升数据质量和一致性。","mnemonic":"ETL数据转换=聚合清洗格式标准化，选C"},{"id":145,"type":"single","text":"在图像数据处理流程中，最后执行的步骤是（）。","options":[{"label":"A","text":"结果展示或输出"},{"label":"B","text":"特征提取"},{"label":"C","text":"图像分割"},{"label":"D","text":"图像增强"}],"answer":"A","explanation":"在图像数据处理流程中，结果展示或输出是最后进行的步骤","mnemonic":"图像处理最后一步=结果展示或输出，选A"},{"id":146,"type":"single","text":"下列哪项指标可以直接用于判断算法是否存在欠拟合（）。","options":[{"label":"A","text":"模型复杂度降低"},{"label":"B","text":"准确率提高"},{"label":"C","text":"在训练集和测试集上的表现都差"},{"label":"D","text":"在训练集上表现差"}],"answer":"C","explanation":"欠拟合的典型表现是模型在训练集和测试集上都表现较差，无法很好地学习数据的规律","mnemonic":"欠拟合判断=训练集测试集都差，选C两个都差"},{"id":147,"type":"single","text":"业务流程重组（BPR）的核心理念可表述为（）。","options":[{"label":"A","text":"保持现有的组织结构不变"},{"label":"B","text":"仅关注成本和质量的提升"},{"label":"C","text":"根本的再思考和彻底的再设计"},{"label":"D","text":"渐进式的流程改进"}],"answer":"C","explanation":"业务流程重组（BPR）的核心理念是对企业进行根本的再思考和彻底的再设计（B）","mnemonic":"BPR=根本再思考+彻底再设计，推倒重来选C"},{"id":148,"type":"single","text":"若想缩短流程执行时的等待时间与业务处理时间，可采用的原则是（）。","options":[{"label":"A","text":"并行"},{"label":"B","text":"结果导向"},{"label":"C","text":"面向客户"},{"label":"D","text":"循序渐进"}],"answer":"A","explanation":"并行原则是指为了缩短流程执行过程中的等待时间和业务处理时间，可以将平行开展的流程进行并行处理","mnemonic":"缩短等待和处理时间=并行处理，选A"},{"id":149,"type":"single","text":"秉持严谨求是的态度时，在讨论某个问题时应当做到（）。","options":[{"label":"A","text":"选择一方面内容专攻"},{"label":"B","text":"深入、全面、细致地分析问题"},{"label":"C","text":"瞎扯远曲"},{"label":"D","text":"着重阐述自己的看法"}],"answer":"B","explanation":"严谨求是要求深入全面分析问题，细致思考，避免草率主观判断。","mnemonic":"严谨求是=深入全面细致分析问题，选B"},{"id":150,"type":"single","text":"下列哪项不属于逻辑树的种类（）。","options":[{"label":"A","text":"“What？”树"},{"label":"B","text":"“Why？”树"},{"label":"C","text":"“Where？”树"},{"label":"D","text":"“How？”树"}],"answer":"C","explanation":"逻辑树分为“What?”树（要素分解）、“Why?”树（原因分析）和“How?”树（解决方案）。","mnemonic":"逻辑树三种：What Why How，没有Where选C"},{"id":151,"type":"single","text":"AARRR 模型中 \"AA\" 的目的是（）。","options":[{"label":"A","text":"增加收入，提高品牌口碑"},{"label":"B","text":"让用户体验产品，获取新流量"},{"label":"C","text":"提高品牌知名度"},{"label":"D","text":"获取新用户，将其变成活跃用户"}],"answer":"D","explanation":"AARRR模型中AA阶段目标是获取用户并激活。","mnemonic":"AARRR的AA=获取用户+激活用户，选D"},{"id":152,"type":"single","text":"数据转换能力是 ETL 工具的核心功能之一，下列最能反映这一特性的是（）。","options":[{"label":"A","text":"从多个数据库表提取数据"},{"label":"B","text":"将数据加载到目标数据仓库"},{"label":"C","text":"对数据进行聚合、清洗和格式标准化"},{"label":"D","text":"监控数据管道的运行状态"}],"answer":"C","explanation":"数据转换核心在于根据业务规则清洗和格式化数据，提升数据质量和一致性。","mnemonic":"ETL转换核心=聚合清洗格式化，重复题选C"},{"id":153,"type":"single","text":"智慧交通是（ ）等新一代信息技术与交通运输领域深度融合而孕育出的新型业态。","options":[{"label":"A","text":"以上都是"},{"label":"B","text":"大数据"},{"label":"C","text":"物联网"},{"label":"D","text":"人工智能"}],"answer":"A","explanation":"智慧交通是人工智能、物联网、大数据等新一代信息技术与交通运输深度融合的新业态，是推动交通运输质量变革、效率变革、动力变革的重要途径","mnemonic":"智慧交通=AI+物联网+大数据都是，全选A"},{"id":154,"type":"single","text":"在 Python 里，能够对图像进行高斯模糊处理的函数是（）。","options":[{"label":"A","text":"cv2.medianBlur()"},{"label":"B","text":"cv2.bilateralFilter()"},{"label":"C","text":"cv2.GaussianBlur()"},{"label":"D","text":"cv2.threshold()"}],"answer":"C","explanation":"Python中可用cv2.GaussianBlur()实现高斯模糊，用于图像平滑和去噪。","mnemonic":"高斯模糊=cv2.GaussianBlur()，高斯名字对应选C"},{"id":155,"type":"single","text":"特征选择指的是（）。","options":[{"label":"A","text":"从原始特征集合中挑选最重要的特征"},{"label":"B","text":"通过算法从特征集中选择特征"},{"label":"C","text":"从特征描述中选取最佳特征"},{"label":"D","text":"从算法中选取最佳特征"}],"answer":"A","explanation":"选项A正确。特征选择的核心是从原始特征集合中选择有最大贡献的特征。选项B错误。算法是工具，不是特征选择的定义。选项C错误。特征选择并不是从“描述”中选择特征，而是从特征集合中选择最相关的特征。选项D错误。算法用于评估特征，而非从算法中选择特征。","mnemonic":"特征选择=从原始特征集挑最重要的，选A"},{"id":156,"type":"single","text":"当运用逻辑回归对大规模数据集进行二元分类时，最适合用于优化模型参数的方法是（）。","options":[{"label":"A","text":"广义极大似然估计"},{"label":"B","text":"牛顿法"},{"label":"C","text":"最小二乘法"},{"label":"D","text":"随机梯度下降"}],"answer":"D","explanation":"随机梯度下降适合大规模数据二元分类的参数优化。","mnemonic":"大规模数据+逻辑回归=随机梯度下降SGD，选D"},{"id":157,"type":"single","text":"关联分析里的支持度，其含义是（）。","options":[{"label":"A","text":"属性的频率"},{"label":"B","text":"属性的重要程度"},{"label":"C","text":"出现某个属性组合的频率"},{"label":"D","text":"两个属性之间的相关程度"}],"answer":"C","explanation":"支持度表示某个属性组合在数据中出现的频率或次数，是关联分析中最基本的概念之一","mnemonic":"支持度=某属性组合出现的频率，组合频率选C"},{"id":158,"type":"single","text":"按照勤勉好学的基本要求，勤勉好学的人应当具备（）品质。","options":[{"label":"A","text":"不愿意接受他人的帮助，喜欢独立工作"},{"label":"B","text":"缺乏自我激励能力，常常懒散"},{"label":"C","text":"不考虑他人意见，只做自己的事情"},{"label":"D","text":"虚心接受他人的建议和批评"}],"answer":"D","explanation":"勤勉好学的人应该保持谦虚和开放的心态，虚心接受他人的建议和批评","mnemonic":"勤勉好学=虚心接受建议批评，谦虚开放选D"},{"id":159,"type":"single","text":"在 OpenCV 里，用于进行直方图均值计算的函数是（）。","options":[{"label":"A","text":"skimage.transform.flip()"},{"label":"B","text":"cv2.equalizeHist()"},{"label":"C","text":"cv2.flip()"},{"label":"D","text":"cv2.rotate()"}],"answer":"B","explanation":"cv2.equalizeHist()实现直方图均衡化。","mnemonic":"直方图均衡化=cv2.equalizeHist()，equalize均衡选B"},{"id":160,"type":"single","text":"按照用途来划分，计算机存储器可分为哪几类（）","options":[{"label":"A","text":"主存储器、外存储器、高速缓冲存储器"},{"label":"B","text":"硬盘和光盘"},{"label":"C","text":"闪存和SD卡"},{"label":"D","text":"U盘和移动硬盘"}],"answer":"A","explanation":"计算机的存储器按用途划分①主存储器：主存储器内存存放计算机运行期间的大量程序和数据存取速度较快，存储容量不大。②外存储器：外存存放系统程序和大型数据文件及数据库存储容量大，单位成本低。③高速缓冲存储器：高速缓冲存储器Cache 高速存取指令和数据存取速度快，但存储容量小。","mnemonic":"存储器三类：主存外存高速缓存，选A"},{"id":161,"type":"single","text":"关于文件系统的特点，下列说法正确的是（）。","options":[{"label":"A","text":"EXT4不具备大文件支持能力"},{"label":"B","text":"HFS+支持动态调整文件块大小"},{"label":"C","text":"FAT32稳定性、兼容性和安全性都好"},{"label":"D","text":"NTFS支持对文件和文件夹进行加密"}],"answer":"D","explanation":"NTFS支持文件加密；FAT32兼容性好但安全性差；HFS+缺少现代功能；EXT4支持大文件。","mnemonic":"NTFS支持文件加密，N加密选D"},{"id":162,"type":"single","text":"手势控制所具有的特征是（）。","options":[{"label":"A","text":"操作速度慢，不能快速响应用户的意图"},{"label":"B","text":"操作自然，具有直观性和快捷性"},{"label":"C","text":"操作难度大，需要用户有一定的训练和技巧"},{"label":"D","text":"灵敏度低，容易引起误操作"}],"answer":"B","explanation":"选项A：灵敏度低并且容易引起误操作并不是手势控制的典型特点","mnemonic":"手势控制=操作自然直观快捷，选B"},{"id":163,"type":"single","text":"在随机森林模型里，通过哪个方法能够运用穷举法搜索超参数组合，以此调整模型超参数，进而提升模型性能？（）","options":[{"label":"A","text":"GridSearchCV"},{"label":"B","text":"RandomizedSearchCV"},{"label":"C","text":"KFold"},{"label":"D","text":"StandardScaler"}],"answer":"A","explanation":"GridSearchCV通过穷举搜索和交叉验证寻找最优超参数组合。","mnemonic":"穷举搜索超参数=GridSearchCV，网格搜索选A"},{"id":164,"type":"single","text":"逻辑回归中 sigmoid 函数的功能是（）。","options":[{"label":"A","text":"将线性组合输出值映射到0到1之间"},{"label":"B","text":"将线性组合输入值映射到0到1之间"},{"label":"C","text":"将线性组合输入值映射到负无穷到正无穷之间"},{"label":"D","text":"将线性组合输出值映射到负无穷到正无穷之间"}],"answer":"A","explanation":"sigmoid函数将线性输出映射到(0,1)区间，输出可解释为概率。","mnemonic":"sigmoid将输出映射到0-1之间，输出变概率选A"},{"id":165,"type":"single","text":"在可用性评估的各类方法里，哪一种最着重于通过真实用户的操作来找出界面设计存在的问题？（）","options":[{"label":"A","text":"认知性遍历"},{"label":"B","text":"用户测试"},{"label":"C","text":"启发式评估"},{"label":"D","text":"用户模型法"}],"answer":"B","explanation":"用户测试通过真实用户操作发现界面问题。","mnemonic":"真实用户操作评估=用户测试，重复题选B"},{"id":166,"type":"single","text":"在 Python 中，可用于对图像执行均值滤波处理的函数是（）。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.blur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"B","explanation":"在Python中，可以使用 cv2.blur() 函数对图像进行均值滤波处理","mnemonic":"均值滤波=cv2.blur()，blur模糊即均值选B"},{"id":167,"type":"single","text":"人机交互指的是人与计算机之间的信息交流及操作方式，下列哪项描述了人机交互的基本原则？","options":[{"label":"A","text":"用户友好"},{"label":"B","text":"高性能硬件"},{"label":"C","text":"数据安全"},{"label":"D","text":"代码编写技巧"}],"answer":"A","explanation":"人机交互的核心原则是用户友好，关注用户体验和高效操作。","mnemonic":"人机交互基本原则=用户友好，选A"},{"id":168,"type":"single","text":"以下哪项做法符合诚实公正的基本要求（）。","options":[{"label":"A","text":"提供准确、真实和完整的信息"},{"label":"B","text":"对某个观点偏向某一方"},{"label":"C","text":"在签订合同前隐瞒重要信息"},{"label":"D","text":"在面试中夸大自己的能力"}],"answer":"A","explanation":"在面试中夸大自己的能力和在签订合同前隐瞒重要信息都是欺骗行为，不符合诚实公正的基本要求；对某个观点偏向某一方也不符合诚实公正的基本要求。只提供准确、真实和完整的信息才符合诚实公正的基本要求。","mnemonic":"诚实公正=提供准确真实完整信息，选A"},{"id":169,"type":"single","text":"利用 OpenCV 库的 imread () 函数加载图像时，什么表示图像的颜色通道顺序（）。","options":[{"label":"A","text":"Noneoftheabove"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"cv.IMREAD_GRAYSCALE"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"D","explanation":"cv.IMREAD_COLOR读取图像时按BGR顺序处理颜色通道。","mnemonic":"imread颜色通道=cv2.IMREAD_COLOR，COLOR即颜色选D"},{"id":170,"type":"single","text":"5W2H 模型通常被应用于（）。","options":[{"label":"A","text":"项目管理行业"},{"label":"B","text":"人力资源管理行业"},{"label":"C","text":"营销推广行业"},{"label":"D","text":"生产制造行业"}],"answer":"A","explanation":"5W2H模型可以用于项目管理中，在制定项目计划时，通过5W2H全面地梳理项目的各个要素，能够确保项目目标明确、人员分工合理、时间安排紧凑、资源配置有效","mnemonic":"5W2H模型应用于项目管理，选A"},{"id":171,"type":"single","text":"全新设计法是根据什么，彻底打破原有流程，从无到有地设计新流程（）。","options":[{"label":"A","text":"流程优化目标"},{"label":"B","text":"非参数"},{"label":"C","text":"系统耗散理论"},{"label":"D","text":"主观赋权"}],"answer":"A","explanation":"全新设计法依据流程优化目标彻底重构流程。","mnemonic":"全新设计法=根据流程优化目标从零设计，选A"},{"id":172,"type":"single","text":"遵守职业道德具有（）方面的益处。","options":[{"label":"A","text":"减轻职业从业者的工作负担"},{"label":"B","text":"消除职业从业者的职业压力"},{"label":"C","text":"提高职业从业者的工作效率"},{"label":"D","text":"增强职业从业者的形象和信誉"}],"answer":"D","explanation":"遵守职业道德带来多重好处，其中最主要的是能够增强职业从业者的形象和信誉","mnemonic":"遵守职业道德=增强形象和信誉，选D"},{"id":173,"type":"single","text":"使用 OpenCV 库的 imread () 函数读取图像时，能够返回原始图像所包含的 alpha 通道的是（）。","options":[{"label":"A","text":"cv.IMREAD_GRAYSCALE"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"Noneoftheabove"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"B","explanation":"使用cv.IMREAD_UNCHANGED可以返回原始图像，包含的alpha通道","mnemonic":"返回alpha通道=IMREAD_UNCHANGED，保持不变选B"},{"id":174,"type":"single","text":"在 Word 软件中，若要取消段落的悬挂缩进设置，可使用的快捷键组合是（）。","options":[{"label":"A","text":"Ctrl+1"},{"label":"B","text":"Ctrl+2"},{"label":"C","text":"Ctrl+3"},{"label":"D","text":"Ctrl+Shift+T"}],"answer":"D","explanation":"在Word中，取消悬挂缩进的快捷键是Ctrl+Shift+T。","mnemonic":"Word取消悬挂缩进=Ctrl+Shift+T，T像缩进标记选D"},{"id":175,"type":"single","text":"协调并管理程序的运行是操作系统的功能之一，下列哪项不属于常见的进程状态（）。","options":[{"label":"A","text":"休眠状态"},{"label":"B","text":"阻塞状态"},{"label":"C","text":"运行状态"},{"label":"D","text":"就绪状态"}],"answer":"A","explanation":"进程状态包括就绪、运行和阻塞，休眠状态不是常见状态。","mnemonic":"进程三状态：就绪运行阻塞，休眠不属于选A"},{"id":176,"type":"single","text":"在对算法进行参数优化测试时，（）工具有助于找出最优的超参数组合。","options":[{"label":"A","text":"GridSearch"},{"label":"B","text":"SGD"},{"label":"C","text":"GradientDescent"},{"label":"D","text":"K-FoldCrossValidation"}],"answer":"A","explanation":"GridSearch可以尝试不同的超参数组合，并计算每个组合的表现。最终选择最佳的一组超参数。","mnemonic":"找最优超参数组合=GridSearch网格搜索，选A"},{"id":177,"type":"single","text":"追求卓越所需要遵循的基本要求是（）。","options":[{"label":"A","text":"持续改进"},{"label":"B","text":"忽视细节"},{"label":"C","text":"缺乏规划"},{"label":"D","text":"保持现状"}],"answer":"A","explanation":"追求卓越的基本要求是高标准要求、持续改进、创造创新、追求专业素养和发挥潜力。A选项符合题意。","mnemonic":"追求卓越=持续改进，不断进步选A"},{"id":178,"type":"single","text":"内存与硬盘之间的不同之处在于（）。","options":[{"label":"A","text":"内存是永久存储，硬盘是暂时存储"},{"label":"B","text":"内存是用来处理数据的，硬盘是用来存储数据的"},{"label":"C","text":"内存是暂时存储，硬盘是永久存储"},{"label":"D","text":"内存是用来存储数据的，硬盘是用来处理数据的"}],"answer":"C","explanation":"内存是用来暂时存储计算机正在运行的程序和数据，而硬盘是用来永久存储数据的","mnemonic":"内存暂时存储硬盘永久存储，内暂硬永选C"},{"id":179,"type":"single","text":"在二分类模型中，召回率（Recall）能够起到什么作用（）。","options":[{"label":"A","text":"评估模型整体表现"},{"label":"B","text":"度量模型对正类的识别能力"},{"label":"C","text":"衡量模型正确预测的比例"},{"label":"D","text":"同时评估模型的精确率（Precision）和召回率（Recall）"}],"answer":"B","explanation":"召回率（Recall）是指真正例（True Positives）占所有实际正例（True Positives + False Negatives）的比例(TP / (TP + FN))","mnemonic":"召回率=度量模型对正类的识别能力，找回正类选B"},{"id":180,"type":"single","text":"在 Word 中，若已设定好多级列表的内容，可通过什么方式来设置文档目录的呈现效果（）。","options":[{"label":"A","t
