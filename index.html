"B","text":"边缘检测法"},{"label":"C","text":"高斯混合模型"},{"label":"D","text":"区域生长法"}],"answer":"A","explanation":"基于阈值的分割方法是根据像素的灰度值与预先设定的阈值进行比较，从而实现图像分割。","mnemonic":"比较像素灰度值与阈值进行分割=基于阈值的分割方法，选A"},{"id":179,"type":"single","text":"5W2H 模型通常被应用于（）。","options":[{"label":"A","text":"项目管理行业"},{"label":"B","text":"人力资源管理行业"},{"label":"C","text":"营销推广行业"},{"label":"D","text":"生产制造行业"}],"answer":"A","explanation":"5W2H模型可以用于项目管理中，在制定项目计划时，通过5W2H全面地梳理项目的各个要素，能够确保项目目标明确、人员分工合理、时间安排紧凑、资源配置有效","mnemonic":"5W2H常用于项目管理，全面梳理项目要素选A"},{"id":180,"type":"single","text":"（）不属于 Canny 算子边缘检测的主要流程。","options":[{"label":"A","text":"滞后阈值"},{"label":"B","text":"计算幅值和方向"},{"label":"C","text":"梯度锐化"},{"label":"D","text":"滤波减噪"}],"answer":"C","explanation":"Canny算子边缘检测的主要流程包括滤波减噪、计算幅值和方向、非极大值抑制、滞后阈值等","mnemonic":"Canny边缘检测：滤波→幅值方向→非极大值抑制→滞后阈值，无梯度锐化选C"},{"id":181,"type":"single","text":"在人机交互中，用户体验设计的主要宗旨是什么？","options":[{"label":"A","text":"提升品牌形象"},{"label":"B","text":"降低生产成本"},{"label":"C","text":"提高系统性能"},{"label":"D","text":"增加用户满意度"}],"answer":"D","explanation":"用户体验设计中，提升用户在使用产品或服务过程中的满意度和愉悦感是其主要目标","mnemonic":"用户体验设计主旨=增加用户满意度，\"用户满意是王道\"选D"},{"id":182,"type":"single","text":"若要转让专利申请权或专利权，当事人之间应当订立何种形式的协议（）。","options":[{"label":"A","text":"书面合同"},{"label":"B","text":"口头协商"},{"label":"C","text":"手写合同"},{"label":"D","text":"证明字条"}],"answer":"A","explanation":"根据《中华人民共和国专利法》第十条规定，专利申请权和专利权可以转让","mnemonic":"转让专利权须签书面合同，口头无效，\"白纸黑字\"选A"},{"id":183,"type":"single","text":"下面哪一项不属于中级培训的知识点（）。","options":[{"label":"A","text":"数据处理方法优化"},{"label":"B","text":"数据标注审核"},{"label":"C","text":"人机交互程序设计"},{"label":"D","text":"智能系统优化"}],"answer":"C","explanation":"人机交互程序设计不属中级培训内容。","mnemonic":"中级培训：数据处理优化/标注审核/系统优化，人机交互程序设计不属于选C"},{"id":184,"type":"single","text":"自助法有哪些优点（）。","options":[{"label":"A","text":"通过对原始数据集进行有放回抽样生成多个训练集，提高模型稳定性"},{"label":"B","text":"可以减少模型的方差，避免过拟合"},{"label":"C","text":"产生的样本分布与原始数据集相同"},{"label":"D","text":"可以减少训练时间"}],"answer":"A","explanation":"自助法通过有放回抽样增加训练样本量，提高稳定性，适用于小样本和不均衡数据，但可能引入偏差。","mnemonic":"自助法优点=有放回抽样生成多个训练集提高稳定性，\"放回抽样稳定强\"选A"},{"id":185,"type":"single","text":"下列哪一项属于初级培训包含的知识点（）。","options":[{"label":"A","text":"机器学习"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"数据标注工具的使用"},{"label":"D","text":"数据审核的标准和方法"}],"answer":"C","explanation":"数据标注工具使用是初级培训知识点。","mnemonic":"初级培训知识点=数据标注工具使用，机器学习/NLP/审核标准太高级选C"},{"id":186,"type":"single","text":"初级工在进行音频数据标注时，需要注意（）问题。","options":[{"label":"A","text":"标注时应该快速完成任务，以提高效率"},{"label":"B","text":"当背景噪音过大时语音应标为无效"},{"label":"C","text":"标注时仅仅关注音频中的语音信号，忽略其它噪声和干扰"},{"label":"D","text":"开始标注时不需要仔细听一遍录音，只需大致扫描一下即可"}],"answer":"B","explanation":"音频标注时背景噪音大的语音应标为无效。","mnemonic":"音频标注：背景噪音过大→标为无效，\"噪音大判无效\"选B"},{"id":187,"type":"single","text":"针对线性不可分的二分类问题，引入核函数将数据映射到高维空间后，可转变为（）。","options":[{"label":"A","text":"多分类问题"},{"label":"B","text":"三分类问题"},{"label":"C","text":"非线性可分问题"},{"label":"D","text":"线性可分问题"}],"answer":"D","explanation":"通过引入核函数，可以将线性不可分的问题转化为线性可分的问题，从而使得支持向量机算法能够有效处理更为复杂的问题","mnemonic":"核函数将线性不可分映射到高维变成线性可分，\"核函数升维变可分\"选D"},{"id":188,"type":"single","text":"下列大数据存储技术以可扩展性作为核心设计目标，通常会牺牲一致性，且采用非标准化的低层次查询接口的是（）。","options":[{"label":"A","text":"分布式文件系统"},{"label":"B","text":"NoSQL数据库"},{"label":"C","text":"NewSQL数据库"},{"label":"D","text":"大数据查询平台"}],"answer":"B","explanation":"NoSQL数据库优先考虑可扩展性，可能降低一致性，并使用非标准化查询，增加与传统SQL应用的集成难度。","mnemonic":"NoSQL=可扩展性优先+牺牲一致性+非标准查询，选B"},{"id":189,"type":"single","text":"下列哪个领域不属于人机交互研究的应用范畴？","options":[{"label":"A","text":"智能家居系统"},{"label":"B","text":"人脸识别技术"},{"label":"C","text":"机器学习算法"},{"label":"D","text":"虚拟现实技术"}],"answer":"C","explanation":"人机交互研究的应用领域包括虚拟现实技术、人脸识别技术、智能家居系统等，但不包括机器学习算法，机器学习算法属于人工智能领域的研究内容","mnemonic":"机器学习算法属于AI领域，不属于人机交互研究范畴选C"},{"id":190,"type":"single","text":"由三个状态构成的简单 FSM，其状态转换的最大可能数量是（）个。","options":[{"label":"A","text":"7"},{"label":"B","text":"6"},{"label":"C","text":"5"},{"label":"D","text":"4"}],"answer":"B","explanation":"简单的三状态FSM最多可能有6个状态转换。","mnemonic":"三状态FSM最大转换数=3×2=6（每个状态可转向另外两个），选B"},{"id":191,"type":"single","text":"通过取均值的方式对每次滑动范围内的数值进行平滑操作的是（）。","options":[{"label":"A","text":"小波变换"},{"label":"B","text":"均值滤波"},{"label":"C","text":"高斯滤波"},{"label":"D","text":"中值滤波"}],"answer":"B","explanation":"均值滤波通过取滑动窗口内均值平滑数据。","mnemonic":"均值滤波=滑动窗口取均值平滑，\"取均值就是均值滤波\"选B"},{"id":192,"type":"single","text":"下列哪个指标数值越大，表明聚类效果越好（）。","options":[{"label":"A","text":"计算准确率"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"熵权法"},{"label":"D","text":"DB指数"}],"answer":"B","explanation":"轮廓系数越大表示类内距离越小，类间距离越大，聚类效果越好","mnemonic":"轮廓系数越大聚类越好，\"轮廓大聚类优\"选B"},{"id":193,"type":"single","text":"在以下哪些情况中，选择事件模式作为输入模式是最恰当的？（）","options":[{"label":"A","text":"输入数据是连续性的，且需要实时处理，如鼠标和键盘输入"},{"label":"B","text":"输入数据需要在应用程序暂停时等待，直到收到数据后才继续执行"},{"label":"C","text":"应用程序需要同时处理多个输入设备的输入，且保证输入数据不会丢失"},{"label":"D","text":"输入频率较低且不需要实时响应，适合按需触发输入"}],"answer":"C","explanation":"应用程序需要同时处理多个输入设备的输入，且保证输入数据不会丢失，事件模式最适合这种场景，因为它允许输入设备和应用程序并行工作，输入数据会被保存到事件队列中，应用程序可以随时读取，确保数据不会丢失。此选项符合事件模式的特点，因此是正确答案。其他选项解析：输入数据是连续性的，且需要实时处理，如鼠标和键盘输入，这种情况适合采样模式，因为采样模式支持连续性的信息流，并且应用程序可以在处理其他数据时不断采样输入设备数据。输入数据需要在应用程序暂停时等待，直到收到数据后才继续执行，这种情况适合请求模式，因为请求模式要求应用程序在等待输入时暂停执行，直到收到输入数据后才继续执行。输入频率较低且不需要实时响应，适合按需触发输入，这种情况适合请求模式，因为输入的频率较低，且不要求实时响应，适合在应用程序需要输入时才启动输入设备。","mnemonic":"事件模式=多设备并行+数据不丢失+队列保存，选C"},{"id":194,"type":"single","text":"随机森林模型中，由哪个参数来管控每棵树所使用的特征数量？（）","options":[{"label":"A","text":"min_samples_split"},{"label":"B","text":"max_features"},{"label":"C","text":"criterion"},{"label":"D","text":"n_estimators"}],"answer":"B","explanation":"在 scikit-learn 中，max_features 参数用于控制每棵树在训练过程中使用的特征数量","mnemonic":"随机森林max_features控制每棵树用的特征数，\"max特征数\"选B"},{"id":195,"type":"single","text":"Python 中，（）库具备实现决策树算法的相关功能。","options":[{"label":"A","text":"matplotlib"},{"label":"B","text":"pandas"},{"label":"C","text":"sklearn"},{"label":"D","text":"numpy"}],"answer":"C","explanation":"sklearn（即scikit-learn）是一个广泛使用的机器学习库，其中包含了实现决策树算法的功能","mnemonic":"sklearn(scikit-learn)实现决策树，\"学习库sklearn\"选C"},{"id":196,"type":"single","text":"业务流程优化需要与什么的应用相结合（）。","options":[{"label":"A","text":"编程技术"},{"label":"B","text":"管理技术"},{"label":"C","text":"空间技术"},{"label":"D","text":"信息技术"}],"answer":"D","explanation":"业务流程优化要与信息技术的应用结合在一起，对于业务流程优化来说，信息技术是基础，也就是说要借助信息技术对管理体系进行规范，对业务流程进行固化，促使其信息交互速度与质量得以有效提升","mnemonic":"业务流程优化需结合信息技术，\"IT是基础\"选D"},{"id":197,"type":"single","text":"在 CART 决策树的节点划分过程中，所采用的指标是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"熵"},{"label":"C","text":"基尼不纯度"},{"label":"D","text":"信息增益"}],"answer":"C","explanation":"在CART决策树算法中常见用于划分节点的指标为基尼不纯度","mnemonic":"CART决策树用基尼不纯度划分节点，\"CART配基尼\"选C"},{"id":198,"type":"single","text":"在 OpenCV 中，能实现中值滤波的函数是（）。","options":[{"label":"A","text":"cv2.medianBlur()"},{"label":"B","text":"skimage.transform.resize()"},{"label":"C","text":"cv2.crop()"},{"label":"D","text":"cv2.resize()"}],"answer":"A","explanation":"在OpenCV中，通过cv2.medianBlur函数进行中值滤波，其基本使用格式如下Cv2,medianBlur(src,ksize[,dst])","mnemonic":"cv2.medianBlur()=中值滤波，\"median就是中值\"选A"},{"id":199,"type":"single","text":"哪项能够体现出 ETL 数据整合工具的可扩展性（）。","options":[{"label":"A","text":"支持与外部API和服务集成"},{"label":"B","text":"提供数据质量监控和错误处理机制"},{"label":"C","text":"提供自动化调度和任务管理功能"},{"label":"D","text":"支持多种数据源和目标系统"}],"answer":"D","explanation":"支持多种数据源体现ETL工具可扩展性，适应不同整合需求。","mnemonic":"ETL可扩展性=支持多种数据源和目标系统，\"多源多目标\"选D"},{"id":200,"type":"single","text":"均方根误差（RMSE）与平均绝对误差（MAE）之间的不同之处在于（）。","options":[{"label":"A","text":"MAE比RMSE更容易受到极端误差值的影响"},{"label":"B","text":"RMSE未对误差幅度进行平方处理"},{"label":"C","text":"MAE对误差幅度较大的样本更敏感"},{"label":"D","text":"RMSE对误差幅度较大的样本更敏感"}],"answer":"D","explanation":"RMSE对大幅误差更敏感（平方效应），MAE平等对待误差。","mnemonic":"RMSE对大误差更敏感因为有平方效应，MAE平等对待，选D"},{"id":201,"type":"single","text":"时间复杂度的核心在于（）。","options":[{"label":"A","text":"基本操作执行次数随输入规模增长的变化趋势"},{"label":"B","text":"计算机内存空间"},{"label":"C","text":"程序代码行数"},{"label":"D","text":"计算机执行时间"}],"answer":"A","explanation":"时间复杂度是指算法中基本操作重复执行的次数是问题规模 n 的某个函数，其度量方法是计算算法的渐进时间复杂度，即分析基本操作的执行次数随 n 的变化趋势","mnemonic":"时间复杂度看\"基本操作执行次数\"与输入规模的关系，不是内存、行数或时间"},{"id":202,"type":"single","text":"在运用 scikit-learn 库搭建朴素贝叶斯分类器的过程中，需要用（）函数来对模型展开训练。","options":[{"label":"A","text":"score"},{"label":"B","text":"fit"},{"label":"C","text":"transform"},{"label":"D","text":"predict"}],"answer":"B","explanation":"scikit-learn用fit函数训练朴素贝叶斯模型。","mnemonic":"sklearn训练模型万能口诀：fit训练，predict预测，score评分"},{"id":203,"type":"single","text":"下列哪项是构成计算机硬件的组成部分（）。","options":[{"label":"A","text":"浏览器"},{"label":"B","text":"显卡"},{"label":"C","text":"虚拟机"},{"label":"D","text":"操作系统"}],"answer":"B","explanation":"计算机硬件包括中央处理器、存储器、输入输出设备、主板等，显卡属于计算机硬件的一部分","mnemonic":"硬件能摸得着：显卡是硬件，浏览器/虚拟机/操作系统都是软件"},{"id":204,"type":"single","text":"劳动合同解除或终止后，用人单位应在多长时间内为劳动者办理档案和社会保险关系的转移手续（）。","options":[{"label":"A","text":"一个月"},{"label":"B","text":"五日"},{"label":"C","text":"十日"},{"label":"D","text":"十五日"}],"answer":"D","explanation":"根据《中华人民共和国劳动合同法》第五十条规定，用人单位应当在解除或者终止劳动合同时出具解除或者终止劳动合同的证明，并在十五日内为劳动者办理档案和社会保险关系转移手续","mnemonic":"离职办手续记\"十五日\"，谐音\"石五\"——石头般牢记15天"},{"id":205,"type":"single","text":"运算器所具备的功能是（）。","options":[{"label":"A","text":"存储数据"},{"label":"B","text":"控制计算机的运行"},{"label":"C","text":"执行算术和逻辑运算"},{"label":"D","text":"控制输入输出操作"}],"answer":"C","explanation":"运算器的主要功能是对数据进行各种算术运算和逻辑运算。","mnemonic":"运算器=算术+逻辑，记\"运算\"二字，存储归存储器，控制归控制器"},{"id":206,"type":"single","text":"下列哪项不属于人机交互的研究范畴？","options":[{"label":"A","text":"人机交互评估方法研究"},{"label":"B","text":"用户需求分析"},{"label":"C","text":"人工智能算法研究"},{"label":"D","text":"用户界面设计"}],"answer":"C","explanation":"机交互研究主要关注用户与计算机之间的交互过程，包括用户界面设计、用户需求分析和人机交互评估方法研究等","mnemonic":"人机交互关注\"人和机器怎么交流\"，AI算法研究属于人工智能领域"},{"id":207,"type":"single","text":"劳动者若在非试用期内要解除劳动合同，需提前多长时间以书面形式告知用人单位（）。","options":[{"label":"A","text":"30日"},{"label":"B","text":"20日"},{"label":"C","text":"15日"},{"label":"D","text":"10日"}],"answer":"A","explanation":"非试用期解除劳动合同需提前30日书面通知，试用期提前3日通知。","mnemonic":"非试用期辞职提前30天，试用期3天——\"三十\"对\"三\"好记"},{"id":208,"type":"single","text":"智慧校园能起到的作用有哪些？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"优化学生服务"},{"label":"C","text":"加强学校管理"},{"label":"D","text":"提升教学效果"}],"answer":"A","explanation":"智慧校园能提升教学效果、加强管理、优化服务。","mnemonic":"智慧校园三合一：教学+管理+服务，全选A"},{"id":209,"type":"single","text":"系统化改造法以现有的流程为应用基础，通过对现有流程采取哪些方法进行重新设计（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"自动化改造"},{"label":"C","text":"简化"},{"label":"D","text":"整合"}],"answer":"A","explanation":"系统化改造法的应用基础是现有的流程，通过对现有流程进行整合、简化、自动化改造等方法对其进行重新设计，","mnemonic":"系统化改造法三招：整合+简化+自动化，全选A"},{"id":210,"type":"single","text":"卷积神经网络（CNN）中，通过哪项（）操作在输入数据上进行特征提取。","options":[{"label":"A","text":"卷积操作（Convolution）"},{"label":"B","text":"激活函数(ActivationFunction)"},{"label":"C","text":"批归一化(BatchNormalization)"},{"label":"D","text":"全连接层(FullyConnectedLayer)"}],"answer":"A","explanation":"CNN中卷积操作通过滤波器提取局部特征，池化操作降维并保留显著特征。","mnemonic":"CNN提特征靠\"卷积\"，卷积=滤波器扫描提取局部特征"},{"id":211,"type":"single","text":"LOTOS 算子里的选择操作符 “[]”，它的含义是（）。","options":[{"label":"A","text":"选取一个进程执行路径"},{"label":"B","text":"选取一个行为表达式执行"},{"label":"C","text":"选取一个命题真值"},{"label":"D","text":"选取一个数列子集"}],"answer":"B","explanation":"LOTOS算子中的选择操作符 [] 用于从多个行为表达式中选择一个执行的行为","mnemonic":"LOTOS选择符[]：从多个行为表达式中\"选一个执行\"，记\"方括号选行为\""},{"id":212,"type":"single","text":"按照劳动法的相关规定，劳动者若要解除劳动合同，需提前（）以书面形式告知用人单位。","options":[{"label":"A","text":"30日"},{"label":"B","text":"20日"},{"label":"C","text":"15日"},{"label":"D","text":"10日"}],"answer":"A","explanation":"劳动法规定劳动者解除劳动合同需提前30日书面通知用人单位。","mnemonic":"解除劳动合同提前30日书面通知，与207题同，记\"三十日\""},{"id":213,"type":"single","text":"（）复杂度反映的是时间消耗最小的状况。","options":[{"label":"A","text":"O(1)"},{"label":"B","text":"O(n)"},{"label":"C","text":"O(nlogn)"},{"label":"D","text":"O(n²)"}],"answer":"A","explanation":"O(1)复杂度表示算法执行时间恒定，与输入规模无关，效率最高。","mnemonic":"O(1)最省时：常数时间不随n变，效率天花板"},{"id":214,"type":"single","text":"下列数据库中，属于文档数据库的是（）。","options":[{"label":"A","text":"Redis"},{"label":"B","text":"MongoDB"},{"label":"C","text":"HBase"},{"label":"D","text":"Neo4j"}],"answer":"B","explanation":"Redis是键值数据库，HBase是列族数据库，Neo4j是图形数据库。MongoDB是典型的文档数据库，以JSON格式存储半结构化数据。","mnemonic":"文档数据库=MongoDB，记\"Mongo存文档JSON\"；Redis键值，HBase列族，Neo4j图"},{"id":215,"type":"single","text":"jieba 分词中，哪个步骤是用来把文本分割成单个词语或词组的（）。","options":[{"label":"A","text":"导入jieba库"},{"label":"B","text":"载入词典"},{"label":"C","text":"分词操作"},{"label":"D","text":"获取分词结果"}],"answer":"C","explanation":"分词操作实现文本到词语的切分。","mnemonic":"jieba分词三步：导入库→分词操作→获取结果，\"分词操作\"是核心切分步骤"},{"id":216,"type":"single","text":"指导中级工作人员解决数据标注方面的问题时，需要关注有一种标注方式常被用于对文本中的实体进行识别，这种方式是什么？（）","options":[{"label":"A","text":"语义分割"},{"label":"B","text":"目标检测"},{"label":"C","text":"序列标注"},{"label":"D","text":"分类标注"}],"answer":"C","explanation":"序列标注适用于识别文本中的实体等连续结构","mnemonic":"文本实体识别用\"序列标注\"，记\"序列=一串文字标出实体\""},{"id":217,"type":"single","text":"《中华人民共和国网络安全法》指出，关键信息基础设施的运营者应自行或委托网络安全服务机构，对其网络的安全性及潜在风险（）至少开展一次检测评估。","options":[{"label":"A","text":"每五年"},{"label":"B","text":"每三年"},{"label":"C","text":"每两年"},{"label":"D","text":"每年"}],"answer":"D","explanation":"《中华人民共和国网络安全法》第三十八条规定，关键信息基础设施的运营者应当自行或者委托网络安全服务机构对其网络的安全性和可能存在的风险每年至少进行一次检测评估，并将检测评估情况和改进措施报送相关负责关键信息基础设施安全保护工作的部门。","mnemonic":"关键信息基础设施安全检测\"每年至少一次\"，记\"年检\"如同车辆年检"},{"id":218,"type":"single","text":"凭借灰度的突然变化来找到图像中区域边界的是（）。","options":[{"label":"A","text":"K-means聚类分割"},{"label":"B","text":"区域生长法"},{"label":"C","text":"边缘检测分割"},{"label":"D","text":"阈值分割"}],"answer":"C","explanation":"在图像中不同区域的边界上像素的灰度通常会有较大的变化，边缘检测就是根据灰度的突变来找到图像中区域边界的方法","mnemonic":"灰度突变找边界=边缘检测分割，记\"突变=边缘\""},{"id":219,"type":"single","text":"在业务流程重组（BPR）里，信息技术（IT）所起到的作用是（）。","options":[{"label":"A","text":"BPR的核心思想"},{"label":"B","text":"BPR的辅助工具"},{"label":"C","text":"BPR的替代方法"},{"label":"D","text":"BPR的最终目标"}],"answer":"B","explanation":"信息技术（IT）在业务流程重组（BPR）中起到催化剂的作用。IT是一种技术，而BPR是一种思想，IT在BPR由思想到现实的转变中，起到促进和辅助的作用。因此，IT是BPR的辅助工具，而不是核心思想、替代方法或最终目标。","mnemonic":"IT在BPR中是\"辅助工具\"，像催化剂促进但非核心"},{"id":220,"type":"single","text":"与智慧农业紧密相关的核心技术有哪些？","options":[{"label":"A","text":"信息技术"},{"label":"B","text":"互联网"},{"label":"C","text":"人工智能"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"与智慧农业密切相关的关键技术包括信息技术、互联网、人工智能等。","mnemonic":"智慧农业关键技术：信息技术+互联网+AI，全选D"},{"id":221,"type":"single","text":"自助法（bootstrap）作为一种常用的数据集划分方式，其基本思想是什么（）。","options":[{"label":"A","text":"将原始数据集按特定比例分成训练集和测试集"},{"label":"B","text":"将原始数据集分成训练集和测试集"},{"label":"C","text":"从原始数据集中随机无放回地抽取样本，构成新的训练集"},{"label":"D","text":"从原始数据集中随机有放回地抽取样本，构成新的训练集"}],"answer":"D","explanation":"自助法是一种基于有放回抽样的数据集划分方法，它的基本思想是从原始数据集中随机有放回地抽取样本，构成新的训练集，可以重复抽取多次构成多个不同的训练集，这些训练集之间可能存在重复样本","mnemonic":"自助法bootstrap记\"有放回抽样\"，boot=反复穿靴子=放回再抽"},{"id":222,"type":"single","text":"能够用于评估类内相似度的指标是（）。","options":[{"label":"A","text":"均方根误差"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"熵权法"},{"label":"D","text":"DB指数"}],"answer":"B","explanation":"轮廓系数综合评估类内相似度与类间分离度。","mnemonic":"轮廓系数评聚类：类内紧密+类间分离，记\"轮廓看内外\""},{"id":223,"type":"single","text":"在数据整合过程中，进行数据加载的目的是（）。","options":[{"label":"A","text":"对数据进行清洗和转换操作"},{"label":"B","text":"将转换后的数据加载到指定数据库或文件中"},{"label":"C","text":"将数据转换为可视化图形"},{"label":"D","text":"将数据从不同数据源提取出来"}],"answer":"B","explanation":"数据加载是将转换后的数据加载到数据库或文件中，以供后续的分析、报告和应用使用","mnemonic":"数据加载=Load，ETL最后一步，把处理好的数据装进目标库"},{"id":224,"type":"single","text":"下列哪项最准确地描述了大数据存储的核心目标（）。","options":[{"label":"A","text":"对数据进行加密以防止未经授权的访问"},{"label":"B","text":"使用高性能计算设备提升数据读写速度"},{"label":"C","text":"通过建立数据库，将采集或预处理后的数据转化为可直接使用的数据资产"},{"label":"D","text":"仅将原始数据存入硬盘或云端，确保物理存储安全"}],"answer":"C","explanation":"大数据存储是利用合适的存储方式把采集到的或者预处理后的数据存储起来，通过建立相应的数据库，形成直接可用的数据资产的过程","mnemonic":"大数据存储核心：建库形成\"可用数据资产\"，不是单纯存硬盘"},{"id":225,"type":"single","text":"多分类模型中的精确率（Precision），它所衡量的是（）。","options":[{"label":"A","text":"被预测为某一类别的样本中，实际属于该类别的比例"},{"label":"B","text":"模型整体的分类准确性"},{"label":"C","text":"所有预测正确的样本占总样本数的比例"},{"label":"D","text":"模型的分类错误率"}],"answer":"A","explanation":"精确率衡量被预测为正例的样本中实际为正例的比例。","mnemonic":"精确率Precision：预测为正的里面真正对的比例，记\"查准率\""},{"id":226,"type":"single","text":"智慧农业解决方案能够帮助农民达成哪些目标？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"改善农产品质量和食品安全"},{"label":"C","text":"优化资源利用"},{"label":"D","text":"提高生产效率"}],"answer":"A","explanation":"智慧农业解决方案可以帮助农民实现提高生产效率、优化资源利用、改善农产品质量和食品安全、实现可持续发展等","mnemonic":"智慧农业帮农民：提效+优化资源+改善质量安全，全选A"},{"id":227,"type":"single","text":"在逻辑回归里，决策边界的确定是通过将（）的输出与阈值作比较来实现的。","options":[{"label":"A","text":"余弦相似度函数"},{"label":"B","text":"对数损失函数"},{"label":"C","text":"Sigmoid函数"},{"label":"D","text":"线性回归函数"}],"answer":"C","explanation":"逻辑回归用Sigmoid函数输出概率，与阈值比较确定类别。","mnemonic":"逻辑回归决策靠Sigmoid函数输出概率与阈值比较，记\"S曲线定分类\""},{"id":228,"type":"single","text":"按照标注的规范和具体要求，完成文本、视觉、语音数据的清洗工作，这一内容属于初级培训知识里的哪个部分（）。","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"业务数据处理"},{"label":"C","text":"数据采集"},{"label":"D","text":"智能系统运维"}],"answer":"A","explanation":"能够根据标注规范和要求，完成对文本、视觉、语音数据清洗属于初级培训知识数据标注部分的内容","mnemonic":"按标注规范清洗文本/视觉/语音数据属于\"数据标注\"培训内容"},{"id":229,"type":"single","text":"UAN 模型指的是（）。","options":[{"label":"A","text":"自然语言处理模型"},{"label":"B","text":"机器学习模型"},{"label":"C","text":"用户行为分析模型"},{"label":"D","text":"人工智能算法"}],"answer":"C","explanation":"UAN模型是用户行为分析模型，用于分析用户在网站或APP上的行为。","mnemonic":"UAN=User Action Notation=用户行为分析模型，记\"U=User行为\""},{"id":230,"type":"single","text":"下列哪项属于智慧农业的应用实例？","options":[{"label":"A","text":"农业互联网"},{"label":"B","text":"精准农业技术"},{"label":"C","text":"智能温室管理系统"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"智慧农业的应用案例包括农业互联网、精准农业技术、智能温室管理系统和农业无人机应用等。","mnemonic":"智慧农业应用：农业互联网+精准农业+智能温室，全选D"},{"id":231,"type":"single","text":"在 Word 中，可用哪些方法插入脚注（）。","options":[{"label":"A","text":"点击“引用”选项卡，选择“脚注”。"},{"label":"B","text":"点击“参考文献”选项卡，选择“脚注”。"},{"label":"C","text":"点击“编辑”选项卡，选择“脚注”。"},{"label":"D","text":"点击“视图”选项卡，选择“脚注”。"}],"answer":"A","explanation":"在Word中，可通过“引用”选项卡中的“脚注”功能插入脚注，并自定义格式。","mnemonic":"Word插脚注：引用选项卡→脚注，记\"引用出脚注\""},{"id":232,"type":"single","text":"下列选项中，属于键值存储的典型数据库是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Cassandra"},{"label":"C","text":"Redis"},{"label":"D","text":"MongoDB"}],"answer":"C","explanation":"Redis属于键值数据库；MySQL属于关系型数据库；Cassandra是列族数据库；MongoDB是文档数据库。","mnemonic":"Redis=键值存储，记\"Redis的R像钥匙=Key-Value\""},{"id":233,"type":"single","text":"在业务流程重组工作中，简化过程所追求的战略目标是（）。","options":[{"label":"A","text":"增加流程的控制点"},{"label":"B","text":"增加流程的检查和校对"},{"label":"C","text":"精简分散的过程"},{"label":"D","text":"增加流程的复杂性"}],"answer":"C","explanation":"简化过程的战略目标是精简分散的过程（B），以提高效率和减少冗余。","mnemonic":"BPR简化过程目标：精简分散，记\"简化=精简\""},{"id":234,"type":"single","text":"下列哪项会造成算法出现过拟合现象（）。","options":[{"label":"A","text":"训练数据过多"},{"label":"B","text":"学习率过低"},{"label":"C","text":"训练数据太少"},{"label":"D","text":"模型太简单"}],"answer":"C","explanation":"训练数据不足易导致过拟合，模型泛化能力差。","mnemonic":"训练数据太少→过拟合，记\"数据少模型死记硬背=过拟合\""},{"id":235,"type":"single","text":"下列主要依靠图像中的边缘信息来完成分割的方法是（）。","options":[{"label":"A","text":"基于深度学习的方法"},{"label":"B","text":"区域生长法"},{"label":"C","text":"边缘检测法"},{"label":"D","text":"基于聚类的方法"}],"answer":"C","explanation":"边缘检测法依靠图像灰度跃变确定边缘位置完成分割。","mnemonic":"边缘检测法靠\"边缘信息\"分割，名字即答案"},{"id":236,"type":"single","text":"在体现 “选择” 关系的状态转换网络中，状态 S0 具有怎样的特点？（）","options":[{"label":"A","text":"S0 是一个孤立状态，没有任何转换关系"},{"label":"B","text":"S0 只能通过内部事件触发状态转换"},{"label":"C","text":"S0 是初始状态，可以通过外部事件0 和外部事件1 转换到其他状态"},{"label":"D","text":"S0 是一个终止状态，不能转换到其他状态"}],"answer":"C","explanation":"根据“选择”关系的状态转换网络，S0 是初始状态，可以通过外部事件0 转换到状态 S1，或者通过外部事件1 转换到状态 S2。此外，它也可以通过 G0 或 G1 的正常结束事件回到自身。","mnemonic":"选择关系中S0是初始状态，可通过外部事件转到其他状态"},{"id":237,"type":"single","text":"尊重他人是职业道德的基本要求之一，下列哪项做法能体现出这一要求（）。","options":[{"label":"A","text":"不断批评同事的工作"},{"label":"B","text":"不听取下属的意见建议"},{"label":"C","text":"与同事礼貌、尊重地相处"},{"label":"D","text":"随意披露同事的个人信息"}],"answer":"C","explanation":"与同事礼貌、尊重地相处可以体现尊重他人这一职业道德的基本要求，而不断批评同事的工作、不听取下属的意见建议、随意披露同事的个人信息则违反职业道德。","mnemonic":"尊重他人=礼貌相处，排除批评/不听/泄露隐私"},{"id":238,"type":"single","text":"在 Python 里，利用 Scikit-Learn 库创建 KNN 算法的类是（）。","options":[{"label":"A","text":"DecisionTreeRegressor"},{"label":"B","text":"RandomForestClassifier"},{"label":"C","text":"LogisticRegression"},{"label":"D","text":"KNeighborsClassifier"}],"answer":"D","explanation":"Scikit-Learn的KNeighborsClassifier类构建KNN模型。","mnemonic":"KNN算法类名=KNeighborsClassifier，记\"K Neighbors=K个邻居\""},{"id":239,"type":"single","text":"能够借助上下文信息进行中文分词的是（）。","options":[{"label":"A","text":"递归神经网络"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"A","explanation":"递归神经网络（RNN）可以利用上下文信息进行中文分词","mnemonic":"RNN利用上下文分词，记\"递归=前后文相连\""},{"id":240,"type":"single","text":"核心思想是将图像表示为一组基向量的线性组合的是（）。","options":[{"label":"A","text":"高斯滤波"},{"label":"B","text":"非局部均值滤波"},{"label":"C","text":"基于稀疏表示的方法"},{"label":"D","text":"小波变换"}],"answer":"C","explanation":"稀疏表示去噪法将图像表示为基向量的线性组合，利用稀疏性去除噪声并保留细节。","mnemonic":"稀疏表示=基向量线性组合，记\"稀疏=少量基向量表达图像\""},{"id":241,"type":"single","text":"下列属于小波变换特点的是（）。","options":[{"label":"A","text":"改善图像对比度"},{"label":"B","text":"增强图像细节"},{"label":"C","text":"边缘保护"},{"label":"D","text":"多分辨率分析"}],"answer":"D","explanation":"小波变换非常适合分析突变信号和不平稳信号，并且小波变换具有多分辨率分析的特点和带通滤波器的特性，可用快速算法实现，因而常用于滤波、降和基频提取等","mnemonic":"小波变换特点=多分辨率分析，记\"小波多分辨\""},{"id":242,"type":"single","text":"平均绝对百分比误差（MAPE）可用于评估什么（）。","options":[{"label":"A","text":"异常检测模型"},{"label":"B","text":"聚类模型"},{"label":"C","text":"回归模型"},{"label":"D","text":"分类模型"}],"answer":"C","explanation":"平均绝对百分比误差(MAPE)是用来评估回归模型预测结果误差大小的指标","mnemonic":"MAPE评估回归模型，记\"百分比误差=回归预测偏差\""},{"id":243,"type":"single","text":"下列哪项属于 GOMS 模型的局限性？","options":[{"label":"A","text":"适用于复杂的问题解决"},{"label":"B","text":"无法考虑到用户的情感体验"},{"label":"C","text":"只能用于设计计算机界面"},{"label":"D","text":"可以预测用户的认知过程"}],"answer":"B","explanation":"GOMS模型无法考虑用户情感体验是局限。","mnemonic":"GOMS局限：不考虑用户情感，记\"GOMS只管操作不管感情\""},{"id":244,"type":"single","text":"以下哪种数据存储方式最适合用来存储大量结构化数据，并且支持高效的查询操作和事务处理（）。","options":[{"label":"A","text":"分布式文件系统存储"},{"label":"B","text":"基于数据仓库的数据存储"},{"label":"C","text":"基于数据库的数据存储"},{"label":"D","text":"基于文件系统的数据存储"}],"answer":"C","explanation":"基于文件系统的数据存储适合存储非结构化数据，如文本文件、图片、视频等","mnemonic":"结构化数据+高效查询+事务处理=数据库存储，记\"结构化找数据库\""},{"id":245,"type":"single","text":"AARRR 模型中的第一个 \"R\" 代表的是（）。","options":[{"label":"A","text":"留存"},{"label":"B","text":"获客"},{"label":"C","text":"收益"},{"label":"D","text":"传播"}],"answer":"A","explanation":"AARRR模型的第一个R表示用户留存（Retention）。","mnemonic":"AARRR=获客Acquisition-激活Activation-留存Retention-收益Revenue-传播Referral，第一个R=留存"},{"id":246,"type":"single","text":"下列（）不属于可用性的五个关键维度。","options":[{"label":"A","text":"安全性"},{"label":"B","text":"容错能力"},{"label":"C","text":"吸引力"},{"label":"D","text":"有效性"}],"answer":"A","explanation":"有效性是可用性的一个关键方面，指用户能够成功地完成其目标或任务。因此，这个选项是正确的，属于可用性的五个方面之一。吸引力是指产品是否具有吸引用户的外观和交互设计，这也是可用性的一个方面，主要涉及用户的情感和视觉体验。容错能力是指产品能够宽容用户的错误操作并提供反馈或修正途径。这也是可用性的重要方面之一。安全性与用户数据保护、系统稳定性等因素相关，通常不是可用性评价中的直接方面。虽然安全性对用户体验很重要，但它不直接涉及有效性、效率、吸引力、容错能力和易于学习这些基本可用性方面。","mnemonic":"可用性五维不含\"安全性\"，记\"有效、效率、吸引、容错、易学，无安全\""},{"id":247,"type":"single","text":"对比分析法指的是对多少个及以上的数据进行比较（）。","options":[{"label":"A","text":"一组"},{"label":"B","text":"三组或三组上"},{"label":"C","text":"两组或两组以上"},{"label":"D","text":"至少三组"}],"answer":"C","explanation":"对比分析法，即对两组或两组以上的数据进行比较，是最通用的一种方法","mnemonic":"对比分析法：两组或两组以上数据比较，记\"对比至少两组\""},{"id":248,"type":"single","text":"数据转换能力是 ETL 工具的核心功能之一，下列最能反映这一特性的是（）。","options":[{"label":"A","text":"从多个数据库表提取数据"},{"label":"B","text":"将数据加载到目标数据仓库"},{"label":"C","text":"对数据进行聚合、清洗和格式标准化"},{"label":"D","text":"监控数据管道的运行状态"}],"answer":"C","explanation":"数据转换核心在于根据业务规则清洗和格式化数据，提升数据质量和一致性。","mnemonic":"ETL的T=Transform=转换：聚合+清洗+格式标准化"},{"id":249,"type":"single","text":"下列哪项是可以读取网络上文本数据的方法（）。","options":[{"label":"A","text":"read_csv()"},{"label":"B","text":"read_table()"},{"label":"C","text":"read_html()"},{"label":"D","text":"read_json()"}],"answer":"C","explanation":"pandas的read_html()函数可从HTML文件中提取表格数据并转换为DataFrame格式。","mnemonic":"读网页表格用read_html()，记\"html=网页\""},{"id":250,"type":"single","text":"在 Web 界面设计工作中，为了保证不同用户都能顺利访问和使用网页，设计时需要重点考虑（）。","options":[{"label":"A","text":"以用户为中心"},{"label":"B","text":"界面一致性"},{"label":"C","text":"兼顾不同浏览器"},{"label":"D","text":"界面简洁与明确"}],"answer":"C","explanation":"Web设计需考虑不同浏览器兼容性。","mnemonic":"Web设计保证不同用户顺利访问=兼顾不同浏览器兼容性"},{"id":251,"type":"single","text":"根据《中华人民共和国个人信息保护法》，个人信息不涉及（）。","options":[{"label":"A","text":"匿名化处理后的信息"},{"label":"B","text":"个人财产信息、交易信息、账户信息等财产信息"},{"label":"C","text":"通讯录、通话记录、通讯内容等通讯信息"},{"label":"D","text":"姓名、出生日期、身份证号码等身份信息"}],"answer":"A","explanation":"《中华人民共和国个人信息保护法》第四条规定，个人信息是以电子或者其他方式记录的与已识别或者可识别的自然人有关的各种信息，不包括匿名化处理后的信息","mnemonic":"个人信息保护法不保护\"匿名化处理后的信息\"，记\"匿名=非个人信息\""},{"id":252,"type":"single","text":"哪个步骤是结合人工智能技术的要求，对业务数据的采集规范进行梳理的？（）","options":[{"label":"A","text":"标注数据审核"},{"label":"B","text":"业务数据质量检测"},{"label":"C","text":"数据处理方法优化"},{"label":"D","text":"数据归类和定义"}],"answer":"B","explanation":"业务数据质量检测环节梳理数据采集规范。","mnemonic":"结合AI梳理采集规范=业务数据质量检测，记\"质检查规范\""},{"id":253,"type":"single","text":"在 Excel 中，哪项功能可以按照条件对数据进行筛选（）。","options":[{"label":"A","text":"Subtotal"},{"label":"B","text":"Group"},{"label":"C","text":"Filter"},{"label":"D","text":"Sort"}],"answer":"C","explanation":"Filter功能可以用于按条件筛选数据","mnemonic":"Excel按条件筛选=Filter，记\"Filter=过滤=筛选\""},{"id":254,"type":"single","text":"计算机系统要完成任务，首先得从哪里读取指令（）。","options":[{"label":"A","text":"控制器"},{"label":"B","text":"存储器"},{"label":"C","text":"运算器"},{"label":"D","text":"输入/输出设备"}],"answer":"B","explanation":"计算机系统通过控制器、运算器、存储器和I/O设备的紧密协作来完成任务： 控制器负责从存储器中读取指令，指挥运算器执行算术和逻辑操作，并协调数据在各设备间的传输。","mnemonic":"计算机读指令从\"存储器\"开始，记\"指令存在存储器里\""},{"id":255,"type":"single","text":"下列哪项属于职业道德的特征（）。","options":[{"label":"A","text":"随意性"},{"label":"B","text":"主观性"},{"label":"C","text":"实践性"},{"label":"D","text":"阶段性"}],"answer":"C","explanation":"职业道德具备职业性、实践性、继承性与多样性等特征：职业性限定于特定行业；实践性体现于实际职业行为；继承性保留核心道德内容；多样性因行业差异而不同。","mnemonic":"职业道德特征=实践性，记\"道德在实践中体现\"，排除随意/主观/阶段"},{"id":256,"type":"single","text":"在初级培训的知识点当中，数据标注方面有哪些是需要掌握的（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"视觉标注"},{"label":"C","text":"语音标注"},{"label":"D","text":"文本标注"}],"answer":"A","explanation":"在初级培训知识点中，需要掌握数据标注中的文本标注、语音标注、视觉标注","mnemonic":"初级数据标注：文本+语音+视觉三种标注全要掌握，选A"},{"id":257,"type":"single","text":"关联分析中的置信度指标，其含义是（）。","options":[{"label":"A","text":"购买某个物品的价格"},{"label":"B","text":"购买某个物品的频率"},{"label":"C","text":"购买某个物品的数量"},{"label":"D","text":"在包含某个物品的事务中，同时包含另一个物品的概率"}],"answer":"D","explanation":"置信度是指购买某个物品组合的顾客中，同时购买某一个物品的比例，也就是条件概率（P(A|B)）","mnemonic":"关联分析置信度=条件概率P(B|A)，记\"买了A再买B的概率\""},{"id":258,"type":"single","text":"下列哪项不属于图像数据处理的基本流程（）。","options":[{"label":"A","text":"模型部署"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据预处理"},{"label":"D","text":"模型训练"}],"answer":"A","explanation":"图像数据处理流程中的基本流程包括数据预处理、特征提取、模型训练等步骤，最后可以根据需要进行模型部署","mnemonic":"模型部署不属于图像处理\"基本流程\"，基本流程=预处理+特征提取+训练"},{"id":259,"type":"single","text":"对于二分类模型，当学习器的 ROC 曲线出现交叉情况时，能对模型整体表现进行评估的指标是（）。","options":[{"label":"A","text":"AUC值"},{"label":"B","text":"错误率"},{"label":"C","text":"召回率"},{"label":"D","text":"准确率"}],"answer":"A","explanation":"AUC值综合所有阈值下表现，评估模型整体性能。","mnemonic":"ROC曲线交叉时看AUC值，记\"AUC=曲线下面积，综合评判\""},{"id":260,"type":"single","text":"当借助 scikit-learn 库来实现朴素贝叶斯分类器时，（）对于 MultinomialNB 类是适用的。","options":[{"label":"A","text":"连续型特征数据"},{"label":"B","text":"二元型特征数据"},{"label":"C","text":"多项式型特征数据"},{"label":"D","text":"类别型特征数据"}],"answer":"C","explanation":"MultinomialNB适用于多项式特征数据（如词频），GaussianNB用于连续数据，BernoulliNB用于二元数据。","mnemonic":"MultinomialNB适用多项式特征，记\"Multinomial=多项式=词频计数\""},{"id":261,"type":"single","text":"管理系统资源是操作系统的主要功能之一，下列哪项不在其管理范围内（）。","options":[{"label":"A","text":"插排调整"},{"label":"B","text":"存储分配"},{"label":"C","text":"进程调度"},{"label":"D","text":"文件操作"}],"answer":"A","explanation":"操作系统的功能如下：①进程管理，主要是进程调度。②存储管理：存储分配、存储共享、存储保护 、存储扩张。③设备管理：设备分配、设备传输控制 、设备独立性。④文件管理：文件存储空间的管理、目录管理 、文件操作管理、文件保护。⑤作业管理是负责处理用户提交的任何要求。","mnemonic":"操作系统不管\"插排调整\"，插排是物理电器，记\"插排不归OS管\""},{"id":262,"type":"single","text":"下列对于对比分析的表述，正确的是（ ）。","options":[{"label":"A","text":"对比分析主要用于描述数据的绝对值大小"},{"label":"B","text":"对比分析不需要考虑数据的可比性"},{"label":"C","text":"对比分析的目的是揭示事物的发展规律"},{"label":"D","text":"对比分析只能用于两个数据之间的比较"}],"answer":"C","explanation":"对比分析是将两个或两个以上具有可比性的数据进行比较，分析其中差异，以揭示事物发展规律","mnemonic":"对比分析目的：揭示事物发展规律，记\"对比找规律\""},{"id":263,"type":"single","text":"对比分析主要有哪两种形式（）。","options":[{"label":"A","text":"绝对数比较、相对数比较"},{"label":"B","text":"问题因素的名称"},{"label":"C","text":"相反数比较"},{"label":"D","text":"问题因素的数量"}],"answer":"A","explanation":"对比分析主要有绝对数比较和相对数比较两种形式。","mnemonic":"对比分析两种形式：绝对数比较+相对数比较，记\"绝对+相对\""},{"id":264,"type":"single","text":"下列哪项做法违背了严谨求是的原则（）。","options":[{"label":"A","text":"主观判断"},{"label":"B","text":"谨慎处理"},{"label":"C","text":"精确表达"},{"label":"D","text":"严密思考"}],"answer":"A","explanation":"过度主观的判断会导致不客观、不严谨，因此不符合严谨求是的原则","mnemonic":"主观判断违背严谨求是，记\"主观=不客观=不严谨\""},{"id":265,"type":"single","text":"业务流程优化的含义是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"构建一种简单直接的业务流程，提升企业应对外部环境变化的反应能力将企业无效的业务活动、不增值的业务活动、等待时间、重复工作、协调工作量减到最少。"},{"label":"C","text":"在IT技术及相关配套技术的支持下，以满足业务及管理需求为前提，打破部门壁垒"},{"label":"D","text":"针对企业业务流程现存的各种问题，对企业现有的业务流程进行调研、分析、梳理、完善、改进"}],"answer":"A","explanation":"业务流程优化需借助IT技术打破部门壁垒，减少无效活动，提升响应能力。","mnemonic":"业务流程优化含义：调研改进+打破壁垒+简化提效，全选A"},{"id":266,"type":"single","text":"下列这些 ETL 工具中，属于开源的是（）。","options":[{"label":"A","text":"MicrosoftSQLServerIntegrationServices(SSIS)"},{"label":"B","text":"IBMInfoSphereDataStage"},{"label":"C","text":"InformaticaPowerCenter"},{"label":"D","text":"Kettle"}],"answer":"D","explanation":"Kettle是开源ETL工具，其他为商业软件。","mnemonic":"开源ETL工具=Kettle，记\"水壶Kettle是开源的\"，其余SSIS/DataStage/PowerCenter都是商业"},{"id":267,"type":"single","text":"在 OpenCV 中，可用于执行快速傅里叶变换的函数是（）。","options":[{"label":"A","text":"cv2.crop()"},{"label":"B","text":"cv2.dft()"},{"label":"C","text":"cv2.flip()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"B","explanation":"OpenCV中的cv2.dft()函数用于执行快速傅里叶变换。","mnemonic":"OpenCV快速傅里叶变换=cv2.dft()，记\"dft=discrete fourier transform\""},{"id":268,"type":"single","text":"傅里叶变换的作用是将时域信号转换为（）。","options":[{"label":"A","text":"频域信号"},{"label":"B","text":"时域信号"},{"label":"C","text":"噪声信号"},{"label":"D","text":"滤波信号"}],"answer":"A","explanation":"傅里叶变换，则是将时域(Time Domain)信号转换为频域(FrequencyDomain)信号","mnemonic":"傅里叶变换：时域→频域，记\"傅里叶=时变频\""},{"id":269,"type":"single","text":"图像处理指的是（）。","options":[{"label":"A","text":"使用人工智能技术对图像进行分析和识别的过程"},{"label":"B","text":"通过计算机对图像进行分析、操作的处理技术"},{"label":"C","text":"将图像转换为数字信号的过程"},{"label":"D","text":"从图像中提取有用信息的过程"}],"answer":"B","explanation":"图像处理，顾名思义，可以简单地定义为利用计算机算法(通过代码)对图像进行分析、操作的处理技术","mnemonic":"图像处理=计算机对图像分析操作的处理技术，最全面的定义选B"},{"id":270,"type":"single","text":"SWOT 模型中，“W” 所代表的是（）。","options":[{"label":"A","text":"Threats"},{"label":"B","text":"Opportunities"},{"label":"C","text":"Weaknesses"},{"label":"D","text":"Strengths"}],"answer":"C","explanation":"SWOT模型中的“W”代表Weaknesses（劣势）","mnemonic":"SWOT的W=Weaknesses劣势，记\"W=Weak=弱点\""},{"id":271,"type":"single","text":"下列哪项不是采用滤波器对语音信号的频谱进行分析时所具有的优点（）。","options":[{"label":"A","text":"简单"},{"label":"B","text":"实时性好"},{"label":"C","text":"频率高"},{"label":"D","text":"受外界环境的影响小"}],"answer":"C","explanation":"利用一组滤波器来分析语音信号的频谱，是最早采用的频谱分析方法之一。这种方法使用简单、实时性好、受外界环境的影响小，所以至今这一方法仍是频谱分析的常用方法。","mnemonic":"滤波器频谱分析优点：简单+实时+抗干扰，\"频率高\"不是优点"},{"id":272,"type":"single","text":"随机森林算法处理分类任务时，每个决策树的节点划分依据是（）。","options":[{"label":"A","text":"熵"},{"label":"B","text":"均方差"},{"label":"C","text":"信息增益"},{"label":"D","text":"基尼系数"}],"answer":"D","explanation":"随机森林使用基尼系数作为节点划分标准。","mnemonic":"随机森林分类用\"基尼系数\"划分节点，记\"森林砍树看基尼\""},{"id":273,"type":"single","text":"在文件系统的备份工作中，对于逻辑转储算法的描述，下列哪项是正确的？","options":[{"label":"A","text":"逻辑转储算法通过备份整个文件系统的空闲块列表来确保恢复时数据的完整性"},{"label":"B","text":"物理转储相比逻辑转储的主要优势在于能够选择性跳过特定目录进行增量备份"},{"label":"C","text":"逻辑转储需要备份通向修改文件路径上的所有目录，即使这些目录本身未被修改。"},{"label":"D","text":"逻辑转储仅备份自上次转储以来修改过的文件和目录，未修改的目录无需处理"}],"answer":"C","explanation":"逻辑转储算法在备份时，会转储通向修改过的文件或目录的路径上的所有目录（甚至包括未修改的目录），主要原因包括恢复时重建目录结构的需要以及支持单个文件的增量恢复","mnemonic":"逻辑转储必须备份通向修改文件的所有目录路径，即使目录未修改"},{"id":274,"type":"single","text":"下列哪项设备不属于计算机的输入设备（）。","options":[{"label":"A","text":"扫描仪"},{"label":"B","text":"打印机"},{"label":"C","text":"鼠标"},{"label":"D","text":"键盘"}],"answer":"B","explanation":"计算机常用的输入设备有键盘、鼠标、光笔、扫描仪、数字化仪、条形码阅读器、视频摄像机等","mnemonic":"打印机是输出设备不是输入设备，记\"打印只出不进\""},{"id":275,"type":"single","text":"在业务流程优化中，系统化改造法的应用基础是（）。","options":[{"label":"A","text":"全新设计目标"},{"label":"B","text":"现有流程"},{"label":"C","text":"外部环境的剧烈变化"},{"label":"D","text":"从零开始设计新流程"}],"answer":"B","explanation":"系统化改造法的应用基础是现有的流程，通过对现有流程进行整合、简化、自动化改造等方法对其进行重新设计，","mnemonic":"系统化改造法基于\"现有流程\"改造，不是从零开始"},{"id":276,"type":"single","text":"下列哪类行为不符合诚实公正的基本要求（）。","options":[{"label":"A","text":"提供准确、真实和完整的信息"},{"label":"B","text":"忠诚于雇主或客户的利益"},{"label":"C","text":"在交易中提供虚假信息"},{"label":"D","text":"及时、清晰地向相关方提供信息"}],"answer":"C","explanation":"根据诚实公正基本要求，从业人员在处理工作和与他人交往的过程中应该保持诚实和公正的态度","mnemonic":"提供虚假信息不符合诚实公正，记\"虚假=不诚实\""},{"id":277,"type":"single","text":"Windows Server 2008 的磁盘分区通常支持的文件系统格式有哪些（）。","options":[{"label":"A","text":"FAT"},{"label":"B","text":"FAT32"},{"label":"C","text":"NTFS"},{"label":"D","text":"以上全都包含"}],"answer":"D","explanation":"Windows Server 2008的磁盘分区一般支持三种格式的文件系统：FAT、FAT32和NTFS。","mnemonic":"Windows Server 2008支持FAT+FAT32+NTFS三种文件系统，全选D"},{"id":278,"type":"single","text":"对图像进行锐化处理的目的是（）。","options":[{"label":"A","text":"加强图像中景物的边缘和轮廓，使模糊图像变得更清晰。"},{"label":"B","text":"压缩图像的亮度范围，使得亮度范围变窄，从而使得图像中不同区域的对比度更小"},{"label":"C","text":"扩展图像的亮度范围，使得图像中原本处于亮度范围较窄的区域进行拉伸，从而使整个亮度范围都被充分利用，使得图像中不同区域的对比度更加明显"},{"label":"D","text":"压缩灰度级的动态范围，使得灰度级范围变窄，从而使得图像中不同区域的对比度更小"}],"answer":"A","explanation":"在图像的判读或识别中常需要突出边缘和轮廓信息，而图像锐化处理的目的是加强图像中景物的边缘和轮廓，使模糊图像变得更清晰","mnemonic":"图像锐化=加强边缘轮廓使模糊变清晰，记\"锐化=磨刀=变锋利清晰\""},{"id":279,"type":"single","text":"在数据预处理工作里，处理缺失值的办法有（）。","options":[{"label":"A","text":"以下选项均正确"},{"label":"B","text":"利用默认值填补缺失值"},{"label":"C","text":"手工填补缺失值"},{"label":"D","text":"忽略该条记录"}],"answer":"A","explanation":"在数据预处理中，缺失值的处理方法包括忽略该条记录、手工填补缺失值、利用默认值填补缺失值、利用均值填补缺失值、利用均值填补缺失值、利用最可能的值填补缺失值等。","mnemonic":"缺失值处理：忽略+手工填补+默认值填补等，全选A"},{"id":280,"type":"single","text":"依据《中华人民共和国民法典》，下列哪项内容属于隐私权的保护范畴（）。","options":[{"label":"A","text":"姓名"},{"label":"B","text":"肖像"},{"label":"C","text":"个人信息"},{"label":"D","text":"名誉"}],"answer":"C","explanation":"根据《中华人民共和国民法典》的相关规定，隐私权的保护范围主要包括自然人的私人生活安宁、私密空间、私密活动及私密信息等不愿为他人知晓的内容（第1032条）","mnemonic":"隐私权保护范畴含\"个人信息\"，姓名/肖像/名誉是其他人格权"},{"id":281,"type":"single","text":"在 K - 近邻算法里，K 值越大，对应的模型复杂度就（）。","options":[{"label":"A","text":"不确定"},{"label":"B","text":"随机"},{"label":"C","text":"增加"},{"label":"D","text":"降低"}],"answer":"D","explanation":"K值增大降低K近邻模型复杂度，决策边界更平滑。","mnemonic":"KNN中K值越大模型越简单，复杂度降低，记\"K大=粗略=简单\""},{"id":282,"type":"single","text":"什么是趋势分析法（）。","options":[{"label":"A","text":"通过回归分析确定未来数据"},{"label":"B","text":"利用多个指标进行交叉分析"},{"label":"C","text":"对增加率进行线性回归分析"},{"label":"D","text":"分析过去数据预测未来趋势"}],"answer":"D","explanation":"趋势分析法是基于数据惯性，用历史判断未来的一种分析方法。因此，选项D为正确答案。","mnemonic":"趋势分析法=分析过去数据预测未来趋势，记\"看历史推未来\""},{"id":283,"type":"single","text":"下列哪项不属于交互设备的类别？","options":[{"label":"A","text":"触摸屏"},{"label":"B","text":"鼠标"},{"label":"C","text":"激光打印机"},{"label":"D","text":"摄像头"}],"answer":"C","explanation":"常见的交互设备类型包括鼠标、键盘、触摸屏、摄像头等，激光打印机不是交互设备","mnemonic":"激光打印机不是交互设备，记\"打印机单向输出，无交互\""},{"id":284,"type":"single","text":"在对算法进行参数优化测试时，（）工具有助于找出最优的超参数组合。","options":[{"label":"A","text":"GridSearch"},{"label":"B","text":"SGD"},{"label":"C","text":"GradientDescent"},{"label":"D","text":"K-FoldCrossValidation"}],"answer":"A","explanation":"GridSearch可以尝试不同的超参数组合，并计算每个组合的表现。最终选择最佳的一组超参数。","mnemonic":"GridSearch网格搜索=遍历超参数组合找最优，记\"Grid=网格=穷举搜索\""},{"id":285,"type":"single","text":"在算法复杂度分析中，用来表示算法在最坏情况下时间复杂度的指标是（）。","options":[{"label":"A","text":"最优时间复杂度"},{"label":"B","text":"平均时间复杂度"},{"label":"C","text":"最坏时间复杂度"},{"label":"D","text":"空间复杂度"}],"answer":"C","explanation":"最坏时间复杂度表示的是算法在最坏情况下所需的时间，因为算法的性能主要受最坏情况的影响，所以最坏时间复杂度更能够反映算法的实际性能。选项A的最优时间复杂度表示的是算法在最优情况下的时间复杂度，选项B的平均时间复杂度表示算法在所有情况下的时间复杂度的平均值，选项D的空间复杂度表示算法所需的空间资源。","mnemonic":"最坏时间复杂度=算法最差情况的时间消耗，题目问最坏就选最坏"},{"id":286,"type":"single","text":"要给 Word 文档中的文本添加下划线格式，应选择哪项操作（）。","options":[{"label":"A","text":"文字后按下Ctrl+Shift+K"},{"label":"B","text":"文字后按下Ctrl+Shift+T"},{"label":"C","text":"文字后按下Ctrl+Shift+A"},{"label":"D","text":"文字后按下Ctrl+U"}],"answer":"D","explanation":"对文本应用下划线格式可以使用快捷键Ctrl+U","mnemonic":"Word下划线快捷键Ctrl+U，记\"U=Underline=下划线\""},{"id":287,"type":"single","text":"在 GOMS 模型中，操作符（Operators）指的是哪项内容？","options":[{"label":"A","text":"用户的行为习惯"},{"label":"B","text":"选择不同方法的规则"},{"label":"C","text":"用户在执行任务时的基本动作"},{"label":"D","text":"用户的最终目标"}],"answer":"C","explanation":"操作符是用户为达到目标而执行的基本动作，不能再被分解","mnemonic":"GOMS的Operators=执行任务的基本动作，记\"操作符=基本动作=不可分解\""},{"id":288,"type":"single","text":"哪一项是模拟人耳听力特点所设计的一组滤波器（）。","options":[{"label":"A","text":"分帧加窗"},{"label":"B","text":"采样频率"},{"label":"C","text":"梅尔滤波器组"},{"label":"D","text":"短时傅里叶变换"}],"answer":"C","explanation":"梅尔滤波器组模仿人耳对频率的非线性感知，用于特征提取，尤其适用于语音信号处理。","mnemonic":"梅尔滤波器组模拟人耳听觉特性，记\"梅尔=Mel=人耳\""},{"id":289,"type":"single","text":"在二分类模型中，召回率（Recall）能够起到什么作用（）。","options":[{"label":"A","text":"评估模型整体表现"},{"label":"B","text":"度量模型对正类的识别能力"},{"label":"C","text":"衡量模型正确预测的比例"},{"label":"D","text":"同时评估模型的精确率（Precision）和召回率（Recall）"}],"answer":"B","explanation":"召回率（Recall）是指真正例（True Positives）占所有实际正例（True Positives + False Negatives）的比例(TP / (TP + FN))","mnemonic":"召回率Recall=度量模型对正类的识别能力，记\"召回=找回所有正例\""},{"id":290,"type":"single","text":"在人机交互领域，“以用户为中心的设计宗旨” 最核心的内容是（）。","options":[{"label":"A","text":"界面美观"},{"label":"B","text":"用户体验"},{"label":"C","text":"功能实用"},{"label":"D","text":"技术先进"}],"answer":"B","explanation":"“以用户为中心的设计”核心关注的是提升用户的整体使用体验，确保用户能够方便、高效地使用产品，且获得良好的感受和满意度。","mnemonic":"以用户为中心的设计核心=用户体验，记\"UCD=User Centered=体验至上\""},{"id":291,"type":"single","text":"PEST 模型用于（）方面的分析工作。","options":[{"label":"A","text":"政治、经济、社会、技术"},{"label":"B","text":"价格、环境、社会、人口"},{"label":"C","text":"法律、经济、社会、技术"},{"label":"D","text":"人口、环境、社会、技术"}],"answer":"A","explanation":"PEST模型分析政治、经济、社会和技术因素，帮助企业预测趋势和适应环境。","mnemonic":"PEST=Political政治+Economic经济+Social社会+Technological技术"},{"id":292,"type":"single","text":"下列哪项是可以读取 csv 文件的方法（）。","options":[{"label":"A","text":"read_json()"},{"label":"B","text":"read_excel()"},{"label":"C","text":"read_csv()"},{"label":"D","text":"sql_file.read()"}],"answer":"C","explanation":"pandas中的read_csv()方法可以读取本地的文本文件，该方法读取的文件格式是csv","mnemonic":"读csv文件用read_csv()，方法名即文件格式，一一对应"},{"id":293,"type":"single","text":"下列哪种算法属于基于原型的聚类算法（）。","options":[{"label":"A","text":"Apriori算法"},{"label":"B","text":"DBSCAN算法"},{"label":"C","text":"层次聚类算法"},{"label":"D","text":"K-means算法"}],"answer":"D","explanation":"K-means算法是一种基于原型的聚类算法","mnemonic":"K-means是基于原型的聚类，记\"K均值=以质心为原型\""},{"id":294,"type":"single","text":"进行可用性评估时，启发式评估的主要用意是（）。","options":[{"label":"A","text":"通过访谈用户，了解用户对产品的主观体验"},{"label":"B","text":"通过专家评估，检查产品是否符合可用性设计原则"},{"label":"C","text":"通过设计问卷，收集用户的反馈意见"},{"label":"D","text":"通过实际用户参与，观察产品的使用效果"}],"answer":"B","explanation":"启发式评估是一种由专家进行的可用性评估方法，专家依据一定的可用性原则（如尼尔森的十条可用性启发式原则）来检查产品的设计","mnemonic":"启发式评估=专家依据可用性原则检查产品，记\"启发式=专家评审\""},{"id":295,"type":"single","text":"在电商领域，漏斗分析模型主要用于分析以下哪个流程（）。","options":[{"label":"A","text":"商品退货流程"},{"label":"B","text":"用户评论流程"},{"label":"C","text":"商品购买流程"},{"label":"D","text":"用户注册流程"}],"answer":"C","explanation":"电商漏斗模型是电商领域最常见的漏斗模型，主要用于分析用户从进入电商平台到完成支付的完整购物流程，通过监控每个层级上的用户转化，寻找可优化点，以提升整体购买转化率","mnemonic":"电商漏斗分析=商品购买流程（浏览→加购→下单→支付）"},{"id":296,"type":"single","text":"属于依据统计特征开展中文分词工作的是（）。","options":[{"label":"A","text":"递归神经网络"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"D","explanation":"隐马尔可夫模型（HMM）是一种基于统计特征的中文分词模型","mnemonic":"隐马尔可夫模型HMM基于统计特征分词，记\"HMM=隐=统计概率\""},{"id":297,"type":"single","text":"在人机交互领域，G-U-L 模型里的 “G” 对应的是 GOMS 模型中的（ ）。","options":[{"label":"A","text":"用户与界面交互的基本操作"},{"label":"B","text":"完成任务所需的具体步骤"},{"label":"C","text":"用户的最终任务目标"},{"label":"D","text":"在多种方法中选择最优方案的规则"}],"answer":"C","explanation":"G-U-L模型中的“G”对应GOMS模型中的目标（Goal）。","mnemonic":"G-U-L的G=Goal=GOMS中的目标，记\"G=Goal目标\""},{"id":298,"type":"single","text":"在 Word 软件里，可在哪个地方对段落的缩进和间距进行设置（）。","options":[{"label":"A","text":"“样式”面板中"},{"label":"B","text":"“页面布局”选项卡中"},{"label":"C","text":"“字体”对话框中"},{"label":"D","text":"“段落”对话框中"}],"answer":"D","explanation":"Word中段落缩进和间距在“段落”对话框的“缩进和间距”选项卡设置。","mnemonic":"Word段落缩进和间距在\"段落\"对话框设置，记\"段落设置找段落框\""},{"id":299,"type":"single","text":"在下列业务分析方法中，可用于了解外部环境中的政治、经济、社会和技术因素的是（）。","options":[{"label":"A","text":"竞争对手分析"},{"label":"B","text":"用户调研"},{"label":"C","text":"PEST分析"},{"label":"D","text":"SWOT分析"}],"answer":"C","explanation":"PEST分析是一种常用的业务分析方法，通过评估外部环境中的政治、经济、社会和技术因素，了解宏观经济环境中的各种因素，为企业制定发展战略提供依据","mnemonic":"分析政治经济社会技术=PEST分析，记\"PEST=宏观外部环境\""},{"id":300,"type":"single","text":"根据《中华人民共和国专利法》，实用新型专利权的保护期限为多少年？","options":[{"label":"A","text":"10年"},{"label":"B","text":"15年"},{"label":"C","text":"20年"},{"label":"D","text":"5年"}],"answer":"A","explanation":"根据《中华人民共和国专利法》第四十二条规定，发明专利权的期限为二十年，实用新型专利权的期限为十年，外观设计专利权的期限为十五年，均自申请日起计算。","mnemonic":"实用新型专利保护期10年，记\"实用10年，发明20年，外观15年\""},{"id":301,"type":"single","text":"在 PowerPoint 中插入 SmartArt 图形后，不能用于自定义其外观的是（）。","options":[{"label":"A","text":"更改形状"},{"label":"B","text":"文本填充"},{"label":"C","text":"更改颜色样式"},{"label":"D","text":"直接应用图片作为SmartArt整体背景"}],"answer":"D","explanation":"SmartArt图形不支持直接应用图片作为整体背景，但可调整形状、文本和颜色。","mnemonic":"SmartArt不能直接用图片当整体背景，D选项\"图片背景\"是陷阱"},{"id":302,"type":"single","text":"实施业务流程重组（BPR）时，通常会采用哪种方式（）。","options":[{"label":"A","text":"完全依赖外部咨询公司的建议"},{"label":"B","text":"结合研究现有流程和从零开始构建理想流程的方法"},{"label":"C","text":"仅从零开始构建理想的业务流程"},{"label":"D","text":"仅通过研究和描述现有业务流程进行重新设计"}],"answer":"B","explanation":"业务流程重组（BPR）通常结合研究和描述企业现有业务流程进行重新设计，以及从零开始构建理想的业务流程的方法（C）","mnemonic":"BPR结合\"研究现有+从零构建\"双管齐下，选B不选极端项"},{"id":303,"type":"single","text":"在自然语言对话里，下列哪项不在短语识别的范畴之内？","options":[{"label":"A","text":"句法分析"},{"label":"B","text":"词性识别"},{"label":"C","text":"语义分析"},{"label":"D","text":"语音信号的分析"}],"answer":"D","explanation":"自然语言对话包括语音信号的分析、语义分析、词性识别、句法分析等内容","mnemonic":"短语识别管\"词性句法语义\"，语音信号分析不归它管，选D排除"},{"id":304,"type":"single","text":"下列哪项不属于象限分析法常被应用的领域（）。","options":[{"label":"A","text":"客户管理"},{"label":"B","text":"产品分析"},{"label":"C","text":"市场分析"},{"label":"D","text":"艺术创作"}],"answer":"D","explanation":"象限分析法适用于市场、产品分析，不用于艺术创作。","mnemonic":"象限分析用于市场产品客户管理，\"艺术创作\"太文艺不沾边"},{"id":305,"type":"single","text":"智慧城市的作用不包含哪一项（）。","options":[{"label":"A","text":"加强城市治理能力"},{"label":"B","text":"改善城市生活品质"},{"label":"C","text":"提升城市运行效率"},{"label":"D","text":"提高人均收入水平"}],"answer":"D","explanation":"智慧城市提升运行效率与生活品质，不直接提高收入。","mnemonic":"智慧城市管治理效率品质，不直接管\"人均收入\"钱袋子"},{"id":306,"type":"single","text":"《计算机软件保护条例》所指的计算机软件，具体是（）。","options":[{"label":"A","text":"操作系统"},{"label":"B","text":"计算机硬件系统"},{"label":"C","text":"计算机程序及其有关文档"},{"label":"D","text":"计算机软件系统"}],"answer":"C","explanation":"计算机软件保护条例涵盖计算机程序及其相关文档。","mnemonic":"软件保护条例保\"程序+文档\"，C选项两件套记牢"},{"id":307,"type":"single","text":"（）的情况属于欠拟合。","options":[{"label":"A","text":"模型过于简单，不能很好地拟合数据"},{"label":"B","text":"模型过于复杂，过拟合"},{"label":"C","text":"数据量过大，无法拟合模型"},{"label":"D","text":"数据异常，无法拟合模型"}],"answer":"A","explanation":"欠拟合是指模型过于简单，无法有效地拟合数据，从而导致训练和测试误差都较高。选项B描述的是过拟合，指的是模型过于复杂，导致模型在训练数据上表现良好，但在测试数据上表现较差。选项C提到的是数据量过大，这与欠拟合无关，更多的是与计算资源和训练时间相关，而非模型的复杂度。选项D提到的是数据异常问题，虽然数据质量对模型性能有影响，但数据异常更多地会导致模型无法正常训练，而不一定与欠拟合直接相关。","mnemonic":"欠拟合=模型太简单，\"欠\"就是不够复杂，选A"},{"id":308,"type":"single","text":"《中华人民共和国民法典》中所实行的婚姻制度，不包含下列哪项（）。","options":[{"label":"A","text":"婚姻自由"},{"label":"B","text":"一夫一妻"},{"label":"C","text":"男女平等"},{"label":"D","text":"门当户对"}],"answer":"D","explanation":"《中华人民共和国民法典》第一千零四十一条规定，婚姻家庭受国家保护。实行婚姻自由、一夫一妻、男女平等的婚姻制度。保护妇女、未成年人、老年人、残疾人的合法权益。","mnemonic":"婚姻制度三原则：自由一夫一妻男女平等，\"门当户对\"是封建糟粕"},{"id":309,"type":"single","text":"可以判断语音信号是清音还是浊音的是（）。","options":[{"label":"A","text":"短时傅里叶变换"},{"label":"B","text":"离散余弦变换"},{"label":"C","text":"短时自相关计算"},{"label":"D","text":"短时平均过零率"}],"answer":"D","explanation":"短时平均过零率可以用于语音信号清、浊音的判断。语音产生模型表明，由于声门波引起了谱的高频跌落，所以浊音语音能量约集中在3kHz以下。但对于清音语音，多数能量却是出现在较高的频率上。所以，如果过零率高，语音信号就是清音，如果过零率低，语音信号就是浊音。但有的音，位于浊音和清音的重叠区域，这时，只根据短时平均过零率就不可能来明确地判别清、浊音。","mnemonic":"过零率判清浊音：过零高是清音，过零低是浊音，选D"},{"id":310,"type":"single","text":"关于 UAN 模型的描述，下面哪一项是不正确的（）。","options":[{"label":"A","text":"UAN模型在表达多任务并发和复杂时序关系时可能会显得繁琐"},{"label":"B","text":"UAN模型能够通过预定义的符号表达用户的动作、界面元素的状态变化及任务的条件控制"},{"label":"C","text":"UAN模型仅能用于描述用户的行为，无法表达界面的状态变化"},{"label":"D","text":"UAN模型是一种符号语言，主要用于描述用户的行为序列及界面交互"}],"answer":"C","explanation":"UAN模型可描述用户行为及界面状态变化。","mnemonic":"UAN模型能描述用户行为也能表达界面状态变化，C说\"仅能\"是错的"},{"id":311,"type":"single","text":"依据《中华人民共和国网络安全法》，网络运营者需依照网络安全等级保护制度的要求落实相关措施，其中不包含的是（）。","options":[{"label":"A","text":"采取数据分类、重要数据备份和加密等措施"},{"label":"B","text":"采取监测、记录网络运行状态、网络安全事件的技术措施，并按照规定留存相关的网络日志不少于六个月"},{"label":"C","text":"采取防范网络诈骗的宣传措施"},{"label":"D","text":"制定内部安全管理制度和操作规程"}],"answer":"C","explanation":"《中华人民共和国网络安全法》第二十一条规定，国家实行网络安全等级保护制度","mnemonic":"网络安全等级保护不含\"防诈骗宣传\"，C选项与等保无关"},{"id":312,"type":"single","text":"趋势分析法有何作用（）。","options":[{"label":"A","text":"分析数据相关数值的比率"},{"label":"B","text":"确定数据间的相关性"},{"label":"C","text":"分析经济变化影响因素"},{"label":"D","text":"预测未来趋势"}],"answer":"D","explanation":"趋势分析法是一种利用过去数据分析未来趋势的方法，因此它的作用就是预测未来趋势","mnemonic":"趋势分析法=预测未来趋势，名字就是答案，选D"},{"id":313,"type":"single","text":"对比法能够揭示出什么（）。","options":[{"label":"A","text":"数据变化的规律"},{"label":"B","text":"数据的潜在变化"},{"label":"C","text":"数据安全"},{"label":"D","text":"数据的准确性"}],"answer":"A","explanation":"对比法通过比较揭示数据变化规律，常与其他分析方法结合使用。","mnemonic":"对比法比出\"变化规律\"，A选项对比见规律"},{"id":314,"type":"single","text":"关于职业道德具体要求的下列说法，正确的是（）。","options":[{"label":"A","text":"对职业帮助他人、回报社会责任要求高，与客户利益无关"},{"label":"B","text":"对职业自我完善、自我实现要求高，与客户利益无关"},{"label":"C","text":"对职业满足客户需求、保护客户利益要求高"},{"label":"D","text":"对职业业务技能要求高，不需具备沟通协调能力"}],"answer":"C","explanation":"职业道德的具体标准包括职业业务技能、满足客户需求、保护客户利益、自我完善与自我实现等方面，但是其中对职业满足客户需求、保护客户利益的要求最为突出","mnemonic":"职业道德核心：满足客户需求、保护客户利益，客户至上选C"},{"id":315,"type":"single","text":"在用 K 折交叉验证完成模型调优后，若存在独立的测试集，应始终用什么来对模型进行最终评估（）。","options":[{"label":"A","text":"训练集"},{"label":"B","text":"验证集"},{"label":"C","text":"测试集"},{"label":"D","text":"数据集"}],"answer":"C","explanation":"交叉验证后，最终模型评估应使用独立测试集，以确保泛化能力。","mnemonic":"K折调优后用独立测试集做最终评估，\"测试\"就是最后的考试"},{"id":316,"type":"single","text":"下列哪项设备既不属于计算机的输入设备，也不属于输出设备（）。","options":[{"label":"A","text":"打印机"},{"label":"B","text":"麦克风"},{"label":"C","text":"手写笔"},{"label":"D","text":"鼠标垫"}],"answer":"D","explanation":"鼠标垫仅作为鼠标的辅助工具，不具备数据输入或输出功能。","mnemonic":"鼠标垫既不输入也不输出，只是个垫子，选D"},{"id":317,"type":"single","text":"下列能从 WAV 文件中读取语音数据的函数是（）。","options":[{"label":"A","text":"librosa.load_wav()"},{"label":"B","text":"librosa.load()"},{"label":"C","text":"librosa.load_audio()"},{"label":"D","text":"librosa.read_wav()"}],"answer":"B","explanation":"librosa.load()是librosa库中的函数，用于从WAV文件（或其他音频文件格式）中读取音频数据，并返回音频数据和采样率。","mnemonic":"librosa读音频用load()，简洁明了选B"},{"id":318,"type":"single","text":"当使用 OpenCV 库的 imread () 函数读取图像时，表示读取模式的参数是（）。","options":[{"label":"A","text":"Noneoftheabove"},{"label":"B","text":"dst"},{"label":"C","text":"flags"},{"label":"D","text":"filename"}],"answer":"C","explanation":"cv.imread()函数的第二个参数flags表示读取模式，例如读取彩色图像、灰度图像或alpha通道图像等。","mnemonic":"imread第二参数flags控制读取模式（彩色/灰度），选C"},{"id":319,"type":"single","text":"从一系列业务行为中提炼出来的信息集合被称为（）。","options":[{"label":"A","text":"业务标量"},{"label":"B","text":"业务分析方法论"},{"label":"C","text":"业务指标"},{"label":"D","text":"业务模型"}],"answer":"D","explanation":"业务模型是从一系列业务行为中抽象出来的信息集合，学会应用业务模型有助于我们从整体上把握业务问题","mnemonic":"业务行为提炼出的信息集合=业务模型，\"模型\"是抽象集合"},{"id":320,"type":"single","text":"在业务流程重组（BPR）中，下列哪一项不属于重组需遵循的原则（）。","options":[{"label":"A","text":"流程重组应减少客户的参与"},{"label":"B","text":"流程重组应体现服务重心前移原则"},{"label":"C","text":"业务流程体系要体现整体服务的思路"},{"label":"D","text":"流程重组始于对客户需求的深度理解与全面把握"}],"answer":"A","explanation":"流程重组需客户深度参与，减少参与违背原则。","mnemonic":"BPR应增加客户参与而非减少，A说\"减少参与\"违背原则"},{"id":321,"type":"single","text":"下列哪项设备既能充当输入设备，又能当作输出设备（）。","options":[{"label":"A","text":"鼠标"},{"label":"B","text":"扫描仪"},{"label":"C","text":"磁盘驱动器"},{"label":"D","text":"绘图仪"}],"answer":"C","explanation":"磁盘驱动器既能读磁盘数据到内存，又能写内存数据到磁盘，兼具输入输出功能。","mnemonic":"磁盘驱动器能读能写，既输入又输出，选C"},{"id":322,"type":"single","text":"运用 PEST 模型进行分析时，应关注（）方面。","options":[{"label":"A","text":"员工培训、绩效考核和办公环境"},{"label":"B","text":"物流配送、供应链和售后服务"},{"label":"C","text":"国家政策、经济形势和社会风气"},{"label":"D","text":"潜在客户、市场规模和竞争对手"}],"answer":"C","explanation":"PEST模型主要是对企业外部环境进行分析，应该重点关注政治、经济、社会和技术这四个方面，A选项的国家政策、经济形势和社会风气符合题干要求。","mnemonic":"PEST=政治经济社会技术，对应\"国家政策经济形势社会风气\"选C"},{"id":323,"type":"single","text":"在结构模型里，（）属于一种基于条件与动作的规则，它的功能是判断用户输入是否符合特定条件，并由此引发对应的动作。","options":[{"label":"A","text":"产生式规则"},{"label":"B","text":"事件-对象模型"},{"label":"C","text":"扩展状态转换网络"},{"label":"D","text":"状态转换网络"}],"answer":"A","explanation":"产生式规则是一种形式化语言，通过条件和动作的映射来描述系统行为","mnemonic":"产生式规则=\"条件→动作\"，IF-THEN规则选A"},{"id":324,"type":"single","text":"运用参数优化方法时，下列（）行为是应当避免的。","options":[{"label":"A","text":"限制搜索范围"},{"label":"B","text":"尝试使用默认参数设定"},{"label":"C","text":"用尽所有可用的参数组合"},{"label":"D","text":"将测试数据用于参数选择"}],"answer":"D","explanation":"D 选项是最需要避免的行为。测试数据应该仅用于最终模型评估，而不是在训练和优化过程中使用。如果在优化阶段使用测试数据，可能导致模型对测试数据过拟合，从而失去模型的泛化能力。","mnemonic":"参数优化最忌用测试数据选参数，会导致过拟合，选D"},{"id":325,"type":"single","text":"能够把文本数据转换为稀疏向量表示的是（）。","options":[{"label":"A","text":"One-hot模型"},{"label":"B","text":"Transformer模型"},{"label":"C","text":"LSTM模型"},{"label":"D","text":"Word2Vec模型"}],"answer":"A","explanation":"One-hot模型将文本表示为稀疏向量，每个词对应一个独热编码。","mnemonic":"One-hot编码=稀疏向量，一个位置是1其余全0，选A"},{"id":326,"type":"single","text":"GOMS 模型的局限性体现在哪些方面？","options":[{"label":"A","text":"缺乏科学依据"},{"label":"B","text":"无法预测人类行为"},{"label":"C","text":"只适用于特定情境"},{"label":"D","text":"过于复杂且难以使用"}],"answer":"C","explanation":"GOMS模型的主要局限性在于其适用范围有限，只适用于特定情境下的用户行为分析","mnemonic":"GOMS模型局限性：只适用于特定情境，适用范围有限选C"},{"id":327,"type":"single","text":"在中级培训的知识点中，数据标注方面有哪些是需要掌握的（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"数据定义知识"},{"label":"C","text":"数据归纳方法"},{"label":"D","text":"数据聚类工具知识"}],"answer":"A","explanation":"在中级培训知识点中，需要掌握数据标注中的数据聚类工具知识、数据归纳方法和数据定义知识","mnemonic":"中级培训数据标注：定义+归纳+聚类工具三项全要，选A全对"},{"id":328,"type":"single","text":"下列哪项属于勤勉好学的要求之一（）。","options":[{"label":"A","text":"常常迟到早退"},{"label":"B","text":"只关注自己的工作"},{"label":"C","text":"积极参与团队合作"},{"label":"D","text":"没有创新思维能力"}],"answer":"C","explanation":"勤勉好学倡导主动参与团队协作，积极承担任务并努力达成目标。","mnemonic":"勤勉好学要积极参与团队合作，选C正能量选项"},{"id":329,"type":"single","text":"属于基于信号分解的方法的是（）。","options":[{"label":"A","text":"高斯滤波"},{"label":"B","text":"小波变换"},{"label":"C","text":"字典学习模型"},{"label":"D","text":"中值滤波"}],"answer":"B","explanation":"小波变换是一种基于信号分解的方法，它将信号分解成不同频率的子带，并且能够在保留原始信息的同时去除噪声","mnemonic":"小波变换=信号分解法，\"波\"就是分解信号的波，选B"},{"id":330,"type":"single","text":"在行为模型的交互流程中，用户针对系统输出所做出的反馈包含哪些内容？","options":[{"label":"A","text":"明确的指令"},{"label":"B","text":"设计师的交互理念"},{"label":"C","text":"行动结果的评价"},{"label":"D","text":"交互流程图和技术参数"}],"answer":"C","explanation":"用户对行动结果的评价是行为模型中的重要反馈，用于系统改进。","mnemonic":"行为模型中用户反馈=对行动结果的评价，选C评价"},{"id":331,"type":"single","text":"内存与硬盘之间的不同之处在于（）。","options":[{"label":"A","text":"内存是永久存储，硬盘是暂时存储"},{"label":"B","text":"内存是用来处理数据的，硬盘是用来存储数据的"},{"label":"C","text":"内存是暂时存储，硬盘是永久存储"},{"label":"D","text":"内存是用来存储数据的，硬盘是用来处理数据的"}],"answer":"C","explanation":"内存是用来暂时存储计算机正在运行的程序和数据，而硬盘是用来永久存储数据的","mnemonic":"内存暂时硬盘永久，\"内存断电就忘，硬盘长久记忆\"选C"},{"id":332,"type":"single","text":"在 Python 里使用 thulac 中文分词工具时，哪个参数能在模型初始化时载入用户自己定义的词典（）。","options":[{"label":"A","text":"tf-idf"},{"label":"B","text":"user_dict"},{"label":"C","text":"cut_all"},{"label":"D","text":"HMM"}],"answer":"B","explanation":"thulac参数user_dict支持加载用户自定义词典。","mnemonic":"thulac加载自定义词典用user_dict参数，用户词典选B"},{"id":333,"type":"single","text":"特征选择具有哪些优点（）。","options":[{"label":"A","text":"可以减少维度，提高训练速度"},{"label":"B","text":"可以增加特征，提高模型精度"},{"label":"C","text":"可以快速识别异常特征"},{"label":"D","text":"可以避免欠拟合"}],"answer":"A","explanation":"选项A：正确。特征选择能够有效减少维度，提高训练速度。选项B：错误。特征选择不会增加特征，反而是减少冗余特征。选项C：错误。虽然特征选择可以去除无关特征，但并不专门用于识别异常特征。异常检测是另一个独立的任务。选项D：错误。特征选择主要帮助减少过拟合，而不是直接避免欠拟合。","mnemonic":"特征选择减维度提速度，\"选择\"就是精简，选A"},{"id":334,"type":"single","text":"4. 在Python中，哪一个类更适合应用于包含较多主题的语料集（）。","options":[{"label":"A","text":"TfidfVectorizer"},{"label":"B","text":"HashingVectorizer"},{"label":"C","text":"DictVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"D","explanation":"CountVectorizer适合于主题较多的语料集，CountVectorizer构成特征矩阵的每一行表示一个训练文本的词频统计结果，只考虑每个单词在文本中出现的频率","mnemonic":"CountVectorizer适合多主题语料集，计数词频选D"},{"id":335,"type":"single","text":"下列哪项不在中级知识体系之列？（）","options":[{"label":"A","text":"数据处理方法优化"},{"label":"B","text":"数据审核"},{"label":"C","text":"数据聚类工具知识"},{"label":"D","text":"文本分析"}],"answer":"D","explanation":"文本分析不属于中级知识体系的内容。","mnemonic":"文本分析不属于中级知识体系，D是高级内容"},{"id":336,"type":"single","text":"趋势分析法的核心是借助数据的（ ）来推测未来的发展走向。","options":[{"label":"A","text":"间断性"},{"label":"B","text":"延续性"},{"label":"C","text":"突变性"},{"label":"D","text":"随机性"}],"answer":"B","explanation":"趋势分析法基于历史数据延续性预测未来发展趋势。","mnemonic":"趋势分析靠数据\"延续性\"推测未来，历史延续选B"},{"id":337,"type":"single","text":"在业务数据的主要流转过程中，哪个环节会把数据转化为具有实际意义的看法和结论？","options":[{"label":"A","text":"数据的传输"},{"label":"B","text":"数据的分析"},{"label":"C","text":"数据的存储"},{"label":"D","text":"数据的收集"}],"answer":"B","explanation":"数据分析环节运用方法工具揭示数据模式，转化为有意义的见解。","mnemonic":"数据分析环节把数据变成有意义的见解，\"分析出结论\"选B"},{"id":338,"type":"single","text":"以下哪项属于职业道德的功能之一（）。","options":[{"label":"A","text":"维护职业行业的垄断地位"},{"label":"B","text":"促进个人利益和发展"},{"label":"C","text":"提高个人财富"},{"label":"D","text":"保护公众利益和社会公正"}],"answer":"D","explanation":"职业道德的功能之一是维护公共利益和社会公正。","mnemonic":"职业道德保护公众利益和社会公正，选D公益公正"},{"id":339,"type":"single","text":"业务流程重组（BPR）的核心目标体现在什么方面（）。","options":[{"label":"A","text":"提高技术集成水平"},{"label":"B","text":"优化内部管理流程"},{"label":"C","text":"提高员工满意度"},{"label":"D","text":"关注客户的需求和满意度"}],"answer":"D","explanation":"业务流程重组（BPR）的核心目标是关注客户的需求和满意度（A）。虽然提高员工满意度（B）、优化内部管理流程（C）和提高技术集成水平（D）也是BPR的重要方面，但它们并非核心目标。","mnemonic":"BPR核心目标=关注客户需求和满意度，客户第一选D"},{"id":340,"type":"single","text":"下列选项中，不属于常见漏斗分析模型的是（）。","options":[{"label":"A","text":"AARRR 模型"},{"label":"B","text":"RFM 模型"},{"label":"C","text":"电商漏斗模型"},{"label":"D","text":"AIDMA 模型"}],"answer":"B","explanation":"AARRR模型是常用用户增长漏斗模型，而RFM模型不属于漏斗分析模型。","mnemonic":"RFM是客户价值模型不是漏斗模型，AARRR和AIDMA才是漏斗"},{"id":341,"type":"single","text":"SSIS 的用途是（）。","options":[{"label":"A","text":"数据安全和加密"},{"label":"B","text":"数据存储和查询"},{"label":"C","text":"数据转换"},{"label":"D","text":"数据可视化"}],"answer":"C","explanation":"SQLServerIntegrationServices(SSIS)提供了数据相关的控制流、数据流、日志、变量、事件、连接管理等基础设施","mnemonic":"SSIS全称含Integration，核心是数据转换ETL，选C"},{"id":342,"type":"single","text":"AARRR 模型中，RRR 所代表的三个指标是（）。","options":[{"label":"A","text":"关注、留存、成交"},{"label":"B","text":"获客、关注、回访"},{"label":"C","text":"留存、收入、推荐"},{"label":"D","text":"反应、注册、收入"}],"answer":"C","explanation":"AARRR模型中五个指标分别是Acquisition（获客）、Activation（活跃）、Retention（留存）、Revenue（收入）、Referral（推荐）","mnemonic":"AARRR后三个R=Retention留存+Revenue收入+Referral推荐，选C"},{"id":343,"type":"single","text":"智慧交通是（ ）等新一代信息技术与交通运输领域深度融合而孕育出的新型业态。","options":[{"label":"A","text":"以上都是"},{"label":"B","text":"大数据"},{"label":"C","text":"物联网"},{"label":"D","text":"人工智能"}],"answer":"A","explanation":"智慧交通是人工智能、物联网、大数据等新一代信息技术与交通运输深度融合的新业态，是推动交通运输质量变革、效率变革、动力变革的重要途径","mnemonic":"智慧交通融合AI+物联网+大数据，\"以上都是\"选A"},{"id":344,"type":"single","text":"下面选项中，哪一项不在计算机的主要应用范畴内（）。","options":[{"label":"A","text":"科学计算"},{"label":"B","text":"金融交易"},{"label":"C","text":"办公自动化"},{"label":"D","text":"传统手工艺品制作"}],"answer":"D","explanation":"计算机的主要应用领域包括科学计算、工程设计、金融交易、办公自动化等，但不包括传统手工艺品制作。","mnemonic":"传统手工艺品制作不属于计算机应用范畴，选D手工≠电脑"},{"id":345,"type":"single","text":"在行为模型的交互流程中，哪个环节负责将用户输入转换为机器可识别的数据？","options":[{"label":"A","text":"发送请求"},{"label":"B","text":"处理请求"},{"label":"C","text":"返回响应"},{"label":"D","text":"转换请求"}],"answer":"D","explanation":"转换请求环节将用户输入转为机器可处理数据。","mnemonic":"\"转换请求\"环节将用户输入转为机器可识别数据，选D转换"},{"id":346,"type":"single","text":"下列哪一项最能说明 “状态转移网络” 在结构模型中的应用情况？（）","options":[{"label":"A","text":"它是一种图示化结构，用于描述人机之间的状态的转换，适用于描述系统的行为过程"},{"label":"B","text":"它用于定义产生式规则系统中条件与动作的匹配关系"},{"label":"C","text":"它是基于面向对象的模型，强调事件与对象的交互"},{"label":"D","text":"它描述了事件驱动系统中，状态间的变化和转移路径"}],"answer":"A","explanation":"状态转移网络（STN）是用图示化的方式描述系统中不同状态以及它们之间的转移规则的模型。它通过定义系统在各种状态下的行为和状态间的转换路径，帮助设计人员清晰地理解系统的状态变化。特别是在面对用户输入或系统内部事件时，STN描述了从一个状态到另一个状态的转换过程。","mnemonic":"状态转移网络STN=图示化描述状态转换，选A图示化结构"},{"id":347,"type":"single","text":"运用多维度拆解分析方法时，通常会从哪个维度或者业务流程的维度进行拆解（）。","options":[{"label":"A","text":"业务解读"},{"label":"B","text":"业务分析"},{"label":"C","text":"标量分析"},{"label":"D","text":"指标构成"}],"answer":"D","explanation":"多维度拆解通常从指标构成或业务流程维度进行。","mnemonic":"多维度拆解从\"指标构成\"维度入手，选D指标"},{"id":348,"type":"single","text":"过拟合指的是（）现象。","options":[{"label":"A","text":"模型只能适用于特定的数据集，无法适用于新数据"},{"label":"B","text":"模型在训练数据和测试数据上表现都很好"},{"label":"C","text":"模型在训练数据和测试数据上表现都很差"},{"label":"D","text":"模型在训练数据上表现良好，但在测试数据上表现较差"}],"answer":"D","explanation":"过拟合指的是模型在训练数据上训练过于细致，会导致模型对训练数据过于敏感，泛化能力差，从而在测试数据上表现较差的现象。","mnemonic":"过拟合=训练好测试差，\"过度学习训练数据\"选D"},{"id":349,"type":"single","text":"支持向量机算法中，适合采用线性核函数的情况是（）。","options":[{"label":"A","text":"数据集包含缺失值"},{"label":"B","text":"数据集包含大量异常值"},{"label":"C","text":"数据集是非线性可分的"},{"label":"D","text":"数据集是线性可分的"}],"answer":"D","explanation":"线性核函数在支持向量机中适用于处理线性可分的数据集","mnemonic":"线性核函数适合线性可分数据集，\"线性对线性\"选D"},{"id":350,"type":"single","text":"在 jieba 分词过程中，关键词提取是在哪个步骤完成之后开展的（）。","options":[{"label":"A","text":"获取分词结果"},{"label":"B","text":"分词操作"},{"label":"C","text":"载入词典"},{"label":"D","text":"导入jieba库"}],"answer":"A","explanation":"jieba关键词提取在分词完成后进行。","mnemonic":"jieba关键词提取在\"获取分词结果\"之后进行，先分词再提取选A"},{"id":351,"type":"single","text":"《中华人民共和国网络安全法》明确，网络产品及服务的提供者严禁设置（）。","options":[{"label":"A","text":"认证程序"},{"label":"B","text":"防护程序"},{"label":"C","text":"恶意程序"},{"label":"D","text":"安全程序"}],"answer":"C","explanation":"《中华人民共和国网络安全法》第二十二条规定，网络产品、服务应当符合相关国家标准的强制性要求。网络产品、服务的提供者不得设置恶意程序；发现其网络产品、服务存在安全缺陷、漏洞等风险时，应当立即采取补救措施，按照规定及时告知用户并向有关主管部门报告。","mnemonic":"网络安全法禁止设置恶意程序，\"恶意\"二字选C"},{"id":352,"type":"single","text":"下列哪一选项是初级知识体系中所涉及的知识点？（）","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"反向传播算法"},{"label":"C","text":"培训与指导"},{"label":"D","text":"实时检验"}],"answer":"A","explanation":"数据清洗属于初级知识体系的知识点。","mnemonic":"数据清洗属于初级知识体系，基础功选A"},{"id":353,"type":"single","text":"全新设计法是根据什么，彻底打破原有流程，从无到有地设计新流程（）。","options":[{"label":"A","text":"流程优化目标"},{"label":"B","text":"非参数"},{"label":"C","text":"系统耗散理论"},{"label":"D","text":"主观赋权"}],"answer":"A","explanation":"全新设计法依据流程优化目标彻底重构流程。","mnemonic":"全新设计法根据\"流程优化目标\"从零设计，选A目标导向"},{"id":354,"type":"single","text":"关于文件系统的特点，下列说法正确的是（）。","options":[{"label":"A","text":"EXT4不具备大文件支持能力"},{"label":"B","text":"HFS+支持动态调整文件块大小"},{"label":"C","text":"FAT32稳定性、兼容性和安全性都好"},{"label":"D","text":"NTFS支持对文件和文件夹进行加密"}],"answer":"D","explanation":"NTFS支持文件加密；FAT32兼容性好但安全性差；HFS+缺少现代功能；EXT4支持大文件。","mnemonic":"NTFS支持文件加密，N代表New安全，选D"},{"id":355,"type":"single","text":"下列哪项不属于业务分析方法论（）。","options":[{"label":"A","text":"因果分析方法"},{"label":"B","text":"同期群分析方法"},{"label":"C","text":"帕拉梅拉分析方法"},{"label":"D","text":"A/B测试分析方法"}],"answer":"C","explanation":"帕拉梅拉分析不是业务分析方法，其他选项是常用方法。","mnemonic":"帕拉梅拉是保时捷不是分析方法，选C排除假名词"},{"id":356,"type":"single","text":"作为一种基于统计学原理的算法，贝叶斯算法的核心思路是（）。","options":[{"label":"A","text":"基于神经网络模型，预测未来事件的概率"},{"label":"B","text":"基于经验和直觉，估计未来可能出现的事件的概率"},{"label":"C","text":"通过人工智能的学习和反馈机制，预测未来的人工智能发展趋势"},{"label":"D","text":"基于历史数据和假设，计算未来可能出现的事件的概率"}],"answer":"D","explanation":"贝叶斯算法基于历史数据计算未来事件概率。","mnemonic":"贝叶斯算法基于历史数据计算概率，选D历史+概率"},{"id":357,"type":"single","text":"在特征选择里，过滤式与包裹式之间的区别是什么（）。","options":[{"label":"A","text":"过滤式不依赖于具体的学习器，包裹式依赖于具体的学习器"},{"label":"B","text":"过滤式方法通常独立于学习器，包裹式方法则依赖于学习器的性能来选择特征子集"},{"label":"C","text":"过滤式优先选择与目标变量相关性最高的特征，包裹式选择能够产生最好性能的特征子集"},{"label":"D","text":"以上选项均错误"}],"answer":"C","explanation":"在特征选择中，过滤式和包裹式的主要区别在于过滤式优先选择与目标变量相关性最高的特征，而包裹式则选择能够产生最好性能的特征子集。","mnemonic":"过滤式选相关性最高特征，包裹式选最佳性能子集，选C"},{"id":358,"type":"single","text":"在模型训练过程中，若训练数据的数量过少，通常会使模型出现什么问题（）。","options":[{"label":"A","text":"模型收敛性差"},{"label":"B","text":"正常拟合"},{"label":"C","text":"过拟合"},{"label":"D","text":"欠拟合"}],"answer":"C","explanation":"当训练数据量过少时，模型容易过度依赖有限的数据，从而学习到噪声和特定的样本特征，无法有效泛化到新数据上，这就是过拟合","mnemonic":"训练数据太少导致过拟合，\"少量数据过度学习\"选C"},{"id":359,"type":"single","text":"关联规则的评估指标中，置信度描述的是（）。","options":[{"label":"A","text":"在A项集出现的情况下，B项集也出现的概率"},{"label":"B","text":"在B项集出现的情况下，A项集也出现的概率"},{"label":"C","text":"项集在规则中出现的频率"},{"label":"D","text":"规则被应用的次数"}],"answer":"A","explanation":"置信度表示规则A→B的可靠性，即给定A出现时B出现的概率。","mnemonic":"置信度=A出现时B也出现的概率，A→B的可靠性选A"},{"id":360,"type":"single","text":"在业务流程重组（BPR）中，流程重组的关键步骤包含哪一项（）。","options":[{"label":"A","text":"建立流程管理机构，明确其权责范围"},{"label":"B","text":"对企业的现有流程进行调研分析、诊断、再设计，然后重新构建新的流程"},{"label":"C","text":"制定各流程内部的运转规则与各流程之间的关系规则"},{"label":"D","text":"变革基本信念、转变经营机制、重建组织文化"}],"answer":"B","explanation":"流程重组包括分析、诊断、再设计和重建流程，以提升企业业务流程的效率和效果。","mnemonic":"BPR关键步骤：调研分析→诊断→再设计→重建，选B全流程"},{"id":361,"type":"single","text":"下列属于基于规则实现中文分词的是（）。","options":[{"label":"A","text":"卷积神经网络"},{"label":"B","text":"双向最大匹配法"},{"label":"C","text":"支持向量机"},{"label":"D","text":"递归神经网络"}],"answer":"B","explanation":"规则分词方法涵盖正向、逆向和双向最大匹配法。","mnemonic":"双向最大匹配法是基于规则的中文分词，\"匹配\"就是规则选B"},{"id":362,"type":"single","text":"场景分析法是一种将（）作为核心研究对象的分析方式。","options":[{"label":"A","text":"用户行为"},{"label":"B","text":"系统界面"},{"label":"C","text":"信息传输"},{"label":"D","text":"软件设计"}],"answer":"A","explanation":"场景分析法关注的是用户的行为、目标和使用环境，帮助理解任务的实际需求，从而更好地设计系统和界面，提升用户体验和系统的可用性。","mnemonic":"场景分析法核心研究\"用户行为\"，场景中人是主角选A"},{"id":363,"type":"single","text":"关于 jieba 分词的词性标注，下列描述正确的是（）。","options":[{"label":"A","text":"jieba分词不支持词性标注功能"},{"label":"B","text":"jieba分词只提供了基本的词性标注功能，不能支持多种不同的词性标注方案"},{"label":"C","text":"jieba分词默认提供了基本的词性标注功能"},{"label":"D","text":"jieba分词的词性标注需要人工标注"}],"answer":"C","explanation":"jieba默认提供基础词性标注功能，支持扩展方案。","mnemonic":"jieba默认提供基础词性标注功能，选C默认即有"},{"id":364,"type":"single","text":"手势控制所具有的特征是（）。","options":[{"label":"A","text":"操作速度慢，不能快速响应用户的意图"},{"label":"B","text":"操作自然，具有直观性和快捷性"},{"label":"C","text":"操作难度大，需要用户有一定的训练和技巧"},{"label":"D","text":"灵敏度低，容易引起误操作"}],"answer":"B","explanation":"选项A：灵敏度低并且容易引起误操作并不是手势控制的典型特点","mnemonic":"手势控制特征：自然直观快捷，选B操作自然"},{"id":365,"type":"single","text":"聚类分析属于一种（）。","options":[{"label":"A","text":"强化学习"},{"label":"B","text":"半监督学习"},{"label":"C","text":"有监督学习"},{"label":"D","text":"无监督学习"}],"answer":"D","explanation":"聚类分析是无监督学习方法，不依赖预定义类别。","mnemonic":"聚类分析=无监督学习，无标签自动分群选D"},{"id":366,"type":"single","text":"下列哪项不属于 Python 中可用于读取文本文件的内置方法（）。","options":[{"label":"A","text":"csv.reader()"},{"label":"B","text":"readline()"},{"label":"C","text":"read()"},{"label":"D","text":"open()"}],"answer":"A","explanation":"Python内置的文本文件读取方法包括open()函数及文件对象的read()和readline()","mnemonic":"csv.reader()属于csv模块不是Python内置方法，选A"},{"id":367,"type":"single","text":"K - 近邻算法中 K 值的选取，是通过（）给分类结果带来影响的。","options":[{"label":"A","text":"K值的选择需要根据具体情况来确定"},{"label":"B","text":"K值的选择不会对分类结果产生影响"},{"label":"C","text":"K值越大，分类结果越准确"},{"label":"D","text":"K值越小，分类结果越准确"}],"answer":"A","explanation":"K值的选择需要根据具体情况来确定，一般来说，当K值较小时，分类结果容易受到噪声的影响；当K值较大时，分类结果又容易受到邻居数目的影响","mnemonic":"KNN的K值需根据具体情况确定，没有绝对大小之分选A"},{"id":368,"type":"single","text":"在贝叶斯算法中，朴素贝叶斯分类器的核心假定是什么（）。","options":[{"label":"A","text":"类别与特征之间的条件独立性"},{"label":"B","text":"特征之间具有相同的重要性"},{"label":"C","text":"特征之间存在线性关系"},{"label":"D","text":"给定类别的条件下，特征之间相互独立"}],"answer":"D","explanation":"朴素贝叶斯假设特征在给定类别下条件独立。","mnemonic":"朴素贝叶斯核心假设：给定类别下特征条件独立，选D条件独立"},{"id":369,"type":"single","text":"优化业务流程、提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，也是企业实现快速、稳定、可持续发展的什么（）。","options":[{"label":"A","text":"客户关系管理"},{"label":"B","text":"重要条件"},{"label":"C","text":"品牌管理"},{"label":"D","text":"新产品发布"}],"answer":"B","explanation":"优化业务流程，提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，是企业实现快速、稳定、可持续发展的重要条件","mnemonic":"优化业务流程是企业可持续发展的\"重要条件\"，选B"},{"id":370,"type":"single","text":"贝叶斯算法是依据什么来进行推断和学习的（）。","options":[{"label":"A","text":"贝叶斯定理"},{"label":"B","text":"梯度下降"},{"label":"C","text":"极大似然估计"},{"label":"D","text":"最小化平方误差"}],"answer":"A","explanation":"贝叶斯算法基于贝叶斯定理进行推断和学习","mnemonic":"贝叶斯算法依据贝叶斯定理，同名同源选A"},{"id":371,"type":"single","text":"趋势分析法重点关注数据的（ ）。","options":[{"label":"A","text":"随机性"},{"label":"B","text":"单一时点波动"},{"label":"C","text":"动态变化和趋势方向"},{"label":"D","text":"静态数值"}],"answer":"C","explanation":"趋势分析法关注多期连续数据的动态变化。","mnemonic":"趋势分析关注\"动态变化和趋势方向\"，动态非静态选C"},{"id":372,"type":"single","text":"《中华人民共和国著作权法》指出，职务作品完成后的（）时间内，若未获得单位同意，作者不得允许第三方以与单位相同的方式使用该作品。","options":[{"label":"A","text":"两年"},{"label":"B","text":"三年"},{"label":"C","text":"五年"},{"label":"D","text":"一年"}],"answer":"A","explanation":"根据《中华人民共和国著作权法》第十八条规定，自然人为完成法人或者非法人组织工作任务所创作的作品是职务作品，除本条第二款的规定以外，著作权由作者享有，但法人或者非法人组织有权在其业务范围内优先使用。作品完成两年内，未经单位同意，作者不得许可第三人以与单位使用的相同方式使用该作品。","mnemonic":"职务作品完成后\"两年\"内需单位同意，\"两\"年记牢选A"},{"id":373,"type":"single","text":"在计算机领域，图灵测试的用途是检测计算机的（）。","options":[{"label":"A","text":"硬件性能"},{"label":"B","text":"软件功能"},{"label":"C","text":"算力计算能力"},{"label":"D","text":"是否具有智能能力"}],"answer":"D","explanation":"图灵测试用于判断机器是否具有智能的测试方法。简单来说，它是一种评估机器能否表现出与人类同等智能行为的测试。在测试中，有一个询问者（人类），一个被测试者 A（机器）和一个被测试者 B（人类）。询问者通过某种通信方式（如文本聊天）向 A 和 B 提出各种问题，这些问题可以是关于常识、逻辑、情感、文化等诸多方面。如果在一系列的问答之后，询问者无法区分 A 和 B 哪个是机器，哪个是人类，那么就可以认为机器通过了图灵测试，即这台机器具有了人工智能。","mnemonic":"图灵测试检测计算机是否具有智能，图灵=智能测试选D"},{"id":374,"type":"single","text":"在 Word 中进行邮件合并时，可通过什么方式发送合并后的邮件（）。","options":[{"label":"A","text":"“邮件”选项"},{"label":"B","text":"“完成并合并”选项"},{"label":"C","text":"“编辑收件人列表”选项"},{"label":"D","text":"“文件”选项"}],"answer":"B","explanation":"使用“完成并合并”选项可以发送合并后的邮件，支持编辑单个文档、打印文档和发送电子邮件","mnemonic":"Word邮件合并用\"完成并合并\"发送邮件，最后一步选B"},{"id":375,"type":"single","text":"下列能够综合多种特征进行中文分词的是（）。","options":[{"label":"A","text":"条件随机场"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"A","explanation":"条件随机场（CRF）可结合上下文特征提高分词准确性。","mnemonic":"条件随机场CRF综合多种特征做中文分词，选A"},{"id":376,"type":"single","text":"下列哪一项不属于计算机在教育领域的应用（）。","options":[{"label":"A","text":"在线课程"},{"label":"B","text":"计算机辅助教学"},{"label":"C","text":"学生管理系统"},{"label":"D","text":"航空航天设计"}],"answer":"D","explanation":"计算机在教育领域中的应用包括在线课程、计算机辅助教学、学生管理系统等，但不包括航空航天设计。","mnemonic":"航空航天设计不属于教育领域应用，选D跨行了"},{"id":377,"type":"single","text":"什么是企业为应对外部环境变化、规范内部管理而提升竞争力的必然结果（）。","options":[{"label":"A","text":"优化供应链管理"},{"label":"B","text":"评估员工的绩效表现"},{"label":"C","text":"优化业务流程"},{"label":"D","text":"制定公司的财务预算"}],"answer":"C","explanation":"优化业务流程，提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，是企业实现快速、稳定、可持续发展的重要条件","mnemonic":"优化业务流程是应对环境变化的必然结果，选C流程优化"},{"id":378,"type":"single","text":"追求卓越的基本要求中，“高标准要求” 具体体现在哪些方面（）。","options":[{"label":"A","text":"追逐权力和地位"},{"label":"B","text":"避免参加培训活动"},{"label":"C","text":"对工作质量要求更高"},{"label":"D","text":"忽略工作细节"}],"answer":"C","explanation":"追求卓越的基本要求中，“高标准要求”体现在树立高标准的要求，并努力追求卓越，对工作质量、专业知识和技能要求更高，在每一个工作环节都追求卓越表现","mnemonic":"追求卓越高标准=对工作质量要求更高，选C质量"},{"id":379,"type":"single","text":"业务分析方法的核心内容是（）。","options":[{"label":"A","text":"业务指标分析方法"},{"label":"B","text":"业务信息分析"},{"label":"C","text":"系统化业务流程"},{"label":"D","text":"业务量化分析"}],"answer":"A","explanation":"业务指标分析方法是业务分析方法的核心内容","mnemonic":"业务分析方法核心=业务指标分析方法，指标是核心选A"},{"id":380,"type":"single","text":"下列哪项指标可以直接用于判断算法是否存在欠拟合（）。","options":[{"label":"A","text":"模型复杂度降低"},{"label":"B","text":"准确率提高"},{"label":"C","text":"在训练集和测试集上的表现都差"},{"label":"D","text":"在训练集上表现差"}],"answer":"C","explanation":"欠拟合的典型表现是模型在训练集和测试集上都表现较差，无法很好地学习数据的规律","mnemonic":"欠拟合=训练集测试集都差，\"双差\"判欠拟合选C"},{"id":381,"type":"single","text":"业务流程重组（BPR）中的观念重组，主要涉及到哪方面内容（）。","options":[{"label":"A","text":"对企业的现有流程进行调研分析、诊断、再设计"},{"label":"B","text":"制定各流程内部的运转规则与各流程之间的关系规则"},{"label":"C","text":"变革基本信念、转变经营机制、重建组织文化，重塑行为方式"},{"label":"D","text":"建立流程管理机构，明确其权责范围"}],"answer":"C","explanation":"观念重组主要涉及变革基本信念、转变经营机制、重建组织文化以及重塑行为方式（B）。这些内容是观念重组的核心，旨在改变企业的思维方式和文化基础，为流程重组和组织重组提供支持。","mnemonic":"BPR观念重组=变革信念+转变机制+重建文化+重塑行为，选C"},{"id":382,"type":"single","text":"（）是导致算法欠拟合的原因。","options":[{"label":"A","text":"样本数量过多"},{"label":"B","text":"学习率过高"},{"label":"C","text":"数据中的噪声"},{"label":"D","text":"模型过于简单"}],"answer":"D","explanation":"欠拟合是指模型未能充分学习数据中的规律，导致预测误差较大。其核心原因之一是模型过于简单。","mnemonic":"欠拟合原因=模型过于简单，简单学不会选D"},{"id":383,"type":"single","text":"神经网络中，（）机制是专门用来解决梯度消失问题的。","options":[{"label":"A","text":"残差连接"},{"label":"B","text":"批归一化"},{"label":"C","text":"初始化权重"},{"label":"D","text":"激活函数选择"}],"answer":"A","explanation":"残差连接通过跨层加法缓解梯度消失问题。","mnemonic":"残差连接专解梯度消失，\"残差跨层传梯度\"选A"},{"id":384,"type":"single","text":"能够编写初级培训讲义并且开展知识与技术方面的培训，这一能力在中级培训流程中属于哪个步骤？（）","options":[{"label":"A","text":"业务分析"},{"label":"B","text":"智能训练"},{"label":"C","text":"培训与指导"},{"label":"D","text":"算法测试"}],"answer":"C","explanation":"能够编写初级培训讲义、开展知识和技术培训属于中级培训流程的培训与指导环节","mnemonic":"编写培训讲义开展培训属于\"培训与指导\"环节，选C"},{"id":385,"type":"single","text":"在业务流程优化过程中，找到阻碍流程优化目标实现的因素后，接下来应该做什么（）。","options":[{"label":"A","text":"重新成立项目小组"},{"label":"B","text":"将情况反馈给领导并得到确认"},{"label":"C","text":"直接对现有流程进行改造"},{"label":"D","text":"立即开始实施新的流程方案"}],"answer":"B","explanation":"根据业务流程优化的顺序，找到阻碍流程优化目标实现的因素之后，下一步是将情况反馈给领导并得到确认（C）","mnemonic":"找到阻碍因素后先反馈领导确认，不能擅自行动选B"},{"id":386,"type":"single","text":"《中华人民共和国著作权法》的适用范围涵盖（）。","options":[{"label":"A","text":"法律、法规"},{"label":"B","text":"计算机软件"},{"label":"C","text":"单纯事实消息"},{"label":"D","text":"通用数表、通用表格和公式"}],"answer":"B","explanation":"著作权法保护计算机软件等创造性作品，但不适用于法律文件、事实消息等非原创内容。","mnemonic":"著作权法保护计算机软件，法律法规和事实消息不保护选B"},{"id":387,"type":"single","text":"下列关于 jieba 分词的描述，错误的是（）。","options":[{"label":"A","text":"jieba.cut 方法接受1个输入参数"},{"label":"B","text":"jieba分词中的“精确模式”试图将句子最精确地切开，适合文本分析；"},{"label":"C","text":"jieba分词可以通过自定义词典来进行分词"},{"label":"D","text":"jieba分词是基于jieba库实现的中文分词工具"}],"answer":"A","explanation":"jieba.cut 方法接受四个输入参数: 需要分词的字符串；cut_all 参数用来控制是否采用全模式；HMM 参数用来控制是否使用 HMM 模型；use_paddle 参数用来控制是否使用paddle模式下的分词模式，paddle模式采用延迟加载方式，通过enable_paddle接口安装paddlepaddle-tiny，并且import相关代码；","mnemonic":"jieba.cut接受四个参数不是一个，A说\"1个\"是错的"},{"id":388,"type":"single","text":"下列哪一选项属于自然交互技术？（）","options":[{"label":"A","text":"电子邮件"},{"label":"B","text":"机器学习"},{"label":"C","text":"数据可视化"},{"label":"D","text":"触摸屏技术"}],"answer":"D","explanation":"触摸屏是自然交互技术的典型应用。","mnemonic":"触摸屏是自然交互技术典型代表，用手触摸最自然选D"},{"id":389,"type":"single","text":"在人机交互设计流程中，下列哪个阶段主要对交互效果进行评估？","options":[{"label":"A","text":"信息架构"},{"label":"B","text":"用户需求分析"},{"label":"C","text":"原型设计"},{"label":"D","text":"评估测试"}],"answer":"D","explanation":"智慧商场依托现代信息技术实现全渠道感知、数据分析和智能决策功能。","mnemonic":"评估测试阶段评估交互效果，\"评估\"对\"评估\"选D"},{"id":390,"type":"single","text":"业务流程重组（BPR）需要遵循的首要原则是什么（）。","options":[{"label":"A","text":"整合全公司的资源，突破部门界限"},{"label":"B","text":"始于对客户需求的深度理解与全面把握"},{"label":"C","text":"关注内部运营效率和有效性的提高"},{"label":"D","text":"设计与流程控制目标相匹配的绩效度量体系"}],"answer":"B","explanation":"业务流程重组（BPR）的首要原则是“始于对客户需求的深度理解与全面把握”（B）。这一原则强调流程重组的起点是客户需求，确保所有流程设计和优化都围绕客户需求展开，从而提高客户满意度。","mnemonic":"BPR首要原则：始于客户需求的深度理解，客户优先选B"},{"id":391,"type":"single","text":"人机交互是通过什么方式，让计算机领会人类用户的交互意图，并将运算结果以特定界面形式呈现给人类用户？","options":[{"label":"A","text":"2D打印技术"},{"label":"B","text":"3D打印技术"},{"label":"C","text":"人机接口技术"},{"label":"D","text":"虚拟现实技术"}],"answer":"C","explanation":"人机交互的本质就是人类用户与计算机间的信息交流和互动，即通过人机接口技术，使计算机理解人类用户的交互意图，并将计算结果以某种形式的界面呈现给人类用户","mnemonic":"人机交互通过\"人机接口技术\"实现，接口连接人和机选C"},{"id":392,"type":"single","text":"中文分词的目的是（）。","options":[{"label":"A","text":"使数据更规范"},{"label":"B","text":"优化中文文本的排版效果"},{"label":"C","text":"显示汉字的拼音"},{"label":"D","text":"使句子更具有语义明确性"}],"answer":"D","explanation":"中文分词旨在将文本分割为有意义的词汇，增强语义明确性，便于机器处理和人工阅读。","mnemonic":"中文分词目的=使句子语义更明确，分词明义选D"},{"id":393,"type":"single","text":"微型计算机的分类中不包含的是（）。","options":[{"label":"A","text":"个人计算机"},{"label":"B","text":"单板机"},{"label":"C","text":"显示器"},{"label":"D","text":"单片机"}],"answer":"C","explanation":"微型计算机按照组装分类分为单片机、单板机和个人计算机","mnemonic":"显示器是外设不是微型计算机分类，单片机单板机PC才是选C"},{"id":394,"type":"single","text":"趋势分析法是一种常用的统计方法，其主要运用方式为（）。","options":[{"label":"A","text":"通过收集大量的数据，进行回归分析，得出未来的趋势"},{"label":"B","text":"基于历史数据，通过图表、曲线等方式分析数据的变化趋势"},{"label":"C","text":"利用概率模型，预测未来的趋势"},{"label":"D","text":"通过人工智能算法，分析数据的趋势"}],"answer":"B","explanation":"趋势分析法通过历史数据图表分析变化趋势，用于未来预测。","mnemonic":"趋势分析法用历史数据+图表曲线分析变化趋势，选B可视化"},{"id":395,"type":"single","text":"在购物平台对客户群体进行分析时，象限分析法是通过（）两个维度来描绘客户形象的。","options":[{"label":"A","text":"促销活动和商品推荐效果"},{"label":"B","text":"商品种类和库存量"},{"label":"C","text":"用户年龄和消费金额"},{"label":"D","text":"页面点击率和购买转化率"}],"answer":"D","explanation":"在购物平台分析客户群体中，通过页面点击率和购买转化率两个维度来刻画客户群像。通过划分象限，可以了解购物平台的主要客户群体，也可以针对客户特点施行不同的促销活动和商品推荐。","mnemonic":"购物平台象限分析用\"点击率+转化率\"两个维度，选D"},{"id":396,"type":"single","text":"以下哪项属于智慧校园的实际应用案例？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"智慧教室技术"},{"label":"C","text":"智能门禁系统"},{"label":"D","text":"校园安防系统"}],"answer":"A","explanation":"智慧校园的相关案例包括校园安防系统、智能门禁系统、智慧教室技术","mnemonic":"智慧校园包括安防+门禁+智慧教室，\"以上都是\"选A"},{"id":397,"type":"single","text":"K 折交叉验证和留一交叉验证的区别在于（）。","options":[{"label":"A","text":"可以同时使用两种交叉验证方法"},{"label":"B","text":"评估模型性能的方式不同"},{"label":"C","text":"训练集和测试集的比例不同"},{"label":"D","text":"划分数据集的方式不同"}],"answer":"D","explanation":"K折验证划分K个互斥子集；留一验证是K折特例（K=样本量）。","mnemonic":"K折和留一验证区别在于划分数据集方式不同，选D"},{"id":398,"type":"single","text":"SWOT 分析作为一种兼顾企业内外部因素的分析方法，其中 “T” 的含义是（）。","options":[{"label":"A","text":"威胁"},{"label":"B","text":"机会"},{"label":"C","text":"劣势"},{"label":"D","text":"优势"}],"answer":"A","explanation":"SWOT模型中的“T”代表Threats（威胁）","mnemonic":"SWOT的T=Threats威胁，T=Threat记住选A"},{"id":399,"type":"single","text":"在 Python 里，能够对图像进行高斯模糊处理的函数是（）。","options":[{"label":"A","text":"cv2.medianBlur()"},{"label":"B","text":"cv2.bilateralFilter()"},{"label":"C","text":"cv2.GaussianBlur()"},{"label":"D","text":"cv2.threshold()"}],"answer":"C","explanation":"Python中可用cv2.GaussianBlur()实现高斯模糊，用于图像平滑和去噪。","mnemonic":"高斯模糊用cv2.GaussianBlur()，高斯对高斯选C"},{"id":400,"type":"single","text":"以下哪项做法符合诚实公正的基本要求（）。","options":[{"label":"A","text":"提供准确、真实和完整的信息"},{"label":"B","text":"对某个观点偏向某一方"},{"label":"C","text":"在签订合同前隐瞒重要信息"},{"label":"D","text":"在面试中夸大自己的能力"}],"answer":"A","explanation":"在面试中夸大自己的能力和在签订合同前隐瞒重要信息都是欺骗行为，不符合诚实公正的基本要求；对某个观点偏向某一方也不符合诚实公正的基本要求。只提供准确、真实和完整的信息才符合诚实公正的基本要求。","mnemonic":"诚实公正=提供准确真实完整的信息，不夸大不隐瞒选A"},{"id":401,"type":"single","text":"下列哪一项不属于《中华人民共和国个人信息保护法》所要求的个人信息处理者应履行的基本责任？","options":[{"label":"A","text":"为个人信息主体提供个人信息处理的告知。"},{"label":"B","text":"采用安全保障措施保护个人信息安全。"},{"label":"C","text":"重要信息的保存期限不得低于10年。"},{"label":"D","text":"接收个人信息主体的申请并依法回应。"}],"answer":"C","explanation":"个人信息保护法要求处理者明确告知处理事项，建立权利响应机制，并采取安全措施保护信息，但不要求所有信息保存期限均不低于10年。","mnemonic":"个保法不要求\"保存期限不低于10年\"，C选项凭空捏造年限"},{"id":402,"type":"single","text":"被称作 “计算机的大脑”，且是计算机主要功能组件的是（）。","options":[{"label":"A","text":"主板"},{"label":"B","text":"硬盘"},{"label":"C","text":"CPU"},{"label":"D","text":"显卡"}],"answer":"C","explanation":"CPU是负责执行大部分计算机指令的主要部件，被誉为计算机的大脑。它主要完成算术运算、数据传输和指令的解释执行等操作。","mnemonic":"计算机的\"大脑\"=CPU，主板是骨架、硬盘是仓库、显卡是眼睛"},{"id":403,"type":"single","text":"特征选择的过程通常包括以下哪一个步骤（）。","options":[{"label":"A","text":"通过算法创建新的特征"},{"label":"B","text":"对特征进行标准化处理"},{"label":"C","text":"根据特征的相关性选择最有用的特征"},{"label":"D","text":"从数据中提取最具代表性的特征"}],"answer":"C","explanation":"特征选择的过程旨在从已有的特征集合中选择出对模型有最大贡献的特征","mnemonic":"特征\"选择\"=从已有特征中\"选\"最相关的，不是创建也不是提取"},{"id":404,"type":"single","text":"在 PowerPoint 中编辑幻灯片版式时，若想添加一个占位符来更改现有版式，需要通过什么进行设置（）。","options":[{"label":"A","text":"在“母版”选项卡中选择“编辑母版”，然后选择需要更改布局的幻灯片"},{"label":"B","text":"在“幻灯片母版”视图下，单击需要更改布局的幻灯片，然后右键选择“布局”"},{"label":"C","text":"在“普通视图”下单击幻灯片，然后右键选择“布局”"},{"label":"D","text":"在“幻灯片母版”选项卡上单击“插入占位符”，然后从列表中选择一种占位符类型"}],"answer":"D","explanation":"在幻灯片母版中，通过“插入占位符”可添加新版式占位符。","mnemonic":"PPT添加占位符：母版选项卡→\"插入占位符\"，记住\"母版+插入\""},{"id":405,"type":"single","text":"业务流程重组的主要目的在于（）。","options":[{"label":"A","text":"改变企业文化"},{"label":"B","text":"减少员工数量以降低成本"},{"label":"C","text":"在关键性能指标上获得巨大提高"},{"label":"D","text":"增加企业运营的复杂性"}],"answer":"C","explanation":"业务流程重组的主要目的是对企业进行根本的再思考和彻底的再设计，以求企业在关键的性能指标上获得巨大的提高","mnemonic":"BPR目的=关键性能指标巨大提高，不是裁员也不是改文化"},{"id":406,"type":"single","text":"在 Word 里，题注指的是什么（）。","options":[{"label":"A","text":"对于插入的图、表、公式等的附加说明。"},{"label":"B","text":"对于插入的链接的附加说明。"},{"label":"C","text":"对于插入的文字的附加说明。"},{"label":"D","text":"对于插入的标题的附加说明。"}],"answer":"A","explanation":"题注是为图表、公式等添加的名称和编号，提供来源等信息。","mnemonic":"Word题注=给图、表、公式加说明，\"题\"目之\"注\"释"},{"id":407,"type":"single","text":"下列哪一项不属于 jieba 分词的基本操作步骤（）。","options":[{"label":"A","text":"合并分词结果并输出"},{"label":"B","text":"安装和导入jieba"},{"label":"C","text":"载入自定义词典"},{"label":"D","text":"选择分词模式"}],"answer":"A","explanation":"jieba分词基本步骤包括：安装和导入jieba、选择分词模式、载入自定义词典、获取分词结果。","mnemonic":"jieba步骤：安装→选模式→载词典→获结果，没有\"合并输出\"这步"},{"id":408,"type":"single","text":"在业务流程重组（BPR）中，最能体现 “整体服务的思路” 这一原则的是（）。","options":[{"label":"A","text":"专注于单一部门的流程优化"},{"label":"B","text":"强调跨部门的流程整合"},{"label":"C","text":"仅关注降低成本"},{"label":"D","text":"忽略客户需求"}],"answer":"B","explanation":"业务流程体系要体现整体服务的思路，即整合全公司的资源，以流程突破部门界限，全体员工共同努力改进客户服务（B项）。这意味着流程重组不是仅仅关注单个部门的优化，而是要实现跨部门的流程整合，确保整个组织能够协同工作，以提供更连贯、高效的服务。选项A专注于单一部门的流程优化不符合整体服务的思路，选项C仅关注降低成本忽略了服务质量，而选项D忽略客户需求则违背了流程重组始于客户需求的原则。","mnemonic":"BPR整体服务=跨部门整合，\"整体\"二字暗示打破部门墙"},{"id":409,"type":"single","text":"下列哪一项不在智慧商场的功能范围之内？","options":[{"label":"A","text":"智能安防"},{"label":"B","text":"智能支付"},{"label":"C","text":"智能导购"},{"label":"D","text":"智能医疗"}],"answer":"D","explanation":"智慧商场的功能包括智能导购、智能支付、智能安防等，不涉及医疗功能","mnemonic":"智慧商场管\"购物安防支付\"，不管\"医疗\"，商场不是医院"},{"id":410,"type":"single","text":"依据《中华人民共和国著作权法》，下列情形中不构成对著作权侵犯的是（）。","options":[{"label":"A","text":"剽窃他人作品"},{"label":"B","text":"未经著作权人许可，发表其作品的"},{"label":"C","text":"支付报酬后使用他人作品"},{"label":"D","text":"未经出版者许可，使用其出版的图书、期刊的版式设计"}],"answer":"C","explanation":"支付报酬后使用他人作品不侵权，其他行为均属侵权。","mnemonic":"付了钱就不侵权，支付报酬后合法使用他人作品"},{"id":411,"type":"single","text":"短时自相关函数在语音信号处理中的主要用途是（）。","options":[{"label":"A","text":"找到信号帧中的谷值"},{"label":"B","text":"衡量信号自身时间波形的相似性"},{"label":"C","text":"衡量信号帧的相似度"},{"label":"D","text":"找到信号帧中的最大值"}],"answer":"B","explanation":"自相关函数用于衡量信号自身时间波形的相似性","mnemonic":"\"自\"相关=\"自\"身时间波形相似性，关键字都是\"自\""},{"id":412,"type":"single","text":"决策树算法里，剪枝技术的主要目的是（）。","options":[{"label":"A","text":"提高模型的准确度"},{"label":"B","text":"防止模型过拟合"},{"label":"C","text":"减少训练数据的噪声"},{"label":"D","text":"增加模型的复杂度"}],"answer":"B","explanation":"决策树的剪枝技术主要用于防止模型在训练集上过拟合","mnemonic":"剪枝防过拟合：树长太大要\"剪\"掉，防止记住噪声"},{"id":413,"type":"single","text":"按照用途来划分，计算机存储器可分为哪几类（）","options":[{"label":"A","text":"主存储器、外存储器、高速缓冲存储器"},{"label":"B","text":"硬盘和光盘"},{"label":"C","text":"闪存和SD卡"},{"label":"D","text":"U盘和移动硬盘"}],"answer":"A","explanation":"计算机的存储器按用途划分①主存储器：主存储器内存存放计算机运行期间的大量程序和数据存取速度较快，存储容量不大。②外存储器：外存存放系统程序和大型数据文件及数据库存储容量大，单位成本低。③高速缓冲存储器：高速缓冲存储器Cache 高速存取指令和数据存取速度快，但存储容量小。","mnemonic":"存储器按用途分三类：主存+外存+Cache，口诀\"主外缓\""},{"id":414,"type":"single","text":"LOTOS 算子能够用来解决哪（）类问题。","options":[{"label":"A","text":"数据库查询优化"},{"label":"B","text":"并发系统设计"},{"label":"C","text":"模拟电路设计"},{"label":"D","text":"图像处理"}],"answer":"B","explanation":"LOTOS算子主要用于并发系统的设计，尤其是用于描述通信协议的行为模型。","mnemonic":"LOTOS=并发系统设计，L联想Lock（锁）→并发需要锁机制"},{"id":415,"type":"single","text":"随机森林算法之所以能通过增加树的数量来提升模型性能，原因在于（）。","options":[{"label":"A","text":"增加树的数量通常会提高模型的准确性和鲁棒性，降低方差"},{"label":"B","text":"增加树的数量可以增加计算开销，但不会影响模型的泛化能力"},{"label":"C","text":"增加树的数量可以让模型更加复杂，导致过拟合"},{"label":"D","text":"增加树的数量可以提高模型的多样性，减少欠拟合的风险"}],"answer":"A","explanation":"选项D：增加树的数量通常会提高模型的准确性和鲁棒性，并降低方差","mnemonic":"随机森林加树=提高准确性+鲁棒性+降低方差，\"人多力量大\""},{"id":416,"type":"single","text":"下列哪项属于人机交互存在的缺点？","options":[{"label":"A","text":"可以支持更多的程序和工具"},{"label":"B","text":"会降低人们的创造力和创新能力"},{"label":"C","text":"可以让人与机器更加独立"},{"label":"D","text":"可以提高工作效率"}],"answer":"B","explanation":"人机交互虽然可以提高效率，但是在某些情况下会降低人们的创造力和创新能力","mnemonic":"人机交互
