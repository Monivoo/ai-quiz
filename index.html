ext":"点击“格式”选项卡，选择“目录”。"},{"label":"B","text":"点击“插入”选项卡，选择“目录”。"},{"label":"C","text":"点击“引用”选项卡，选择“目录”。"},{"label":"D","text":"点击“文件”选项卡，选择“自动目录”。"}],"answer":"C","explanation":"在Word中插入目录，需要先点击“引用”选项卡，然后选择“目录”，再点击“自动目录1”或“自动目录2”，即可插入目录，也可自定义目录","mnemonic":"Word插入目录在\"引用\"选项卡，引用→目录选C"},{"id":181,"type":"single","text":"在 jieba 分词过程中，关键词提取是在哪个步骤完成之后开展的（）。","options":[{"label":"A","text":"获取分词结果"},{"label":"B","text":"分词操作"},{"label":"C","text":"载入词典"},{"label":"D","text":"导入jieba库"}],"answer":"A","explanation":"jieba关键词提取在分词完成后进行。","mnemonic":"jieba关键词提取在\"获取分词结果\"之后，先分词再提取选A"},{"id":182,"type":"single","text":"运用支持向量机进行分类任务时，（）会对决策边界的复杂程度产生控制作用。","options":[{"label":"A","text":"正则化参数C"},{"label":"B","text":"核函数类型"},{"label":"C","text":"最大迭代次数"},{"label":"D","text":"学习率"}],"answer":"A","explanation":"支持向量机中，正则化参数C调节决策边界复杂度，平衡欠拟合和过拟合风险。","mnemonic":"SVM正则化参数C控制决策边界复杂度，C控复杂选A"},{"id":183,"type":"single","text":"下列属于小波变换特点的是（）。","options":[{"label":"A","text":"改善图像对比度"},{"label":"B","text":"增强图像细节"},{"label":"C","text":"边缘保护"},{"label":"D","text":"多分辨率分析"}],"answer":"D","explanation":"小波变换非常适合分析突变信号和不平稳信号，并且小波变换具有多分辨率分析的特点和带通滤波器的特性，可用快速算法实现，因而常用于滤波、降和基频提取等","mnemonic":"小波变换特点=多分辨率分析，多尺度选D"},{"id":184,"type":"single","text":"RFM 模型里的 “R” 所指代的是（）。","options":[{"label":"A","text":"客户的满意度"},{"label":"B","text":"客户的消费金额"},{"label":"C","text":"客户购买的频率"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"D","explanation":"RFM模型中，R代表了最近一次购买时间间隔，指用户最近一次消费时间距离现在的时间间隔，这个指标可以反映出客户的购买意愿。","mnemonic":"RFM的R=Recency最近一次购买时间间隔，R即最近选D"},{"id":185,"type":"single","text":"趋势分析法重点关注数据的（ ）。","options":[{"label":"A","text":"随机性"},{"label":"B","text":"单一时点波动"},{"label":"C","text":"动态变化和趋势方向"},{"label":"D","text":"静态数值"}],"answer":"C","explanation":"趋势分析法关注多期连续数据的动态变化。","mnemonic":"趋势分析关注动态变化和趋势方向，看变化选C"},{"id":186,"type":"single","text":"能够借助上下文信息进行中文分词的是（）。","options":[{"label":"A","text":"递归神经网络"},{"label":"B","text":"支持向量机"},{"label":"C","text":"卷积神经网络"},{"label":"D","text":"隐马尔可夫模型"}],"answer":"A","explanation":"递归神经网络（RNN）可以利用上下文信息进行中文分词","mnemonic":"利用上下文分词=递归神经网络RNN，上下文选A"},{"id":187,"type":"single","text":"在自然语言对话里，下列哪项不在短语识别的范畴之内？","options":[{"label":"A","text":"句法分析"},{"label":"B","text":"词性识别"},{"label":"C","text":"语义分析"},{"label":"D","text":"语音信号的分析"}],"answer":"D","explanation":"自然语言对话包括语音信号的分析、语义分析、词性识别、句法分析等内容","mnemonic":"短语识别不含\"语音信号分析\"，语音是声学层面选D"},{"id":188,"type":"single","text":"核心思想是将图像表示为一组基向量的线性组合的是（）。","options":[{"label":"A","text":"高斯滤波"},{"label":"B","text":"非局部均值滤波"},{"label":"C","text":"基于稀疏表示的方法"},{"label":"D","text":"小波变换"}],"answer":"C","explanation":"稀疏表示去噪法将图像表示为基向量的线性组合，利用稀疏性去除噪声并保留细节。","mnemonic":"图像=基向量线性组合→稀疏表示方法，选C"},{"id":189,"type":"single","text":"运用参数优化方法时，下列（）行为是应当避免的。","options":[{"label":"A","text":"限制搜索范围"},{"label":"B","text":"尝试使用默认参数设定"},{"label":"C","text":"用尽所有可用的参数组合"},{"label":"D","text":"将测试数据用于参数选择"}],"answer":"D","explanation":"D 选项是最需要避免的行为。测试数据应该仅用于最终模型评估，而不是在训练和优化过程中使用。如果在优化阶段使用测试数据，可能导致模型对测试数据过拟合，从而失去模型的泛化能力。C选项在某些情况下可能导致计算开销过大，但并不意味着应该完全避免。在资源允许的情况下，穷举所有参数组合是一种常见且有效的方法，尤其在使用 GridSearch 时。B 选项许多模型的默认参数能够提供一个合理的起点，依赖默认参数更多的是一种保守的做法。A 选项中的“限制搜索范围”并不是错误行为，实际上，在一些情况下，适当限制搜索范围有助于提高效率，尤其是当我们对某些超参数有足够了解时。","mnemonic":"测试数据不能选参数，避免过拟合重复题选D"},{"id":190,"type":"single","text":"在 LOTOS 模型中，可用于表示两个模型在同一时刻执行的运算符是（）。","options":[{"label":"A","text":"choice（选择）"},{"label":"B","text":"sequence（序列）"},{"label":"C","text":"synchronization（同步）"},{"label":"D","text":"concurrency（并发）"}],"answer":"C","explanation":"LOTOS模型中，同步运算符表示两个模型在同一时刻执行。","mnemonic":"LOTOS同一时刻执行=同步synchronization，选C"},{"id":191,"type":"single","text":"趋势分析法主要分析的是（ ）。","options":[{"label":"A","text":"随机数据"},{"label":"B","text":"非连续数据"},{"label":"C","text":"多期连续数据"},{"label":"D","text":"单一时点数据"}],"answer":"C","explanation":"趋势分析需多期连续数据支持。","mnemonic":"趋势分析=多期连续数据，重复题选C"},{"id":192,"type":"single","text":"不仅能提取文本的语义信息，还能提取文本语序信息的是（）。","options":[{"label":"A","text":"词袋模型"},{"label":"B","text":"Doc2Vec模型"},{"label":"C","text":"One-hot模型"},{"label":"D","text":"Word2Vec模型"}],"answer":"B","explanation":"Doc2Vec模型是Word2Vec模型的升级，不仅提取文本的语义信息，还可以提取文本的语序信息。","mnemonic":"语义+语序都提取=Doc2Vec，Word2Vec升级版选B"},{"id":193,"type":"single","text":"数据标注工作所面临的困境与挑战不包含下列哪项？（）","options":[{"label":"A","text":"标注成本高"},{"label":"B","text":"无标注工具可用"},{"label":"C","text":"自动化工具的准确率难以保证"},{"label":"D","text":"标注平台存在用户隐私泄风险"}],"answer":"B","explanation":"数据标注的挑战包括高成本、自动化工具准确率低和隐私风险，但并非无工具可用。","mnemonic":"数据标注挑战不含\"无工具可用\"，工具是有的选B"},{"id":194,"type":"single","text":"列族数据库的核心特点是（）。","options":[{"label":"A","text":"基于内存的键值对高速读写"},{"label":"B","text":"以节点和边表示复杂关系"},{"label":"C","text":"按列簇组织数据，支持动态列扩展"},{"label":"D","text":"通过表结构（行和列）存储数据"}],"answer":"C","explanation":"列族数据库通过列簇动态扩展列，适合海量数据存储和高吞吐场景；通过表结构（行和列）存储数据是关系型数据库的特点；以节点和边表示复杂关系是图数据库的特点；基于内存的键值对高速读写是键值存储（如Redis）的特点","mnemonic":"列族数据库=按列簇组织+动态列扩展，选C"},{"id":195,"type":"single","text":"在对语音开展短时频谱分析时，在窗函数的选择方面，下列说法正确的是（）。","options":[{"label":"A","text":"矩形窗是最常用的窗函数，因为它简单易实现"},{"label":"B","text":"错误：汉明窗得到的短时频谱平滑度较高，因此在语音分析中使用较为普遍，而不是平滑度较低。"},{"label":"C","text":"正确：汉明窗能够减少频谱泄漏，使得到的短时频谱更加平滑，因此在语音分析中使用较为普遍。"},{"label":"D","text":"错误：窗函数的选择对短时频谱分析的结果有显著影响，不同的窗函数会导致不同的频谱特性。"}],"answer":"C","explanation":"A. 错误：虽然矩形窗简单易实现，但在语音短时频谱分析中极少采用，因为它会导致频谱泄漏，使频谱不够平滑。","mnemonic":"汉明窗减少频谱泄漏更平滑，语音分析常用选C"},{"id":196,"type":"single","text":"大数据的主要信息来源中，不包含哪一项？（）","options":[{"label":"A","text":"自然语言对话系统"},{"label":"B","text":"企业系统"},{"label":"C","text":"机器系统"},{"label":"D","text":"互联网系统"}],"answer":"A","explanation":"自然语言对话系统不是大数据的主要来源。","mnemonic":"大数据来源不含自然语言对话系统，选A"},{"id":197,"type":"single","text":"进行可用性评估时，启发式评估的主要用意是（）。","options":[{"label":"A","text":"通过访谈用户，了解用户对产品的主观体验"},{"label":"B","text":"通过专家评估，检查产品是否符合可用性设计原则"},{"label":"C","text":"通过设计问卷，收集用户的反馈意见"},{"label":"D","text":"通过实际用户参与，观察产品的使用效果"}],"answer":"B","explanation":"启发式评估是一种由专家进行的可用性评估方法，专家依据一定的可用性原则（如尼尔森的十条可用性启发式原则）来检查产品的设计","mnemonic":"启发式评估=专家依据可用性原则检查，选B"},{"id":198,"type":"single","text":"图像数据处理流程中的特征提取步骤，能够帮助解决什么问题（）。","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"数据分类"},{"label":"C","text":"数据预处理"},{"label":"D","text":"数据清洗"}],"answer":"B","explanation":"特征提取将原始数据转化为分类可用的特征形式。","mnemonic":"特征提取帮助解决数据分类问题，提取特征为分类选B"},{"id":199,"type":"single","text":"无人零售是一种运用智能技术，让消费者在购物过程中不需要依靠以下哪类人员协助的零售模式？","options":[{"label":"A","text":"系统开发人员"},{"label":"B","text":"营业员、服务员"},{"label":"C","text":"仓库管理员"},{"label":"D","text":"供应商"}],"answer":"B","explanation":"无人零售模式无需营业员或服务员协助。","mnemonic":"无人零售不需要营业员服务员，选B"},{"id":200,"type":"single","text":"人机交互 GOMS 模型中的 “M” 指的是什么？","options":[{"label":"A","text":"产物"},{"label":"B","text":"目标"},{"label":"C","text":"操作时间"},{"label":"D","text":"方法"}],"answer":"D","explanation":"GOMS模型中M代表Method（任务步骤）。","mnemonic":"GOMS的M=Method方法，即任务步骤选D"},{"id":201,"type":"single","text":"使用 open () 函数打开文件时，参数 'r' 代表（）。","options":[{"label":"A","text":"二进制模式"},{"label":"B","text":"追加模式"},{"label":"C","text":"写入模式"},{"label":"D","text":"读取模式"}],"answer":"D","explanation":"'r'模式以文本形式读取文件，文件需存在，否则报错。","mnemonic":"'r'=read读取，文件打开默认读，选D"},{"id":202,"type":"single","text":"利用 OpenCV 库的 imread () 函数加载图像时，什么表示图像的颜色通道顺序（）。","options":[{"label":"A","text":"Noneoftheabove"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"cv.IMREAD_GRAYSCALE"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"D","explanation":"cv.IMREAD_COLOR读取图像时按BGR顺序处理颜色通道。","mnemonic":"imread彩色=COLOR，BGR顺序记住选D"},{"id":203,"type":"single","text":"以下哪种行为触犯了《中华人民共和国个人信息保护法》的规定？","options":[{"label":"A","text":"个人同意将手机号码授权给某企业，但该企业将该号码出售给第三方公司。"},{"label":"B","text":"个人在某电商平台上购买商品时，需要提供姓名、地址等信息。"},{"label":"C","text":"某医疗机构公布患者病历信息，但已经对患者姓名等信息进行脱敏处理。"},{"label":"D","text":"某企业在其公司网站上公布待招聘的岗位职称、工资水平等信息。"}],"answer":"A","explanation":"根据《中华人民共和国个人信息保护法》第十条规定，任何组织、个人不得非法收集、使用、加工、传输他人个人信息，不得非法买卖、提供或者公开他人个人信息；不得从事危害国家安全、公共利益的个人信息处理活动，A选项该企业将手机号码出售给第三方公司，违反了相关法律规定。","mnemonic":"授权≠出售，转卖手机号违法选A"},{"id":204,"type":"single","text":"在 GOMS 模型中，操作符（Operators）指的是哪项内容？","options":[{"label":"A","text":"用户的行为习惯"},{"label":"B","text":"选择不同方法的规则"},{"label":"C","text":"用户在执行任务时的基本动作"},{"label":"D","text":"用户的最终目标"}],"answer":"C","explanation":"操作符是用户为达到目标而执行的基本动作，不能再被分解","mnemonic":"Operators操作符=基本动作，不可再分选C"},{"id":205,"type":"single","text":"若要帮助中级工作人员提高文本数据标注的水平，可采用哪些途径呢？（）","options":[{"label":"A","text":"学习语言学"},{"label":"B","text":"忽略看不懂的文本"},{"label":"C","text":"学习嵌入式系统"},{"label":"D","text":"开发数据库"}],"answer":"A","explanation":"学习语言学有助于提高文本数据标注水平。","mnemonic":"文本标注学语言学，语言是文本之本选A"},{"id":206,"type":"single","text":"下列哪类行为不符合诚实公正的基本要求（）。","options":[{"label":"A","text":"提供准确、真实和完整的信息"},{"label":"B","text":"忠诚于雇主或客户的利益"},{"label":"C","text":"在交易中提供虚假信息"},{"label":"D","text":"及时、清晰地向相关方提供信息"}],"answer":"C","explanation":"根据诚实公正基本要求，从业人员在处理工作和与他人交往的过程中应该保持诚实和公正的态度","mnemonic":"虚假信息≠诚实公正，造假必违规选C"},{"id":207,"type":"single","text":"计算机在医学影像处理方面的应用，属于哪个领域（）。","options":[{"label":"A","text":"网络应用"},{"label":"B","text":"图形图像处理"},{"label":"C","text":"科学计算"},{"label":"D","text":"文本处理"}],"answer":"B","explanation":"计算机在医学影像处理中的应用属于图形图像处理领域。计算机可以对医学影像进行数字化处理，提高影像的清晰度和准确度，对医学诊断和治疗起到了重要作用。","mnemonic":"医学影像=图形图像处理，影像即图像选B"},{"id":208,"type":"single","text":"GOMS 模型难以考虑（）任务的特征。","options":[{"label":"A","text":"重复"},{"label":"B","text":"具有多种决策路径"},{"label":"C","text":"固定"},{"label":"D","text":"可预测"}],"answer":"B","explanation":"GOMS模型不能考虑具有多种决策路径的任务","mnemonic":"GOMS适合固定流程，多决策路径搞不定选B"},{"id":209,"type":"single","text":"下列选项中，属于键值存储的典型数据库是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Cassandra"},{"label":"C","text":"Redis"},{"label":"D","text":"MongoDB"}],"answer":"C","explanation":"Redis属于键值数据库；MySQL属于关系型数据库；Cassandra是列族数据库；MongoDB是文档数据库。","mnemonic":"Redis=键值对，记\"Re得Key\"选C"},{"id":210,"type":"single","text":"下列哪项是多维度拆解分析方法需要理解的关键词（）。","options":[{"label":"A","text":"纬度"},{"label":"B","text":"解析"},{"label":"C","text":"拆解"},{"label":"D","text":"维系"}],"answer":"C","explanation":"多维度拆解分析的核心是“维度”和“拆解”两个概念。","mnemonic":"多维度\"拆解\"分析，关键词就是拆解选C"},{"id":211,"type":"single","text":"在解决欠拟合的方法中，下列哪项属于基于增加特征的方法（）。","options":[{"label":"A","text":"L2正则化"},{"label":"B","text":"Dropout"},{"label":"C","text":"使用多项式特征"},{"label":"D","text":"数据增强"}],"answer":"C","explanation":"欠拟合的主要原因之一是特征过少，增加特征可以有效缓解欠拟合问题。","mnemonic":"欠拟合加特征，多项式特征增复杂度选C"},{"id":212,"type":"single","text":"在 K - 近邻算法中，需要挑选合适的距离度量方式来计算样本间的距离，下列哪种方法并非用于距离度量？（）","options":[{"label":"A","text":"卡方距离"},{"label":"B","text":"马氏距离"},{"label":"C","text":"切比雪夫距离"},{"label":"D","text":"曼哈顿距离"}],"answer":"A","explanation":"在K-近邻算法中，常用的距离度量方法包括欧式距离、曼哈顿距离、切比雪夫距离和马氏距离","mnemonic":"卡方检验不量距离，KNN用欧曼切马选A"},{"id":213,"type":"single","text":"在图形用户界面设计过程中，遵循前期确定的设计规范且使用一致的描述词语，这所依据的设计原则是（）。","options":[{"label":"A","text":"美观性"},{"label":"B","text":"性能优化"},{"label":"C","text":"用户反馈"},{"label":"D","text":"一致性"}],"answer":"D","explanation":"一致性设计原则确保界面元素统一，提升用户操作效率和体验。","mnemonic":"一致性=统一规范+一致描述词语选D"},{"id":214,"type":"single","text":"哪个步骤是结合人工智能技术的要求，对业务数据的采集规范进行梳理的？（）","options":[{"label":"A","text":"标注数据审核"},{"label":"B","text":"业务数据质量检测"},{"label":"C","text":"数据处理方法优化"},{"label":"D","text":"数据归类和定义"}],"answer":"B","explanation":"业务数据质量检测环节梳理数据采集规范。","mnemonic":"质量检测梳理采集规范，质检管规范选B"},{"id":215,"type":"single","text":"在 PowerPoint 中插入 SmartArt 图形后，不能用于自定义其外观的是（）。","options":[{"label":"A","text":"更改形状"},{"label":"B","text":"文本填充"},{"label":"C","text":"更改颜色样式"},{"label":"D","text":"直接应用图片作为SmartArt整体背景"}],"answer":"D","explanation":"SmartArt图形不支持直接应用图片作为整体背景，但可调整形状、文本和颜色。","mnemonic":"SmartArt不能直接贴图片当整体背景选D"},{"id":216,"type":"single","text":"在用 K 折交叉验证完成模型调优后，若存在独立的测试集，应始终用什么来对模型进行最终评估（）。","options":[{"label":"A","text":"训练集"},{"label":"B","text":"验证集"},{"label":"C","text":"测试集"},{"label":"D","text":"数据集"}],"answer":"C","explanation":"交叉验证后，最终模型评估应使用独立测试集，以确保泛化能力。","mnemonic":"最终评估用独立测试集，考试要新卷选C"},{"id":217,"type":"single","text":"依据劳动法，用人单位安排劳动者延长工作时间的，需向劳动者支付不低于工资（）的报酬。","options":[{"label":"A","text":"百分之一百二十"},{"label":"B","text":"百分之一百八十"},{"label":"C","text":"百分之一百五十"},{"label":"D","text":"百分之二百"}],"answer":"C","explanation":"劳动法规定，延长工作时间需支付不低于工资150%的报酬。","mnemonic":"延长工时付150%，一点五倍记住选C"},{"id":218,"type":"single","text":"以下哪个场景不适合采用漏斗分析（）。","options":[{"label":"A","text":"分析电商网站的购物流程转化率"},{"label":"B","text":"评估一款游戏的关卡通过率"},{"label":"C","text":"统计某地区的人口年龄结构"},{"label":"D","text":"优化APP的用户注册流程"}],"answer":"C","explanation":"漏斗分析适用于有明确转化步骤的场景，如购物或注册流程，不适用于简单统计如人口年龄结构。","mnemonic":"漏斗分析要有转化步骤，人口统计无漏斗选C"},{"id":219,"type":"single","text":"下列选项中，关于数据存储技术的说法正确的是（）。","options":[{"label":"A","text":"列组数据库的列族是在存储数据之前创建的，且列数不可扩展"},{"label":"B","text":"NOSQL数据库和关系数据库数据模型都遵守原子性、一致性的事务属性"},{"label":"C","text":"分布式文件系统允许多机器上的多用户分享文件和存储空间"},{"label":"D","text":"分布式文件系统提供文件复制功能，但没有容错机制"}],"answer":"C","explanation":"5（好）","mnemonic":"分布式文件系统=多机多用户共享选C"},{"id":220,"type":"single","text":"下列哪一项并非 RFM 模型中的衡量指标（）。","options":[{"label":"A","text":"购买的频率"},{"label":"B","text":"固定资产投资额"},{"label":"C","text":"客户的购买额度"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"B","explanation":"RFM指标含购买时间、频率、金额，不含固定资产投资。","mnemonic":"RFM=最近+频率+金额，固定资产不沾边选B"},{"id":221,"type":"single","text":"文本向量化指的是什么（）。","options":[{"label":"A","text":"将文本数据转换为视频形式"},{"label":"B","text":"将文本数据转换为音频形式"},{"label":"C","text":"将文本数据转换为图片形式"},{"label":"D","text":"将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程。"}],"answer":"D","explanation":"文本向量化是指将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程","mnemonic":"文本向量化=自然语言编码为语义向量选D"},{"id":222,"type":"single","text":"优化业务流程、提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，也是企业实现快速、稳定、可持续发展的什么（）。","options":[{"label":"A","text":"客户关系管理"},{"label":"B","text":"重要条件"},{"label":"C","text":"品牌管理"},{"label":"D","text":"新产品发布"}],"answer":"B","explanation":"优化业务流程，提升竞争力是企业应对外部环境变化、规范内部管理的必然结果，是企业实现快速、稳定、可持续发展的重要条件","mnemonic":"优化流程提升竞争力=可持续发展重要条件选B"},{"id":223,"type":"single","text":"业务流程优化项目小组的主要职责中，不包括下列哪一项（）。","options":[{"label":"A","text":"直接负责企业的日常运营管理"},{"label":"B","text":"推动新的流程方案落实并执行"},{"label":"C","text":"制订流程改进计划"},{"label":"D","text":"对现有业务流程进行描述、分析和诊断"}],"answer":"A","explanation":"项目小组职责不包括日常运营管理，聚焦流程改进实施。","mnemonic":"项目小组管流程改进，日常运营不归它管选A"},{"id":224,"type":"single","text":"下列哪项是多维度拆解分析方法需要理解的关键词（）。","options":[{"label":"A","text":"纬度"},{"label":"B","text":"解析"},{"label":"C","text":"拆解"},{"label":"D","text":"维系"}],"answer":"C","explanation":"多维度拆解分析的核心是“维度”和“拆解”两个概念。","mnemonic":"多维度拆解，关键词还是\"拆解\"选C"},{"id":225,"type":"single","text":"在 Word 软件里，可在哪个地方对段落的缩进和间距进行设置（）。","options":[{"label":"A","text":"“样式”面板中"},{"label":"B","text":"“页面布局”选项卡中"},{"label":"C","text":"“字体”对话框中"},{"label":"D","text":"“段落”对话框中"}],"answer":"D","explanation":"Word中段落缩进和间距在“段落”对话框的“缩进和间距”选项卡设置。","mnemonic":"段落缩进间距在\"段落\"对话框设置选D"},{"id":226,"type":"single","text":"在 OpenCV 中，能实现中值滤波的函数是（）。","options":[{"label":"A","text":"cv2.medianBlur()"},{"label":"B","text":"skimage.transform.resize()"},{"label":"C","text":"cv2.crop()"},{"label":"D","text":"cv2.resize()"}],"answer":"A","explanation":"在OpenCV中，通过cv2.medianBlur函数进行中值滤波，其基本使用格式如下Cv2,medianBlur(src,ksize[,dst])","mnemonic":"medianBlur中median=中值，中值滤波选A"},{"id":227,"type":"single","text":"在特征选择中，运用 L1 正则化主要是为了实现什么功能（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"解决特征之间的多重共线性问题"},{"label":"C","text":"对特征进行降维处理"},{"label":"D","text":"自动进行特征选择"}],"answer":"D","explanation":"L1正则化（Lasso）通过对模型参数施加L1惩罚，使得部分特征的系数被推向零，从而实现特征选择","mnemonic":"L1正则化=Lasso=系数归零=自动特征选择选D"},{"id":228,"type":"single","text":"数据整合的主要目的是（）。","options":[{"label":"A","text":"将分散的数据存储在同一个数据库中"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"将来自不同来源的数据进行合并和统一处理"},{"label":"D","text":"增强数据的安全性"}],"answer":"C","explanation":"数据整合通过ETL过程合并多源数据，增强数据功能和应用价值。","mnemonic":"数据整合=合并多源数据统一处理选C"},{"id":229,"type":"single","text":"RFM 模型里的 “R” 所指代的是（）。","options":[{"label":"A","text":"客户的满意度"},{"label":"B","text":"客户的消费金额"},{"label":"C","text":"客户购买的频率"},{"label":"D","text":"最近一次购买时间间隔"}],"answer":"D","explanation":"RFM模型中，R代表了最近一次购买时间间隔，指用户最近一次消费时间距离现在的时间间隔，这个指标可以反映出客户的购买意愿。","mnemonic":"RFM的R=Recency=最近一次购买时间间隔选D"},{"id":230,"type":"single","text":"UAN 模型的核心特征是（）。","options":[{"label":"A","text":"强调通过复杂的图形化流程表示任务和行为"},{"label":"B","text":"使用符号语言描述用户行为、界面反馈和任务条件"},{"label":"C","text":"专注于描述多任务之间的并发与时序关系"},{"label":"D","text":"利用机器学习算法预测用户行为"}],"answer":"B","explanation":"UAN模型使用符号语言描述用户行为、界面反馈和任务条件控制。","mnemonic":"UAN用符号语言描述用户行为和界面反馈选B"},{"id":231,"type":"single","text":"贝叶斯算法是依据什么来进行推断和学习的（）。","options":[{"label":"A","text":"贝叶斯定理"},{"label":"B","text":"梯度下降"},{"label":"C","text":"极大似然估计"},{"label":"D","text":"最小化平方误差"}],"answer":"A","explanation":"贝叶斯算法基于贝叶斯定理进行推断和学习","mnemonic":"贝叶斯算法基于贝叶斯定理，同名同源选A"},{"id":232,"type":"single","text":"在神经网络里，下列类网络适合处理序列数据和时序信息（）。","options":[{"label":"A","text":"GAN(GenerativeAdversarialNetwork)"},{"label":"B","text":"MLP(Multi-LayerPerceptron)"},{"label":"C","text":"CNN(ConvolutionalNeuralNetwork)"},{"label":"D","text":"RNN(RecurrentNeuralNetwork)"}],"answer":"D","explanation":"RNN是一种适合处理序列数据和时序信息的神经网络","mnemonic":"RNN循环处理序列，R=Recurrent=时序选D"},{"id":233,"type":"single","text":"依据《中华人民共和国专利法》，下列（）专利不在保护范畴内。","options":[{"label":"A","text":"新发明的产品、方法和用途"},{"label":"B","text":"技术方案的实施方法"},{"label":"C","text":"科学探索的发现"},{"label":"D","text":"具有工业应用的创造性设计"}],"answer":"C","explanation":"专利法不保护科学发现、智力活动规则、疾病治疗方法等，但保护具工业应用的设计。","mnemonic":"科学发现≠专利，发现不是发明选C"},{"id":234,"type":"single","text":"对比分析的核心目的在于（）。","options":[{"label":"A","text":"寻找因果关系"},{"label":"B","text":"描述数据分布"},{"label":"C","text":"探索相关性"},{"label":"D","text":"比较差异"}],"answer":"D","explanation":"对比分析核心在于比较差异，揭示数据变化规律，常用于实验组对照组或时间序列数据。","mnemonic":"对比分析核心=比较差异，对比即比较选D"},{"id":235,"type":"single","text":"下列属于智能城市相关的项目有哪些（）。","options":[{"label":"A","text":"以上选择均正确"},{"label":"B","text":"施工占道识别"},{"label":"C","text":"垃圾桶溢满识别"},{"label":"D","text":"机动车违停识别"}],"answer":"A","explanation":"机动车违停识别、垃圾桶溢满识别、施工占道识别均属于智能城市的相关项目","mnemonic":"智能城市：违停+溢满+占道全算，选全部选A"},{"id":236,"type":"single","text":"对于专家型用户而言，菜单系统的响应速度应该具有以下哪项特点？（）","options":[{"label":"A","text":"快速响应"},{"label":"B","text":"缓慢响应"},{"label":"C","text":"慢慢响应"},{"label":"D","text":"无所谓响应速度"}],"answer":"A","explanation":"专家型用户需要快速响应的菜单系统以提高效率。","mnemonic":"专家用户要求快速响应，快快快选A"},{"id":237,"type":"single","text":"下列哪项因素有可能导致算法出现欠拟合（）。","options":[{"label":"A","text":"数据集的特征过于丰富"},{"label":"B","text":"模型训练时间过长"},{"label":"C","text":"训练数据量过大"},{"label":"D","text":"模型过于简单"}],"answer":"D","explanation":"模型过于简单无法捕捉数据规律，导致欠拟合。","mnemonic":"模型太简单→学不会→欠拟合选D"},{"id":238,"type":"single","text":"在业务数据的主要流转过程中，哪个环节会把数据转化为具有实际意义的看法和结论？","options":[{"label":"A","text":"数据的传输"},{"label":"B","text":"数据的分析"},{"label":"C","text":"数据的存储"},{"label":"D","text":"数据的收集"}],"answer":"B","explanation":"数据分析环节运用方法工具揭示数据模式，转化为有意义的见解。","mnemonic":"数据分析=将数据转化为有意义的结论选B"},{"id":239,"type":"single","text":"业务流程重组的主要目的在于（）。","options":[{"label":"A","text":"改变企业文化"},{"label":"B","text":"减少员工数量以降低成本"},{"label":"C","text":"在关键性能指标上获得巨大提高"},{"label":"D","text":"增加企业运营的复杂性"}],"answer":"C","explanation":"业务流程重组的主要目的是对企业进行根本的再思考和彻底的再设计，以求企业在关键的性能指标上获得巨大的提高","mnemonic":"BPR重组目的=关键性能指标大幅提升选C"},{"id":240,"type":"single","text":"运用多维度拆解分析方法时，通常会从哪个维度或者业务流程的维度进行拆解（）。","options":[{"label":"A","text":"业务解读"},{"label":"B","text":"业务分析"},{"label":"C","text":"标量分析"},{"label":"D","text":"指标构成"}],"answer":"D","explanation":"多维度拆解通常从指标构成或业务流程维度进行。","mnemonic":"多维度拆解从指标构成维度入手选D"},{"id":241,"type":"single","text":"在计算机的主要发展阶段里，以晶体管计算机为主要发展对象的是哪个阶段（）。","options":[{"label":"A","text":"第四阶段"},{"label":"B","text":"第三阶段"},{"label":"C","text":"第二阶段"},{"label":"D","text":"第一阶段"}],"answer":"C","explanation":"计算机的主要发展划分为四个时期，其中第二阶段（1958~1964年）标志着晶体管的出现，它取代了更大的真空管，使计算机更加小型化。","mnemonic":"晶体管=第二阶段(1958-1964)，二晶体选C"},{"id":242,"type":"single","text":"在图像去噪过程中，哪种方法能在去噪的同时有效保留边缘信息（）。","options":[{"label":"A","text":"双边滤波"},{"label":"B","text":"高斯滤波"},{"label":"C","text":"均值滤波"},{"label":"D","text":"中值滤波"}],"answer":"A","explanation":"双边滤波是一种非线性滤波方法，结合了空间距离和像素值差异，能够在去噪的同时有效保留图像的边缘信息","mnemonic":"双边滤波=空间+像素双重考量，保边去噪选A"},{"id":243,"type":"single","text":"通过降低图像中的高频噪声来提升图像质量的是（）。","options":[{"label":"A","text":"灰度级修正"},{"label":"B","text":"图像平滑"},{"label":"C","text":"图像锐化"},{"label":"D","text":"图像变换"}],"answer":"B","explanation":"图像平滑通过减少高频噪声提升图像质量，同时力求保留边缘信息。","mnemonic":"图像平滑=降低高频噪声提升质量选B"},{"id":244,"type":"single","text":"关于 UAN 模型的描述，下面哪一项是不正确的（）。","options":[{"label":"A","text":"UAN模型在表达多任务并发和复杂时序关系时可能会显得繁琐"},{"label":"B","text":"UAN模型能够通过预定义的符号表达用户的动作、界面元素的状态变化及任务的条件控制"},{"label":"C","text":"UAN模型仅能用于描述用户的行为，无法表达界面的状态变化"},{"label":"D","text":"UAN模型是一种符号语言，主要用于描述用户的行为序列及界面交互"}],"answer":"C","explanation":"UAN模型可描述用户行为及界面状态变化。","mnemonic":"UAN能描述用户行为也能描述界面状态变化，C说法错选C"},{"id":245,"type":"single","text":"下列哪项做法违背了严谨求是的原则（）。","options":[{"label":"A","text":"主观判断"},{"label":"B","text":"谨慎处理"},{"label":"C","text":"精确表达"},{"label":"D","text":"严密思考"}],"answer":"A","explanation":"过度主观的判断会导致不客观、不严谨，因此不符合严谨求是的原则","mnemonic":"主观判断违背严谨求是，主观≠客观选A"},{"id":246,"type":"single","text":"在逻辑回归里，决策边界的确定是通过将（）的输出与阈值作比较来实现的。","options":[{"label":"A","text":"余弦相似度函数"},{"label":"B","text":"对数损失函数"},{"label":"C","text":"Sigmoid函数"},{"label":"D","text":"线性回归函数"}],"answer":"C","explanation":"逻辑回归用Sigmoid函数输出概率，与阈值比较确定类别。","mnemonic":"逻辑回归用Sigmoid输出概率定边界选C"},{"id":247,"type":"single","text":"能够编写初级培训讲义并且开展知识与技术方面的培训，这一能力在中级培训流程中属于哪个步骤？（）","options":[{"label":"A","text":"业务分析"},{"label":"B","text":"智能训练"},{"label":"C","text":"培训与指导"},{"label":"D","text":"算法测试"}],"answer":"C","explanation":"能够编写初级培训讲义、开展知识和技术培训属于中级培训流程的培训与指导环节","mnemonic":"编写讲义开展培训=培训与指导环节选C"},{"id":248,"type":"single","text":"傅里叶变换的作用是将时域信号转换为（）。","options":[{"label":"A","text":"频域信号"},{"label":"B","text":"时域信号"},{"label":"C","text":"噪声信号"},{"label":"D","text":"滤波信号"}],"answer":"A","explanation":"傅里叶变换，则是将时域(Time Domain)信号转换为频域(FrequencyDomain)信号","mnemonic":"傅里叶变换：时域→频域，时频转换选A"},{"id":249,"type":"single","text":"哪一项内容体现了业务数据主要流程中对数据质量管理的描述？","options":[{"label":"A","text":"数据的传输和共享"},{"label":"B","text":"数据的清洗和预处理"},{"label":"C","text":"数据的分析和解释"},{"label":"D","text":"数据的收集和存储"}],"answer":"B","explanation":"数据的清洗和预处理是业务数据主要流程中涉及数据质量管理的步骤，它包括识别和纠正数据中的错误、缺失或不一致之处","mnemonic":"清洗预处理=数据质量管理，洗出好质量选B"},{"id":250,"type":"single","text":"中文分词中的未知词汇问题，是指一段文本里出现了系统词典中没有收录的新词，下列方法中不适合解决未知词汇问题的是（）。","options":[{"label":"A","text":"条件随机场"},{"label":"B","text":"基于字频统计的方法"},{"label":"C","text":"基于规则的方法"},{"label":"D","text":"基于深度学习的方法"}],"answer":"C","explanation":"规则分词方法依赖词典和规则，难以处理未登录词。","mnemonic":"基于规则靠词典，遇到新词就抓瞎选C"},{"id":251,"type":"single","text":"在遵章守法的基本要求里，下列哪项属于 “遵守法律法规” 的范畴（）。","options":[{"label":"A","text":"组织非法集会"},{"label":"B","text":"遵守相关职业法规"},{"label":"C","text":"随意破坏公共设施"},{"label":"D","text":"私自招摇撞骗"}],"answer":"B","explanation":"遵章守法的基本要求之一是“遵守宪法法律”，其中包括从事的领域和职业相关的法律法规","mnemonic":"遵守职业法规=遵章守法，B最正规选B"},{"id":252,"type":"single","text":"依据《中华人民共和国著作权法》，下列情形中不构成对著作权侵犯的是（）。","options":[{"label":"A","text":"剽窃他人作品"},{"label":"B","text":"未经著作权人许可，发表其作品的"},{"label":"C","text":"支付报酬后使用他人作品"},{"label":"D","text":"未经出版者许可，使用其出版的图书、期刊的版式设计"}],"answer":"C","explanation":"支付报酬后使用他人作品不侵权，其他行为均属侵权。","mnemonic":"付了钱用作品不侵权，付费即合法选C"},{"id":253,"type":"single","text":"下列哪一种交互方式属于第二代人机交互（GUI）技术中常见的，且在如今仍被广泛使用？（）","options":[{"label":"A","text":"语音命令"},{"label":"B","text":"虚拟助手"},{"label":"C","text":"鼠标控制"},{"label":"D","text":"面部识别"}],"answer":"C","explanation":"语音命令属于第三代人机交互技术，通常与自然语言处理和语音识别相关，而不是基于图形用户界面的交互方式。鼠标控制是第二代人机交互的标志性技术之一，早期的计算机操作主要依赖鼠标与图形用户界面（GUI）进行交互。面部识别是第三代人机交互的技术，属于生物识别范畴，不属于第二代交互方式。","mnemonic":"鼠标=第二代GUI交互标志，点击拖拽选C"},{"id":254,"type":"single","text":"在业务流程重组（BPR）中，下列哪一项不属于重组需遵循的原则（）。","options":[{"label":"A","text":"流程重组应减少客户的参与"},{"label":"B","text":"流程重组应体现服务重心前移原则"},{"label":"C","text":"业务流程体系要体现整体服务的思路"},{"label":"D","text":"流程重组始于对客户需求的深度理解与全面把握"}],"answer":"A","explanation":"流程重组需客户深度参与，减少参与违背原则。","mnemonic":"BPR要增加客户参与，减少参与违背原则选A"},{"id":255,"type":"single","text":"在业务流程重组（BPR）中，建模与仿真技术能起到什么作用（）。","options":[{"label":"A","text":"增加企业成本"},{"label":"B","text":"替代现有业务流程"},{"label":"C","text":"提高项目实施成功的概率"},{"label":"D","text":"直接提高企业绩效"}],"answer":"C","explanation":"建模与仿真技术在业务流程重组（BPR）中的主要作用是通过模拟和分析新流程的运行效果，提前发现潜在问题，优化流程设计，从而提高项目实施成功的概率（B）","mnemonic":"建模仿真提前发现问题，提高成功概率选C"},{"id":256,"type":"single","text":"作为一种基于统计学原理的算法，贝叶斯算法的核心思路是（）。","options":[{"label":"A","text":"基于神经网络模型，预测未来事件的概率"},{"label":"B","text":"基于经验和直觉，估计未来可能出现的事件的概率"},{"label":"C","text":"通过人工智能的学习和反馈机制，预测未来的人工智能发展趋势"},{"label":"D","text":"基于历史数据和假设，计算未来可能出现的事件的概率"}],"answer":"D","explanation":"贝叶斯算法基于历史数据计算未来事件概率。","mnemonic":"贝叶斯=历史数据+假设→计算未来概率选D"},{"id":257,"type":"single","text":"留出法、交叉验证法和自助法都是常用的模型评估方法，这几种方法的主要不同点体现在（）。","options":[{"label":"A","text":"适用场景不同"},{"label":"B","text":"评估指标不同"},{"label":"C","text":"训练集和测试集的划分方式不同"},{"label":"D","text":"样本数量不同"}],"answer":"C","explanation":"留出法、交叉验证法和自助法的主要区别在于它们如何划分训练集和测试集","mnemonic":"留出/交叉/自助区别在于训练测试集划分方式选C"},{"id":258,"type":"single","text":"在对比分析的过程中，选择合适的什么是极为关键的步骤（）。","options":[{"label":"A","text":"根节点"},{"label":"B","text":"数值"},{"label":"C","text":"父节点"},{"label":"D","text":"对比标准"}],"answer":"D","explanation":"在对比分析过程中，选择合适的对比标准是十分关键的步骤","mnemonic":"对比分析关键=选合适的对比标准选D"},{"id":259,"type":"single","text":"中文分词对哪项任务没有显著影响（）。","options":[{"label":"A","text":"图像处理"},{"label":"B","text":"情感分析"},{"label":"C","text":"命名实体识别"},{"label":"D","text":"文本分类"}],"answer":"A","explanation":"中文分词主要影响文本处理任务，对图像处理无显著影响。","mnemonic":"中文分词管文本不管图像，分词≠分图选A"},{"id":260,"type":"single","text":"以下哪项属于职业道德的功能之一（）。","options":[{"label":"A","text":"维护职业行业的垄断地位"},{"label":"B","text":"促进个人利益和发展"},{"label":"C","text":"提高个人财富"},{"label":"D","text":"保护公众利益和社会公正"}],"answer":"D","explanation":"职业道德的功能之一是维护公共利益和社会公正。","mnemonic":"职业道德保护公众利益和社会公正选D"},{"id":261,"type":"single","text":"不属于人机交互设计中的核心原则的是（）？","options":[{"label":"A","text":"橙皮书原则"},{"label":"B","text":"一致性原则"},{"label":"C","text":"反馈原则"},{"label":"D","text":"可见性原则"}],"answer":"A","explanation":"橙皮书原则与药品相关，非人机交互原则。","mnemonic":"橙皮书是药品标准，跟人机交互无关选A"},{"id":262,"type":"single","text":"在趋势分析法中，常用于展示数据趋势的是（）。","options":[{"label":"A","text":"柱状图"},{"label":"B","text":"散点图"},{"label":"C","text":"折线图"},{"label":"D","text":"饼图"}],"answer":"C","explanation":"折线图常用于展示数据的趋势，通过将数据点用折线连接起来，可以清晰地观察数据的变化趋势。","mnemonic":"趋势看折线图，折线显变化趋势选C"},{"id":263,"type":"single","text":"在电商领域，漏斗分析模型主要用于分析以下哪个流程（）。","options":[{"label":"A","text":"商品退货流程"},{"label":"B","text":"用户评论流程"},{"label":"C","text":"商品购买流程"},{"label":"D","text":"用户注册流程"}],"answer":"C","explanation":"电商漏斗模型是电商领域最常见的漏斗模型，主要用于分析用户从进入电商平台到完成支付的完整购物流程，通过监控每个层级上的用户转化，寻找可优化点，以提升整体购买转化率","mnemonic":"电商漏斗=商品购买流程，从浏览到支付选C"},{"id":264,"type":"single","text":"在人机交互领域，“以用户为中心的设计宗旨” 最核心的内容是（）。","options":[{"label":"A","text":"界面美观"},{"label":"B","text":"用户体验"},{"label":"C","text":"功能实用"},{"label":"D","text":"技术先进"}],"answer":"B","explanation":"“以用户为中心的设计”核心关注的是提升用户的整体使用体验，确保用户能够方便、高效地使用产品，且获得良好的感受和满意度。","mnemonic":"以用户为中心=用户体验最核心选B"},{"id":265,"type":"single","text":"K 折交叉验证的核心思路是（）。","options":[{"label":"A","text":"根据训练集和测试集的误差调整模型参数，直到误差最小化"},{"label":"B","text":"对训练集数据进行重复采样得到多个子集，每个子集用于训练和测试，最终将结果平均化"},{"label":"C","text":"将多个模型的输出结果加权融合，得到最终预测结果"},{"label":"D","text":"将数据集分为K个部分，每次将其中一个部分作为测试集，其余部分作为训练集，重复K次"}],"answer":"D","explanation":"K折交叉验证的基本思想是将数据集分为K个部分，每次将其中一个部分作为测试集，其余部分作为训练集，重复K次","mnemonic":"K折=分K份轮流当测试集，重复K次选D"},{"id":266,"type":"single","text":"下列选项中，属于键值存储的典型数据库是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Cassandra"},{"label":"C","text":"Redis"},{"label":"D","text":"MongoDB"}],"answer":"C","explanation":"Redis属于键值数据库；MySQL属于关系型数据库；Cassandra是列族数据库；MongoDB是文档数据库。","mnemonic":"Redis=键值存储，Re-dis=Key-Value选C"},{"id":267,"type":"single","text":"在人机交互的任务分析方法里，观察法的主要功能是（）。","options":[{"label":"A","text":"提高用户满意度"},{"label":"B","text":"监测用户行为"},{"label":"C","text":"确认用户需求"},{"label":"D","text":"收集用户反馈"}],"answer":"B","explanation":"观察法的核心作用是观察并分析用户行为、习惯和活动，因此这是最准确的选项，符合观察法的主要目的","mnemonic":"观察法=监测用户行为，观察即监测选B"},{"id":268,"type":"single","text":"PEST 模型在（）方面体现出对企业的帮助。","options":[{"label":"A","text":"通过技术升级直接降低生产成本"},{"label":"B","text":"增加销售渠道和客户贡献率"},{"label":"C","text":"提高产品质量和服务水平"},{"label":"D","text":"因地制宜、灵活应对市场变化"}],"answer":"D","explanation":"PEST模型分析有助于企业了解外部环境的情况，提前预判市场趋势，帮助企业因地制宜、灵活应对市场变化，提高市场竞争力","mnemonic":"PEST分析外部环境，帮企业灵活应对变化选D"},{"id":269,"type":"single","text":"按照劳动法的相关规定，劳动者若要解除劳动合同，需提前（）以书面形式告知用人单位。","options":[{"label":"A","text":"30日"},{"label":"B","text":"20日"},{"label":"C","text":"15日"},{"label":"D","text":"10日"}],"answer":"A","explanation":"劳动法规定劳动者解除劳动合同需提前30日书面通知用人单位。","mnemonic":"辞职提前30天书面通知，三十日记牢选A"},{"id":270,"type":"single","text":"下列哪个指标数值越大，表明聚类效果越好（）。","options":[{"label":"A","text":"计算准确率"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"熵权法"},{"label":"D","text":"DB指数"}],"answer":"B","explanation":"轮廓系数越大表示类内距离越小，类间距离越大，聚类效果越好","mnemonic":"轮廓系数越大聚类越好，轮廓清晰=好选B"},{"id":271,"type":"single","text":"下列哪项不是中级知识体系所涉及的知识点？（）","options":[{"label":"A","text":"智能系统维护"},{"label":"B","text":"标注数据审核"},{"label":"C","text":"数据采集"},{"label":"D","text":"实践教学方法"}],"answer":"D","explanation":"实践教学方法不属于中级知识体系中涉及到的知识点","mnemonic":"实践教学方法不属于中级知识体系选D"},{"id":272,"type":"single","text":"恪尽职守在基本要求上是怎样的（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"保守秘密"},{"label":"C","text":"高效执行"},{"label":"D","text":"忠诚和责任"}],"answer":"A","explanation":"职业守则中的\"恪尽职守\"基本要求指的是从业人员在履行职责和工作任务时应该尽职尽责，恪守岗位职责和道德准则","mnemonic":"恪尽职守=忠诚+高效+保密全都要选A"},{"id":273,"type":"single","text":"趋势分析法主要分析的是（ ）。","options":[{"label":"A","text":"随机数据"},{"label":"B","text":"非连续数据"},{"label":"C","text":"多期连续数据"},{"label":"D","text":"单一时点数据"}],"answer":"C","explanation":"趋势分析需多期连续数据支持。","mnemonic":"趋势分析需多期连续数据，多期看趋势选C"},{"id":274,"type":"single","text":"可实现图像的自适应阈值分割的函数是（）。","options":[{"label":"A","text":"filters.sobel"},{"label":"B","text":"active_contour"},{"label":"C","text":"adaptiveThreshold"},{"label":"D","text":"threshold"}],"answer":"C","explanation":"Python的 OpenCV库中提供函adaptiveThreshold用于实现图像的自适应阈值分割","mnemonic":"adaptiveThreshold=自适应阈值分割选C"},{"id":275,"type":"single","text":"以图像里局部灰度最大值点作为种子，依据孔隙区域中像素灰度分布的特性，持续向四周扩大种子点所在区域，让该区域尽可能接近完整的孔隙区域。这是（）的核心思路。","options":[{"label":"A","text":"基于k-means聚类的分割"},{"label":"B","text":"区域生长"},{"label":"C","text":"直方图均衡化"},{"label":"D","text":"基于阈值的分割"}],"answer":"B","explanation":"区域生长算法从种子点出发，根据灰度特性扩展区域。","mnemonic":"种子点向四周扩大=区域生长，种子发芽长大选B"},{"id":276,"type":"single","text":"列族数据库的核心特点是（）。","options":[{"label":"A","text":"基于内存的键值对高速读写"},{"label":"B","text":"以节点和边表示复杂关系"},{"label":"C","text":"按列簇组织数据，支持动态列扩展"},{"label":"D","text":"通过表结构（行和列）存储数据"}],"answer":"C","explanation":"列族数据库通过列簇动态扩展列，适合海量数据存储和高吞吐场景；通过表结构（行和列）存储数据是关系型数据库的特点；以节点和边表示复杂关系是图数据库的特点；基于内存的键值对高速读写是键值存储（如Redis）的特点","mnemonic":"列族数据库=按列簇组织+动态列扩展选C"},{"id":277,"type":"single","text":"随机森林算法中 “随机” 一词的含义是（）。","options":[{"label":"A","text":"随机选择训练样本子集和特征子集"},{"label":"B","text":"随机忽略部分特征的重要性"},{"label":"C","text":"随机选择决策树节点划分特征"},{"label":"D","text":"随机选择决策树节点划分阈值"}],"answer":"A","explanation":"随机森林的“随机”体现在Bootstrap抽样和随机特征选择，增强多样性，减少过拟合。","mnemonic":"随机森林的随机=随机样本+随机特征双随机选A"},{"id":278,"type":"single","text":"当运用逻辑回归对大规模数据集进行二元分类时，最适合用于优化模型参数的方法是（）。","options":[{"label":"A","text":"广义极大似然估计"},{"label":"B","text":"牛顿法"},{"label":"C","text":"最小二乘法"},{"label":"D","text":"随机梯度下降"}],"answer":"D","explanation":"随机梯度下降适合大规模数据二元分类的参数优化。","mnemonic":"大规模数据优化参数用随机梯度下降SGD选D"},{"id":279,"type":"single","text":"对比分析主要有哪两种形式（）。","options":[{"label":"A","text":"绝对数比较、相对数比较"},{"label":"B","text":"问题因素的名称"},{"label":"C","text":"相反数比较"},{"label":"D","text":"问题因素的数量"}],"answer":"A","explanation":"对比分析主要有绝对数比较和相对数比较两种形式。","mnemonic":"对比分析=绝对数比较+相对数比较两种选A"},{"id":280,"type":"single","text":"下列关于劳动合同的履行与变更的说法，不正确的是（）。","options":[{"label":"A","text":"用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报酬"},{"label":"B","text":"用人单位发生合并或者分立等情况，原劳动合同无效，需重新签订"},{"label":"C","text":"用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响劳动合同的履行"},{"label":"D","text":"用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务"}],"answer":"B","explanation":"《中华人民共和国劳动合同法》第二十九条规定，用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务。第三十条规定，用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报酬。第三十三条规定，用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响劳动合同的履行。第三十四条规定，用人单位发生合并或者分立等情况，原劳动合同继续有效，劳动合同由承继其权利和义务的用人单位继续履行。","mnemonic":"合并分立原合同继续有效，不用重签选B"},{"id":281,"type":"single","text":"下列哪一项属于中级培训的知识点（）。","options":[{"label":"A","text":"培训与指导"},{"label":"B","text":"算法测试"},{"label":"C","text":"智能系统优化"},{"label":"D","text":"人机交互程序设计"}],"answer":"C","explanation":"智能系统优化是中级培训的知识点。","mnemonic":"智能系统优化属于中级培训知识点选C"},{"id":282,"type":"single","text":"用于去除椒盐噪声的算法是（）。","options":[{"label":"A","text":"双边滤波"},{"label":"B","text":"高斯滤波"},{"label":"C","text":"均值滤波"},{"label":"D","text":"中值滤波"}],"answer":"D","explanation":"中值滤波能有效去除椒盐噪声。","mnemonic":"椒盐噪声用中值滤波，中值去椒盐选D"},{"id":283,"type":"single","text":"高性能计算（HPC）所支持的并行负载，其常见使用场景中不包括的是（）。","options":[{"label":"A","text":"上下文搜索"},{"label":"B","text":"交通管理"},{"label":"C","text":"分子建模"},{"label":"D","text":"风险模拟"}],"answer":"B","explanation":"高性能计算支持的并行负载场景包括风险模拟、分子建模等，交通管理属于紧密耦合负载。","mnemonic":"HPC并行负载不含交通管理，交通是紧耦合选B"},{"id":284,"type":"single","text":"在对用户进行分类时，专家型用户通常具有哪些特点？（）","options":[{"label":"A","text":"只关注产品的外观和品牌形象。"},{"label":"B","text":"需要大量指导才能完成基本操作。"},{"label":"C","text":"对产品非常熟悉，能够高效使用其所有功能。"},{"label":"D","text":"使用频率低，但对产品有较强的需求。"}],"answer":"C","explanation":"专家型用户是高度熟练的用户，对产品非常熟悉，能够充分利用其所有功能，甚至发现并利用一些隐藏的高级功能","mnemonic":"专家型用户=非常熟悉+高效使用全部功能选C"},{"id":285,"type":"single","text":"以下哪一种交互方式最能体现第三代人机交互技术的特点？（）","options":[{"label":"A","text":"使用鼠标点击图标和按钮进行操作"},{"label":"B","text":"通过语音命令控制设备，进行操作"},{"label":"C","text":"使用虚拟键盘输入文字"},{"label":"D","text":"通过触摸屏滑动手指操作设备"}],"answer":"B","explanation":"语音命令控制最能体现第三代人机交互的自然和直观特点。","mnemonic":"语音命令=第三代人机交互，自然交互选B"},{"id":286,"type":"single","text":"若要转让专利申请权或专利权，当事人之间应当订立何种形式的协议（）。","options":[{"label":"A","text":"书面合同"},{"label":"B","text":"口头协商"},{"label":"C","text":"手写合同"},{"label":"D","text":"证明字条"}],"answer":"A","explanation":"根据《中华人民共和国专利法》第十条规定，专利申请权和专利权可以转让","mnemonic":"专利转让必须书面合同，白纸黑字选A"},{"id":287,"type":"single","text":"SmartArt 工具能够实现哪些功能（）。","options":[{"label":"A","text":"添加多媒体文件到演示文稿"},{"label":"B","text":"将逻辑关系视觉化呈现"},{"label":"C","text":"获取分数和百分比"},{"label":"D","text":"分类和算数"}],"answer":"B","explanation":"SmartArt工具将逻辑关系视觉化呈现，提升信息传达速率","mnemonic":"SmartArt=逻辑关系视觉化呈现选B"},{"id":288,"type":"single","text":"GOMS 模型无法考虑到哪些因素？","options":[{"label":"A","text":"心理特征"},{"label":"B","text":"交互细节"},{"label":"C","text":"个体差异"},{"label":"D","text":"人类记忆机制"}],"answer":"C","explanation":"GOMS模型无法考虑个体差异，但涵盖心理特征和交互细节。","mnemonic":"GOMS不考虑个体差异，假设用户一样选C"},{"id":289,"type":"single","text":"追求卓越的基本要求中，“高标准要求” 具体体现在哪些方面（）。","options":[{"label":"A","text":"追逐权力和地位"},{"label":"B","text":"避免参加培训活动"},{"label":"C","text":"对工作质量要求更高"},{"label":"D","text":"忽略工作细节"}],"answer":"C","explanation":"追求卓越的基本要求中，“高标准要求”体现在树立高标准的要求，并努力追求卓越，对工作质量、专业知识和技能要求更高，在每一个工作环节都追求卓越表现","mnemonic":"追求卓越高标准=对工作质量要求更高选C"},{"id":290,"type":"single","text":"下列哪项不符合恪尽职守的基本要求（）。","options":[{"label":"A","text":"持续发展专业知识和技能"},{"label":"B","text":"保护公司机密"},{"label":"C","text":"尊重他人权益"},{"label":"D","text":"不遵守工作时间，迟到早退"}],"answer":"D","explanation":"尊重他人权益、保护公司机密、持续发展专业知识和技能均符合恪尽职守的基本要求；不遵守工作时间，迟到早退不符合恪尽职守的基本要求","mnemonic":"迟到早退≠恪尽职守，不守时不尽职选D"},{"id":291,"type":"single","text":"5W2H 模型通常被应用于（）。","options":[{"label":"A","text":"项目管理行业"},{"label":"B","text":"人力资源管理行业"},{"label":"C","text":"营销推广行业"},{"label":"D","text":"生产制造行业"}],"answer":"A","explanation":"5W2H模型可以用于项目管理中，在制定项目计划时，通过5W2H全面地梳理项目的各个要素，能够确保项目目标明确、人员分工合理、时间安排紧凑、资源配置有效","mnemonic":"5W2H用于项目管理，谁何时何地做什么选A"},{"id":292,"type":"single","text":"能够把文本数据转换为稀疏向量表示的是（）。","options":[{"label":"A","text":"One-hot模型"},{"label":"B","text":"Transformer模型"},{"label":"C","text":"LSTM模型"},{"label":"D","text":"Word2Vec模型"}],"answer":"A","explanation":"One-hot模型将文本表示为稀疏向量，每个词对应一个独热编码。","mnemonic":"One-hot=独热编码=稀疏向量，一热即稀疏选A"},{"id":293,"type":"single","text":"在行为模型的交互流程中，下列哪项描述了行为模型与环境之间进行信息交换的方式？","options":[{"label":"A","text":"决策树的建立和优化"},{"label":"B","text":"强化学习的奖励函数"},{"label":"C","text":"学习算法的选择"},{"label":"D","text":"观察-行动-评估循环"}],"answer":"D","explanation":"观察-行动-评估循环是描述行为模型与环境之间信息交流的方法","mnemonic":"行为模型与环境交互=观察-行动-评估循环选D"},{"id":294,"type":"single","text":"高斯滤波采用了什么对数字图像进行滤波操作（）。","options":[{"label":"A","text":"高斯函数"},{"label":"B","text":"中值滤波函数"},{"label":"C","text":"拉普拉斯函数"},{"label":"D","text":"边缘检测函数"}],"answer":"A","explanation":"高斯滤波使用高斯函数进行图像平滑，能保留边缘但可能导致模糊。","mnemonic":"高斯滤波用高斯函数，同名同函数选A"},{"id":295,"type":"single","text":"下列哪项不符合恪尽职守的基本要求（）。","options":[{"label":"A","text":"持续发展专业知识和技能"},{"label":"B","text":"保护公司机密"},{"label":"C","text":"尊重他人权益"},{"label":"D","text":"不遵守工作时间，迟到早退"}],"answer":"D","explanation":"尊重他人权益、保护公司机密、持续发展专业知识和技能均符合恪尽职守的基本要求；不遵守工作时间，迟到早退不符合恪尽职守的基本要求","mnemonic":"迟到早退不符合恪尽职守，守时=守职选D"},{"id":296,"type":"single","text":"（）不属于 Canny 算子边缘检测的主要流程。","options":[{"label":"A","text":"滞后阈值"},{"label":"B","text":"计算幅值和方向"},{"label":"C","text":"梯度锐化"},{"label":"D","text":"滤波减噪"}],"answer":"C","explanation":"Canny算子边缘检测的主要流程包括滤波减噪、计算幅值和方向、非极大值抑制、滞后阈值等","mnemonic":"Canny流程无梯度锐化，有滤波+幅值+抑制+阈值选C"},{"id":297,"type":"single","text":"业务流程重组（BPR）中的组织重组，包含哪一项内容（）。","options":[{"label":"A","text":"充分发挥信息技术（IT）的潜能，利用IT改造企业过程"},{"label":"B","text":"建立流程管理机构，明确其权责范围，制定各流程内部的运转规则与各流程之间的关系规则，逐步用流程管理图取代传统企业中的组织机构图，实现组织结构扁平化"},{"label":"C","text":"对企业的现有流程进行调研分析、诊断、再设计"},{"label":"D","text":"变革基本信念、转变经营机制、重建组织文化"}],"answer":"B","explanation":"组织重组包括建立流程管理机构，明确权责，以流程管理图替代组织机构图。","mnemonic":"组织重组=建流程管理机构+扁平化选B"},{"id":298,"type":"single","text":"下列哪一项不在智慧商场的功能范围之内？","options":[{"label":"A","text":"智能安防"},{"label":"B","text":"智能支付"},{"label":"C","text":"智能导购"},{"label":"D","text":"智能医疗"}],"answer":"D","explanation":"智慧商场的功能包括智能导购、智能支付、智能安防等，不涉及医疗功能","mnemonic":"智慧商场不含智能医疗，商场≠医院选D"},{"id":299,"type":"single","text":"下列哪项是可以读取 csv 文件的方法（）。","options":[{"label":"A","text":"read_json()"},{"label":"B","text":"read_excel()"},{"label":"C","text":"read_csv()"},{"label":"D","text":"sql_file.read()"}],"answer":"C","explanation":"pandas中的read_csv()方法可以读取本地的文本文件，该方法读取的文件格式是csv","mnemonic":"read_csv()读csv文件，csv对csv选C"},{"id":300,"type":"single","text":"在解决欠拟合的方法中，下列哪项属于基于增加特征的方法（）。","options":[{"label":"A","text":"L2正则化"},{"label":"B","text":"Dropout"},{"label":"C","text":"使用多项式特征"},{"label":"D","text":"数据增强"}],"answer":"C","explanation":"欠拟合的主要原因之一是特征过少，增加特征可以有效缓解欠拟合问题。","mnemonic":"欠拟合加特征，多项式特征增加复杂度选C"},{"id":301,"type":"single","text":"下列哪项不是解决算法过拟合的常用方法（）。","options":[{"label":"A","text":"增加模型层数"},{"label":"B","text":"剪枝"},{"label":"C","text":"正则化"},{"label":"D","text":"交叉验证"}],"answer":"A","explanation":"增加模型层数提高复杂度，加剧过拟合，非解决措施。","mnemonic":"增加层数=增加复杂度=加剧过拟合，不是解决方法选A"},{"id":302,"type":"single","text":"在业务流程重组（BPR）中，以下哪项关键成功因素最有利于保证项目顺利实施（）。","options":[{"label":"A","text":"减少跨部门沟通"},{"label":"B","text":"强化员工对变革的恐惧感"},{"label":"C","text":"确保流程设计符合客户需求"},{"label":"D","text":"增加项目实施的复杂性"}],"answer":"C","explanation":"在业务流程重组（BPR）中，确保流程设计符合客户需求（B选项）是确保项目顺利实施的关键成功因素之一","mnemonic":"BPR关键成功=符合客户需求，客户至上选C"},{"id":303,"type":"single","text":"场景分析法是一种将（）作为核心研究对象的分析方式。","options":[{"label":"A","text":"用户行为"},{"label":"B","text":"系统界面"},{"label":"C","text":"信息传输"},{"label":"D","text":"软件设计"}],"answer":"A","explanation":"场景分析法关注的是用户的行为、目标和使用环境，帮助理解任务的实际需求，从而更好地设计系统和界面，提升用户体验和系统的可用性。","mnemonic":"场景分析法=场景中\"人\"怎么做，核心是用户行为选A"},{"id":304,"type":"single","text":"在人机交互中，用户体验设计的主要宗旨是什么？","options":[{"label":"A","text":"提升品牌形象"},{"label":"B","text":"降低生产成本"},{"label":"C","text":"提高系统性能"},{"label":"D","text":"增加用户满意度"}],"answer":"D","explanation":"用户体验设计中，提升用户在使用产品或服务过程中的满意度和愉悦感是其主要目标","mnemonic":"用户体验设计=\"用户满意\"是宗旨，体验好=满意度高选D"},{"id":305,"type":"single","text":"从网络上采集数据时，通常需要经历哪些步骤？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"采集环境测试"},{"label":"C","text":"网站的源代码分析"},{"label":"D","text":"确定数据采集的目标网站"}],"answer":"A","explanation":"网络数据采集的一般步骤包括确定数据采集的目标网站、网站的源代码分析、编写代码、采集环境测试、数据采集、数据存储","mnemonic":"网络采集步骤：定目标、析源码、写代码、测环境，全都要选A"},{"id":306,"type":"single","text":"AARRR 模型中的第一个 \"R\" 代表的是（）。","options":[{"label":"A","text":"留存"},{"label":"B","text":"获客"},{"label":"C","text":"收益"},{"label":"D","text":"传播"}],"answer":"A","explanation":"AARRR模型的第一个R表示用户留存（Retention）。","mnemonic":"AARRR=获客激活留存收益传播，第一个R=Retention留存选A"},{"id":307,"type":"single","text":"在机器学习领域，当出现（）情况时，说明算法发生了过拟合。","options":[{"label":"A","text":"训练集的误差和测试集的误差都很小"},{"label":"B","text":"训练集和测试集的误差都很大"},{"label":"C","text":"训练集的误差很小，但测试集的误差很大"},{"label":"D","text":"训练集和测试集的误差相差很小"}],"answer":"C","explanation":"过拟合表现为训练误差小、测试误差大。","mnemonic":"过拟合=训练好测试差，\"考试抄会了原题不会变题\"选C"},{"id":308,"type":"single","text":"开展特征选择工作能够（）。","options":[{"label":"A","text":"避免算法过拟合"},{"label":"B","text":"减少算法过拟合"},{"label":"C","text":"增加算法过拟合"},{"label":"D","text":"增加模型复杂度"}],"answer":"B","explanation":"特征选择可以剔除无关变量，降低模型复杂度，减少过拟合的风险。","mnemonic":"特征选择=去冗余=减少过拟合，注意是\"减少\"不是\"避免\"选B"},{"id":309,"type":"single","text":"下列哪项方法常被用于中文分词任务（）。","options":[{"label":"A","text":"深度神经网络算法"},{"label":"B","text":"支持向量机算法"},{"label":"C","text":"随机森林算法"},{"label":"D","text":"最大匹配法"}],"answer":"D","explanation":"最大匹配法常用于中文分词任务","mnemonic":"中文分词经典方法=最大匹配法，\"最大\"配\"分词\"选D"},{"id":310,"type":"single","text":"在 SWOT 模型里，字母 “S” 所对应的含义是（）。","options":[{"label":"A","text":"Success"},{"label":"B","text":"Serenity"},{"label":"C","text":"Strong"},{"label":"D","text":"Strengths"}],"answer":"D","explanation":"SWOT模型中的“S”代表Strengths（优势）。","mnemonic":"SWOT的S=Strengths优势，记住完整单词有s结尾选D"},{"id":311,"type":"single","text":"下列能从 WAV 文件中读取语音数据的函数是（）。","options":[{"label":"A","text":"librosa.load_wav()"},{"label":"B","text":"librosa.load()"},{"label":"C","text":"librosa.load_audio()"},{"label":"D","text":"librosa.read_wav()"}],"answer":"B","explanation":"librosa.load()是librosa库中的函数，用于从WAV文件（或其他音频文件格式）中读取音频数据，并返回音频数据和采样率。","mnemonic":"librosa读音频=librosa.load()，最简洁的名字选B"},{"id":312,"type":"single","text":"以图像里局部灰度最大值点作为种子，依据孔隙区域中像素灰度分布的特性，持续向四周扩大种子点所在区域，让该区域尽可能接近完整的孔隙区域。这是（）的核心思路。","options":[{"label":"A","text":"基于k-means聚类的分割"},{"label":"B","text":"区域生长"},{"label":"C","text":"直方图均衡化"},{"label":"D","text":"基于阈值的分割"}],"answer":"B","explanation":"区域生长算法从种子点出发，根据灰度特性扩展区域。","mnemonic":"种子扩展=区域生长，种子发芽往外\"长\"选B"},{"id":313,"type":"single","text":"下列哪项属于造成模型欠拟合的原因（）。","options":[{"label":"A","text":"样本标签噪声"},{"label":"B","text":"算法选择不当"},{"label":"C","text":"特征选择恰当"},{"label":"D","text":"特征维度过高"}],"answer":"B","explanation":"模型复杂度过于简单是导致欠拟合的直接因素。最常见的为选择不适合数据特性的算法导致欠拟合。模型过于简单，例如使用线性模型处理非线性关系，模型无法捕捉数据中的复杂规律，导致欠拟合。","mnemonic":"欠拟合=模型太简单，算法选择不当导致模型简单选B"},{"id":314,"type":"single","text":"留出法与交叉验证法的不同点在于（）。","options":[{"label":"A","text":"留出法只使用训练集训练模型，交叉验证法同时使用训练集和测试集训练模型"},{"label":"B","text":"留出法不考虑数据分布的问题，交叉验证法考虑数据分布"},{"label":"C","text":"留出法只适用于二分类问题，交叉验证法适用于多分类问题"},{"label":"D","text":"留出法基于单次划分，但往往需多次随机划分取平均，交叉验证法通过k折结构系统划分"}],"answer":"D","explanation":"留出法和交叉验证法都是常用的模型评估方法，不同之处在于留出法只划分一次数据集，将数据集分为训练集和测试集，最终的模型评估结果的平均值就是测试集的评估结果，由于单次划分可能导致结果波动（如不同随机种子影响），实际应用中需通过​​多次随机划分并取平均​​（如100次）提升稳定性","mnemonic":"留出法单次划分多次取均，交叉验证k折系统划分选D"},{"id":315,"type":"single","text":"下列关于留出法的适用条件描述正确的是（ ）。","options":[{"label":"A","text":"适合处理数据量极大且无法完整加载到内存的场景"},{"label":"B","text":"可以通过分层采样保持训练/测试集的数据分布一致性"},{"label":"C","text":"对包含不同类别样本数量的数据集具有天然适应性"},{"label":"D","text":"能有效处理存在大量缺失值的原始数据"}],"answer":"B","explanation":"留出法适用于中小规模数据集，对于极大、缺失或不均衡数据可能效果不佳。","mnemonic":"留出法可分层采样保持分布一致性选B"},{"id":316,"type":"single","text":"下列哪项属于 ETL 数据整合工具的主要特性之一（）。","options":[{"label":"A","text":"数据安全和权限管理功能"},{"label":"B","text":"数据清洗和转换功能"},{"label":"C","text":"数据可视化和报表生成功能"},{"label":"D","text":"数据备份和恢复功能"}],"answer":"B","explanation":"ETL（抽取、转换、加载）数据整合工具的主要任务是从不同的数据源中抽取数据，进行清洗和转换，最后加载到目标数据仓库或目标系统中","mnemonic":"ETL=Extract抽取Transform转换Load加载，核心是清洗转换选B"},{"id":317,"type":"single","text":"高性能计算（HPC）所支持的并行负载，其常见使用场景中不包括的是（）。","options":[{"label":"A","text":"上下文搜索"},{"label":"B","text":"交通管理"},{"label":"C","text":"分子建模"},{"label":"D","text":"风险模拟"}],"answer":"B","explanation":"高性能计算支持的并行负载场景包括风险模拟、分子建模等，交通管理属于紧密耦合负载。","mnemonic":"HPC并行负载：风险模拟、分子建模，交通管理不在列选B"},{"id":318,"type":"single","text":"在 Python 里使用 thulac 中文分词工具时，哪个参数能在模型初始化时载入用户自己定义的词典（）。","options":[{"label":"A","text":"tf-idf"},{"label":"B","text":"user_dict"},{"label":"C","text":"cut_all"},{"label":"D","text":"HMM"}],"answer":"B","explanation":"thulac参数user_dict支持加载用户自定义词典。","mnemonic":"thulac加载自定义词典=user_dict，用户词典选B"},{"id":319,"type":"single","text":"（）不属于 Canny 算子边缘检测的主要流程。","options":[{"label":"A","text":"滞后阈值"},{"label":"B","text":"计算幅值和方向"},{"label":"C","text":"梯度锐化"},{"label":"D","text":"滤波减噪"}],"answer":"C","explanation":"Canny算子边缘检测的主要流程包括滤波减噪、计算幅值和方向、非极大值抑制、滞后阈值等","mnemonic":"Canny流程：滤波→幅值方向→非极大值抑制→滞后阈值，没有梯度锐化选C"},{"id":320,"type":"single","text":"什么是聚类分析（）。","options":[{"label":"A","text":"对数据进行时序分析的一种方法"},{"label":"B","text":"对数据进行因果分析的一种方法"},{"label":"C","text":"对数据进行回归分析的一种方法"},{"label":"D","text":"对数据进行分组的一种方法"}],"answer":"D","explanation":"聚类分析是一种对数据进行分组的方法，其目的是将具有相似特征的数据点聚集到一起，从而形成不同的类别","mnemonic":"聚类=\"聚在一起分组\"，分组方法选D"},{"id":321,"type":"single","text":"神经网络中，（）机制是专门用来解决梯度消失问题的。","options":[{"label":"A","text":"残差连接"},{"label":"B","text":"批归一化"},{"label":"C","text":"初始化权重"},{"label":"D","text":"激活函数选择"}],"answer":"A","explanation":"残差连接通过跨层加法缓解梯度消失问题。","mnemonic":"残差连接=跨层捷径=专治梯度消失，ResNet的核心选A"},{"id":322,"type":"single","text":"业务流程重组（BPR）与信息技术（IT）之间的关系可以怎样描述（）。","options":[{"label":"A","text":"BPR完全依赖于IT"},{"label":"B","text":"BPR与IT相互独立"},{"label":"C","text":"BPR在某些情况下可以独立于IT"},{"label":"D","text":"BPR和IT是完全相同的概念"}],"answer":"C","explanation":"业务流程重组（BPR）可以独立于信息技术（IT）而存在，但这种独立是相对的。在BPR实施过程中，IT作为技术工具，可以促进BPR的实施，起到催化剂的作用。因此，选项C正确描述了BPR与IT之间的关系。选项A、B和D都没有准确反映这种关系。","mnemonic":"BPR可独立于IT但IT是催化剂，\"某些情况下可独立\"选C"},{"id":323,"type":"single","text":"下列哪项方法能够通过提高模型复杂度来解决欠拟合问题（）。","options":[{"label":"A","text":"使用简单的优化算法"},{"label":"B","text":"增加特征选择的算法复杂度"},{"label":"C","text":"增加隐含层数量"},{"label":"D","text":"增加正则化项"}],"answer":"C","explanation":"增加隐含层数量提高复杂度缓解欠拟合。","mnemonic":"欠拟合→加复杂度→增加隐含层数量选C"},{"id":324,"type":"single","text":"时间管理四象限法则中，是由（）来确定划分出的四个象限。","options":[{"label":"A","text":"根据坐标轴分别划分成上下左右四个象限"},{"label":"B","text":"根据事情的重要和紧急程度划分"},{"label":"C","text":"根据同类数据的排名决定划分"},{"label":"D","text":"根据数据的变化趋势决定划分"}],"answer":"B","explanation":"时间管理四象限法则根据任务的重要和紧急程度划分优先级。","mnemonic":"四象限法则=重要+紧急两个维度划分选B"},{"id":325,"type":"single","text":"NoSQL 集群借助数据复制和分片来提高系统性能与可靠性，以下选项中能正确描述这两种机制主要作用的是（）。","options":[{"label":"A","text":"数据复制用于横向扩展存储容量，数据分片用于提高数据一致性。"},{"label":"B","text":"数据复制用于减少网络延迟，数据分片用于支持复杂事务。"},{"label":"C","text":"数据复制用于提高读取速度和容错性，数据分片用于实现数据的横向扩展。"},{"label":"D","text":"数据复制和分片均用于增强数据的安全性和加密存储。"}],"answer":"C","explanation":"NoSQL集群通过数据复制提高容错性和读取速度，通过数据分片实现横向扩展。","mnemonic":"复制=容错+读快，分片=横向扩展，记\"复容分扩\"选C"},{"id":326,"type":"single","text":"劳动者若在非试用期内要解除劳动合同，需提前多长时间以书面形式告知用人单位（）。","options":[{"label":"A","text":"30日"},{"label":"B","text":"20日"},{"label":"C","text":"15日"},{"label":"D","text":"10日"}],"answer":"A","explanation":"非试用期解除劳动合同需提前30日书面通知，试用期提前3日通知。","mnemonic":"非试用期辞职提前30日书面通知，\"三十而立要走人\"选A"},{"id":327,"type":"single","text":"从一系列业务行为中提炼出来的信息集合被称为（）。","options":[{"label":"A","text":"业务标量"},{"label":"B","text":"业务分析方法论"},{"label":"C","text":"业务指标"},{"label":"D","text":"业务模型"}],"answer":"D","explanation":"业务模型是从一系列业务行为中抽象出来的信息集合，学会应用业务模型有助于我们从整体上把握业务问题","mnemonic":"业务行为提炼的信息集合=业务模型，\"模型\"是抽象集合选D"},{"id":328,"type":"single","text":"人机交互的发展没有经历过哪个阶段？","options":[{"label":"A","text":"早期的手工作业阶段"},{"label":"B","text":"语音识别阶段"},{"label":"C","text":"图形用户界面(GU)阶段"},{"label":"D","text":"多通道、多媒体的智能人机交互阶段"}],"answer":"B","explanation":"人机交互发展经历了手工作业、命令语言、图形界面、网络界面到智能交互阶段，未经历语音识别阶段。","mnemonic":"人机交互发展没经历语音识别阶段，B是干扰项选B"},{"id":329,"type":"single","text":"下列哪项不属于业务分析方法论（）。","options":[{"label":"A","text":"因果分析方法"},{"label":"B","text":"同期群分析方法"},{"label":"C","text":"帕拉梅拉分析方法"},{"label":"D","text":"A/B测试分析方法"}],"answer":"C","explanation":"帕拉梅拉分析不是业务分析方法，其他选项是常用方法。","mnemonic":"帕拉梅拉是车不是分析方法，排除虚假选项选C"},{"id":330,"type":"single","text":"下列大数据存储技术以可扩展性作为核心设计目标，通常会牺牲一致性，且采用非标准化的低层次查询接口的是（）。","options":[{"label":"A","text":"分布式文件系统"},{"label":"B","text":"NoSQL数据库"},{"label":"C","text":"NewSQL数据库"},{"label":"D","text":"大数据查询平台"}],"answer":"B","explanation":"NoSQL数据库优先考虑可扩展性，可能降低一致性，并使用非标准化查询，增加与传统SQL应用的集成难度。","mnemonic":"NoSQL=可扩展优先+牺牲一致性+非标准查询选B"},{"id":331,"type":"single","text":"业务分析方法的核心内容是（）。","options":[{"label":"A","text":"业务指标分析方法"},{"label":"B","text":"业务信息分析"},{"label":"C","text":"系统化业务流程"},{"label":"D","text":"业务量化分析"}],"answer":"A","explanation":"业务指标分析方法是业务分析方法的核心内容","mnemonic":"业务分析方法核心=业务指标分析方法选A"},{"id":332,"type":"single","text":"多维度拆解分析法是从哪些方面去剖析事物原本的 “面貌”（）。","options":[{"label":"A","text":"多个唯独"},{"label":"B","text":"多个围度"},{"label":"C","text":"多个纬度"},{"label":"D","text":"多个维度"}],"answer":"D","explanation":"多维度拆解分析法就是从多个维度去分析事物本来的“面貌”","mnemonic":"多维度拆解的\"维度\"=正确写法，其他是错别字选D"},{"id":333,"type":"single","text":"在业务流程重组工作中，简化过程所追求的战略目标是（）。","options":[{"label":"A","text":"增加流程的控制点"},{"label":"B","text":"增加流程的检查和校对"},{"label":"C","text":"精简分散的过程"},{"label":"D","text":"增加流程的复杂性"}],"answer":"C","explanation":"简化过程的战略目标是精简分散的过程（B），以提高效率和减少冗余。","mnemonic":"BPR简化过程=精简分散的过程，化繁为简选C"},{"id":334,"type":"single","text":"人机交互中的自适应系统能够增强用户体验，下列哪项不属于自适应系统的优势？","options":[{"label":"A","text":"提高任务执行的效率"},{"label":"B","text":"增加系统的复杂性"},{"label":"C","text":"减少用户的操作错误"},{"label":"D","text":"提供个性化的用户体验"}],"answer":"B","explanation":"自适应系统提供个性化体验并提高效率，不提供个性化体验并提高效率，不增加复杂性。","mnemonic":"自适应系统增强体验不增加复杂性，复杂性是缺点不是优势选B"},{"id":335,"type":"single","text":"“类别不平衡” 是数据标注时需关注的难点之一，它具体指的是什么？（）","options":[{"label":"A","text":"标注数据中存在标注错误的情况"},{"label":"B","text":"标注数据中同一类别中的样本标注结果不一致"},{"label":"C","text":"标注数据中同一类别中的样本数量差异较大"},{"label":"D","text":"标注数据中不同类别的数量分布不均匀"}],"answer":"D","explanation":"类别不平衡指数据中各类样本数量不均。","mnemonic":"类别不平衡=不同类别数量分布不均匀，强调\"类间\"差异选D"},{"id":336,"type":"single","text":"下列选项中，不属于数据存储介质的是（）。","options":[{"label":"A","text":"固态硬盘"},{"label":"B","text":"CPU"},{"label":"C","text":"光盘"},{"label":"D","text":"硬盘"}],"answer":"B","explanation":"CPU是处理器，非存储介质；硬盘、光盘等是存储介质。","mnemonic":"CPU是处理器不是存储介质，\"处理≠存储\"选B"},{"id":337,"type":"single","text":"若要修改幻灯片母版的背景样式，可通过什么方式实现（）。","options":[{"label":"A","text":"在“幻灯片母版”选项卡的“背景”选项中选择“背景样式”，然后选择需要的颜色或图片"},{"label":"B","text":"在“插入”选项卡中选择“背景”，然后选择需要的样式"},{"label":"C","text":"在“格式”选项卡中选择“背景”，然后选择需要的样式"},{"label":"D","text":"在“视图”选项卡中选择“母版视图”，然后选择“背景”"}],"answer":"A","explanation":"修改幻灯片母版背景需在“幻灯片母版”选项卡的“背景”选项中设置颜色或图片。","mnemonic":"修改母版背景→\"幻灯片母版\"选项卡→背景选项选A"},{"id":338,"type":"single","text":"下面哪一项不是人机交互中常见的用户特点？（）","options":[{"label":"A","text":"知识储备丰富"},{"label":"B","text":"精细动作能力差"},{"label":"C","text":"对系统的依赖度低"},{"label":"D","text":"专注度高"}],"answer":"C","explanation":"在用户分类中，对系统的依赖度低通常不属于人机交互中常见的用户特点","mnemonic":"\"对系统依赖度低\"不是常见用户特点选C"},{"id":339,"type":"single","text":"对于阈值化处理，能使所分离的两类像素在灰度分布上具有最大差异，进而实现图像分割的是（）。","options":[{"label":"A","text":"直方图均衡化"},{"label":"B","text":"区域生长"},{"label":"C","text":"OTSU算法"},{"label":"D","text":"二值化"}],"answer":"C","explanation":"通过最大化类间方差（otsu算法），阈值化处理可以使得所分离的两类像素在灰度分布上有最大的差异，从而实现图像分割","mnemonic":"OTSU=最大类间方差=最佳阈值分割选C"},{"id":340,"type":"single","text":"在数据预处理工作里，处理缺失值的办法有（）。","options":[{"label":"A","text":"以下选项均正确"},{"label":"B","text":"利用默认值填补缺失值"},{"label":"C","text":"手工填补缺失值"},{"label":"D","text":"忽略该条记录"}],"answer":"A","explanation":"在数据预处理中，缺失值的处理方法包括忽略该条记录、手工填补缺失值、利用默认值填补缺失值、利用均值填补缺失值、利用均值填补缺失值、利用最可能的值填补缺失值等。","mnemonic":"缺失值处理：忽略、手工填、默认值填，全都对选A"},{"id":341,"type":"single","text":"均方根误差（RMSE）与平均绝对误差（MAE）之间的不同之处在于（）。","options":[{"label":"A","text":"MAE比RMSE更容易受到极端误差值的影响"},{"label":"B","text":"RMSE未对误差幅度进行平方处理"},{"label":"C","text":"MAE对误差幅度较大的样本更敏感"},{"label":"D","text":"RMSE对误差幅度较大的样本更敏感"}],"answer":"D","explanation":"RMSE对大幅误差更敏感（平方效应），MAE平等对待误差。","mnemonic":"RMSE有平方效应，对大误差更敏感选D"},{"id":342,"type":"single","text":"当模型存在欠拟合问题时，训练误差与测试误差会呈现出（）的状态。","options":[{"label":"A","text":"训练误差和测试误差都很小"},{"label":"B","text":"训练误差很小，测试误差很大"},{"label":"C","text":"训练误差和测试误差都很大"},{"label":"D","text":"训练误差很大，测试误差很小"}],"answer":"C","explanation":"当模型欠拟合时，表示模型对训练数据的拟合能力较弱，无法捕捉到数据的规律，因此训练误差较高。由于模型的不足，它在测试数据上的表现也同样不好，因此测试误差也较高。欠拟合通常意味着模型过于简单，无法有效学习数据中的模式。","mnemonic":"欠拟合=训练测试都差，\"啥都学不好\"选C"},{"id":343,"type":"single","text":"PEST 模型在（）方面体现出对企业的帮助。","options":[{"label":"A","text":"通过技术升级直接降低生产成本"},{"label":"B","text":"增加销售渠道和客户贡献率"},{"label":"C","text":"提高产品质量和服务水平"},{"label":"D","text":"因地制宜、灵活应对市场变化"}],"answer":"D","explanation":"PEST模型分析有助于企业了解外部环境的情况，提前预判市场趋势，帮助企业因地制宜、灵活应对市场变化，提高市场竞争力","mnemonic":"PEST分析宏观环境=因地制宜应对市场变化选D"},{"id":344,"type":"single","text":"下列哪项不属于语音合成的过程（）。","options":[{"label":"A","text":"声道模型"},{"label":"B","text":"辐射模型"},{"label":"C","text":"变异参数"},{"label":"D","text":"控制参数"}],"answer":"C","explanation":"语音合成过程包括脉冲序列发生器、伪随机噪声发生器、声道模型、控制参数、辐射模型、语音输出","mnemonic":"语音合成过程无\"变异参数\"，有控制参数选C"},{"id":345,"type":"single","text":"（）是导致算法欠拟合的原因。","options":[{"label":"A","text":"样本数量过多"},{"label":"B","text":"学习率过高"},{"label":"C","text":"数据中的噪声"},{"label":"D","text":"模型过于简单"}],"answer":"D","explanation":"欠拟合是指模型未能充分学习数据中的规律，导致预测误差较大。其核心原因之一是模型过于简单。","mnemonic":"欠拟合原因=模型过于简单，\"太简单学不会\"选D"},{"id":346,"type":"single","text":"下列存储系统最适合分布式存储海量原始数据，且支持高吞吐量批处理的是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Redis"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop HDFS"}],"answer":"D","explanation":"Hadoop HDFS是为分布式存储海量数据而设计的，具有高容错性和高吞吐量的特点。它非常适合存储原始数据（如日志文件、图片、视频等），并且通过Hadoop生态系统（如MapReduce、Spark等）可以高效地进行批处理。因此，它是最适合题干描述需求的存储系统。","mnemonic":"海量分布式+高吞吐批处理=HDFS，Hadoop的文件系统选D"},{"id":347,"type":"single","text":"在关联分析过程中，若支持度低于最小支持度阈值，会出现（）情况。","options":[{"label":"A","text":"该阈值是一个固定值"},{"label":"B","text":"该阈值与关联规则无关"},{"label":"C","text":"该属性组合被认为相关"},{"label":"D","text":"该属性组合被认为不相关"}],"answer":"D","explanation":"最小支持度阈值是用来筛选有意义的属性组合的一个重要参数","mnemonic":"支持度低于阈值=属性组合不相关，不够格就淘汰选D"},{"id":348,"type":"single","text":"对于劳动合同法规定的条例，下列说法正确的是（）。","options":[{"label":"A","text":"建立劳动关系，可以口头订立协议"},{"label":"B","text":"用人单位与劳动者在用工前订立劳动合同的，劳动关系自订立之日起建立"},{"label":"C","text":"非全日制用工双方当事人可以订立口头协议"},{"label":"D","text":"用人单位与劳动者协商一致，不可以订立无固定期限劳动合同"}],"answer":"C","explanation":"劳动合同法允许非全日制用工口头协议，其他情况需书面合同，劳动关系自用工日起建立。","mnemonic":"非全日制用工可口头协议，\"临时工口头约定\"选C"},{"id":349,"type":"single","text":"下列哪项属于人机交互存在的缺点？","options":[{"label":"A","text":"可以支持更多的程序和工具"},{"label":"B","text":"会降低人们的创造力和创新能力"},{"label":"C","text":"可以让人与机器更加独立"},{"label":"D","text":"可以提高工作效率"}],"answer":"B","explanation":"人机交互虽然可以提高效率，但是在某些情况下会降低人们的创造力和创新能力","mnemonic":"人机交互缺点=可能降低创造力，过度依赖机器选B"},{"id":350,"type":"single","text":"智能系统在教育领域的功能中，不包含下列哪项？","options":[{"label":"A","text":"提供个性化学习"},{"label":"B","text":"智能辅助教学"},{"label":"C","text":"智能病例诊断"},{"label":"D","text":"智能辅助校园管理"}],"answer":"C","explanation":"智能系统在教育领域的作用不包括智能病例诊断。","mnemonic":"智能病例诊断属医疗不属教育领域选C"},{"id":351,"type":"single","text":"在对语音开展短时频谱分析时，在窗函数的选择方面，下列说法正确的是（）。","options":[{"label":"A","text":"矩形窗是最常用的窗函数，因为它简单易实现"},{"label":"B","text":"错误：汉明窗得到的短时频谱平滑度较高，因此在语音分析中使用较为普遍，而不是平滑度较低。"},{"label":"C","text":"正确：汉明窗能够减少频谱泄漏，使得到的短时频谱更加平滑，因此在语音分析中使用较为普遍。"},{"label":"D","text":"错误：窗函数的选择对短时频谱分析的结果有显著影响，不同的窗函数会导致不同的频谱特性。"}],"answer":"C","explanation":"A. 错误：虽然矩形窗简单易实现，但在语音短时频谱分析中极少采用，因为它会导致频谱泄漏，使频谱不够平滑。","mnemonic":"汉明窗减少频谱泄漏更平滑，语音分析常用选C"},{"id":352,"type":"single","text":"在指导初级工处理数据标注问题时，应要求他们遵循下列哪项原则？（）","options":[{"label":"A","text":"标注时可以随意添加或删除标注类别，以方便工作"},{"label":"B","text":"按照标注规范进行标注，确保标注结果准确有用"},{"label":"C","text":"标注结果可以随意更改，只要最终达到要求即可"},{"label":"D","text":"忽略标注质量，以完成标注任务为主"}],"answer":"B","explanation":"初级工在数据标注过程中，应该具备严谨的标注态度和精细的标注能力","mnemonic":"数据标注要遵循规范确保准确，严谨态度选B"},{"id":353,"type":"single","text":"下列对于对比分析的表述，正确的是（ ）。","options":[{"label":"A","text":"对比分析主要用于描述数据的绝对值大小"},{"label":"B","text":"对比分析不需要考虑数据的可比性"},{"label":"C","text":"对比分析的目的是揭示事物的发展规律"},{"label":"D","text":"对比分析只能用于两个数据之间的比较"}],"answer":"C","explanation":"对比分析是将两个或两个以上具有可比性的数据进行比较，分析其中差异，以揭示事物发展规律","mnemonic":"对比分析目的=揭示发展规律，比较找规律选C"},{"id":354,"type":"single","text":"以下哪种行为触犯了《中华人民共和国个人信息保护法》的规定？","options":[{"label":"A","text":"个人同意将手机号码授权给某企业，但该企业将该号码出售给第三方公司。"},{"label":"B","text":"个人在某电商平台上购买商品时，需要提供姓名、地址等信息。"},{"label":"C","text":"某医疗机构公布患者病历信息，但已经对患者姓名等信息进行脱敏处理。"},{"label":"D","text":"某企业在其公司网站上公布待招聘的岗位职称、工资水平等信息。"}],"answer":"A","explanation":"根据《中华人民共和国个人信息保护法》第十条规定，任何组织、个人不得非法收集、使用、加工、传输他人个人信息，不得非法买卖、提供或者公开他人个人信息；不得从事危害国家安全、公共利益的个人信息处理活动，A选项该企业将手机号码出售给第三方公司，违反了相关法律规定。","mnemonic":"手机号授权后被转卖=违法，未经同意转给第三方选A"},{"id":355,"type":"single","text":"关于 jieba 分词的词性标注，下列描述正确的是（）。","options":[{"label":"A","text":"jieba分词不支持词性标注功能"},{"label":"B","text":"jieba分词只提供了基本的词性标注功能，不能支持多种不同的词性标注方案"},{"label":"C","text":"jieba分词默认提供了基本的词性标注功能"},{"label":"D","text":"jieba分词的词性标注需要人工标注"}],"answer":"C","explanation":"jieba默认提供基础词性标注功能，支持扩展方案。","mnemonic":"jieba默认提供基本词性标注功能选C"},{"id":356,"type":"single","text":"追求卓越的基本要求中，“高标准要求” 具体体现在哪些方面（）。","options":[{"label":"A","text":"追逐权力和地位"},{"label":"B","text":"避免参加培训活动"},{"label":"C","text":"对工作质量要求更高"},{"label":"D","text":"忽略工作细节"}],"answer":"C","explanation":"追求卓越的基本要求中，“高标准要求”体现在树立高标准的要求，并努力追求卓越，对工作质量、专业知识和技能要求更高，在每一个工作环节都追求卓越表现","mnemonic":"高标准要求=对工作质量要求更高选C"},{"id":357,"type":"single","text":"某企业一味追求扩张，却对员工的健康与安全漠不关心，此行为违反了（）职业道德。","options":[{"label":"A","text":"遵纪守法"},{"label":"B","text":"尊重人权"},{"label":"C","text":"利益最大化"},{"label":"D","text":"服务社会"}],"answer":"B","explanation":"尊重人权是职业道德的基本内涵之一，企业应当尊重员工的基本权利，保障员工的健康和安全。","mnemonic":"忽视员工健康安全=不尊重人权选B"},{"id":358,"type":"single","text":"能够把文本数据转换为稀疏向量表示的是（）。","options":[{"label":"A","text":"One-hot模型"},{"label":"B","text":"Transformer模型"},{"label":"C","text":"LSTM模型"},{"label":"D","text":"Word2Vec模型"}],"answer":"A","explanation":"One-hot模型将文本表示为稀疏向量，每个词对应一个独热编码。","mnemonic":"One-hot=独热编码=稀疏向量，大量0少量1选A"},{"id":359,"type":"single","text":"按照 ETL 任务的生命周期，其正确的阶段顺序为（）。","options":[{"label":"A","text":"任务生成→接受调度→运行→完成"},{"label":"B","text":"任务生成→运行→接受调度→完成"},{"label":"C","text":"接受调度→任务生成→运行→完成"},{"label":"D","text":"任务生成→运行→完成→接受调度"}],"answer":"A","explanation":"ETL任务生命周期包括任务生成、调度、运行和完成四个阶段。","mnemonic":"ETL生命周期：生成→调度→运行→完成，先排队再执行选A"},{"id":360,"type":"single","text":"恪尽职守中 “持续学习和提升” 这一要求具体指的是什么（）。","options":[{"label":"A","text":"非法使用或占用公司资金"},{"label":"B","text":"出现问题时，推卸责任"},{"label":"C","text":"不参与团队合作"},{"label":"D","text":"关注行业动态和最新发展"}],"answer":"D","explanation":"持续学习要求关注行业动态，提升专业能力，以更好地履行职责，提升专业能力，以更好地履行职责。","mnemonic":"持续学习=关注行业动态和最新发展选D"},{"id":361,"type":"single","text":"进行算法测试时，为提升性能需优化算法参数，下列（）属于参数优化的方法。","options":[{"label":"A","text":"聚类算法"},{"label":"B","text":"神经网络"},{"label":"C","text":"支持向量机"},{"label":"D","text":"网格搜索"}],"answer":"D","explanation":"网格搜索是一种常用的参数优化方法，在给定的参数范围内对所有可能的参数组合进行评估，以找到最佳参数组合。","mnemonic":"参数优化方法=网格搜索，逐格寻找最优参数选D"},{"id":362,"type":"single","text":"针对时间管理四象限法则中不同活动的效果分析，（）象限所代表的是事情紧急但并不重要。","options":[{"label":"A","text":"第四象限"},{"label":"B","text":"第三象限"},{"label":"C","text":"第二象限"},{"label":"D","text":"第一象限"}],"answer":"B","explanation":"时间管理四象限法则中，第一象限是指重要并且紧急的事情","mnemonic":"第三象限=紧急不重要，\"三急\"谐音记忆选B"},{"id":363,"type":"single","text":"下列哪项不属于象限分析法常被应用的领域（）。","options":[{"label":"A","text":"客户管理"},{"label":"B","text":"产品分析"},{"label":"C","text":"市场分析"},{"label":"D","text":"艺术创作"}],"answer":"D","explanation":"象限分析法适用于市场、产品分析，不用于艺术创作。","mnemonic":"象限分析法用于市场产品客户分析，不用于艺术创作选D"},{"id":364,"type":"single","text":"UAN 模型指的是（）。","options":[{"label":"A","text":"自然语言处理模型"},{"label":"B","text":"机器学习模型"},{"label":"C","text":"用户行为分析模型"},{"label":"D","text":"人工智能算法"}],"answer":"C","explanation":"UAN模型是用户行为分析模型，用于分析用户在网站或APP上的行为。","mnemonic":"UAN=User Action Notation=用户行为分析模型选C"},{"id":365,"type":"single","text":"下列哪一选项是初级知识体系中所涉及的知识点？（）","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"反向传播算法"},{"label":"C","text":"培训与指导"},{"label":"D","text":"实时检验"}],"answer":"A","explanation":"数据清洗属于初级知识体系的知识点。","mnemonic":"初级知识体系=数据清洗，基础功选A"},{"id":366,"type":"single","text":"留出法、交叉验证法和自助法的用途是（）。","options":[{"label":"A","text":"数据预处理"},{"label":"B","text":"训练模型"},{"label":"C","text":"选择最优的模型"},{"label":"D","text":"数据集的划分"}],"answer":"D","explanation":"留出法、交叉验证法和自助法的主要作用是根据不同的方式划分数据集，用于训练模型和评估模型的性能。","mnemonic":"留出法交叉验证自助法=数据集划分方法选D"},{"id":367,"type":"single","text":"自助法有哪些优点（）。","options":[{"label":"A","text":"通过对原始数据集进行有放回抽样生成多个训练集，提高模型稳定性"},{"label":"B","text":"可以减少模型的方差，避免过拟合"},{"label":"C","text":"产生的样本分布与原始数据集相同"},{"label":"D","text":"可以减少训练时间"}],"answer":"A","explanation":"自助法通过有放回抽样增加训练样本量，提高稳定性，适用于小样本和不均衡数据，但可能引入偏差。","mnemonic":"自助法=有放回抽样生成多个训练集，提高稳定性选A"},{"id":368,"type":"single","text":"计算机的硬件系统是由哪些部分构成的（）。","options":[{"label":"A","text":"运算器、存储器、控制器、"},{"label":"B","text":"运算器、存储器、输入设备、输出设备"},{"label":"C","text":"运算器、存储器、控制器、输入设备、输出设备"},{"label":"D","text":"运算器、输入设备、输出设备"}],"answer":"C","explanation":"计算机硬件系统包括运算器、控制器、存储器、输入设备和输出设备五个基本组成部分。","mnemonic":"计算机硬件五大件：运算器控制器存储器输入输出选C"},{"id":369,"type":"single","text":"哪个步骤能够借助数据分析，设计出在单一场景下人工与智能交互的最佳流程？（）","options":[{"label":"A","text":"人机交互流程设计"},{"label":"B","text":"智能系统监控和优化"},{"label":"C","text":"数据处理规范制定"},{"label":"D","text":"业务模块效果优化"}],"answer":"A","explanation":"人机交互流程设计通过数据分析优化单一场景下的人机交互流程。","mnemonic":"人机交互流程设计=数据分析优化单场景交互选A"},{"id":370,"type":"single","text":"下列关于留出法的划分策略说法正确的是（）。","options":[{"label":"A","text":"多次随机划分后，应取测试误差的最大值以提高模型鲁棒性"},{"label":"B","text":"单次随机划分的结果足够稳定，可直接作为最终评估依据"},{"label":"C","text":"若数据集包含1000个样本（500正例、500反例），按分层抽样以7:3划分，则训练集包含350正例和350反例"},{"label":"D","text":"测试集的比例必须固定为30%"}],"answer":"C","explanation":"分层抽样​​的核心是保持训练集和测试集的类别分布与原始数据集一致。数据集含500正例和500反例，按7:3分层划分后：训练集正例数：500 × 70% = 350训练集反例数：500 × 70% = 350测试集正/反例数均为150，符合分层规则。","mnemonic":"分层抽样7:3划分保持类别比例一致选C"},{"id":371,"type":"single","text":"在行为模型的交互流程中，哪个环节负责将用户输入转换为机器可识别的数据？","options":[{"label":"A","text":"发送请求"},{"label":"B","text":"处理请求"},{"label":"C","text":"返回响应"},{"label":"D","text":"转换请求"}],"answer":"D","explanation":"转换请求环节将用户输入转为机器可处理数据。","mnemonic":"用户输入转为机器可识别=转换请求选D"},{"id":372,"type":"single","text":"漏斗分析里，下列属于转化率的是（）。","options":[{"label":"A","text":"用户在注册成功后，到浏览商品页面的访问次数比例"},{"label":"B","text":"用户在加入购物车后，到提交订单的比例"},{"label":"C","text":"用户在注册成功后，到浏览商品页面的停留时间比例"},{"label":"D","text":"每个阶段的用户数量"}],"answer":"B","explanation":"漏斗转化率指步骤间用户成功过渡的比例。","mnemonic":"漏斗转化率=步骤间过渡比例，加购到下单选B"},{"id":373,"type":"single","text":"对智能系统基础操作、智能系统维护等知识的掌握，属于初级知识体系中的哪一部分？（）","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"数据采集"},{"label":"C","text":"数学基础"},{"label":"D","text":"智能系统基础"}],"answer":"D","explanation":"掌握智能系统基础操作、智能系统维护等知识属于初级知识体系中的智能系统基础","mnemonic":"智能系统基础操作和维护=智能系统基础选D"},{"id":374,"type":"single","text":"计算机系统要完成任务，首先得从哪里读取指令（）。","options":[{"label":"A","text":"控制器"},{"label":"B","text":"存储器"},{"label":"C","text":"运算器"},{"label":"D","text":"输入/输出设备"}],"answer":"B","explanation":"计算机系统通过控制器、运算器、存储器和I/O设备的紧密协作来完成任务： 控制器负责从存储器中读取指令，指挥运算器执行算术和逻辑操作，并协调数据在各设备间的传输。","mnemonic":"计算机先从存储器读取指令再执行选B"},{"id":375,"type":"single","text":"图像处理指的是（）。","options":[{"label":"A","text":"使用人工智能技术对图像进行分析和识别的过程"},{"label":"B","text":"通过计算机对图像进行分析、操作的处理技术"},{"label":"C","text":"将图像转换为数字信号的过程"},{"label":"D","text":"从图像中提取有用信息的过程"}],"answer":"B","explanation":"图像处理，顾名思义，可以简单地定义为利用计算机算法(通过代码)对图像进行分析、操作的处理技术","mnemonic":"图像处理=计算机对图像分析操作的处理技术选B"},{"id":376,"type":"single","text":"智慧商场通过哪些方式可以提升消费者的体验（）。","options":[{"label":"A","text":"仅提供现金支付方式"},{"label":"B","text":"增加实体店铺面积"},{"label":"C","text":"实现智能停车与自助收银"},{"label":"D","text":"减少商品种类"}],"answer":"C","explanation":"智慧商场利用现代信息技术优化服务，提升消费者体验","mnemonic":"智慧商场=智能停车+自助收银提升体验选C"},{"id":377,"type":"single","text":"若一名职业人员在工作过程中，只顾及自身利益，对客户的需求置之不理，该行为违背了（）职业道德。","options":[{"label":"A","text":"个人发展"},{"label":"B","text":"持续学习"},{"label":"C","text":"尊重人权"},{"label":"D","text":"服务社会"}],"answer":"D","explanation":"服务社会是职业道德的核心内容，职业人员在工作中应以服务社会为宗旨，尊重客户的需求，帮助客户解决问题","mnemonic":"只顾自身不顾客户=违背服务社会的职业道德选D"},{"id":378,"type":"single","text":"下列哪项不属于人机交互的研究范畴？","options":[{"label":"A","text":"人机交互评估方法研究"},{"label":"B","text":"用户需求分析"},{"label":"C","text":"人工智能算法研究"},{"label":"D","text":"用户界面设计"}],"answer":"C","explanation":"机交互研究主要关注用户与计算机之间的交互过程，包括用户界面设计、用户需求分析和人机交互评估方法研究等","mnemonic":"人工智能算法研究不属于人机交互研究范畴选C"},{"id":379,"type":"single","text":"在 Python 中，（）函数可以对图像实施中值滤波处理。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.GaussianBlur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"D","explanation":"在Python中，可以使用cv2.medianBlur()函数对图像进行中值滤波处理","mnemonic":"中值滤波=medianBlur，median=中值选D"},{"id":380,"type":"single","text":"NoSQL 集群借助数据复制和分片来提高系统性能与可靠性，以下选项中能正确描述这两种机制主要作用的是（）。","options":[{"label":"A","text":"数据复制用于横向扩展存储容量，数据分片用于提高数据一致性。"},{"label":"B","text":"数据复制用于减少网络延迟，数据分片用于支持复杂事务。"},{"label":"C","text":"数据复制用于提高读取速度和容错性，数据分片用于实现数据的横向扩展。"},{"label":"D","text":"数据复制和分片均用于增强数据的安全性和加密存储。"}],"answer":"C","explanation":"NoSQL集群通过数据复制提高容错性和读取速度，通过数据分片实现横向扩展。","mnemonic":"复制=读快容错，分片=横向扩展，与325题相同选C"},{"id":381,"type":"single","text":"以下选项中，不属于用人单位无需提前三十日书面通知就能合法解除劳动合同的情形是（）。","options":[{"label":"A","text":"被依法追究刑事责任的"},{"label":"B","text":"严重违反劳动纪律或者用人单位规章制度的"},{"label":"C","text":"劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的"},{"label":"D","text":"在试用期间被证明不符合录用条件的"}],"answer":"C","explanation":"根据《中华人民共和国劳动法》第二十五条规定，劳动者有下列情形之一的，用人单位可以解除劳动合同：（一）在试用期间被证明不符合录用条件的；（二）严重违反劳动纪律或者用人单位规章制度的；（三）严重失职，营私舞弊，对用人单位利益造成重大损害的；（四）被依法追究刑事责任的","mnemonic":"不能胜任经培训仍不行=需提前30日通知，不能即时解除选C"},{"id":382,"type":"single","text":"下列哪项方法是解决欠拟合问题的经典方法之一（）。","options":[{"label":"A","text":"权重正则化"},{"label":"B","text":"增加特征"},{"label":"C","text":"决策树剪枝"},{"label":"D","text":"数据增强"}],"answer":"B","explanation":"解决欠拟合的方法之一是增加特征","mnemonic":"解决欠拟合=增加特征，给模型更多信息学习选B"},{"id":383,"type":"single","text":"利用 OpenCV 库的 imread () 函数加载图像时，什么表示图像的颜色通道顺序（）。","options":[{"label":"A","text":"Noneoftheabove"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"cv.IMREAD_GRAYSCALE"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"D","explanation":"cv.IMREAD_COLOR读取图像时按BGR顺序处理颜色通道。","mnemonic":"imread颜色通道=IMREAD_COLOR，COLOR=颜色选D"},{"id":384,"type":"single","text":"在智能化家居系统中，下列哪项不属于人机交互的方式？","options":[{"label":"A","text":"自动化控制"},{"label":"B","text":"声控系统"},{"label":"C","text":"遥控器控制"},{"label":"D","text":"手势控制"}],"answer":"A","explanation":"自动化控制是系统自主执行，不属交互方式。","mnemonic":"自动化控制是系统自主执行，无需人参与不算交互选A"},{"id":385,"type":"single","text":"下列哪项属于人机交互所具备的优点？","options":[{"label":"A","text":"减少用户参与度"},{"label":"B","text":"可以让人与机器更加独立"},{"label":"C","text":"可以提高工作效率"},{"label":"D","text":"可以让人完全依赖于机器"}],"answer":"C","explanation":"人机交互的优点包括提高工作效率，而非减少参与度或完全依赖机器。","mnemonic":"人机交互优点=提高工作效率选C"},{"id":386,"type":"single","text":"AARRR 模型中的 \"AR\" 指的是（）。","options":[{"label":"A","text":"用广告获取流量，增加应用运营的收入"},{"label":"B","text":"获取新用户，让用户体验产品"},{"label":"C","text":"提高用户的积极度，减少客户流失"},{"label":"D","text":"提高品牌知名度和口碑"}],"answer":"C","explanation":"在AARRR模型中，\"AR\"指的是\"Activation\"（激活）和\"Retention\"（留存）","mnemonic":"AARRR中AR=激活+留存=提高积极度减少流失选C"},{"id":387,"type":"single","text":"超级计算机与普通计算机之间的主要区别体现在哪些方面（）。","options":[{"label":"A","text":"极高的数据传输速率和极快速的数据处理速度"},{"label":"B","text":"极高的数据传输速率和极大的数据存储容量"},{"label":"C","text":"极高的数据处理容错率和极大的数据存储容量"},{"label":"D","text":"极大的数据存储容量和极快速的数据处理速度"}],"answer":"D","explanation":"超级计算机与普通计算机的核心差异体现在存储容量巨大和数据处理速度极快，尽管硬件组成相似，但性能和规模显著不同。","mnemonic":"超级计算机=超大存储+超快处理速度选D"},{"id":388,"type":"single","text":"下列属于智能城市相关的项目有哪些（）。","options":[{"label":"A","text":"以上选择均正确"},{"label":"B","text":"施工占道识别"},{"label":"C","text":"垃圾桶溢满识别"},{"label":"D","text":"机动车违停识别"}],"answer":"A","explanation":"机动车违停识别、垃圾桶溢满识别、施工占道识别均属于智能城市的相关项目","mnemonic":"违停识别、垃圾桶溢满、施工占道都属智能城市选A"},{"id":389,"type":"single","text":"运用 RFM 模型开展数据分析时，需要对每个客户的（）进行计算。","options":[{"label":"A","text":"最近一次购买时间间隔"},{"label":"B","text":"购买频率"},{"label":"C","text":"消费金额"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"RFM模型需计算每个客户的最近一次购买时间（Recency）、购买频率（Frequency）和消费金额（Monetary），以支持针对性营销策略。","mnemonic":"RFM三个指标全要算：时间间隔+频率+金额选D"},{"id":390,"type":"single","text":"依据《中华人民共和国网络安全法》，网络运营者需依照网络安全等级保护制度的要求落实相关措施，其中不包含的是（）。","options":[{"label":"A","text":"采取数据分类、重要数据备份和加密等措施"},{"label":"B","text":"采取监测、记录网络运行状态、网络安全事件的技术措施，并按照规定留存相关的网络日志不少于六个月"},{"label":"C","text":"采取防范网络诈骗的宣传措施"},{"label":"D","text":"制定内部安全管理制度和操作规程"}],"answer":"C","explanation":"《中华人民共和国网络安全法》第二十一条规定，国家实行网络安全等级保护制度","mnemonic":"防范网络诈骗宣传不属于网络安全等级保护措施选C"},{"id":391,"type":"single","text":"空间复杂度的指标是（）。","options":[{"label":"A","text":"程序代码行数"},{"label":"B","text":"算法运行所占辅助存储空间"},{"label":"C","text":"数据规模"},{"label":"D","text":"计算机执行时间"}],"answer":"B","explanation":"空间复杂度是指算法执行所需的辅助存储空间与输入规模之间的关系，它包括算法在执行过程中所需的临时存储空间，如局部变量、数据结构、递归栈等的内存占用。","mnemonic":"空间复杂度=算法占用辅助存储空间选B"},{"id":392,"type":"single","text":"对于 RFM 模型，下列表述正确的是（）。","options":[{"label":"A","text":"RFM模型是一种用户的分群和分层模型"},{"label":"B","text":"RFM模型只考虑了消费金额这一指标"},{"label":"C","text":"RFM模型不适用于电子商务场景"},{"label":"D","text":"RFM模型主要是基于客户的社交资本进行分类的"}],"answer":"A","explanation":"RFM模型根据最近购买时间、消费频率和金额对用户分群，用于精准营销。","mnemonic":"RFM模型=用户分群分层模型，三维度分类选A"},{"id":393,"type":"single","text":"短时自相关函数在语音信号处理中的主要用途是（）。","options":[{"label":"A","text":"找到信号帧中的谷值"},{"label":"B","text":"衡量信号自身时间波形的相似性"},{"label":"C","text":"衡量信号帧的相似度"},{"label":"D","text":"找到信号帧中的最大值"}],"answer":"B","explanation":"自相关函数用于衡量信号自身时间波形的相似性","mnemonic":"短时自相关函数=衡量信号自身时间波形相似性选B"},{"id":394,"type":"single","text":"计算机存储器的技术指标包含哪些方面（）。","options":[{"label":"A","text":"存储容量"},{"label":"B","text":"存取速度"},{"label":"C","text":"可靠性"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"计算机的存储器技术指标包括存储容量、存取速度、可靠性。","mnemonic":"存储器指标：容量+速度+可靠性，三项全选D"},{"id":395,"type":"single","text":"下列哪项是用于数据存储的传统关系型数据库（）。","options":[{"label":"A","text":"Elasticsearch"},{"label":"B","text":"PostgreSQL"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop"}],"answer":"B","explanation":"Hadoop是一个分布式计算框架，MongoDB是一种NoSQL数据库，Elasticsearch是一种全文搜索引擎","mnemonic":"PostgreSQL=传统关系型数据库，其余都是非关系型或框架选B"},{"id":396,"type":"single","text":"可实现图像的自适应阈值分割的函数是（）。","options":[{"label":"A","text":"filters.sobel"},{"label":"B","text":"active_contour"},{"label":"C","text":"adaptiveThreshold"},{"label":"D","text":"threshold"}],"answer":"C","explanation":"Python的 OpenCV库中提供函adaptiveThreshold用于实现图像的自适应阈值分割","mnemonic":"自适应阈值分割=adaptiveThreshold，adaptive=自适应选C"},{"id":397,"type":"single","text":"在以下哪些情况中，选择事件模式作为输入模式是最恰当的？（）","options":[{"label":"A","text":"输入数据是连续性的，且需要实时处理，如鼠标和键盘输入"},{"label":"B","text":"输入数据需要在应用程序暂停时等待，直到收到数据后才继续执行"},{"label":"C","text":"应用程序需要同时处理多个输入设备的输入，且保证输入数据不会丢失"},{"label":"D","text":"输入频率较低且不需要实时响应，适合按需触发输入"}],"answer":"C","explanation":"应用程序需要同时处理多个输入设备的输入，且保证输入数据不会丢失，事件模式最适合这种场景，因为它允许输入设备和应用程序并行工作，输入数据会被保存到事件队列中，应用程序可以随时读取，确保数据不会丢失。此选项符合事件模式的特点，因此是正确答案。其他选项解析：输入数据是连续性的，且需要实时处理，如鼠标和键盘输入，这种情况适合采样模式，因为采样模式支持连续性的信息流，并且应用程序可以在处理其他数据时不断采样输入设备数据。输入数据需要在应用程序暂停时等待，直到收到数据后才继续执行，这种情况适合请求模式，因为请求模式要求应用程序在等待输入时暂停执行，直到收到输入数据后才继续执行。输入频率较低且不需要实时响应，适合按需触发输入，这种情况适合请求模式，因为输入的频率较低，且不要求实时响应，适合在应用程序需要输入时才启动输入设备。","mnemonic":"事件模式=多设备并行+队列保存不丢失选C"},{"id":398,"type":"single","text":"下列哪一项属于初级培训包含的知识点（）。","options":[{"label":"A","text":"机器学习"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"数据标注工具的使用"},{"label":"D","text":"数据审核的标准和方法"}],"answer":"C","explanation":"数据标注工具使用是初级培训知识点。","mnemonic":"初级培训=数据标注工具使用，基础操作技能选C"},{"id":399,"type":"single","text":"下列哪项既支持图形化操作界面，又能进行开源插件扩展（）。","options":[{"label":"A","text":"MicrosoftSQLServerIntegrationServices(SSIS)"},{"label":"B","text":"InformaticaPowerCenter"},{"label":"C","text":"Kettle"},{"label":"D","text":"OracleDataIntegrator"}],"answer":"C","explanation":"Kettle通过图形界面来设计ETL转换过程，kettle还支持非常广泛的数据库和数据文件，可以通过插件扩展","mnemonic":"Kettle=图形化+开源插件扩展，水壶工具选C"},{"id":400,"type":"single","text":"属于基于信号分解的方法的是（）。","options":[{"label":"A","text":"高斯滤波"},{"label":"B","text":"小波变换"},{"label":"C","text":"字典学习模型"},{"label":"D","text":"中值滤波"}],"answer":"B","explanation":"小波变换是一种基于信号分解的方法，它将信号分解成不同频率的子带，并且能够在保留原始信息的同时去除噪声","mnemonic":"基于信号分解的方法=小波变换，分解不同频率子带选B"},{"id":401,"type":"single","text":"在中级培训知识点中，哪一项不属于业务数据质量检测的内容（）。","options":[{"label":"A","text":"对预处理后业务数据进行审核"},{"label":"B","text":"梳理业务数据采集规范"},{"label":"C","text":"梳理业务数据处理规范"},{"label":"D","text":"对业务数据采集流程提出优化建议"}],"answer":"D","explanation":"对业务数据采集流程提出优化建议属于中级培训知识点中的数据处理方法优化。","mnemonic":"提优化建议属于\"方法优化\"不是\"质量检测\"，排除D"},{"id":402,"type":"single","text":"在反馈原则中，鼠标指针的状态、按钮的状态、页面元素的动态变化等属于什么？","options":[{"label":"A","text":"视觉反馈"},{"label":"B","text":"声音反馈"},{"label":"C","text":"颜色反馈"},{"label":"D","text":"文本反馈"}],"answer":"A","explanation":"反馈原则是人机交互设计中的核心原则之一，视觉反馈在人机交互设计中比较常见，包括鼠标指针的状态、按钮的状态、页面元素的动态变化等","mnemonic":"鼠标按钮页面变化都是\"看得见\"的，视觉反馈选A"},{"id":403,"type":"single","text":"下列选项中，不属于 RFM 模型主要功能的是（）。","options":[{"label":"A","text":"推荐商品和服务给客户"},{"label":"B","text":"帮助企业制定市场营销策略"},{"label":"C","text":"对客户进行分类和定级"},{"label":"D","text":"定义客户的购买行为和价值"}],"answer":"A","explanation":"RFM模型的主要功能包括定义客户的购买行为和价值、对客户进行分类和定级、帮助企业制定市场营销策略等，而推荐商品和服务并不是RFM模型的主要作用","mnemonic":"RFM分析客户价值，不推荐商品，排除A"},{"id":404,"type":"single","text":"实施业务流程重组（BPR）时，通常会采用哪种方式（）。","options":[{"label":"A","text":"完全依赖外部咨询公司的建议"},{"label":"B","text":"结合研究现有流程和从零开始构建理想流程的方法"},{"label":"C","text":"仅从零开始构建理想的业务流程"},{"label":"D","text":"仅通过研究和描述现有业务流程进行重新设计"}],"answer":"B","explanation":"业务流程重组（BPR）通常结合研究和描述企业现有业务流程进行重新设计，以及从零开始构建理想的业务流程的方法（C）","mnemonic":"BPR既研究现有流程又从零构建，结合法选B"},{"id":405,"type":"single","text":"（）可以让输入设备和应用程序各自独立运行，输入设备在后台持续采集数据，应用程序在有需要时再读取这些数据。","options":[{"label":"A","text":"同步模式"},{"label":"B","text":"事件模式"},{"label":"C","text":"采样模式"},{"label":"D","text":"请求模式"}],"answer":"C","explanation":"采样模式下输入设备持续采集，应用定期读取。","mnemonic":"采样=后台持续采集+应用按需读取，选C"},{"id":406,"type":"single","text":"业务流程重组（BPR）的主要目的是使企业经营在哪些领域取得明显进步（）。","options":[{"label":"A","text":"成本、质量、服务和速度"},{"label":"B","text":"产品质量、生产效率和市场竞争力"},{"label":"C","text":"技术集成、管理职能和组织结构"},{"label":"D","text":"员工满意度、客户满意度和市场份额"}],"answer":"A","explanation":"BPR旨在显著改善成本、质量、服务和速度等经营指标。","mnemonic":"BPR目标口诀\"成质服速\"——成本质量服务速度，选A"},{"id":407,"type":"single","text":"运用自助法划分数据集时，每个数据样本被抽取的概率是多少（）。","options":[{"label":"A","text":"1-1/n"},{"label":"B","text":"1/2n"},{"label":"C","text":"1/(n-1)"},{"label":"D","text":"1/n"}],"answer":"D","explanation":"自助法中每个样本被抽中的概率为1/n。","mnemonic":"自助法每次抽一个，概率就是1/n，选D"},{"id":408,"type":"single","text":"在智能化家居系统中，下列哪项不属于人机交互的方式？","options":[{"label":"A","text":"自动化控制"},{"label":"B","text":"声控系统"},{"label":"C","text":"遥控器控制"},{"label":"D","text":"手势控制"}],"answer":"A","explanation":"自动化控制是系统自主执行，不属交互方式。","mnemonic":"自动化控制是系统自主执行，无需人参与，不算交互选A"},{"id":409,"type":"single","text":"运算器所具备的功能是（）。","options":[{"label":"A","text":"存储数据"},{"label":"B","text":"控制计算机的运行"},{"label":"C","text":"执行算术和逻辑运算"},{"label":"D","text":"控制输入输出操作"}],"answer":"C","explanation":"运算器的主要功能是对数据进行各种算术运算和逻辑运算。","mnemonic":"运算器=算术+逻辑运算，名字里有\"运算\"二字选C"},{"id":410,"type":"single","text":"在自然语言对话里，下列哪项不在短语识别的范畴之内？","options":[{"label":"A","text":"句法分析"},{"label":"B","text":"词性识别"},{"label":"C","text":"语义分析"},{"label":"D","text":"语音信号的分析"}],"answer":"D","explanation":"自然语言对话包括语音信号的分析、语义分析、词性识别、句法分析等内容","mnemonic":"语音信号分析不属于\"短语识别\"范畴，选D排除"},{"id":411,"type":"single","text":"在构建决策树的过程中，对于如何挑选最优特征来划分数据，下列说法正确的是（）。","options":[{"label":"A","text":"根据每个特征的类别标签进行选择"},{"label":"B","text":"选择信息增益最大或基尼指数最小的特征"},{"label":"C","text":"随机选择一个特征进行划分"},{"label":"D","text":"选择样本中出现频率最高的特征进行划分"}],"answer":"B","explanation":"决策树通过贪心策略选择信息增益最大或基尼指数最小的特征进行划分，以降低不纯度。","mnemonic":"决策树选特征：信息增益最大或基尼指数最小，选B"},{"id":412,"type":"single","text":"在移动端界面设计里，若想优化用户体验、简化操作流程，哪项设计原则对减轻用户输入负担、提升交互速度最有帮助？（）","options":[{"label":"A","text":"简单直观"},{"label":"B","text":"易于检索"},{"label":"C","text":"最大限度地避免用户出错"},{"label":"D","text":"避免不必要的文本输入"}],"answer":"D","explanation":"避免不必要的文本输入原则通过减少文本输入需求提升移动端交互效率。","mnemonic":"减轻输入负担=避免不必要文本输入，关键词\"输入\"对应D"},{"id":413,"type":"single","text":"在计算机执行计算的基础硬件部件里，处于核心地位的组成部分是（）。","options":[{"label":"A","text":"输入设备"},{"label":"B","text":"输出设备"},{"label":"C","text":"CPU（中央处理单元）"},{"label":"D","text":"存储器"}],"answer":"C","explanation":"计算机的CPU（中央处理单元）、存储器、输入/输出设备是计算机执行计算的基础硬件部件。CPU是计算机最核心的组成部分，它负责执行运算和控制指令，是计算能力的直接体现。","mnemonic":"CPU是计算机的大脑和核心，选C"},{"id":414,"type":"single","text":"在业务流程优化中，系统化改造法的应用基础是（）。","options":[{"label":"A","text":"全新设计目标"},{"label":"B","text":"现有流程"},{"label":"C","text":"外部环境的剧烈变化"},{"label":"D","text":"从零开始设计新流程"}],"answer":"B","explanation":"系统化改造法的应用基础是现有的流程，通过对现有流程进行整合、简化、自动化改造等方法对其进行重新设计，","mnemonic":"系统化改造法=基于现有流程改造，不是从零开始，选B"},{"id":415,"type":"single","text":"图像分割可通过什么方式来实现（）。","options":[{"label":"A","text":"图像融合"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"边缘锯齿"},{"label":"D","text":"直方图的二值化方法"}],"answer":"D","explanation":"直方图二值化（如Otsu法）可用于图像分割。","mnemonic":"图像分割用直方图二值化（如Otsu法），选D"},{"id":416,"type":"single","text":"以下哪项属于智慧校园的实际应用案例？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"智慧教室技术"},{"label":"C","text":"智能门禁系统"},{"label":"D","text":"校园安防系统"}],"answer":"A","explanation":"智慧校园的相关案例包括校园安防系统、智能门禁系统、智慧教室技术","mnemonic":"智慧校园案例BCD全对，所以选A\"以上均正确\""},{"id":417,"type":"single","text":"遵守职业道德具有（）方面的益处。","options":[{"label":"A","text":"减轻职业从业者的工作负担"},{"label":"B","text":"消除职业从业者的职业压力"},{"label":"C","text":"提高职业从业者的工作效率"},{"label":"D","text":"增强职业从业者的形象和信誉"}],"answer":"D","explanation":"遵守职业道德带来多重好处，其中最主要的是能够增强职业从业者的形象和信誉","mnemonic":"职业道德提升形象信誉，不是减负消压，选D"},{"id":418,"type":"single","text":"在业务流程重组（BPR）里，着重突出了客户参与的重要意义的原则是（）。","options":[{"label":"A","text":"流程重组应体现服务重心前移原则"},{"label":"B","text":"成功的业务流程重组应同时关注内部运营效率和有效性的提高"},{"label":"C","text":"设计与流程控制目标相匹配的绩效度量体系"},{"label":"D","text":"成功的流程重组离不开客户的参与"}],"answer":"D","explanation":"强调客户参与的重要性的是“成功的流程重组离不开客户的参与”（D）。这一原则指出，客户的反馈和参与是BPR成功实施的重要因素，有助于更好地满足客户需求，确保流程重组的方向和效果符合客户期望。","mnemonic":"题目问\"客户参与\"，D选项直接说\"离不开客户参与\""},{"id":419,"type":"single","text":"下列哪项最准确地描述了大数据存储的核心目标（）。","options":[{"label":"A","text":"对数据进行加密以防止未经授权的访问"},{"label":"B","text":"使用高性能计算设备提升数据读写速度"},{"label":"C","text":"通过建立数据库，将采集或预处理后的数据转化为可直接使用的数据资产"},{"label":"D","text":"仅将原始数据存入硬盘或云端，确保物理存储安全"}],"answer":"C","explanation":"大数据存储是利用合适的存储方式把采集到的或者预处理后的数据存储起来，通过建立相应的数据库，形成直接可用的数据资产的过程","mnemonic":"大数据存储核心：建数据库→形成可用数据资产，选C"},{"id":420,"type":"single","text":"5W2H 模型里的 “5W” 包含哪些内容（）。","options":[{"label":"A","text":"Who, What, When, Where, Why"},{"label":"B","text":"Who, What, When, Where, Which"},{"label":"C","text":"Who, Whose When, Which, Why"},{"label":"D","text":"Who, What, When, Where, How"}],"answer":"A","explanation":"5W2H模型涵盖Who、When、Why、How、Where、What和How Much七个要素，用于详细描述事件或任务。","mnemonic":"5W=Who What When Where Why，没有How和Which，选A"},{"id":421,"type":"multi","text":"GOMS 模型的局限性主要有哪些（）。","options":[{"label":"A","text":"无法考虑人类的情感反应"},{"label":"B","text":"只适用于对外观和操作过程进行建模"},{"label":"C","text":"不能捕捉人类的非线性决策过程"},{"label":"D","text":"不能考虑人类对任务目标的不确定性和变化"}],"answer":"A,C,D","explanation":"GOMS模型主要用于对人类的外观和操作过程进行精细化建模，无法考虑人类的情感反应。另外，它无法捕捉人类的非线性决策过程，并不能考虑人类对任务目标的不确定性和变化。因此，选项ACD是GOMS模型的局限性。","mnemonic":"GOMS局限：不管情感、非线性决策、目标不确定性，选ACD"},{"id":422,"type":"multi","text":"人机交互的分析环节包含哪些内容？","options":[{"label":"A","text":"确定产品目标"},{"label":"B","text":"用户需求分析"},{"label":"C","text":"用户场景模拟"},{"label":"D","text":"竞品分析。"}],"answer":"A,B,C,D","explanation":"分析阶段包括:确定产品目标、用户需求分析、用户场景模拟、竞品分析。","mnemonic":"人机交互分析环节全覆盖：目标+需求+场景+竞品，全选ABCD"},{"id":423,"type":"multi","text":"下列属于事务 ACID 特性的属性是（）。","options":[{"label":"A","text":"原子性"},{"label":"B","text":"可用性"},{"label":"C","text":"持久性"},{"label":"D","text":"扩展性"}],"answer":"A,C","explanation":"事物的ACID特性包括原子性、一致性、独立性和持久性。可用性通常指的是系统在任何时候都能被访问和使用，与事务的特性无关。扩展性指的是系统能够通过增加资源来处理更多的负载，与事务的特性无关。","mnemonic":"ACID=原子一致独立持久，可用性和扩展性不属于，选AC"},{"id":424,"type":"multi","text":"函数 adaptiveThreshold用于实现图像自适应阈值分割，其接受下列哪些参数（）。","options":[{"label":"A","text":"adaptivemethod"},{"label":"B","text":"thresholdType"},{"label":"C","text":"blockSize"},{"label":"D","text":"max Value"}],"answer":"A,B,C,D","explanation":"pyton的OpenCy库中提供函数adaptiveThreshold用于实现图像的自适应國值分割法格式如下，: cv2.adaptiverhreshold(src,maxValue, adaptivemethod,thresnolarype biocxsice,c)","mnemonic":"adaptiveThreshold参数全都要：方法、类型、块大小、最大值，全选"},{"id":425,"type":"multi","text":"业务流程重组（BPR）的主要目标和特征包含以下哪几方面（）。","options":[{"label":"A","text":"以业务流程为改造对象和中心"},{"label":"B","text":"关注客户的需求和满意度"},{"label":"C","text":"对现有业务流程进行根本的再思考和彻底的再设计"},{"label":"D","text":"利用先进的制造技术、信息技术以及现代化的管理手段"}],"answer":"A,B,C,D","explanation":"业务流程重组（BPR）的主要目标和特
