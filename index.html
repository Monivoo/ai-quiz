缺点：可能降低创造力，过度依赖机器失去创新"},{"id":417,"type":"single","text":"2. 在Python里，哪一个类能够用来把文本转化为词袋模型（）。","options":[{"label":"A","text":"DictVectorizer"},{"label":"B","text":"HashingVectorizer"},{"label":"C","text":"TfidfVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"D","explanation":"CountVectorizer的其思想是，将文本中每个单词视为一个特征，构成一个词汇表，不考虑单词出现的先后次序，该方法又称为词袋法(Bag ofWords)","mnemonic":"Count=计数=词袋，CountVectorizer把文本变成词频计数向量"},{"id":418,"type":"single","text":"原始数据中存在的常见问题有（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"数据缺失"},{"label":"C","text":"数据重复"},{"label":"D","text":"数据不一致"}],"answer":"A","explanation":"原始数据中常见的问题有数据不一致、数据重复、数据不完整、数据含噪声、数据维度高等等","mnemonic":"原始数据问题：缺失+重复+不一致，全选A\"以上均正确\""},{"id":419,"type":"single","text":"在计算机的主要发展阶段里，以晶体管计算机为主要发展对象的是哪个阶段（）。","options":[{"label":"A","text":"第四阶段"},{"label":"B","text":"第三阶段"},{"label":"C","text":"第二阶段"},{"label":"D","text":"第一阶段"}],"answer":"C","explanation":"计算机的主要发展划分为四个时期，其中第二阶段（1958~1964年）标志着晶体管的出现，它取代了更大的真空管，使计算机更加小型化。","mnemonic":"计算机发展第二阶段=晶体管，口诀\"一电二晶三集四超\""},{"id":420,"type":"single","text":"某企业一味追求扩张，却对员工的健康与安全漠不关心，此行为违反了（）职业道德。","options":[{"label":"A","text":"遵纪守法"},{"label":"B","text":"尊重人权"},{"label":"C","text":"利益最大化"},{"label":"D","text":"服务社会"}],"answer":"B","explanation":"尊重人权是职业道德的基本内涵之一，企业应当尊重员工的基本权利，保障员工的健康和安全。","mnemonic":"不关心员工健康安全=不尊重人权，人权包含健康权和安全权"},{"id":421,"type":"single","text":"业务流程重组（BPR）中采用的标杆瞄准（Benchmarking），其主要目的是什么（）。","options":[{"label":"A","text":"提高员工满意度"},{"label":"B","text":"确定最佳实践并加快再造进程"},{"label":"C","text":"优化企业内部管理流程"},{"label":"D","text":"提升企业信息技术水平"}],"answer":"B","explanation":"标杆瞄准旨在通过借鉴最佳实践设定业绩目标，加速流程再造，提升企业绩效，而非直接优化管理或IT水平。","mnemonic":"标杆瞄准=瞄准最佳实践+加速再造，\"瞄准\"标杆来学习"},{"id":422,"type":"single","text":"下列哪一种方法属于 “可用性评估” 中的诊查式方法？（）","options":[{"label":"A","text":"放声思考法"},{"label":"B","text":"启发式评估"},{"label":"C","text":"问卷调查"},{"label":"D","text":"用户测试"}],"answer":"B","explanation":"可用性评估方法分为两大类：诊查式方法和测试式方法","mnemonic":"诊查式方法=启发式评估，专家\"诊查\"而非用户测试"},{"id":423,"type":"single","text":"下列哪种情况与严谨求是的基本要求不相符（）。","options":[{"label":"A","text":"准确地表达自己的观点"},{"label":"B","text":"避免盲目行动或决策"},{"label":"C","text":"收集和利用合适的数据和信息"},{"label":"D","text":"草率地分析问题"}],"answer":"D","explanation":"严谨求是要求从业者深入全面地分析问题，避免轻率决策，因此草率分析不符合该原则。","mnemonic":"严谨求是≠草率分析，\"严谨\"与\"草率\"天然对立"},{"id":424,"type":"single","text":"对数据进行预处理，其中一个原因是（）。","options":[{"label":"A","text":"增加数据复杂度"},{"label":"B","text":"提高决策的质量"},{"label":"C","text":"加快数据处理速度"},{"label":"D","text":"增加数据存储量"}],"answer":"B","explanation":"数据预处理可提升数据质量，辅助决策。","mnemonic":"数据预处理→提高决策质量，\"垃圾进垃圾出\"所以要先处理"},{"id":425,"type":"single","text":"若要帮助中级工作人员提高文本数据标注的水平，可采用哪些途径呢？（）","options":[{"label":"A","text":"学习语言学"},{"label":"B","text":"忽略看不懂的文本"},{"label":"C","text":"学习嵌入式系统"},{"label":"D","text":"开发数据库"}],"answer":"A","explanation":"学习语言学有助于提高文本数据标注水平。","mnemonic":"文本标注学语言学，标注文字当然要懂语言规律"},{"id":426,"type":"single","text":"在 ETL 流程中，“增量抽取”（Incremental Loading）的核心作用是（）。","options":[{"label":"A","text":"只抽取数据库中新增或修改的数据"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"A","explanation":"增量抽取只抽取自上一次抽取以来，数据库中要抽取的表中新增或修改的数据","mnemonic":"ETL增量抽取=只取新增或修改的数据，\"增量\"二字点明只取增量"},{"id":427,"type":"single","text":"下列哪项用于寻找最亮的点或者与最亮区域相邻的暗点（）。","options":[{"label":"A","text":"高斯滤波器"},{"label":"B","text":"中值滤波器"},{"label":"C","text":"最大值滤波器"},{"label":"D","text":"最小值滤波器"}],"answer":"C","explanation":"最大值滤波器用于寻找最亮点或邻近暗点。","mnemonic":"最大值滤波器找最亮点，\"最大\"对应\"最亮\""},{"id":428,"type":"single","text":"在 K 折交叉验证中，需要做的是（）。","options":[{"label":"A","text":"将数据集划分为K个不相交的子集"},{"label":"B","text":"使用K个不同的模型进行训练"},{"label":"C","text":"在每次迭代中使用K个特征子集"},{"label":"D","text":"每次迭代中使用不同的机器学习算法进行训练​"}],"answer":"A","explanation":"K折交叉验证划分数据为K个互斥子集，轮流作为测试集，其余为训练集，进行K次评估。","mnemonic":"K折交叉验证=数据分K份，轮流当测试集，关键词\"K个不相交子集\""},{"id":429,"type":"single","text":"下列选项中，不属于 RFM 模型主要功能的是（）。","options":[{"label":"A","text":"推荐商品和服务给客户"},{"label":"B","text":"帮助企业制定市场营销策略"},{"label":"C","text":"对客户进行分类和定级"},{"label":"D","text":"定义客户的购买行为和价值"}],"answer":"A","explanation":"RFM模型的主要功能包括定义客户的购买行为和价值、对客户进行分类和定级、帮助企业制定市场营销策略等，而推荐商品和服务并不是RFM模型的主要作用","mnemonic":"RFM模型管分类/定级/营销策略，不管推荐商品，R最近F频率M金额"},{"id":430,"type":"single","text":"在以用户为中心的设计理念指导下，产品设计的主要追求目标是（）。","options":[{"label":"A","text":"提高产品的技术复杂度，使产品具有更多的功能和创新。"},{"label":"B","text":"保证产品在特定使用环境下能高效运作，并让最终用户获得良好的使用体验和满意度。"},{"label":"C","text":"降低产品的生产成本，使其更具市场竞争力。"},{"label":"D","text":"遵循行业标准，确保产品符合所有的技术规范和安全要求。"}],"answer":"B","explanation":"以用户为中心的设计理念强调的是用户的体验和需求，设计的主要目标是保证产品在特定的使用环境中高效运作，并满足用户的需求和期望。","mnemonic":"以用户为中心=用户体验+满意度，核心是\"用户\"不是技术或成本"},{"id":431,"type":"single","text":"下列哪项不属于数据整合的过程（）。","options":[{"label":"A","text":"数据加载"},{"label":"B","text":"数据分析和建模"},{"label":"C","text":"数据清洗和转换"},{"label":"D","text":"数据抽取"}],"answer":"B","explanation":"ETL主要包括数据抽取、数据转换、数据装载3部分内容","mnemonic":"数据整合=ETL（抽取+转换+装载），\"分析建模\"不属于整合过程"},{"id":432,"type":"single","text":"有哪个步骤能将人工智能技术的要求和业务自身的特点相融合，进而制定出数据清洗与标注的相关规范？（）","options":[{"label":"A","text":"课堂演练"},{"label":"B","text":"经验分享"},{"label":"C","text":"智能训练"},{"label":"D","text":"理论培训"}],"answer":"C","explanation":"智能训练环节是够结合人工智能技术要求和业务特征，制定数据清洗和标注规范。","mnemonic":"智能训练=结合AI技术+业务特征制定规范，\"智能\"是关键词"},{"id":433,"type":"single","text":"在 Word 中进行邮件合并操作时，可借助什么来插入邮件模板里的个性化地址块、问候语（）。","options":[{"label":"A","text":"“插入图形”选项"},{"label":"B","text":"“插入超链接”选项"},{"label":"C","text":"“编写和插入域”选项"},{"label":"D","text":"“插入日期和时间”选项"}],"answer":"C","explanation":"使用“邮件”选项卡的“编写和插入域”选项可以选择插入邮件模板中的个性化地址块、问候语等。","mnemonic":"邮件合并插域：用\"编写和插入域\"选项，域=个性化字段"},{"id":434,"type":"single","text":"在数据标注流程的制定中，标注规则的制定是为了达到什么目的（）。","options":[{"label":"A","text":"保护标注人员的权益"},{"label":"B","text":"尽量减少标注成本"},{"label":"C","text":"确保标注结果的准确性和一致性"},{"label":"D","text":"提高标注团队工作效率"}],"answer":"C","explanation":"标注规则的制定是为了确保标注结果的准确性和一致性，使得标注结果具有可比性，有效提高机器学习算法的训练效果","mnemonic":"标注规则=确保准确性+一致性，规则就是为了统一标准"},{"id":435,"type":"single","text":"作为关联规则的评估指标，支持度和置信度的作用是（）。","options":[{"label":"A","text":"判断规则的复杂度和覆盖面"},{"label":"B","text":"判断规则的适用性和泛化能力"},{"label":"C","text":"判断规则的普遍性和可靠性"},{"label":"D","text":"判断规则的实用性和关联强度"}],"answer":"C","explanation":"支持度和置信度都可以用来判断关联规则的普遍性和可靠性","mnemonic":"支持度=普遍性，置信度=可靠性，\"支普置可\"谐音\"支撑置信\""},{"id":436,"type":"single","text":"智慧交通解决方案中的城市交通规划内容，不包含（）。","options":[{"label":"A","text":"车辆限行"},{"label":"B","text":"车辆销售"},{"label":"C","text":"公共交通"},{"label":"D","text":"道路交通"}],"answer":"B","explanation":"城市交通规划应该全方位考虑道路交通、公共交通、自行车交通、车辆限行等因素，从整体出发，综合考虑交通流量分配及各种交通方式出行需求，制定最优交通方案，提高城市交通运行效率","mnemonic":"城市交通规划不含车辆销售，\"销售\"是商业行为不是交通规划"},{"id":437,"type":"single","text":"下列属于 librosa 提供的编码接口的是（）。","options":[{"label":"A","text":"GCM"},{"label":"B","text":"NCM"},{"label":"C","text":"PCM"},{"label":"D","text":"ACM"}],"answer":"C","explanation":"经典的编码技术在Python的语音处理库中都有相应的实现。例如，librosa提供了PCM、Mu-law等编码接口;","mnemonic":"librosa编码接口=PCM，P联想\"脉冲编码调制\"Pulse Code Modulation"},{"id":438,"type":"single","text":"依据《中华人民共和国专利法》，下列（）专利不在保护范畴内。","options":[{"label":"A","text":"新发明的产品、方法和用途"},{"label":"B","text":"技术方案的实施方法"},{"label":"C","text":"科学探索的发现"},{"label":"D","text":"具有工业应用的创造性设计"}],"answer":"C","explanation":"专利法不保护科学发现、智力活动规则、疾病治疗方法等，但保护具工业应用的设计。","mnemonic":"专利法不保护科学发现，发现≠发明，发现是揭示已有规律"},{"id":439,"type":"single","text":"（）是人机交互发展的第三阶段，该阶段包含了语音识别和虚拟现实技术。","options":[{"label":"A","text":"自然和谐的人机交互（语音、手势、虚拟现实等）"},{"label":"B","text":"触摸屏操作"},{"label":"C","text":"图形用户界面（GUI）"},{"label":"D","text":"命令行界面（CLI）"}],"answer":"A","explanation":"命令行界面是计算机早期的交互方式，用户通过键盘输入命令，计算机进行响应","mnemonic":"人机交互第三阶段=自然和谐（语音+手势+VR），\"三自然\""},{"id":440,"type":"single","text":"在指导初级工处理数据标注问题时，应要求他们遵循下列哪项原则？（）","options":[{"label":"A","text":"标注时可以随意添加或删除标注类别，以方便工作"},{"label":"B","text":"按照标注规范进行标注，确保标注结果准确有用"},{"label":"C","text":"标注结果可以随意更改，只要最终达到要求即可"},{"label":"D","text":"忽略标注质量，以完成标注任务为主"}],"answer":"B","explanation":"初级工在数据标注过程中，应该具备严谨的标注态度和精细的标注能力","mnemonic":"初级工标注要按规范，确保准确有用，不能随意改动"},{"id":441,"type":"single","text":"对聚类分析描述最为精准的是（）。","options":[{"label":"A","text":"聚类分析的核心是建立变量间的回归关系"},{"label":"B","text":"聚类分析的目标是预测未来数据的分类结果"},{"label":"C","text":"聚类分析通过无监督学习将数据划分为相似性高的组别"},{"label":"D","text":"聚类分析需要依赖已知标签的数据进行模型训练"}],"answer":"C","explanation":"聚类分析是一种无监督学习方法，其核心是根据数据间的相似性将数据划分为组别，无需依赖标签或预测未来结果","mnemonic":"聚类=无监督+按相似性分组，没有标签、不做预测"},{"id":442,"type":"single","text":"在 scikit-learn 库中搭建高斯混合模型时，（）类是可供使用的。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"GaussianMixture"},{"label":"C","text":"MultinomialMixture"},{"label":"D","text":"BernoulliMixture"}],"answer":"B","explanation":"在使用scikit-learn库构建高斯混合模型时，应使用GaussianMixture类","mnemonic":"高斯混合模型=GaussianMixture类，名字完全对应\"高斯+混合\""},{"id":443,"type":"single","text":"在 OpenCV 里，用于进行直方图均值计算的函数是（）。","options":[{"label":"A","text":"skimage.transform.flip()"},{"label":"B","text":"cv2.equalizeHist()"},{"label":"C","text":"cv2.flip()"},{"label":"D","text":"cv2.rotate()"}],"answer":"B","explanation":"cv2.equalizeHist()实现直方图均衡化。","mnemonic":"OpenCV直方图均衡化=cv2.equalizeHist()，equalize=均衡"},{"id":444,"type":"single","text":"下列哪项方法能够通过提高模型复杂度来解决欠拟合问题（）。","options":[{"label":"A","text":"使用简单的优化算法"},{"label":"B","text":"增加特征选择的算法复杂度"},{"label":"C","text":"增加隐含层数量"},{"label":"D","text":"增加正则化项"}],"answer":"C","explanation":"增加隐含层数量提高复杂度缓解欠拟合。","mnemonic":"欠拟合→加隐含层提高复杂度，\"欠\"就要\"加\""},{"id":445,"type":"single","text":"一般来说，在神经网络训练中，批量大小（Batch Size）的选取会对训练过程产生怎样的影响（）。","options":[{"label":"A","text":"批量大小的选择不会影响模型训练，只要数据集较大即可"},{"label":"B","text":"较大的批量大小能更好地优化模型，避免震荡，提供稳定的梯度估计"},{"label":"C","text":"较小的批量大小能加快训练速度，但可能导致模型收敛到次优解"},{"label":"D","text":"较大的批量大小能够增加模型的泛化能力，通常能更好地避免过拟合"}],"answer":"B","explanation":"较大的批量大小通常会提供更加准确的梯度估计，从而使得训练过程更稳定，但它的计算开销也较大","mnemonic":"大批量=稳定梯度估计，大样本求均值更准确"},{"id":446,"type":"single","text":"在 K - 近邻算法中，需要挑选合适的距离度量方式来计算样本间的距离，下列哪种方法并非用于距离度量？（）","options":[{"label":"A","text":"卡方距离"},{"label":"B","text":"马氏距离"},{"label":"C","text":"切比雪夫距离"},{"label":"D","text":"曼哈顿距离"}],"answer":"A","explanation":"在K-近邻算法中，常用的距离度量方法包括欧式距离、曼哈顿距离、切比雪夫距离和马氏距离","mnemonic":"卡方距离不是KNN常用距离度量，KNN用欧曼切马四种距离"},{"id":447,"type":"single","text":"在追求卓越的各项基本要求里，属于 “追求专业素养” 这一项的是（）。","options":[{"label":"A","text":"无需提高专业素养"},{"label":"B","text":"积极参与相关领域的学习和培训"},{"label":"C","text":"追求个人利益"},{"label":"D","text":"避免参与团队合作"}],"answer":"B","explanation":"追求专业素养要求持续学习与培训，关注行业动态以保持竞争力。","mnemonic":"追求专业素养=积极学习培训，\"专业\"靠\"学习\"提升"},{"id":448,"type":"single","text":"数据仓库和操作性数据库（Operational Database）之间的主要区别在于（）。","options":[{"label":"A","text":"数据类型的支持"},{"label":"B","text":"数据的处理方式"},{"label":"C","text":"数据的存储结构"},{"label":"D","text":"数据的安全性要求"}],"answer":"B","explanation":"数据仓库专注于历史数据分析，而操作性数据库支持日常业务操作，处理方式不同。","mnemonic":"数据仓库vs操作数据库=处理方式不同，一个分析一个操作"},{"id":449,"type":"single","text":"在构建决策树的过程中，对于如何挑选最优特征来划分数据，下列说法正确的是（）。","options":[{"label":"A","text":"根据每个特征的类别标签进行选择"},{"label":"B","text":"选择信息增益最大或基尼指数最小的特征"},{"label":"C","text":"随机选择一个特征进行划分"},{"label":"D","text":"选择样本中出现频率最高的特征进行划分"}],"answer":"B","explanation":"决策树通过贪心策略选择信息增益最大或基尼指数最小的特征进行划分，以降低不纯度。","mnemonic":"决策树选特征：信息增益最大或基尼指数最小，\"增大基小\""},{"id":450,"type":"single","text":"下列哪项不是解决算法过拟合的常用方法（）。","options":[{"label":"A","text":"增加模型层数"},{"label":"B","text":"剪枝"},{"label":"C","text":"正则化"},{"label":"D","text":"交叉验证"}],"answer":"A","explanation":"增加模型层数提高复杂度，加剧过拟合，非解决措施。","mnemonic":"增加模型层数会加剧过拟合，不是解决而是恶化"},{"id":451,"type":"single","text":"关联分析中的 Apriori 算法，属于一种（）。","options":[{"label":"A","text":"聚类算法"},{"label":"B","text":"回归算法"},{"label":"C","text":"分类算法"},{"label":"D","text":"频繁模式挖掘算法"}],"answer":"D","explanation":"Apriori是频繁模式挖掘算法，用于关联规则发现。","mnemonic":"Apriori=频繁模式挖掘算法，\"A先验\"挖掘频繁项集"},{"id":452,"type":"single","text":"进行手势识别时，无需考虑下列哪项因素？","options":[{"label":"A","text":"手势的方向"},{"label":"B","text":"手势的运动轨迹"},{"label":"C","text":"手的大小"},{"label":"D","text":"手势的形状"}],"answer":"C","explanation":"手势的形状、位置、运动轨迹和方向等能映射成为丰富的语义内容信息。","mnemonic":"手势识别不考虑手的大小，关注形状、轨迹、方向"},{"id":453,"type":"single","text":"在支持向量机算法中，（）是能把数据从原始特征空间映射到高维特征空间的函数。","options":[{"label":"A","text":"优化函数"},{"label":"B","text":"激活函数"},{"label":"C","text":"损失函数"},{"label":"D","text":"核函数"}],"answer":"D","explanation":"核函数将数据映射到高维空间处理非线性问题。","mnemonic":"SVM核函数=映射到高维空间，\"核\"心功能是升维"},{"id":454,"type":"single","text":"在从事职业活动时，什么样的行为是符合职业道德要求的（）。","options":[{"label":"A","text":"向客户提供虚假信息"},{"label":"B","text":"坚持原则不做违法行为"},{"label":"C","text":"向领导谎报工作进展情况"},{"label":"D","text":"向同事索要私人财物"}],"answer":"B","explanation":"坚持原则不做违法行为可以体现职业道德的要求，而向同事索要私人财物、向领导谎报工作进展情况、向客户提供虚假信息则均违反职业道德。","mnemonic":"职业道德=坚持原则不违法，其余三项全是违法违德行为"},{"id":455,"type":"single","text":"在人机交互设计的流程中，对用户的行为、需求、期望等信息进行研究的是（）阶段？","options":[{"label":"A","text":"原型设计"},{"label":"B","text":"信息架构"},{"label":"C","text":"用户需求分析"},{"label":"D","text":"评估测试"}],"answer":"C","explanation":"用户需求分析是人机交互设计流程的第一个阶段，旨在了解用户的需求、期望、目标等信息，以便将这些信息纳入设计中","mnemonic":"用户需求分析=研究用户行为/需求/期望，设计第一步先了解用户"},{"id":456,"type":"single","text":"编写初级培训所用的讲义，这一工作在初级培训的整个流程里处于哪个步骤？（）","options":[{"label":"A","text":"课堂演练"},{"label":"B","text":"实践训练"},{"label":"C","text":"培训与指导"},{"label":"D","text":"考核与评估"}],"answer":"C","explanation":"编写初级培训讲义属于初级培训流程的培训与指导环节","mnemonic":"编写培训讲义=培训与指导环节，讲义是培训工具"},{"id":457,"type":"single","text":"在 SWOT 模型里，字母 “S” 所对应的含义是（）。","options":[{"label":"A","text":"Success"},{"label":"B","text":"Serenity"},{"label":"C","text":"Strong"},{"label":"D","text":"Strengths"}],"answer":"D","explanation":"SWOT模型中的“S”代表Strengths（优势）。","mnemonic":"SWOT的S=Strengths优势，不是Success也不是Strong"},{"id":458,"type":"single","text":"智慧商场凭借什么技术来达成全渠道、全场景的系统感知、数据分析、智能决策等功能？","options":[{"label":"A","text":"传统的人工管理"},{"label":"B","text":"纯粹的线上销售"},{"label":"C","text":"仅依赖线下实体店的布局优化"},{"label":"D","text":"现代信息技术"}],"answer":"D","explanation":"智慧商场依托现代信息技术实现全渠道感知、数据分析和智能决策功能。","mnemonic":"智慧商场靠现代信息技术，不是人工管理或纯线上"},{"id":459,"type":"single","text":"下列属于智能城市相关的项目有哪些（）。","options":[{"label":"A","text":"以上选择均正确"},{"label":"B","text":"施工占道识别"},{"label":"C","text":"垃圾桶溢满识别"},{"label":"D","text":"机动车违停识别"}],"answer":"A","explanation":"机动车违停识别、垃圾桶溢满识别、施工占道识别均属于智能城市的相关项目","mnemonic":"智能城市项目：违停+溢满+占道识别全包含，选A全对"},{"id":460,"type":"single","text":"jieba 分词的哪项功能能扫描出句子中所有可成词的词语，速度极快但无法解决歧义问题（）。","options":[{"label":"A","text":"精确模式"},{"label":"B","text":"全模式"},{"label":"C","text":"搜索引擎模式"},{"label":"D","text":"所有模式都可以"}],"answer":"B","explanation":"jieba的全模式可快速扫描所有可能词语，但无法处理歧义问题。","mnemonic":"jieba全模式=扫描所有可能词语+快+不解决歧义，\"全\"面但不精确"},{"id":461,"type":"single","text":"下列存储系统最适合分布式存储海量原始数据，且支持高吞吐量批处理的是（）。","options":[{"label":"A","text":"MySQL"},{"label":"B","text":"Redis"},{"label":"C","text":"MongoDB"},{"label":"D","text":"Hadoop HDFS"}],"answer":"D","explanation":"Hadoop HDFS是为分布式存储海量数据而设计的，具有高容错性和高吞吐量的特点。它非常适合存储原始数据（如日志文件、图片、视频等），并且通过Hadoop生态系统（如MapReduce、Spark等）可以高效地进行批处理。因此，它是最适合题干描述需求的存储系统。","mnemonic":"HDFS=分布式存海量数据+高吞吐批处理，Hadoop专干大数据"},{"id":462,"type":"single","text":"以下哪一选项不属于智慧医疗的实际应用案例？","options":[{"label":"A","text":"远程医疗"},{"label":"B","text":"智慧农业"},{"label":"C","text":"智能诊断辅助"},{"label":"D","text":"智能健康监测"}],"answer":"B","explanation":"智慧医疗的相关案例不包括智慧农业。","mnemonic":"智慧医疗不含智慧农业，医疗≠农业，领域完全不同"},{"id":463,"type":"single","text":"遵循 “严谨求是” 的基本要求所产生的积极作用中，不包含的是（）。","options":[{"label":"A","text":"降低工作效率"},{"label":"B","text":"为组织和客户提供更好的价值"},{"label":"C","text":"增强专业形象"},{"label":"D","text":"确保工作具有准确性"}],"answer":"A","explanation":"遵守\"严谨求是\"的基本要求，从业人员可以确保他们的工作具有准确性、可靠性和可信度","mnemonic":"严谨求是不会\"降低效率\"，反而提高准确性和可信度"},{"id":464,"type":"single","text":"下列哪项是数据仓库的主要用途（）。","options":[{"label":"A","text":"数据分析和决策支持"},{"label":"B","text":"数据备份和恢复"},{"label":"C","text":"网络安全保护"},{"label":"D","text":"实时数据处理"}],"answer":"A","explanation":"数据仓库的主要用途是支持数据分析和决策支持。它提供了一个统一的数据视图，使用户能够进行复杂的数据分析和提取，从而为组织的决策制定提供支持。","mnemonic":"数据仓库=数据分析+决策支持，仓库是用来分析决策的"},{"id":465,"type":"single","text":"在业务流程重组（BPR）里，着重突出了客户参与的重要意义的原则是（）。","options":[{"label":"A","text":"流程重组应体现服务重心前移原则"},{"label":"B","text":"成功的业务流程重组应同时关注内部运营效率和有效性的提高"},{"label":"C","text":"设计与流程控制目标相匹配的绩效度量体系"},{"label":"D","text":"成功的流程重组离不开客户的参与"}],"answer":"D","explanation":"强调客户参与的重要性的是“成功的流程重组离不开客户的参与”（D）。这一原则指出，客户的反馈和参与是BPR成功实施的重要因素，有助于更好地满足客户需求，确保流程重组的方向和效果符合客户期望。","mnemonic":"BPR强调客户参与：成功的流程重组\"离不开客户\""},{"id":466,"type":"single","text":"哪一类交互设备属于语音输入设备？","options":[{"label":"A","text":"手写板"},{"label":"B","text":"麦克风"},{"label":"C","text":"打印机"},{"label":"D","text":"鼠标"}],"answer":"B","explanation":"麦克风将语音转为数字信号，是语音输入设备。","mnemonic":"语音输入设备=麦克风，\"麦\"收声音，鼠标键盘不收音"},{"id":467,"type":"single","text":"在 LOTOS 模型中，可用于表示两个模型在同一时刻执行的运算符是（）。","options":[{"label":"A","text":"choice（选择）"},{"label":"B","text":"sequence（序列）"},{"label":"C","text":"synchronization（同步）"},{"label":"D","text":"concurrency（并发）"}],"answer":"C","explanation":"LOTOS模型中，同步运算符表示两个模型在同一时刻执行。","mnemonic":"LOTOS同一时刻执行=同步synchronization，\"同时=同步\""},{"id":468,"type":"single","text":"以下用于评估 Calinski-Harabasz 指数聚类质量的是（）。","options":[{"label":"A","text":"类内样本间的平均距离与类间样本间的平均距离"},{"label":"B","text":"类间方差与类内方差"},{"label":"C","text":"簇的数量与样本数量"},{"label":"D","text":"轮廓系数的平均值与标准差"}],"answer":"B","explanation":"Calinski-Harabasz指数通过类内协方差最小化和类间协方差最大化评估聚类质量。","mnemonic":"CH指数=类间方差/类内方差，\"间大内小\"聚类好"},{"id":469,"type":"single","text":"计算机系统是由哪两大部分共同构成的（）。","options":[{"label":"A","text":"内存、硬盘"},{"label":"B","text":"数据库、编程语言"},{"label":"C","text":"硬件、软件"},{"label":"D","text":"操作系统、应用软件"}],"answer":"C","explanation":"计算机系统由硬件系统和软件系统两大部分组成。硬件包括中央处理器、存储器、输入输出设备、主板等，软件包括操作系统、应用软件、系统软件等。","mnemonic":"计算机系统=硬件+软件，最基本的二分法"},{"id":470,"type":"single","text":"通过设置什么来调控信号采集的速度（）。","options":[{"label":"A","text":"AMR编码"},{"label":"B","text":"采样频率"},{"label":"C","text":"脉冲编码调制"},{"label":"D","text":"线性预测编码"}],"answer":"B","explanation":"采样频率调控信号采集速度，如8kHz表示每秒采集8000个数据。","mnemonic":"采样频率调控采集速度，频率越高采集越快"},{"id":471,"type":"single","text":"恪尽职守中 “持续学习和提升” 这一要求具体指的是什么（）。","options":[{"label":"A","text":"非法使用或占用公司资金"},{"label":"B","text":"出现问题时，推卸责任"},{"label":"C","text":"不参与团队合作"},{"label":"D","text":"关注行业动态和最新发展"}],"answer":"D","explanation":"持续学习要求关注行业动态，提升专业能力，以更好地履行职责，提升专业能力，以更好地履行职责。","mnemonic":"恪尽职守之持续学习=关注行业动态，学习才能更好履职"},{"id":472,"type":"single","text":"下列哪项不属于人机交互设计中的设计理念？","options":[{"label":"A","text":"理解技术"},{"label":"B","text":"帮助用户"},{"label":"C","text":"启发用户"},{"label":"D","text":"理解用户"}],"answer":"A","explanation":"人机交互设计中的设计理念是以人为本，所以理解用户、启发用户和帮助用户均正确，与理解技术无关","mnemonic":"人机交互设计理念不含\"理解技术\"，要理解的是\"用户\"不是技术"},{"id":473,"type":"single","text":"在可用性设计中，（）原则是指设计应尽量减少用户在学习和使用产品时的负担，让用户能迅速熟练地运用产品。","options":[{"label":"A","text":"吸引力"},{"label":"B","text":"鲁棒性"},{"label":"C","text":"灵活性"},{"label":"D","text":"可学习性"}],"answer":"D","explanation":"可学习性指产品应易于新用户学习，使其能够快速掌握使用方法","mnemonic":"可学习性=减少学习负担+快速上手，\"学\"习容易就是可\"学\"习性"},{"id":474,"type":"single","text":"下列哪项不属于短时平均能量的主要用途（）。","options":[{"label":"A","text":"作为区分信号帧数的参考"},{"label":"B","text":"作为辅助的特征参数用于语音识别"},{"label":"C","text":"作为区分有声和无声的依据"},{"label":"D","text":"作为区分清音和浊音的特征参数"}],"answer":"A","explanation":"短时平均能量的主要用途如下① 可以作为区分清音和浊音的特征参数","mnemonic":"短时平均能量不用于区分信号帧数，用于区分清浊音和辅助识别"},{"id":475,"type":"single","text":"留出法存在的缺点是（）。","options":[{"label":"A","text":"没有缺点"},{"label":"B","text":"无法处理多分类问题"},{"label":"C","text":"训练集和测试集的数据分布可能存在偏差"},{"label":"D","text":"划分数据集的比例不易确定"}],"answer":"C","explanation":"留出法的缺点之一是训练集和测试集的数据分布可能存在偏差，当训练集和测试集的数据分布不同或者训练集和测试集的数据具有时序性时，留出法会出现问题","mnemonic":"留出法缺点：训练/测试集分布可能有偏差，一刀切容易切偏"},{"id":476,"type":"single","text":"AARRR 模型中的 \"AR\" 指的是（）。","options":[{"label":"A","text":"用广告获取流量，增加应用运营的收入"},{"label":"B","text":"获取新用户，让用户体验产品"},{"label":"C","text":"提高用户的积极度，减少客户流失"},{"label":"D","text":"提高品牌知名度和口碑"}],"answer":"C","explanation":"在AARRR模型中，\"AR\"指的是\"Activation\"（激活）和\"Retention\"（留存）","mnemonic":"AARRR中AR=激活Activation+留存Retention，提高积极度减少流失"},{"id":477,"type":"single","text":"用于去除椒盐噪声的算法是（）。","options":[{"label":"A","text":"双边滤波"},{"label":"B","text":"高斯滤波"},{"label":"C","text":"均值滤波"},{"label":"D","text":"中值滤波"}],"answer":"D","explanation":"中值滤波能有效去除椒盐噪声。","mnemonic":"中值滤波去椒盐噪声，\"中值\"取中间值排除极端噪点"},{"id":478,"type":"single","text":"在体现 “交替” 关系的状态转换网络中，状态 S2 可通过（）转变为状态 S3。","options":[{"label":"A","text":"产生 G 正常结束事件"},{"label":"B","text":"G0 正常结束事件"},{"label":"C","text":"G1 正常结束事件"},{"label":"D","text":"外部事件0"}],"answer":"B","explanation":"根据“交替”关系的状态转换网络，状态 S2 可以通过 G0 正常结束事件直接转换到状态 S3","mnemonic":"交替关系中S2→S3通过G0正常结束事件，记\"零到三\""},{"id":479,"type":"single","text":"运用支持向量机进行分类任务时，（）会对决策边界的复杂程度产生控制作用。","options":[{"label":"A","text":"正则化参数C"},{"label":"B","text":"核函数类型"},{"label":"C","text":"最大迭代次数"},{"label":"D","text":"学习率"}],"answer":"A","explanation":"支持向量机中，正则化参数C调节决策边界复杂度，平衡欠拟合和过拟合风险。","mnemonic":"SVM正则化参数C控制决策边界复杂度，C=Control复杂度"},{"id":480,"type":"single","text":"在自然交互技术中，（）主要依靠传感器来感知用户的眼球活动情况。","options":[{"label":"A","text":"手势识别技术"},{"label":"B","text":"语音交互技术"},{"label":"C","text":"眼动跟踪技术"},{"label":"D","text":"笔式输入技术"}],"answer":"C","explanation":"眼动跟踪技术依靠传感器感知用户眼球活动。","mnemonic":"眼动跟踪技术=传感器感知眼球活动，\"眼动\"二字直接对应"},{"id":481,"type":"single","text":"多维度拆解分析法是从哪些方面去剖析事物原本的 “面貌”（）。","options":[{"label":"A","text":"多个唯独"},{"label":"B","text":"多个围度"},{"label":"C","text":"多个纬度"},{"label":"D","text":"多个维度"}],"answer":"D","explanation":"多维度拆解分析法就是从多个维度去分析事物本来的“面貌”","mnemonic":"多维度拆解的\"维度\"正确写法是D选项，排除错别字\"唯/围/纬\""},{"id":482,"type":"single","text":"下列属于职业道德所具备特征的是（）。","options":[{"label":"A","text":"实践性、适应性"},{"label":"B","text":"开放性、多样性"},{"label":"C","text":"实践性、继承性"},{"label":"D","text":"职业性、安全性"}],"answer":"C","explanation":"职业道德具有职业性、实践性、继承性和多样性。实践性指道德通过职业行为体现，继承性指核心规范在不同时期被传承。","mnemonic":"职业道德特征=实践性+继承性，口诀\"实继\"（实际继承）"},{"id":483,"type":"single","text":"在 Python 中，可用于对图像进行双边滤波处理的函数是（）。","options":[{"label":"A","text":"cv2.threshold()"},{"label":"B","text":"cv2.GaussianBlur()"},{"label":"C","text":"cv2.bilateralFilter()"},{"label":"D","text":"cv2.medianBlur()"}],"answer":"C","explanation":"cv2.bilateralFilter()实现双边滤波，保留边缘去噪。","mnemonic":"双边滤波=cv2.bilateralFilter()，bilateral=双边"},{"id":484,"type":"single","text":"OpenCV 库中可用于读取图像数据的方法是（）。","options":[{"label":"A","text":"cv2.resize()"},{"label":"B","text":"cv2.cvtColor()"},{"label":"C","text":"cv2.imshow()"},{"label":"D","text":"cv2.imread()"}],"answer":"D","explanation":"OpenCV的imread()函数用于读取图像数据。","mnemonic":"OpenCV读图=cv2.imread()，im=image，read=读取"},{"id":485,"type":"single","text":"下列关于留出法的适用条件描述正确的是（ ）。","options":[{"label":"A","text":"适合处理数据量极大且无法完整加载到内存的场景"},{"label":"B","text":"可以通过分层采样保持训练/测试集的数据分布一致性"},{"label":"C","text":"对包含不同类别样本数量的数据集具有天然适应性"},{"label":"D","text":"能有效处理存在大量缺失值的原始数据"}],"answer":"B","explanation":"留出法适用于中小规模数据集，对于极大、缺失或不均衡数据可能效果不佳。","mnemonic":"留出法可通过分层采样保持分布一致性，\"分层\"保\"一致\""},{"id":486,"type":"single","text":"在特征选择方法中，（）是过滤式方法的主要缺点之一。","options":[{"label":"A","text":"容易忽略特征之间的相关性"},{"label":"B","text":"需要大量的计算资源"},{"label":"C","text":"仅考虑单个特征与目标的相关性"},{"label":"D","text":"无法进行后续的分类/回归任务"}],"answer":"A","explanation":"过滤式方法的缺点在于它仅考虑每个特征与目标变量的独立相关性，而忽略了特征之间可能存在的相关性，这可能导致一些重要的交互特征被忽视，从而影响模型性能。","mnemonic":"过滤式方法缺点=忽略特征间相关性，只看单个不看组合"},{"id":487,"type":"single","text":"运用自助法划分数据集时，每个数据样本被抽取的概率是多少（）。","options":[{"label":"A","text":"1-1/n"},{"label":"B","text":"1/2n"},{"label":"C","text":"1/(n-1)"},{"label":"D","text":"1/n"}],"answer":"D","explanation":"自助法中每个样本被抽中的概率为1/n。","mnemonic":"自助法每次抽样概率=1/n，n个样本随机抽一个"},{"id":488,"type":"single","text":"在 Word 软件中，若要取消段落的悬挂缩进设置，可使用的快捷键组合是（）。","options":[{"label":"A","text":"Ctrl+1"},{"label":"B","text":"Ctrl+2"},{"label":"C","text":"Ctrl+3"},{"label":"D","text":"Ctrl+Shift+T"}],"answer":"D","explanation":"在Word中，取消悬挂缩进的快捷键是Ctrl+Shift+T。","mnemonic":"Word取消悬挂缩进=Ctrl+Shift+T，T联想Tab缩进"},{"id":489,"type":"single","text":"借助 jieba 分词库进行中文分词时，允许自定义词典，其目的是（）。","options":[{"label":"A","text":"提高分词速度"},{"label":"B","text":"增强分词库的分词能力"},{"label":"C","text":"对分词库进行更新和维护"},{"label":"D","text":"指定分词库使用的停用词"}],"answer":"B","explanation":"自定义词典可以增加分词库的词汇量，提高分词的准确性","mnemonic":"jieba自定义词典=增强分词能力，加词典让分词更准"},{"id":490,"type":"single","text":"下列哪项不符合恪尽职守的基本要求（）。","options":[{"label":"A","text":"持续发展专业知识和技能"},{"label":"B","text":"保护公司机密"},{"label":"C","text":"尊重他人权益"},{"label":"D","text":"不遵守工作时间，迟到早退"}],"answer":"D","explanation":"尊重他人权益、保护公司机密、持续发展专业知识和技能均符合恪尽职守的基本要求；不遵守工作时间，迟到早退不符合恪尽职守的基本要求","mnemonic":"迟到早退不符合恪尽职守，\"恪尽\"就是要尽职尽责守时守规"},{"id":491,"type":"single","text":"下列选项中，关于数据存储技术的说法正确的是（）。","options":[{"label":"A","text":"列组数据库的列族是在存储数据之前创建的，且列数不可扩展"},{"label":"B","text":"NOSQL数据库和关系数据库数据模型都遵守原子性、一致性的事务属性"},{"label":"C","text":"分布式文件系统允许多机器上的多用户分享文件和存储空间"},{"label":"D","text":"分布式文件系统提供文件复制功能，但没有容错机制"}],"answer":"C","explanation":"5（好）","mnemonic":"分布式文件系统=允许多机多用户共享文件和空间，\"分布共享\""},{"id":492,"type":"single","text":"智慧医疗解决方案中，不包含的技术是哪一项（）。","options":[{"label":"A","text":"物联网"},{"label":"B","text":"大数据"},{"label":"C","text":"人工智能"},{"label":"D","text":"区块链"}],"answer":"D","explanation":"智慧医疗解决方案所包含的技术领域包括人工智能、大数据和物联网","mnemonic":"智慧医疗技术=AI+大数据+物联网，不含区块链"},{"id":493,"type":"single","text":"在文本数据处理流程里，数据建模的主要目的是（）。","options":[{"label":"A","text":"通过机器学习算法进行分类或预测"},{"label":"B","text":"识别实体和命名实体"},{"label":"C","text":"获取关键字和词频统计信息"},{"label":"D","text":"确定文本的主题和情感倾向"}],"answer":"A","explanation":"数据分析和建模是文本数据处理流程中的最后一步，其目的是通过机器学习算法进行数据挖掘和预测，以实现文本的自动分类和情感分析等任务","mnemonic":"文本数据建模=用ML算法分类或预测，建模是最后一步做预测"},{"id":494,"type":"single","text":"在回归模型里，均方误差（MSE）指的是什么（）。","options":[{"label":"A","text":"样本的平方和"},{"label":"B","text":"残差的平均误差"},{"label":"C","text":"残差的平方和除以样本数量"},{"label":"D","text":"样本的平均误差"}],"answer":"C","explanation":"均方误差(MSE)是回归模型中用来评估模型预测结果误差大小的指标。计算方法为所有样本的残差平方和除以样本数量，即MSE=Σ(yi-ŷi)²/n，其中yi为实际值，ŷi为预测值，n为样本数量。","mnemonic":"MSE=残差平方和÷样本数，\"均\"方\"误\"差=平均的误差平方"},{"id":495,"type":"single","text":"空间复杂度的指标是（）。","options":[{"label":"A","text":"程序代码行数"},{"label":"B","text":"算法运行所占辅助存储空间"},{"label":"C","text":"数据规模"},{"label":"D","text":"计算机执行时间"}],"answer":"B","explanation":"空间复杂度是指算法执行所需的辅助存储空间与输入规模之间的关系，它包括算法在执行过程中所需的临时存储空间，如局部变量、数据结构、递归栈等的内存占用。","mnemonic":"空间复杂度=算法所占辅助存储空间，\"空间\"对\"存储空间\""},{"id":496,"type":"single","text":"下列哪一项不属于智慧城市的应用场景？","options":[{"label":"A","text":"智慧交通"},{"label":"B","text":"智慧农业"},{"label":"C","text":"智慧医疗"},{"label":"D","text":"智慧消防"}],"answer":"B","explanation":"智慧城市的应用场景不包括智慧农业。","mnemonic":"智慧城市不含智慧农业，城市≠农村"},{"id":497,"type":"single","text":"中文分词对哪项任务没有显著影响（）。","options":[{"label":"A","text":"图像处理"},{"label":"B","text":"情感分析"},{"label":"C","text":"命名实体识别"},{"label":"D","text":"文本分类"}],"answer":"A","explanation":"中文分词主要影响文本处理任务，对图像处理无显著影响。","mnemonic":"中文分词对图像处理无影响，分词管文字不管图片"},{"id":498,"type":"single","text":"在解决欠拟合的方法中，下列哪项属于基于增加特征的方法（）。","options":[{"label":"A","text":"L2正则化"},{"label":"B","text":"Dropout"},{"label":"C","text":"使用多项式特征"},{"label":"D","text":"数据增强"}],"answer":"C","explanation":"欠拟合的主要原因之一是特征过少，增加特征可以有效缓解欠拟合问题。","mnemonic":"解决欠拟合增加特征=使用多项式特征，多项式扩展特征维度"},{"id":499,"type":"single","text":"对于劳动合同法规定的条例，下列说法正确的是（）。","options":[{"label":"A","text":"建立劳动关系，可以口头订立协议"},{"label":"B","text":"用人单位与劳动者在用工前订立劳动合同的，劳动关系自订立之日起建立"},{"label":"C","text":"非全日制用工双方当事人可以订立口头协议"},{"label":"D","text":"用人单位与劳动者协商一致，不可以订立无固定期限劳动合同"}],"answer":"C","explanation":"劳动合同法允许非全日制用工口头协议，其他情况需书面合同，劳动关系自用工日起建立。","mnemonic":"非全日制用工可口头协议，\"非全日制\"灵活用工可以口头约定"},{"id":500,"type":"single","text":"在 Python 中调用中文分词模型时，通过参数（）能够运用隐马尔可夫模型进行分词。","options":[{"label":"A","text":"user_dict"},{"label":"B","text":"tf-idf"},{"label":"C","text":"HMM"},{"label":"D","text":"cut_all"}],"answer":"C","explanation":"在调用中文分词模型时，参数HMM可以使用隐马尔可夫模型进行分词","mnemonic":"jieba用HMM参数启用隐马尔可夫模型分词，HMM三个字母直接对应"},{"id":501,"type":"single","text":"下列哪一项（）不属于聚类分析的方法。","options":[{"label":"A","text":"线性回归"},{"label":"B","text":"层次聚类"},{"label":"C","text":"分层聚类"},{"label":"D","text":"K均值聚类"}],"answer":"A","explanation":"线性回归不是聚类分析的方法，而是一种回归分析方法。","mnemonic":"聚类方法不含\"线性回归\"，回归是预测不是聚类，选A排除"},{"id":502,"type":"single","text":"在移动端界面设计里，若想优化用户体验、简化操作流程，哪项设计原则对减轻用户输入负担、提升交互速度最有帮助？（）","options":[{"label":"A","text":"简单直观"},{"label":"B","text":"易于检索"},{"label":"C","text":"最大限度地避免用户出错"},{"label":"D","text":"避免不必要的文本输入"}],"answer":"D","explanation":"避免不必要的文本输入原则通过减少文本输入需求提升移动端交互效率。","mnemonic":"移动端减负担＝减少输入，\"避免不必要文本输入\"直击要害选D"},{"id":503,"type":"single","text":"在可用性设计中，（）原则是指产品要能容纳用户的操作失误，并为用户提供明确的错误信息或恢复方式。","options":[{"label":"A","text":"容错性"},{"label":"B","text":"吸引力"},{"label":"C","text":"灵活性"},{"label":"D","text":"可学习性"}],"answer":"A","explanation":"可学习性指产品应易于新用户学习，使其能够快速掌握使用方法","mnemonic":"容错＝容纳错误＋提供恢复，题目说\"容纳失误\"直指容错性A"},{"id":504,"type":"single","text":"数据整合指的是什么（）。","options":[{"label":"A","text":"从数据中提取有用的信息"},{"label":"B","text":"将数据备份到云存储中"},{"label":"C","text":"将数据从不同数据源整合到一个统一的数据集中"},{"label":"D","text":"将数据转换为图形或图表形式"}],"answer":"C","explanation":"数据整合指将多源数据汇集到统一数据集中。","mnemonic":"数据整合＝多源合一，\"不同数据源→统一数据集\"选C"},{"id":505,"type":"single","text":"业务流程优化项目小组的主要职责中，不包括下列哪一项（）。","options":[{"label":"A","text":"直接负责企业的日常运营管理"},{"label":"B","text":"推动新的流程方案落实并执行"},{"label":"C","text":"制订流程改进计划"},{"label":"D","text":"对现有业务流程进行描述、分析和诊断"}],"answer":"A","explanation":"项目小组职责不包括日常运营管理，聚焦流程改进实施。","mnemonic":"项目小组管流程改进不管日常运营，\"日常运营\"是管理层的事选A"},{"id":506,"type":"single","text":"图像数据处理流程中的特征提取步骤，能够帮助解决什么问题（）。","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"数据分类"},{"label":"C","text":"数据预处理"},{"label":"D","text":"数据清洗"}],"answer":"B","explanation":"特征提取将原始数据转化为分类可用的特征形式。","mnemonic":"特征提取为分类服务，提取特征→数据分类选B"},{"id":507,"type":"single","text":"使用 jieba 分词时，可用哪种方法添加自定义的分词词典（）。","options":[{"label":"A","text":"jieba.use_dict()"},{"label":"B","text":"jieba.set_dict()"},{"label":"C","text":"jieba.load_dict()"},{"label":"D","text":"jieba.add_word()"}],"answer":"D","explanation":"可以使用`jieba.add_word()`方法来添加自定义分词词典","mnemonic":"jieba添加自定义词用add_word()，\"添加\"对应\"add\"选D"},{"id":508,"type":"single","text":"以下哪一种交互方式最能体现第三代人机交互技术的特点？（）","options":[{"label":"A","text":"使用鼠标点击图标和按钮进行操作"},{"label":"B","text":"通过语音命令控制设备，进行操作"},{"label":"C","text":"使用虚拟键盘输入文字"},{"label":"D","text":"通过触摸屏滑动手指操作设备"}],"answer":"B","explanation":"语音命令控制最能体现第三代人机交互的自然和直观特点。","mnemonic":"第三代人机交互＝自然交互，语音命令最自然选B"},{"id":509,"type":"single","text":"下列哪项属于造成模型欠拟合的原因（）。","options":[{"label":"A","text":"样本标签噪声"},{"label":"B","text":"算法选择不当"},{"label":"C","text":"特征选择恰当"},{"label":"D","text":"特征维度过高"}],"answer":"B","explanation":"模型复杂度过于简单是导致欠拟合的直接因素。最常见的为选择不适合数据特性的算法导致欠拟合。模型过于简单，例如使用线性模型处理非线性关系，模型无法捕捉数据中的复杂规律，导致欠拟合。","mnemonic":"欠拟合＝模型太简单，算法选择不当导致模型简单选B"},{"id":510,"type":"single","text":"利用深度学习框架对神经网络展开训练时，以下哪项操作是评估模型性能的标准方式（）。","options":[{"label":"A","text":"model.predict()"},{"label":"B","text":"model.evaluate()"},{"label":"C","text":"model.train()"},{"label":"D","text":"model.compile()"}],"answer":"B","explanation":"model.evaluate()是用来评估模型性能的标准方法。它通常接受测试数据并返回损失值和任何定义的评估指标（如准确率）。","mnemonic":"评估模型性能用evaluate()，evaluate就是\"评估\"选B"},{"id":511,"type":"single","text":"灰度级修正方法能够使（）。","options":[{"label":"A","text":"压缩图像的动态范围"},{"label":"B","text":"增加图像的分辨率"},{"label":"C","text":"图像动态范围加大、对比度扩展、清度增加"},{"label":"D","text":"提高图像质量"}],"answer":"C","explanation":"通过灰度级修正方法可使图像动态范围加大、对比度扩展、清度增加，从而大大改善图像的视觉效果","mnemonic":"灰度级修正三效果：动态范围大、对比度扩、清度增，选C"},{"id":512,"type":"single","text":"关于采样模式的描述，哪一项是不正确的？（）","options":[{"label":"A","text":"采样模式允许输入设备与应用程序独立工作，输入设备持续不断地输入数据。"},{"label":"B","text":"在采样模式下，应用程序需要周期性地读取输入设备的状态"},{"label":"C","text":"采样模式适用于实时性要求高的应用场景，例如视频流输入"},{"label":"D","text":"在采样模式下，应用程序无法处理输入设备的数据，直到输入操作完成"}],"answer":"D","explanation":"选项A正确，采样模式的特点之一就是输入设备与应用程序独立工作，输入设备持续不断地采样数据，应用程序在需要时读取这些数据。选项B正确，采样模式下应用程序定期读取输入设备的状态或数据，应用程序和输入设备是独立运行的。选项C是正确的，采样模式对于实时流式数据处理非常适合，例如视频流和实时传感器数据。选项D不正确，采样模式允许输入设备持续工作，应用程序可以随时读取采样数据，而不需要等待输入操作完成。","mnemonic":"采样模式允许随时读取数据，不必等操作完成，D说\"无法处理直到完成\"错"},{"id":513,"type":"single","text":"下面哪一项不属于 LOTOS 算子的基本操作符（）。","options":[{"label":"A","text":"T1 >> T2（允许 Enabling）"},{"label":"B","text":"T1 * T2（并发 Concurrency）"},{"label":"C","text":"T1 [] T2（选择 Choice）"},{"label":"D","text":"T1 ||| T2（交替 Interleavin）"}],"answer":"B","explanation":"根据LOTOS算符的定义，LOTOS的基本操作符包括以下几种：T1 ||| T2（交替 Interleaving）T1 [] T2（选择 Choice）T1 [> T2（禁止 Deactivation）T1 >> T2（允许 Enabling）","mnemonic":"LOTOS基本算子有允许>>、选择[]、交替|||，没有并发*选B"},{"id":514,"type":"single","text":"在 RFM 模型中，计算 Frequency 指标得分时，得分越高表明（）。","options":[{"label":"A","text":"越远期"},{"label":"B","text":"越近期"},{"label":"C","text":"越不活跃"},{"label":"D","text":"越活跃"}],"answer":"D","explanation":"在RFM模型中，Frequency指标得分越高表示客户越活跃。Frequency得分越高表示客户购买频率较高。","mnemonic":"RFM中F＝Frequency频率，得分越高＝买得越多＝越活跃选D"},{"id":515,"type":"single","text":"NoSQL 集群借助数据复制和分片来提高系统性能与可靠性，以下选项中能正确描述这两种机制主要作用的是（）。","options":[{"label":"A","text":"数据复制用于横向扩展存储容量，数据分片用于提高数据一致性。"},{"label":"B","text":"数据复制用于减少网络延迟，数据分片用于支持复杂事务。"},{"label":"C","text":"数据复制用于提高读取速度和容错性，数据分片用于实现数据的横向扩展。"},{"label":"D","text":"数据复制和分片均用于增强数据的安全性和加密存储。"}],"answer":"C","explanation":"NoSQL集群通过数据复制提高容错性和读取速度，通过数据分片实现横向扩展。","mnemonic":"复制提高读取和容错，分片实现横向扩展，记\"复读容错、分片扩展\"选C"},{"id":516,"type":"single","text":"在贝叶斯算法里，先验概率与后验概率之间存在着怎样的关系（）。","options":[{"label":"A","text":"先验概率是在已知结果前对未知事件的主观判断，而后验概率是在已知结果后对事件概率的重新评估"},{"label":"B","text":"先验概率是在已知结果后对事件概率的重新评估，而后验概率是在未知结果前对未知事件的主观判断"},{"label":"C","text":"先验概率和后验概率是相互独立的，没有任何关系"},{"label":"D","text":"先验概率和后验概率是近似相等的"}],"answer":"A","explanation":"先验概率是初始主观判断，后验概率是结合数据后的更新评估，两者通过贝叶斯定理关联。","mnemonic":"先验＝事前主观判断，后验＝事后数据更新，\"先前后更\"选A"},{"id":517,"type":"single","text":"在图形用户界面设计中，（）有助于减少用户的学习难度，增进用户对系统的理解并提高使用效率。","options":[{"label":"A","text":"界面应简洁直观，并提供易于理解的交互方式"},{"label":"B","text":"设计应关注美观性"},{"label":"C","text":"界面设计应尽量采用复杂的术语和高阶功能"},{"label":"D","text":"界面元素、布局和交互方式应保持一致性"}],"answer":"A","explanation":"界面简洁直观、易于理解可降低用户学习难度。","mnemonic":"减少学习难度＝简洁直观易理解，不是一致性也不是美观选A"},{"id":518,"type":"single","text":"在图形用户界面设计里，（）有利于增强用户对系统的掌控感，从而提升其操作时的信心。","options":[{"label":"A","text":"界面设计应尽量减少反馈信息，避免干扰用户操作。"},{"label":"B","text":"允许用户与出现在屏幕上的对象直接交互。"},{"label":"C","text":"界面设计应只提供必要的功能，避免复杂的操作步骤。"},{"label":"D","text":"界面设计应提供高质量的视觉效果，以吸引用户的注意力。"}],"answer":"B","explanation":"允许用户与屏幕对象直接交互有助于增强控制感和操作信心。","mnemonic":"增强掌控感＝直接交互，\"允许用户直接操作屏幕对象\"选B"},{"id":519,"type":"single","text":"下列哪项属于遵章守法的基本要求（）。","options":[{"label":"A","text":"谋取个人利益"},{"label":"B","text":"参与洗钱行为"},{"label":"C","text":"无条件听从上级指挥"},{"label":"D","text":"遵守宪法法律"}],"answer":"D","explanation":"职业守则中的\"遵章守法\"基本要求指的是从业人员应该遵守法律法规和相关规定","mnemonic":"遵章守法＝遵守宪法法律，其他选项都是违法行为选D"},{"id":520,"type":"single","text":"直方图均衡化是一种常用的图像增强手段，其核心思路是（）。","options":[{"label":"A","text":"通过压缩图像的动态范围来提高图像质量"},{"label":"B","text":"通过减少图像的噪声来提高图像质量"},{"label":"C","text":"通过增加图像的分辨率来提高图像质量"},{"label":"D","text":"对原始图像中的像素灰度做某种映射变换，使变换后图像灰度的概率密度是均匀分布的"}],"answer":"D","explanation":"直方图均衡化通过灰度映射使输出图像灰度均匀分布，提高对比度。","mnemonic":"直方图均衡化＝灰度映射→均匀分布，关键词\"均匀分布\"选D"},{"id":521,"type":"single","text":"针对时间管理四象限法则中不同活动的效果分析，（）象限所代表的是事情紧急但并不重要。","options":[{"label":"A","text":"第四象限"},{"label":"B","text":"第三象限"},{"label":"C","text":"第二象限"},{"label":"D","text":"第一象限"}],"answer":"B","explanation":"时间管理四象限法则中，第一象限是指重要并且紧急的事情","mnemonic":"四象限：一重急、二重不急、三急不重、四不急不重，\"紧急不重要\"＝第三选B"},{"id":522,"type":"single","text":"下列哪项技术并非智慧医疗的关键技术？","options":[{"label":"A","text":"物联网"},{"label":"B","text":"大数据"},{"label":"C","text":"量子计算"},{"label":"D","text":"人工智能"}],"answer":"C","explanation":"量子计算不是智慧医疗的关键技术。","mnemonic":"智慧医疗关键技术：物联网+大数据+AI，量子计算不在其中选C"},{"id":523,"type":"single","text":"下列哪项是多维度拆解分析方法需要理解的关键词（）。","options":[{"label":"A","text":"纬度"},{"label":"B","text":"解析"},{"label":"C","text":"拆解"},{"label":"D","text":"维系"}],"answer":"C","explanation":"多维度拆解分析的核心是“维度”和“拆解”两个概念。","mnemonic":"多维度拆解分析＝\"拆解\"是关键动作词，选C"},{"id":524,"type":"single","text":"关联分析里的支持度，其含义是（）。","options":[{"label":"A","text":"属性的频率"},{"label":"B","text":"属性的重要程度"},{"label":"C","text":"出现某个属性组合的频率"},{"label":"D","text":"两个属性之间的相关程度"}],"answer":"C","explanation":"支持度表示某个属性组合在数据中出现的频率或次数，是关联分析中最基本的概念之一","mnemonic":"支持度＝某属性组合出现的频率，\"组合频率\"选C"},{"id":525,"type":"single","text":"在指导中级工作人员开展文本转写工作的过程中，有哪些关键事项必须加以关注？（）","options":[{"label":"A","text":"转写内容需要与实际发音内容完全一致"},{"label":"B","text":"可以出现修改删除的问题"},{"label":"C","text":"对重复语音内容无需转写"},{"label":"D","text":"对不通顺的语音内容无需转写"}],"answer":"A","explanation":"文本转写需与实际发音一致，保留重复内容。","mnemonic":"文本转写必须与实际发音完全一致，不能删改选A"},{"id":526,"type":"single","text":"在数据标注流程里，标注任务可以划分为哪些阶段（）。","options":[{"label":"A","text":"以上选项均错误"},{"label":"B","text":"数据采集、数据清洗、标注实施"},{"label":"C","text":"标注实施、数据质量审核、提交和汇总"},{"label":"D","text":"需求确认、标注实施、质量审核和评估"}],"answer":"D","explanation":"在数据标注流程中，标注任务应该分为任务需求确认、标注实施、质量审核和评估等阶段，以确保标注结果的准确性和一致性。","mnemonic":"数据标注三阶段：需求确认→标注实施→质量审核评估选D"},{"id":527,"type":"single","text":"支持向量机属于一种（）。","options":[{"label":"A","text":"半监督学习算法"},{"label":"B","text":"强化学习算法"},{"label":"C","text":"非监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"D","explanation":"支持向量机算法是一种监督学习算法，适用于二分类和多分类问题","mnemonic":"SVM支持向量机＝监督学习，需要标签训练选D"},{"id":528,"type":"single","text":"研发智慧交通解决方案的目的是（）。","options":[{"label":"A","text":"促进经济发展"},{"label":"B","text":"增加交通壅塞"},{"label":"C","text":"提高车辆制造效率"},{"label":"D","text":"提高交通效率和安全性"}],"answer":"D","explanation":"智慧交通解决方案旨在提升交通效率与智慧交通解决方案旨在提升交通效率与安全性。","mnemonic":"智慧交通目的＝提高效率和安全性，\"效率+安全\"选D"},{"id":529,"type":"single","text":"和传统的关系型数据库相比，下列哪项不是 NoSQL 数据库的典型特点（）。","options":[{"label":"A","text":"高可扩展性"},{"label":"B","text":"数据模型灵活多变，不受固定模式限制"},{"label":"C","text":"支持复杂的事务处理和多表连接操作"},{"label":"D","text":"适合处理海量数据和高并发访问"}],"answer":"C","explanation":"NoSQL数据库的主要特点有灵活的数据模型、可扩展性强、高可用性和高并发性。","mnemonic":"NoSQL不擅长复杂事务和多表连接，这是关系型数据库的强项选C"},{"id":530,"type":"single","text":"能够根据数据分析得出的结论，对智能产品的单一功能提出优化方面的需求，这属于哪个步骤？（）","options":[{"label":"A","text":"业务数据质量检测"},{"label":"B","text":"智能系统优化"},{"label":"C","text":"智能系统维护"},{"label":"D","text":"数据归类和定义"}],"answer":"B","explanation":"能够根据数据分析结论对智能产品的单一功能提出优化需求属于智能系统优化环节。","mnemonic":"根据数据分析对功能提优化需求＝智能系统优化选B"},{"id":531,"type":"single","text":"下列哪项方法常被用于中文分词任务（）。","options":[{"label":"A","text":"深度神经网络算法"},{"label":"B","text":"支持向量机算法"},{"label":"C","text":"随机森林算法"},{"label":"D","text":"最大匹配法"}],"answer":"D","explanation":"最大匹配法常用于中文分词任务","mnemonic":"中文分词经典方法＝最大匹配法，\"匹配\"分词选D"},{"id":532,"type":"single","text":"无人零售是一种运用智能技术，让消费者在购物过程中不需要依靠以下哪类人员协助的零售模式？","options":[{"label":"A","text":"系统开发人员"},{"label":"B","text":"营业员、服务员"},{"label":"C","text":"仓库管理员"},{"label":"D","text":"供应商"}],"answer":"B","explanation":"无人零售模式无需营业员或服务员协助。","mnemonic":"无人零售＝无需营业员和服务员，\"无人\"服务选B"},{"id":533,"type":"single","text":"人机交互中的自适应系统能够增强用户体验，下列哪项不属于自适应系统的优势？","options":[{"label":"A","text":"提高任务执行的效率"},{"label":"B","text":"增加系统的复杂性"},{"label":"C","text":"减少用户的操作错误"},{"label":"D","text":"提供个性化的用户体验"}],"answer":"B","explanation":"自适应系统提供个性化体验并提高效率，不提供个性化体验并提高效率，不增加复杂性。","mnemonic":"自适应系统优势是简化而非增加复杂性，\"增加复杂性\"是缺点不是优势选B"},{"id":534,"type":"single","text":"在高维数据中，模型之所以容易出现过拟合，原因是（）。","options":[{"label":"A","text":"数据量不足，无法覆盖所有特征"},{"label":"B","text":"高维数据具有更多的信息量"},{"label":"C","text":"高维数据导致模型变得过于简单"},{"label":"D","text":"高维数据增加了模型复杂度，容易记住噪声而不是数据的真实模式"}],"answer":"D","explanation":"高维数据易导致过拟合，模型过度记忆训练细节，泛化能力下降。","mnemonic":"高维数据过拟合＝维度高→模型复杂→记住噪声，选D"},{"id":535,"type":"single","text":"在 Word 中，若想选中 “邮件” 选项卡，对应的快捷键是（）。","options":[{"label":"A","text":"Ctrl+B"},{"label":"B","text":"Ctrl+M"},{"label":"C","text":"Alt+M"},{"label":"D","text":"Alt+V"}],"answer":"C","explanation":"在进行邮件合并时，若要选择“邮件”选项卡，快捷键是Alt+M","mnemonic":"Word邮件选项卡＝Alt+M，M＝Mail邮件首字母选C"},{"id":536,"type":"single","text":"业务流程重组（BPR）的主要目的是使企业经营在哪些领域取得明显进步（）。","options":[{"label":"A","text":"成本、质量、服务和速度"},{"label":"B","text":"产品质量、生产效率和市场竞争力"},{"label":"C","text":"技术集成、管理职能和组织结构"},{"label":"D","text":"员工满意度、客户满意度和市场份额"}],"answer":"A","explanation":"BPR旨在显著改善成本、质量、服务和速度等经营指标。","mnemonic":"BPR目的＝成本、质量、服务、速度四项改善，口诀\"成质服速\"选A"},{"id":537,"type":"single","text":"大数据的主要信息来源中，不包含哪一项？（）","options":[{"label":"A","text":"自然语言对话系统"},{"label":"B","text":"企业系统"},{"label":"C","text":"机器系统"},{"label":"D","text":"互联网系统"}],"answer":"A","explanation":"自然语言对话系统不是大数据的主要来源。","mnemonic":"大数据三大来源：企业系统+机器系统+互联网系统，对话系统不算选A"},{"id":538,"type":"single","text":"不仅能提取文本的语义信息，还能提取文本语序信息的是（）。","options":[{"label":"A","text":"词袋模型"},{"label":"B","text":"Doc2Vec模型"},{"label":"C","text":"One-hot模型"},{"label":"D","text":"Word2Vec模型"}],"answer":"B","explanation":"Doc2Vec模型是Word2Vec模型的升级，不仅提取文本的语义信息，还可以提取文本的语序信息。","mnemonic":"Doc2Vec＝语义+语序双提取，比Word2Vec多了语序信息选B"},{"id":539,"type":"single","text":"在关联分析过程中，若支持度低于最小支持度阈值，会出现（）情况。","options":[{"label":"A","text":"该阈值是一个固定值"},{"label":"B","text":"该阈值与关联规则无关"},{"label":"C","text":"该属性组合被认为相关"},{"label":"D","text":"该属性组合被认为不相关"}],"answer":"D","explanation":"最小支持度阈值是用来筛选有意义的属性组合的一个重要参数","mnemonic":"支持度低于阈值＝不够频繁＝不相关，被过滤掉选D"},{"id":540,"type":"single","text":"利用 OpenCV 库的 imread () 函数加载图像时，什么表示图像的颜色通道顺序（）。","options":[{"label":"A","text":"Noneoftheabove"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"cv.IMREAD_GRAYSCALE"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"D","explanation":"cv.IMREAD_COLOR读取图像时按BGR顺序处理颜色通道。","mnemonic":"OpenCV imread的COLOR＝颜色通道BGR顺序选D"},{"id":541,"type":"single","text":"对比分析重点关注的是不同组别或对象之间的（）。","options":[{"label":"A","text":"相对性"},{"label":"B","text":"差异性"},{"label":"C","text":"相似性"},{"label":"D","text":"关联性"}],"answer":"B","explanation":"对比分析主要关注不同组或对象之间的差异性","mnemonic":"对比分析＝找不同＝关注差异性，\"对比\"就是比差异选B"},{"id":542,"type":"single","text":"下列选项中，不属于数据存储介质的是（）。","options":[{"label":"A","text":"固态硬盘"},{"label":"B","text":"CPU"},{"label":"C","text":"光盘"},{"label":"D","text":"硬盘"}],"answer":"B","explanation":"CPU是处理器，非存储介质；硬盘、光盘等是存储介质。","mnemonic":"CPU是处理器不是存储介质，硬盘光盘固态才是存储选B"},{"id":543,"type":"single","text":"深度神经网络中，常用于优化训练过程、加快模型收敛速度的算法是哪一种（）。","options":[{"label":"A","text":"随机梯度下降（SGD）"},{"label":"B","text":"支持向量机（SVM）"},{"label":"C","text":"决策树（Decision Tree）"},{"label":"D","text":"K-近邻算法（KNN）"}],"answer":"A","explanation":"随机梯度下降（SGD）是深度学习中常用的优化算法，用于快速收敛神经网络训练。","mnemonic":"深度网络优化训练用SGD随机梯度下降，SVM/KNN/决策树不是优化算法选A"},{"id":544,"type":"single","text":"象限分析法是一种典型的策略驱动思维，下列适用象限分析法的是（）。","options":[{"label":"A","text":"财务报表的账目核对"},{"label":"B","text":"产品市场占有率与客户满意度的综合评估"},{"label":"C","text":"项目进度的详细排期"},{"label":"D","text":"人员招聘中的性格测试"}],"answer":"B","explanation":"产品市场占有率与满意度评估适合象限分析法。","mnemonic":"象限分析法＝两个维度交叉评估，市场占有率×满意度完美匹配选B"},{"id":545,"type":"single","text":"ETL 里的 “转化”（Transformation）环节主要涵盖的内容是（）。","options":[{"label":"A","text":"将数据加载到目标系统中"},{"label":"B","text":"从源系统中选择所需的数据"},{"label":"C","text":"对数据进行加密和解密"},{"label":"D","text":"对数据进行清洗和校验"}],"answer":"D","explanation":"ETL过程涵盖数据抽取、转换和加载，确保数据从源系统到目标系统的有效迁移和格式化。","mnemonic":"ETL的T＝Transform转化＝清洗+校验，不是加载也不是加密选D"},{"id":546,"type":"single","text":"计算机属于哪一类设备（）。","options":[{"label":"A","text":"固体"},{"label":"B","text":"设备"},{"label":"C","text":"工具"},{"label":"D","text":"机器"}],"answer":"D","explanation":"计算机是一种能按程序自动进行数值和逻辑运算的机器设备。","mnemonic":"计算机＝按程序自动运算的机器，不是工具不是设备选D"},{"id":547,"type":"single","text":"贝叶斯分类器的核心运作原理是以（）为基础的。","options":[{"label":"A","text":"SVM的分类模型"},{"label":"B","text":"逻辑回归的分类模型"},{"label":"C","text":"贝叶斯算法的回归模型"},{"label":"D","text":"贝叶斯定理的分类模型"}],"answer":"D","explanation":"贝叶斯分类器是一种基于贝叶斯定理的分类算法","mnemonic":"贝叶斯分类器＝基于贝叶斯定理的分类模型，名字对应选D"},{"id":548,"type":"single","text":"在对语音开展短时频谱分析时，在窗函数的选择方面，下列说法正确的是（）。","options":[{"label":"A","text":"矩形窗是最常用的窗函数，因为它简单易实现"},{"label":"B","text":"错误：汉明窗得到的短时频谱平滑度较高，因此在语音分析中使用较为普遍，而不是平滑度较低。"},{"label":"C","text":"正确：汉明窗能够减少频谱泄漏，使得到的短时频谱更加平滑，因此在语音分析中使用较为普遍。"},{"label":"D","text":"错误：窗函数的选择对短时频谱分析的结果有显著影响，不同的窗函数会导致不同的频谱特性。"}],"answer":"C","explanation":"A. 错误：虽然矩形窗简单易实现，但在语音短时频谱分析中极少采用，因为它会导致频谱泄漏，使频谱不够平滑。","mnemonic":"语音短时频谱分析用汉明窗，减少频谱泄漏更平滑选C"},{"id":549,"type":"single","text":"Python 里提供了支持向量机（Support Vector Machine，SVM）算法实现的库是（）。","options":[{"label":"A","text":"Matplotlib"},{"label":"B","text":"scikit-learn"},{"label":"C","text":"Pandas"},{"label":"D","text":"NumPy"}],"answer":"B","explanation":"scikit-learn是一个常用的机器学习库，除了提供支持向量机（SVM）算法实现的模块","mnemonic":"Python中SVM实现在scikit-learn库，sklearn是机器学习百宝箱选B"},{"id":550,"type":"single","text":"在进行数据收集的过程里，哪一方面是数据收集时面临的难题？（）","options":[{"label":"A","text":"数据采集设备的性能"},{"label":"B","text":"网络连接的稳定性"},{"label":"C","text":"采集网站的确定"},{"label":"D","text":"数据安全和隐私保护"}],"answer":"D","explanation":"在数据采集过程中，数据安全和隐私保护是一个重要的难点","mnemonic":"数据收集难题＝数据安全和隐私保护，隐私是核心挑战选D"},{"id":551,"type":"single","text":"逻辑回归算法在（）领域中最常被用于风险评估。","options":[{"label":"A","text":"推荐系统"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"图像识别"},{"label":"D","text":"金融风控"}],"answer":"D","explanation":"逻辑回归算法在金融领域的风控问题中应用广泛，如信用评分、反欺诈等方面，可以对风险进行分类预测","mnemonic":"逻辑回归做风险评估＝金融风控领域，信用评分反欺诈选D"},{"id":552,"type":"single","text":"计算机的硬件系统是由哪些部分构成的（）。","options":[{"label":"A","text":"运算器、存储器、控制器、"},{"label":"B","text":"运算器、存储器、输入设备、输出设备"},{"label":"C","text":"运算器、存储器、控制器、输入设备、输出设备"},{"label":"D","text":"运算器、输入设备、输出设备"}],"answer":"C","explanation":"计算机硬件系统包括运算器、控制器、存储器、输入设备和输出设备五个基本组成部分。","mnemonic":"计算机硬件五大件：运算器+存储器+控制器+输入+输出，缺一不可选C"},{"id":553,"type":"single","text":"在参数优化过程中，若优化结果未使模型性能得到明显提升，最佳的处理方式是（）。","options":[{"label":"A","text":"继续使用原来的参数"},{"label":"B","text":"尝试更多的参数组合"},{"label":"C","text":"增加模型复杂度"},{"label":"D","text":"离散化数据"}],"answer":"B","explanation":"当参数优化结果不佳时，尝试更多的参数组合（选项B）是常见的做法。通过扩展搜索空间，可以找到更合适的超参数组合，从而改善模型性能。增加模型复杂度（选项C）通常不建议作为优化策略，因为模型复杂度过高可能会导致过拟合。离散化数据（选项D）不常见于优化过程中，除非数据本身具有离散性。继续使用原来的参数（选项A）显然不会有帮助。","mnemonic":"参数优化不佳＝尝试更多参数组合，扩大搜索空间选B"},{"id":554,"type":"single","text":"可实现图像的自适应阈值分割的函数是（）。","options":[{"label":"A","text":"filters.sobel"},{"label":"B","text":"active_contour"},{"label":"C","text":"adaptiveThreshold"},{"label":"D","text":"threshold"}],"answer":"C","explanation":"Python的 OpenCV库中提供函adaptiveThreshold用于实现图像的自适应阈值分割","mnemonic":"自适应阈值分割＝adaptiveThreshold，\"adaptive\"就是自适应选C"},{"id":555,"type":"single","text":"数据标注工作所面临的困境与挑战不包含下列哪项？（）","options":[{"label":"A","text":"标注成本高"},{"label":"B","text":"无标注工具可用"},{"label":"C","text":"自动化工具的准确率难以保证"},{"label":"D","text":"标注平台存在用户隐私泄风险"}],"answer":"B","explanation":"数据标注的挑战包括高成本、自动化工具准确率低和隐私风险，但并非无工具可用。","mnemonic":"数据标注挑战不含\"无工具可用\"，工具是有的只是不够好选B"},{"id":556,"type":"single","text":"在 Excel 中，要是想统计工作表中非空单元格的数量，可使用的函数是（）。","options":[{"label":"A","text":"SUMIF"},{"label":"B","text":"SUM"},{"label":"C","text":"COUNT"},{"label":"D","text":"COUNTA"}],"answer":"D","explanation":"COUNTA函数用于统计非空单元格数量，语法支持多参数。","mnemonic":"统计非空单元格＝COUNTA，COUNT只计数字，COUNTA计所有非空选D"},{"id":557,"type":"single","text":"在 ETL 任务调度中，属于调度逻辑中新增的典型策略的是（）。","options":[{"label":"A","text":"数据库索引重建"},{"label":"B","text":"数据加密传输"},{"label":"C","text":"按任务优先级调度"},{"label":"D","text":"数据清洗规则优化"}],"answer":"C","explanation":"调度逻辑中新增的策略包括任务分类、优先级调度、运行时间要求和资源限制","mnemonic":"ETL调度新增策略＝按优先级调度，任务分级执行选C"},{"id":558,"type":"single","text":"有关 LOTOS 算子，以下描述准确的是（）。","options":[{"label":"A","text":"LOTOS算子起源于ACT-ONE，并由ISO独立开发"},{"label":"B","text":"LOTOS算子仅支持顺序流程的描述，无法处理并发交互系统"},{"label":"C","text":"LOTOS算子用于描述进程的行为和交互作用，同时支持形式化描述"},{"label":"D","text":"LOTOS的算子完全基于抽象数据类型建模语言ACT-ONE"}],"answer":"C","explanation":"LOTOS是由ISO开发的一种开放分布式系统描述语言，第一部分基于进程代数，用于描述行为和交互作用；第二部分则基于抽象数据类型建模技术ACT-ONE","mnemonic":"LOTOS算子描述进程行为和交互，支持形式化描述选C"},{"id":559,"type":"single","text":"留出法、交叉验证法和自助法在数据利用效率与评估稳定性方面，各自的主要优劣之处是（）。","options":[{"label":"A","text":"留出法：评估结果方差大，计算量大；交叉验证法：样本利用率高，评估结果方差小；自助法：样本利用率低，评估结果方差大。"},{"label":"B","text":"留出法：评估结果方差小，计算量小；交叉验证法：样本利用率低，评估结果方差大；自助法：样本利用率高，评估结果方差小。"},{"label":"C","text":"留出法：样本利用率高，评估结果方差大；交叉验证法：评估结果方差小，计算量大，评估结果方差小。"},{"label":"D","text":"留出法：样本利用率低，评估结果方差大；交叉验证法：评估结果方差小，计算量大；自助法：样本利用率高，评估结果方差大。"}],"answer":"D","explanation":"留出法样本利用率低、方差大；交叉验证法方差小、计算量大；自助法利用率高、方差大。","mnemonic":"留出法利用率低方差大，交叉验证方差小计算大，自助法利用率高方差大选D"},{"id":560,"type":"single","text":"下列哪项不属于图像处理的流程（）。","options":[{"label":"A","text":"图像传输"},{"label":"B","text":"图像分割"},{"label":"C","text":"图像增强"},{"label":"D","text":"图像获取"}],"answer":"A","explanation":"图像处理的流程包括图像获取/存储、图像增强/复原、图像分割、图像描述、图像解释","mnemonic":"图像处理流程不含\"图像传输\"，传输是通信不是处理选A"},{"id":561,"type":"single","text":"使用 OpenCV 库的 imread () 函数读取图像时，能够返回原始图像所包含的 alpha 通道的是（）。","options":[{"label":"A","text":"cv.IMREAD_GRAYSCALE"},{"label":"B","text":"cv.IMREAD_UNCHANGED"},{"label":"C","text":"Noneoftheabove"},{"label":"D","text":"cv.IMREAD_COLOR"}],"answer":"B","explanation":"使用cv.IMREAD_UNCHANGED可以返回原始图像，包含的alpha通道","mnemonic":"IMREAD_UNCHANGED保留alpha通道，\"不变\"＝原样保留选B"},{"id":562,"type":"single","text":"当中级工作人员需要标注图像中物体的关键点时，有哪些方法能用来确定这些关键点的具体位置？（）","options":[{"label":"A","text":"分割标注"},{"label":"B","text":"区域标注"},{"label":"C","text":"边界框标注"},{"label":"D","text":"关键点标注"}],"answer":"D","explanation":"关键点标注可以标记出图像中关键点的位置，如人脸关键点。","mnemonic":"标注关键点位置＝关键点标注法，名称直接对应选D"},{"id":563,"type":"single","text":"下列哪个概念不在初级知识体系的范畴内？（）","options":[{"label":"A","text":"智能系统基础"},{"label":"B","text":"数据标注"},{"label":"C","text":"自然语言处理"},{"label":"D","text":"数据采集"}],"answer":"C","explanation":"数据审核不属于初级知识体系涉及到的概念","mnemonic":"自然语言处理NLP不在初级知识体系中，属于高级内容选C"},{"id":564,"type":"single","text":"下列哪项既支持图形化操作界面，又能进行开源插件扩展（）。","options":[{"label":"A","text":"MicrosoftSQLServerIntegrationServices(SSIS)"},{"label":"B","text":"InformaticaPowerCenter"},{"label":"C","text":"Kettle"},{"label":"D","text":"OracleDataIntegrator"}],"answer":"C","explanation":"Kettle通过图形界面来设计ETL转换过程，kettle还支持非常广泛的数据库和数据文件，可以通过插件扩展","mnemonic":"Kettle＝图形化+开源+插件扩展，ETL界的瑞士军刀选C"},{"id":565,"type":"single","text":"关联规则中的可信度，指的是（）。","options":[{"label":"A","text":"给定一个属性集合时，出现另一个属性的概率"},{"label":"B","text":"属性的重要程度"},{"label":"C","text":"出现某个属性组合的次数"},{"label":"D","text":"两个属性之间的相关程度"}],"answer":"A","explanation":"可信度指给定属性集下另一属性出现的概率。","mnemonic":"可信度＝条件概率，给定A时B出现的概率P(B|A)选A"},{"id":566,"type":"single","text":"在图像分割方法中，依据灰度的突变来寻找图像中区域边界的方法是（）。","options":[{"label":"A","text":"阈值分割"},{"label":"B","text":"轮廓提取"},{"label":"C","text":"边缘检测"},{"label":"D","text":"区域生长"}],"answer":"C","explanation":"边缘检测通过识别灰度突变定位图像区域边界。","mnemonic":"灰度突变找边界＝边缘检测，\"突变\"是边缘的特征选C"},{"id":567,"type":"single","text":"逻辑回归中 sigmoid 函数的功能是（）。","options":[{"label":"A","text":"将线性组合输出值映射到0到1之间"},{"label":"B","text":"将线性组合输入值映射到0到1之间"},{"label":"C","text":"将线性组合输入值映射到负无穷到正无穷之间"},{"label":"D","text":"将线性组合输出值映射到负无穷到正无穷之间"}],"answer":"A","explanation":"sigmoid函数将线性输出映射到(0,1)区间，输出可解释为概率。","mnemonic":"sigmoid将输出映射到0-1之间，输出→概率区间选A"},{"id":568,"type":"single","text":"UAN 模型的核心特征是（）。","options":[{"label":"A","text":"强调通过复杂的图形化流程表示任务和行为"},{"label":"B","text":"使用符号语言描述用户行为、界面反馈和任务条件"},{"label":"C","text":"专注于描述多任务之间的并发与时序关系"},{"label":"D","text":"利用机器学习算法预测用户行为"}],"answer":"B","explanation":"UAN模型使用符号语言描述用户行为、界面反馈和任务条件控制。","mnemonic":"UAN模型＝符号语言描述用户行为和界面反馈选B"},{"id":569,"type":"single","text":"根据《计算机软件保护条例》，软件著作权的保护范围不延伸至（）。","options":[{"label":"A","text":"软件的功能描述文档"},{"label":"B","text":"开发软件所用的思想"},{"label":"C","text":"软件的程序代码"},{"label":"D","text":"软件开发者的署名权"}],"answer":"B","explanation":"软件著作权不保护开发所用的思想、处理过程等。","mnemonic":"软件著作权不保护思想，只保护表达形式＝代码和文档选B"},{"id":570,"type":"single","text":"下列最能凸显调度系统 “任务重试机制” 价值的是（）。","options":[{"label":"A","text":"加密敏感数据传输"},{"label":"B","text":"实时生成可视化报表"},{"label":"C","text":"网络波动导致任务失败后自动重试"},{"label":"D","text":"数据清洗时自动修正格式错误"}],"answer":"C","explanation":"任务重试机制在网络故障导致失败时自动重试，确保任务完成。","mnemonic":"任务重试机制＝网络波动失败后自动重试，\"重试\"应对\"失败\"选C"},{"id":571,"type":"single","text":"GOMS 模型难以考虑（）任务的特征。","options":[{"label":"A","text":"重复"},{"label":"B","text":"具有多种决策路径"},{"label":"C","text":"固定"},{"label":"D","text":"可预测"}],"answer":"B","explanation":"GOMS模型不能考虑具有多种决策路径的任务","mnemonic":"GOMS模型适合固定可预测任务，不擅长多决策路径选B"},{"id":572,"type":"single","text":"智慧医疗的目标有哪些（）。","options":[{"label":"A","text":"限制病人看病的渠道"},{"label":"B","text":"增加医疗资源消耗"},{"label":"C","text":"增加医疗成本"},{"label":"D","text":"提高医疗效率"}],"answer":"D","explanation":"智慧医疗解决方案的主要目的是提高医疗效率，利用智能化的技术和系统来处理医疗信息和数据，提高医疗机构和医生的工作效率，同时改善病人的就医体验和治疗效果","mnemonic":"智慧医疗目标＝提高医疗效率，不是增加成本或限制渠道选D"},{"id":573,"type":"single","text":"控制器的功能体现在（）。","options":[{"label":"A","text":"从内存取指令和执行指令"},{"label":"B","text":"执行算术和逻辑运算"},{"label":"C","text":"存储数据"},{"label":"D","text":"控制输入操作"}],"answer":"A","explanation":"控制器是整个计算机系统的控制中心，它指挥计算机各部分协调工作，保证计算机按照预先规定的目标和步骤有条不紊地进行操作及处理。它的基本功能是从内存取指令和执行指令。","mnemonic":"控制器功能＝取指令+执行指令，是CPU的指挥中心选A"},{"id":574,"type":"single","text":"下列哪项方法是解决欠拟合问题的经典方法之一（）。","options":[{"label":"A","text":"权重正则化"},{"label":"B","text":"增加特征"},{"label":"C","text":"决策树剪枝"},{"label":"D","text":"数据增强"}],"answer":"B","explanation":"解决欠拟合的方法之一是增加特征","mnemonic":"欠拟合＝模型太简单，解决方法＝增加特征丰富信息选B"},{"id":575,"type":"single","text":"下列哪项方法可以减轻算法的过拟合现象（）。","options":[{"label":"A","text":"减少正则化项权重"},{"label":"B","text":"忽略测试集的性能"},{"label":"C","text":"提高模型复杂度"},{"label":"D","text":"增加训练数据量"}],"answer":"D","explanation":"A选项：增加训练数据量通常能帮助模型更好地学习数据的规律，减少过拟合，因为更多的数据能帮助模型泛化","mnemonic":"过拟合＝数据不够，解决方法＝增加训练数据量选D"},{"id":576,"type":"single","text":"对于滤波器组方法在语音信号频谱分析中的应用，下列说法正确的是（）。","options":[{"label":"A","text":"滤波器组方法受外界环境影响较大"},{"label":"B","text":"窄带带通滤波器的频率分辨率高于宽带带通滤波器"},{"label":"C","text":"宽带带通滤波器的频率分辨率高于窄带带通滤波器"},{"label":"D","text":"滤波器组方法只能使用数字滤波器"}],"answer":"B","explanation":"A. 错误：滤波器组方法可以使用模拟滤波器或数字滤波器，因此该说法不正确","mnemonic":"窄带滤波器频率分辨率高于宽带，\"窄带精细宽带粗略\"选B"},{"id":577,"type":"single","text":"采用自助法划分数据集时存在的缺点是什么（）。","options":[{"label":"A","text":"生成的新数据集数量过多，导致模型训练时间过长"},{"label":"B","text":"生成的新数据集样本数量不足，无法保证模型的泛化性能"},{"label":"C","text":"只适用于分类问题，不适用于回归问题"},{"label":"D","text":"生成的新数据集会有许多重复的样本，导致数据分布偏差​​。"}],"answer":"D","explanation":"自助法允许同一个样本在多个新数据集中出现，因此会生成许多重复的样本","mnemonic":"自助法缺点＝有放回抽样导致样本重复，分布产生偏差选D"},{"id":578,"type":"single","text":"秉持严谨求是的态度时，在讨论某个问题时应当做到（）。","options":[{"label":"A","text":"选择一方面内容专攻"},{"label":"B","text":"深入、全面、细致地分析问题"},{"label":"C","text":"瞎扯远曲"},{"label":"D","text":"着重阐述自己的看法"}],"answer":"B","explanation":"严谨求是要求深入全面分析问题，细致思考，避免草率主观判断。","mnemonic":"严谨求是＝深入全面细致分析，不偏不倚选B"},{"id":579,"type":"single","text":"流程优化工作的主要目标中，不包含下列哪一项（）。","options":[{"label":"A","text":"明确现存问题，构建统一的流程优化目标;"},{"label":"B","text":"针对流程优化方案形成共识"},{"label":"C","text":"增加流程的复杂性以提高适应性"},{"label":"D","text":"推动后续流程落地实施"}],"answer":"C","explanation":"流程优化旨在提高效率、减少浪费，主要目标包括问题识别、共识形成和落地实施，而非增加复杂性。","mnemonic":"流程优化目标不含\"增加复杂性\"，优化是简化而非复杂化选C"},{"id":580,"type":"single","text":"在业务流程重组（BPR）中，建模与仿真技术能起到什么作用（）。","options":[{"label":"A","text":"增加企业成本"},{"label":"B","text":"替代现有业务流程"},{"label":"C","text":"提高项目实施成功的概率"},{"label":"D","text":"直接提高企业绩效"}],"answer":"C","explanation":"建模与仿真技术在业务流程重组（BPR）中的主要作用是通过模拟和分析新流程的运行效果，提前发现潜在问题，优化流程设计，从而提高项目实施成功的概率（B）","mnemonic":"BPR中建模仿真＝提前模拟发现问题→提高实施成功率选C"},{"id":581,"type":"single","text":"随机森林算法中 “随机” 一词的含义是（）。","options":[{"label":"A","text":"随机选择训练样本子集和特征子集"},{"label":"B","text":"随机忽略部分特征的重要性"},{"label":"C","text":"随机选择决策树节点划分特征"},{"label":"D","text":"随机选择决策树节点划分阈值"}],"answer":"A","explanation":"随机森林的“随机”体现在Bootstrap抽样和随机特征选择，增强多样性，减少过拟合。","mnemonic":"随机森林的\"随机\"＝随机选样本子集+随机选特征子集，双随机选A"},{"id":582,"type":"single","text":"在 Python 环境中借助 scikit-learn 库搭建随机森林分类器时，能用哪个（）函数来创建随机森林模型？","options":[{"label":"A","text":"DecisionTreeRegressor()"},{"label":"B","text":"DecisionTreeClassifier()"},{"label":"C","text":"RandomForestClassifier()"},{"label":"D","text":"RandomForestRegressor()"}],"answer":"C","explanation":"在 scikit-learn 库中，用于构建随机森林分类器的函数是 RandomForestClassifier()","mnemonic":"随机森林分类器＝RandomForestClassifier()，名字直译选C"},{"id":583,"type":"single","text":"《中华人民共和国民法典》规定，向人民法院请求保护民事权利的诉讼时效期间为多长时间（）。","options":[{"label":"A","text":"四年"},{"label":"B","text":"三年"},{"label":"C","text":"两年"},{"label":"D","text":"一年"}],"answer":"B","explanation":"《中华人民共和国民法典》第一百八十八条规定，向人民法院请求保护民事权利的诉讼时效期间为三年","mnemonic":"民法典诉讼时效＝三年，记\"民三\"选B"},{"id":584,"type":"single","text":"协调并管理程序的运行是操作系统的功能之一，下列哪项不属于常见的进程状态（）。","options":[{"label":"A","text":"休眠状态"},{"label":"B","text":"阻塞状态"},{"label":"C","text":"运行状态"},{"label":"D","text":"就绪状态"}],"answer":"A","explanation":"进程状态包括就绪、运行和阻塞，休眠状态不是常见状态。","mnemonic":"进程三状态：就绪、运行、阻塞，\"休眠\"不在其中选A"},{"id":585,"type":"single","text":"逻辑回归算法的输出结果是（）。","options":[{"label":"A","text":"线性值"},{"label":"B","text":"离散值"},{"label":"C","text":"概率值"},{"label":"D","text":"种类标签"}],"answer":"C","explanation":"逻辑回归输出概率值，用于分类决策。","mnemonic":"逻辑回归输出＝概率值(0到1)，sigmoid映射的结果选C"},{"id":586,"type":"single","text":"下列哪一种方法能够有效地增进人机交互的用户体验？（）","options":[{"label":"A","text":"增加系统的复杂度"},{"label":"B","text":"增加交互的难度"},{"label":"C","text":"增加反馈的及时性和准确性"},{"label":"D","text":"增加交互的模糊性"}],"answer":"C","explanation":"及时准确的反馈能有效提升人机交互的用户体验。","mnemonic":"提升用户体验＝及时准确反馈，反馈是交互的灵魂选C"},{"id":587,"type":"single","text":"下列 ETL 工具中，是完全用 Java 编写的是（）。","options":[{"label":"A","text":"Kettle"},{"label":"B","text":"OracleDataIntegrator"},{"label":"C","text":"IBMInfoSphereDataStage"},{"label":"D","text":"Talend"}],"answer":"A","explanation":"Kettle作为开源ETL工具，完全基于Java开发，依赖Java环境运行。","mnemonic":"Kettle完全用Java编写，需要Java环境运行选A"},{"id":588,"type":"single","text":"在防止模型过拟合时，正则化所起到的主要作用是（）。","options":[{"label":"A","text":"减少数据中的噪声"},{"label":"B","text":"提高模型的训练速度"},{"label":"C","text":"限制模型复杂度"},{"label":"D","text":"增加训练数据量"}],"answer":"C","explanation":"正则化通过对模型参数施加约束，减少模型复杂度，从而有效防止过拟合。","mnemonic":"正则化防过拟合＝限制模型复杂度，给参数加约束选C"},{"id":589,"type":"single","text":"下列哪项不属于逻辑树的种类（）。","options":[{"label":"A","text":"“What？”树"},{"label":"B","text":"“Why？”树"},{"label":"C","text":"“Where？”树"},{"label":"D","text":"“How？”树"}],"answer":"C","explanation":"逻辑树分为“What?”树（要素分解）、“Why?”树（原因分析）和“How?”树（解决方案）。","mnemonic":"逻辑树三种：What树、Why树、How树，没有Where树选C"},{"id":590,"type":"single","text":"除了支持度和置信度，下列哪项（）也是关联规则的评估指标。","options":[{"label":"A","text":"互信息"},{"label":"B","text":"准确性"},{"label":"C","text":"提升度"},{"label":"D","text":"吸引度"}],"answer":"C","explanation":"除了支持度和置信度外，还包括提升度（Lift）评估指标。准确性是分类模型的评估指标，互信息是衡量聚类结果与真实标签之间的信息共享程度。而吸引度不属于评估指标。","mnemonic":"关联规则三指标：支持度+置信度+提升度Lift选C"},{"id":591,"type":"single","text":"下列可用于读取语音数据的库是（）。","options":[{"label":"A","text":"numpy"},{"label":"B","text":"librosa"},{"label":"C","text":"matplotlib"},{"label":"D","text":"pandas"}],"answer":"B","explanation":"pandas主要用于数据处理与分析，通常应用于表格数据（如CSV文件、Excel文件等），并不涉及语音数据的读取。matplotlib是一个数据可视化库，用于绘制图表，无法直接用于读取或处理音频数据。librosa是专门设计用于音频信号处理的库，提供了读取音频数据的功能，并且支持频谱分析、特征提取等常见的音频处理任务。numpy是一个数值计算库，虽然可以用来存储音频数据（如NumPy数组），但并不提供音频数据读取的功能。","mnemonic":"读取语音数据用librosa库，\"libr+osa\"音频专用库选B"},{"id":592,"type":"single","text":"若要修改幻灯片母版的背景样式，可通过什么方式实现（）。","options":[{"label":"A","text":"在“幻灯片母版”选项卡的“背景”选项中选择“背景样式”，然后选择需要的颜色或图片"},{"label":"B","text":"在“插入”选项卡中选择“背景”，然后选择需要的样式"},{"label":"C","text":"在“格式”选项卡中选择“背景”，然后选择需要的样式"},{"label":"D","text":"在“视图”选项卡中选择“母版视图”，然后选择“背景”"}],"answer":"A","explanation":"修改幻灯片母版背景需在“幻灯片母版”选项卡的“背景”选项中设置颜色或图片。","mnemonic":"修改母版背景＝在\"幻灯片母版\"选项卡的\"背景\"中设置选A"},{"id":593,"type":"single","text":"在 PowerPoint 中，在哪个地方设置幻灯片的切换效果（）。","options":[{"label":"A","text":"“插入”选项卡"},{"label":"B","text":"“切换”选项卡"},{"label":"C","text":"“设计”选项卡"},{"label":"D","text":"“幻灯片放映”选项卡"}],"answer":"B","explanation":"PowerPoint中“切换”选项卡用于设置幻灯片切换效果。","mnemonic":"设置切换效果＝\"切换\"选项卡，名称直接对应选B"},{"id":594,"type":"single","text":"进行人机交互设计时，需要明确哪些阶段以及信息解释阶段及其影响，了解人类实际能够接收的信息。","options":[{"label":"A","text":"受到外部刺激接收信息阶段"},{"label":"B","text":"软件开发的成本预算"},{"label":"C","text":"计算机的处理器速度"},{"label":"D","text":"用户的心情和情绪变化"}],"answer":"A","explanation":"视觉感知可以分为两个阶段:受到外部刺激接收信息阶段和解释信息阶段","mnemonic":"人机交互设计关注信息接收阶段＝受外部刺激接收信息选A"},{"id":595,"type":"single","text":"智能系统在教育领域的功能中，不包含下列哪项？","options":[{"label":"A","text":"提供个性化学习"},{"label":"B","text":"智能辅助教学"},{"label":"C","text":"智能病例诊断"},{"label":"D","text":"智能辅助校园管理"}],"answer":"C","explanation":"智能系统在教育领域的作用不包括智能病例诊断。","mnemonic":"教育领域不含\"智能病例诊断\"，病例诊断属于医疗领域选C"},{"id":596,"type":"single","text":"时间管理四象限法则中，是由（）来确定划分出的四个象限。","options":[{"label":"A","text":"根据坐标轴分别划分成上下左右四个象限"},{"label":"B","text":"根据事情的重要和紧急程度划分"},{"label":"C","text":"根据同类数据的排名决定划分"},{"label":"D","text":"根据数据的变化趋势决定划分"}],"answer":"B","explanation":"时间管理四象限法则根据任务的重要和紧急程度划分优先级。","mnemonic":"时间管理四象限＝按重要和紧急程度划分，\"重要×紧急\"选B"},{"id":597,"type":"single","text":"在 Python 中，（）库常被用于进行图像分割。","options":[{"label":"A","text":"TensorFlow"},{"label":"B","text":"Matplotlib"},{"label":"C","text":"OpenCV"},{"label":"D","text":"NumPy"}],"answer":"C","explanation":"OpenCV是一个广泛使用的计算机视觉库，提供了许多图像处理和分析的功能，其中包括图像分割。","mnemonic":"Python图像分割常用OpenCV库，CV＝Computer Vision选C"},{"id":598,"type":"single","text":"在趋势分析法中，常用于展示数据趋势的是（）。","options":[{"label":"A","text":"柱状图"},{"label":"B","text":"散点图"},{"label":"C","text":"折线图"},{"label":"D","text":"饼图"}],"answer":"C","explanation":"折线图常用于展示数据的趋势，通过将数据点用折线连接起来，可以清晰地观察数据的变化趋势。","mnemonic":"展示数据趋势＝折线图，折线连点看走势选C"},{"id":599,"type":"single","text":"人工与智能之间的交互方式，不包含下列哪一项？","options":[{"label":"A","text":"只能收到指令，无法回应"},{"label":"B","text":"手势识别"},{"label":"C","text":"视觉图像识别"},{"label":"D","text":"自然语言对话"}],"answer":"A","explanation":"人工和智能的交互方式可以是多种形式，如自然语言对话、手势识别、视觉图像识别、音频识别等","mnemonic":"人机交互方式含对话、手势、视觉，不含\"只收不回\"单向模式选A"},{"id":600,"type":"single","text":"决策树算法属于一种（）。","options":[{"label":"A","text":"强化学习算法"},{"label":"B","text":"半监督学习算法"},{"label":"C","text":"无监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"D","explanation":"决策树是一种监督学习算法，利用训练数据集构建决策树，对新的数据进行分类","mnemonic":"决策树＝监督学习算法，需要标签数据训练分类选D"},{"id":601,"type":"single","text":"在人机交互的多种任务分析手段中，（）主要用于刻画系统里不同用户角色和系统功能之间的交互关联。","options":[{"label":"A","text":"工序约束陈述"},{"label":"B","text":"用例图"},{"label":"C","text":"协作图"},{"label":"D","text":"顺序图"}],"answer":"B","explanation":"用例图描述用户角色与系统功能的交互关系。","mnemonic":"用例图刻画角色与功能的交互关联，\"用例\"对\"用户\""},{"id":602,"type":"single","text":"对于 “用户” 在产品设计中的定义，下面哪一项的描述最为精准？（）","options":[{"label":"A","text":"用户是指任何参与产品设计的人员，不一定是产品的最终使用者。"},{"label":"B","text":"用户是使用产品的人，但不一定需要与产品产生交互，只要购买并拥有产品即可。"},{"label":"C","text":"用户是产品的最终使用者，设计应以他们的需求和体验为中心，确保产品满足他们的使用场景。"},{"label":"D","text":"用户是产品的技术支持人员，他们的工作主要是保障产品的正常运作，设计过程不需要考虑他们的需求。"}],"answer":"C","explanation":"用户是产品的最终使用者，设计应以他们的需求和体验为中心。","mnemonic":"用户=最终使用者，设计以用户体验为中心，排除设计者和技术人员"},{"id":603,"type":"single","text":"（）可以让输入设备和应用程序各自独立运行，输入设备在后台持续采集数据，应用程序在有需要时再读取这些数据。","options":[{"label":"A","text":"同步模式"},{"label":"B","text":"事件模式"},{"label":"C","text":"采样模式"},{"label":"D","text":"请求模式"}],"answer":"C","explanation":"采样模式下输入设备持续采集，应用定期读取。","mnemonic":"采样模式=后台采集+按需读取，\"采样\"谐音\"菜样\"随时点菜"},{"id":604,"type":"single","text":"下列选项中，哪项是留一法的具体步骤（）。","options":[{"label":"A","text":"将数据集中的每个样本随机选取一部分作为测试集，其余样本作为训练集"},{"label":"B","text":"将数据集中的每个样本依次作为测试集，其余样本作为训练集"},{"label":"C","text":"将数据集分为k个重叠的子集"},{"label":"D","text":"将数据集分为k个互不重叠的子集"}],"answer":"B","explanation":"留一法每次取一个样本作测试集，其余为训练集。","mnemonic":"留一法=每次留一个当测试，其余训练，逐个轮流"},{"id":605,"type":"single","text":"开展人机交互研究能够实现什么目标？","options":[{"label":"A","text":"加快数据传输速度"},{"label":"B","text":"提高用户满意度"},{"label":"C","text":"减少软件开发成本"},{"label":"D","text":"提高计算机的运算速度"}],"answer":"B","explanation":"人机交互研究的重要性主要体现在提高用户满意度方面，通过改善用户体验，使用户能够更加方便、高效地与计算机进行交互，提高用户满意度和工作效率。","mnemonic":"人机交互研究核心目标是提高用户满意度，\"人机\"为\"人\"服务"},{"id":606,"type":"single","text":"在 ETL 任务流程里，数据抽取（Extraction）的核心目标是（）。","options":[{"label":"A","text":"将数据加载到目标系统中"},{"label":"B","text":"清洗和校验数据的完整性"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中提取数据"}],"answer":"D","explanation":"数据抽取是ETL任务流程的第一步，其主要目的是从源系统中提取数据，以便后续处理和加载到目标系统中","mnemonic":"ETL中E是Extraction抽取，核心就是从源系统提取数据"},{"id":607,"type":"single","text":"哪一项内容体现了业务数据主要流程中对数据质量管理的描述？","options":[{"label":"A","text":"数据的传输和共享"},{"label":"B","text":"数据的清洗和预处理"},{"label":"C","text":"数据的分析和解释"},{"label":"D","text":"数据的收集和存储"}],"answer":"B","explanation":"数据的清洗和预处理是业务数据主要流程中涉及数据质量管理的步骤，它包括识别和纠正数据中的错误、缺失或不一致之处","mnemonic":"数据质量管理=清洗+预处理，\"质量\"靠\"洗\"出来"},{"id":608,"type":"single","text":"存储器具有怎样的功能（）。","options":[{"label":"A","text":"存储，并能在计算机运行过程中高速、自动地完成程序或数据的存取"},{"label":"B","text":"控制计算机的运行"},{"label":"C","text":"执行算术和逻辑运算"},{"label":"D","text":"控制输出操作"}],"answer":"A","explanation":"存储器的主要功能是存储程序和各种数据信息，并能在计算机运行过程中高速、自动地完成程序或数据的存取。","mnemonic":"存储器=存储+高速自动存取，记住\"存\"字当头"},{"id":609,"type":"single","text":"在随机森林模型里，哪个参数是用来设定每棵树的最大深度的？（）","options":[{"label":"A","text":"min_samples_split"},{"label":"B","text":"criterion"},{"label":"C","text":"max_depth"},{"label":"D","text":"n_estimators"}],"answer":"C","explanation":"参数 max_depth 用于设置每棵树的最大深度","mnemonic":"max_depth设最大深度，depth就是深度，名字即答案"},{"id":610,"type":"single","text":"开展特征选择工作能够（）。","options":[{"label":"A","text":"避免算法过拟合"},{"label":"B","text":"减少算法过拟合"},{"label":"C","text":"增加算法过拟合"},{"label":"D","text":"增加模型复杂度"}],"answer":"B","explanation":"特征选择可以剔除无关变量，降低模型复杂度，减少过拟合的风险。","mnemonic":"特征选择减少过拟合，\"选择\"精简特征降低复杂度，注意是\"减少\"非\"避免\""},{"id":611,"type":"single","text":"列族数据库的核心特点是（）。","options":[{"label":"A","text":"基于内存的键值对高速读写"},{"label":"B","text":"以节点和边表示复杂关系"},{"label":"C","text":"按列簇组织数据，支持动态列扩展"},{"label":"D","text":"通过表结构（行和列）存储数据"}],"answer":"C","explanation":"列族数据库通过列簇动态扩展列，适合海量数据存储和高吞吐场景；通过表结构（行和列）存储数据是关系型数据库的特点；以节点和边表示复杂关系是图数据库的特点；基于内存的键值对高速读写是键值存储（如Redis）的特点","mnemonic":"列族数据库按列簇组织+动态列扩展，\"列族\"关键词对应\"列簇\""},{"id":612,"type":"single","text":"下列哪项方法可以消除加性噪声和通道畸变（）。","options":[{"label":"A","text":"语音增强"},{"label":"B","text":"窄带滤波"},{"label":"C","text":"预加重滤波"},{"label":"D","text":"时频分析"}],"answer":"A","explanation":"语音增强技术可消除环境噪声和通道畸变，提高语音清晰度。","mnemonic":"语音增强消除加性噪声和通道畸变，\"增强\"语音质量"},{"id":613,"type":"single","text":"超级计算机与普通计算机之间的主要区别体现在哪些方面（）。","options":[{"label":"A","text":"极高的数据传输速率和极快速的数据处理速度"},{"label":"B","text":"极高的数据传输速率和极大的数据存储容量"},{"label":"C","text":"极高的数据处理容错率和极大的数据存储容量"},{"label":"D","text":"极大的数据存储容量和极快速的数据处理速度"}],"answer":"D","explanation":"超级计算机与普通计算机的核心差异体现在存储容量巨大和数据处理速度极快，尽管硬件组成相似，但性能和规模显著不同。","mnemonic":"超级计算机=超大存储+超快处理，\"超级\"在存储和速度上碾压"},{"id":614,"type":"single","text":"下列哪一项不属于计算机主机的硬件组成部分（）。","options":[{"label":"A","text":"硬盘"},{"label":"B","text":"操作系统"},{"label":"C","text":"内存"},{"label":"D","text":"网卡"}],"answer":"B","explanation":"计算机主机指计算机硬件系统中用于放置主板及其他主要部件的容器","mnemonic":"操作系统是软件不是硬件，排除法选B"},{"id":615,"type":"single","text":"下列哪项不属于语音合成的过程（）。","options":[{"label":"A","text":"声道模型"},{"label":"B","text":"辐射模型"},{"label":"C","text":"变异参数"},{"label":"D","text":"控制参数"}],"answer":"C","explanation":"语音合成过程包括脉冲序列发生器、伪随机噪声发生器、声道模型、控制参数、辐射模型、语音输出","mnemonic":"变异参数不属于语音合成过程，合成有声道、辐射、控制参数"},{"id":616,"type":"single","text":"在智能化家居系统中，下列哪项不属于人机交互的方式？","options":[{"label":"A","text":"自动化控制"},{"label":"B","text":"声控系统"},{"label":"C","text":"遥控器控制"},{"label":"D","text":"手势控制"}],"answer":"A","explanation":"自动化控制是系统自主执行，不属交互方式。","mnemonic":"自动化控制是系统自主执行，无需人参与所以不算交互"},{"id":617,"type":"single","text":"下面哪（）个运算符不是 LOTOS 模型的基本运算符。","options":[{"label":"A","text":"T1 |[a1,...,an]| T2"},{"label":"B","text":"T1 ||| T2"},{"label":"C","text":"T1 → T2"},{"label":"D","text":"T1 [] T2"}],"answer":"C","explanation":"→ 是 LOTOS 中不存在的符号，其他三个均为基本运算符。","mnemonic":"箭头→不是LOTOS基本运算符，其余三个都是"},{"id":618,"type":"single","text":"文件系统是操作系统用来对磁盘或分区上的文件进行组织的方式。","options":[{"label":"A","text":"存储设备，常见为硬盘"},{"label":"B","text":"CPU"},{"label":"C","text":"内存"},{"label":"D","text":"显卡"}],"answer":"A","explanation":"文件系统是操作系统中用于管理存储设备上文件组织的方法和数据结构，负责文件的存储、检索和管理。","mnemonic":"文件系统管理的是存储设备（硬盘），不是CPU/内存/显卡"},{"id":619,"type":"single","text":"在 UAN 模型对任务的描述中，（）不在其常用内容之列。","options":[{"label":"A","text":"算法性能"},{"label":"B","text":"界面状态"},{"label":"C","text":"界面反馈"},{"label":"D","text":"用户行为"}],"answer":"A","explanation":"UAN模型描述用户行为、界面反馈和状态，不涉及算法界面反馈和状态，不涉及算法性能。","mnemonic":"UAN模型描述用户行为和界面状态反馈，不涉及算法性能"},{"id":620,"type":"single","text":"在图像数据处理流程中，最后执行的步骤是（）。","options":[{"label":"A","text":"结果展示或输出"},{"label":"B","text":"特征提取"},{"label":"C","text":"图像分割"},{"label":"D","text":"图像增强"}],"answer":"A","explanation":"在图像数据处理流程中，结果展示或输出是最后进行的步骤","mnemonic":"图像处理最后一步是结果展示或输出，\"终点\"是展示成果"},{"id":621,"type":"single","text":"最能反映第二代人机交互方式的核心特征的是？（）","options":[{"label":"A","text":"通过手势或面部表情控制设备"},{"label":"B","text":"通过图形用户界面（GUI）与计算机交互，使用鼠标和图标"},{"label":"C","text":"通过虚拟现实设备进行沉浸式体验"},{"label":"D","text":"通过语音命令与计算机交互"}],"answer":"B","explanation":"选项A不属于第二代人机交互","mnemonic":"第二代人机交互=GUI+鼠标+图标，图形界面是标志"},{"id":622,"type":"single","text":"业务流程优化的最后一个步骤是（）。","options":[{"label":"A","text":"成立业务流程优化项目小组"},{"label":"B","text":"找到阻碍流程优化目标实现的因素"},{"label":"C","text":"推动业务流程优化工作落到实处"},{"label":"D","text":"对初步制定的流程优化方案进行进一步优化"}],"answer":"D","explanation":"业务流程优化的最终步骤是对方案进行细化优化，确保新流程高效、可行并落地实施。","mnemonic":"业务流程优化最后一步是对方案进一步优化，\"精益求精\"在最后"},{"id":623,"type":"single","text":"指导初级工进行图片标注时，需要留意（）问题。","options":[{"label":"A","text":"忽略图片信息中的噪声干扰"},{"label":"B","text":"标注图片时应该仅仅关注目标对象"},{"label":"C","text":"标注时应该不遗漏、不误标、不多标任何目标"},{"label":"D","text":"标注时应该快速完成任务，以提高效率"}],"answer":"C","explanation":"初级工在标注图片时，应该不遗漏、不误标、不多标任何目标，只有这样才能保证标注结果的准确性和价值。","mnemonic":"标注图片要\"不遗漏、不误标、不多标\"，三不原则保准确"},{"id":624,"type":"single","text":"下列对 NoSQL 数据库数据模型的描述，错误的是（）。","options":[{"label":"A","text":"采用类似键值、列族、文档等非关系模型"},{"label":"B","text":"不需要严格遵守ACID约束"},{"label":"C","text":"采用传统关系模型"},{"label":"D","text":"无固定表结构"}],"answer":"C","explanation":"NoSQL是一种不同于关系数据库的数据库管理系统设计方式，是对非关系数据库的统称，它所采用的数据模型并非传统关系数据库的关系模型，而是类似键值、列族、文档等非关系模型","mnemonic":"NoSQL不用传统关系模型，选\"采用传统关系模型\"为错误描述"},{"id":625,"type":"single","text":"按照《中华人民共和国著作权法》，在标明作者姓名或名称、作品名称，且不阻碍作品正常使用的前提下，无需经著作权人许可就能使用作品的情形不包含（）。","options":[{"label":"A","text":"以阅读障碍者能够感知的无障碍方式向其提供已经发表的作品"},{"label":"B","text":"为介绍、评论某一作品或者说明某一问题，在作品中适当引用他人已经发表的作品"},{"label":"C","text":"个人学习、研究或欣赏"},{"label":"D","text":"商业宣传"}],"answer":"D","explanation":"根据《中华人民共和国著作权法》第二十四条规定，在下列情况下使用作品，可以不经著作权人许可，不向其支付报酬，但应当指明作者姓名或者名称、作品名称，并且不得影响该作品的正常使用，也不得不合理地损害著作权人的合法权益：（一）为个人学习、研究或者欣赏，使用他人已经发表的作品；（二）为介绍、评论某一作品或者说明某一问题，在作品中适当引用他人已经发表的作品；（三）为报道新闻，在报纸、期刊、广播电台、电视台等媒体中不可避免地再现或者引用已经发表的作品；（四）报纸、期刊、广播电台、电视台等媒体刊登或者播放其他报纸、期刊、广播电台、电视台等媒体已经发表的关于政治、经济、宗教问题的时事性文章，但著作权人声明不许刊登、播放的除外；（五）报纸、期刊、广播电台、电视台等媒体刊登或者播放在公众集会上发表的讲话，但作者声明不许刊登、播放的除外；（六）为学校课堂教学或者科学研究，翻译、改编、汇编、播放或者少量复制已经发表的作品，供教学或者科研人员使用，但不得出版发行；（七）国家机关为执行公务在合理范围内使用已经发表的作品；（八）图书馆、档案馆、纪念馆、博物馆、美术馆、文化馆等为陈列或者保存版本的需要，复制本馆收藏的作品；（九）免费表演已经发表的作品，该表演未向公众收取费用，也未向表演者支付报酬，且不以营利为目的；（十）对设置或者陈列在公共场所的艺术作品进行临摹、绘画、摄影、录像；（十一）将中国公民、法人或者非法人组织已经发表的以国家通用语言文字创作的作品翻译成少数民族语言文字作品在国内出版发行；（十二）以阅读障碍者能够感知的无障碍方式向其提供已经发表的作品；（十三）法律、行政法规规定的其他情形","mnemonic":"商业宣传不属于合理使用，商业目的不免许可"},{"id":626,"type":"single","text":"在以下聚类方法中，通过计算数据点的局部密度来识别簇结构的是（）。","options":[{"label":"A","text":"层次聚类"},{"label":"B","text":"DBSCAN"},{"label":"C","text":"K-means聚类"},{"label":"D","text":"BIRCH"}],"answer":"B","explanation":"DBSCAN基于局部密度连接区域形成簇，适用于密度不均的数据。","mnemonic":"DBSCAN基于密度聚类，\"D=Density密度\"是关键"},{"id":627,"type":"single","text":"下列哪项不属于中级知识体系里的基础概念？（）","options":[{"label":"A","text":"数据拆解基础方法"},{"label":"B","text":"自然语言处理"},{"label":"C","text":"业务数据质量检测"},{"label":"D","text":"智能系统优化"}],"answer":"B","explanation":"自然语言处理不属中级知识体系基础概念。","mnemonic":"自然语言处理NLP属于高级内容，不在中级基础概念中"},{"id":628,"type":"single","text":"质量控制是数据标注的难点之一，其在数据标注工作中的重要性体现在哪些方面？（）","options":[{"label":"A","text":"对标注过程进行监督和管理"},{"label":"B","text":"确保标记数据的准确性和可信度"},{"label":"C","text":"对数据进行分类和聚类"},{"label":"D","text":"对数据进行清洗和完善"}],"answer":"B","explanation":"数据标注中的质量控制是非常重要的一环，能够确保标注数据的准确性和可信度，以提高机器学习模型的性能和稳定性","mnemonic":"质量控制确保标注数据的准确性和可信度，质量=准确可信"},{"id":629,"type":"single","text":"若想缩短流程执行时的等待时间与业务处理时间，可采用的原则是（）。","options":[{"label":"A","text":"并行"},{"label":"B","text":"结果导向"},{"label":"C","text":"面向客户"},{"label":"D","text":"循序渐进"}],"answer":"A","explanation":"并行原则是指为了缩短流程执行过程中的等待时间和业务处理时间，可以将平行开展的流程进行并行处理","mnemonic":"并行原则缩短等待时间，多任务同时跑更快"},{"id":630,"type":"single","text":"在 LOTOS 模型中，（）用于表示 “两个进程同时发生特定事件”。","options":[{"label":"A","text":"T1 >> T2"},{"label":"B","text":"T1 |[a1,...,an]| T2"},{"label":"C","text":"T1 [] T2"},{"label":"D","text":"T1 ||| T2"}],"answer":"B","explanation":"T1 |[a1,…,an]| T2表示两进程同步发生特定事件。","mnemonic":"T1|[a1,...,an]|T2表示两进程同步特定事件，方括号=同步约定"},{"id":631,"type":"single","text":"下列选项中，不适用于数据存储与管理的是（）。","options":[{"label":"A","text":"nosql数据库"},{"label":"B","text":"Flume"},{"label":"C","text":"关系数据库"},{"label":"D","text":"分布式文件系统"}],"answer":"B","explanation":"Flume是日志采集工具，不用于数据存储管理。","mnemonic":"Flume是日志采集工具不存储数据，\"水槽\"只管传输不管存"},{"id":632,"type":"single","text":"下列哪一种交互方式属于第二代人机交互（GUI）技术中常见的，且在如今仍被广泛使用？（）","options":[{"label":"A","text":"语音命令"},{"label":"B","text":"虚拟助手"},{"label":"C","text":"鼠标控制"},{"label":"D","text":"面部识别"}],"answer":"C","explanation":"语音命令属于第三代人机交互技术，通常与自然语言处理和语音识别相关，而不是基于图形用户界面的交互方式。鼠标控制是第二代人机交互的标志性技术之一，早期的计算机操作主要依赖鼠标与图形用户界面（GUI）进行交互。面部识别是第三代人机交互的技术，属于生物识别范畴，不属于第二代交互方式。","mnemonic":"鼠标控制是第二代GUI的标志性技术，至今仍广泛使用"},{"id":633,"type":"single","text":"人机交互 GOMS 模型中的 “M” 指的是什么？","options":[{"label":"A","text":"产物"},{"label":"B","text":"目标"},{"label":"C","text":"操作时间"},{"label":"D","text":"方法"}],"answer":"D","explanation":"GOMS模型中M代表Method（任务步骤）。","mnemonic":"GOMS中M=Method方法，G目标O操作M方法S选择"},{"id":634,"type":"single","text":"下列哪项方法可以直接降低欠拟合的风险（）。","options":[{"label":"A","text":"迁移学习"},{"label":"B","text":"减少正则化系数"},{"label":"C","text":"Dropout"},{"label":"D","text":"增加正则化系数"}],"answer":"B","explanation":"减少正则化系数允许模型变得更加复杂，从而能够更好地拟合训练数据，可以直接解决欠拟合问题","mnemonic":"减少正则化系数降低欠拟合，正则化少=模型更复杂=拟合更好"},{"id":635,"type":"single","text":"文本向量化指的是什么（）。","options":[{"label":"A","text":"将文本数据转换为视频形式"},{"label":"B","text":"将文本数据转换为音频形式"},{"label":"C","text":"将文本数据转换为图片形式"},{"label":"D","text":"将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程。"}],"answer":"D","explanation":"文本向量化是指将自然语言编码为计算机可处理的、蕴含语义特征的向量的过程","mnemonic":"文本向量化=自然语言编码为语义向量，\"向量\"=数学表示"},{"id":636,"type":"single","text":"下列哪项不属于引发算法欠拟合的原因（）。","options":[{"label":"A","text":"过度训练"},{"label":"B","text":"模型过于简单"},{"label":"C","text":"特征选择不当"},{"label":"D","text":"数据样本量过少"}],"answer":"A","explanation":"算法欠拟合主要是由于数据样本量过少、特征选择不当以及模型过于简单等因素引起的","mnemonic":"过度训练导致过拟合而非欠拟合，欠拟合是模型简单/数据少/特征差"},{"id":637,"type":"single","text":"下列哪项不是职业道德的特征（）。","options":[{"label":"A","text":"特殊性"},{"label":"B","text":"多样性"},{"label":"C","text":"继承性"},{"label":"D","text":"职业性"}],"answer":"A","explanation":"职业道德的基本特性包含职业性、实践性、继承性和多样性","mnemonic":"职业道德特征：职业性、实践性、继承性、多样性，无\"特殊性\""},{"id":638,"type":"single","text":"使用 open () 函数打开文件时，参数 'r' 代表（）。","options":[{"label":"A","text":"二进制模式"},{"label":"B","text":"追加模式"},{"label":"C","text":"写入模式"},{"label":"D","text":"读取模式"}],"answer":"D","explanation":"'r'模式以文本形式读取文件，文件需存在，否则报错。","mnemonic":"open函数中r=read读取模式，r即read首字母"},{"id":639,"type":"single","text":"智慧交通解决方案所用到的技术手段里，不包含（）。","options":[{"label":"A","text":"人工智能"},{"label":"B","text":"大数据"},{"label":"C","text":"云计算"},{"label":"D","text":"区块链"}],"answer":"D","explanation":"智慧交通主要利用人工智能、大数据和云计算技术，区块链技术非其核心手段。","mnemonic":"智慧交通用AI+大数据+云计算，区块链不在其中"},{"id":640,"type":"single","text":"对比分析的核心目的在于（）。","options":[{"label":"A","text":"寻找因果关系"},{"label":"B","text":"描述数据分布"},{"label":"C","text":"探索相关性"},{"label":"D","text":"比较差异"}],"answer":"D","explanation":"对比分析核心在于比较差异，揭示数据变化规律，常用于实验组对照组或时间序列数据。","mnemonic":"对比分析核心目的是比较差异，\"对比\"即\"比差异\""},{"id":641,"type":"single","text":"数据标注工作中，不同标注者之间的一致性意味着什么？（）","options":[{"label":"A","text":"标注者的职业背景是否一致"},{"label":"B","text":"标注者标注过程中的注意力是否一致"},{"label":"C","text":"不同标注者在同一数据集上的标注结果是否一致"},{"label":"D","text":"标注者对于标注任务的理解是否一致"}],"answer":"C","explanation":"数据标注中标注者间的一致性是指不同标注者在同一数据集上的标注结果是否一致","mnemonic":"标注者一致性=不同人标同一数据结果是否一致"},{"id":642,"type":"single","text":"若一名职业人员在工作过程中，只顾及自身利益，对客户的需求置之不理，该行为违背了（）职业道德。","options":[{"label":"A","text":"个人发展"},{"label":"B","text":"持续学习"},{"label":"C","text":"尊重人权"},{"label":"D","text":"服务社会"}],"answer":"D","explanation":"服务社会是职业道德的核心内容，职业人员在工作中应以服务社会为宗旨，尊重客户的需求，帮助客户解决问题","mnemonic":"只顾自己不管客户违背服务社会的职业道德"},{"id":643,"type":"single","text":"下列哪项因素有可能导致算法出现欠拟合（）。","options":[{"label":"A","text":"数据集的特征过于丰富"},{"label":"B","text":"模型训练时间过长"},{"label":"C","text":"训练数据量过大"},{"label":"D","text":"模型过于简单"}],"answer":"D","explanation":"模型过于简单无法捕捉数据规律，导致欠拟合。","mnemonic":"模型过于简单导致欠拟合，简单模型学不到复杂规律"},{"id":644,"type":"single","text":"趋势分析法在企业财务分析中主要应用于（ ）。","options":[{"label":"A","text":"测量企业的物理资产质量"},{"label":"B","text":"评估企业的员工满意度"},{"label":"C","text":"分析企业财务指标的动态变化"},{"label":"D","text":"确定企业的市场占有率"}],"answer":"C","explanation":"趋势分析法又称水平分析法，是通过对比连续数期财务报告中的相同指标，确定增减变动的方向、数额及幅度，用以说明企业财务数据变动趋势的一种财务分析方法","mnemonic":"趋势分析法分析企业财务指标的动态变化，\"趋势\"看财务走向"},{"id":645,"type":"single","text":"AIDA 模型中的字母 D 代表的是（）。","options":[{"label":"A","text":"Disappointment（失望）"},{"label":"B","text":"Disgust（厌恶）"},{"label":"C","text":"Delight（高兴）"},{"label":"D","text":"Desire（欲望）"}],"answer":"D","explanation":"AIDA模型中D代表Desire（激发欲望）。","mnemonic":"AIDA中D=Desire欲望，注意引起兴趣激发欲望促成行动"},{"id":646,"type":"single","text":"按照 ETL 任务的生命周期，其正确的阶段顺序为（）。","options":[{"label":"A","text":"任务生成→接受调度→运行→完成"},{"label":"B","text":"任务生成→运行→接受调度→完成"},{"label":"C","text":"接受调度→任务生成→运行→完成"},{"label":"D","text":"任务生成→运行→完成→接受调度"}],"answer":"A","explanation":"ETL任务生命周期包括任务生成、调度、运行和完成四个阶段。","mnemonic":"ETL生命周期：生成→调度→运行→完成，先生后调再运行"},{"id":647,"type":"single","text":"在 ETL 流程中，“抽取”（Extraction）这一步的主要目的是（）。","options":[{"label":"A","text":"对数据进行清洗和校验"},{"label":"B","text":"将数据加载到目标系统中"},{"label":"C","text":"将数据转换为目标系统所需的格式"},{"label":"D","text":"从源系统中选择所需的数据"}],"answer":"D","explanation":"ETL中“抽取”步骤从源系统选取目标所需数据。","mnemonic":"ETL抽取=从源系统选所需数据，\"抽取\"就是\"选数据\""},{"id":648,"type":"single","text":"运用 RFM 模型开展数据分析时，需要对每个客户的（）进行计算。","options":[{"label":"A","text":"最近一次购买时间间隔"},{"label":"B","text":"购买频率"},{"label":"C","text":"消费金额"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"RFM模型需计算每个客户的最近一次购买时间（Recency）、购买频率（Frequency）和消费金额（Monetary），以支持针对性营销策略。","mnemonic":"RFM三个字母全要算：最近购买R+频率F+金额M，全选D"},{"id":649,"type":"single","text":"业务流程优化的本质是（）。","options":[{"label":"A","text":"提升客户满意度"},{"label":"B","text":"增加企业利润"},{"label":"C","text":"优化企业的管理体系"},{"label":"D","text":"提高员工工作效率"}],"answer":"C","explanation":"业务流程优化的本质是管理体系的再造或优化（B）","mnemonic":"业务流程优化本质是优化管理体系，\"流程优化\"归根到底是\"管理优化\""},{"id":650,"type":"single","text":"业务数据的主要流转流程一般是怎样的（）。","options":[{"label":"A","text":"数据获取→数据预处理→数据分析与建模→需求分析→模型评价与优化→部署"},{"label":"B","text":"数据获取→数据预处理→需求分析→部署→数据分析与建模→模型评价与优化"},{"label":"C","text":"需求分析→数据预处理→数据获取→数据分析与建模→模型评价与优化→数据应用"},{"label":"D","text":"需求分析→数据获取→数据预处理→数据分析与建模→模型评价与优化→部署"}],"answer":"D","explanation":"业务数据的主要流程为需求分析、数据获取、数据预处理、分析与建模、模型评价与优化和部署","mnemonic":"业务数据流程：需求→获取→预处理→分析建模→评价优化→部署，需求分析打头"},{"id":651,"type":"single","text":"聚类分析具备（）的功能。","options":[{"label":"A","text":"将数据分为有序的组别"},{"label":"B","text":"通过建立回归模型进行预测"},{"label":"C","text":"寻找数据对象之间的内在结构和关系"},{"label":"D","text":"直接对数据进行特征选择和降维"}],"answer":"C","explanation":"聚类分析是无监督学习，用于将数据分组为相似簇，发现数据内在结构。","mnemonic":"聚类分析发现数据内在结构和关系，无监督找相似"},{"id":652,"type":"single","text":"关于算法复杂度的类型，下列描述正确的是（）。","options":[{"label":"A","text":"O(n²) 表示算法的时间复杂度随着数据规模的平方增加，通常用于描述冒泡排序、插入排序等算法的最坏情况"},{"label":"B","text":"O(log n) 描述算法的时间复杂度与数据规模呈线性关系，常见于遍历操作"},{"label":"C","text":"O(1) 描述算法的时间复杂度与数据规模有关，常见于访问数组元素的操作"},{"label":"D","text":"O(n) 描述算法的时间复杂度与数据规模的对数成正比，常见于排序算法"}],"answer":"A","explanation":"O(n²) 是描述算法的平方时间复杂度，常见于冒泡排序、选择排序等算法，表示算法的时间复杂度随着数据规模的平方增长，适用于有嵌套循环的情况。O(log n) 表示算法的时间复杂度与数据规模的对数成正比，通常用于分治算法，如二分查找。线性关系应该是 O(n)。O(1) 表示常数时间复杂度，表示算法的运行时间是固定的，不受数据量大小影响。O(n) 描述的是线性时间复杂度，表示算法的时间复杂度与数据规模成正比，不是对数关系。","mnemonic":"O(n²)对应冒泡/插入排序最坏情况，平方=双重循环"},{"id":653,"type":"single","text":"问卷调查法是收集用户看法和反馈时常用的手段，其中（）类型的调查问卷更容易获取真实且深入的信息。","options":[{"label":"A","text":"开放式问卷"},{"label":"B","text":"单选题问卷"},{"label":"C","text":"多选题问卷"},{"label":"D","text":"排序题问卷"}],"answer":"A","explanation":"开放式问卷允许用户自由表达自己的意见，不受选项限制，因此更容易获得更全面、真实的反馈，能够深入了解用户的真实感受和需求。单选题问卷通过限制用户选择固定选项，虽然能便于数据的量化，但可能无法准确反映用户的真实想法和多样化需求，容易产生偏差。与单选题类似，多选题问卷虽然允许选择多个选项，但仍然是在预设的框架内，无法深入捕捉用户的真实反馈，尤其是当问题设计不够全面时。排序题问卷通过让用户对选项进行排序来获取优先级信息，但这种方法也存在一定局限性，因为它可能会简化用户的复杂思维过程，无法反映他们的全面意见。参考资料：《人机交互与界面设计》（李靖、韩金华编）P146。","mnemonic":"开放式问卷获取真实深入信息，自由表达不受选项限制"},{"id":654,"type":"single","text":"在遵章守法的基本要求里，下列哪项属于 “遵守法律法规” 的范畴（）。","options":[{"label":"A","text":"组织非法集会"},{"label":"B","text":"遵守相关职业法规"},{"label":"C","text":"随意破坏公共设施"},{"label":"D","text":"私自招摇撞骗"}],"answer":"B","explanation":"遵章守法的基本要求之一是“遵守宪法法律”，其中包括从事的领域和职业相关的法律法规","mnemonic":"遵守相关职业法规属于遵守法律法规范畴，排除违法选项"},{"id":655,"type":"single","text":"运用数据增强技术的主要目的是（）。","options":[{"label":"A","text":"提高图像的亮度和对比度"},{"label":"B","text":"降低图像的存储成本"},{"label":"C","text":"在测试数据集上实现足够的泛化能力"},{"label":"D","text":"增加图像的存储空间"}],"answer":"C","explanation":"数据增强的主要目标是拓展训练数据集用于训练任务模型，以便在测试数据集上实现足够的泛化能力。","mnemonic":"数据增强目的是提升泛化能力，增加数据多样性防过拟合"},{"id":656,"type":"single","text":"在 Keras 库中，用来编译神经网络模型的函数是（）。","options":[{"label":"A","text":"fit"},{"label":"B","text":"layer"},{"label":"C","text":"add"},{"label":"D","text":"compile"}],"answer":"D","explanation":"在Keras库中，使用compile()函数来编译神经网络模型","mnemonic":"Keras中compile编译模型，compile=编译，名字即功能"},{"id":657,"type":"single","text
