"text":"增加模型复杂度"},{"label":"C","text":"增加更多特征"},{"label":"D","text":"减小学习率"}],"answer":"B,C","explanation":"如果模型复杂度不足，增加训练轮数并不会有效解决欠拟合问题。增加模型复杂度是解决欠拟合最有效的方法。增加更多特征，能够提供更多的信息，帮助模型更好地学习，从而缓解欠拟合。减小学习率可能缓解优化问题，但对欠拟合无直接作用。","mnemonic":"欠拟合因模型复杂度不够：增加复杂度+增加特征，增训练轮数和减学习率无效(BC)"},{"id":856,"type":"multi","text":"下列选项中，哪项属于在 Word 中设置文字格式的操作（）。","options":[{"label":"A","text":"更改字体和字体颜色"},{"label":"B","text":"更改字号"},{"label":"C","text":"将文本加粗、变成斜体"},{"label":"D","text":"添加下划线"}],"answer":"A,B,C,D","explanation":"在Word中，设置文本格式需要先选择要设置格式的文本。若要选择单个字词，双击它。 若要选择文本的某行，单击该行左侧。选择相应选项可更改字体、字号、字体颜色，或将文本加粗、变成斜体或为其添加下划线。","mnemonic":"Word文字格式：改字体颜色+改字号+加粗斜体+下划线，全选(ABCD)"},{"id":857,"type":"multi","text":"下列各项中，可能造成决策树模型出现过拟合现象的因素是（）。","options":[{"label":"A","text":"样本数量过少"},{"label":"B","text":"特征数量过多"},{"label":"C","text":"树的深度过大"},{"label":"D","text":"使用了较大的训练集"}],"answer":"A,B,C","explanation":"选项A：样本数量过少可能导致决策树模型无法有效地泛化，容易过拟合。较少的样本使得树在拟合过程中很容易把噪声和特殊情况当作规律，导致对训练数据的记忆而非学习一般规律。选项B：特征选择过多可能导致决策树模型变得非常复杂，增加了树的分裂次数和深度，从而导致过拟合。特别是在某些特征与目标变量没有强相关性的情况下，过多的特征可能使得决策树模型难以找到最优的划分规则。选项C：树的深度过大是导致过拟合的常见原因。过深的树会把训练数据的每一个小变化都考虑进去，导致模型对训练集的过度拟合，从而丧失泛化能力。选项D：使用较大的训练集通常有助于减少过拟合，因为更多的数据可以提供更多的信息，有助于模型学习到数据的总体规律。","mnemonic":"决策树过拟合因素：样本少+特征多+树太深，大训练集反而减少过拟合(ABC)"},{"id":858,"type":"multi","text":"中级知识体系所涵盖的模块有哪几项（）。","options":[{"label":"A","text":"excel操作"},{"label":"B","text":"数据标注"},{"label":"C","text":"数据采集和处理"},{"label":"D","text":"智能系统运维"}],"answer":"B,C,D","explanation":"中级知识体系包含数据标注、数据采集和处理、智能系统运维等模块。","mnemonic":"中级知识体系模块：数据标注+数据采集处理+智能系统运维，excel非核心模块(BCD)"},{"id":859,"type":"multi","text":"在 Excel 表格中，可实现文本字符串中文本替换操作的函数有（）。","options":[{"label":"A","text":"SUM"},{"label":"B","text":"SUBSTITUTE"},{"label":"C","text":"REPLACE"},{"label":"D","text":"Trim"}],"answer":"B,C","explanation":"如果需要在某一文本字符串中替换指定的文本，使用函数SUBSTITUTE；如果需要在某一文本字符串中替换特定位置处的任意文本，使用函数REPLACE。Trim函数清除掉字符串两边的空格。","mnemonic":"Excel文本替换函数：SUBSTITUTE替换指定文本+REPLACE替换指定位置(BC)"},{"id":860,"type":"multi","text":"下列（）方法可用于解决算法的欠拟合问题。","options":[{"label":"A","text":"增加正则化项"},{"label":"B","text":"增加模型的深度"},{"label":"C","text":"减少模型的复杂度"},{"label":"D","text":"增加特征的数量"}],"answer":"B,D","explanation":"算法欠拟合是指模型过于简单，无法充分拟合训练数据，导致预测结果与实际值之间存在较大的误差。解决欠拟合问题的方法包括增加特征的数量、增加模型复杂度（例如，增加模型深度）等。","mnemonic":"解决欠拟合：增加模型深度+增加特征数量，增正则化和减复杂度会加重欠拟合(BD)"},{"id":861,"type":"multi","text":"从用途角度划分，计算机可以分为哪几类（）。","options":[{"label":"A","text":"专用计算机"},{"label":"B","text":"工作站"},{"label":"C","text":"手机"},{"label":"D","text":"通用数字计算机"}],"answer":"A,D","explanation":"计算机根据用途划分，可分为专用计算机和通用数字计算机两种。","mnemonic":"按用途分：专用计算机+通用数字计算机，工作站手机是按形态分(AD)"},{"id":862,"type":"multi","text":"下列哪项属于常见的神经网络层类型（）。","options":[{"label":"A","text":"卷积层"},{"label":"B","text":"循环层"},{"label":"C","text":"全连接层"},{"label":"D","text":"池化层"}],"answer":"A,B,C,D","explanation":"卷积层用于处理图像等二维数据，循环层用于处理时间序列等序列数据，全连接层是最基本的神经网络层。池化层通常在卷积神经网络中与卷积层一起使用，用于降低特征图的维度。","mnemonic":"神经网络层类型：卷积层+循环层+全连接层+池化层，全选(ABCD)"},{"id":863,"type":"multi","text":"下列哪项属于常见的对比分析方法（）。","options":[{"label":"A","text":"行业对比"},{"label":"B","text":"竞品对比"},{"label":"C","text":"与自身同比"},{"label":"D","text":"环比"}],"answer":"A,B,C,D","explanation":"对比分析法是指确定对比对象和对比维度，对目标事物和对比事物进行比较，常见的有行业对比、竞品对比、与自身同比、环比等。","mnemonic":"对比分析方法：行业对比+竞品对比+同比+环比，全选(ABCD)"},{"id":864,"type":"multi","text":"下列哪一选项属于人机交互的任务分析方法？（）","options":[{"label":"A","text":"用例图"},{"label":"B","text":"顺序图"},{"label":"C","text":"任务金字塔"},{"label":"D","text":"组件图"}],"answer":"A,B,C","explanation":"用例图用来描述系统中各个用户角色与系统功能之间的交互关系，是任务分析中常用的工具之一。顺序图展示了任务执行过程中的时间顺序，帮助细化任务分析，是任务分析中的重要工具。任务金字塔用于描述任务的层级关系，帮助理解不同层次任务之间的依赖和结构，是任务分析中的一种有效方法。组件图属于系统架构设计的工具，通常用于描述系统组件之间的关系，不属于任务分析方法的一部分。","mnemonic":"人机交互任务分析：用例图+顺序图+任务金字塔，组件图属于架构设计(ABC)"},{"id":865,"type":"multi","text":"智慧城市的主要作用包括哪些（）。","options":[{"label":"A","text":"提升城市运行效率"},{"label":"B","text":"改善城市生活品质"},{"label":"C","text":"促进城市可持续发展"},{"label":"D","text":"增强城市竞争力"}],"answer":"A,B,C,D","explanation":"智慧城市的主要作用包括提升城市运行效率、改善城市生活品质、促进城市可持续发展和增强城市竞争力。","mnemonic":"智慧城市四大作用：提效率+改品质+促可持续+增竞争力，全选(ABCD)"},{"id":866,"type":"multi","text":"业务流程重组（BPR）可以通过哪些方面的手段来实现（）。","options":[{"label":"A","text":"充分发挥信息技术（IT）的潜能，利用IT改造企业过程"},{"label":"B","text":"简化企业过程，减少不必要的步骤"},{"label":"C","text":"变革组织结构，达到组织精简和效率提高的目的"},{"label":"D","text":"增加企业流程的复杂性以提高灵活性"}],"answer":"A,B,C","explanation":"业务流程重组（BPR）的实现手段包括：充分发挥信息技术（IT）的潜能，利用IT改造企业过程（A），简化企业过程，减少不必要的步骤（B），以及变革组织结构，达到组织精简和效率提高的目的（C）。增加企业流程的复杂性（D）并不是BPR的目标，反而与简化企业过程的目标相悖。","mnemonic":"BPR实现手段：IT改造+简化过程+变革组织，增加复杂性与目标相悖(ABC)"},{"id":867,"type":"multi","text":"支持向量机算法的主要优势有（）。","options":[{"label":"A","text":"在高维空间中有效处理数据"},{"label":"B","text":"可处理非线性分类问题"},{"label":"C","text":"对小样本数据表现良好"},{"label":"D","text":"计算速度快"}],"answer":"A,B,C","explanation":"支持向量机的优点之一是能够通过核函数有效地处理高维数据，并能够应对非线性分类问题。对于小样本数据，SVM通常能够表现良好，因为它通过最大化类别之间的间隔来训练模型，通常具有较强的泛化能力，尤其在训练样本较少的情况下。然而，SVM的计算速度相对较慢，尤其在数据量大或维度高时，训练时间通常较长。使用非线性核时，计算复杂度会显著增加。","mnemonic":"SVM优势：高维有效+非线性分类+小样本好，但计算速度不快(ABC)"},{"id":868,"type":"multi","text":"智慧交通能够解决的问题有哪些（）。","options":[{"label":"A","text":"降低道路安全事故"},{"label":"B","text":"减少道路拥堵"},{"label":"C","text":"增加汽车销售渠道"},{"label":"D","text":"减少碳排放"}],"answer":"A,B,D","explanation":"智慧交通可以解决的问题包括降低道路安全事故、减少道路拥堵、减少碳排放，但无法增加汽车销售的渠道。","mnemonic":"智慧交通解决：降事故+减拥堵+减碳排放，与汽车销售渠道无关(ABD)"},{"id":869,"type":"multi","text":"AARRR 模型的主要内容包含（）。","options":[{"label":"A","text":"获取Acquisition"},{"label":"B","text":"激活Activation"},{"label":"C","text":"留存Retention"},{"label":"D","text":"收入Revenue"}],"answer":"A,B,C,D","explanation":"AARRR模型是一个用户分析的经典模型，其中AARRR分别代表获取Acquisition、激活Activation、留存Retention、收入Revenue、传播Refer。因此，选项A、B、C、D都属于AARRR模型的主要内容。","mnemonic":"AARRR五环节：获取+激活+留存+收入+传播，全选(ABCD)"},{"id":870,"type":"multi","text":"智慧农业解决方案的主要目标是什么？","options":[{"label":"A","text":"提高农业生产效率"},{"label":"B","text":"实现农业资源的高效利用和可持续发展"},{"label":"C","text":"提供优质、安全的农产品"},{"label":"D","text":"促进农村经济的发展和农民的福利提升"}],"answer":"A,B,C,D","explanation":"智慧农业解决方案的主要目的是提高农业生产效率、实现农业资源的高效利用和可持续发展、提供优质、安全的农产品、促进农村经济的发展和农民的福利提升。","mnemonic":"智慧农业四目标：提效率+高效利用+优质安全+促发展，全选(ABCD)"},{"id":871,"type":"multi","text":"下列哪项属于业务分析方法论（）。","options":[{"label":"A","text":"帕累托分析方法"},{"label":"B","text":"A/B测试分析方法"},{"label":"C","text":"同期群分析方法"},{"label":"D","text":"因果分析方法"}],"answer":"A,B,C,D","explanation":"四类有代表性的业务分析方法论--帕累托分析方法、A/B测试分析方法、同期群分析方法及因果分析方法。","mnemonic":"四大业务分析方法论：帕累托+A/B测试+同期群+因果分析，全选(ABCD)"},{"id":872,"type":"multi","text":"按照数据存储方式的差异，数据存储可分为哪几类（）。","options":[{"label":"A","text":"直连存储"},{"label":"B","text":"网络附加存储"},{"label":"C","text":"存储区域网络"},{"label":"D","text":"缓存存储"}],"answer":"A,B,C","explanation":"根据数据存储方式的不同，数据存储可分为直连存储(DirectAttachedStorage,DAS)、网络附加存储(NetworkAttachedStorage,NAS),存储区域网络(StorageAreaNetwork,SAN)。","mnemonic":"数据存储按方式分三类：DAS直连+NAS网络附加+SAN存储区域网络，无缓存存储(ABC)"},{"id":873,"type":"multi","text":"下列哪项属于贝叶斯算法的原理（）。","options":[{"label":"A","text":"获得先验概率"},{"label":"B","text":"更新后验概率"},{"label":"C","text":"计算条件概率"},{"label":"D","text":"最大化似然概率"}],"answer":"A,B,C","explanation":"贝叶斯算法基于贝叶斯定理，通过获得先验概率、更新后验概率和计算条件概率来进行分类或预测。最大化似然概率不属于贝叶斯算法的原理，而是一种常见的参数估计方法。因此，选项A、B和C是贝叶斯算法原理的正确选择。","mnemonic":"贝叶斯原理三步：先验概率+后验概率+条件概率，最大似然是参数估计法(ABC)"},{"id":874,"type":"multi","text":"在人机交互研究中，用户体验具有哪些特点？","options":[{"label":"A","text":"动态性"},{"label":"B","text":"情境依赖性"},{"label":"C","text":"静态性"},{"label":"D","text":"主观性"}],"answer":"A,B,D","explanation":"用户体验是指用户对产品的总体主观感受,包含用户在使用产品的过程中所感受到的全部内容总和，具有动态性、情境依赖性和主观性的特点","mnemonic":"用户体验三特点：动态性+情境依赖性+主观性，静态性相反(ABD)"},{"id":875,"type":"multi","text":"适用于图像类数据的数据增强方法有哪些（）。","options":[{"label":"A","text":"旋转"},{"label":"B","text":"添加噪声"},{"label":"C","text":"缩放"},{"label":"D","text":"镜像"}],"answer":"A,B,C,D","explanation":"数据增强技术通过对原始数据进行扩增、变换等操作，生成更多、更丰富的数据样本，从而有效地提高了人脸表情识别的准确性和稳定性。不同的数据增强方法可以根据实际需求进行选择，如旋转、缩放、镜像、添加噪声等","mnemonic":"图像数据增强：旋转+噪声+缩放+镜像，全选(ABCD)"},{"id":876,"type":"multi","text":"根据《中华人民共和国劳动法》，劳动合同的期限被划分为哪些类型（）。","options":[{"label":"A","text":"3年"},{"label":"B","text":"有固定期限"},{"label":"C","text":"无固定期限"},{"label":"D","text":"以完成一定的工作为期限"}],"answer":"B,C,D","explanation":"根据《中华人民共和国劳动法》第二十条规定，劳动合同的期限分为有固定期限、无固定期限和以完成一定的工作为期限。劳动者在同一用人单位连续工作满十年以上，当事人双方同意续延劳动合同的，如果劳动者提出订立无固定期限的劳动合同，应当订立无固定期限的劳动合同。","mnemonic":"劳动合同期限三类：有固定+无固定+完成一定工作，\"3年\"不是类型(BCD)"},{"id":877,"type":"multi","text":"下列属于制定数据标注流程的关键步骤的是（）。","options":[{"label":"A","text":"数据标注培训"},{"label":"B","text":"标注任务定义：明确标注的目标和任务，确定需要标注的数据类型和标注要求。"},{"label":"C","text":"标注工具选择：选择适合任务需求的标注工具，例如标注平台、标注软件等。"},{"label":"D","text":"标注策略确定：制定标注的具体策略，包括标注过程中的标准、规则、流程等。 选项A中的数据标注培训不属于数据标注流程制定的关键步骤，它是为了更好地执行标注任务而进行的准备工作。"}],"answer":"B,C,D","explanation":"数据标注流程制定的关键步骤包括以下内容。","mnemonic":"标注流程关键步骤：任务定义+工具选择+策略确定，培训是准备工作(BCD)"},{"id":878,"type":"multi","text":"下列关于图像分割方法的描述，正确的是（）。","options":[{"label":"A","text":"图像分割是将一幅图像分成不同区域或物体的过程"},{"label":"B","text":"基于阈值的方法是一种常用的图像分割方法"},{"label":"C","text":"区域生长算法属于基于边缘的图像分割方法"},{"label":"D","text":"基于区域的方法通常考虑像素之间的相似性"}],"answer":"A,B,D","explanation":"选项A描述正确，图像分割的定义是将一幅图像划分为若干个区域或物体，每个区域具有不同的特征。选项B描述正确，基于阈值的方法是通过将图像中的像素值与设定的阈值进行比较，进而分割图像。选项C描述错误，区域生长算法是一种基于区域的分割方法，而不是基于边缘的。区域生长法通过逐步合并相似的像素来形成区域，而不是依赖于图像的边缘信息。选项D描述正确，基于区域的图像分割方法（如区域生长法）通常考虑像素之间的相似性，如灰度、颜色等特征，以确定像素是否应当归为同一类。","mnemonic":"图像分割描述：分区域物体+阈值法常用+区域法看相似性，区域生长非边缘法(ABD)"},{"id":879,"type":"multi","text":"按照《中华人民共和国网络安全法》，下列哪项行为属于网络安全违法行为（）。","options":[{"label":"A","text":"干扰他人网络正常功能"},{"label":"B","text":"非法侵入他人网络"},{"label":"C","text":"窃取网络数据等危害网络安全"},{"label":"D","text":"干扰网络正常功能及防护措施"}],"answer":"A,B,C,D","explanation":"《中华人民共和国网络安全法》第二十七条规定任何个人和组织不得从事非法侵入他人网络、干扰他人网络正常功能、窃取网络数据等危害网络安全的活动；不得提供专门用于从事侵入网络、干扰网络正常功能及防护措施、窃取网络数据等危害网络安全活动的程序、工具；明知他人从事危害网络安全的活动的，不得为其提供技术支持、广告推广、支付结算等帮助。","mnemonic":"网络安全违法：干扰+非法侵入+窃取数据+干扰防护，全选(ABCD)"},{"id":880,"type":"multi","text":"OpenCV 提供了用于双边滤波的函数 cv.bilateralBlur0，（）属于其主要参数。","options":[{"label":"A","text":"src"},{"label":"B","text":"sigmaColor"},{"label":"C","text":"borderType"},{"label":"D","text":"sigmaSpace"}],"answer":"A,B,C,D","explanation":"OpenCV提供了用于双边滤波的函数cv.bilateralBlur0):dst = cv.bilateralBlur(src, d,sigmaColor, sigmaSpacel,borderType])其中的主要参数介绍如下。src:输入图像，可以是8位整型或浮点数的单通道或3通道图像。d:滤波时图像点的邻域直径，如果d为非正值，则由sigmaSpace计算得出。d的大小将明显影响函数的速度。sigmaColor:颜色空间滤波器的sigma值。该参数值越大，像素邻域内颜色差距更大的像素会相互影响，将产生更大的半相等颜色区域。sigmaSpace:坐标空间中滤波器的sigma值。该参数值越大，颜色接近但距离更远的像素会相互影响。当d>0时，d指定了邻域大小且与sigmaSpace无关，否则d与sigmaSpace成正比。borderType:边界类型。不支持cv.BORDER WRAP.dst:输出图像，其大小和数据类型与输入图像相同","mnemonic":"双边滤波函数参数：src+sigmaColor+borderType+sigmaSpace，全选(ABCD)"},{"id":881,"type":"multi","text":"多维度拆解分析方法中，需要理解的两个关键词是（）。","options":[{"label":"A","text":"维度"},{"label":"B","text":"维系"},{"label":"C","text":"解析"},{"label":"D","text":"拆解"}],"answer":"A,D","explanation":"对于多维度拆解分析方法，要理解两个关键词:维度、拆解。","mnemonic":"多维度拆解分析两关键词：维度+拆解(AD)"},{"id":882,"type":"multi","text":"智慧商场中常见的关键技术有哪些（）。","options":[{"label":"A","text":"物联网技术"},{"label":"B","text":"大数据与云计算"},{"label":"C","text":"人工智能技术"},{"label":"D","text":"5G技术"}],"answer":"A,B,C,D","explanation":"物联网技术、大数据与云计算、人工智能技术和5G技术是智慧商场中常见的关键技术。","mnemonic":"智慧商场关键技术：物联网+大数据云计算+AI+5G，全选(ABCD)"},{"id":883,"type":"multi","text":"计算机硬件系统中的外部设备包含哪些（）。","options":[{"label":"A","text":"外存储器"},{"label":"B","text":"中央处理器"},{"label":"C","text":"输入设备"},{"label":"D","text":"输出设备"}],"answer":"A,C,D","explanation":"计算机硬件系统的外部设备简称“外设”，是计算机系统中输入、输出设备、外存储器的统称。内存储器和中央处理器属于硬件系统的主机。","mnemonic":"外部设备三类：外存储器+输入设备+输出设备，CPU属于主机(ACD)"},{"id":884,"type":"multi","text":"判断模型是否欠拟合时，通常需要综合考量的因素包括（）。","options":[{"label":"A","text":"训练误差"},{"label":"B","text":"验证误差"},{"label":"C","text":"测试误差"},{"label":"D","text":"模型复杂度"}],"answer":"A,B,C,D","explanation":"训练误差：反映模型在训练集上的表现，训练误差较高是欠拟合的标志。验证误差：反映模型在验证集（中间评估集）上的表现，较高的验证误差和较高的训练误差可能表明欠拟合。测试误差：反映模型在测试集（最终未见过的数据）上的表现，较高的测试误差通常与欠拟合或过拟合相关，具体需要综合训练误差来判断。模型复杂度：如果模型复杂度过低，可能无法捕捉数据的复杂关系，导致欠拟合。","mnemonic":"判断欠拟合综合考量：训练误差+验证误差+测试误差+模型复杂度，全选(ABCD)"},{"id":885,"type":"multi","text":"下列哪项属于智慧农场的应用案例？","options":[{"label":"A","text":"农业互联网"},{"label":"B","text":"精准农业技术"},{"label":"C","text":"智能温室管理系统"},{"label":"D","text":"农业无人机应用"}],"answer":"A,B,C,D","explanation":"农业互联网、精准农业技术、智能温室管理系统、农业无人机应用属于智慧农场的应用案例。","mnemonic":"智慧农场应用：农业互联网+精准农业+智能温室+无人机，全选(ABCD)"},{"id":886,"type":"multi","text":"在进行留出法划分时，需要注意（）问题。","options":[{"label":"A","text":"训练集和测试集的比例应该合理"},{"label":"B","text":"划分时应考虑数据集的特性"},{"label":"C","text":"在大多数情况下，划分时应随机选择样本"},{"label":"D","text":"划分时应确保训练集和测试集之间没有重叠"}],"answer":"A,B,C,D","explanation":"进行留出法划分时，需要考虑训练集和测试集的比例是否合理、数据集的特性、是否随机选择样本以及是否确保训练集和测试集之间没有重叠。在大多数情况下，留出法划分会随机选择样本，但对于时间序列数据等特殊情况，可能需要按顺序划分。","mnemonic":"留出法划分注意：比例合理+考虑特性+随机选样+无重叠，全选(ABCD)"},{"id":887,"type":"multi","text":"下列关于图像增强的说法，错误的是（）。","options":[{"label":"A","text":"在滤除噪声的同时还能保留边缘信息，那么均值滤波便可以以满足要求"},{"label":"B","text":"中值滤波也是对中心像素的邻域进行处理，但并非通过加权平均的方式，因此其处理方式能用线性表达式表示。"},{"label":"C","text":"直方图均衡化是图像增强中最常用的技术"},{"label":"D","text":"用于降低噪声影响的图像增强技术包括中值滤波、高斯滤波等"}],"answer":"A,B","explanation":"选项A说法错误，如果希望在滤除噪声的同时还能保留边缘信息，那么均值滤波便难以满足要求而中值滤波则能够较好地解决该问题。选项B说法错误，尽管中值滤波也是对中心像素的邻域进行处理，但并非通过加权平均的方式因此其处理方式不能用线性表达式表示。","mnemonic":"图像增强错误说法：A均值滤波难保边缘B中值滤波不能线性表达，AB说反了(AB)"},{"id":888,"type":"multi","text":"5W2H 模型中，“2H” 所指的是（）。","options":[{"label":"A","text":"How long"},{"label":"B","text":"How many"},{"label":"C","text":"How"},{"label":"D","text":"how much"}],"answer":"C,D","explanation":"5W2H模型中的“2H”指How（如何）和How much （多少）。","mnemonic":"5W2H的2H：How如何+How much多少(CD)"},{"id":889,"type":"multi","text":"在人机交互中，一个完整的人体动作分析过程主要包含哪些步骤？","options":[{"label":"A","text":"动作捕捉"},{"label":"B","text":"动作预测"},{"label":"C","text":"动作特征描述"},{"label":"D","text":"动作分类识别"}],"answer":"A,C,D","explanation":"一个完整的人体动作分析过程主要包括动作捕捉、动作特征描述和动作分类识别三大部分。","mnemonic":"人体动作分析三步：动作捕捉+特征描述+分类识别，预测不在其中(ACD)"},{"id":890,"type":"multi","text":"下列哪一选项属于初次接触系统的新手用户所具备的特征？（）","options":[{"label":"A","text":"对系统不熟悉"},{"label":"B","text":"需要系统提供详细的操作指南"},{"label":"C","text":"容易犯错"},{"label":"D","text":"能够独立使用系统"}],"answer":"A,B,C","explanation":"新手用户是指初次接触该系统的用户。他们对系统不熟悉，需要系统提供详细的操作指南，以便能够快速了解系统的功能和使用方法。由于对系统不熟悉，他们容易犯错，需要系统提供尽可能多、尽可能详尽的信息和指导，以便能够一步一步地操作。由于刚刚接触该系统，他们往往需要帮助和指导，所以不能独立使用系统。","mnemonic":"新手用户特征：不熟悉+需指南+易犯错，不能独立使用(ABC)"},{"id":891,"type":"multi","text":"在人机交互行为模型里，下列关于状态同步交互的说法正确的是？","options":[{"label":"A","text":"允许用户与系统共享实时状态信息"},{"label":"B","text":"系统通过传感器和通信技术动态更新用户状态"},{"label":"C","text":"状态变化会触发界面反馈"},{"label":"D","text":"必须依赖加锁机制保证状态一致性"}],"answer":"A,B,C","explanation":"共享状态交互中，两个或多个并发执行的行为可以共享状态变量，而状态变量可以被所有并发的行为访问。由于并发行为的执行顺序是不确定的，因此需要使用同步机制来保证访问共享状态变量的一致性，而加锁机制只是同步机制的一种。","mnemonic":"状态同步交互：共享实时状态+传感器动态更新+状态变化触发反馈，加锁只是同步机制之一(ABC)"},{"id":892,"type":"multi","text":"下列选项中，属于 NoSQL 数据库的有（）。","options":[{"label":"A","text":"HBase"},{"label":"B","text":"MySQL"},{"label":"C","text":"Redis"},{"label":"D","text":"Oracle"}],"answer":"A,C","explanation":"HBase属于列族数据库，是NoSQL数据库的典型代表，适用于海量数据存储和高并发读写场景。Redis属于键值存储，是内存型NoSQL数据库，常用于缓存、实时数据处理等场景。MySQL和Oracle是传统的关系型数据库，基于SQL语言和表结构，支持ACID事务，属于SQL范畴，而非NoSQL。","mnemonic":"NoSQL数据库：HBase列族+Redis键值，MySQL和Oracle是关系型(AC)"},{"id":893,"type":"multi","text":"下列哪种方法主要被用于评估随机森林模型中的特征重要程度？（）","options":[{"label":"A","text":"基于熵的重要性"},{"label":"B","text":"基于信息增益的重要性"},{"label":"C","text":"基于平均减少不纯度的重要性"},{"label":"D","text":"基于特征的平均减少准确度"}],"answer":"C,D","explanation":"在随机森林模型中，特征重要性评估是通过每棵决策树的分裂情况来确定的。基于平均减少不纯度的重要性： 随机森林使用这种方法来评估特征的重要性，通过计算每个特征的分裂所带来的不纯度减少，最终得出每个特征的重要性评分。基于特征的平均减少准确度： 这是评估特征在模型中贡献的重要性的一种方法，通过计算特征在训练过程中对准确度的影响，通常用于交叉验证中。“基于熵的重要性” 和 “基于信息增益的重要性” 主要用于单个决策树的节点分裂依据，并非随机森林的特征重要性评估方法。","mnemonic":"随机森林特征重要性：平均减少不纯度+平均减少准确度，熵和信息增益用于单棵树(CD)"},{"id":894,"type":"multi","text":"支持向量机算法适用于以下哪些问题（）。","options":[{"label":"A","text":"二分类问题"},{"label":"B","text":"多分类问题"},{"label":"C","text":"回归问题"},{"label":"D","text":"异常检测问题"}],"answer":"A,B,C,D","explanation":"支持向量机算法适用于多种类型的问题。它最初被广泛用于二分类问题，通过构建一个分隔超平面来将两个类别分开。然而，SVM也可以扩展到多分类问题，通过一对多或一对一策略进行多类别分类。此外，SVM也可以用于回归问题，通过拟合一个回归曲线或平面来预测连续值。支持向量机还可以用于异常检测问题，通过识别与正常样本差异较大的异常样本。","mnemonic":"SVM适用问题：二分类+多分类+回归+异常检测，全选(ABCD)"},{"id":895,"type":"multi","text":"在人机交互中，哪类设备用于三维信息的输入？","options":[{"label":"A","text":"三维扫描仪"},{"label":"B","text":"数码摄像头"},{"label":"C","text":"动作捕捉设备"},{"label":"D","text":"触摸屏"}],"answer":"A,C","explanation":"三维扫描仪和动作捕捉设备是专门用于捕捉和输入三维信息的设备。数码摄像头和触摸屏虽然可以用于输入信息，但它们主要用于二维信息的输入。","mnemonic":"三维信息输入设备：三维扫描仪+动作捕捉，摄像头触摸屏主要是二维(AC)"},{"id":896,"type":"multi","text":"属于聚类效果内部评估指标的有（）。","options":[{"label":"A","text":"FMI指数"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"DB指数"},{"label":"D","text":"CH指数"}],"answer":"B,C,D","explanation":"轮廓系数通过类内紧密度与类间分离度的综合值评估聚类质量，值越大效果越好。CH指数计算类间方差与类内方差的比值，比值越大表示类间差异显著、类内紧密。DB指数通过类内距离与类间距离的比值衡量，值越小表示聚类效果越优。FMI指数属于外部指标，基于真实标签计算聚类结果与真实类别的相似性。","mnemonic":"聚类内部评估指标：轮廓系数+DB指数+CH指数，FMI是外部指标需真实标签(BCD)"},{"id":897,"type":"multi","text":"属于职业道德主要功能的是（）。","options":[{"label":"A","text":"约束职业人员行为，规范职业行为标准"},{"label":"B","text":"提高职业人员的综合素质和道德水平"},{"label":"C","text":"维护公共利益和利益相关者权益"},{"label":"D","text":"维护行业信誉"}],"answer":"A,B,C,D","explanation":"职业道德是规范职业人员行为的一种法规约束，其主要功能包括：约束职业人员的行为，规范职业行为标准；提高职业人员的道德水平和综合素质，增强职业身份认同；维护公共利益和利益相关者权益，保持职业稳定和公信力。","mnemonic":"职业道德主要功能：约束行为+提高素质+维护公益+维护信誉，全选(ABCD)"},{"id":898,"type":"multi","text":"下列关于算法复杂度类型的说法，正确的是（）。","options":[{"label":"A","text":"时间复杂度描述的是算法的执行时间"},{"label":"B","text":"空间复杂度描述的是算法所需的辅助存储空间"},{"label":"C","text":"渐进复杂度描述算法运行时间随着问题规模增加的变化情况"},{"label":"D","text":"常数复杂度描述的是算法的基础运算次数"}],"answer":"B,C","explanation":"A错误，时间复杂度描述的是算法运行时间与问题规模的增长趋势；D错误，常数复杂度指的是算法的某个基本操作执行次数是一个固定的常数，所以不会随着问题规模增加而变化；B正确，空间复杂度描述算法在执行时所需要的辅助存储空间；C正确，渐进复杂度通常使用大O符号作为描述，可描述算法运行时间随着问题规模增加而增加的趋势。","mnemonic":"算法复杂度正确说法：空间复杂度=辅助存储空间+渐进复杂度=随规模变化趋势(BC)"},{"id":899,"type":"multi","text":"下列选项中，哪一项是计算机所具备的特点（）。","options":[{"label":"A","text":"运算速度快"},{"label":"B","text":"运算精度高"},{"label":"C","text":"自动化程度高"},{"label":"D","text":"只有存储功能，没有记忆功能"}],"answer":"A,B,C","explanation":"计算机的特点包括运算速度快；运算精度高；记忆功能强，存储容量大；具有数据分析和逻辑判断能力；自动化程度高。","mnemonic":"计算机特点：速度快+精度高+自动化高，有记忆功能D说法错(ABC)"},{"id":900,"type":"multi","text":"属于人机交互范畴内的用户类别包括（）。","options":[{"label":"A","text":"专家型用户"},{"label":"B","text":"熟练型用户"},{"label":"C","text":"生疏型用户"},{"label":"D","text":"偶然型用户"}],"answer":"A,B,C,D","explanation":"在标准的人机交互分类中，用户通常被分为专家型用户、熟练型用户、生疏型用户（或称为新手用户）和偶然型用户。这些分类反映了用户的熟练程度和使用产品的频率。","mnemonic":"人机交互用户四类：专家+熟练+生疏+偶然，全选(ABCD)"},{"id":901,"type":"judge","text":"企业对技术人员的培训涉及多个维度，而企业所需的技术人员应具备综合的能力与素养。","options":[],"answer":"正确","explanation":"根据技术人员的特点，对技术人员培训的主要项目有：计算机编程，程序和网络维护、操作，新设备的维护、维修与操作，安全常识，产品知识，全面质量管理，目标管理，管理信息系统，市场营销，财务管理，新产品研制，材料替代，生产管理，工业工程，品质工程等。对技术人员的培训是多方面的，也就是说，企业所需要的技术人员应该具有较全面的能力和素质。","mnemonic":"正确√ 技术人员需综合能力，不只技术，培训涉及多维度"},{"id":902,"type":"judge","text":"在关联分析中，支持度是用于评估变量间关联程度的指标。","options":[],"answer":"错误","explanation":"支持度用于衡量关联规则在数据集中出现的频率。支持度越高，表示该关联规则在数据集中越普遍。","mnemonic":"错误✗ 支持度衡量\"频率\"非\"关联程度\"，频率≠关联"},{"id":903,"type":"judge","text":"遵章守法的基本要求涵盖：遵守法律法规、遵循道德规范、不参与非法活动、滥用职权、保护客户权益、合规经营。","options":[],"answer":"错误","explanation":"职业守则中的\"遵章守法\"基本要求指的是从业人员应该遵守法律法规和相关规定。包括遵守法律法规、遵循道德规范、不参与非法活动、保护客户权益、合规经营等方面。滥用职权对个人和公司均会造成负面影响，不属于遵章守法的基本要求。","mnemonic":"错误✗ \"滥用职权\"混入守法要求，明显违法项不属于"},{"id":904,"type":"judge","text":"支持向量机的工作方式是在高维空间中找出超平面，让该超平面能最大程度区分不同类别的样本。","options":[],"answer":"正确","explanation":"支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。SVM通过最大化不同类别之间的间隔来实现最佳分类","mnemonic":"正确√ SVM找超平面、最大间隔分类，这是标准定义"},{"id":905,"type":"judge","text":"收集那些规模庞大、生成迅速的大数据，并且能让这些来自多个源头、结构各异的大数据相互配合发挥作用，进而为大数据分析等应用提供有效支持，这是大数据采集阶段的任务，也是大数据的核心技术之一。","options":[],"answer":"正确","explanation":"大数据的来源多种多样，如何获取这些规模大、产生速度快的大数据，并且能够使这些多源异构的大数据得以协同工作，从而有效地支撑大数据分析等应用，是大数据采集阶段的工作，也是大数据的核心技术之一。","mnemonic":"正确√ 大数据采集=多源异构协同，是核心技术之一"},{"id":906,"type":"judge","text":"进行 K 折交叉验证时，需将数据集分成 k 个子集，每次用其中一个子集作为测试集，剩下的子集则作为训练集。","options":[],"answer":"正确","explanation":"交叉验证法是一种比较常用的方法，交叉验证的步骤如下：（1）首先将数据集划分为k个不相交的子集；（2）每次取出一个子集作为测试集，剩余的k-1个子集作为训练集，重复进行k次；（3）最后对所有测试集的性能取平均值。","mnemonic":"正确√ K折交叉验证：k份轮流当测试集，标准流程"},{"id":907,"type":"judge","text":"数据库管理系统只负责数据的存储，而数据的增删改查操作则完全依靠外部应用程序来实现。","options":[],"answer":"错误","explanation":"DBMS的核心功能之一是直接提供数据操作能力，包括数据的插入、删除、修改和查询，无需依赖外部应用程序直接处理底层数据。","mnemonic":"错误✗ DBMS自带增删改查功能，不依赖外部程序"},{"id":908,"type":"judge","text":"劳动者若拒绝用人单位管理人员的违章指挥、强令冒险作业，会被视作违反劳动合同。","options":[],"answer":"错误","explanation":"《中华人民共和国劳动合同法》第三十二条规定，劳动者拒绝用人单位管理人员违章指挥、强令冒险作业的，不视为违反劳动合同。","mnemonic":"错误✗ 拒绝违章指挥是合法权利，劳动法明确保护"},{"id":909,"type":"judge","text":"支持向量机算法通过探寻一个超平面，以最大程度分隔两类样本，从而解决二分类问题。","options":[],"answer":"正确","explanation":"支持向量机（SVM）的工作原理是在高维空间中寻找一个超平面，使得该超平面可以最大化地将不同类别的样本分隔开。解决二分类问题时，支持向量机算法通过寻找一个超平面，将两类样本最大化地分隔开。","mnemonic":"正确√ SVM超平面最大间隔解决二分类，与904同理"},{"id":910,"type":"judge","text":"在请求模式里，当应用程序等待输入数据时，并不会暂停自身的执行流程，它会持续运行，直到接收到输入数据才会停下。","options":[],"answer":"错误","explanation":"请求模式要求应用程序暂停，直到输入设备提供所需的数据后才继续执行。","mnemonic":"错误✗ 请求模式会暂停等待输入，不是继续运行"},{"id":911,"type":"judge","text":"依据文件的保护时长，可将文件分为临时文件和永久文件两类。","options":[],"answer":"错误","explanation":"根据文件的保护期限，可以把文件分成临时文件、档案文件和永久文件。","mnemonic":"错误✗ 少了\"档案文件\"，应分三类：临时、档案、永久"},{"id":912,"type":"judge","text":"目前，数据标注工作大多仍由人工完成，面对百万级别的标注数据量或是复杂的标注任务，很容易出现标注质量不达标的情况。","options":[],"answer":"正确","explanation":"现阶段的数据标注工作主要还是依靠人来完成的，但是当标注人员面对百万级别的标注数据量，或是复杂的标注任务时，容易产生极大的心理压力，而造成标注质量不合格。","mnemonic":"正确√ 百万级标注靠人工易疲劳，质量难保证"},{"id":913,"type":"judge","text":"相较于初级阶段，管理阶段对培训管理工作的考核标准有了提升，除了留意每场培训活动的各项指标外，通常还会把培训计划的完成比例纳入考核范围。","options":[],"answer":"正确","explanation":"管理阶段对培训管理工作的考核指标相比初级阶段得到了升级，除了关注每场培训活动的指标之外，一般还包括培训计划达成率、计划课程的参训率、讲师的授课次数、培训课程完整度的百分比以及所有培训管理工作的平均满意度等。","mnemonic":"正确√ 管理阶段考核升级，增加培训计划达成率等指标"},{"id":914,"type":"judge","text":"逻辑回归通过让对数似然函数达到最大来优化模型参数，进而找到最优的分类边界。","options":[],"answer":"正确","explanation":"逻辑回归算法的优化目标是最大化对数似然函数。对数似然函数的最大化过程通过最大化样本数据的概率来找到模型参数，使得模型对分类任务的拟合度最优。这一过程是通过优化算法（如梯度下降）来实现的。通过最大化对数似然函数，逻辑回归能够找到最佳的分类边界，以便对新样本进行分类。","mnemonic":"正确√ 逻辑回归最大化对数似然函数，找最优分类边界"},{"id":915,"type":"judge","text":"数据增强的原理是通过对原始图像进行变换或合成，生成新的训练数据，以此来扩充数据集。","options":[],"answer":"正确","explanation":"数据增强技术通过对原始图像进行变换或合成，生成新的训练数据。其主要目的是扩充数据集，使模型能够学习到更多的不变性，增强模型的泛化能力，同时减少过拟合的风险。","mnemonic":"正确√ 数据增强=变换/合成原始图像，扩充数据集"},{"id":916,"type":"judge","text":"Jieba 分词库仅能用于情感分析。","options":[],"answer":"错误","explanation":"Jieba 分词库可以帮助实现文本分类、 情感分析、 文本聚类等任务。","mnemonic":"错误✗ jieba不仅情感分析，还能分类、聚类等多任务"},{"id":917,"type":"judge","text":"面对复杂的业务需求以及日益增多的 ETL 任务列表，调度的基础逻辑无需添加额外策略。","options":[],"answer":"错误","explanation":"为了满足复杂的业务需求，以及不断膨胀的ETL任务列表，以及有限的资源，会在调度的基础逻辑上增加很多的策略，比如ETL任务的类别、按照优先级调度、运行开始时间要求、任务的资源限制等。","mnemonic":"错误✗ 复杂业务需增加调度策略如优先级、资源限制等"},{"id":918,"type":"judge","text":"在 Word 中调整段落间距的步骤是：选中需要设置格式的段落，然后在 “段落” 工具栏或者 “开始” 选项卡的 “段落” 组中，点击段前段后间距的下拉箭头，从中挑选合适的选项或者自定义数值。","options":[],"answer":"正确","explanation":"在word中调整段落间距，选中要设置格式的段落，在\"段落\"工具栏或\"开始\"选项卡的\"段落\"组中，点击段前段后间距的下拉箭头，选择合适的选项或自定义数值。","mnemonic":"正确√ Word段落间距在\"段落\"组调整，标准操作步骤"},{"id":919,"type":"judge","text":"采用计算机视觉、人脸识别、物联网等新技术打造的新型无人零售店，具备 “拿了就走” 等自助支付功能。","options":[],"answer":"正确","explanation":"在计算机视觉、人脸识别、物联网等新技术的推动下，诞生了以AmazonGo为代表的新型无人零售店，通过“拿了就走”等自助支付手段，为消费者提供新的用户体验，也为商家节约人力成本。","mnemonic":"正确√ 计算机视觉+人脸识别+物联网=无人零售\"拿了就走\""},{"id":920,"type":"judge","text":"利用数据增强技术，从已有的训练集中衍生出更多数据样本，以此增加训练集样本数量，可以防止深度学习模型出现过拟合。","options":[],"answer":"正确","explanation":"通过数据增强技术，可以从现有的训练集衍生出更多的数据样本，增强训练数据集的多样性，从而帮助模型更好地泛化，减少过拟合的风险。数据增强包括图像的旋转、裁剪、平移、缩放、翻转等方法，能够在不增加过多计算成本的情况下生成更多样化的数据样本。单纯通过复制已有样本并不能有效防止过拟合，因为这并没有增加数据的多样性。因此，通过数据增强扩展训练集是防止过拟合的常用方法之一。","mnemonic":"正确√ 数据增强增加多样性防过拟合，非简单复制"},{"id":921,"type":"judge","text":"GOMS 作为一种人机交互界面表示的理论模型，将所有任务都视为面向操作目标的，但它能够解决的问题本质以及用户间的个体差异存在局限。","options":[],"answer":"错误","explanation":"GOMS是一种人机交互界面表示的理论模型，它把所有的任务都看作是面向操作目标的，但忽略了一些任务所要解决的问题本质以及用户间的个体差异。","mnemonic":"错误✗ GOMS\"忽略\"问题本质和个体差异，非\"存在局限\"能解决"},{"id":922,"type":"judge","text":"凭借 5G 网络高速率、大连接的优势，能够实现多车路之间的互联互通，从而构建起可随时通信、实时监控、即时决策的智慧交通网络。","options":[],"answer":"错误","explanation":"5G作为新一代通信技术，对智慧交通的发展起到强大的推动作用。5G网络依托高速率、大连接的特性，连接车、路、人、云等对象，形成一张可随时通信、实时监控、即时决策的智慧交通网络。","mnemonic":"错误✗ 5G连接的是\"车路人云\"四要素，非仅\"多车路\""},{"id":923,"type":"judge","text":"业务流程重组（BPR）属于渐进式改进方法，其主要做法是对现有流程进行小范围调整，以此提升企业性能。","options":[],"answer":"错误","explanation":"业务流程重组（BPR）是对企业进行根本的再思考和彻底的再设计，强调革命性的变革，而不是渐进式的改进。","mnemonic":"错误✗ BPR是根本再思考、彻底再设计，革命性非渐进式"},{"id":924,"type":"judge","text":"对比模型在训练集和测试集上的预测准确率，能够判断是否出现过拟合现象。","options":[],"answer":"正确","explanation":"训练集用于训练模型，测试集用于评估模型的泛化能力。如果模型在训练集上的准确率明显高于测试集的准确率，通常表明模型发生了过拟合。通过对比训练集和测试集的准确率，可以有效判断模型是否过拟合。","mnemonic":"正确√ 训练集准确率远高于测试集=过拟合，对比可判断"},{"id":925,"type":"judge","text":"所谓算法的空间复杂度，指的是算法在执行过程中所占用的辅助存储空间的大小。","options":[],"answer":"正确","explanation":"算法空间复杂度指算法在执行过程中所占辅助存储空间的大小。","mnemonic":"正确√ 空间复杂度=执行时辅助存储空间大小，标准定义"},{"id":926,"type":"judge","text":"按照职业道德的规范，从业者需持续提高自身的业务能力与专业修养，为所在机构提供优质服务，这不仅有利于塑造个人及机构的良好形象，还能为个人的职业成长与事业成功打下坚实根基。","options":[],"answer":"正确","explanation":"根据职业道德要求，从业人员可以不断提升自己的工作水平和专业素养，为组织提供高质量的服务。这有助于树立良好的个人和组织形象，同时也为个人的职业发展和成功奠定基础。","mnemonic":"正确√ 职业道德要求提升素养，树立形象奠定发展基础"},{"id":927,"type":"judge","text":"构建神经网络模型时，其算法可以灵活地将各种基础数学运算与非线性激活函数组合起来。","options":[],"answer":"正确","explanation":"神经网络算法通过多层结构将输入数据矩阵传递并逐层处理。每一层通常包括一些基本的数学操作（如加法、乘法等）和非线性激活函数（如ReLU、Sigmoid、Tanh等）。这些操作的灵活组合使得神经网络能够学习到复杂的非线性关系。","mnemonic":"正确√ 神经网络灵活组合数学运算+非线性激活函数"},{"id":928,"type":"judge","text":"在人机交互的多通道交互研究里，用户能够运用语音、手势、眼神、表情等自然的交互方式与计算机系统进行信息沟通。","options":[],"answer":"正确","explanation":"在多通道交互中，用户可以使用语音、手势、眼神、表情等自然的交互方式与计算机系统进行交互。目前，最常使用的多通道交互技术包括手写识别、笔式交互、语音识别、语音合成、数字墨水、视线跟踪技术、触觉通道的力反馈装置、生物特征识别技术和人脸表情识别技术等方面。","mnemonic":"正确√ 多通道交互：语音、手势、眼神、表情等自然方式"},{"id":929,"type":"judge","text":"操作系统中的 “文件系统”，指的是操作系统里与文件管理相关的那部分软件、被管理的文件，以及管理文件时所需的数据结构（如目录、索引表等）的总和。","options":[],"answer":"正确","explanation":"操作系统的“文件系统”，是指操作系统中与文件管理有关的那部分软件、被管理的文件，以及管理文件所需要的数据结构(如目录、索引表等)的总体。","mnemonic":"正确√ 文件系统=管理软件+文件+数据结构的总体"},{"id":930,"type":"judge","text":"中文分词模型的主要功能是将连贯的汉字序列拆分成单个的汉字。","options":[],"answer":"错误","explanation":"中文分话模型包括基于规则匹配的分词模型和基于统计学的分词模型，将原来的中文文字序列中切分出词语。","mnemonic":"错误✗ 中文分词是切出\"词语\"，不是拆成\"单个汉字\""},{"id":931,"type":"judge","text":"在运用交叉验证时，通常而言，测试集中的数据与训练集中的数据是完全相互独立的。","options":[],"answer":"正确","explanation":"交叉验证的一个重要特点是将数据集划分为多个子集，其中每个子集在不同的轮次中充当测试集，而其他子集作为训练集。虽然每次划分时，测试集和训练集中的数据会有所重叠，但每个数据点在不同的轮次中都会作为测试集和训练集出现。这种方式确保了模型能够充分利用所有数据，并进行多次验证。然而，在每次验证过程中，测试集和训练集的数据来源不同，即测试集的数据在该轮次的训练中没有参与过，因此它们可以被认为是独立的。","mnemonic":"正确√ 交叉验证中每轮测试集数据未参与该轮训练，独立"},{"id":932,"type":"judge","text":"均值滤波能用于去除脉冲噪声。","options":[],"answer":"错误","explanation":"脉冲噪声是一种常见的噪声类型，其特点是像素值突然跳变到极值。对于脉冲噪声，中值滤波具有明显的优势。","mnemonic":"错误✗ 脉冲噪声用中值滤波，均值滤波对此效果差"},{"id":933,"type":"judge","text":"在智慧农业的发展进程中，随着应用场景不断增加，会产生大量数据需要存储和处理，这就需要引入云计算技术架构来搭建智慧农业系统。","options":[],"answer":"正确","explanation":"随着农业信息化的深入，智慧农业应用逐渐增多，会产生海量的数据需要保存和处理，而且初期的传统系统架构可能不能满足日益增加的用户和功能的需求。因此，在智慧农业的发展阶段，需要引入云计算技术架构来构建智慧农业系统。","mnemonic":"正确√ 智慧农业海量数据需云计算架构支撑"},{"id":934,"type":"judge","text":"趋势分析法的核心目标是通过识别历史数据的规律，预测企业未来的财务状况或市场走向。","options":[],"answer":"正确","explanation":"趋势分析法的作用是利用历史数据发现指标波动的规律，从而找出对应原因；同时也可以通过历史数据的趋势去预测未来。","mnemonic":"正确√ 趋势分析法：识别历史规律，预测未来走向"},{"id":935,"type":"judge","text":"算法分析指标能够帮助我们理解算法，并为其优化提供指导。","options":[],"answer":"正确","explanation":"复杂度分析揭示了算法的理论效率趋势，实际优化需综合考虑常数因子、硬件缓存等因素，但其仍是优化方向的核心依据。","mnemonic":"正确√ 算法分析指标助理解算法，指导优化方向"},{"id":936,"type":"judge","text":"对比分析作为一种数据分析方法，其用意是找出不同数据集或数据点之间的相同之处。","options":[],"answer":"错误","explanation":"对比分析是数据分析中常用的分析方法之一，是将两个或两个以上具有可比性的数据进行比较，分析其中差异，以揭示事物发展规律。","mnemonic":"错误✗ 对比分析找\"差异\"非\"相同之处\"，揭示规律"},{"id":937,"type":"judge","text":"在 Word 中插入目录时，先把光标移到想要插入目录的位置，再在菜单栏的 “工具栏” 选项卡中选择合适的样式，Word 就会生成包含章节标题和页码的目录。","options":[],"answer":"错误","explanation":"在word中插入目录，先将光标放在希望插入目录的位置，在菜单栏中选择“引用”选项卡，点击“目录”按钮，在下拉菜单中选择适当的样式，Word将生成一个包含章节标题和页码的目录。","mnemonic":"错误✗ Word插目录在\"引用\"选项卡，非\"工具栏\""},{"id":938,"type":"judge","text":"图像处理是运用计算机算法对图像进行分析和操作的处理技术。","options":[],"answer":"正确","explanation":"图像处理可以简单地定义为利用计算机算法（通过代码）对图像进行分析、操作的处理技术。","mnemonic":"正确√ 图像处理=计算机算法对图像分析和操作"},{"id":939,"type":"judge","text":"文本向量化模型可应用于自然语言处理相关任务。","options":[],"answer":"正确","explanation":"文本向量化模型可以用于自然语言处理任务，如情感分析、文本分类和主题建模等。","mnemonic":"正确√ 文本向量化可用于NLP任务如情感分析、文本分类"},{"id":940,"type":"judge","text":"从业人员若要遵守 “追求卓越” 的基本要求，就应当致力于不断提升自身的专业素养。","options":[],"answer":"正确","explanation":"遵守\"追求卓越\"的基本要求，从业人员应该追求专业素养的不断提升。积极参与相关领域的学习和培训，关注行业动态和最新发展，以保持自己的竞争优势和专业能力。","mnemonic":"正确√ 追求卓越=不断提升专业素养，保持竞争力"},{"id":941,"type":"judge","text":"仅依据测试误差，就能判断算法是否存在欠拟合。","options":[],"answer":"错误","explanation":"测试误差只能反映模型在新数据上的表现，并不能单独判断算法是否欠拟合。欠拟合通常表现为训练误差和测试误差都较高，这意味着模型无法有效学习训练数据中的规律。单独依赖测试误差无法判断欠拟合，因为它没有考虑模型在训练集上的表现。因此，判断是否欠拟合时需要同时监控训练误差和测试误差。","mnemonic":"错误✗ 仅测试误差不够，需同时看训练误差才能判断欠拟合"},{"id":942,"type":"judge","text":"本・施耐德曼的界面设计八大黄金法则，是人机交互设计领域极具价值的指导规范。","options":[],"answer":"正确","explanation":"施耐德曼的八项黄金法则是人机交互设计领域的重要指导原则，包括保持一致性、提供快捷方式、提供有效的信息反馈、会话和流程设计都有一个明确的结束点、提供恰当的错误处理机制、允许撤销、满足用户的控制需求、减少短期记忆负担。","mnemonic":"正确√ 施耐德曼八大黄金法则，人机交互设计经典指南"},{"id":943,"type":"judge","text":"自动语言识别领域中，最常用的两种语音处理方法是梅尔滤波器组和布尔频率系数。","options":[],"answer":"错误","explanation":"自动语言识别领域中最常用的两种语音处理方法：梅尔滤波器组和梅尔频率倒谱系数。","mnemonic":"错误✗ \"布尔频率系数\"是错的，应为\"梅尔频率倒谱系数\""},{"id":944,"type":"judge","text":"当多名数据标注员共同对同一份文本进行标注时，指导中级工作人员解决这类数据标注问题，可采用交叉标注的方式。","options":[],"answer":"正确","explanation":"标注数据不一致是文本标注最主要的问题，严重影响文本质量,当有多个数据标注员对同一个文本进行标注时，可以采取交叉标注的方式。","mnemonic":"正确√ 多人标注同一文本不一致时，用交叉标注解决"},{"id":945,"type":"judge","text":"可用性是指产品是否能够引起用户的关注，并且让用户产生使用它的念头。","options":[],"answer":"错误","explanation":"吸引用户的注意力和让用户愿意使用产品是“吸引力”这个方面的描述，而可用性更广泛地包括了用户在使用产品时的效力、效率、满意度等。吸引力只是其中的一部分，并不等于可用性本身。","mnemonic":"错误✗ 吸引注意力是\"吸引力\"，可用性包含效力效率满意度"},{"id":946,"type":"judge","text":"jieba 分词的文本分词与清洗环节，需要对原始文本实施分词和去除停用词的操作。","options":[],"answer":"正确","explanation":"jieba分词的文本分词与清洗步骤需对原始文本进行分词，并去除停用词。","mnemonic":"正确√ jieba分词清洗=分词+去停用词，标准步骤"},{"id":947,"type":"judge","text":"无监督图像去噪方法只利用噪声图像来开展训练。","options":[],"answer":"错误","explanation":"无监督去噪方法对训练数据的限制较少，仅使用噪声图像进行训练，代表性方法有Noise2Noise列。Noise2Noise(N2N)方法使用成对的噪声图像进行训练，要求噪声残差的期望为零，在L2损失的约束下生成趋于干净的图像信号。","mnemonic":"错误✗ 无监督去噪说法不全对，N2N用成对噪声图像训练"},{"id":948,"type":"judge","text":"人机交互的原型设计是依据需求文档，设计出产品各阶段所需的原型。","options":[],"answer":"正确","explanation":"原型设计是根据需求文档设计各阶段所需的产品原型，探索满足需求的各种解决方案(包括任务流和页面交互)，并组织评审和讨论会对原型进行评估(包括技术可行性咨询)，最后输出一个确认版的高保真原型及交互说明文档。","mnemonic":"正确√ 原型设计依据需求文档，设计各阶段产品原型"},{"id":949,"type":"judge","text":"对于接受他人委托开发的软件，其著作权的归属由委托人和受托人签订书面合同来约定；若没有书面合同或者合同中未作出明确约定，该软件的著作权由受托人享有。","options":[],"answer":"正确","explanation":"《计算机软件保护条例》第十一条规定，接受他人委托开发的软件，其著作权的归属由委托人与受托人签订书面合同约定；无书面合同或者合同未作明确约定的，其著作权由受托人享有。","mnemonic":"正确√ 委托开发软件著作权看合同，无合同归受托人"},{"id":950,"type":"judge","text":"ETL 数据整合工具是一种硬件，用于把数据从源系统中提取出来，经过转换后加载到目标系统。","options":[],"answer":"错误","explanation":"ETL数据整合工具是用于将数据从源系统提取、转换和加载到目标系统中的软件。","mnemonic":"错误✗ ETL是软件工具不是硬件，提取转换加载三步"},{"id":951,"type":"judge","text":"语音识别（Speech Recognition）指的是机器通过识别和理解，把人类的语音信号转换成对应的文本或指令的技术。","options":[],"answer":"正确","explanation":"语音识别(Speech Recognition)是机器通过识别和理解过程，将人类的语音信号转变为相应的文本或命令的技术。","mnemonic":"正确√ 语音识别=语音信号转文本或指令，标准定义"},{"id":952,"type":"judge","text":"按照所处理的数据类型及处理方式，计算机可分为数字电子计算机、模拟电子计算机、数字模拟混合式计算机三类。","options":[],"answer":"正确","explanation":"从计算机中信息的表示形式和处理方式(原理)的角度来进行划分，计算机可分为三大类:数字电子计算机、模拟电子计算机、数字模拟混合式计算机。","mnemonic":"正确√ 按数据类型和处理方式分三类：数字、模拟、混合"},{"id":953,"type":"judge","text":"生疏型用户在使用产品时，往往由于不熟悉操作而容易产生挫败感。","options":[],"answer":"正确","explanation":"生疏型用户由于他们对功能和界面的不熟悉，容易感到沮丧和迷茫，因此容易受到挫折。他们对产品并不熟悉，常常需要反复试探，操作上可能会遇到困难或挫折。","mnemonic":"正确√ 生疏型用户不熟操作易受挫，需要更多引导"},{"id":954,"type":"judge","text":"交叉验证法最后要计算模型在测试集上性能的平均值。","options":[],"answer":"正确","explanation":"交叉验证法是一种模型评估方法，通常将数据集划分为K个子集。在每次迭代中，选择一个子集作为测试集，其他子集作为训练集进行模型训练和评估。最终，交叉验证法通过对所有K次测试集结果的平均来评估模型的总体性能，从而减少模型评估的方差。","mnemonic":"正确√ 交叉验证最后取所有测试集性能的平均值"},{"id":955,"type":"judge","text":"漏斗分析的核心目的是跟踪用户在不同行为阶段的转化率情况。","options":[],"answer":"正确","explanation":"从业务流程起点开始到最后目标完成的每个环节都会有用户流失，因此需要一种分析方法来衡量业务流程每一步的转化效率，漏斗分析方法就是这样的分析方法。","mnemonic":"正确√ 漏斗分析核心=跟踪各阶段转化率，层层筛选"},{"id":956,"type":"judge","text":"业务流程重组（BPR）的目标是借助渐进式改进来完善现有的业务流程。","options":[],"answer":"错误","explanation":"业务流程重组（Business Process Reengineering，简称BPR）的目标并不是通过渐进式的改进来优化现有业务流程。相反，BPR强调的是对现有业务流程进行根本性的再思考和彻底的再设计。它涉及对企业的业务流程进行重新审视，识别并消除那些不再增加价值的步骤，然后重新构建更加高效、灵活和以客户为中心的新流程。","mnemonic":"错误✗ BPR是根本再设计非渐进改进，与923题同理"},{"id":957,"type":"judge","text":"象限分析法指的是借助两个或多个维度作为坐标，进而划分出不同的象限。","options":[],"answer":"正确","explanation":"象限分析法是指以两个或多个维度为坐标并划分出不同象限，不同象限表示不同的价值导向。象限分析法是典型的策略驱动思维，常见于市场分析、产品分析、客户管理等。","mnemonic":"正确√ 象限分析法：两个或多个维度为坐标划分象限"},{"id":958,"type":"judge","text":"职业道德是社会道德体系的重要组成部分，它既具备社会道德的一般作用，又有着自身的特殊作用。","options":[],"answer":"正确","explanation":"职业道德是社会道德体系的重要组成部分，它一方面具有社会道德的一般作用，另一方面它又具有自身的特殊作用。","mnemonic":"正确√ 职业道德兼具社会道德一般作用和自身特殊作用"},{"id":959,"type":"judge","text":"人机交互指的是人们借助输入输出设备与计算机沟通以达成某一任务的方式，其核心在于探索如何将计算机技术与人相联结，让计算机技术尽可能贴合人性。","options":[],"answer":"正确","explanation":"人机交互是指人们通过输入输出设备与计算机进行通信，以完成特定任务的过程。人机交互研究的核心是如何将计算机技术与人类用户的需求和能力相结合，以实现计算机技术的最优化人性化设计。","mnemonic":"正确√ 人机交互=输入输出设备沟通，核心是技术贴合人性"},{"id":960,"type":"judge","text":"LOTOS 包含两个部分，第一部分基于进程代数 CCS，对进程的行为及相互作用进行描述；第二部分基于抽象数据类型语言 ACT-ONE，对数据结构和值表达式进行描述。","options":[],"answer":"正确","explanation":"LOTOS包括两个部分，第一部分基于进程代数CCS，描述进程的行为和相互作用，第二部分基于抽象数据类型语言ACT-ONE，描述数据结构和值表达式。","mnemonic":"正确√ LOTOS两部分：CCS描述行为+ACT-ONE描述数据"},{"id":961,"type":"judge","text":"当前，新型人机交互设备主要以实现自然人机交互为宗旨，其中体感交互设备是重要的代表之一。","options":[],"answer":"正确","explanation":"目前，新型人机交互设备主要以自然人机交互为目标，包括体感交互设备、增强现实（AR）和虚拟现实（VR）设备、智能机器人等。","mnemonic":"正确√ 新型人机交互设备以自然交互为目标，体感是代表"},{"id":962,"type":"judge","text":"HBase、MySQL、Redis 等都属于数据存储工具。","options":[],"answer":"正确","explanation":"HBase、MySQL和Redis都是常见的数据存储工具。","mnemonic":"正确√ HBase、MySQL、Redis都是常见数据存储工具"},{"id":963,"type":"judge","text":"阈值分割的基本原理是依据比较结果把像素划分到不同类别中。","options":[],"answer":"正确","explanation":"阈值分割的基本原理是通过设定一个或多个阈值，将图像中的像素分为两个或多个类别，将像素的灰度值与阈值进行比较，根据比较结果将像素分配到不同的类别。","mnemonic":"正确√ 阈值分割：像素灰度值与阈值比较，分配类别"},{"id":964,"type":"judge","text":"业务流程重组（BPR）能够不依赖信息技术（IT）存在，但 IT 在 BPR 的实施中起到了重要的支持作用。","options":[],"answer":"正确","explanation":"业务流程重组（BPR）确实可以独立于信息技术（IT）存在，但IT在BPR的实施中起到了重要的支持作用。BPR是一种管理思想，而IT是一种技术，两者相辅相成。因此，这一说法是正确的。","mnemonic":"正确√ BPR可独立于IT存在，但IT起重要支持作用"},{"id":965,"type":"judge","text":"数据标注流程包括数据采集、数据清洗、数据标注、数据质检这几个步骤。","options":[],"answer":"正确","explanation":"数据标注流程包括数据采集、数据清洗、数据标注、数据质检。","mnemonic":"正确√ 数据标注流程：采集→清洗→标注→质检，四步"},{"id":966,"type":"judge","text":"业务数据主要流程的开端是数据分析与建模，它的功能是直接为数据获取工作提供指引。","options":[],"answer":"错误","explanation":"业务数据的主要流程为需求分析、数据获取、数据预处理、分析与建模、模型评价与优化和部署。","mnemonic":"错误✗ 业务数据流程起点是需求分析，非数据分析与建模"},{"id":967,"type":"judge","text":"严密思考、精确表达、谨慎处理、追求真相、持续学习都属于严谨求是的基本要求。","options":[],"answer":"正确","explanation":"严谨求是的基本要求包括严密思考、精确表达、谨慎处理、追求真相、持续学习。","mnemonic":"正确√ 严谨求是五要求：严密思考、精确表达、谨慎处理、追求真相、持续学习"},{"id":968,"type":"judge","text":"图像数据处理是利用图像去噪、图形美化、图像数据减弱等手段，根据需求对图像数据进行处理的技术。","options":[],"answer":"错误","explanation":"图像数据处理是利用图像数据去噪、图形分割、图像数据增强等手段根据需求对图像数据进行处理的技术","mnemonic":"错误✗ \"数据减弱\"应为\"数据增强\"，\"图形美化\"应为\"图形分割\""},{"id":969,"type":"judge","text":"某旅游公司打算分析游客的消费状况，仅依据旅游消费金额这一维度进行分类，为消费金额高的游客提供豪华游服务，这种做法被认为是对象限分析法的合理运用。","options":[],"answer":"错误","explanation":"象限分析法需要两个或多个维度来划分象限，而此处仅使用一个维度，不符合象限分析法的运用方式。","mnemonic":"错误✗ 象限分析需至少两个维度，仅一个维度不符合"},{"id":970,"type":"judge","text":"按照象限分析的框架，公用事业的各项制度都在特定象限内运行，某一象限的特定制度一旦跨越到其他象限，就会出现制度性错位。","options":[],"answer":"正确","explanation":"根据象限分析框架，公用事业的各项制度在特定的象限内运作，某一象限的特定制度不能跨越进入其他象限，否则会形成制度性错位。","mnemonic":"正确√ 象限内制度不能跨越，否则制度性错位"},{"id":971,"type":"judge","text":"漏斗分析能够把用户在某电商平台的购买流程当作一个整体，对其中各关键步骤的转化率及随时间的变动情况展开分析。","options":[],"answer":"正确","explanation":"比如用户在某电商平台的购买流程包含浏览商品、点击商品详情、发起拼单、立即支付、支付完成等步骤，漏斗分析可以将该流程视为一个整体，分析其中各重要步骤的转化率和随时间的变化情况。","mnemonic":"正确√ 漏斗分析把购买流程当整体，分析各步转化率"},{"id":972,"type":"judge","text":"依托 5G 技术的智慧医疗，是以医院现有的人力资源和医疗设备为根基，凭借高速率、低时延、广连接的 5G 网络，为患者提供实时化、远程化、高移动性及数字化的医疗服务，有效提升医疗效率与病情诊断的精准度，推动医疗资源向基层延伸，解决我国医疗资源分布不均衡、居民看病难、看病贵、医疗效率偏低、服务质量不高等问题。","options":[],"answer":"正确","explanation":"以5G为依托的智慧医疗，指的是以医院现有的人力资源和医疗设备为基础，借助高速率、低时延、广连接的5G网络为患者提供实时、远程、高移动性、数字化的医疗服务，切实提高医疗效率与病情诊断的准确率，推动医疗资源下沉，解决我国医疗资源分布不均，居民看病难、看病贵、医疗效率低、质量差等问题。","mnemonic":"正确√ 5G智慧医疗：高速低延广连接，解决资源不均"},{"id":973,"type":"judge","text":"自然交互技术只包含手势识别和面部表情识别这两项内容。","options":[],"answer":"错误","explanation":"自然交互技术包括手势识别、面部表情识别、眼动跟踪等。","mnemonic":"错误✗ 自然交互不只手势和表情，还有眼动跟踪等"},{"id":974,"type":"judge","text":"NoSQL 数据库完全不支持 ACID（原子性、一致性、隔离性、持久性）事务。","options":[],"answer":"错误","explanation":"NoSQL数据库不一定支持ACID（原子性、一致性、隔离性、持久性）事务，而不是完全不支持。","mnemonic":"错误✗ NoSQL非\"完全不支持\"ACID，部分NoSQL可支持"},{"id":975,"type":"judge","text":"UAN 模型会运用预先定义的符号标识符来对用户的行为加以描述。","options":[],"answer":"正确","explanation":"UAN使用了预定义的符号（标识符）来表示用户的行为，比如常见的 move_mouse(x, y)、highlight(icon) 等动作符号","mnemonic":"正确√ UAN用预定义符号标识符描述用户行为"},{"id":976,"type":"judge","text":"运用支持向量机算法时，距离超平面越近的点，越容易被正确分类。","options":[],"answer":"错误","explanation":"使用支持向量机算法时，从几何直观上来说，越接近超平面的点越难分隔。支持向量机的目标是找到一个最佳的超平面，将不同类别的数据分开。距离超平面较近的点，通常是分类的边界点，即支持向量，正是这些点最难分类，因为它们处于类别的边缘，稍微变化就可能导致分类错误。相反，距离超平面较远的点，分类结果比较确定，容易分辨其类别。","mnemonic":"错误✗ 离超平面越近越难分类，近处是边界支持向量"},{"id":977,"type":"judge","text":"操作系统是对软件的抽象，用户借助操作系统来操控计算机。","options":[],"answer":"错误","explanation":"操作系统是硬件的抽象，用户通过操作系统来控制计算机硬件和计算机资源的分配。","mnemonic":"错误✗ 操作系统是\"硬件\"的抽象，非\"软件\"的抽象"},{"id":978,"type":"judge","text":"以用户为中心的设计，只需看重用户的感受和体验，不必在意效率问题。","options":[],"answer":"错误","explanation":"用户为中心的设计要求在设计过程中综合考虑多个方面，包括用户的感受、体验、效率以及产品的有效性等。设计并不是仅仅关注用户的主观感受，而是要确保用户能够在特定的使用场景中高效、顺畅地完成任务。因此，效率是用户体验的一个重要维度，不能被忽视","mnemonic":"错误✗ 以用户为中心不能忽视效率，效率也是体验维度"},{"id":979,"type":"judge","text":"数据标注任务的高重复性可能会让标注人员感到疲劳和厌烦，进而对标注质量与效率产生影响。","options":[],"answer":"正确","explanation":"现阶段的数据标注工作主要还是依靠人来完成的，但是当标注人员面对百万级别的标注数据量，或是复杂的标注任务时，容易产生极大的心理压力，而造成标注质量不合格。另外数据标注任务本身重复性高、标注时间紧张以及缺少严格的质量审核流程，会导致标注不完备、不及时造成合格率低的问题。","mnemonic":"正确√ 标注高重复性致疲劳厌烦，影响质量与效率"},{"id":980,"type":"judge","text":"基于词频统计的分词方式无需依赖切分词典。","options":[],"answer":"正确","explanation":"基于词频统计的分词方法只需要对语料中的字组频度进行统计，不需要切分词典，因而又叫作无词典分词法或统计分词方法。","mnemonic":"正确√ 词频统计分词无需词典，又叫无词典分词法"},{"id":981,"type":"judge","text":"像 SSIS、ODI、Kettle、Informatica 等，都是比较常见的数据整合工具。","options":[],"answer":"正确","explanation":"常见的数据整合工具有：SSIS、ODI、Kettle、Informatica等。","mnemonic":"正确√ SSIS、ODI、Kettle、Informatica均为常见数据整合工具"},{"id":982,"type":"judge","text":"随机森林算法是一种以决策树为基础的集成学习算法。","options":[],"answer":"正确","explanation":"随机森林算法是一种集成学习方法，它基于多棵决策树的集成来进行分类或回归。在每棵决策树的训练过程中，采用行方向的随机采样和列方向的特征子集随机选择。最后，随机森林通过集成多个决策树的输出结果，来提高模型的准确性和泛化能力，常见的集成方法有投票法（分类）和平均法（回归）。","mnemonic":"正确√ 随机森林=多棵决策树集成的集成学习算法"},{"id":983,"type":"judge","text":"企业进行业务流程优化时，无需参考国内外成功企业的管理经验，只需根据自身情况就能完成优化。","options":[],"answer":"错误","explanation":"根据业务流程优化的思路，企业需要借鉴国内外成功的企业管理经验，结合自身的业务特点及发展战略，才能更好地进行优化。","mnemonic":"错误✗ 流程优化需借鉴国内外成功经验，不能闭门造车"},{"id":984,"type":"judge","text":"过滤式特征选择算法是一类凭借数据自身的数值特征来完成特征选择的算法。","options":[],"answer":"正确","explanation":"过滤式特征选择方法通过评估每个特征与目标变量之间的关系（如相关性、卡方检验等）来进行特征选择。它不依赖于任何机器学习模型，因此它是“数据驱动”的方法，通常用于初步筛选特征。","mnemonic":"正确√ 过滤式特征选择靠数据自身数值特征，不依赖模型"},{"id":985,"type":"judge","text":"在 PowerPoint 里，若想查看幻灯片切换的效果，可点击预览按钮；同时，借助 “计时” 组中的相应按钮，还能对切换的速度进行调整。","options":[],"answer":"正确","explanation":"PowerPoint中可以通过单击预览按钮来预览切换效果，还可以通过“计时”组对应按钮调整切换速度。","mnemonic":"正确√ PPT预览切换效果点预览按钮，计时组调速度"},{"id":986,"type":"judge","text":"有必要指导初级工挑选合适的标注工具，并按照指定的规范要求开展标注工作。","options":[],"answer":"正确","explanation":"在进行数据标注时，需要选择适合的标注工具，根据指定的规范要求进行标注。","mnemonic":"正确√ 指导初级工选工具、按规范标注，基本要求"},{"id":987,"type":"judge","text":"语音编码是通过降低语音信号中的信息冗余度来实现数据压缩的。","options":[],"answer":"正确","explanation":"语音编码就是通过减少语音信号中的信息冗余度来实现数据压缩，这种冗余度的最直接的证据，就是语音采样信号之间具有很强的相关性。","mnemonic":"正确√ 语音编码通过减少信息冗余度实现数据压缩"},{"id":988,"type":"judge","text":"运用计算机视觉、人脸识别、区块链、web3.0、物联网等新技术打造的新型无人零售店，实现了 “拿了就走” 等自助支付模式。","options":[],"answer":"错误","explanation":"在计算机视觉、人脸识别、物联网等新技术的推动下，诞生了以AmazonGo为代表的新型无人零售店，通过“拿了就走”等自助支付手段，为消费者提供新的用户体验，也为商家节约人力成本。","mnemonic":"错误✗ 无人零售店不涉及区块链和web3.0，多加了技术"},{"id":989,"type":"judge","text":"依据职业道德的规范，从业人员有义务尊重他人的权利与尊严，做到不歧视、不欺压他人。","options":[],"answer":"正确","explanation":"根据职业道德的要求，从业人员要尊重他人的权利和尊严，不歧视、不欺压他人。","mnemonic":"正确√ 职业道德要求尊重他人权利尊严，不歧视不欺压"},{"id":990,"type":"judge","text":"GOMS 是交互系统中用于分析用户操作复杂性的建模技术，主要在软件设计领域被用于构建用户行为模型。","options":[],"answer":"正确","explanation":"GOMS模型是人机交互领域最著名的预测模型，是用于分析交互系统中用户复杂性的建模技术，主要被软件设计者用于建立用户行为模型。","mnemonic":"正确√ GOMS分析用户操作复杂性，软件设计建模技术"},{"id":991,"type":"judge","text":"从业人员遵守 “勤勉好学” 的基本要求，能够保持积极主动的工作态度，不断提高自身的专业素养和能力。","options":[],"answer":"正确","explanation":"通过遵守\"勤勉好学\"的基本要求，从业人员可以保持积极主动的工作态度，不断提升自己的专业素养和能力。","mnemonic":"正确√ 勤勉好学保持积极态度，不断提升专业素养能力"},{"id":992,"type":"judge","text":"数据标注流程包含数据采集、数据清洗、数据标注、数据提示这几个环节。","options":[],"answer":"错误","explanation":"数据标注流程包括数据采集、数据清洗、数据标注、数据质检。","mnemonic":"错误✗ \"数据提示\"是错的，应为\"数据质检\"，与965对照"},{"id":993,"type":"judge","text":"从训练误差和测试误差中，能够判断算法是否出现欠拟合。","options":[],"answer":"正确","explanation":"欠拟合通常发生在模型过于简单，无法捕获数据中的复杂模式或结构时。在这种情况下，模型在训练集上的性能可能就不好（训练误差高），同时在测试集或未见过的数据上的性能也会很差（测试误差高）。如果模型在训练集和测试集上的表现都不好，通常意味着模型未能有效学习数据的规律，属于欠拟合的表现。","mnemonic":"正确√ 训练误差+测试误差都高=欠拟合，需两者共同判断"},{"id":994,"type":"judge","text":"逻辑树也被称作问题树、演绎树和分解树等，它不仅是界定问题与议题之间联系的桥梁，还能在解决问题的过程中帮助建立共识。","options":[],"answer":"正确","explanation":"逻辑树又被称为问题树、演绎树和分解树等，不但是我们界定问题与议题之间联系的纽带，而且还能在解决问题的过程中建立一种共识。","mnemonic":"正确√ 逻辑树=问题树=演绎树=分解树，建立共识纽带"},{"id":995,"type":"judge","text":"决策树算法的基本原理是依据某一指标来选定最合适的特征，将其作为当前节点的分割特征。","options":[],"answer":"正确","explanation":"决策树算法的原理是根据某个指标（例如信息增益、基尼系数等），选择最佳的特征作为当前节点的分割特征。","mnemonic":"正确√ 决策树按指标选最佳特征分割，如信息增益基尼系数"},{"id":996,"type":"judge","text":"在经营活动中，若要条理清晰地表达信息，就需要按照 SWOT 法来组织语言。","options":[],"answer":"错误","explanation":"在经营活动之中，要想有逻辑地表达信息，就需要按照PREP法(结论一理由一事例一结论)的顺序来组织语言，还要根据目的选择不同的表达信息的方法，","mnemonic":"错误✗ 有逻辑地表达用PREP法，非SWOT法"},{"id":997,"type":"judge","text":"随机森林算法的分类结果由各决策树投票决定。","options":[],"answer":"正确","explanation":"随机森林算法的分类结果是通过所有决策树的投票结果进行集成的。每棵决策树根据其训练集给出一个预测结果，最终通过投票决定最终的类别。","mnemonic":"正确√ 随机森林分类靠各决策树投票，少数服从多数"},{"id":998,"type":"judge","text":"若模型的训练时间过长，可能会在训练集上过度优化，进而导致过拟合。","options":[],"answer":"正确","explanation":"训练时间过长确实可能导致过拟合，因为模型在训练过程中会开始过度拟合训练数据中的噪声和不重要的细节，而不仅仅是学习数据的基本模式。","mnemonic":"正确√ 训练时间过长→过度优化训练集→过拟合"},{"id":999,"type":"judge","text":"在数据清洗工作里，处理缺失值是唯一需要攻克的难题。","options":[],"answer":"错误","explanation":"在众多数据中总是存在着许多脏数据，即不完整、不规范、不准确的数据，而数据清洗就是指彻底清除脏数据，包括检查数据一致性，处理无效值、异常值和缺失值等，从而提高数据质量，而不单是处理缺失值。","mnemonic":"错误✗ 数据清洗不只处理缺失值，还有异常值、无效值等"},{"id":1000,"type":"judge","text":"利用 jieba 分词库进行情感分析时，无需对原始文本数据做预处理。","options":[],"answer":"错误","explanation":"使用Jieba分词库进行情感分析首先需要对原始文本数据进行预处理，包括去除停用词、特殊符号等。","mnemonic":"错误✗ jieba情感分析前必须预处理，去停用词和特殊符号"}];

// ===== STATE =====
let currentMode = 'quiz';
let currentBatch = -1;
let currentIndex = 0;
let answered = {}; // { questionId: { selected: [...], correct: bool } }
let multiSelected = []; // for multi-select during answering

const STORAGE_KEY = 'ai3_quiz_records';
const PROGRESS_KEY = 'ai3_quiz_progress';

// ===== INIT =====
function init() {
  loadRecords();
  renderBatchGrid();
  updateStats();
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('fade-out');
    setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 300);
  }, 400);
}

function loadRecords() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) answered = JSON.parse(data);
  } catch(e) { answered = {}; }
}

function saveRecords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answered));
}

function loadProgress() {
  try {
    const data = localStorage.getItem(PROGRESS_KEY);
    if (data) return JSON.parse(data);
  } catch(e) {}
  return {};
}

function saveProgress(batch, index) {
  const p = loadProgress();
  p[batch] = index;
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

// ===== STATS =====
function updateStats() {
  const keys = Object.keys(answered);
  const total = keys.length;
  const correct = keys.filter(k => answered[k].correct).length;
  const wrong = total - correct;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statWrongBook').textContent = wrong;
  document.getElementById('statRate').textContent = rate + '%';
}

// ===== MODE =====
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeQuiz').classList.toggle('selected', mode === 'quiz');
  document.getElementById('modeStudy').classList.toggle('selected', mode === 'study');
  renderBatchGrid();
}

// ===== BATCH GRID =====
function getBatchQuestions(batch) {
  const start = batch * 100;
  return ALL_QUESTIONS.slice(start, start + 100);
}

function renderBatchGrid() {
  const grid = document.getElementById('batchGrid');
  let html = '';
  for (let b = 0; b < 10; b++) {
    const qs = getBatchQuestions(b);
    const startId = qs[0].id;
    const endId = qs[qs.length - 1].id;
    const done = qs.filter(q => answered[q.id]).length;
    const pct = Math.round(done / qs.length * 100);

    let typeLabel = '';
    if (b < 7) typeLabel = '单选';
    else if (b < 9) typeLabel = '多选';
    else typeLabel = '多选+判断';

    html += `<div class="batch-card" onclick="openBatch(${b})">
      <div class="batch-num">第 ${b + 1} 批</div>
      <div class="batch-range">${startId}-${endId}题 · ${typeLabel}</div>
      <div class="batch-progress"><div class="batch-progress-bar" style="width:${pct}%"></div></div>
      <div class="batch-stats">${currentMode === 'quiz' ? `已做 ${done}/${qs.length}` : '点击查看全部'}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ===== OPEN BATCH =====
function openBatch(batch) {
  currentBatch = batch;
  if (currentMode === 'quiz') {
    openQuizMode(batch);
  } else {
    openStudyMode(batch);
  }
}

// ===== QUIZ MODE =====
function openQuizMode(batch) {
  const qs = getBatchQuestions(batch);
  const progress = loadProgress();
  currentIndex = progress[batch] || 0;
  if (currentIndex >= qs.length) currentIndex = 0;
  multiSelected = [];

  showPage('quizPage');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const qs = getBatchQuestions(currentBatch);
  const q = qs[currentIndex];
  const record = answered[q.id];
  const isAnswered = !!record;

  // Header
  document.getElementById('quizProgressText').textContent = `第${currentBatch + 1}批 · ${currentIndex + 1}/${qs.length}`;
  document.getElementById('quizProgressBar').style.width = ((currentIndex + 1) / qs.length * 100) + '%';
  document.getElementById('quizCounter').textContent = `${q.id}/1000`;

  // Buttons
  document.getElementById('btnPrev').disabled = currentIndex === 0;
  document.getElementById('btnNext').textContent = currentIndex === qs.length - 1 ? '返回首页 \u25B6' : '下一题 \u25B6';

  let html = '';
  // Type badge
  const typeLabels = { single: '单选题', multi: '多选题', judge: '判断题' };
  html += `<div class="q-type-badge ${q.type}">${typeLabels[q.type]}${q.type === 'multi' ? '（可多选）' : ''}</div>`;
  // Question text
  html += `<div class="q-text">${q.id}. ${escapeHtml(q.text)}</div>`;

  if (q.type === 'judge') {
    html += '<div class="judge-options">';
    ['正确', '错误'].forEach(opt => {
      let cls = '';
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt)) cls += record.correct ? ' correct' : ' wrong';
        if (opt === q.answer && !record.correct) cls += ' correct';
      }
      html += `<div class="judge-option${cls}" onclick="answerJudge('${opt}', ${q.id})">${opt}</div>`;
    });
    html += '</div>';
  } else if (q.type === 'multi') {
    html += '<div class="q-options">';
    q.options.forEach(opt => {
      let cls = '';
      const correctArr = q.answer.split(',').map(s => s.trim());
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt.label)) {
          cls += correctArr.includes(opt.label) ? ' correct' : ' wrong';
        } else if (correctArr.includes(opt.label)) {
          cls += ' correct';
        }
      } else if (multiSelected.includes(opt.label)) {
        cls += ' selected';
      }
      html += `<div class="q-option${cls}" onclick="toggleMultiOption('${opt.label}', ${q.id})">
        <span class="opt-label">${opt.label}</span>
        <span>${escapeHtml(opt.text)}</span>
      </div>`;
    });
    html += '</div>';
    if (!isAnswered) {
      html += `<div class="multi-confirm-wrap" id="multiConfirmWrap" style="display:${multiSelected.length > 0 ? 'block' : 'none'}">
        <button class="multi-confirm-btn" onclick="confirmMulti(${q.id})">确认提交（已选${multiSelected.length}项）</button>
      </div>`;
    }
  } else {
    html += '<div class="q-options">';
    q.options.forEach(opt => {
      let cls = '';
      if (isAnswered) {
        cls += ' disabled';
        if (record.selected.includes(opt.label)) cls += record.correct ? ' correct' : ' wrong';
        if (opt.label === q.answer && !record.selected.includes(opt.label)) cls += ' correct';
      }
      html += `<div class="q-option${cls}" onclick="answerSingle('${opt.label}', ${q.id})">
        <span class="opt-label">${opt.label}</span>
        <span>${escapeHtml(opt.text)}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Show result if answered
  if (isAnswered) {
    const isCorrect = record.correct;
    html += `<div class="result-card">
      <div class="result-header ${isCorrect ? 'correct-header' : 'wrong-header'}">
        ${isCorrect ? '\u2705 回答正确' : '\u274C 回答错误'}
      </div>
      <div class="result-answer">\u2714 正确答案：${q.answer}</div>
      ${q.explanation ? `<div class="result-explanation"><strong>\ud83d\udcdd 解析：</strong>${escapeHtml(q.explanation)}</div>` : ''}
      ${q.mnemonic ? `<div class="result-mnemonic"><strong>\ud83d\udca1 巧记：</strong>${escapeHtml(q.mnemonic)}</div>` : ''}
    </div>`;
  }

  document.getElementById('quizBody').innerHTML = html;
  document.getElementById('quizBody').scrollTop = 0;
  window.scrollTo(0, 0);

  saveProgress(currentBatch, currentIndex);
}

function answerSingle(label, qid) {
  if (answered[qid]) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correct = label === q.answer.trim();
  answered[qid] = { selected: [label], correct };
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function answerJudge(val, qid) {
  if (answered[qid]) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correct = val === q.answer.trim();
  answered[qid] = { selected: [val], correct };
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function toggleMultiOption(label, qid) {
  if (answered[qid]) return;
  const idx = multiSelected.indexOf(label);
  if (idx >= 0) multiSelected.splice(idx, 1);
  else multiSelected.push(label);
  renderQuizQuestion();
}

function confirmMulti(qid) {
  if (answered[qid] || multiSelected.length === 0) return;
  const q = ALL_QUESTIONS.find(q => q.id === qid);
  const correctArr = q.answer.split(',').map(s => s.trim()).sort();
  const selectedArr = [...multiSelected].sort();
  const correct = JSON.stringify(selectedArr) === JSON.stringify(correctArr);
  answered[qid] = { selected: [...multiSelected], correct };
  multiSelected = [];
  saveRecords();
  updateStats();
  renderQuizQuestion();
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    multiSelected = [];
    renderQuizQuestion();
  }
}

function nextQuestion() {
  const qs = getBatchQuestions(currentBatch);
  if (currentIndex < qs.length - 1) {
    currentIndex++;
    multiSelected = [];
    renderQuizQuestion();
  } else {
    goHome();
  }
}

function jumpToQuestion() {
  const qs = getBatchQuestions(currentBatch);
  const input = prompt(`输入题号 (1-${qs.length})：`, currentIndex + 1);
  if (input === null) return;
  const n = parseInt(input);
  if (n >= 1 && n <= qs.length) {
    currentIndex = n - 1;
    multiSelected = [];
    renderQuizQuestion();
  } else {
    showToast('请输入有效题号');
  }
}

// ===== STUDY MODE =====
function openStudyMode(batch) {
  const qs = getBatchQuestions(batch);
  const startId = qs[0].id;
  const endId = qs[qs.length - 1].id;

  document.getElementById('studyTitle').textContent = `第${batch + 1}批 (${startId}-${endId}题)`;
  showPage('studyPage');

  let html = '';
  qs.forEach(q => {
    const typeLabels = { single: '单选', multi: '多选', judge: '判断' };
    html += '<div class="study-card">';
    html += `<div class="sc-header">
      <span class="sc-num">${q.id}</span>
      <span class="q-type-badge ${q.type}" style="margin:0">${typeLabels[q.type]}</span>
    </div>`;
    html += `<div style="padding:10px 14px;border-bottom:1px solid var(--gray-100)">
      <div class="sc-text">${escapeHtml(q.text)}</div>
    </div>`;

    if (q.options.length > 0) {
      html += '<div class="sc-options">';
      const correctArr = q.answer.split(',').map(s => s.trim());
      q.options.forEach(opt => {
        const isAns = correctArr.includes(opt.label);
        html += `<div class="sc-opt${isAns ? ' is-answer' : ''}">${isAns ? '\u2714 ' : ''}${opt.label}. ${escapeHtml(opt.text)}</div>`;
      });
      html += '</div>';
    }

    html += `<div class="sc-answer">\u2714 正确答案：${q.answer}</div>`;
    if (q.explanation) html += `<div class="sc-explain">\ud83d\udcdd ${escapeHtml(q.explanation)}</div>`;
    if (q.mnemonic) html += `<div class="sc-mnemonic">\ud83d\udca1 ${escapeHtml(q.mnemonic)}</div>`;
    html += '</div>';
  });

  document.getElementById('studyBody').innerHTML = html;
  window.scrollTo(0, 0);
}

// ===== WRONG BOOK =====
function openWrongBook() {
  const wrongIds = Object.keys(answered).filter(k => !answered[k].correct).map(Number).sort((a, b) => a - b);
  if (wrongIds.length === 0) {
    showToast('暂无错题');
    return;
  }

  document.getElementById('wrongBookTitle').textContent = `错题集（${wrongIds.length}题）`;
  showPage('wrongBookPage');

  let html = '';
  wrongIds.forEach(qid => {
    const q = ALL_QUESTIONS.find(q => q.id === qid);
    if (!q) return;
    const typeLabels = { single: '单选', multi: '多选', judge: '判断' };
    html += '<div class="study-card">';
    html += `<div class="sc-header">
      <span class="sc-num">${q.id}</span>
      <span class="q-type-badge ${q.type}" style="margin:0">${typeLabels[q.type]}</span>
    </div>`;
    html += `<div style="padding:10px 14px;border-bottom:1px solid var(--gray-100)">
      <div class="sc-text">${escapeHtml(q.text)}</div>
    </div>`;

    if (q.options.length > 0) {
      html += '<div class="sc-options">';
      const correctArr = q.answer.split(',').map(s => s.trim());
      q.options.forEach(opt => {
        const isAns = correctArr.includes(opt.label);
        html += `<div class="sc-opt${isAns ? ' is-answer' : ''}">${isAns ? '\u2714 ' : ''}${opt.label}. ${escapeHtml(opt.text)}</div>`;
      });
      html += '</div>';
    }

    html += `<div class="sc-answer">\u2714 正确答案：${q.answer}</div>`;
    if (q.explanation) html += `<div class="sc-explain">\ud83d\udcdd ${escapeHtml(q.explanation)}</div>`;
    if (q.mnemonic) html += `<div class="sc-mnemonic">\ud83d\udca1 ${escapeHtml(q.mnemonic)}</div>`;
    html += '</div>';
  });

  document.getElementById('wrongBookBody').innerHTML = html;
  window.scrollTo(0, 0);
}

// ===== NAVIGATION =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function goHome() {
  showPage('homePage');
  renderBatchGrid();
  updateStats();
  window.scrollTo(0, 0);
}

// ===== CLEAR RECORDS =====
function showClearModal() {
  document.getElementById('modal').classList.add('show');
  document.getElementById('modalConfirmBtn').onclick = clearAllRecords;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function clearAllRecords() {
  answered = {};
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(PROGRESS_KEY);
  closeModal();
  renderBatchGrid();
  updateStats();
  showToast('已清空所有记录');
}

// ===== UTILS =====
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== START =====
init();
</script>
