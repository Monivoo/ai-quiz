":"中文分词是将一段中文文本分割成词语的过程，下列算法中不适合用于中文分词的是（）。","options":[{"label":"A","text":"决策树"},{"label":"B","text":"隐马尔可夫模型"},{"label":"C","text":"最大熵模型"},{"label":"D","text":"N元语法模型"}],"answer":"A","explanation":"决策树是一种监督学习算法，主要用于分类和回归任务，而不是专门用于中文分词","mnemonic":"决策树不适合中文分词，分词用HMM/最大熵/N元语法"},{"id":658,"type":"single","text":"NoSQL 数据库的主要特点包括（）。","options":[{"label":"A","text":"严格的事务支持"},{"label":"B","text":"结构化数据存储"},{"label":"C","text":"高可扩展性"},{"label":"D","text":"强一致性"}],"answer":"C","explanation":"NoSQL数据库的主要特点有灵活的数据模型、可扩展性强、高可用性和高并发性。","mnemonic":"NoSQL主要特点是高可扩展性，灵活+可扩展+高可用"},{"id":659,"type":"single","text":"留出法、交叉验证法和自助法均为常用的模型评估方法，其中自助法的优势在于（）。","options":[{"label":"A","text":"可以用于小样本数据集"},{"label":"B","text":"可以提高模型的稳定性"},{"label":"C","text":"可以处理缺失值"},{"label":"D","text":"可以有效避免过拟合"}],"answer":"A","explanation":"自助法通过重复抽样充分利用小样本数据，提升模型评估可靠性。","mnemonic":"自助法优势在于可用于小样本数据集，重复抽样充分利用小数据"},{"id":660,"type":"single","text":"在逻辑回归算法里，用来把连续的输出转化为二元分类结果的函数是（）。","options":[{"label":"A","text":"指数函数"},{"label":"B","text":"对数几率函数"},{"label":"C","text":"平方函数"},{"label":"D","text":"线性函数"}],"answer":"B","explanation":"在逻辑回归算法中，通常使用sigmoid函数（也叫对数几率函数）将连续的输出转化为二元分类的结果","mnemonic":"对数几率函数(sigmoid)将连续输出变为二分类，逻辑回归核心函数"},{"id":661,"type":"single","text":"AARRR 模型最后两个 \"RR\" 代表的是（）。","options":[{"label":"A","text":"代表重复和口碑"},{"label":"B","text":"代表收入和传播"},{"label":"C","text":"代表口碑和留存"},{"label":"D","text":"代表收入和留存"}],"answer":"B","explanation":"AARRR模型中的最后两个\"RR\"代表的是\"Revenue\"（收入）和\"Refer\"（传播）","mnemonic":"AARRR最后两个RR=Revenue收入+Refer传播，\"赚钱传播\""},{"id":662,"type":"single","text":"在 Word 文档中，能为选中文本应用粗体格式的快捷键是（）。","options":[{"label":"A","text":"Ctrl+V"},{"label":"B","text":"Ctrl+C"},{"label":"C","text":"Ctrl+F2"},{"label":"D","text":"Ctrl+B"}],"answer":"D","explanation":"对选中文本应用粗体格式使用快捷键Ctrl+B","mnemonic":"Ctrl+B设置粗体，B=Bold粗体首字母"},{"id":663,"type":"single","text":"K - 近邻算法在做预测时，最需要重点考量的重要因素是（）。","options":[{"label":"A","text":"样本维度"},{"label":"B","text":"样本数量"},{"label":"C","text":"样本类别"},{"label":"D","text":"样本距离"}],"answer":"D","explanation":"K-近邻算法的预测依赖于最近的K个邻居，其中样本之间的距离是最关键的因素","mnemonic":"K近邻预测最关键因素是样本距离，\"近邻\"靠距离判断"},{"id":664,"type":"single","text":"按照《计算机软件保护条例》，受到保护的软件必须具备什么条件（）。","options":[{"label":"A","text":"由开发者独立开发，并已固定在某种有形物体上"},{"label":"B","text":"已发表并获得广泛使用"},{"label":"C","text":"由知名软件公司开发"},{"label":"D","text":"获得国家相关部门的认证"}],"answer":"A","explanation":"《计算机软件保护条例》第四条规定，受本条例保护的软件必须由开发者独立开发，并已固定在某种有形物体上","mnemonic":"软件保护条件：独立开发+固定在有形物体上，不需发表或认证"},{"id":665,"type":"single","text":"有关职业道德的如下说法，正确的是（）。","options":[{"label":"A","text":"职业道德只需要遵守当地法律法规即可"},{"label":"B","text":"职业道德是一定职业群体内共同遵守的规范"},{"label":"C","text":"职业道德仅仅是个人的品行修养问题"},{"label":"D","text":"只有医生和律师等特殊职业需要遵守职业道德"}],"answer":"B","explanation":"职业道德是职业群体的共同准则，它对从事该职业的人员的行为、态度、品质等方面提出了具体的要求","mnemonic":"职业道德是职业群体共同遵守的规范，非个人品行而是群体准则"},{"id":666,"type":"single","text":"下列哪项属于 ETL 数据整合工具的主要特性之一（）。","options":[{"label":"A","text":"数据安全和权限管理功能"},{"label":"B","text":"数据清洗和转换功能"},{"label":"C","text":"数据可视化和报表生成功能"},{"label":"D","text":"数据备份和恢复功能"}],"answer":"B","explanation":"ETL（抽取、转换、加载）数据整合工具的主要任务是从不同的数据源中抽取数据，进行清洗和转换，最后加载到目标数据仓库或目标系统中","mnemonic":"ETL工具主要特性是数据清洗和转换功能，ETL的T就是Transform转换"},{"id":667,"type":"single","text":"遵守职业道德具有（）方面的益处。","options":[{"label":"A","text":"减轻职业从业者的工作负担"},{"label":"B","text":"消除职业从业者的职业压力"},{"label":"C","text":"提高职业从业者的工作效率"},{"label":"D","text":"增强职业从业者的形象和信誉"}],"answer":"D","explanation":"遵守职业道德带来多重好处，其中最主要的是能够增强职业从业者的形象和信誉","mnemonic":"遵守职业道德增强形象和信誉，\"德\"立\"信\""},{"id":668,"type":"single","text":"趋势分析法主要分析的是（ ）。","options":[{"label":"A","text":"随机数据"},{"label":"B","text":"非连续数据"},{"label":"C","text":"多期连续数据"},{"label":"D","text":"单一时点数据"}],"answer":"C","explanation":"趋势分析需多期连续数据支持。","mnemonic":"趋势分析需要多期连续数据，\"趋势\"要看\"连续变化\""},{"id":669,"type":"single","text":"哪项的时间波形具有一定的周期性（）。","options":[{"label":"A","text":"悦音"},{"label":"B","text":"噪音"},{"label":"C","text":"清音"},{"label":"D","text":"浊音"}],"answer":"D","explanation":"浊音的时间波形呈现出一定的周期性，波形之间相似性较好","mnemonic":"浊音时间波形有周期性，\"浊\"音波形规律重复"},{"id":670,"type":"single","text":"那些追求卓越的人应当具备什么样的能力（）。","options":[{"label":"A","text":"学习能力"},{"label":"B","text":"创新能力"},{"label":"C","text":"合作能力"},{"label":"D","text":"以上选项均正确"}],"answer":"D","explanation":"学习能力、创新能力、合作能力是追求卓越所需具备的能力。","mnemonic":"追求卓越需学习+创新+合作三种能力，全选D"},{"id":671,"type":"single","text":"下列哪项是能够实现手写输入的交互设备？","options":[{"label":"A","text":"摄像头"},{"label":"B","text":"触摸屏"},{"label":"C","text":"鼠标"},{"label":"D","text":"扫描仪"}],"answer":"B","explanation":"触摸屏支持手写输入，其他设备如摄像头、鼠标和扫描仪不具备此功能。","mnemonic":"触摸屏支持手写输入，用手指或触控笔直接写"},{"id":672,"type":"single","text":"借助 RFM 模型进行客户分析时，会将客户划分为八个维度，每个维度都要设定一个阈值，下列哪一项不属于阈值的设定方式（）。","options":[{"label":"A","text":"随机抽样法"},{"label":"B","text":"加权求和法"},{"label":"C","text":"中位数法"},{"label":"D","text":"平均数法"}],"answer":"A","explanation":"RFM阈值设定可用平均数、中位数等，不用随机抽样。","mnemonic":"RFM阈值设定不用随机抽样法，用平均数/中位数/加权求和"},{"id":673,"type":"single","text":"可以完成对标注数据准确性和完整性的审核，并出具审核报告，这属于哪个步骤？（）","options":[{"label":"A","text":"机器学习模型训练"},{"label":"B","text":"数据处理方法优化"},{"label":"C","text":"数据归类和定义"},{"label":"D","text":"标注数据审核"}],"answer":"D","explanation":"能够完成对标注数据准确性和完整性审核，输出审核报告属于标注数据审核环节。","mnemonic":"标注数据审核=审核准确性完整性+出具报告"},{"id":674,"type":"single","text":"从网络上采集数据时，通常需要经历哪些步骤？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"采集环境测试"},{"label":"C","text":"网站的源代码分析"},{"label":"D","text":"确定数据采集的目标网站"}],"answer":"A","explanation":"网络数据采集的一般步骤包括确定数据采集的目标网站、网站的源代码分析、编写代码、采集环境测试、数据采集、数据存储","mnemonic":"网络数据采集步骤全包括：确定网站+源码分析+环境测试，全选A"},{"id":675,"type":"single","text":"图像分割可通过什么方式来实现（）。","options":[{"label":"A","text":"图像融合"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"边缘锯齿"},{"label":"D","text":"直方图的二值化方法"}],"answer":"D","explanation":"直方图二值化（如Otsu法）可用于图像分割。","mnemonic":"直方图二值化方法可实现图像分割，如Otsu阈值法"},{"id":676,"type":"single","text":"有关 RFM 模型的分析流程，下列描述正确的一项是（）。","options":[{"label":"A","text":"RFM模型的分析过程仅适用于高价值客户"},{"label":"B","text":"RFM模型的分析过程包括获取R、F、M三个指标，并通过设定阈值将客户分类"},{"label":"C","text":"RFM模型的分析过程仅适用于购买频率高的客户"},{"label":"D","text":"RFM模型的分析过程仅需关注最近一次消费时间和消费金额两个指标"}],"answer":"B","explanation":"根据RFM模型的分析过程，首先需要获取三个关键指标：最近一次消费时间（R）、消费频率（F）和消费金额（M）","mnemonic":"RFM分析获取R/F/M三指标+设阈值分类客户，三指标缺一不可"},{"id":677,"type":"single","text":"（）是宽带带通滤波器具有的特性。","options":[{"label":"A","text":"信号强"},{"label":"B","text":"传输性"},{"label":"C","text":"流通性"},{"label":"D","text":"平坦"}],"answer":"D","explanation":"宽带带通滤波器具有平坦特性，用它可以粗略地求取语音的频谱，其频率分辨率降低，相当于短时处理时窗宽窄的那种情况。","mnemonic":"宽带带通滤波器特性是平坦，\"宽带\"=频率响应\"平坦\""},{"id":678,"type":"single","text":"下列哪项属于农业现场的信息？","options":[{"label":"A","text":"用户信息"},{"label":"B","text":"人脸识别信息"},{"label":"C","text":"政务信息"},{"label":"D","text":"农业生产环境信息"}],"answer":"D","explanation":"农业生产环境信息属于农业现场信息","mnemonic":"农业现场信息=农业生产环境信息，对应\"农业现场\""},{"id":679,"type":"single","text":"数据库管理系统能够实现多用户并发访问功能，这表示（）。","options":[{"label":"A","text":"多个用户可以同时访问同一个数据库"},{"label":"B","text":"多个数据库可以同时访问同一个用户"},{"label":"C","text":"多个用户可以同时访问不同的数据库"},{"label":"D","text":"多个数据库可以同时访问不同的用户"}],"answer":"A","explanation":"数据库管理系统支持多用户同时访问同一数据库，确保数据操作无冲突。","mnemonic":"多用户并发访问=多人同时访问同一数据库，\"并发\"=同时同库"},{"id":680,"type":"single","text":"在时间管理四象限法则里，第一象限的特征是（ ）。","options":[{"label":"A","text":"不重要且不紧急"},{"label":"B","text":"紧急但不重要"},{"label":"C","text":"重要但不紧急"},{"label":"D","text":"重要且紧急"}],"answer":"D","explanation":"时间管理四象限法则中，第一象限是指重要并且紧急的事情","mnemonic":"时间管理第一象限=重要且紧急，\"第一\"要事=又重要又紧急"},{"id":681,"type":"single","text":"以下场景中，最适合使用图形数据库的是（）。","options":[{"label":"A","text":"实时缓存用户会话信息"},{"label":"B","text":"分析社交网络中的好友关系链"},{"label":"C","text":"存储电商平台的历史订单日志"},{"label":"D","text":"处理银行转账事务"}],"answer":"B","explanation":"图形数据库适用于复杂关系分析，如社交网络；键值数据库适合简单数据存储；文档数据库适用于半结构化数据如订单日志；关系数据库处理事务性操作如银行转账。","mnemonic":"图形数据库适合分析社交网络关系链，\"图\"=关系网络"},{"id":682,"type":"single","text":"根据国际标准，云计算的部署模型中不包含的是（）。","options":[{"label":"A","text":"混合云"},{"label":"B","text":"公共云"},{"label":"C","text":"计算服务"},{"label":"D","text":"私有云"}],"answer":"C","explanation":"国际标准（如NIST SP 800-145）定义的云计算部署模型包括：公有云（Public Cloud）、私有云（Private Cloud）、社区云（Community Cloud）和混合云（Hybrid Cloud）","mnemonic":"计算服务不是云部署模型，部署模型有公有/私有/混合/社区云"},{"id":683,"type":"single","text":"按照勤勉好学的基本要求，勤勉好学的人应当具备（）品质。","options":[{"label":"A","text":"不愿意接受他人的帮助，喜欢独立工作"},{"label":"B","text":"缺乏自我激励能力，常常懒散"},{"label":"C","text":"不考虑他人意见，只做自己的事情"},{"label":"D","text":"虚心接受他人的建议和批评"}],"answer":"D","explanation":"勤勉好学的人应该保持谦虚和开放的心态，虚心接受他人的建议和批评","mnemonic":"勤勉好学要虚心接受建议和批评，谦虚开放是核心品质"},{"id":684,"type":"single","text":"在 Excel 中，下列哪项公式能够把 A1 单元格里的文本转换为数值（）。","options":[{"label":"A","text":"=TEXT(A1,\"0.00\")"},{"label":"B","text":"=VALUE(A1)"},{"label":"C","text":"=INT(A1)"},{"label":"D","text":"=ROUND(A1,0)"}],"answer":"B","explanation":"Excel中的VALUE函数可用于将文本格式的数字转换为数值，适用于兼容性需求。","mnemonic":"Excel中VALUE函数将文本转数值，VALUE=值=数值"},{"id":685,"type":"single","text":"国家规定，劳动者每日的工作时长不超过（）小时，平均每周的工作时长不超过四十四小时。","options":[{"label":"A","text":"14"},{"label":"B","text":"12"},{"label":"C","text":"10"},{"label":"D","text":"8"}],"answer":"D","explanation":"根据《中华人民共和国劳动法》第三十六条规定，国家实行劳动者每日工作时间不超过八小时、平均每周工作时间不超过四十四小时的工时制度","mnemonic":"每日工作不超过8小时，\"朝九晚五\"八小时制"},{"id":686,"type":"single","text":"当运用逻辑回归对大规模数据集进行二元分类时，最适合用于优化模型参数的方法是（）。","options":[{"label":"A","text":"广义极大似然估计"},{"label":"B","text":"牛顿法"},{"label":"C","text":"最小二乘法"},{"label":"D","text":"随机梯度下降"}],"answer":"D","explanation":"随机梯度下降适合大规模数据二元分类的参数优化。","mnemonic":"大规模数据用随机梯度下降SGD优化参数，数据大用SGD效率高"},{"id":687,"type":"single","text":"librosa.display 与 librosa 之间的关系是（）。","options":[{"label":"A","text":"不同的两个模型"},{"label":"B","text":"相同的两个模型"},{"label":"C","text":"相同用法"},{"label":"D","text":"用法不同"}],"answer":"A","explanation":"librosa.display和librosa是两个独立模块，需分别导入使用。","mnemonic":"librosa.display和librosa是两个不同模块，需分别导入"},{"id":688,"type":"single","text":"属于职业道德主要功能的是（）。","options":[{"label":"A","text":"约束职业实践者行为"},{"label":"B","text":"提高职业从业者的社会地位"},{"label":"C","text":"减少职业从业者所面临的法律责任"},{"label":"D","text":"建立行业专业标准"}],"answer":"A","explanation":"职业道德的核心作用是指导和约束职业人员的职业行为，确保其遵循职业准则与伦理标准，从而保障公众利益并增强社会信任度。","mnemonic":"职业道德主要功能是约束从业者行为，\"道德\"=\"约束\""},{"id":689,"type":"single","text":"1. 在Python环境中，面对“字典”这一数据结构时，Sklearn提供了何种工具来进行特征提取（）。","options":[{"label":"A","text":"HashingVectorizer"},{"label":"B","text":"TfidfVectorizer"},{"label":"C","text":"DictVectorizer"},{"label":"D","text":"CountVectorizer"}],"answer":"C","explanation":"对于字典格式的数据，Sklearn的DictVectorizer可用于特征提取，支持稀疏矩阵输出。","mnemonic":"字典数据用DictVectorizer提取特征，Dict=字典名字对应"},{"id":690,"type":"single","text":"设计了双向语言模型预训练任务的是（）。","options":[{"label":"A","text":"ELMo方法"},{"label":"B","text":"Word2Vec模型"},{"label":"C","text":"BERT方法"},{"label":"D","text":"One-hot模型"}],"answer":"A","explanation":"ELMo设计了双向语言模型预训练任务。","mnemonic":"ELMo设计了双向语言模型预训练，注意不是BERT是ELMo"},{"id":691,"type":"single","text":"对智能系统基础操作、智能系统维护等知识的掌握，属于初级知识体系中的哪一部分？（）","options":[{"label":"A","text":"数据标注"},{"label":"B","text":"数据采集"},{"label":"C","text":"数学基础"},{"label":"D","text":"智能系统基础"}],"answer":"D","explanation":"掌握智能系统基础操作、智能系统维护等知识属于初级知识体系中的智能系统基础","mnemonic":"智能系统基础操作和维护属于初级知识体系的智能系统基础"},{"id":692,"type":"single","text":"“类别不平衡” 是数据标注时需关注的难点之一，它具体指的是什么？（）","options":[{"label":"A","text":"标注数据中存在标注错误的情况"},{"label":"B","text":"标注数据中同一类别中的样本标注结果不一致"},{"label":"C","text":"标注数据中同一类别中的样本数量差异较大"},{"label":"D","text":"标注数据中不同类别的数量分布不均匀"}],"answer":"D","explanation":"类别不平衡指数据中各类样本数量不均。","mnemonic":"类别不平衡=不同类别数量分布不均匀，非同类内部差异"},{"id":693,"type":"single","text":"下列哪项是一种将时间归正与距离测度计算相结合的非线性归正技术（）。","options":[{"label":"A","text":"GTW"},{"label":"B","text":"CTW"},{"label":"C","text":"ATW"},{"label":"D","text":"DTW"}],"answer":"D","explanation":"在语音识别中，简单地将输入模板与相应的参考模板直接做比较存在很大的缺点。因为语音信号具有相当大的随机性，即使是同一个人在不同时刻发的同一个语音，也不可能具有完全相同的时间长度，因此时间归正处理是必不可少的。动态时间弯折(dynamic time warping, DTW)是把时间归正和距离测度计算结合起来的一种非线性归正技术。它也是语音识别中一种很成功的匹配算法。","mnemonic":"DTW动态时间弯折=时间归正+距离测度结合的非线性技术"},{"id":694,"type":"single","text":"留出法、交叉验证法和自助法都是常用的模型评估方法，这几种方法的主要不同点体现在（）。","options":[{"label":"A","text":"适用场景不同"},{"label":"B","text":"评估指标不同"},{"label":"C","text":"训练集和测试集的划分方式不同"},{"label":"D","text":"样本数量不同"}],"answer":"C","explanation":"留出法、交叉验证法和自助法的主要区别在于它们如何划分训练集和测试集","mnemonic":"留出法/交叉验证/自助法主要区别在训练集测试集划分方式不同"},{"id":695,"type":"single","text":"下列哪种方法能够用于文本数据的分词（）。","options":[{"label":"A","text":"中文分词工具"},{"label":"B","text":"最大熵模型"},{"label":"C","text":"K-Means聚类算法"},{"label":"D","text":"朴素贝叶斯算法"}],"answer":"A","explanation":"中文分词是指将一段连续汉字序列切分成具有语义的词汇序列的过程。中文分词工具是进行中文文本数据处理的必备工具之一。","mnemonic":"中文分词工具直接用于文本分词，K-Means和贝叶斯不做分词"},{"id":696,"type":"single","text":"下列哪项属于自动语言识别领域中用于语音处理的方法（）。","options":[{"label":"A","text":"采样频率"},{"label":"B","text":"梅尔频率倒谱系数"},{"label":"C","text":"短时傅里叶变换(STFT)"},{"label":"D","text":"离散余弦变换(DCT)"}],"answer":"B","explanation":"自动语言识别领域中最常用的两种语音处理方法：梅尔滤波器组和梅尔频率倒谱系数","mnemonic":"梅尔频率倒谱系数MFCC用于语音处理，自动语言识别常用方法"},{"id":697,"type":"single","text":"在制定文本数据处理流程时，下列哪个环节并非必需的（）。","options":[{"label":"A","text":"数据收集"},{"label":"B","text":"数据清理与预处理"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据分析和建模"}],"answer":"C","explanation":"数据可视化可直观展示数据特征，但非文本处理必需步骤，仅为可选辅助功能。","mnemonic":"数据可视化非文本处理必需环节，仅为可选辅助步骤"},{"id":698,"type":"single","text":"恪尽职守在基本要求上是怎样的（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"保守秘密"},{"label":"C","text":"高效执行"},{"label":"D","text":"忠诚和责任"}],"answer":"A","explanation":"职业守则中的\"恪尽职守\"基本要求指的是从业人员在履行职责和工作任务时应该尽职尽责，恪守岗位职责和道德准则","mnemonic":"恪尽职守要求忠诚责任+高效执行+保守秘密，全选A"},{"id":699,"type":"single","text":"下列适合用于分割具有相对均匀且连续的目标区域的图像分割方法是（）。","options":[{"label":"A","text":"区域生长法"},{"label":"B","text":"边缘检测法"},{"label":"C","text":"基于聚类的方法"},{"label":"D","text":"图割方法"}],"answer":"A","explanation":"区域生长法从种子像素出发，基于相似性合并邻近像素，适用于均匀连续区域分割。","mnemonic":"区域生长法适合分割均匀连续目标区域，从种子向外\"生长\""},{"id":700,"type":"single","text":"有一名公务员在工作期间存在违法违纪行为，该行为触犯了（）职业道德。","options":[{"label":"A","text":"遵纪守法"},{"label":"B","text":"客观公正"},{"label":"C","text":"尊重人权"},{"label":"D","text":"诚实守信"}],"answer":"A","explanation":"公务员必须恪守法律，保持廉洁，全心全意为人民服务，这是职业道德的根本要求之一。","mnemonic":"公务员违法违纪触犯遵纪守法的职业道德"},{"id":701,"type":"multi","text":"可供人机交互使用的设备，主要有哪些以及各类模式识别设备等？","options":[{"label":"A","text":"键盘"},{"label":"B","text":"鼠标"},{"label":"C","text":"冰箱"},{"label":"D","text":"洗衣机"}],"answer":"A,B","explanation":"人机交互功能主要靠可输入输出的外部设备和相应的软件来完成。可供人机交互使用的设备主要有键盘、鼠标、各种模式识别设备等。","mnemonic":"人机交互设备：键鼠是标配，冰箱洗衣机是家电不是交互设备"},{"id":702,"type":"multi","text":"对比分析法在数据分析中应用十分广泛，以下哪些选项描述了其正确的应用场景（）。","options":[{"label":"A","text":"时间维度上的同比和环比：这是对比分析法在时间序列分析中的一种应用，用于比较不同时间点的数据以发现趋势和周期性变化。"},{"label":"B","text":"计算员工工号的数量：员工工号是唯一标识，其数量属于简单计数（统计总量），不涉及“对比”行为，不属于对比分析法的应用。"},{"label":"C","text":"与竞争对手的比较：在市场分析中，对比分析法常用于比较自身与竞争对手的表现，以识别优势和劣势。"},{"label":"D","text":"类别间的对比：对比分析法可以用于比较不同类别之间的数据，以发现类别间的差异和相似性。"}],"answer":"A,C,D","explanation":"对比分析法是一种通过比较两组或多组数据来揭示差异和规律的方法。在数据分析中，对比分析法的应用包括但不限于：","mnemonic":"对比分析法：有\"比\"才有对比，时间比、竞争比、类别比，计数不是比"},{"id":703,"type":"multi","text":"下列关于恪尽职守基本要求的说法，不正确的是（）。","options":[{"label":"A","text":"履行职责和工作任务时尽职尽责"},{"label":"B","text":"只要工作认真负责，不需要学习进修"},{"label":"C","text":"保守公司机密是个人选择，可透露也可不透露"},{"label":"D","text":"只要听从领导指挥，不需要考虑任务本身的合理性"}],"answer":"B,C,D","explanation":"恪尽职守是指从业人员在履行职责和工作任务时应该尽职尽责，恪守岗位职责和道德准则。选项B、C、D都是错误的。学习进修是提高工作能力和业务水平的必要手段，也是恪尽职守的要求之一；保守公司机密是员工的法律义务，必须严格遵守；听从领导指挥不等于不考虑任务本身的合理性，需要在任务合理合法的情况下听从领导的安排。","mnemonic":"恪尽职守反面：不学习、泄密、盲从领导都是错，BCD全不正确"},{"id":704,"type":"multi","text":"下列属于 NoSQL 数据库的有哪些（）。","options":[{"label":"A","text":"键值数据库"},{"label":"B","text":"列族数据库"},{"label":"C","text":"文档数据库"},{"label":"D","text":"分布式数据库"}],"answer":"A,B,C","explanation":"在大数据的存储与处理上，NoSQL具备传统关系数据库无法比拟的性能优势。随着人们对非关系数据库的日益重视，目前已开发出众多性能优异的NoSQL数据库产品，如MongoDB、HBase、Redis等。根据这些产品的功能侧重，可以将NoSQL数据库分为键值数据库、列族数据库、文档数据库和图形数据库。","mnemonic":"NoSQL四类：键列文图，分布式不在其中，排D选ABC"},{"id":705,"type":"multi","text":"逻辑树大致可分为哪三种（）。","options":[{"label":"A","text":"对整体的构成要素进行 分解和整理的“What?”树"},{"label":"B","text":"用于找出问题原因的“Why?”树"},{"label":"C","text":"用于找出问题在哪的“Where？”树"},{"label":"D","text":"寻找解决办法的“How?”树"}],"answer":"A,B,D","explanation":"逻辑树大致可以分为三种，分别是:对整体的构成要素进行分解和整理的“What?”树，用于找出问题原因的“Why?”树和寻找解决办法的“How?”树。","mnemonic":"逻辑树三棵：What分解+Why找因+How解决，没有Where树"},{"id":706,"type":"multi","text":"趋势分析法有哪些典型的应用场景（ ）。","options":[{"label":"A","text":"预测企业未来3年的营业收入增长"},{"label":"B","text":"评估某行业短期（如1个月内）的价格波动"},{"label":"C","text":"分析消费者偏好变化的长期趋势"},{"label":"D","text":"测量单一产品的即时市场需求"}],"answer":"A,C","explanation":"趋势分析是将不同时期同一指标的数值进行对比，以确定时间动态数列增减变动趋势的分析方法。利用趋势分析法能从动态上考察指标的发展特征和变化规律，得出上升、下降或稳定不变等结论，从而鉴定企业的管理水平，据以对企业未来变动方向做出预测。","mnemonic":"趋势分析看长期：预测营收增长、消费偏好变化，短期波动和即时需求不适用"},{"id":707,"type":"multi","text":"在从事职业工作的过程中，什么样的行为是与职业道德要求相违背的（）。","options":[{"label":"A","text":"向同事请教遇到的难题"},{"label":"B","text":"在工作中撒谎掩盖错误"},{"label":"C","text":"给客户提供虚假的服务内容"},{"label":"D","text":"将客户个人信息泄露给他人"}],"answer":"B,C,D","explanation":"在职业工作中，诚实守信和保护客户隐私是职业道德的重要要求。撒谎掩盖错误、提供虚假服务内容和泄露客户个人信息都是违背职业道德的不良行为。相反，向同事请教遇到的难题可以促进团队合作和完成工作任务，符合职业道德要求。","mnemonic":"违背职业道德：撒谎+虚假+泄露，请教同事是正当行为"},{"id":708,"type":"multi","text":"全新设计法是根据流程优化目标来做什么（）。","options":[{"label":"A","text":"彻底颠覆原有流程"},{"label":"B","text":"从零开始对新流程进行设计"},{"label":"C","text":"对流程进行整合"},{"label":"D","text":"可以节约分析时间和成本"}],"answer":"A,B","explanation":"全新设计法就是根据流程优化目标，彻底颠覆原有流程，从零开始对新流程进行设计。","mnemonic":"全新设计法：彻底颠覆+从零开始，不是整合也不省成本"},{"id":709,"type":"multi","text":"下列属于基于区域的图像分割方法的是（）。","options":[{"label":"A","text":"基于阈值的分割"},{"label":"B","text":"区域生长"},{"label":"C","text":"区域分裂与合并"},{"label":"D","text":"基于边缘的分割"}],"answer":"B,C","explanation":"基于区域的图像分割方法主要包括区域生长和区域分裂与合并两种典型的方法。区域生长法是从单个像素出发，逐渐合并周围像素，最后形成所需要的分割结果;分裂与合并法是从整幅图像出发，逐渐分裂或合并，最后形成所需要的分割结果。","mnemonic":"基于区域分割：区域生长+分裂合并，阈值和边缘是其他方法"},{"id":710,"type":"multi","text":"下列属于 Kettle 所具备的特点的有（）。","options":[{"label":"A","text":"开源软件"},{"label":"B","text":"图形化操作"},{"label":"C","text":"数据备份和恢复"},{"label":"D","text":"数据可视化和报表"}],"answer":"A,B","explanation":"作为广受用户欢迎的ETL工具，Kettle具有以下特点。开源软件，可以在多个常用的操作系统下运行。图形化操作，使用十分简单与方便。支持多种常用数据库和文件的数据格式，适应范围广。具有完整的工作流控制，能够较好地控制复杂的数据转换工作。提供定时调度功能，方便用户及时处理数据。","mnemonic":"Kettle特点：开源+图形化，备份恢复和可视化报表不是其特点"},{"id":711,"type":"multi","text":"在移动界面设计中，（）可以有效增强移动应用的可用性和用户体验。","options":[{"label":"A","text":"简单直观"},{"label":"B","text":"界面风格一致"},{"label":"C","text":"提供清晰、简洁的操作流程"},{"label":"D","text":"使用丰富的文本和长篇描述提供详细信息"}],"answer":"A,B,C","explanation":"虽然提供详细信息有时是必要的，但过多的文本和长篇描述可能导致界面显得繁琐，影响用户的操作流畅性。移动界面应尽量避免冗长的文字，简洁的语言能更好地提高用户体验。因此，B不是正确的选项。","mnemonic":"移动界面设计：简单直观+风格一致+流程简洁，长篇文字是大忌"},{"id":712,"type":"multi","text":"下列哪项是数据仓库的主要特点（）。","options":[{"label":"A","text":"面向分析和决策支持"},{"label":"B","text":"实时数据处理"},{"label":"C","text":"存储大量历史数据"},{"label":"D","text":"高度冗余的数据结构"}],"answer":"A,C","explanation":"数据仓库的主要特点包括面向分析和决策支持，以及存储大量历史数据。数据仓库被设计用于支持复杂的数据分析和提供决策支持，同时它还具有存储大量历史数据的能力，以便进行趋势分析和历史数据的比较。","mnemonic":"数据仓库特点：面向分析决策+存储历史数据，非实时非冗余"},{"id":713,"type":"multi","text":"在人机交互行为模型中，下列哪项属于交互过程的类型？","options":[{"label":"A","text":"数据交互"},{"label":"B","text":"行为交互"},{"label":"C","text":"图像交互"},{"label":"D","text":"相互作用交互"}],"answer":"A,B,C","explanation":"数据交互：指系统与用户之间的数据传输、交换和处理。行为交互：指用户通过输入设备（如键盘、鼠标等）与系统进行的交互行为。图像交互：涉及系统通过图形界面或视觉元素与用户进行互动。相互作用交互并不是通常定义的交互过程类型，它更倾向于描述用户和系统之间的互动方式，而非一个独立的交互类型。","mnemonic":"交互过程三类型：数据+行为+图像交互，\"相互作用\"太笼统不算"},{"id":714,"type":"multi","text":"中文分词的目的是（）。","options":[{"label":"A","text":"提高文本处理效率"},{"label":"B","text":"识别句子的主谓宾结构"},{"label":"C","text":"便于词性标注和语义分析"},{"label":"D","text":"改善搜索引擎的检索效果"}],"answer":"C,D","explanation":"中文分词的目的主要是为了便于词性标注和语义分析。通过将文本按词进行切分，可以为后续的词性标注和语义分析提供更准确的信息。此外，中文分词也可以改善搜索引擎的检索效果，使搜索引擎更准确地理解用户的查询意图，提供更精准的搜索结果。提高文本处理效率和识别句子的主谓宾结构并不是中文分词的主要目的。","mnemonic":"中文分词目的：便于词性标注语义分析+改善搜索检索，非提效率非识别主谓宾"},{"id":715,"type":"multi","text":"可有效用于语音增强和噪声抑制的语音信号处理方法有（）。","options":[{"label":"A","text":"谱减法"},{"label":"B","text":"线性预测编码"},{"label":"C","text":"维纳滤波"},{"label":"D","text":"维特比算法"}],"answer":"A,C","explanation":"谱减法是一种常用于语音增强和噪声抑制的技术，它通过估计背景噪声的频谱并从语音信号的频谱中减去噪声部分，来实现噪声抑制。谱减法是有效的语音增强方法。线性预测编码（LPC）主要用于语音特征提取和建模，帮助对语音信号进行建模和编码，而不是直接用于噪声抑制或语音增强。虽然LPC能提供对语音信号的分析，但它本身并不是针对噪声抑制的技术。含噪语音信号经线性滤波后提高其信噪比，以得到降信号的方法。主要是依据维纳滤波来降噪。维特比算法通常用于解码问题，特别是在隐马尔可夫模型（HMM）和语音识别中的路径搜索与状态估计。它不是专门设计用于语音增强或噪声抑制。","mnemonic":"语音降噪双法宝：谱减法减噪谱+维纳滤波提信噪比，LPC编码维特比解码不降噪"},{"id":716,"type":"multi","text":"在可用性设计中，以下（）设计原则有助于提高产品的易用性。","options":[{"label":"A","text":"让用户能够快速学会如何使用产品"},{"label":"B","text":"设计时避免考虑用户的错误操作"},{"label":"C","text":"提供灵活的操作方式以适应不同用户需求"},{"label":"D","text":"产品设计需要具有容错性，避免用户因小错误而失败"}],"answer":"A,C,D","explanation":"可学习性是可用性设计的一个重要原则，旨在让新用户快速理解和掌握如何使用产品，减少学习成本。容错能力是可用性设计的一个关键方面，设计时应该考虑到用户可能的错误操作，并通过适当的反馈和修正机制帮助用户避免和恢复错误操作。灵活性是可用性设计中的另一个原则，旨在通过提供多种操作方式或适应不同情境来满足不同用户的需求。","mnemonic":"可用性设计三原则：快速学会+灵活操作+容错性，排除B不考虑错误操作"},{"id":717,"type":"multi","text":"下列哪些设计措施能够有效增强图形用户界面的易用性呢？（）","options":[{"label":"A","text":"界面应提供即时反馈，告知用户操作是否成功"},{"label":"B","text":"界面应使用复杂的菜单和多层次的导航，以增加功能性"},{"label":"C","text":"界面布局应简洁，避免不必要的元素和控件"},{"label":"D","text":"界面元素应保持一致性，确保相同功能的按钮在不同页面中位置相同"}],"answer":"A,C,D","explanation":"选项B使用复杂的菜单和多层次的导航会使得用户的操作变得更加困难，不符合简洁和易用性的设计原则，因此不应选。选项A提到即时反馈，这对于提升易用性至关重要。通过明确的反馈，用户能知道操作的结果，从而减少困惑和不确定感。选项C强调简洁的布局，避免过多的元素，这能帮助用户快速找到所需功能，减少视觉负担，提升界面的可用性。选项D提到界面元素的一致性，保持按钮和功能的一致性能够帮助用户更快速地理解和适应界面，是易用性的重要因素。","mnemonic":"GUI易用性：即时反馈+简洁布局+一致性，复杂菜单多层导航是反面"},{"id":718,"type":"multi","text":"对于产生式规则的描述，下列说法中正确的有哪些？（）","options":[{"label":"A","text":"产生式规则通过匹配用户输入的条件，激活相应的动作或系统行为"},{"label":"B","text":"产生式规则系统仅能描述简单的用户界面交互，无法应用于复杂系统"},{"label":"C","text":"产生式规则可以描述误操作"},{"label":"D","text":"产生式规则的顺序不影响其执行，规则可以独立于执行顺序匹配和激活"}],"answer":"A,D","explanation":"A项正确：产生式规则的基本原理是通过定义条件和相应的动作，系统在检测到用户输入符合某一条件时触发相应的动作或行为。B项错误：虽然产生式规则适用于简单的界面交互，但它也可以应用于复杂的系统设计中，尤其是在多条件和多动作的场景下。C项错误：产生式规则不能描述误操作。D项正确：产生式规则的顺序通常不影响执行，只要条件匹配，系统就会激活相应的动作。产生式规则的独立性使得它们更容易实现和维护。","mnemonic":"产生式规则：条件匹配激活动作+顺序无关独立执行，能描复杂但不能描误操作"},{"id":719,"type":"multi","text":"依据《中华人民共和国个人信息保护法》，个人信息的处理活动包含哪些？","options":[{"label":"A","text":"收集"},{"label":"B","text":"存储"},{"label":"C","text":"公开"},{"label":"D","text":"传输"}],"answer":"A,B,C,D","explanation":"《中华人民共和国个人信息保护法》第四条规定，个人信息是以电子或者其他方式记录的与已识别或者可识别的自然人有关的各种信息，不包括匿名化处理后的信息。个人信息的处理包括个人信息的收集、存储、使用、加工、传输、提供、公开、删除等。","mnemonic":"个人信息处理活动：收存公传全包含，ABCD四个都选"},{"id":720,"type":"multi","text":"下列哪项方法能够有效减轻算法的过拟合问题（）。","options":[{"label":"A","text":"增加正则化项"},{"label":"B","text":"提高学习率"},{"label":"C","text":"增加训练数据集大小"},{"label":"D","text":"增加神经网络的层数"}],"answer":"A,C","explanation":"算法过拟合指的是模型过于复杂，导致在训练数据上表现很好，但在测试数据上表现较差。为减少过拟合，常用的方法包括：增加正则化项：正则化（如L1或L2正则化）通过在损失函数中加入惩罚项来限制模型的复杂度，防止模型对训练数据过拟合。提高学习率：提高学习率不会减少过拟合，反而可能导致训练过程不稳定，因此这不是有效的减少过拟合的方法。增加训练数据集大小：更多的训练数据有助于提高模型的泛化能力，从而减少对训练数据的过拟合。增加神经网络的层数：增加神经网络的层数会增加模型的复杂度，从而加剧过拟合的风险。","mnemonic":"减轻过拟合：正则化+增加数据，提高学习率和加深网络反而加剧"},{"id":721,"type":"multi","text":"在职业道德所要求的 “专业行为” 中，下列哪一项属于其具体的内容？（）","options":[{"label":"A","text":"保持学习和提升专业能力"},{"label":"B","text":"严格遵守职业准则和规范"},{"label":"C","text":"利用职权为个人谋取便利"},{"label":"D","text":"尊重职业界的标准和规范"}],"answer":"A,B,D","explanation":"“专业行为”要求职业人员应该具备高水平的专业知识和技能，并以专业的态度和行为履行岗位职责。这包括保持学习和不断提升自己的专业能力，严格遵守职业准则和规范，并尊重职业界的标准和规范。","mnemonic":"专业行为三要素：保持学习+遵守准则+尊重标准，利用职权谋私是违规"},{"id":722,"type":"multi","text":"构建智能交通系统需要综合运用多种先进技术和方法，它主要涉及哪些方面（）。","options":[{"label":"A","text":"无线通信技术"},{"label":"B","text":"基础设施传感器系统"},{"label":"C","text":"车载传感系统"},{"label":"D","text":"协作系统"}],"answer":"A,B,C,D","explanation":"智能交通系统的构建需要综合运用多种先进技术和方法，主要包括无线通信技术、基础设施传感器系统、车载传感系统、协作系统和计算技术。","mnemonic":"智能交通四技术：无线通信+基础传感+车载传感+协作系统，ABCD全选"},{"id":723,"type":"multi","text":"在 GOMS 模型中，下列哪项属于 “目标” 的特点？","options":[{"label":"A","text":"可分解为具体操作"},{"label":"B","text":"可以层次化"},{"label":"C","text":"描述用户的意图"},{"label":"D","text":"仅限于短期目标"}],"answer":"A,B,C","explanation":"选项A、B、C均符合描述GOMS模型中“目标”特征的准确说法。选项D描述错误，目标可以是长期或短期的，不限于短期目标。","mnemonic":"GOMS目标特点：可分解+可层次化+描述意图，不限于短期目标"},{"id":724,"type":"multi","text":"若按照处理的对象及其数据的表示方式来划分，计算机可以分为哪几类（）。","options":[{"label":"A","text":"数字计算机"},{"label":"B","text":"模拟计算机"},{"label":"C","text":"通用计算机"},{"label":"D","text":"数字模拟混合计算机"}],"answer":"A,B,D","explanation":"按照计算机处理的对象及其数据的表示形式可分为数字计算机、模拟计算机、数字模拟混合计算机。","mnemonic":"按数据表示分计算机：数字+模拟+混合三类，通用计算机是按用途分的"},{"id":725,"type":"multi","text":"诚实公正的基本要求中不包含的是（）。","options":[{"label":"A","text":"损害他人的权益"},{"label":"B","text":"追求个人利益，夸大或隐瞒事实"},{"label":"C","text":"保护雇主或客户的权益"},{"label":"D","text":"故意不提供准确、真实和完整的信息"}],"answer":"A,B,D","explanation":"根据诚实公正的基本要求，从业人员要做到以下几点，一、诚实，从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。二、公正，从业人员应该公正地对待所有相关方，不偏袒任何一方。基于客观事实和公正标准做出决策和评估。三、透明，从业人员应该及时、清晰地向相关方提供信息，并确保相关方理解信息的真实性和重要性。遵守披露要求，不得隐瞒重要信息。四、忠诚和权益保护，从业人员应该忠诚于雇主或客户的利益，并保护他们的权益。不得利用职务之便谋取个人私利，也不得损害他人的权益。ABD选项均违背了诚实公正的要求，符合题意。","mnemonic":"诚实公正不包含：损害权益+夸大隐瞒+不提供真实信息，保护客户权益才正确"},{"id":726,"type":"multi","text":"进行数据集成时，有哪些问题是需要考虑并加以解决的？（）","options":[{"label":"A","text":"数据容量问题"},{"label":"B","text":"冗余问题"},{"label":"C","text":"数据值冲突检测与消除问题"},{"label":"D","text":"模式集成问题"}],"answer":"B,C,D","explanation":"在数据集成过程中，需要考虑解决的问题包括模式集成问题、冗余问题、数据值冲突检测与消除问题。","mnemonic":"数据集成三问题：冗余+值冲突+模式集成，容量问题不在考虑范围"},{"id":727,"type":"multi","text":"指导中级工作人员进行语音数据标注时，有哪些问题是不容忽视的？（）","options":[{"label":"A","text":"确认图像分割方式"},{"label":"B","text":"确定是否包含有效语音"},{"label":"C","text":"确定语音的噪声情况"},{"label":"D","text":"确定说话人数量"}],"answer":"B,C,D","explanation":"在指导初级工进行语音数据标注时应注意确认是否包含有效语音、语音的噪声情况、说话人数量等信息。","mnemonic":"语音标注三注意：有效语音+噪声情况+说话人数，图像分割是视觉任务"},{"id":728,"type":"multi","text":"要是想达成提升图形用户界面用户体验的目的，应当（）。","options":[{"label":"A","text":"保持界面元素和布局的一致性。"},{"label":"B","text":"使用复杂的术语来提升界面的专业性。"},{"label":"C","text":"设计应提供即时反馈，告知用户操作结果。"},{"label":"D","text":"界面应简单直观，避免过多的功能和选项。"}],"answer":"A,C,D","explanation":"选项A强调一致性，可以帮助用户快速适应界面，减少认知负担，因此有助于提升用户体验。选项C提到即时反馈，能够让用户明确操作结果，减少不确定性，也有助于增强用户体验。选项D关注界面的简洁性，避免过多的选项，降低学习难度，也是提升用户体验的有效方式。选项B虽然提到“专业性”，但使用复杂术语会增加用户的理解难度，反而降低用户体验。","mnemonic":"提升GUI体验：一致性+即时反馈+简洁直观，复杂术语降低体验"},{"id":729,"type":"multi","text":"下列关于聚类分析的说法，正确的是（）。","options":[{"label":"A","text":"聚类分析是将数据集分为不同的组别"},{"label":"B","text":"聚类分析是无监督学习方法"},{"label":"C","text":"聚类分析需要数据带有类别标签"},{"label":"D","text":"聚类分析是一种有监督学习方法"}],"answer":"A,B","explanation":"聚类分析是一种无监督学习方法，无需标签数据，其主要目的是将数据集划分为具有相似特征的不同组别，即聚类。","mnemonic":"聚类分析：无监督+分组别，不需标签非有监督"},{"id":730,"type":"multi","text":"在 Python 中读取文本数据时，能实现按行分割文件功能的方法是（）。","options":[{"label":"A","text":"split()"},{"label":"B","text":"read()"},{"label":"C","text":"readlines()"},{"label":"D","text":"splitlines()"}],"answer":"C,D","explanation":"readlines()方法可以读取文件中的每一行，并将其作为一个元素存储在一个列表中；splitlines()方法也可以读取每一行，但是将每一行的换行符去掉，返回一个无换行符的列表。","mnemonic":"Python按行分割：readlines读行列表+splitlines去换行分割"},{"id":731,"type":"multi","text":"关于 G-U-L 模型的特点，下列说法正确的有哪些？（）","options":[{"label":"A","text":"G-U-L模型结合了GOMS、UAN和LOTOS模型，能够能全面预测用户的行为、操作、时序关系"},{"label":"B","text":"G-U-L模型只适用于分析熟练用户的行为，不适用于非熟练用户"},{"label":"C","text":"G-U-L模型利用GOMS进行任务分解，使用UAN描述原子操作，并通过LOTOS表示任务之间的时序关系"},{"label":"D","text":"G-U-L模型强调用户与界面物理对象的交互，侧重于系统的实现细节"}],"answer":"A,C","explanation":"A选项正确：G-U-L模型通过结合GOMS、UAN和LOTOS模型，提供了一个全面的框架，能够更精确地预测用户在复杂任务中的行为。B选项错误：G-U-L模型并不限于熟练用户的行为预测，它适用于不同类型的用户，包括非熟练用户，尤其是在复杂任务中可以提高预测准确性。C选项正确：G-U-L模型的核心方法是将GOMS模型用于任务分解，UAN模型用于描述用户的原子操作，LOTOS模型用于表示任务之间的时序关系。D选项错误：G-U-L模型虽然涉及用户行为和界面交互，但它并不侧重于系统实现的细节。UAN模型关注的是用户视角，而不是底层实现的技术细节。","mnemonic":"G-U-L模型：GOMS任务分解+UAN原子操作+LOTOS时序关系，适用所有用户非仅熟练"},{"id":732,"type":"multi","text":"语音交互的过程包含哪些步骤？","options":[{"label":"A","text":"语音采集"},{"label":"B","text":"语音识别"},{"label":"C","text":"语义理解"},{"label":"D","text":"语音合成"}],"answer":"A,B,C,D","explanation":"语音交互过程包括四部分:语音采集、语音识别、语义理解和语音合成。语音采集完成音频的录入、采样及编码;语音识别完成语音信息到机器可识别的文本信息的转化;语义理解根据语音识别转换后的文本字符或命令完成相应的操作;语音合成完成文本信息到声音信息的转换。","mnemonic":"语音交互四步走：采集→识别→语义理解→合成，ABCD全选"},{"id":733,"type":"multi","text":"勤勉好学在基本要求上表现为（）。","options":[{"label":"A","text":"对工作充满热情"},{"label":"B","text":"拥有持续学习的意识"},{"label":"C","text":"避免与他人交流和合作"},{"label":"D","text":"保持高度的责任心和工作效率"}],"answer":"A,B,D","explanation":"勤勉好学的基本要求包括对工作充满热情、拥有持续学习的意识以及保持高度的责任心和工作效率。避免与他人交流和合作不符合勤勉好学的基本要求。","mnemonic":"勤勉好学三要求：热情+持续学习+责任心效率，避免交流合作是错误的"},{"id":734,"type":"multi","text":"在关联分析的各项评估指标里，能用于衡量关联规则质量的是（）指标。","options":[{"label":"A","text":"支持度"},{"label":"B","text":"置信度"},{"label":"C","text":"提升度"},{"label":"D","text":"熵值"}],"answer":"A,B,C","explanation":"熵值是信息论中的概念，用于衡量数据集的不确定性。在关联分析中，熵值并不直接用于评估关联规则的质量。而支持度、置信度和提升度是关联规则的常用评估指标。","mnemonic":"关联规则三指标：支持度+置信度+提升度，熵值属于信息论"},{"id":735,"type":"multi","text":"下列选项中，属于 Word 邮件合并的数据源的是（）。","options":[{"label":"A","text":"Outlook联系人列表"},{"label":"B","text":"在线云盘中的Excel电子表格"},{"label":"C","text":"现有本地Excel电子表格"},{"label":"D","text":"Access数据库"}],"answer":"A,C,D","explanation":"邮件合并的收件人通常来自Excel电子表格或Outlook联系人列表等现有列表中的姓名和数据列表。 现有列表也可是你能连接到的任何数据库。 如果还没有列表，则邮件合并期间可在 Word 中键入一个列表。无论将哪种类型的文件用作数据源，请务必将其保存在本地计算机或文件共享上；邮件合并不支持保存在 HTTP 位置。","mnemonic":"Word邮件合并数据源：Outlook联系人+本地Excel+Access，在线云盘不支持"},{"id":736,"type":"multi","text":"下列选项中，属于特征选择里过滤方法的是（）。","options":[{"label":"A","text":"卡方检验"},{"label":"B","text":"信息增益"},{"label":"C","text":"递归特征消除"},{"label":"D","text":"主成分分析"}],"answer":"A,B","explanation":"A选项正确，卡方检验是基于统计假设检验的方法，衡量每个特征与目标变量的独立性，是一种典型的过滤式方法，常用于分类任务。B选项正确，信息增益度量了特征对分类的贡献程度，通常在决策树算法中使用，也可以作为过滤式方法进行特征选择。C选项错误，递归特征消除（RFE）是包裹式方法，依赖于模型训练的反馈来选择特征，而非独立于模型的过滤式方法。D选项错误，主成分分析（PCA）是一种降维技术，通过对数据进行线性变换来减少维度，属于降维方法，而不是过滤式特征选择方法。","mnemonic":"过滤式特征选择：卡方检验+信息增益，递归消除是包裹式，PCA是降维"},{"id":737,"type":"multi","text":"HMM 模型的原理可以简要描述为（）。","options":[{"label":"A","text":"定义状态集合"},{"label":"B","text":"定义状态转移概率矩阵和观测概率矩阵"},{"label":"C","text":"对待分词语句进行序列标注"},{"label":"D","text":"计算最优路径"}],"answer":"A,B,C,D","explanation":"HMM模型的原理可以概括为：定义状态集合，定义状态转移概率矩阵和观测概率矩阵，对待分词语句进行序列标注，计算最优路径，其中状态集合根据需要可以精细地分为多个细分状态，状态转移概率矩阵和观测概率矩阵则是根据语料库的统计信息进行估计，序列标注和最优路径计算则是利用Viterbi算法进行实现。","mnemonic":"HMM四步原理：定义状态+转移观测矩阵+序列标注+最优路径，ABCD全选"},{"id":738,"type":"multi","text":"下列哪些内容属于 “严谨求是” 的基本要求？","options":[{"label":"A","text":"深入分析问题，避免草率臆断"},{"label":"B","text":"依据数据和事实支持决策"},{"label":"C","text":"以客观态度寻求真相，避免偏见"},{"label":"D","text":"保持当前知识技能，无需更新知识结构"}],"answer":"A,B,C","explanation":"根据严谨求是的基本要求，深入分析问题，避免草率臆断、依据数据和事实支持决策、以客观态度寻求真相，避免偏见均符合严谨求是的要求，除此之外还应该持续学习和研究，跟进行业发展和最新信息，以不断提升自己的知识和能力。因此只有D选项不符合题目要求。","mnemonic":"严谨求是三要求：深入分析+依据事实+客观避偏见，不更新知识是错误的"},{"id":739,"type":"multi","text":"下面关于状态转换网络（STN）的描述，正确的选项是（）。","options":[{"label":"A","text":"状态转换网络适用于描述复杂的并发行为"},{"label":"B","text":"状态转换网络通过定义系统状态和状态之间的转换规则来描述交互过程。"},{"label":"C","text":"状态转换网络的规模随着系统状态数的增加而呈指数级增长。"},{"label":"D","text":"状态转换网络仅适用于小型系统，不适合复杂或大型系统的设计。"}],"answer":"B,C,D","explanation":"A项错误：状态转换网络（STN）主要用于描述顺序和串行行为，它对并发行为的描述能力较差。对于复杂的并发任务，扩展状态转换网络（State Charts）更为合适。B项正确：STN的核心就是通过定义系统的状态以及状态之间的转换规则来描述交互过程。每个状态代表系统的一种特定条件，而状态间的转换由事件触发。C项正确：随着系统状态数的增加，状态转换网络的状态和转换数目会呈指数级增长。这使得大规模系统中的状态图变得非常复杂，难以管理。D项正确：STN在小型系统中可以很有效地工作，但在大型系统中，由于状态数量的急剧增加，导致其过于复杂，因此不适用于复杂或大型系统的设计。","mnemonic":"STN状态转换网络：定义状态和转换规则+指数级增长+仅适小型系统，不适合描述并发"},{"id":740,"type":"multi","text":"下列哪项属于中级培训包含的知识点？（）","options":[{"label":"A","text":"掌握数据采集知识"},{"label":"B","text":"平台化推广方法"},{"label":"C","text":"掌握深度学习算法的模型构建"},{"label":"D","text":"掌握数据聚类工具知识"}],"answer":"A,D","explanation":"掌握数据采集知识、掌握数据聚类工具知识属于中级培训的知识点。","mnemonic":"中级培训知识点：数据采集+数据聚类工具，平台推广和深度学习不属于"},{"id":741,"type":"multi","text":"下列哪项可用于读取文本数据（）。","options":[{"label":"A","text":"read()"},{"label":"B","text":"readlines()"},{"label":"C","text":"read_excel()"},{"label":"D","text":"open()"}],"answer":"A,B,D","explanation":"read()和readlines()可以用于读取文本文件中的内容，open()可以用于打开文件。","mnemonic":"读取文本数据三法：read读+readlines读行+open打开，read_excel是读表格"},{"id":742,"type":"multi","text":"职业道德在要求上涵盖了哪些方面（）。","options":[{"label":"A","text":"诚实守信"},{"label":"B","text":"私心杂念"},{"label":"C","text":"职业操守"},{"label":"D","text":"个人利益"}],"answer":"A,C","explanation":"职业道德是指在特定职业中，需要遵循的一些准则和规范。其中，诚实守信和职业操守是职业道德的重要要求，私心杂念和个人利益则是违背职业道德的表现。","mnemonic":"职业道德两要求：诚实守信+职业操守，私心杂念和个人利益是反面"},{"id":743,"type":"multi","text":"以下关于 LOTOS 语言及其算子特点的描述，正确的有哪些（）。","options":[{"label":"A","text":"LOTOS基于进程代数和抽象数据类型理论构建"},{"label":"B","text":"LOTOS算子可以描述非确定性行为"},{"label":"C","text":"LOTOS语言只能用于描述网络协议，不能描述其他系统行为"},{"label":"D","text":"LOTOS语言作为ISO标准的一部分，主要应用于开放分布式系统的描述"}],"answer":"A,B,D","explanation":"LOTOS的理论基础包括进程代数（CCS）和抽象数据类型建模语言（ACT-ONE）。LOTOS支持描述具有非确定性（Nondeterministic）特征的行为，这是并发系统的一个重要特点。虽然LOTOS最初主要用于描述网络协议，但它也能用来建模其他类型的开放分布式系统。LOTOS是ISO的一部分，专门用于开放分布式系统的行为建模。","mnemonic":"LOTOS语言特点：进程代数+抽象数据类型+非确定性+ISO标准，不限于网络协议"},{"id":744,"type":"multi","text":"在 ETL 的增量抽取中，常用于捕捉变化数据的方式包括（）。","options":[{"label":"A","text":"触发器"},{"label":"B","text":"时间戳"},{"label":"C","text":"文件对比"},{"label":"D","text":"日志对比"}],"answer":"A,B,D","explanation":"ETL中增量抽取常用的捕获变化数据的方法有四种，分别为触发器、时间戳、全表对比、日志对比。","mnemonic":"ETL增量抽取捕获变化：触发器+时间戳+日志对比，文件对比不是常用方式"},{"id":745,"type":"multi","text":"函数 adaptiveThreshold用于实现图像自适应阈值分割，其接受下列哪些参数（）。","options":[{"label":"A","text":"adaptivemethod"},{"label":"B","text":"thresholdType"},{"label":"C","text":"blockSize"},{"label":"D","text":"max Value"}],"answer":"A,B,C,D","explanation":"pyton的OpenCy库中提供函数adaptiveThreshold用于实现图像的自适应國值分割法格式如下，: cv2.adaptiverhreshold(src,maxValue, adaptivemethod,thresnolarype biocxsice,c)","mnemonic":"adaptiveThreshold参数：自适应方法+阈值类型+块大小+最大值，ABCD全选"},{"id":746,"type":"multi","text":"下列活动中，适合运用象限分析法的有（ ）。","options":[{"label":"A","text":"某企业通过分析员工工作时长和工作效率来制定员工培训计划"},{"label":"B","text":"某学校仅用学生成绩来评定学生综合素质"},{"label":"C","text":"某购物平台通过分析页面点击率和购买转化率来实施不同促销活动"},{"label":"D","text":"某公司仅用产品销量来判断产品市场前景"}],"answer":"A,C","explanation":"象限分析法需要两个或多个维度来划分象限。选项A是通过员工工作时长和工作效率两个维度来分析，符合象限分析法的运用方式，所以正确；选项C是通过页面点击率和购买转化率两个维度来分析，符合象限分析法的运用方式，正确；选项B和D都只用一个维度来判断，不符合象限分析法的运用方式，所以错误。","mnemonic":"象限分析法：需要两个维度，工时效率和点击转化率符合，单维度的BD不行"},{"id":747,"type":"multi","text":"Windows Server 2008 的 NTFS 许可权限中，属于普通权限的有哪些（）。","options":[{"label":"A","text":"写入"},{"label":"B","text":"读取"},{"label":"C","text":"修噶"},{"label":"D","text":"删除文件"}],"answer":"A,B,C","explanation":"Windows Server 2008 的NTFS 的普通权限有读取、列出文件夹内容、写入、读并且执行、修改和完全控制。而删除文件属于特殊权限。","mnemonic":"NTFS普通权限：读取+写入+修改，删除文件属于特殊权限"},{"id":748,"type":"multi","text":"在 Word 里，关于邮件合并的主文档，下列说法正确的是（）。","options":[{"label":"A","text":"主文档包含所有输出文档中都相同的基本文本"},{"label":"B","text":"主文档包含收件人具体信息"},{"label":"C","text":"主文档可能包含信头、 文本和说明中插入的文本"},{"label":"D","text":"主文档可以从模板开始或者现有文档开始设置"}],"answer":"A,C,D","explanation":"主文档包含所有输出文档中都相同的基本文本。它可能包含了信头、 文本和说明中插入的文本 （例如收件人姓名和地址）合并域到另一个输出文档而异。主文档可以从模板开始或者现有文档开始设置。主文档设置完成后才去指定数据源选择收件人。","mnemonic":"邮件合并主文档：相同基本文本+含信头说明+可从模板或文档开始，不含收件人具体信息"},{"id":749,"type":"multi","text":"下列关于聚类分析的说法，不正确的是（）。","options":[{"label":"A","text":"聚类分析是一种有监督学习方法"},{"label":"B","text":"聚类分析是一种无监督学习方法"},{"label":"C","text":"聚类分析只能用于分类问题"},{"label":"D","text":"聚类分析一般使用回归分析方法"}],"answer":"A,C,D","explanation":"聚类分析是一种无监督学习方法，它不需要有预先定义的分类或标签，它通过将数据对象分组来对数据进行分类，这些分组通常称为簇。聚类不仅用于数据分组，还可用于异常检测（如DBSCAN识别噪声点）。回归分析用于预测连续值，而聚类分析用于将数据分组。","mnemonic":"聚类分析不正确：有监督×无监督✓，不限分类问题，不用回归方法"},{"id":750,"type":"multi","text":"下列选项中，哪些场景能够应用自然交互技术？（）","options":[{"label":"A","text":"语音助理"},{"label":"B","text":"智能家居控制"},{"label":"C","text":"虚拟现实游戏"},{"label":"D","text":"航空飞行模拟"}],"answer":"A,B,C,D","explanation":"语音助理是自然交互技术的一种应用，它通过语音识别技术接受并理解用户指令，执行任务或回答问题，因此可以应用自然交互技术。智能家居控制系统可以通过自然交互技术（如语音识别、手势识别等）来实现与家居设备的互动，用户可以通过语音或手势控制智能家电，因此也属于自然交互技术的应用场景。虚拟现实游戏通常结合手势识别技术或动作捕捉设备，让玩家通过自然动作与虚拟世界互动，这是一种典型的自然交互技术应用场景。航空飞行模拟可以通过自然交互技术（如手势识别、语音命令等）来模拟飞行员操作控制器，实现更加直观和沉浸的飞行训练体验，因此也可以应用自然交互技术。","mnemonic":"自然交互技术场景：语音助理+智能家居+VR游戏+飞行模拟，ABCD全选"},{"id":751,"type":"multi","text":"以下哪项属于业务数据处理流程中的数据预处理阶段（）。","options":[{"label":"A","text":"数据挖掘"},{"label":"B","text":"数据清洗"},{"label":"C","text":"数据转换"},{"label":"D","text":"数据建模"}],"answer":"B,C","explanation":"数据预处理是指对数据进行数据合并、数据清洗、数据标准化和数据变换等操作，并将数据用于数据分析与建模的过程。","mnemonic":"数据预处理阶段：数据清洗+数据转换，挖掘和建模是后续步骤"},{"id":752,"type":"multi","text":"下列哪项不属于趋势分析法的作用（）。","options":[{"label":"A","text":"预测未来的趋势和走向"},{"label":"B","text":"优化产品的设计"},{"label":"C","text":"提高用户满意度"},{"label":"D","text":"增加产品的销售量"}],"answer":"B,C,D","explanation":"趋势分析法的作用是预测未来的趋势和走向，以便做出相应的决策和规划。","mnemonic":"趋势分析法作用：仅预测未来趋势走向，优化设计、满意度、销量都不是"},{"id":753,"type":"multi","text":"在推进业务流程优化的过程里，下列哪几项步骤是必须完成的（）。","options":[{"label":"A","text":"成立业务流程优化项目小组"},{"label":"B","text":"找到阻碍流程优化目标实现的因素"},{"label":"C","text":"直接实施新的流程方案，无需分析和反馈"},{"label":"D","text":"对初步制定的流程优化方案进行进一步优化"}],"answer":"A,B,D","explanation":"根据业务流程优化的顺序，成立业务流程优化项目小组（A）是前提，找到阻碍流程优化目标实现的因素（B）是关键步骤，而对初步制定的流程优化方案进行进一步优化（D）是确保方案可行性的必要环节。直接实施新的流程方案而无需分析和反馈（C）是不合理的，可能会导致方案无法有效执行。","mnemonic":"流程优化三步骤：成立小组+找阻碍因素+进一步优化方案，不能直接实施不分析"},{"id":754,"type":"multi","text":"关于 “以用户为中心的设计” 所具备的特点，哪些是正确的？（）","options":[{"label":"A","text":"设计过程中主要关注技术的可行性和产品功能的复杂性，而不太考虑最终用户的需求。"},{"label":"B","text":"设计需要充分了解并考虑目标用户的需求、期望和使用场景，以提升用户的使用体验。"},{"label":"C","text":"以用户为中心的设计强调从用户的角度出发进行产品设计，并且关注产品的有效性、效率和用户的主观满意度。"},{"label":"D","text":"在设计过程中，用户的反馈是可选的，设计师可以根据个人经验来调整设计，而不需要依赖用户反馈。"}],"answer":"B,C","explanation":"以用户为中心的设计强调以最终用户为核心，设计时需深入了解用户的需求、期望和实际使用场景，以提高产品的有效性、效率和用户满意度。选项B和C完全符合这一理念。选项A忽视了用户需求的核心地位，选项D则错误地将用户反馈视为可选，实际上，用户反馈在设计中是至关重要的。","mnemonic":"以用户为中心设计：了解用户需求+关注有效性效率满意度，技术优先和忽视反馈都错"},{"id":755,"type":"multi","text":"在现代计算机出现之前，计算机的发展历程曾经历过哪些阶段（）。","options":[{"label":"A","text":"机械式计算机"},{"label":"B","text":"机电式计算机"},{"label":"C","text":"萌芽期的电子计算机"},{"label":"D","text":"分析机"}],"answer":"A,B,C","explanation":"早在现代计算机问世之前，计算机的发展经历了机械式计算机、机电式计算机和萌芽期的电子计算机三个阶段。","mnemonic":"现代计算机前三阶段：机械式→机电式→萌芽期电子，分析机不算独立阶段"},{"id":756,"type":"multi","text":"下列对算法复杂度的描述，正确的是（）。","options":[{"label":"A","text":"渐进复杂度描述的是算法最坏运行时间"},{"label":"B","text":"平均复杂度描述的是算法平均运行时间"},{"label":"C","text":"常数复杂度描述算法的执行时间恒定，不受数据量大小影响"},{"label":"D","text":"指数复杂度描述的是算法的运行时间随着问题规模以指数级别增长"}],"answer":"B,C,D","explanation":"渐进复杂度是指算法的增长趋势，通常描述的是在极限情况下（最坏、最好或平均）的时间或空间复杂度，表述不准确。平均复杂度描述的是算法在所有可能输入情况下的平均运行时间。常数复杂度表示算法的运行时间或操作次数不随输入规模变化，保持恒定。指数复杂度表示随着问题规模增大，算法的运行时间呈指数级增长。","mnemonic":"算法复杂度：平均描述平均时间+常数不受规模影响+指数级增长，渐进复杂度描述不准确"},{"id":757,"type":"multi","text":"对于可用性评估的相关方法，下列哪些表述是错误的？（）","options":[{"label":"A","text":"诊查式方法主要通过实际用户参与来进行评估"},{"label":"B","text":"测试式方法通常依赖专家对产品进行分析，而不涉及用户"},{"label":"C","text":"可用性评估的方法可以帮助发现设计中可能存在的可用性问题，并提供改进建议"},{"label":"D","text":"在可用性评估中，诊查式方法比测试式方法更注重用户行为的实时反馈"}],"answer":"A,B,D","explanation":"选项A：诊查式方法并不依赖于实际用户的参与，而是由专家进行分析和评估。例如启发式评估和认知性遍历就是典型的诊查式方法。选项B：测试式方法正是依赖于用户参与的评估方法，如用户测试、问卷调查等。它是通过用户的实际使用行为来评估产品的可用性。选项C：可用性评估的核心目的是发现产品设计中可能存在的可用性问题，并通过不同的评估方法（无论是诊查式方法还是测试式方法）提出改进建议。选项D：诊查式方法的重点在于专家评估，通常并不依赖于实时的用户行为反馈，反而是通过理论分析和经验评估来找出潜在问题。测试式方法才注重用户行为的实时反馈。","mnemonic":"可用性评估方法错误：诊查式靠专家非用户+测试式靠用户非专家，AB和D说反了"},{"id":758,"type":"multi","text":"常见的文本向量化方法有哪些（）。","options":[{"label":"A","text":"one-hot编码"},{"label":"B","text":"词袋模型"},{"label":"C","text":"TF-IDF"},{"label":"D","text":"词性标注模型"}],"answer":"A,B,C","explanation":"常见的文本向量化方法包括one-hot编码、词袋模型和TF-IDF。其中，one-hot编码将每个词转换成一个唯一的向量，向量维度等于词表中词语数量；词袋模型将文本表示为一个固定长度的词向量，向量的每个维度表示对应词在文本中出现的次数；TF-IDF方法基于词袋模型，考虑到一些高频词对文本分类的影响不大，因此在计算向量时会对高频次数进行调整。词性标注模型是一种将文本中的单词标记为特定词性的方法，例如名词、动词、形容词等。它不是一种文本向量化方法，而是一种文本分析方法。","mnemonic":"文本向量化三方法：one-hot+词袋模型+TF-IDF，词性标注不是向量化"},{"id":759,"type":"multi","text":"以下 LOTOS 模型中的符号与其含义的对应关系，正确的有哪些（）。","options":[{"label":"A","text":"T1 |[a1,...,an]| T2 —— 同步（Synchronization）"},{"label":"B","text":"T1 ||| T2 —— 选择（Choice）"},{"label":"C","text":"T1 [] T2 —— 交替（Interleaving）"},{"label":"D","text":"T1 >> T2 —— 串行（sequentiality）"}],"answer":"A,D","explanation":"A. T1 |[a1,...,an]| T2 的确表示“同步（Synchronization）”，即两个进程同时发生特定事件。","mnemonic":"LOTOS符号对应：同步|[a]|和串行>>正确，交替|||和选择[]被互换了"},{"id":760,"type":"multi","text":"ETL 所包含的主要环节有（）。","options":[{"label":"A","text":"数据抽取"},{"label":"B","text":"数据转换"},{"label":"C","text":"数据压缩"},{"label":"D","text":"数据装载"}],"answer":"A,B,D","explanation":"ETL主要包括数据抽取、数据转换、数据装载3部分内容。","mnemonic":"ETL三环节：抽取+转换+装载，数据压缩不属于ETL"},{"id":761,"type":"multi","text":"下列选项中，关于人机交互的说法正确的是哪一项？","options":[{"label":"A","text":"人机交互是计算机科学和认知心理学两大科学相结合的产物，同时也吸收了语言学、人机工程学和社会学等科学的研究成果。"},{"label":"B","text":"人机交互是关于设计、评价和实现供人们使用的交互式计算机系统且围绕这些方面进行研究的科学。"},{"label":"C","text":"人机交互是指用户与计算机系统之间的通信，是人与计算机之间各种符号和动作的双向信息交换。"},{"label":"D","text":"人机交互是指通过机器学习算法实现人机对话"}],"answer":"A,B,C","explanation":"选项D的定义过于狭窄，它只提到了机器学习算法在人机对话中的应用，而人机交互是一个更广泛的概念，不仅仅局限于对话。","mnemonic":"人机交互定义：计算机+认知心理学+设计评价实现+双向信息交换，非仅机器学习对话"},{"id":762,"type":"multi","text":"在（）情形下，算法可能会出现过拟合现象。","options":[{"label":"A","text":"模型复杂度不足"},{"label":"B","text":"模型复杂度高但是训练数据过少"},{"label":"C","text":"训练数据未覆盖真实数据分布"},{"label":"D","text":"损失函数未添加正则化项"}],"answer":"B,C,D","explanation":"算法过拟合指的是在训练数据集上表现较好，但在测试数据集上表现较差的情况。“模型复杂度高但是训练数据过少”：模型复杂时需要足够数据支撑，数据不足会导致模型过度学习训练数据细节（包括噪声），属于过拟合常见成因。“训练数据未覆盖真实数据分布”：训练数据分布与真实分布偏差大时，模型会拟合训练数据的特殊分布而非通用规律，导致泛化能力差（过拟合）。“损失函数未添加正则化项”：正则化的核心作用是限制模型复杂度以防止过拟合，未添加时模型易过度拟合训练数据。","mnemonic":"过拟合三诱因：模型复杂数据少+数据分布不全+无正则化，模型复杂度不足是欠拟合"},{"id":763,"type":"multi","text":"对于 SWOT 模型的定义，下列说法不正确的是（）。","options":[{"label":"A","text":"SWOT模型对企业市场环境的扫描和分析"},{"label":"B","text":"SWOT模型对企业内部资源和外部环境的分析"},{"label":"C","text":"SWOT模型对企业战略规划和实施的监控和调整"},{"label":"D","text":"SWOT模型对企业市场竞争力的评估和提高"}],"answer":"A,C,D","explanation":"SWOT模型是指对企业内部的优劣势和外部环境的机会和威胁进行分析和评估，从而制定出相应的战略，因此选项B是正确的。","mnemonic":"SWOT定义：内部资源+外部环境分析才对，市场扫描、战略监控、竞争力评估都不准确"},{"id":764,"type":"multi","text":"在 Python 的语音处理工具体系里，能够用于处理语音信号并提供相关功能的库有（）。","options":[{"label":"A","text":"librosa - 提供语音的采样率转换、梅尔频谱提取、频率掩蔽等功能"},{"label":"B","text":"正确：pydub库提供了一个用户友好的高层语音操作API，可以轻松处理数字音频样本，例如音频的剪辑、拼接、音量调整等。"},{"label":"C","text":"正确：wave库可以用于读取和写入WAV格式的语音文件，是处理WAV文件的基本工具。"},{"label":"D","text":"正确：numpy库虽然主要用于数值计算，但可以用于处理音频数据，例如进行信号处理和分析。"}],"answer":"A,B,C,D","explanation":"A. 正确：librosa库提供了丰富的音频和音乐信号处理功能，包括语音的采样率转换、梅尔频谱提取、频率掩蔽等。","mnemonic":"Python语音处理库：librosa+pydub+wave+numpy，ABCD全选"},{"id":765,"type":"multi","text":"下列哪项属于计算机的主要应用领域（）。","options":[{"label":"A","text":"办公处理"},{"label":"B","text":"游戏娱乐"},{"label":"C","text":"科学研究"},{"label":"D","text":"传统手工蔬菜生产"}],"answer":"A,B,C","explanation":"计算机的主要应用包括办公处理、游戏娱乐、科学研究、通讯与信息传播等领域。D项属于非计算机应用领域。","mnemonic":"计算机应用领域：办公+游戏+科研，传统手工蔬菜生产不需要计算机"},{"id":766,"type":"multi","text":"下面哪一项属于中级培训包含的内容？（）","options":[{"label":"A","text":"算法训练工具设计和优化方法"},{"label":"B","text":"数据整理方法"},{"label":"C","text":"智能应用方法"},{"label":"D","text":"算法测试工具原理和应用方法"}],"answer":"B,C","explanation":"数据整理方法、智能应用方法属于中级培训的内容。","mnemonic":"中级培训内容：数据整理方法+智能应用方法，算法设计优化和测试工具不属于"},{"id":767,"type":"multi","text":"下列选项中，属于非关系型数据库类型的有（）。","options":[{"label":"A","text":"MongoDB"},{"label":"B","text":"Redis"},{"label":"C","text":"PostgreSQL"},{"label":"D","text":"HBase"}],"answer":"A,B,D","explanation":"MongoDB、Redis、HBase都属于非关系型数据库，而PostgreSQL属于关系型数据库。","mnemonic":"非关系型数据库：MongoDB+Redis+HBase，PostgreSQL是关系型数据库"},{"id":768,"type":"multi","text":"下列选项中，因算法过拟合而导致评估指标产生误导的是（）。","options":[{"label":"A","text":"训练集准确率显著高于测试集准确率（如差距超过20%）"},{"label":"B","text":"模型在训练集上的精确度和召回率接近1且测试集指标显著低于训练集"},{"label":"C","text":"训练集上的错误率较高，但测试集的错误率很低"},{"label":"D","text":"训练集和测试集的准确率差距较小，且精确度较高"}],"answer":"A,B","explanation":"A：当训练集准确率显著高于测试集准确率时，这通常意味着模型过度拟合了训练集上的数据。这种情况会导致模型的泛化能力变差，导致评估指标失真，难以真实反映模型在未见过的数据上的表现。B：如果模型在训练集上达到了接近1的精确度和召回率，而测试集上有显著差距，这也通常是过拟合的表现。过拟合使得模型在训练数据上过度学习，丧失了对新数据的泛化能力，进而影响评估指标的真实性。C：训练集错误率高且测试集错误率低不符合过拟合的典型表现。过拟合通常表现为训练集错误率低而测试集错误率高。D：如果训练集和测试集的准确率差距较小，且精确度较高，通常表示模型没有发生过拟合，反而是良好的泛化能力，因此这种情况并不表明过拟合。","mnemonic":"过拟合误导指标：训练集远高于测试集准确率+训练集指标接近1而测试集低"},{"id":769,"type":"multi","text":"下列关于人机交互发展阶段的说法，正确的是（）。","options":[{"label":"A","text":"第一代人机交互是采用命令行界面的方式进行交互，用户需要记住一些特定的命令来操作"},{"label":"B","text":"第二代人机交互是采用图形用户界面（GUI）的方式进行交互，使得使用者可以通过“指针”直接在屏幕上选择和操作"},{"label":"C","text":"第三代人机交互是基于自然语言和语音识别技术的交互方式，用户只需要说出想要做的事情，机器便能够理解并执行相应指令"},{"label":"D","text":"第三代人机交互已实现无需任何设备的全脑电波控制，用户可直接通过思维操作所有智能系统。"}],"answer":"A,B,C","explanation":"命令行界面（CLI）确实是第一代人机交互的核心特征，用户通过键盘输入命令与计算机交互。图形用户界面（GUI）是第二代人机交互的代表，允许用户通过鼠标、触摸屏等设备来选择、操作图标和菜单。第三代人机交互通常是基于自然语言处理（NLP）和语音识别技术，例如语音助手（如Siri、Alexa等）便采用这种交互方式，第三代交互仍需要有设备的接入来操作智能系统。","mnemonic":"人机交互三代：命令行→GUI图形界面→自然语言语音识别，全脑电波控制尚未实现"},{"id":770,"type":"multi","text":"下列关于关联分析算法的说法，正确的有（ ）。","options":[{"label":"A","text":"Apriori算法是一种经典的关联规则学习算法"},{"label":"B","text":"FP-growth算法通过构建FP树来提高频繁项集的发现效率"},{"label":"C","text":"Eclat算法基于深度优先搜索策略"},{"label":"D","text":"关联分析只能用于小规模数据集"}],"answer":"A,B,C","explanation":"Apriori算法是最经典的挖掘频繁项集的算法，第一次实现了在大数据集上可行的关联规则提取。FP-growth算法采用前缀树的形式来表征数据，减少了扫描事务数据库的次数，通过递归地生成条件FP树来挖掘频繁项。Eclat算法是一种深度优先算法，采用垂直数据表示形式。","mnemonic":"关联分析三算法：Apriori经典+FP-growth建树+Eclat深度优先，不限小规模数据"},{"id":771,"type":"multi","text":"下列哪一项不能准确地阐释 “以用户为中心的设计宗旨”？（）","options":[{"label":"A","text":"设计师将自己的审美观念强加于用户"},{"label":"B","text":"设计师以用户的需求和期望为出发点，从而创造出更好的用户体验"},{"label":"C","text":"设计师只考虑产品的外观和功能，而忽略用户的感受和需求"},{"label":"D","text":"设计师只考虑自己的利益，而忽略用户的体验和需求"}],"answer":"A,C,D","explanation":"选项A设计师将自己的审美观念强加于用户，不符合“以用户为中心”的设计宗旨。选项B设计师以用户需求和期望为出发点，符合“以用户为中心”的设计宗旨。选项C设计师只考虑外观和功能，而忽略用户的需求和感受，不符合“以用户为中心”的设计宗旨。选项D设计师忽略用户体验而只关注个人或商业利益，违背了“以用户为中心”的设计宗旨。","mnemonic":"非用户中心设计：强加审美+只看外观功能+只顾自身利益，以用户需求期望为出发点才对"},{"id":772,"type":"multi","text":"在 PowerPoint 里，下列属于幻灯片切换效果的选项是（）。","options":[{"label":"A","text":"平滑"},{"label":"B","text":"淡入/淡出"},{"label":"C","text":"推入"},{"label":"D","text":"切入"}],"answer":"A,B,C,D","explanation":"幻灯片切换是在放映演示文稿期间，从一张幻灯片移至下一张幻灯片时出现的类似动画的效果。 添加幻灯片切换效果，使 PowerPoint 演示文稿生动生动。在PowerPoint中，常见的幻灯片切换效果包括平滑、淡入/淡出、推入、切入等。","mnemonic":"PPT切换效果：平滑+淡入淡出+推入+切入，ABCD全选"},{"id":773,"type":"multi","text":"为了让中级工作人员处理图像数据标注时保证数据的准确率，有哪些要点需要他们注意？（）","options":[{"label":"A","text":"若出现图像较模糊无法标注的则不标"},{"label":"B","text":"在被遮挡的情况下，遮挡部分需要脑补，但是不要脑补到图像外"},{"label":"C","text":"只标注形状大的物体，其他无需标注"},{"label":"D","text":"可以遗漏部分像素点"}],"answer":"A,B","explanation":"在指导中级工解决图像数据标注问题时，为了确保标注数据的准确率，需要注意的问题有:若出现图像较模糊无法标注的则不标、在被遮挡的情况下，遮挡部分需要脑补，但是不要脑补到图像外。","mnemonic":"图像标注要点：模糊不标+遮挡脑补不出界，大小都要标且不能遗漏像素"},{"id":774,"type":"multi","text":"下列哪项属于数据库管理系统的主要功能（）。","options":[{"label":"A","text":"数据定义功能"},{"label":"B","text":"数据操纵功能"},{"label":"C","text":"数据可视化功能"},{"label":"D","text":"硬件资源分配功能"}],"answer":"A,B","explanation":"数据库管理系统的主要功能有数据定义功能、数据操纵功能、数据库的运行管理、数据库的建立和维护功能、数据组织、存储和管理和数据通信功能。","mnemonic":"数据库管理系统功能：数据定义+数据操纵，可视化和硬件分配不是DBMS功能"},{"id":775,"type":"multi","text":"支持向量机算法的核函数有（）。","options":[{"label":"A","text":"线性核函数"},{"label":"B","text":"多项式核函数"},{"label":"C","text":"径向基函数"},{"label":"D","text":"sigmoid核函数"}],"answer":"A,B,C,D","explanation":"支持向量机算法中的核函数用于将输入空间映射到另一个更高维的空间中，以便于寻找线性可分的超平面。常见的核函数有线性核函数、多项式核函数、径向基函数等。线性核函数是最简单的核函数，直接将输入数据映射到原空间；多项式核函数采用多项式函数将原数据映射到更高维的空间；径向基函数则采用径向基函数来进行映射；sigmoid核函数也是一种支持向量机算法的核函数。","mnemonic":"SVM核函数四种：线性+多项式+径向基+sigmoid，ABCD全选"},{"id":776,"type":"multi","text":"在聚类分析的定义及特征方面，下列选项正确的是（）。","options":[{"label":"A","text":"聚类分析是一种有监督学习方法"},{"label":"B","text":"聚类分析应用广泛，可用于数据挖掘、图像分析等领域"},{"label":"C","text":"聚类分析可以发现数据中的噪声点（如DBSCAN）"},{"label":"D","text":"聚类分析的结果具有唯一确定性"}],"answer":"B,C","explanation":"聚类分析是一种无监督学习方法，其主要目的是将数据集划分为具有相似特征的不同组别。聚类分析的应用广泛，可用于数据挖掘、图像分析等领域。聚类分析需要使用距离矩阵计算数据之间的距离，可根据聚类方法的不同，得到不同数量的聚类结果。","mnemonic":"聚类分析特征：应用广泛+可发现噪声点，非有监督且结果不唯一"},{"id":777,"type":"multi","text":"在对神经网络进行训练时，有一种技术专门通过直接抑制过拟合现象，从而增强模型的泛化能力，这种技术是（）。","options":[{"label":"A","text":"Dropout"},{"label":"B","text":"L2正则化"},{"label":"C","text":"批量归一化"},{"label":"D","text":"激活函数ReLU"}],"answer":"A,B","explanation":"Dropout：Dropout 是一种常用的正则化技术，通过在训练过程中随机丢弃神经元，减少模型对特定输入的依赖，从而提高泛化能力。L2正则化：L2正则化通过向损失函数中加入权重的平方和惩罚项，能够限制模型的复杂度，防止过拟合，提高泛化能力。批量归一化：批量归一化通过标准化每一层的输入，能够加速神经网络的训练，但其设计目标并非直接抑制过拟合。激活函数ReLU：ReLU作为一种激活函数，并不会直接影响模型的泛化能力，它更多是解决了深层神经网络中梯度消失的问题，因此它不属于提高泛化能力的技术。","mnemonic":"抑制过拟合技术：Dropout随机丢弃+L2正则化惩罚权重，批归一化加速训练非防过拟合"},{"id":778,"type":"multi","text":"在文本数据处理流程中，下列哪项不属于特征工程的主要任务（）。","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据归一化"}],"answer":"A,C,D","explanation":"特征工程在文本数据处理流程中的主要任务是从原始的文本数据中提取出有意义的特征，用于后续的模型训练和预测。","mnemonic":"特征工程主要任务：仅特征提取，数据清洗、可视化、归一化都不属于"},{"id":779,"type":"multi","text":"下列选项中，属于 ETL 工具的是（）。","options":[{"label":"A","text":"Kettle"},{"label":"B","text":"MicrosoftSQLServerIntegrationServices(SSIS)"},{"label":"C","text":"InformaticaPowerCenter"},{"label":"D","text":"OracleDataIntegrator"}],"answer":"A,B,C,D","explanation":"MicrosoftSQLServerIntegrationServices(SSIS)和OracleDataIntegrator属于数据库厂商自带的ETL工具，Kettle和InformaticaPowerCenter属于第三方工具提供库，两种都是ETL工具。","mnemonic":"ETL工具四大金刚：Kettle+SSIS+Informatica+Oracle，ABCD全选"},{"id":780,"type":"multi","text":"下列选项里，哪些场景能够体现出计算机自动化程度高这一特点（）。","options":[{"label":"A","text":"利用计算机实行商场、仓库和企业管理"},{"label":"B","text":"飞机票联网预订"},{"label":"C","text":"银行联网储蓄"},{"label":"D","text":"项目管理"}],"answer":"A,B,C","explanation":"由于计算机的工作方式是将程序和数据先存放在机器内,工作时按程序规定的操作一步一步地自动完成，一般无须人工干预，因此自动化程度较高。在工农业生产、国防、文化教育、科学研究以及日常生活等诸多领域都有着广泛应用。例如，利用计算机实行商场、仓库和企业管理，或进行飞机票联网预订、银行联网储蓄等信息处理和管理，从而使我们的工作和生活获得了极大的便利。而项目管理往往需要人员的主观意识介入，及时识别风险和制定应对措施。","mnemonic":"计算机自动化高：商场管理+机票联网+银行联网，项目管理需人为干预"},{"id":781,"type":"multi","text":"下列关于短时谱和移动窗的说法，正确的是（）。","options":[{"label":"A","text":"长窗起到了时间上的平均作用。"},{"label":"B","text":"短窗具有较低的频率分辨率，较高的时间分辨率。"},{"label":"C","text":"短窗具有较好的时间分辨率，能够提取出语音信号中的短时变化，损失了频率分辨率。"},{"label":"D","text":"矩形窗和汉明窗的频谱特性都具有低通的性质，在截止频率处都比较尖锐，当其通带都比较窄时(窗越宽，其通带越窄)，加窗后得到的频谱能够很好逼近短时语音信号的频谱。"}],"answer":"A,B,C,D","explanation":"① 长窗具有较高的频率分辨率，较低的时间分辨率。从一个基音周期到另一个基音周期，共振峰是要发生变化的，这一点即使从语音波形上也能够看出来。然而如果采用较长的窗，这种变化便被模糊了，因为长窗起到了时间上的平均作用。② 短窗具有较低的频率分辨率，较高的时间分辨率。采用矩形窗时，能够从短时频谱中提取出共振峰从一个基音周期到另一个基音周期所发生的变化。当然，激励源的谐波的细致结构也从短时频谱图上消失了。③ 窗宽的选择需折中考虑。短窗具有较好的时间分辨率，能够提取出语音信号中的短时变化(这常常是分析的目的)，损失了频率分辨率。但应注意到，语音信号的基音周期提取范围很大。因此，窗宽的选择应当考虑到这个因素。④ 矩形窗和汉明窗的频谱特性都具有低通的性质，在截止频率处都比较尖锐，当其通带都比较窄时(窗越宽，其通带越窄)，加窗后得到的频谱能够很好逼近短时语音信号的频谱。窗越宽，逼近效果越好。","mnemonic":"短时谱和移动窗：长窗时间平均+短窗高时间低频率分辨率+窗越宽通带越窄，ABCD全对"},{"id":782,"type":"multi","text":"在算法测试的参数优化中，能够采用（）算法来优化超参数。","options":[{"label":"A","text":"遗传算法"},{"label":"B","text":"贝叶斯优化"},{"label":"C","text":"随机搜索"},{"label":"D","text":"网格搜索"}],"answer":"A,B,C,D","explanation":"遗传算法：一种基于进化策略的优化方法，能够有效地搜索超参数空间，适用于复杂的优化问题。贝叶斯优化：通过构建代理模型（通常是高斯过程回归），智能地选择超参数组合，通常比传统方法（如网格搜索和随机搜索）更高效。随机搜索：通过随机选择超参数组合来进行优化，适用于高维超参数空间，尤其是在没有明确的搜索空间边界时，能带来更好的效果。网格搜索：最传统的超参数优化方法，通过穷举所有可能的超参数组合来找到最佳配置，虽然方法简单，但计算开销较大。","mnemonic":"超参数优化四算法：遗传+贝叶斯+随机搜索+网格搜索，ABCD全选"},{"id":783,"type":"multi","text":"关于 RFM 模型的定义，下列说法错误的是（）。","options":[{"label":"A","text":"RFM模型是一种针对客户价值的分析方法"},{"label":"B","text":"RFM模型是一种用于评估产品质量的方法"},{"label":"C","text":"RFM模型是一种用于计算投资回报率的方法"},{"label":"D","text":"RFM模型是一种用于评估市场份额的方法"}],"answer":"B,C,D","explanation":"RFM模型是一种基于客户价值的分析方法，通过对客户的消费行为、购买习惯和交易历史进行分析，确定客户的价值并制定精细化的市场营销策略。","mnemonic":"RFM模型定义错误：非评估产品质量+非计算投资回报+非评估市场份额，是客户价值分析"},{"id":784,"type":"multi","text":"下列哪项属于较为常见的资源服务器（）。","options":[{"label":"A","text":"DNS服务器"},{"label":"B","text":"E-mail服务器"},{"label":"C","text":"Web服务器"},{"label":"D","text":"相控阵雷达"}],"answer":"A,B,C","explanation":"常见的资源服务器有DNS（域名解析）服务器、E-mail（电子邮件）服务器、Web（网页）服务器等。","mnemonic":"资源服务器三种：DNS+E-mail+Web服务器，雷达不是服务器"},{"id":785,"type":"multi","text":"在神经网络算法中，下列哪项通常不被用于防止过拟合问题（）。","options":[{"label":"A","text":"梯度下降算法"},{"label":"B","text":"L1正则化"},{"label":"C","text":"随机梯度下降算法"},{"label":"D","text":"Dropout算法"}],"answer":"A,C","explanation":"梯度下降算法：用于优化损失函数，不针对过拟合。L1正则化：通过惩罚项限制权重大小，有效防止过拟合。随机梯度下降算法：是梯度下降算法的一种变体，核心功能是优化损失函数，并非用于防止过拟合的技术。Dropout算法：通过随机丢弃神经元，有效防止过拟合。","mnemonic":"不防过拟合：梯度下降+随机梯度下降是优化算法，L1正则化和Dropout才防过拟合"},{"id":786,"type":"multi","text":"下列选项中，关于计算机运算器的说法正确的是（）。","options":[{"label":"A","text":"运算器通常跟控制器和寄存器统称为中央处理器，即CPU"},{"label":"B","text":"运算器是整个计算机系统的控制中心"},{"label":"C","text":"运算器的基本功能是从内存取指令和执行指令"},{"label":"D","text":"运算器的主要功能是对数据进行各种算术运算和逻辑运算。"}],"answer":"A,D","explanation":"运算器又称算术逻辑单元（ALU），它的主要功能是对数据进行各种算术运算和逻辑运算。在计算机中，任何复杂运算都会转化为基本的算术与逻辑运算，然后在运算器中完成。控制器是整个计算机系统的控制中心，它的基本功能是从内存取指令和执行指令。通常将运算器、控制器和寄存器统称为中央处理器，即CPU。","mnemonic":"运算器说法：运算器+控制器+寄存器=CPU，运算器做算术逻辑运算，控制中心是控制器"},{"id":787,"type":"multi","text":"智慧医疗所发挥的作用包含以下哪项？","options":[{"label":"A","text":"改善医疗服务"},{"label":"B","text":"提高医疗资源利用效率"},{"label":"C","text":"提升患者护理质量"},{"label":"D","text":"延缓治疗速度"}],"answer":"A,B,C","explanation":"智慧医疗的作用包括改善医疗服务、提高医疗资源利用效率、提升患者护理质量。","mnemonic":"智慧医疗三作用：改善服务+提高效率+提升护理，延缓治疗速度是反面"},{"id":788,"type":"multi","text":"关联分析的方法能够应用在以下哪些（）领域。","options":[{"label":"A","text":"市场营销"},{"label":"B","text":"医疗保健"},{"label":"C","text":"社交网络"},{"label":"D","text":"手写文字识别"}],"answer":"A,B,C","explanation":"关联分析的方法可以用于分析大量数据中的关联关系，关联分析在市场营销中广泛应用，例如通过购物篮分析发现顾客经常一起购买的商品组合，从而优化商品陈列、设计促销策略等。在医疗保健领域，关联分析可以用于发现疾病与症状之间的关联、药物与副作用之间的关系等，辅助医生进行诊断和治疗决策。关联分析可用于分析社交网络中的用户关系和互动模式。手写文字识别主要涉及图像处理和模式识别技术，与关联分析的方法和目标不同。","mnemonic":"关联分析应用领域：市场营销+医疗保健+社交网络，手写识别是模式识别不是关联分析"},{"id":789,"type":"multi","text":"在逻辑回归算法中，出现（）情况时，可能会导致模型的预测准确率降低。","options":[{"label":"A","text":"样本数量的增加"},{"label":"B","text":"特征维度的增加且冗余"},{"label":"C","text":"数据集中的缺失值增多"},{"label":"D","text":"数据集中的噪声增加"}],"answer":"B,C,D","explanation":"A：增加样本数量通常有助于提高模型的泛化能力，减少过拟合，因此不会导致预测准确度下降，反而有助于提升模型性能。B：当特征维度增加，尤其是在样本数量较少时，可能导致过拟合，使模型学习到数据中的噪声，降低模型在新数据上的准确度。C：数据集中的缺失值增多会影响模型的训练过程，因为缺失数据不能为模型提供有效的学习信息，可能导致模型性能下降。D：数据中的噪声会影响模型的学习过程，使得模型不能有效地捕捉数据的真实模式，从而导致预测准确度下降。","mnemonic":"逻辑回归准确率降低：特征冗余+缺失值多+噪声大，增加样本量反而有帮助"},{"id":790,"type":"multi","text":"下列哪项属于中级培训的实践训练内容？（）","options":[{"label":"A","text":"数据采集"},{"label":"B","text":"深度学习理论"},{"label":"C","text":"数据标注"},{"label":"D","text":"模型优化"}],"answer":"A,C","explanation":"数据采集、数据标注属于中级培训的实践训练。","mnemonic":"中级培训实践：数据采集+数据标注，深度学习理论和模型优化不属于"},{"id":791,"type":"multi","text":"下列属于语音信号线性预测分析的模型的是（）。","options":[{"label":"A","text":"AR模型"},{"label":"B","text":"MA模型"},{"label":"C","text":"ARMA模型"},{"label":"D","text":"MR模型"}],"answer":"A,B,C","explanation":"参数模型法是现代谱估计的主要内容，经常采用的模型有三种:自回归(autoregressive)模型，简称AR模型，它是一个全极点的模型;②移动平均(movingaverage)模型，简称MA模型，它是一个全零点模型;③自回归-移动平均模型，简称ARMA模型，它是一个既有零点又有极点的模型，","mnemonic":"语音线性预测三模型：AR自回归+MA移动平均+ARMA混合，没有MR模型"},{"id":792,"type":"multi","text":"下列选项中，属于文件系统的是（）。","options":[{"label":"A","text":"本地文件系统"},{"label":"B","text":"数据仓库"},{"label":"C","text":"网络文件系统"},{"label":"D","text":"分布式文件系统"}],"answer":"A,C,D","explanation":"常见文件系统包括本地文件系统、伪文件系统、网络文件系统、集群文件系统、分布式文件系统等。","mnemonic":"文件系统三类：本地+网络+分布式文件系统，数据仓库不是文件系统"},{"id":793,"type":"multi","text":"在 Python 中，（）库能够读取语音文件。","options":[{"label":"A","text":"audioop"},{"label":"B","text":"aifc"},{"label":"C","text":"wav"},{"label":"D","text":"Scikit-learn"}],"answer":"A,B,C","explanation":"对于语音文件的读取，可以使用Python的audioop、aifc、wav等库实现。。","mnemonic":"Python读语音文件：audioop+aifc+wav三库，Scikit-learn是机器学习库"},{"id":794,"type":"multi","text":"关于可用性设计，以下哪些描述是正确的？（）","options":[{"label":"A","text":"可用性设计的主要目标是让用户能够快速且有效地完成任务"},{"label":"B","text":"可用性设计只关注产品的外观和吸引力，不涉及操作流程"},{"label":"C","text":"可用性设计应该帮助用户在使用过程中避免犯错并提供修正措施"},{"label":"D","text":"可用性设计包括提高用户学习成本，使用户能在复杂环境下灵活操作"}],"answer":"A,C","explanation":"可用性设计的核心是提高产品的效力（有效性）和效率，确保用户能够顺利、快速地完成任务，这是可用性设计的核心目标之一。可用性设计的目标是降低用户的学习成本，使产品易于学习，而不是提高学习成本。提高学习成本会增加用户的使用难度和不满。可用性设计时要考虑用户操作错误的情况，并尽可能提供修正或恢复机制，提升用户体验。虽然吸引力是可用性的一部分，但可用性设计不仅仅关注外观，更加注重用户在使用过程中是否能够高效完成任务，操作流程的设计也至关重要。","mnemonic":"可用性设计正确描述：快速有效完成任务+避免犯错提供修正，非只关注外观非提高学习成本"},{"id":795,"type":"multi","text":"业务流程优化具体指的是什么（）。","options":[{"label":"A","text":"以提升企业绩效为目标"},{"label":"B","text":"对现有的业务流程进行分析、梳理，对其中存在的问题进行完善、改进"},{"label":"C","text":"增强部门间的横向协作，提升企业运作效率"},{"label":"D","text":"降低企业运营成本，增强企业的竞争力"}],"answer":"A,B,C,D","explanation":"业务流程优化指的是以提升企业绩效为目标，对现有的业务流程进行分析、梳理，对其中存在的问题进行完善、改进，实现部门间的无障碍沟通，增强部门间的横向协作，提升企业运作效率，降低企业运营成本，增强企业的竞争力。","mnemonic":"业务流程优化：提升绩效+分析改进+横向协作+降本增效，ABCD全选"},{"id":796,"type":"multi","text":"下列哪个步骤属于初级培训包含的内容范畴？（）","options":[{"label":"A","text":"数据采集和处理"},{"label":"B","text":"数据标注"},{"label":"C","text":"智能系统运维"},{"label":"D","text":"自然语言处理"}],"answer":"A,B,C","explanation":"数据采集和处理、数据标注、智能系统运维属于初级培训的内容。","mnemonic":"初级培训内容：数据采集处理+数据标注+智能运维，自然语言处理不属于初级"},{"id":797,"type":"multi","text":"职业道德的各项特征里，对工作的责任感具体表现在哪些方面（）。","options":[{"label":"A","text":"不推卸责任"},{"label":"B","text":"能够承担自己的职责"},{"label":"C","text":"维护公共利益"},{"label":"D","text":"严格履行岗位职责，保护公司机密"}],"answer":"A,B,C,D","explanation":"职业道德的特征中，对工作的责任感具体表现为：不推卸责任、能够承担自己的职责、维护企业利益和公共利益等。严格履行岗位职责，保护公司机密可以算是保护公司利益的一部分。","mnemonic":"工作责任感四表现：不推卸+承担职责+维护公益+履职保密，ABCD全选"},{"id":798,"type":"multi","text":"关于自助法的特点，下列说法正确的有哪些（）。","options":[{"label":"A","text":"自助法通过有放回的随机抽样生成多个训练集"},{"label":"B","text":"自助法可以帮助评估模型的稳定性和泛化能力"},{"label":"C","text":"自助法只能用于分类问题，不能用于回归问题"},{"label":"D","text":"自助法通过重抽样生成的训练集可以包含重复的样本"}],"answer":"A,B,D","explanation":"A正确。自助法的核心思想是从原始数据集进行有放回的随机抽样，从而生成多个训练集。每个训练集的样本数量通常与原始数据集相等。B正确。自助法的一个重要应用是评估模型的稳定性和泛化能力。通过生成多个训练集并评估模型的表现，可以估计模型对不同数据的适应性。C错误。自助法不仅限于分类问题，也可以用于回归问题。它在回归分析中同样可以通过重抽样生成多个样本集来评估模型性能。D正确。由于是有放回抽样，因此自助法生成的训练集可能包含重复的样本，这与传统的无放回抽样方法不同。","mnemonic":"自助法特点：有放回抽样+评估稳定性泛化+可含重复样本，不限分类也适用回归"},{"id":799,"type":"multi","text":"通常来说，在逻辑回归算法中，可用于提升模型性能的方法有（）。","options":[{"label":"A","text":"特征缩放"},{"label":"B","text":"正则化"},{"label":"C","text":"增大数据集"},{"label":"D","text":"随机森林集成"}],"answer":"A,B,C","explanation":"逻辑回归算法对于特征的缩放非常敏感，尤其是在使用梯度下降优化时，特征缩放有助于加速收敛，提高模型训练的效率和效果。正则化可以防止模型过拟合，通过引入L1或L2正则化项来惩罚模型复杂度，从而提升模型的泛化能力。增加数据量可以减少过拟合，并有助于提升模型的泛化能力，尤其是在数据集较小或噪声较大的情况下。随机森林是一个基于决策树的集成方法，它与逻辑回归无关，因此它不是提升逻辑回归性能的方法。因此，选项D是错误的。","mnemonic":"逻辑回归提升性能：特征缩放+正则化+增大数据集，随机森林是另一种算法"},{"id":800,"type":"multi","text":"以下哪类算法可看作是随机森林在集成结构或随机性设计上的优化或衍生版本？（）","options":[{"label":"A","text":"孤立森林算法"},{"label":"B","text":"Boosting算法"},{"label":"C","text":"Adaboost算法"},{"label":"D","text":"Extra-Trees算法"}],"answer":"A,D","explanation":"Extra-Trees算法：Extra-Trees与随机森林非常相似，区别在于Extra-Trees增加了更多的随机性。在构建树时，Extra-Trees不仅随机选择特征子集，还随机化决策树节点的分裂阈值，这样可以进一步提高模型的泛化能力，因此，Extra-Trees可以被看作是随机森林的变种。孤立森林：孤立森林继承了随机森林的​​集成架构​​和​​随机特征选择​​特性，因此属于衍生变种；但它主要用于异常检测（离群点检测）。Boosting算法和Adaboost算法：Boosting是另一种集成学习方法，主要通过对前一轮学习器的错误样本赋予更高权重来提高模型的准确性。Adaboost是Boosting的一种实现。它们与随机森林的核心思想不同，尤其是在集成方式和目标上，因此不应视为随机森林的变种。","mnemonic":"随机森林变种：孤立森林异常检测+Extra-Trees更多随机性，Boosting和Adaboost思想不同"},{"id":801,"type":"multi","text":"下列哪项是可以实现触控交互的设备？","options":[{"label":"A","text":"鼠标"},{"label":"B","text":"键盘"},{"label":"C","text":"触摸屏"},{"label":"D","text":"手写板"}],"answer":"C,D","explanation":"触控交互需要使用触控设备，触控设备包括触摸屏和手写板，可以通过手指或者笔触来实现交互操作；而鼠标和键盘不具备触控的功能。","mnemonic":"触控设备：触摸屏+手写板，鼠标键盘非触控(CD)"},{"id":802,"type":"multi","text":"下列属于职业道德所具备特征的是（）。","options":[{"label":"A","text":"间歇性"},{"label":"B","text":"职业性"},{"label":"C","text":"渐进性"},{"label":"D","text":"继承性"}],"answer":"B,D","explanation":"职业道德特征包括职业性、继承性、实践性、多样性。","mnemonic":"职业道德特征：职继实多——\"职业继承\"排除间歇渐进(BD)"},{"id":803,"type":"multi","text":"以下关于数据存储的描述，正确的有哪些（）。","options":[{"label":"A","text":"数据存储仅指将数据保存在硬盘中"},{"label":"B","text":"存储介质选择阶段，对于读写频率高且要求快速响应的数据，如电商平台的实时交易数据，更适合选择磁带作为存储介质"},{"label":"C","text":"数据存储的方式包括文件存储、块存储和对象存储等多种类型"},{"label":"D","text":"数据存储是指数据以某种格式记录在计算机内部或外部存储介质上"}],"answer":"C,D","explanation":"数据存储不仅可以将数据保存在硬盘上，还可以保存在光盘、磁带等存储介质中。对于读写频率高且要求快速响应的数据，磁带不适合，因为磁带读写速度慢，应该选择固态硬盘（SSD）等高速存储介质。数据存储的方式包括文件存储、块存储和对象存储等多种类型。数据存储是指数据以某种格式记录在计算机内部或外部存储介质上。","mnemonic":"数据存储：多介质多方式记录内外，排A\"仅硬盘\"B\"磁带快\"(CD)"},{"id":804,"type":"multi","text":"操作系统所追求的目标包括（）。","options":[{"label":"A","text":"管理资源"},{"label":"B","text":"提高效率"},{"label":"C","text":"方便使用"},{"label":"D","text":"开放环境"}],"answer":"A,B,C,D","explanation":"人们使用操作系统，最直截了当的目标是让用户更加有效和方便地使用计算机，同时也希望能充分发挥计算机硬件系统的最大效用，提高工作效率。操作系统的主要目标可归结为方便使用、扩充功能、管理资源、提高效率、开放环境。","mnemonic":"操作系统五目标：方便使用、扩充功能、管资源、提效率、开放环境，全选(ABCD)"},{"id":805,"type":"multi","text":"下列属于业务流程优化需要遵循的原则的是（）。","options":[{"label":"A","text":"以流程为导向"},{"label":"B","text":"基于现实"},{"label":"C","text":"循序渐进"},{"label":"D","text":"面向客户"}],"answer":"A,B,C,D","explanation":"业务流程优化需要遵循的十大原则有以流程为导向、基于现实、循序渐进、面向客户、结果导向、职责完整性、并行原则、价值增值、定义精确、IT支持等","mnemonic":"BPR优化十原则：流程导向、基于现实、循序渐进、面向客户等，全选(ABCD)"},{"id":806,"type":"multi","text":"下列选项中，不属于数据标注流程注意要点的是（ ）。","options":[{"label":"A","text":"C、D 均与正确的注意事项相悖，因此不属于数据标注流程注意事项。"},{"label":"B","text":"制定详尽的标注指南，确保标注的一致性"},{"label":"C","text":"不考虑数据安全与隐私，只关注标注任务本身"},{"label":"D","text":"仅由初级标注员进行标注，无需复审环节"}],"answer":"A,C,D","explanation":"暂无解析","mnemonic":"数据标注要点：B制定指南是对的，ACD都不属于正确要点(ACD)"},{"id":807,"type":"multi","text":"在人机交互设计流程的原型设计阶段，需要考虑的问题是下列哪项？","options":[{"label":"A","text":"界面布局"},{"label":"B","text":"交互方式"},{"label":"C","text":"功能模块"},{"label":"D","text":"概念设计"}],"answer":"A,B,C","explanation":"在人机交互设计流程中，原型设计阶段需要考虑界面布局、交互方式、功能模块等问题。概念设计是设计流程的一部分，但它通常发生在原型设计阶段之前，用于确定设计的基本方向和理念。","mnemonic":"原型设计三考虑：界面布局+交互方式+功能模块，概念设计在前一阶段(ABC)"},{"id":808,"type":"multi","text":"人与计算机交互时，用户接收计算机输出的信息并向计算机输入信息，这一过程主要是通过什么感知来完成的？","options":[{"label":"A","text":"视觉"},{"label":"B","text":"听觉"},{"label":"C","text":"触觉"},{"label":"D","text":"味觉"}],"answer":"A,B,C","explanation":"人与计算机的交互过程中，用户接受计算机输出的信息，向计算机输入信息，这个过程主要是通过视觉、听觉和触觉感知完成的。","mnemonic":"人机交互感知：视听触三觉，味觉不参与(ABC)"},{"id":809,"type":"multi","text":"关于数据增强的使用，下列说法不正确的是（）。","options":[{"label":"A","text":"数据增强可以提高模型的鲁棒性和泛化能力"},{"label":"B","text":"数据增强通常只在训练集上进行，测试集一般保持原样，以确保评估的准确性。"},{"label":"C","text":"图像数据的数据增强只能对图像进行旋转、缩放、翻转等基本操作"},{"label":"D","text":"数据增强技术对于所有类型的数据都适用"}],"answer":"C,D","explanation":"图像数据增强的操作不仅仅限于旋转、缩放、翻转，还包括扭曲、剪裁、色彩变换等多种操作，选项C错误；数据增强不是所有类型的数据都适用，不同类型的数据需要使用对应的增强方法进行处理，选项D错误","mnemonic":"数据增强不正确：C\"只能基本操作\"D\"所有数据都适用\"都错(CD)"},{"id":810,"type":"multi","text":"诚实公正的基本要求包含哪些内容（）。","options":[{"label":"A","text":"公正地对待所有相关方"},{"label":"B","text":"隐瞒重要信息"},{"label":"C","text":"利用职务之便谋取个人私利"},{"label":"D","text":"及时、清晰地向相关方提供信息"}],"answer":"A,D","explanation":"根据诚实公正的基本要求，从业人员要做到以下几点，一、诚实，从业人员应该说实话，不得故意虚假陈述或隐瞒事实。提供准确、真实和完整的信息，不得误导他人。二、公正，从业人员应该公正地对待所有相关方，不偏袒任何一方。基于客观事实和公正标准做出决策和评估。三、透明，从业人员应该及时、清晰地向相关方提供信息，并确保相关方理解信息的真实性和重要性。遵守披露要求，不得隐瞒重要信息。四、忠诚和权益保护，从业人员应该忠诚于雇主或客户的利益，并保护他们的权益。不得利用职务之便谋取个人私利，也不得损害他人的权益。因此AD选项符合题目要求。","mnemonic":"诚实公正要求：公正对待+及时提供信息，隐瞒和私利是反面(AD)"},{"id":811,"type":"multi","text":"下列哪项属于阈值分割的步骤（）。","options":[{"label":"A","text":"分割像素"},{"label":"B","text":"确定分割阈值"},{"label":"C","text":"将分割阈值与像素灰度值进行比较，以分割图像的像素"},{"label":"D","text":"检测边缘像素"}],"answer":"B,C","explanation":"阈值分割是一种应用广泛的图像分割方法，主要有两个步骤:(1)确定需要分割的阈值;(2)将分割阈值与像素灰度值进行比较，以分割图像的像素。其中，确定阈值是图像分割的关键，一个合适的阈值可以完全分割图像。在确定值后，将阈值与像素灰度值加以比较，可以并行开展像素分割并将分割结果直接用于图像区域。","mnemonic":"阈值分割两步走：定阈值+比灰度值分割像素(BC)"},{"id":812,"type":"multi","text":"可用于基于边缘的图像分割方法的算法是（）。","options":[{"label":"A","text":"K-Means聚类算法"},{"label":"B","text":"Canny算子"},{"label":"C","text":"LoG算子"},{"label":"D","text":"均值漂移算法"}],"answer":"B,C","explanation":"K-Means聚类算法是通过无监督学习基于像素特征对图像进行分割，但它并不依赖于图像的边缘信息。Canny算子是一种常用的边缘检测算法，用于检测图像中的边缘信息。LoG算子是由Marr提出的边缘检测算子，因此有时又被称为Marr算子。均值漂移算法是一种基于区域的分割方法，主要通过像素特征的密度估计来进行分割，而不是依赖于边缘信息。","mnemonic":"边缘分割算子：Canny+LoG，K-Means聚类和均值漂移非边缘法(BC)"},{"id":813,"type":"multi","text":"下列关于《中华人民共和国劳动合同法》中有关试用期的规定，说法正确的是（）。","options":[{"label":"A","text":"劳动合同期限一年以上不满三年的，试用期不得超过二个月"},{"label":"B","text":"同一用人单位与同一劳动者只能约定一次试用期"},{"label":"C","text":"试用期包含在劳动合同期限内。劳动合同仅约定试用期的，试用期不成立，该期限为劳动合同期限"},{"label":"D","text":"以完成一定工作任务为期限的劳动合同或者劳动合同期限不满三个月的，试用期不得超过一个月"}],"answer":"A,B,C","explanation":"根据《中华人民共和国劳动合同法》第十九条规定，劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合同，试用期不得超过六个月。同一用人单位与同一劳动者只能约定一次试用期。以完成一定工作任务为期限的劳动合同或者劳动合同期限不满三个月的，不得约定试用期。试用期包含在劳动合同期限内。劳动合同仅约定试用期的，试用期不成立，该期限为劳动合同期限。","mnemonic":"试用期：1-3年不超2月、只约一次、仅约试用期则不成立，D说\"不满三月可一月\"错(ABC)"},{"id":814,"type":"multi","text":"依据《计算机软件保护条例》的相关规定，下列行为需要承担法律责任的是（）。","options":[{"label":"A","text":"软件复制品的制作者不能证明其制作有合法授权"},{"label":"B","text":"软件开发者开发的软件由于可供选用的表达方式有限而与已经存在的软件相似"},{"label":"C","text":"软件复制品的发行者不能证明其发行有合法来源"},{"label":"D","text":"软件复制品的出租者不能证明其出租的复制品有合法来源"}],"answer":"A,C,D","explanation":"《计算机软件保护条例》第二十八条规定，软件复制品的出版者、制作者不能证明其出版、制作有合法授权的，或者软件复制品的发行者、出租者不能证明其发行、出租的复制品有合法来源的，应当承担法律责任。第二十九条规定软件开发者开发的软件，由于可供选用的表达方式有限而与已经存在的软件相似的，不构成对已经存在的软件的著作权的侵犯。","mnemonic":"软件保护条例：制作无授权+发行无来源+出租无来源担责，B表达有限相似不侵权(ACD)"},{"id":815,"type":"multi","text":"在选择 ETL 数据整合工具时，需要考虑的特性有（）。","options":[{"label":"A","text":"数据源和目标系统的兼容性"},{"label":"B","text":"数据转换能力"},{"label":"C","text":"工具的颜色主题"},{"label":"D","text":"良好的集成性和开放性"}],"answer":"A,B,D","explanation":"在选择ETL数据整合工具时，需要考虑的关键特性包括数据源和目标系统的兼容性，以确保工具能够连接到各种数据源并加载到目标系统；强大的数据转换能力，用于处理复杂的数据清洗、映射和聚合逻辑；以及良好的集成性和开放性，以便工具能够与其他系统无缝集成并支持扩展。相比之下，工具的颜色主题对ETL工具的功能和性能并无实质性影响，不应作为主要考量因素。","mnemonic":"选ETL工具：兼容性+转换力+集成开放性，颜色主题无关紧要(ABD)"},{"id":816,"type":"multi","text":"下列属于 jieba 分词的分词模式的是（）。","options":[{"label":"A","text":"全模式"},{"label":"B","text":"精确模式"},{"label":"C","text":"搜索模式"},{"label":"D","text":"识别模式"}],"answer":"A,B,C","explanation":"jieba分词提供了四种分词模式：精确模式、全模式、搜索模式和paddle模式。","mnemonic":"jieba分词三模式：全模式+精确模式+搜索模式，无\"识别模式\"(ABC)"},{"id":817,"type":"multi","text":"jieba 分词的使用规范包含哪些步骤（）。","options":[{"label":"A","text":"导入jieba分词库"},{"label":"B","text":"手动词性标注"},{"label":"C","text":"加载自定义词典"},{"label":"D","text":"选择分词模式"}],"answer":"A,C,D","explanation":"jieba分词的使用规则包括安装jieba分词库、导入jieba分词库、选择分词模式、加载自定义词典、获取分词结果等步骤。","mnemonic":"jieba使用步骤：导入库+加载词典+选模式，手动标注不属于(ACD)"},{"id":818,"type":"multi","text":"计算机在标准办公处理方面的主要应用有哪些（）。","options":[{"label":"A","text":"电子邮件"},{"label":"B","text":"电子表格"},{"label":"C","text":"文字处理"},{"label":"D","text":"音频处理"}],"answer":"A,B,C","explanation":"计算机在办公处理中的主要应用包括电子邮件、电子表格、文字处理、演示文稿、图像处理等。D项是多媒体处理中的应用，需借助专业软件（如Audacity），通常不纳入标准办公处理范畴。","mnemonic":"标准办公三应用：邮件+表格+文字处理，音频是多媒体处理(ABC)"},{"id":819,"type":"multi","text":"在业务流程重组（BPR）中，哪些原则对提高客户满意度有帮助（）。","options":[{"label":"A","text":"流程重组始于对客户需求的深度理解与全面把握"},{"label":"B","text":"业务流程体系要体现整体服务的思路"},{"label":"C","text":"流程重组应体现服务重心前移原则"},{"label":"D","text":"成功的业务流程重组应同时关注内部运营效率和有效性的提高"}],"answer":"A,B,C,D","explanation":"提升客户满意度的原则包括：流程重组始于对客户需求的深度理解与全面把握（A）。业务流程体系要体现整体服务的思路（B）。流程重组应体现服务重心前移原则（C）。成功的业务流程重组应同时关注内部运营效率和有效性的提高（D），以提供高质量的产品和服务。","mnemonic":"BPR提高客户满意度：理解需求+整体服务+重心前移+内部效率，全选(ABCD)"},{"id":820,"type":"multi","text":"下列哪些技术属于自然交互技术的构成部分？（）","options":[{"label":"A","text":"多点触控"},{"label":"B","text":"语音识别"},{"label":"C","text":"扫描仪图像识别"},{"label":"D","text":"眼动跟踪"}],"answer":"A,B,D","explanation":"扫描仪图像识别并不属于自然交互技术，虽然它涉及图像处理，但主要用于图像扫描和存储，而非与用户的自然互动。多点触控技术是自然交互技术的重要组成部分，广泛应用于触摸屏设备中，允许用户通过手指触摸屏幕实现操作。语音识别技术也是自然交互技术的一部分，它通过识别用户的语音命令或指令来实现设备控制。眼动跟踪技术是自然交互技术的一部分，能够通过追踪用户眼球运动来分析其关注点，常用于行为研究和界面优化。","mnemonic":"自然交互技术：多点触控+语音识别+眼动跟踪，扫描仪非自然交互(ABD)"},{"id":821,"type":"multi","text":"下列关于特征选择方法的描述，正确的是（）。","options":[{"label":"A","text":"过滤式方法通过评估每个特征与目标变量之间的统计关系来选择特征，独立于任何学习算法"},{"label":"B","text":"包裹式方法通过训练模型来评估特征子集的好坏，可以考虑特征之间的相互作用"},{"label":"C","text":"嵌入式方法是在模型训练过程中进行特征选择，能够同时考虑模型的学习能力和特征选择"},{"label":"D","text":"主成分分析（PCA）是一种常见的基于模型的特征选择方法，通过最大化类间差异来选择特征"}],"answer":"A,B,C","explanation":"A选项正确。过滤式方法（Filter Method）根据统计指标如卡方检验、信息增益等来评估特征与目标变量的相关性，并选择重要的特征。这类方法与学习算法无关，通常用于特征的初步筛选。B选项正确。包裹式方法（Wrapper Method）通过训练模型来评估不同特征子集的性能，并选择最优的特征子集。由于它考虑了特征之间的相互作用，因此能够更好地模拟模型的实际性能。C选项正确。嵌入式方法（Embedded Method）通过在训练过程中进行特征选择，能够有效结合学习算法和特征选择过程，通常具有较好的性能和较低的计算复杂度。D选项错误。主成分分析（PCA）是一种降维方法，它通过计算数据中的方差最大化的方向来转换特征，而不是直接选择与输出变量关系最强的特征。PCA与类间差异无关，主要用于降低数据维度。","mnemonic":"特征选择三法都对：过滤式独立统计+包裹式训练评估+嵌入式训练中选，PCA是降维非选择(ABC)"},{"id":822,"type":"multi","text":"在下面哪些应用场景里，选用采样模式作为输入模式是最适合的？（）","options":[{"label":"A","text":"需要实时采集来自传感器的数据，如温度、湿度传感器"},{"label":"B","text":"视频监控系统需要处理连续的图像数据流"},{"label":"C","text":"游戏中的鼠标点击、键盘按键需要立即响应"},{"label":"D","text":"表单填写应用，用户按需提交数据"}],"answer":"A,B","explanation":"选项A是正确的。采样模式适合需要持续采样、实时更新的场景。传感器数据流通常是连续的，且应用程序需要实时获取最新数据，因此适合采样模式。选项B是正确的。视频监控系统通常需要实时采集和处理连续的视频流，采样模式能够持续地读取视频数据，而不干扰其他任务的执行。选项C的描述适合事件模式，而不是采样模式。游戏中的用户输入通常要求即时响应，并通过事件队列来处理输入事件，因此事件模式更加合适。选项D的描述适合请求模式，因为表单填写是按需触发的输入，不需要实时或连续的数据采样。请求模式适用于这类低频、按需触发的场景。","mnemonic":"采样模式：传感器实时采集+视频监控连续流，游戏用事件模式表单用请求模式(AB)"},{"id":823,"type":"multi","text":"下面哪一个步骤属于 jieba 分词的基本步骤（）。","options":[{"label":"A","text":"选择分词模式"},{"label":"B","text":"获取分词结果"},{"label":"C","text":"载入自定义词典"},{"label":"D","text":"导入jieba库"}],"answer":"A,B,C,D","explanation":"jieba分词基本步骤包括：安装和导入jieba、选择分词模式、载入自定义词典、获取分词结果。","mnemonic":"jieba基本步骤：导入+选模式+载词典+获结果，全选(ABCD)"},{"id":824,"type":"multi","text":"具有代表性的预训练语言模型的有（）。","options":[{"label":"A","text":"ELMo模型"},{"label":"B","text":"XLNet模型"},{"label":"C","text":"BERT模型"},{"label":"D","text":"TF-IDF"}],"answer":"A,B,C","explanation":"具有代表性的预训练语言模型方法包括ELMo模型，GPT模型，BERT模型，ROBERTa模型，XLNet模型等。","mnemonic":"预训练语言模型：ELMo+XLNet+BERT，TF-IDF是统计方法非预训练(ABC)"},{"id":825,"type":"multi","text":"运用中文分词模型时，哪种调参方式能够有效增强模型的性能（）。","options":[{"label":"A","text":"调整词典的大小，删除低频词或添加高频词"},{"label":"B","text":"调整正则化系数，平衡模型的拟合程度和过拟合风险"},{"label":"C","text":"调整分词模型的超参数，如窗口大小、上下文长度等"},{"label":"D","text":"使用分布式训练方法，增大训练数据量"}],"answer":"A,B,C,D","explanation":"中文分词模型的优化不仅仅在于精细的模型设计和有效的算法实现，更需要对模型的各种调参参数进行细致的调试和策略优化。例如，通过调整词典的大小或添加高频词可以选择仅使用有效的计数特征，避免过多的数据噪声和干扰。而调整正则化系数和超参数则可以动态平衡模型的拟合程度和泛化性能。在实际使用中，还可以通过并行训练等分布式方法来增加数据量和加速训练过程。","mnemonic":"中文分词调参：调词典+调正则化+调超参+分布式训练，全选(ABCD)"},{"id":826,"type":"multi","text":"计算机的硬件是由哪些部分组成的（）。","options":[{"label":"A","text":"存储器"},{"label":"B","text":"输入设备和输出设备"},{"label":"C","text":"控制器"},{"label":"D","text":"运算器"}],"answer":"A,B,C,D","explanation":"根据 ​冯·诺依曼体系结构，计算机硬件由运算器、控制器、存储器、输入设备和输出设备五个基本部分组成。","mnemonic":"冯诺依曼五部件：存储器+输入输出+控制器+运算器，全选(ABCD)"},{"id":827,"type":"multi","text":"下列选项中，属于 K - 近邻算法关键特性或参数的是（）。","options":[{"label":"A","text":"需要选择合适的距离度量方法"},{"label":"B","text":"需要预先设定K的值"},{"label":"C","text":"需要使用线性模型进行训练"},{"label":"D","text":"算法的计算复杂度与训练数据集的大小无关"}],"answer":"A,B","explanation":"A：KNN算法依赖于距离度量方法（如欧式距离、曼哈顿距离等），选择合适的距离度量方法对于算法的性能至关重要。B：K的取值是KNN算法的关键参数，表示算法中“邻居”的数量。选择合适的K值对于模型的精度和泛化能力非常重要。C：KNN不是基于线性模型的算法，而是基于邻近样本的标签进行分类或回归。因此，选项C是错误的。D：KNN算法的计算复杂度与训练数据集的大小相关，因为它需要计算待分类样本与所有训练样本的距离。因此，选项D是错误的。","mnemonic":"KNN关键：选距离度量+设K值，非线性模型且复杂度与数据量相关(AB)"},{"id":828,"type":"multi","text":"在文本向量化模型里，典型的预训练语言模型是（）。","options":[{"label":"A","text":"ELMO"},{"label":"B","text":"Word2Vec"},{"label":"C","text":"BOW"},{"label":"D","text":"BERT"}],"answer":"A,D","explanation":"典型的预训练语言模型有:ELMO方法，设计了双向的语言模型的预训练任务，对前向和后向语言模型进行了拼接;BERT方法，设计了掩码语言模型任务，可以利用双向的上下文信息。","mnemonic":"预训练语言模型：ELMO+BERT，Word2Vec和BOW是传统方法(AD)"},{"id":829,"type":"multi","text":"以下哪项不属于 SWOT 模型的核心内容（）。","options":[{"label":"A","text":"公司能力分析"},{"label":"B","text":"公司目标分析"},{"label":"C","text":"公司外部环境分析"},{"label":"D","text":"公司财务状况分析"}],"answer":"A,B,D","explanation":"SWOT模型的主要内容包括对企业内部的优劣势和外部环境的机会和威胁进行分析和评估，从而制定相应的战略。选项C是外部环境分析，属于SWOT模型的主要内容。","mnemonic":"SWOT不含：能力分析、目标分析、财务分析都不是，只有外部环境分析属于(ABD)"},{"id":830,"type":"multi","text":"属于图像去噪的传统算法有哪些（）。","options":[{"label":"A","text":"基于滤波器的方法"},{"label":"B","text":"小波变换方法"},{"label":"C","text":"基于稀疏表示的方法"},{"label":"D","text":"基于统计学习的方法"}],"answer":"A,B,C,D","explanation":"图像去噪的传统算法主要包括基于滤波器的方法、小波变换方法、基于稀疏表示的方法和基于统计学习的方法。","mnemonic":"图像去噪传统算法：滤波器+小波+稀疏表示+统计学习，全选(ABCD)"},{"id":831,"type":"multi","text":"在进行可用性评估时，下列哪些方法属于测试类方法？（）","options":[{"label":"A","text":"用户测试"},{"label":"B","text":"启发式评估"},{"label":"C","text":"问卷调查"},{"label":"D","text":"放声思考法"}],"answer":"A,C,D","explanation":"可用性评估方法分为诊查式方法和测试式方法。测试式方法包括实际用户参与的评估方式，这类方法帮助设计人员从用户的角度了解产品的可用性。常见的测试式方法包括用户测试、问卷调查、放声思考法等。诊查式方法则通常由专家进行评估，不涉及实际用户。常见的诊查式方法有启发式评估。","mnemonic":"可用性测试类方法：用户测试+问卷+放声思考，启发式是诊查式(ACD)"},{"id":832,"type":"multi","text":"RFM 模型的分析过程包含哪些内容（）。","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"维度打分"},{"label":"C","text":"用户分类"},{"label":"D","text":"分值计算"}],"answer":"A,B,D","explanation":"RFM模型的分析过程包括数据清洗、维度打分、分值计算和客户分层。","mnemonic":"RFM分析：数据清洗+维度打分+分值计算+客户分层，用户分类非标准术语(ABD)"},{"id":833,"type":"multi","text":"数据标注的类型包括（）。","options":[{"label":"A","text":"图像类数据标注"},{"label":"B","text":"文本类数据标注"},{"label":"C","text":"语音类数据标注"},{"label":"D","text":"视频类数据标注"}],"answer":"A,B,C,D","explanation":"数据标注分为4种基本类型，包括图像类数据标注、文本类数据标注、语音类数据标注、视频类数据标注及其他类数据标注。","mnemonic":"数据标注四类型：图像+文本+语音+视频，全选(ABCD)"},{"id":834,"type":"multi","text":"关于文本向量化模型的应用，下列说法正确的是（）。","options":[{"label":"A","text":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式"},{"label":"B","text":"常见的文本向量化模型有TF-IDF、Word2Vec、BOW等"},{"label":"C","text":"文本向量化只适用于英文文本"},{"label":"D","text":"文本向量化可用于文本分类、情感分析等任务"}],"answer":"A,B,D","explanation":"文本向量化的目的是将自然语言转换成计算机可处理的数字形式，是自然语言处理中必不可少的一环，可用于文本分类、情感分析等任务。常见的文本向量化模型有TF-IDF、Word2Vec、BOW等，而且这些模型并不仅限于英文文本。","mnemonic":"文本向量化：转数字形式+TF-IDF/W2V/BOW+用于分类情感分析，不限英文(ABD)"},{"id":835,"type":"multi","text":"在业务流程重组中，简化过程需遵循的原则有哪些（）。","options":[{"label":"A","text":"纵向集成"},{"label":"B","text":"横向集成"},{"label":"C","text":"增加检查和校对"},{"label":"D","text":"单点对顾客"}],"answer":"A,B,D","explanation":"简化过程的原则包括纵向集成（A）、横向集成（B）、减少检查、校对和控制（而不是增加，因此C错误）、单点对顾客（D）、单库提供信息、一条路径到达输出、并行工程和灵活选择过程连接。","mnemonic":"BPR简化原则：纵横集成+单点对顾客，减少而非增加检查校对(ABD)"},{"id":836,"type":"multi","text":"下列哪项技术不能用于图像处理中的图像增强（）。","options":[{"label":"A","text":"傅里叶变换"},{"label":"B","text":"直方图均衡化"},{"label":"C","text":"边缘检测"},{"label":"D","text":"图像压缩"}],"answer":"A,C,D","explanation":"均值滤波/中值滤波和直方图均衡化，它们是图像增强最强大工具，图像增强的目的是提高图像的质量或使特定的特征显得更加突出。","mnemonic":"不能图像增强：傅里叶变换+边缘检测+图像压缩都不是，直方图均衡化才是(ACD)"},{"id":837,"type":"multi","text":"在聚类效果评估指标中，能够帮助选择最优聚类数的是（）指标。","options":[{"label":"A","text":"DB指数"},{"label":"B","text":"轮廓系数"},{"label":"C","text":"CH指数"},{"label":"D","text":"FMI指数"}],"answer":"A,B,C","explanation":"DB指数通过类内紧密度与类间分离度的比值衡量聚类质量，值越小表示聚类效果越好，最优聚类数k对应DB指数的最小值。轮廓系数结合类内紧密度和类间分离度，值越大（范围[-1, 1]）表示聚类效果越优，最优k对应轮廓系数的最大值。CH指数通过类间方差与类内方差的比值衡量聚类效果，值越大表示类间差异显著、类内样本紧密，最优k对应CH指数的最大值。FMI指数用于评估聚类结果与真实标签的一致性，需已知真实标签，无法直接用于无监督场景下的聚类数选择。","mnemonic":"选最优聚类数：DB指数+轮廓系数+CH指数，FMI需真实标签(ABC)"},{"id":838,"type":"multi","text":"UAN 模型具有哪些特点？（）","options":[{"label":"A","text":"UAN模型通过符号语言表达用户的行为序列及界面状态变化。"},{"label":"B","text":"UAN模型强调通过图形化方式来展示用户行为，减少文字描述。"},{"label":"C","text":"UAN模型可以清晰表示任务中的条件控制、动作序列以及界面状态反馈。"},{"label":"D","text":"UAN模型适用于界面设计中用户行为的建模"}],"answer":"A,C,D","explanation":"选项A是正确的，UAN模型通过符号语言来表达用户行为、界面状态变化和交互逻辑，这是它的核心特点。选项B是错误的，UAN模型并非通过图形化方式，而是通过符号语言来表达用户行为，注重简洁的符号描述。选项C是正确的，UAN模型通过符号化的方式可以清晰表达条件控制、动作序列以及界面的状态反馈，适合任务建模。选项D是正确的，UAN适合建模用户行为。","mnemonic":"UAN模型特点：符号语言+条件控制动作序列+用户行为建模，非图形化方式(ACD)"},{"id":839,"type":"multi","text":"（）是对图像边缘的描述。","options":[{"label":"A","text":"边缘法线方向"},{"label":"B","text":"边缘方向"},{"label":"C","text":"边缘强度"},{"label":"D","text":"边缘颜色"}],"answer":"A,B,C","explanation":"边缘的描述包含以下几个方面:(1)边缘法线方向--在某点灰度变化最剧烈的方向，与边缘方向垂直(2)边缘方向--与边缘法线方向垂直，是目标边界的切线方向。(3)边缘强度--沿边缘法线方向图像局部的变化强度的量度,","mnemonic":"图像边缘描述三要素：法线方向+边缘方向+边缘强度，无边缘颜色(ABC)"},{"id":840,"type":"multi","text":"人机交互界面设计的基本流程包含哪些、方案改进阶段、构架原型阶段、用户验证阶段？","options":[{"label":"A","text":"编程实现阶段"},{"label":"B","text":"需求阶段"},{"label":"C","text":"分析设计阶段"},{"label":"D","text":"调研验证阶段"}],"answer":"B,C,D","explanation":"人机交互界面设计基本流程共分为6个阶段，分别为需求阶段、分析设计阶段、调研验证阶段、方案改进阶段、构架原型阶段、用户验证阶段。","mnemonic":"人机交互界面设计六阶段：需求+分析设计+调研验证+方案改进+构架原型+用户验证(BCD)"},{"id":841,"type":"multi","text":"下列关于 UAN 模型的描述及应用，正确的有哪些？（）","options":[{"label":"A","text":"UAN模型是一种简单的符号语言"},{"label":"B","text":"UAN模型允许设计者选择合理的抽象层次来描述复杂的界面设计和交互任务"},{"label":"C","text":"UAN模型 采用半层次结构化的描述方法，提供两种不同的符号来分别描述抽象任务和用户执行的具体动作"},{"label":"D","text":"UAN模型允许设计者选择合理的抽象层次来描述复杂的界面设计和交互任务。"}],"answer":"A,B,C,D","explanation":"UAN(User Action Notation)[8]是一种简单的任务建模语言，主要使用符号语言来描述用户的操作序列以及在进行操作时所用的界面。UAN 采用半层次结构化的描述方法，提供两种不同的符号来分别描述抽象任务和用户执行的具体动作，允许设计者选择合理的抽象层次来描述复杂的界面设计和交互任务。UAN 规范由两部分组成，一部分描述任务之间的时序关系，一部分用表格的形式描述基本任务。","mnemonic":"UAN模型：简单符号语言+半层次结构+合理抽象层次+BD重复，全选(ABCD)"},{"id":842,"type":"multi","text":"在各类任务分析方法中，（）属于面向对象的分析手段。","options":[{"label":"A","text":"工序约束陈述"},{"label":"B","text":"用例图"},{"label":"C","text":"顺序图"},{"label":"D","text":"情节分析"}],"answer":"B,C","explanation":"工序约束陈述（选项A）：工序约束陈述更偏向​​结构化分析方法​​，通常用于描述系统流程中的操作顺序和限制条件（如工业制造中的装配流程），与面向对象强调的封装、继承等特性无关。用例图（选项B）：用例图主要用于展示不同用户角色和系统功能之间的交互关系，用来概括有关参与者和用例信息的图形化模型。顺序图（选项C）：顺序图展示了任务执行过程中的时间顺序，描述了任务步骤之间的依赖和交互，帮助理解任务的顺序关系。情节分析（选项D）：情节分析主要用于​​文学或叙事结构研究​​（如小说中的角色发展、冲突设计），或商业流程中的故事板设计，属于需求描述手段而非面向对象建模工具。","mnemonic":"面向对象分析：用例图+顺序图，工序约束是结构化、情节分析是叙事(BC)"},{"id":843,"type":"multi","text":"PEST 模型着重分析企业所处的外部环境，它的核心构成要素包含（）。","options":[{"label":"A","text":"政治环境"},{"label":"B","text":"经济环境"},{"label":"C","text":"社会环境"},{"label":"D","text":"技术环境"}],"answer":"A,B,C,D","explanation":"PEST模型主要考察的是企业外部环境，因此其主要内容包括政治、经济、社会和技术四个方面。","mnemonic":"PEST四要素：政治+经济+社会+技术，首字母对应PEST，全选(ABCD)"},{"id":844,"type":"multi","text":"在应用逻辑回归模型时，能够解决样本不平衡问题的策略包括（）。","options":[{"label":"A","text":"过采样（over-sampling）"},{"label":"B","text":"欠采样（under-sampling）"},{"label":"C","text":"调整分类阈值（阈值移动）"},{"label":"D","text":"ROC曲线分析"}],"answer":"A,B,C","explanation":"样本不平衡问题常常会导致分类器的准确率下降，而逻辑回归算法可以通过过采样、欠采样和调整阈值等方法解决这个问题。ROC曲线分析是评估分类器性能的方法，不能直接用于解决样本不平衡问题。因此选项A、B、C是正确答案。","mnemonic":"逻辑回归解决样本不平衡：过采样+欠采样+调阈值，ROC是评估不是解决(ABC)"},{"id":845,"type":"multi","text":"对于漏斗分析，下列说法正确的是（）。","options":[{"label":"A","text":"漏斗分析只适用于线上购物网站"},{"label":"B","text":"漏斗分析可以用来分析用户的流失率"},{"label":"C","text":"漏斗分析能够精确计算转化率"},{"label":"D","text":"漏斗分析只能分析登录状态下的用户行为"}],"answer":"B,C","explanation":"漏斗分析可以适用于各种类型的网站，而不仅仅是线上购物网站。漏斗分析最主要的作用之一就是分析用户的流失率，精确计算转化率也是漏斗分析的一个重要功能。由于用户的行为不止局限于登录状态，所以漏斗分析也能够分析未登录状态下的用户行为。","mnemonic":"漏斗分析：可分析流失率+精确算转化率，不限购物网站也不限登录状态(BC)"},{"id":846,"type":"multi","text":"下列哪一种（）算法不能用于关联分析。","options":[{"label":"A","text":"KNN算法"},{"label":"B","text":"决策树算法"},{"label":"C","text":"KMeans算法"},{"label":"D","text":"Apriori算法"}],"answer":"A,B,C","explanation":"Apriori算法是一种经典的关联规则挖掘算法，可用于发现数据集中频繁出现的项集之间的关联关系。KNN和决策树是一种监督学习算法，主要用于分类和回归任务。KMeans是一种无监督学习算法，主要用于聚类任务。","mnemonic":"不能关联分析：KNN分类+决策树分类+KMeans聚类，只有Apriori能(ABC)"},{"id":847,"type":"multi","text":"以下关于数据增强的描述，正确的有（）。","options":[{"label":"A","text":"数据增强能够扩展训练集的规模"},{"label":"B","text":"数据增强仅通过增加图像的分辨率来扩展训练集的规模"},{"label":"C","text":"数据增强可以提高模型的泛化能力，减少过拟合的风险"},{"label":"D","text":"数据增强包括旋转、平移、缩放、裁剪等几何变换操作，但不涉及颜色空间的变换"}],"answer":"A,C","explanation":"数据增强是一种在训练模型通过对原始图像进行变换或者合成来产生新的训练数据的技术。其主要目的是扩充数据集，使模型能够学习到更多的不变性，增加模型的泛化能力，同时减少过拟合的风险。","mnemonic":"数据增强正确说法：扩展训练集+提高泛化减少过拟合，不仅增分辨率也含颜色变换(AC)"},{"id":848,"type":"multi","text":"下列哪项属于知识产权侵权行为（）。","options":[{"label":"A","text":"未经授权擅自使用他人商标"},{"label":"B","text":"未经授权擅自销售他人专利品"},{"label":"C","text":"未经授权擅自复制他人版权作品"},{"label":"D","text":"未经授权擅自使用他人知识产权的商业秘密"}],"answer":"A,B,C,D","explanation":"知识产权侵权行为可以包括侵犯商标权、专利权、著作权、商业秘密等多种形式。未经授权擅自使用他人商标、销售他人专利品、复制他人版权作品、使用他人知识产权的商业秘密等都属于知识产权侵权行为。《中华人民共和国知识产权法》规定，任何组织或者个人不得侵犯他人的知识产权。","mnemonic":"知识产权侵权：商标+专利+版权+商业秘密，未经授权全都侵权(ABCD)"},{"id":849,"type":"multi","text":"在 Word 里，对已有的页眉和页脚进行编辑时，支持的操作有哪些（）。","options":[{"label":"A","text":"添加或更改页眉或页脚的文本"},{"label":"B","text":"删除第一个页眉或页脚"},{"label":"C","text":"更改字体、颜色或大小"},{"label":"D","text":"将图像添加到页眉或页脚"}],"answer":"A,B,C,D","explanation":"在word中编辑现有页眉和页脚可以添加或更改页眉或页脚的文本，或者执行以下任一操作：①删除第一个页眉或页脚。②添加页码。③更改字体、颜色或大小④将图像添加到页眉或页脚。","mnemonic":"Word页眉页脚编辑：改文本+删首个+改字体颜色大小+加图像，全选(ABCD)"},{"id":850,"type":"multi","text":"下列属于事务 ACID 特性的属性是（）。","options":[{"label":"A","text":"原子性"},{"label":"B","text":"可用性"},{"label":"C","text":"持久性"},{"label":"D","text":"扩展性"}],"answer":"A,C","explanation":"事物的ACID特性包括原子性、一致性、独立性和持久性。可用性通常指的是系统在任何时候都能被访问和使用，与事务的特性无关。扩展性指的是系统能够通过增加资源来处理更多的负载，与事务的特性无关。","mnemonic":"ACID特性：原子性+一致性+独立性+持久性，可用性和扩展性不属于(AC)"},{"id":851,"type":"multi","text":"关于 ETL 任务能够重复执行这一特点，下列描述正确的是（）。","options":[{"label":"A","text":"任务设计需保证多次执行结果一致"},{"label":"B","text":"调度系统应支持配置任务重试次数"},{"label":"C","text":"可重复执行仅适用于自动化场景"},{"label":"D","text":"通过重试检查数据就绪是典型应用"}],"answer":"A,B,D","explanation":"在ETL任务中，可重复执行性是一个重要的特性。任务应该设计成在多次执行时产生相同的结果，以确保数据的一致性和可靠性。调度系统通常需要支持任务重试功能，以便在任务失败时能够自动重试。通过配置任务重试次数，可以确保任务在遇到临时错误时能够自动恢复，提高任务的可靠性和成功率。可重复执行不仅适用于自动化场景，也适用于手动场景。通过重试来检查数据是否就绪是一种常见的应用。","mnemonic":"ETL可重复执行：多次结果一致+支持重试次数+重试检查数据就绪，不限自动化(ABD)"},{"id":852,"type":"multi","text":"下列符合定义精确原则的是（）。","options":[{"label":"A","text":"管理分析法"},{"label":"B","text":"要使用维度分析法"},{"label":"C","text":"要清晰、明确地定义流程产出、流程投入、流程活动等要素的特征"},{"label":"D","text":"尽最大的努力使其实现量化。"}],"answer":"C,D","explanation":"定义精确原则是指要清晰、明确地定义流程产出、流程投入、流程活动等要素的特征，尽最大的努力使其实现量化。","mnemonic":"定义精确原则：清晰定义流程要素+尽力量化，管理分析法和维度分析法不是(CD)"},{"id":853,"type":"multi","text":"朴素贝叶斯在贝叶斯算法里的假设，不涵盖（）。","options":[{"label":"A","text":"特征之间相互独立"},{"label":"B","text":"特征之间存在线性关系"},{"label":"C","text":"特征之间存在非线性关系"},{"label":"D","text":"特征之间具有相互依赖性"}],"answer":"B,C,D","explanation":"朴素贝叶斯假设是贝叶斯算法中的一个重要组成部分，主要核心假设：特征之间相互独立：这是朴素贝叶斯算法的核心假设之一。它假定在给定类别的条件下，各特征是条件独立的，即特征之间不存在直接的相互影响。这简化了计算，并使得模型能够有效地处理高维数据。","mnemonic":"朴素贝叶斯假设只有一个：特征相互独立，线性/非线性/依赖性都不涵盖(BCD)"},{"id":854,"type":"multi","text":"人工智能训练师的中级知识体系需要具备（）等方面的内容。","options":[{"label":"A","text":"能够编写初级培训讲义"},{"label":"B","text":"能够通过数据分析，设计单 一场景下人工和智能交互的最优流程"},{"label":"C","text":"能够对业务数据采集流程提出优化建议"},{"label":"D","text":"能够完成对标注数据准确性和完整性审核"}],"answer":"C,D","explanation":"作为一名人工智能训练师，需要具备能够对业务数据采集流程提出优化建议、能够完成对标注数据准确性和完整性审核等中级知识体系。","mnemonic":"AI训练师中级：优化数据采集+审核标注数据，编写讲义和设计流程非中级(CD)"},{"id":855,"type":"multi","text":"当算法因模型复杂度不够而出现欠拟合时，可采取（）措施。","options":[{"label":"A","text":"继续训练模型，增加训练轮数"},{"label":"B",
